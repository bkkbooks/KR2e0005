body:
  text: 戰國策校注卷四宋鮑彪原注元吳師道補正齊東有菑川東萊琅邪髙密膠東南有泰山城陽北有千乘濟河以南渤海之髙樂髙城重合信陽西有濟南平原威正田齊桓公子元年卯安王二十四年癸濮上之事此東郡濮水之上實衛地贅子死章子走皆以名子之猶嬰子文子章匡章盼子謂齊王曰曰盼也威王言使守髙唐者並齊將不如易餘糧於宋易移與之宋王辟公正曰辟公說見宋䇿桓公未嘗稱王宋偃十一年稱王當齊宣王二十五年此非威王時必說梁氏不敢過宋伐齊齊固弱固猶信是以餘糧收宋也齊國復强雖復責之宋可可責其償不償因以為辭攻之亦可盼子威王臣威自九年後未嘗敗撓此言二子死蓋九年前也正曰盼子雖見稱於威王宣王二年馬陵之役盼為將十年楚敗齊令齊逐田嬰張丑說楚王云嬰逐盼子必用則盼先著於宣王之世伐燕之役章子將兵亦宣王時且䇿有齊國復强之言决非威王時也邯鄲之難趙成侯二十一年魏圍邯鄲此二十五年趙求救於齊田侯召大臣而謀曰救趙孰與勿救芻子名忌二十一年相明年封下邳號成侯曰不如勿救段干綸補曰史作朋後語作萌曰勿救則我不利我我齊田侯曰何哉對曰補二字補曰史有對曰二字夫魏氏兼邯鄲其於齊何利哉田侯曰善乃起兵甲補曰一本甲作曰是言將屯於其郊故後云乃起兵南攻軍於邯鄲之郊以軍法陳之於此正曰髙注軍屯也愚謂凡言軍於某地者猶言師於某地成列則云陳於某段干綸曰臣之求利且不利者非此也且猶與夫救邯鄲軍於其郊是趙不拔而魏全也兩國不戰故也故不如南攻襄陵以敝魏襄陵屬河東魏邑也攻之使魏困邯鄲拔而承魏之敝承言繼其後是趙破而魏弱也田侯曰善乃起兵南攻襄陵七月邯鄲拔齊因承魏之敝大破之桂陵諸注止言魏地齊記有云二十六年正曰正義云桂陵在曹州乘氏縣東北又說見後秦假道韓魏以攻齊齊威王使章子將而應之與秦交和而舍孫子兩軍相對曰交和楚記注軍門曰和使者數相往來章子為變其徽章徽幟也以絳帛著於背章其别也補曰此引說文又左傳楊徽注若今救火衣又按王莽傳殊徽幟注通謂旌旗屬以雜秦軍候者言齊之偵者章子以齊入秦威王不應頃衍之字之正曰有頃之間也句竒下頃間變文間候者復言章子以齊兵降秦威王不應而此者三而猶如有司請曰言章子之敗者異人而同辭王何不廢將而擊之廢謂罷之補曰廢一本作發是既降矣安用廢為王曰此不叛寡人明矣曷為而擊之頃間言齊兵大勝秦兵大敗於是秦王稱元作拜拜西藩之臣按威王與秦獻公孝公同時齊雖强而秦不弱此語未詳而謝於齊左右曰何以知之曰章子之母啓其母名得罪其父其父殺之而埋馬棧之下棧為棚以立馬正曰髙注棧牀也補曰章子通國稱不孝孟子以為父子責善而不相遇者恐因此事也後語馬屎之中吾使衍者字者補曰姚云一本無章子將也勉之曰夫子之强全兵而還必更葬將軍之母對曰臣非不能更葬先妾也臣之母啓得罪臣之父臣之父未教而死未有教命補曰後語未赦夫不得父之教而更葬母是欺死父也故不敢彪謂君父一也雖無父命而以君命更葬何損於義凡章子之孝皆過所謂過孝正曰此是章豫言所以不更葬之故未見其終拒威王之命夫為人子而不欺死父豈為人臣欺生君哉彪謂周衰齊威不世之主也列子曰君非自知我也以人之言賜我其罪我又將以人之言故人君於其臣欲其自知之也威王之於章子有馬夫如是雖百市虎不搖也豈以三告而投杼乎哉楚將伐齊魯親之親楚齊王患之張丐曰齊人疑即張丑臣請令魯中立於兩國之間無所親疏乃為齊見魯君康公正曰無考魯君曰齊王懼乎曰非臣所知也臣來弔足下魯君曰何弔乎曰君之謀過矣君不與勝者而與不勝者楚時未敗而云然者蓋楚有勝齊之勢楚雖勝士卒多死魯合齊以兩國擊之楚必敗故言其不勝何故也魯君曰子以齊楚為孰勝哉對曰鬼且不知也然則子何以弔寡人曰齊楚之權敵也補曰言其力適均不用有魯與無魯足下豈如全衆而合二國之後哉楚大勝齊其良士選卒材武見選者必殪殪死也其餘兵足以待天下齊為勝其良士選卒亦殪而君以魯衆合戰勝後合合敗者也勝者雖合之不必見德今以全衆合敗者彼勝者既士卒多死可勝也敗者因見德矣此其為德也亦大矣德敗者其見恩德也亦甚大矣敗者德之魯君以為然乃退師補曰為齊楚為去聲成侯鄒忌為齊相補曰髙注成齊邑按史曰封以下邳號為成侯田忌為將不相說公孫閈齊人補曰閈史作閲謂鄒忌曰公何不為王謀伐魏勝則是君之謀也君可以有功戰不勝田忌不進戰而不死曲撓而誅曲撓言師不直前而敗鄒忌以為然乃說王而使田忌伐魏田忌三戰三勝鄒忌以告公孫閈公孫閈乃使人操十金而往卜於市曰我田忌之人也吾三戰而三勝聲威天下天下畏其威聲正曰其聲畏懼天下欲為大事反齊而王亦吉否卜者出田忌之人正曰公孫閈所使者因令人捕捕取也為人卜者亦驗其辭於王前田忌遂走齊記三十五年有彪謂齊威賢王也其知章子察阿墨大夫明矣獨於是失之然忌之走亦非威王譴之也正曰史以公孫閈為鄒忌云云附戰桂林之前文小異操十金卜市以下在威王三十五年下云田忌聞之率其徒襲攻臨淄求成侯不勝而奔宣王召復位遂有馬陵之戰按䇿言忌伐魏三戰三勝忌戰可見者桂陵馬陵二役䇿併言之也後章記忌係太子申禽龎涓孫子謂忌曰若是則齊君可正成侯可走忌不聽遂不入齊又記田忌亡齊之楚楚封之江南則忌之出奔在戰馬陵後宣王之世明矣史載其奔在前故謂召復位忌既襲齊豈得再復成侯猶在豈宜並列而馬陵後忌無可書之事知其必有誤也以威王之明成侯公孫閈之詐豈能行其間其為宣王無疑也大事記謂桂陵馬陵二事多混而書忌出奔在威王時亦仍史之舊耳鄒忌修八尺有餘而形貌昳麗昳徒結切目側也故有光艷意又疑作佚正曰髙注昳讀曰逸朝服衣冠窺鏡謂其妻曰我孰與城北徐公美其妻曰君美甚徐公何能及君也城北徐公齊國之美麗者也忌不自信而復問其妾曰吾孰與徐公美妾曰徐公何能及君也旦日旦明也客從外來與坐談問之補曰一本問之客曰一無客字吾與徐公孰美客曰徐公不若君之美也明日徐公來熟視之自以為不如窺鏡而自視又弗如逺甚暮寢而思之曰吾妻之美我者私我也私猶親妾之美我者畏我也客之美我者欲有求於我也於是入朝見威王曰臣誠知不如徐公美臣之妻私臣臣之妾畏臣臣之客欲有求於臣皆以美於徐公今齊地方千里百二十城宫婦左右莫不私王朝廷之臣莫不畏王四境之內莫不有求於王由此觀之王之蔽甚矣王曰善乃下令羣臣吏民能面刺寡人之過者受上賞上書諫寡人者受中賞能謗譏於市朝聞寡人之耳者受下賞令初下羣臣進諫門庭若市數月之後時時而間進進諫者有暇隙朞年之後雖欲言無可進者燕趙韓魏聞之皆朝於齊此所謂戰勝於朝廷坐朝廷之上匹國朝之不待兵也彪謂鄒忌嘗以詐走田忌則其人亦傾險士耳惟此言者萬世之言也補曰大事記威烈王二十二年按外紀宋昭公出亡謂其御曰云云事與此類又新序齊有田巴先生賢王聘而問政巴改製新衣拂飾冠帶顧謂其妾云云恐與鄒忌事有訛舛宣王威王子元年補曰名辟疆顯王二十七年己卯南梁之難魯國蕃縣有南梁水此二年魏伐趙趙與韓共擊魏趙不利敗於南梁正曰正義引括地志云故梁在汝州西南稱南梁者别於大梁少梁髙注韓邑大梁在北故曰南梁大事記此魏伐韓也謂伐趙者往嵗桂陵之戰與此混而誤爾韓氏請救於齊田侯猶上陳侯召大臣而謀曰早救之孰與晚救之便張丐對曰晚救之韓且折而入於魏不如早救之田臣思曰補曰索隱云䇿作田期思必别本也紀年謂之徐州子期即田忌也不可夫韓魏之兵未敝而我救之我代韓而受魏之兵顧反聽命於韓也且夫魏有破韓之志韓見且亡必東訴於齊訴告也我因隂結韓之親而晚承魏之敝承繼其後也則國可重利可得名可尊矣田侯曰善乃隂告韓使者而遣之告者許之也韓自以有齊國五戰五不勝東訴於齊齊因起兵擊魏大破之馬陵補曰虞喜云馬陵在濮州鄄城東北六十里有澗深峻可以置伏龎涓敗即此徐廣云在魏州元城縣東南司馬彪引杜預說亦然按齊使田忌將直達大梁龎涓聞之去韓而歸齊軍已過而西則從汴州外黃退至濮州東北六十里是也豈合更渡河至元城哉魏破韓弱韓魏之君因田嬰北面而朝田侯齊記有為兩章一為桓公臣思一為宣王孫子彪謂臣思之䇿則幸中矣非仁義舉也孟子謂行一不義而得天下不為也况朝韓魏乎正曰今按桓公田臣思事自與邯鄲之難及韓齊為與國二章相亂非此章也說見後章田忌為齊將此二年召復位正曰說見前係梁太子申禽龎涓魏將孫子臏也齊人武之孫為田忌軍師謂田忌曰將軍可以為大事乎田忌曰奈何孫子曰將軍無解兵而入齊使彼罷敝於先罷疲同彼謂齊齊軍已與魏戰雖勝亦罷今使當前弱守於主弱弱卒也忌所自將使齊不疑也主地缺蓋齊險隘補曰姚云曾先皆作老愚恐上句多於字謂以罷敝老弱守險敵衆而以精兵攻齊下云輕車鋭騎者也主者循軼之途也軼轍同車迹也言其險狹不得方軌適相循耳轄擊摩車而相過轄牽同車軸專鍵也路狹車密故相擊相摩使彼罷敝先弱守於主必一而當十得地利故十而當百百而當千然後背太山在太山博縣西北左濟右天唐蓋盼子所守所謂髙唐屬平原軍重踵髙宛重輜重也後志髙宛屬樂安使輕車鋭騎衝雍門始皇紀注在髙陵正曰髙注雍門齊西門名按左傳襄十八年有雍去聲若是則齊君可正正猶制治而成侯可走不然則將軍不得入於齊矣田忌不聽果不入齊彪謂臏非武流也武雖運竒用詭豈嘗語人以是乎忌不聽忌賢也補曰使田忌無間於齊孫子曷為而有是言必公孫閈成侯讒搆之時也田忌亡齊而之楚鄒忌代之相補曰前云鄒忌為相田忌為將田忌走此云代之相恐有差誤齊恐田忌欲以楚權復於齊復猶返杜赫曰臣請為留楚為鄒留田於楚補曰一本為下有君字留下有之字謂楚王威曰鄒忌所以不善楚者恐田忌之以楚權復於齊也王不如封田忌於江南以示忌之不返齊也鄒忌必補補曰當有缺字以齊厚事楚田忌亡人也而得封必德王若復於齊必以齊事楚言此示不為鄒忌遊說也此用二忌之道也楚果封之於江南鄒忌事宣王仕人衆薦於王使之仕宣王不說晏首齊人貴而仕人寡王說之鄒忌謂宣王曰忌聞以為有一子之孝不如有五子之孝今首之所進仕者以幾何人宣王因以晏首壅塞之言其不薦達人楚威王戰勝於徐州後志魯之薛六國時曰徐州事在楚威七年此十年補曰徐詞余反正義云紀年梁惠王三十年下邳遷於薛改名徐州徐左氏作舒說文作䣄欲逐嬰子於齊逐使齊逐之田嬰時未封故曰嬰子猶盼子嬰子恐張丑齊人正曰丑又見韓魏燕中山等䇿謂楚王曰王戰勝於徐州也盼子不用也盼子有功於國百姓為之用嬰子不善不與盼善而用申縳申縳者大臣弗補補曰姚云一本有與史曰不附百姓弗為用故王勝之也今嬰子逐盼子必用復整其士卒以與王遇必不便於王也楚王因弗逐楚記七年有權之難後志南郡編注鬭緡以權叛又當陽注縣東南有權城楚地也蓋燕自北進齊自東進而戰於楚境燕䇿為文公時正曰大事記燕齊交兵必非此地史記合燕䇿並載而取鮑三說文公末年云云並屬中山云云燕齊合云云故於此條著其說而斥其非者不著鮑氏取長棄短之意也齊燕戰秦使魏冉之趙冉傳言自惠王時任事然則此役文公末年也出兵助燕擊齊薛公嬰時未封後人稱之耳嬰傳言自威王時任職使魏處之趙謂李向趙人正曰大事記起用事者也曰君助燕擊齊齊必急急必以地和於燕而身與趙戰矣然則是君自為燕束兵東猶斂燕齊和成斂兵不戰為燕取地也取齊地故為君計者不如按兵勿出齊必緩趙之助燕不力故齊無危急之勢緩必復與燕戰戰而勝兵罷敝罷疲同趙可取唐曲逆並屬中山國言二國戰不暇北顧趙可以其間取中山也補曰髙注唐今盧奴北盧縣也曲逆今蒲隂戰而不勝命懸於趙懸繫也然則吾中立吾謂趙而割窮齊與疲燕也割割齊地正曰割齊燕地兩國之權懸於君矣蘇秦為趙合從趙肅侯十七年此當十年說齊宣王曰齊南有太山東有琅邪徐州郡補曰孟子注琅邪齊東南境上邑西有清河冀州郡補曰正義云今貝州北有渤海幽州郡補曰正義云今滄州此所謂四塞之國也言四方皆有險固齊地方二千里補曰史三千餘里帶甲數十萬粟如丘山齊車之良五家之兵管仲軍令始於五家為軌疾如錐矢錐銃也補曰吕氏春秋所貴錐矢者為其應聲而至戰如雷電其威大也解如風雨言疾也即有軍役未嘗倍泰山絶清河涉渤海也臨淄之中屬齊郡補曰青州臨淄縣古營丘地城臨淄故云見正義及水經注渤海後語北海今青州北海是也七萬户臣竊度之下補曰史無下户三男子三七二十一萬不待發於逺縣而臨淄之卒固已二十一萬矣臨淄甚富而實其民無不吹竽似笙三十六簧鼓瑟似琴二十五弦擊筑似竹曲五弦之樂彈琴鬭雞走犬六博踏鞠者劉向别録蹙鞠黃帝作蓋因娛戲以練武士踏即蹙也補曰王逸云投六著行六棋謂之六博踏史作踏說文徒盍反即踏字臨淄之途車轂元作䡰䡰正曰䡰者轚之訛說文轚車牽相擊也周禮舟車轚互榖梁傳轚者不得入釋文音許又古的反此章史作轂擊按秦䇿車轂擊馳說苑齊人好轂擊揚雄書辨者轂擊讀亦通擊人肩摩連衽成幃帳屬在旁者舉袂成幕袂袖也揮汗成雨家敦補曰史作殷而富志髙而揚夫以大王之賢與齊之强天下不能當今乃西面事秦竊為大王羞之且夫韓魏所以補補曰史此有以字畏秦者以與秦接界也兵出而相當不至十日而戰勝存亡之機決矣韓魏戰而勝秦則兵半折折猶敗以秦敵强雖勝猶為失半也四境不守戰而不勝以亡隨其後是故元作後補曰姚本作故是史同韓魏之所以重與秦戰而輕為之臣也今秦攻齊則不然倍韓魏之地倍言二國在其後至衛元作聞補曰姚云至闈一作過衛史作衛陽晉之道魏襄十六年秦拔魏蒲地陽晉張儀傳劫取衛陽晉注皆不地蓋衛地時屬魏也正曰正義云衛曹濮等州陽晉在曹州乘氏縣西北徑亢父之險屬東平補曰亢音剛又苦浪反髙注任城縣南車不得方軌爾雅方舟併兩舟則此亦兩也軌車轍馬不得並行百人守險千人不能過也秦雖欲深入則狼顧驚貌正曰狼性怯走常還顧恐韓魏之議其後也是故恫疑虛喝元作猲恫痛也言疑之甚集韻喝呵也猲補曰髙注猲喘息懼貌史作喝索隱云亦作偈並呼合反竊謂作恐偈亦通又注見趙䇿髙躍補曰史作驕矜而不敢進則秦不能害齊亦明矣夫不料秦之不奈我何也而欲西面事秦是羣臣之計過補曰一本此有也字今臣無事秦之名而有强國之實臣故元作固固正曰䇿固故通願大王之少留計留意計之齊王曰寡人不敏此敏謂猶明明則疾於事補曰一本注朝本此下有云逺守海窮道東境之國也未嘗得聞餘教今主君補曰主君稱蘇秦恐衍主字史作足下以趙王之詔告之詔告也敬奉社稷以從凡蘇張從橫之說本傳皆有此在說燕趙韓魏後淳于髠齊人見滑稽𫝊一日而見七人於宣王王曰子來寡人聞之千里而一士是比肩而立此謂肩相次也言士難得千里有一猶為並肩也百世而一聖若隨踵而至也今子一朝而見七士則士不亦衆乎淳于髠曰不然夫鳥同翼者而聚居獸同足者而俱行補曰後語鳥同翼者聚飛獸同足者俱行今求柴胡桔梗於沮澤二草山生而沮水也故求不可得孟子注菹澤生草者水名出漢中正曰沮澤但言漸濕之地如漢書所謂坐於沮澤之中者不必因下文求地名以實之則纍世不得一焉及之睪黍地缺疑為負黍蓋此與梁父皆東地也補曰髙注睪黍梁父皆山名愚按臯字或作睪梁父之隂梁父在泰山山北曰隂則㕁車而載耳㕁却言多獲車重不前夫物各有疇耕治之田禾所聚也故為類正曰疇類也今髠賢者之疇也王求士於髠若挹水於河挹酌也而取火於燧也火燧鑒也髠將復見之豈特七士也補曰兩見字賢遍反齊欲伐魏淳于髠謂元作為為補曰此書為謂字通用齊王曰韓子盧者天下之疾犬也東郭逡者逡㕙同狡兔名海內之狡兔也集韻狡獪也疾也韓子盧逐東郭逡環山者三騰山者五兔極於前犬廢於後犬兔俱罷各死其處田父見之無勞倦之苦而擅其功擅者無與爭也今齊魏久相持以頓其兵頓亦勞敝敝其衆臣恐强秦大楚承其後有田父之功齊王懼謝將休士謝辭去之言不用也補曰此與蘇代鷸蚌陳軫虎爭人之說異而同者也逡七倫反齊欲伐魏魏使人謂淳于髠曰齊欲伐魏能解魏患唯先生也敝邑有寶璧二雙文馬二駟文毛色成文馬四匹為駟請致之先生淳于髠曰諾入說齊王曰楚齊之仇敵也魏齊之與國也魏䇿馬陵之敗魏請臣畜朝齊楚王怒伐齊則此所言也夫伐與國使仇敵制其餘敝言楚將因齊兵勞而伐之名醜而實危伐與國醜也而有楚伐之危為王弗取也齊王曰善乃不伐魏客謂齊王曰淳于髠言不伐魏者受魏之璧馬也王以謂淳于髠曰聞先生受魏之璧馬有諸曰有之然則先生之為寡人計之何如淳于髠曰伐魏之事不便魏雖刺髠於王何益伐魏不便魏所欲也而髠止之故魏刺之雖刺髠而齊實不便非益也此設辭也正曰强注終不通說見下若誠不便魏雖封髠於王何損補曰姚云若誠下劉本無不字愚按上句當無不字義乃通恐有訛舛且夫王無伐與國之誹魏無見亡之危百姓無被兵之患髠有璧馬之寶於王何傷乎元在魏䇿正曰為魏而說當從舊齊宣王見補曰見賢遍反顔斶集韻音觸引吕春秋齊有顔斶補曰春秋後語作王蠋曰斶前斶亦曰王前並使之即已宣王不說左右曰王人君也斶人臣也王曰斶前斶亦曰王前可乎斶對曰夫斶前為慕勢王前為趨士趨就也與使斶為慕勢不如使王為趨士王忿然作色曰王者貴乎士貴乎對曰士貴耳王者不貴王曰有說乎斶曰有昔者秦攻齊令有敢去柳下季壟五十步而樵採者魯展禽字季食采栁下亦云居之壟其冢埓秦伐齊先經魯故云死不赦令曰有能得齊王頭者封萬户侯賜金千鎰由是觀之生王之頭曾不若死士之壟也宣王默然不說左右皆曰斶來斶來大王據千乘之地而建千石鍾一石百二十斤萬石簴鐘鼓之桴天下之士皆為後處役為之使處在其位補曰姚本天下之士仁義皆來役處恐仁義字當在之士上辨智並進莫不來語東西南北莫敢不來服元作服求服求補曰求屬下句萬物無不備具而百姓無不親附今夫士之髙者乃稱匹夫徒步而處農畝下則鄙野五鄼為鄙郊外曰野亦所處也補曰鄙五百家監門閭里閭在鄉里在野並五百家皆有門正曰周禮大司徒五家為比五比為閭遂人五家為鄰五鄰為里閭里皆二十五家鄉謂之閭遂謂之里二十五家共有巷巷首有門士之賤也亦甚矣斶對曰不然斶聞古大禹之時諸侯萬國何則德厚之道得貴士之力也言能貴士故德厚故舜起農畝出於野鄙而為天子及湯之時諸侯三千當今之世南面稱寡者乃二十四由此觀之非得失之䇿與昔諸侯多由得䇿也今失䇿故誅滅而寡得䇿貴士也稍稍誅滅滅亡無族之時欲為監門閭里安可得而有也哉是故易傳不云乎居上位未得其實而元作以以補曰恐當作而喜其為名者必以驕奢為行据補曰倨据通借慢驕奢則凶必從之是故無其實而喜其名者削削地也正曰削弱也無德而望其福者約約窮也無功而受其祿者辱禍必握言禍辱隨之不捨也故曰矜功不立言徒有矜大好功之志而不為故功不立虛願不至不求不為而欲得之虛願也物不自至此皆幸樂其名而無其實德者也是以堯有九佐九官也舜有七友雄陶方回續牙伯陽東不訾泰不虛靈甫見陶淵明曰七臣正曰雄陶云云又見皇甫謐逸士傳不訾或云不識不虛或云不空尸子無靈甫愚謂此類皆不可深考或後人所妄造之禹有五丞楚辭八師三后外有益稷臯陶垂契湯有三輔商書伊虺二相外有誼伯仲咎咎單豈此未詳自古及今而能虛成名於天下者無有是以君王無羞亟問亟猶數也不愧下學學於臣下是故成其道德而揚功名於後世者堯舜禹湯周文王是也故曰無刑元並作刑刑補曰當作形下同古書字通形民之力家語作刑朱子謂當從家語者形刑之君也無形謂削約之未著者也無端者事之本也正曰無形無端皆指實德言也夫上見其原下通其流至聖衍人字人明學明學學之明者言上見下通聖明之事何不吉之有哉老子曰雖貴必以賤為本雖髙必以下為基是以侯王稱孤寡不榖是其賤之本與非夫猶言非邪補曰疑非字當在歟字上而夫音扶屬下句與下文豈非下人而尊貴士歟夫堯云云同一本作本歟無非字義明孤寡者人之困賤下位也而侯王以自謂豈非下人以身下人而尊貴士與夫堯傳舜舜傳禹周成王任周公旦而世世稱曰明主是以明乎士之貴也宣王曰嗟乎君子焉可侮哉寡人自取病耳補曰自取病謂斶言士貴王賤及今聞君子之言乃今聞細人之行細人王自稱正曰細人前所謂無實德不貴士者也願請受為弟子且顔先生與寡人逰食必太牢牛羊豕具為太牢出必乘車妻子衣服麗都皆美稱顔斶辭去曰夫玉生於山制則破焉制裁斷之非弗寶貴矣然太璞不完士生乎鄙野推選則祿焉非不尊遂也遂猶達之然而形神不全斶願得歸晚食以當肉晚言飢而食也其美比於食肉補曰當敵也如字安步以當車無罪以當貴清淨貞正以自虞虞娛同樂也制言者王也言謂命令盡忠直言者斶也言要道已備矣願得賜歸安行反臣之邑屋則再拜衍而字而辭去君子補二字曰斶知足矣歸真補也反璞則終身不辱正曰曰者斶既辭而又自言也上言大璞不完以喻士之形神不全故曰歸反璞云云文意甚明添字謬先生王斗齊人補曰一本標文樞鏡要作王升造門而欲見齊宣王宣王使謁者延入謁者掌賔贊受事延引也王斗曰斗趨見王為好勢王趨見斗為好士於王何如使者復還報王曰先生徐之使待其至正曰使無趨至寡人請從就之也宣王因趨而迎之於門與入曰寡人奉先君之宗廟守社稷聞先生直言正諫不諱王斗對曰王聞之過不如所聞斗生於亂世事亂君焉敢直言正諫宣王忿然作色不恱有間王斗曰昔先君桓公此桓公雖非田氏之先斗齊人也得稱為先所好者五補補曰一本標文樞鏡要有五字九合諸侯一匡天下天子授元作受受補曰當作授字通借籍土地人民之籍猶賜履也立為太伯二伯之伯今王有四焉宣王說曰寡人愚陋守齊國唯恐夫抎之抎失也春秋傳抎子辱矣焉能有四焉王斗曰先君好馬王亦好馬先君好狗王亦好狗先君好酒王亦好酒先君好色王亦好色先君好士而元作是是正曰姚云劉本無是字王不好士補曰先君好馬以下說苑以為淳于髠之言小異宣王曰當今之世無士寡人何好王斗曰世無騏驎騄耳字書不說騏驎不載惟玉篇云馬黑脊亦不言良馬陸璣疏麒麟行中律吕則此馬以麒麟比也騄耳八駿之一正曰玉篇單言驎爾此二字單言如詩及說文爾雅不一王之補駟已備矣世無東郭俊補曰一本作逡前有盧氏之狗王之走狗已具矣世無毛嬙西施莊小疏毛嬙越王嬖妾西施越女吳王姬王宫已充矣王亦不好士也何患無士王曰寡人憂國愛民固願得士以治之王斗曰王之憂國愛民不若王愛尺縠也縠細繗也正曰增韻縠皺紗齊三服官輕綃注今紗下章曵綺縠又章帝省齊氷紈方空縠知齊産善也說文縠細綺恐此注字誤王曰何謂也王斗曰王使人為冠不使左右便辟便順其所好辟避其所惡而使工者何也為能之也今王治齊非左右便辟無使也臣故曰不如愛尺縠也宣王謝曰寡人有罪國家於是舉士五人任官齊國大治彪謂王斗之義無所取造門求見自卑甚矣而徒以趨見於咫尺之間以為髙此孟子所謂不能三年而緦小功之察者也抑其陳誼迂而不切獨所謂愛縠者可知耳然不若魏牟之言之慤而彪為序舍牟而取斗為牟之言出於斗也正曰王斗造門求見徒以趨見於咫尺之間為髙鮑論當矣其言王不好士不可謂不切也特桓公好狗馬酒色之說亦管仲不害霸之意此其所以為辨士之言而非君子之正爾愛縠之言與魏牟合又何不若之有戰國論說相類者甚多牟豈果出於斗乎正曰宣王喜文學遊說之士賜列第為上大夫者七十六人不治而議論稷下學士至數百千人士非不盛也然鄒衍淳于髠之徒類皆詭誕無實不治而議所養非所用國何賴焉故顔斶勸以貴士王斗譏其不好士有以也然若斗與斶者亦未知其何如也有一孟子而不能用安用彼數百千人哉齊人見田駢齊處士曰聞先生髙議補曰恐是義字設為不宦設者虛假之辭而願為役為駢給使田駢曰子何聞之對曰臣聞之鄰人之女田駢曰何謂也對曰臣鄰人之女設為不嫁行年三十而有七子不嫁則不嫁然嫁過畢矣畢猶已言過於嫁已矣今先生設為不宦訾養千鍾訾資同所資所養也昭三年注四豆為區自四以登至於釡十則鍾又㮚氏注四升為豆則鍾凡六斛四斗也徒百人徒從車者不宦則然矣而富過畢矣田子辭謝之也管燕齊人正曰無考新序作燕相得罪齊王謂其左右曰子孰而與我赴諸侯乎而辭也左右默然莫對管燕連然流涕連與漣同泣下也曰悲夫士何其易得而難用也田需對曰士三食不得饜飽也而君鵝鶩有餘食鶩舒鳬下宫糅羅紈下宫後宫下列糅雜紈素也曵綺縠綺文繒而士不得以為緣緣衣純且財者君之所輕死者士之所重君不肯以所輕與士而責士以所重事君非士易得而難用也補曰田需見魏䇿與公孫衍並相者豈即此人歟說苑宗衛相齊罷歸召田饒等問饒對亦與此合閔王宣王子元年顯王四十六年戊戌正曰此據史通鑑閔王元年當赧王二年視史下移十年大事記同昭陽為楚伐魏覆軍殺將得八城楚懷六年此元年正曰宣王二十年移兵而攻齊陳軫為齊王衍使字史言軫為秦使齊齊問之為齊見陽使見昭陽再拜賀戰勝起而問楚之法覆軍殺將其官爵何也昭陽曰官為上柱國爵為上執圭陳軫曰異貴於此者何也問此外復有貴者不曰唯令尹耳楚相也陳軫曰令尹貴矣主非置兩令尹也臣竊為公譬可也楚有祠者祠春祭正曰髙注祠祭賜其舍人始皇紀注主廏內小史或云侍從賔客者正曰顔師古曰舍人親近左右之通稱後遂以為私屬官號巵酒巵器也舍人相謂曰數人飲之不足一人飲之有餘請畫地為蛇先成者飲酒一人蛇先成引酒且飲乃左手持巵右手畫蛇曰吾能為之足未成一人之蛇成奪其巵曰蛇固無足子安能為之足遂飲其酒為蛇足者終亡其酒今君相楚而攻魏破軍殺將得八城不弱兵言恃其强欲攻齊齊畏公甚公以是為名亦元作居居正曰因下足字衍恐訛姚云一本去此字足矣官之上非可重也戰無不勝而不知止者身且死爵且後歸言身死後爵歸於國故史言爵奪猶為蛇足也昭陽以為然解軍而去楚記同彪謂此策雖其指為齊亦持勝之善補曰為楚為齊為公之為去聲秦攻趙趙令樓緩以五城求講於秦而與之伐齊齊王恐因使人以十城求講於秦樓子恐因以上黨二十四縣許秦王惠文趙足凡趙皆趙人之齊謂齊王曰王欲秦趙之解乎不如從合於趙趙必背秦背秦則齊無患矣齊將封田嬰於薛定封在此三年正曰宣王二十年又說見後補曰索隱云嬰諸田之别子非宣王弟也楚王懷聞之大怒將伐齊齊王有輟志集韻輟止也公孫閈曰封之成與不非在齊也又將在楚閈說楚王令其欲封公也又甚於齊嬰子曰願委之於子公孫閈為謂楚王曰魯宋事楚而齊不事者齊大而魯宋小王獨利魯宋之小不惡齊大何也夫齊之削地而封田嬰是其所以弱也願勿止楚王曰善因不止彪謂此說不可行也嬰齊相也雖得薛不决裂於外猶齊地耳齊薛為一如穰侯應侯之於秦也何弱小乎其初哉正曰史齊襄王立而孟嘗君中立為諸侯王畏君與連和後卒諸子爭立齊魏共滅之鮑謂分封不足以弱齊未睹末流之害也靖郭君田嬰諡正曰此據史文索隱云靖郭或封邑號漢齊王舅父駟鈞封靖郭侯將城薛客多以諫靖郭君謂謁者無為客通齊人有請者曰臣請三言而已矣益一言臣請烹所謂鼎鑊之誅靖郭君因見之客趨而進曰海大魚因反走君曰客有於此言此言外應復有正曰髙注如此止無走也客曰鄙臣不敢以死為戲君曰亡亡無同言無此也更言之對曰君不聞大魚乎網不能止鉤不能牽蕩而失水集韻蕩放也言自放肆則螻蟻得意焉螻蟻蛄一曰蟿天螻得意飫飽也今夫齊亦君之水也君長齊雄長之長正曰見下奚以薛為夫齊雖隆薛之城到於天猶之無益也正曰一本君長有齊姚氏奚以薛為夫齊句按新序作無齊雖隆云云是蓋夫無音訛又因上夫齊字混君曰善乃輟城薛靖郭君謂齊王曰五官之計曲禮司徒司空司馬司士司冦典司五衆計其事之凡也正曰注家謂此殷制非䇿所指按記曽子問諸侯出命國家五官而後行注云五官五大夫典事者髙曰計簿書也不可不日聽也而數覽王曰說吾而厭之言汝既說我則不得自厭故以委之正曰也字當在覽下王曰說吾有缺誤姚云一本作王曰日說五官吾厭之通鑑云不可不日聽而數覽也王從之已而厭之悉以委嬰嬰由是得專齊權今與靖郭君以五官之計委之補曰姚云今一作令靖郭君善齊貌辨齊人補曰姚云古今人表作昆辨師古引此按一本標云修文御覽北堂書鈔同吕覽作劇貌辨元和姓纂崑辨齊貌辨之為人也多疵疵病也謂過失補曰此人蓋有竒節而不修細行者吕覽作訾門人弗說士尉齊人以證靖郭君證諌也靖郭君不聽士尉辭而去孟嘗君嬰子文補曰孟嘗乃邑名在薛旁按詩居常與許即此嘗也又竊以諫竊猶私靖郭君大怒曰剗而類集韻剗翦也以翦草為喻而汝也類族類破吾家茍可慊齊貌辨者集韻慊愜也吾無辭為之言有可滿貌辨之意雖家族破滅猶為之不辭也於是舍之上舍猶甲第正曰此本髙注按田文𫝊𫝊舍幸舍代舍索隱云並當上中下三等之客所舍之名以此推之則代舍乃上舍也令長子御之集韻御侍也正曰為之御也旦暮進食數年宣元作威下同威王薨閔元作宣下同宣王立嬰之封薛在閔王初下言之薛則此不得言宣王立也正曰說見下靖郭君之交大不善於閔宣王辭而之薛與齊貌辨俱留無幾何齊貌辨辭而行請見閔宣王靖郭君曰王之不說嬰甚公往必得死焉齊貌辨曰固不求生也請必行靖郭君不能止齊貌辨行至齊閔宣王聞之藏怒以待之齊貌辨見閔宣王曰子元作子曰子曰補曰當作曰子靖郭君之所聽愛夫愛而聽用其言齊貌辨曰愛則有之聽則無有王之方為太子之時辨謂靖郭君曰太子相不仁過頥豕視過謂豐頥過人豕多反視補曰吕氏春秋過頥豕視注頥豕不仁之人其說未詳劉辰翁云過頥即俗所謂耳後見腮豕視即相法所謂下邪偷視若是者信反始信後反不若廢太子更立衛姬嬰兒郊師補曰髙注郊師衛姬子宣王庶弟靖郭君泣而曰不可吾不忍也若聽辨而為之必無今日之患也此為一至於薛昭陽請以數倍之地易薛辨又曰必聽之靖郭君曰受薛於先王封嬰於薛閔王也而曰受於先王蓋宣王有㫖封之正曰史以田嬰之封在湣王三年從通鑑則在宣王二十二年按嬰自威王時任職用事而文之言曰君用事相齊至今三王矣三王者威宣閔也故大事記以嬰卒文立附見於閔王元年此䇿曰受薛於先王先王之廟在薛則是威王之世嬰已受封史亦不合索隱引紀年梁惠後元十三年四月齊威王封田嬰於薛十月齊城薛十四年薛子嬰來朝十五年齊威王薨考之史梁惠王後元十三年在今封嬰前一年不得為威王之世亦皆不合惟梁惠前十三年則正當威王時疑此處有差互而嬰之封薛則實威王之世也雖惡於後王吾獨謂先王何言無以告於先王且先王之廟在薛吾豈可以先王之廟與楚乎又不肯聽辨此為二閔宣王太息長出氣也動於顔色曰靖郭君之於寡人一至此乎寡人少殊不知此客肯為寡人來靖郭君乎齊貌辨對曰敬諾靖郭君衣宣威王之衣冠舞其劒先時所賜補曰姚云舞劉本作帶閔宣王自迎靖郭君於郊望之而泣靖郭君至因請相之靖郭君辭不得已而受之七日謝病强辭强猶固不得三日而聽王聽其辭當是時靖郭君可謂能自知人矣能自知人故人非之不為沮集韻沮止也此齊貌辨之所以外生以生為外物無所愛也樂患趣難者也彪謂知人之難貴於知其心齊人曰辨之為人多疵論其迹也靖郭君獨深善之不可奪知其心也士為知己者死此辨所以不求生歟正曰心迹之論未當說見章首條下補曰趣即趨秦伐魏陳軫合三晉而東謂齊王曰古之王者之伐也欲以正天下而立功名以為後世也今齊楚燕趙韓梁六國之遞甚也遞言其更相伐不足以立功名適足以强秦而自弱也非山東之上計也能危山東者强秦也不憂强秦而遞相罷弱罷疲同而兩歸其國於秦兩彼我也此臣之所以為山東之患天下為秦相割以割肉喻其相伐秦曾不出力補曰北山何先生標大事記云力一作刀天下為秦相烹煮也秦曾不出薪喻秦無所事何秦之智而山東之愚邪願大王之察也古之五帝三王五霸之伐也伐不道者今秦之伐天下不然必欲反之反古主必死辱死於辱民必死虜今韓梁之目未嘗乾戰死者多也而齊民獨不也非齊親而韓梁疏也齊逺秦而韓梁近今齊將近矣今秦欲攻梁絳安邑絳屬河東秦得絳安邑以東下河必表裏河山補而東攻齊舉齊屬之海舉言得其地南面而孤楚韓梁三國在秦之南孤謂稱孤以臣之正曰諸國勢不得合故曰孤北靣而孤燕趙絶句齊無所出其計矣願王熟慮之今三晉已合矣復為兄弟約而出鋭師以戍梁絳安邑此萬世之計也齊非急以鋭師合三晉必有後憂三晉合秦必不敢攻梁必南攻楚楚秦搆難三晉怒齊不與已也必東攻齊此臣之所謂齊必有大憂不如急以兵合於三晉齊王敬諾果以兵合於三晉秦惠後七年韓趙魏燕齊共攻秦此六年正曰按大事記顯王四十七年當秦惠後三年魏惠後十三年齊宣二十一年秦伐魏取曲沃平周解題軫說齊不知在何年以其說明切附見於此軫與張儀相惡去秦事楚而懷王合六國伐秦距此四嵗軫說或在此時未可知也愚嘗按趙䇿謂趙王章韓䇿或謂韓王章燕䇿或獻書燕王章皆勸三晉諸國合從其論秦之情與從國事勢曉暢深切如虎即禽魚比目引車同舟之譬說殊而義合如秦之欲伐韓梁東窺周室甚惟寐忘之如約山東皆以鋭師戍韓梁如秦見三晉之堅必南伐楚其言皆合是必一時之事一人之言也考之此䇿秦伐魏陳軫合三晉而東謂齊王其論山東之愚秦之智為秦相割而秦不出力為秦相烹而秦不出薪則亦三䇿之取譬也秦欲攻梁絳安邑今三晉已合約出鋭師以戍梁三晉合秦必南攻楚則亦三䇿所言之事也况䇿無說楚魏之辭而說四國者皆有戍梁之約攻楚之料於是竊信其並為陳軫之言無疑也楚懷王受張儀商於之欺軫諫不聽諫攻秦又不聽其後懷王入秦屈平昭睢諫而軫無言意其必已去楚矣今言楚王入秦正誘會武關之時而軫力為魏說諸侯是時固在魏也軫善楚者約從獨遺楚又勸三晉之移禍於楚豈峉不為楚計哉蓋其知楚謀之不可為入秦之不可止而諸國之擯秦非特為魏所以為楚所謂陽擠而隂助之者歟蘇氏兄弟稱說多浮辭數策非軫不能大事記既著軫說附於顯王四十七年於韓䇿謂論秦最得其情因其言梁絳安邑附見於赧王二十九年魏獻安邑之後皆不能的指其時今徵以楚王入秦一言當在赧王十六年蓋秦取曲沃平周距五國伐秦前四年慎靚王三年五國合從實懷王為長蘇秦之約而無與於軫也懷王入秦次年田文合韓魏伐秦猶能成一戰之功未必不因軫之說也反覆參合可決其為軫矣獨燕䇿言秦伐韓而中山亡此事據史乃中山未亡四年之前且年表滅中山在主父死後而出家先一年大事記取世家史遷所紀固不能無失趙武靈王十九年初胡服二十年二十一年二十三年二十五年連嵗攻中山略地得城邑二十六年復攻中山懷地北至燕代西至雲中九原二十七年傳國子何稱主父欲略胡地襲咸陽遂詐入秦是後已不言攻中山矣惠文三年乃書滅中山遷其王於膚施意者攘地之時中山已定而未廢其君後四年始遷其君如西周既滅次年遷其君於􅓆狐之類通鑑綱目武靈二十五年書中山君奔齊而魏䇿云齊魏伐楚而趙亡中山政是年事則是其國已亡特其君未得後乃得之燕䇿所謂中山亡非舛也故愚並著其說以候知者考焉中山餘見燕䇿韓齊為與國張儀以秦魏伐韓儀復相時補曰伐韓下有缺文必著韓之請救以下文許韓使者知之齊王曰韓吾與國也秦伐之吾將救之田臣思曰王之謀過矣不如聽之子噲燕王與子之國之燕相百姓不戴諸侯弗與秦伐韓楚趙必救之是天下補曰下字衍一本無大事記從之以燕賜我也我我齊王曰善乃許韓使者而還補曰一本作遣是之韓自以得交於齊遂與秦戰楚趙果遽起兵而救韓齊因起兵攻燕三十日而舉燕國燕噲七年此十年補曰此齊宣王所謂五旬而舉之者大事記改三為五補曰按史田齊世家桓公五年秦魏攻韓韓求救於齊桓公召大臣而謀騶忌曰不若勿救段干朋曰不救則韓且折而入於魏田臣思曰秦魏攻韓楚趙救之是天以燕與齊也因襲燕取桑邱䇿即本章齊威王二十六年魏圍邯鄲趙求救於齊威王召大臣而謀騶忌曰不如勿救段干朋曰不救則不義且不利云云不如南攻襄陵以弊魏邯鄲拔而乘魏之敝王從其計敗魏桂陵䇿邯鄲之難章威王作田侯段干朋作綸餘略同宣王二年魏伐趙趙當作韓說見前趙與韓親共擊魏趙不利戰於南梁韓請救於齊宣王召大臣而謀騶忌子曰不如勿救田忌曰不如早救之孫子曰云云宣王曰善起兵擊之敗之馬陵䇿南梁之難韓請救於齊田召大臣而謀張丐曰不如早救田臣思曰云云餘皆略同史凡三節與䇿三章互有同異邯鄲之難與威王條合南梁之難與宣王條合但史為張丐田臣思䇿為騶忌孫子惟桓公取桑丘與威王伐魏宣王伐燕相亂按威王二十一年鄒忌始相上距桓公取桑丘之嵗二十餘年忌豈得已為大臣史誤以邯鄲一章勦入之明矣田臣思即田忌宣王二年戰馬陵後出奔至二十九年子噲之役凡二十七年不應復見使忌果在齊則王安得棄之而將章子䇿或誤載其名也且桓公時秦魏攻韓楚趙救之齊不救因而襲燕宣王時秦魏伐韓楚趙救之齊不救因而舉燕何其事之吻合如此是必可疑考之桓公時秦魏攻韓事無見年表魏韓趙伐齊至桑丘齊伐燕取桑丘意者齊取桑丘而韓魏趙伐之韓且與趙魏攻齊則與求救於齊之文戾且田臣思之辭曰是天以燕與齊而僅為取桑丘乎是史亦誤以宣王伐燕章附之桓公也故大事記書韓魏趙伐田齊至桑丘而不書齊取桑丘於宣王伐燕則引䇿之文謂秦伐韓楚趙救韓即岸門之鄲而齊之取燕雖因子噲之亂亦由諸侯連兵不解無與競者也故愚具列史䇿所載而著大事記之說俾覽者得以考正焉正義云桑丘在易州遂城縣東張儀為秦連橫儀傳連橫在鄭袖出儀後說楚魏韓齊趙卒說燕歸報而惠王死則此當秦十四年此十三年正曰湣王二年說補補曰此處當有說字齊王曰天下强國無過齊者大臣父兄殷衆富樂無過齊者然而為大王計者皆為一時說而不顧萬世之利從人說大王者必謂齊西有强趙南有韓魏負海之國也地廣人衆兵强士勇雖有百秦將無奈我何大王覽其說而不察其至實夫從人朋黨比周比周親周相庇也與論語意異補曰猶傳言相與比周莫不以從為可臣聞之齊與魯三戰而魯三勝國以危亡隨其後魯戰勝齊史傳不書時魯故在有亡形耳正曰此取譬之說猶孟子言鄒人與楚人戰與下文不同雖有勝名而有亡之實是何故也齊大而魯小今趙之與秦也猶齊之於魯也秦趙戰於河漳之上史不書說文濁漳出上黨長子鹿谷山東入清漳清漳出沽山大黽谷入河南漳出南郡再戰而再勝絶句正曰誤當以勝秦句下同秦戰於番吾之下不書蘇秦傳注常山有蒲吾再戰而再勝秦四戰之後趙亡卒數十萬邯鄲僅存雖有勝秦之名而國破矣是何故也秦强而趙弱也今秦楚嫁子取婦為昆弟之國儀說懷王亦云然韓獻宜陽魏效河外趙入朝黽池屬𢎞農補曰今河南府黽池縣水經注穀水出崤東馬頭山榖陽谷東北流歷黽池川漢景帝因崤黽之地以為縣黽弥盡弥兖二反割河間以事秦據此則說趙當在齊前大王不事秦秦驅韓魏攻齊之南地悉趙涉河關悉悉起其兵河關屬金城史作清河是也正曰河之關亦通指博關蘇秦傳注齊威六年晉伐齊至博陵東郡有博平以為博關今按秦山有博亦近齊地補曰後語注云今兖州博城縣有古關是博關司馬貞云在博州臨菑即墨屬膠東國補曰今萊州即墨縣非王之有也國一日被攻雖欲事秦不可得也是故願大王熟計之齊王曰齊僻陋隱居託於東海之上未嘗聞社稷之長利今大客禮大行人掌大客之儀幸而教之請奉社稷以事秦獻魚鹽之地三百於秦三百里也補曰一本有里字為秦之為去聲張儀事秦惠王惠王死武王立左右惡張儀曰儀事先王不忠言未已齊讓又至儀嘗曰儀之所甚憎無大齊王則儀齊所惡也而秦任之故齊以此責秦張儀補曰一本此下有聞之字謂武王曰儀有愚計願效之王王曰奈何曰為社稷計者東方有大變言有兵然後王可以多割地割諸侯地今齊王甚憎衍張字張儀儀之所在必舉兵伐之故儀願乞不肖身而之梁齊必舉兵伐之齊梁之兵連於城下連謂不解不能相去王以其間伐韓入三川出兵函谷而無伐以臨周祭器必出周有先周宗社禮器諸侯所不備今必出以賂秦挾天子按圖籍此王業也王曰善乃具革車三十乘納之梁齊果舉兵伐之梁王大恐補曰後語作魏襄王張儀曰王勿患請令罷齊兵乃使其舍人馮喜之楚藉使之齊齊楚之事已畢事使事因謂齊王王甚憎張儀雖然厚矣王之託儀於秦王也齊王曰寡人甚憎張儀儀之所在必舉兵伐之何以託儀也對曰是乃王之託儀也儀之出秦因與秦王約曰為王計者東方有大變然後王可以多割地齊王甚憎儀儀之所在必舉兵伐之故儀願乞不肖之身而之梁齊必舉兵伐梁梁齊之兵連於城下不能去王以其間伐韓入三川出兵函谷而無伐以臨周祭器必出挾天子按圖籍是王業也秦王以為然與革車三十乘而納儀於梁而果伐之是王內自罷音疲勞師故而伐與國廣鄰敵以自臨而信儀於秦王也此臣之所謂託儀也王曰善乃止儀傳有彪謂此計之必售䇿之必行者也儀之所說於時有妾婦之所羞市人之所不為者若譽南后以取金欺商於以賣楚皆可鄙也惟此為文無害儀亦明年死矣宜其言之善歟補曰大事記秦惠王死公孫衍欲窮張儀見秦䇿儀之逐其衍之力歟正曰鮑謂將死言善爾反覆詭詐之術死猶未已何善之可稱犀首以梁與齊戰於承匡本宋地見陳留襄邑注補曰大事記襄陵故宋之承匡襄牛之地宋襄公所築故曰襄陵而不勝張儀謂梁王哀正曰襄不用臣言以危國王因相儀魏九年此十四年正曰此四年儀以秦梁之齊合橫親補曰猶言從親犀首欲敗敗其橫事謂衛君嗣君曰時儀過衛衍非有怨於儀值所以為國者不同耳值適當也君必解衍解說衍於儀使之釋怨衛君為告儀儀許諾曰與之參坐於衛君之前三人合坐犀首跪行為儀千秋之祝明日張子行犀首送之至於齊疆齊王聞之怒於儀曰衍也吾讐衍嘗與齊戰故而儀與之俱是必與儀補曰一本與衍鬻吾國矣遂不聽彪謂此一時岌乎殆哉一言一動盡為機穽豈可與同羣哉此在衍術中而不悟是以知儀之疏也故其智暗於秦其辨屈於軫而此謀敗於衍也補曰為儀之為如字楚王死懷王太子在齊質楚二十九年使太子質於齊名橫是為頃襄王按史楚三十年懷王入秦秦留之明年項襄王立立三年懷王乃死與此駮蘇子元作秦下並同秦死至是二十年矣此非代則厲也補曰字誤下並同秦謂薛公田文曰君何不留楚太子以市其下東國楚䇿云與我東地蓋楚國之東其地近齊楚地髙而此下薛公曰不可我留太子郢中立王然則是我抱空質而行夫不義於天下也蘇子秦曰不然郢中立王君因謂其新王曰與我下東國吾為王殺太子不然吾將與三國共立之齊嘗與秦韓魏敗楚三國謂此重立然則下東國必可得也蘇子秦之事此著書者叙說可以請行可以令楚王楚新王亟入下東國可以益割於楚可以忠太子而使楚益入地可以為楚王走太子可以忠太子使之亟去可以惡蘇子秦於薛公可以為蘇子秦請封於楚可以使人說薛公以善蘇子可以使蘇子此二子字因舊自解於薛公蘇子秦謂薛公曰臣聞謀泄者事無功計不決者名不成今君留楚補太子者以市下東國也非亟得下東國者則楚之計變變則是君抱空質而負名於天下也負荷不義之名薛公曰善為之奈何對曰臣請為君之楚使亟入下東國之地楚得成得猶與也齊求地而楚與之為得成則君無敗矣薛公曰善因遣之故曰可以請行也此七字元作注字此類亦著書者叙說補曰叙說者分其文而屬之故以此著例姚云曾此七字不作注謂楚王以為懷王則上言已死以為項襄則項襄即太子也以為新立王則項襄外無他王未詳曰齊欲奉太子而立之臣觀薛公之留太子者以市下東國也今王不亟入下東國則太子且倍王之割倍多於前而使齊奉已楚王曰謹受命因獻下東國故曰可以使楚亟入地也謂薛公曰楚之勢可多割也薛公曰奈何請告太子其故謂告蘇子辭也告以楚獻地之故使太子謁之君君薛公也使太子白以亦欲割地以忠太子使楚王聞之可以益入地故曰可以益割於楚謂太子曰齊奉太子而立之楚王請割地以留太子齊少其地太子何不倍楚之割地而資齊齊必奉太子太子曰善倍楚之割而延齊延長行也故有饒益意楚王聞之恐益割地而獻之尚恐事不成故曰可以使楚益入地也謂楚王曰齊之所以多割地者挾太子也今已得地而求不止者以太子權王也權者輕重所在故臣能去太子使人去齊太子去齊無辭必不倍於王也多割王因馳强齊而為交馳亟往齊辭齊之說必聽王然則是王去讐而得齊交也楚王大說曰請以國因因蘇子交齊故曰可以為楚王使太子亟去也謂太子曰夫剬楚者王也剬斷齊也猶制補曰剬本多丸反史漢作制字正義論字例云以空名市者太子也齊未必信太子之言也而楚功見矣功謂入地楚交成太子必危矣太子其圖之太子曰謹受命乃約車而暮去故曰可以使太子急去也蘇子秦使人請薛公曰夫勸留太子者蘇子秦也蘇子秦非誠以為君也且以便楚也太子去楚之便也蘇子秦恐君之知之故多割楚以滅跡也沒其使楚之跡今勸太子去補補曰一本標朝本有者又蘇子秦也而君弗知也臣竊為君疑之薛公大怒於蘇子秦故曰可以使人惡蘇子於薛公也奉王而代立楚太子者代太子立為王又蘇子秦也割地因約者因為之約齊補曰一本固約又蘇子秦也忠王而走太子者又蘇子秦也今人惡蘇子秦於薛公之以其為齊薄而為楚厚也願王之知之楚王曰謹受命因封蘇子秦為武貞君封以美名非邑正曰姚注楚邑故曰可以為蘇子秦請封於楚也又使景鯉請薛公曰君之所以重於天下者以能得天下之士而有齊權也今蘇子秦天下之辨士也世與少有言如之者少君因補曰姚云劉作固不善蘇子秦則是圍塞天下士而不利說途也夫不善君者且奉蘇子秦而於君之事殆矣於猶與今蘇子秦善於楚王而君不蚤親則是與楚為讐也此亦非薛公之恐楚王立未能自定安能難齊哉故彪於楚䇿謂蘇子以此䇿干薛公不見用世猶載其語也正曰謂不親楚則與楚為讐以事理言爾干薛公不用世猶載其語亦臆度之辭故君不如因而親之貴而重之是君有楚也薛公因善蘇子秦故曰可以為蘇子秦說薛公以善蘇子秦按此則懷王死楚立新王太子卒不得立而項襄非太子也史不謂然故其書東國之事亦略補曰史稱懷王入秦而項襄立䇿獨以為懷王死而項襄立前後屢見竊以事勢言之楚人知懷王之必不歸而秦要之以割地故立王以絶秦而喪君有君所以靖國項襄之立非懷王死後明矣史謂當時以詐赴之䇿猶仍之爾特所謂新王及太子不可曉然以逐節考之皆有事實又非飾說也或者太子未返之時郢中立王邪姑缺所疑為之為交為武為讐之為如字齊王夫人死有七孺子者皆近言其親幸薛公欲知王所欲立乃獻七珥瑱也所以充耳美其一明日視美珥所在勸王立為夫人補曰與楚䇿謂昭魚云云類韓非子淮南子皆有孟嘗君將入秦傳言秦昭王聞其賢求見之故將入止者千數而弗聽蘇代元作秦今並從傳秦補曰字誤宜作代下同後語並作代欲止之孟嘗君曰人事者吾已盡知之矣吾所未聞者獨鬼事耳蘇代秦曰臣之來也固不敢言人事也固且以鬼事見君孟嘗君見之謂孟嘗君曰今臣來過於淄上淄水出太山萊蕪原有土偶人偶相人也比土為之正曰索隱云偶類於人也與桃梗集韻梗略也荒也此蓋枯木海外經東海中有山名度索有大桃樹屈蟠三千里枝間東北曰鬼門萬鬼所由往來上有二神人曰神荼鬱壘主治害鬼故使世人刻桃畫其首正嵗置門上辟鬼正曰梗枝梗也趙䇿蘇秦說李兊作土梗木梗謂木梗曰汝非木之根則木之枝是枝根皆可言梗此謂刻桃木為人也史及說苑作土偶人木偶人索隱謂以土偶比涇陽君木偶比孟嘗君時秦昭王使涇陽君為質以求孟嘗髙誘注荼一本作余相與語桃梗謂土偶人曰子西岸之土也挺子以為人挺拔也拔於土中正曰挺他鼎反直也藝文類聚及朝本作延至嵗八月降雨下降大雨自上下也異於飄灑淄水至則汝殘矣殘敗壞也土偶曰不然吾西岸之土也土則復西岸耳今子東國之桃梗也刻削子以為人降雨下淄水至流子而去則子漂漂者將如何耳如往也不知其所在正曰如何止是語助今秦四塞之國譬如虎口而君入之則臣不知君所出矣孟嘗君乃止傳有補曰此時不行其入秦蓋在後孟嘗君在薛史言文代立在薛時未相也正曰代立在薛歸老亦在薛此不可知為何時荆人攻之淳于髠為齊使於荆還反過薛孟嘗君補補曰姚云一本有君字令人體貌有禮容也而郊迎之謂淳于髠曰荆人攻薛夫子弗憂文無以復侍矣言且死淳于髠曰敬聞命至於齊畢報以使事悉報齊王王曰何見於荆對曰荆甚固言其不通而薛亦不量其力王曰何謂也對曰薛不量其力而為先王立清廟詩注祭有清德之宫正曰按本文有清明之德者之宫荆固而攻之清廟必危故曰薛不量力而荆亦甚固齊王和其顔色曰嘻集韻痛也正曰徐云痛而呼之言也和其顔色聽其言也痛而呼之傷宗廟也初不相礙先君之廟在焉疾興兵救之顛蹶之請此著書者詞也言善說者不勞而功顛倒蹶偃也言其請救之遽望拜之謁望而拜之言謁之恭雖得則薄矣言他人請謁雖有得不如髠之厚善說者陳其勢言其方方大略也人之急也言應之疾若自在隘窘之中隘險也豈用强力哉孟嘗君奉夏侯章齊人正曰無考下同以四馬百人之食言饗之厚奉之甚歡夏侯章每言未嘗不毁之也或以告孟嘗君孟嘗君曰文有以事夏侯公矣勿言言事之厚彼不害我董之蘩菁齊人以問夏侯公夏侯公曰孟嘗君重非諸侯也而奉我四馬百人之食我無分寸之功而得此然吾毁之以為之也君所以得為長者賢有容之稱髙祖曰為其無不長者以吾毁之也補曰一本以吾毁之者也者字恐是長者字下脫衍在此吾以身為孟嘗君豈得待元作持補曰姚云劉作豈待言也哉是持者待之訛得者待之訛也言也彪謂君子所以報知我者亦多術矣豈必毁之而後為為之哉此其說有似侯嬴而不及嬴非正議也孟嘗君宴坐宴合語也正曰宴即燕謂三先生曰願聞先生有以補文闕者也補曰髙注先生長老先已以生者也一人曰訾天下之主訾不稱意也言孟嘗有不得意於諸侯者有侵君者侵凌之也臣請以臣之血湔其袵湔濺同集韻水激也田瞀曰車軼之所能至軼轍也請掩足下之短衍者字者補曰疑當在至字下誦足下之長千乘之君萬乘之相其欲有君也有言欲得之如使而弗及也若有使之如恐弗及滕元作勝勝臀元作字書無之亦可作股齊人補曰姚云恐作春秋傳鄭遊販或作曰臣願以足下之府庫財物收天下之士能為君決疑應卒與猝同若魏文侯之有田子方段干木也二人文侯師友此臣之所為君取矣求以此為孟嘗所取正曰為孟嘗取此人也孟嘗君舍人有與君之夫人相愛者夫人姬媵之過稱非其配也與下十妃同或以問孟嘗君曰為君舍人而內與夫人相愛者亦甚不義矣君其殺之君曰睹貌而相說者人之情也其錯之錯措同也勿言也居期年君召愛夫人者而謂之曰子與文游久矣大官未可得小官公又弗欲衛君嗣君與文布衣交言交於未貴時請具車馬皮幣皮羔狐之屬宗伯孤執皮帛正曰羔乃生贄狐皮無據禮注皮帛者束帛而表以虎豹皮為飾宗伯之制恐難引以言此髙注皮鹿皮幣束帛願君以此從衛君逰舍人補三字逰於衛甚重齊衛之交惡衛君甚欲約天下之兵以攻齊是人謂君曰孟嘗君不知臣不肖以臣欺君欺者已不肖而孟嘗言其賢也且臣聞齊衛先君刑馬壓羊殺馬㰱其血又壓羊殺之以盟使諭者如此正曰髙注壓亦殺也盟曰齊衛後世無相攻伐有相攻伐者令其命如此今君約天下之兵以攻齊是足下背先君盟約而欺孟嘗君也願君勿以齊為心君聽臣則可不聽臣若臣不肖也言或以此人為不肖補曰若疑字訛者輒以頸血湔足下襟交袵也衛君乃止齊人聞之曰孟嘗君可語言可與語正曰姚云語劉作謂宜至矣字句善為事矣轉禍為功彪謂周衰禮義消亡以若孟嘗者為能愛士愛則愛矣然非禮之愛也以若舍人者為能强爭强則强矣然亦非義之强也補曰事亦可醜而論著者以為美談邪袁盎從史事類此孟嘗君有舍人而弗說欲逐之魯連齊人仲連謂孟嘗君曰猿獼猴錯木言自置木上補曰錯木據水一句錯舍置也據水則不若魚鱉據猶處下衍處字處補曰姚本無或上據字訛而脫在此作處水勝歷險乘危則騏驥不如狐狸曹沫衍之字之奮三尺之劒一軍不能當魯記莊公與齊桓公㑹柯沫執匕首劫桓公歸魯侵地使曹沫釋其三尺之劒而操銚耨與農人居壠畝之中壠田埒補曰銚七遙反與鍬同耨呼髙反說文拔去田草也即薅則不若農夫故物舍其所長之其所短之猶於堯亦有所不及矣今使人而不能則謂之不肖教人而不能則謂之拙拙則罷之不肖則棄之使人有棄逐不相與處言黨友以此士見棄逐不屑與處而來害相報者棄逐者必之他國自彼來而害我報其棄逐之怨豈非世之立教首也哉言後人視此為戒孟嘗君曰善乃弗逐彪謂仲連立言士也言必有中孟嘗君出行國按行之行兼相他國故正曰行當去聲至楚獻象床象齒為床郢之登徒楚官也好色賦登徒子注以為姓非正曰屈平為左徒考烈王以左徒為令尹鮑見此故以登徒為官名未見所據然彼云大夫登徒子則非官名直使送之直猶當不欲行見孟嘗君門人公孫戍曰補曰戌音恤臣郢之登徒也直送象床象床之直千金傷此若髮漂漂飄同言其細若絲髮補曰姚云别本作標賣妻子不足償之足下能使僕無行先人有寶劒願得獻之公孫戍補曰諾入見孟嘗君曰君豈受楚象床哉孟嘗君曰然公孫戍曰臣願君勿受孟嘗君曰何哉公孫戍曰小國補曰小國疑當作大國後語作五國蓋首句作出行五國也所以皆致相印於君者聞君於齊能振達貧窮有存亡繼絶之義小國英傑之士才出萬人曰英千人曰傑皆以國事纍君纍猶諉諉之以事所以纍之說君之義慕君之廉也今君到楚而受象床所未至之國將何以待君臣戍願君勿受孟嘗君曰諾公孫戍趨而去未出至中閨特立之户上圜下方君召而返之曰子教文無受象床甚善今何舉足之髙志之揚也公孫戍曰臣有大喜三重之寶劍一重言三喜外復有此孟嘗君曰何謂也公孫戍曰門下百數莫敢入諫臣獨入諫臣一喜諫而得聽臣二喜諫而止君之過臣三喜輸象床輸亦送也郢之登徒不欲行許戍以先人之寶劒孟嘗君曰善受之乎公孫戍曰未敢曰急受之因書門版曰有能揚文之名止文之過私得寶於外者疾入諫彪謂孟嘗君於是能立德矣吾知欲止吾過而已彼得寶於我庸何傷且諫者士之所難因得寶而摧折之後孰敢以過聞乎吾哉齊人有馮暖史作歡並况袁反補曰暖即諼故諼或作喧者貧乏不能自存使人屬孟嘗君屬囑同願寄食門下孟嘗君曰客何好曰客無好也曰客何能曰客無能也孟嘗君笑而受之曰諾左右以君賤之也食以草具草不精也具饌具惡正曰草萊也陳平傳草具注去肴肉云云居有頃倚柱彈其劒補曰以下文例之疑當有鋏字歌曰長鋏歸來乎鋏劒把也欲與俱去補曰莊子音義鋏從棱向創食無魚左右以告孟嘗君曰食之比門下之客補曰列士傳孟嘗君厨有三列上客食肉中客食魚下客食菜一本比門下之魚客居有頃復彈其鋏歌曰長鋏歸來乎出無車左右皆笑之以告孟嘗君曰為之駕比門下之車客乘車之客於是乘其車揭其劒集韻揭舉也擔也過其友曰孟嘗君客我待我以客後有頃復彈其劒鋏歌曰長鋏歸來乎無以為家補曰吳氏韻補家叶工乎反左右皆惡之以為貪而不知足孟嘗君問馮公有親乎對曰有老母孟嘗君使人給其食用無使乏於是馮暖不復歌後孟嘗君出記記疏也問門下諸客誰習計㑹計㑹㑹總合也正曰㑹古外反周禮司㑹注大計也小宰要㑹注計最之簿書月計曰要嵗計曰㑹能為文收責於薛者乎貴債同集韻逋財也馮暖署曰能署書也孟嘗君怪之曰此誰也左右曰乃歌夫長鋏歸來者也孟嘗君笑曰客果有能也言果則孟嘗固意其能也吾負之未嘗見也請而見之謝曰文倦於是是謂國事正曰一本是作事蓋因音而訛說閔王章則是作則事亦此類憒於憂憒潰同憒亂也以憂思昏亂而性懧愚懧當作懦集韻弱也沈於國家之事開罪於先生得罪於暖自我啓之補曰沉沒溺也下沉於義同先生不羞乃有意欲為收責於薛乎馮暖曰願之於是約車治裝載券契而行劵亦契契别書之以刀判其旁辭曰責畢收以何市而反孟嘗君曰視吾家所寡有者驅而之薛使吏召諸民當償者悉來合券券遍合赴凡券取者與者各收一責則合驗之遍合矣乃來聽命補曰一本赴作起則起屬下文謂作起而矯命也合讀起句亦通矯命汲黯傳注矯託也託言孟嘗之命以責賜諸民因燒其券民稱萬嵗祝孟嘗也長驅到齊行不留也晨而求見孟嘗君怪其疾也衣冠而見之曰責畢收乎來何疾也曰收畢矣以何市而反孟嘗問也馮暖曰君云視吾家所寡有者臣竊計君宫中積珍寶狗馬實外廏美人充下陳陳猶列也君家所寡有者以義耳竊以為君市義孟嘗君曰市義奈何曰今君有區區之薛不拊愛子其民拊循猶摩也因而賈利之臣竊矯君命以責賜諸民因燒其券民稱萬嵗乃臣所以為君市義也孟嘗君乃補曰一本作不說曰諾先生休矣休息也後期年齊王謂孟嘗君曰寡人不敢以先王之臣為臣補曰此遣其就國而為之辭猶漢世所謂列侯亦無由教訓其民孟嘗君就國於薛未至百里民扶老攜幼迎君道中終元作正正日補曰一本無此一字孟嘗君顧謂馮暖先生所為文市義者乃今日見之馮暖曰狡兔有三窟僅元作今補曰姚本今作僅得免其死耳今有一窟未得髙枕而卧也請為君復鑿二窟孟嘗君豫車五十乘金五百斤西逰於梁謂梁元作惠惠王昭正曰文奔魏在昭王時此固辭不往事必在前史作秦王曰齊放其大臣孟嘗君此非當時所稱追書云爾於諸侯先迎之者富而兵强於是梁王虛上位以故相為上將軍補曰徙故相為上將軍而虛相位以待孟嘗也遣使者黃金千斤車百乘往聘孟嘗君馮暖先驅誡孟嘗君曰千金重幣也百乘顯使也齊其聞之矣梁使三反孟嘗君固辭不往也齊王聞之君臣恐懼遣太傅本周官此齊大臣也齎黃金千斤文車二駟文彩繪也服劒一王所自佩者封書補曰一本書下無一字則上當以封字句謝孟嘗君曰寡人不祥被於宗廟之祟沈於諂諛之臣開罪於君寡人不足為也願君顧先王之宗廟姑反國統萬人乎集韻統攝理也馮暖誡孟嘗君曰願請先王之祭器立宗廟於薛前自靖郭君時既立廟矣今又請立則所謂宗廟者非一主也廟成還報孟嘗君曰三窟已就君姑髙枕為樂矣孟嘗君為相數十年無纎介之禍者介獨也獨則不衆故為微細之詞一說喻草介也正曰介芥通馮暖之計也孟嘗傳有彪謂能者客之人孰不能客無能者孟嘗於是為不可幾也暖之市義賢矣而為之營窟則亦聲利之客耳嗟乎氣俗之移人莫覺悟也以暖之賢而不能自擢於衆况不賢者乎補曰史文稍異末無三窟之說為勝正曰馮公自言無能非真無能也孟嘗蓋已知之故聞其署則曰客果有能也魏子子粟馮公焚券孟嘗卒䝉其力百乘之家不畜聚斂之臣豈迂也哉食以食之之食音嗣為君為文足為之為去聲孟嘗君逐於齊而復反此三十年孟嘗奔薛此言復反𫝊言王召之因謝病老於薛與此駮正曰二十年談拾子齊人迎之於境謂孟嘗曰君得無有所怨於齊士大夫孟嘗君曰有君滿意殺之乎拾子借以殺之為愜乎孟嘗君曰然談拾子曰事有必至理有固然君知之乎孟嘗君曰不知談拾子曰事之必至者死也理之固然者富貴則就之貧賤則去之此事之必至理之固然者請以市諭市朝則滿夕則虛非朝愛市而夕憎之也求存故往所求者存故往趨之亡故去願君勿怨孟嘗君乃取所怨五百牒牒札也書所怨人削去之不敢以為言馮歡傳略同以此䇿及歡傳考之蓋反而後謝病也蘇子元作秦史作代是秦補曰字誤自燕之齊此三十六年正曰二十六年見於章華補曰姚及一本作華章南門史作東門注齊都賦小城北門不知是一門非也補曰括地志齊城東有閭門武鹿章華之門齊王曰嘻集韻有所多大之聲正曰嘆聲子之來也秦使魏冉致帝致帝號於齊子以為何如對曰王之問臣也卒而與猝同而患之所從往補曰一本作生是也者微患在後故言從往與從來異也今未著故言微今不聽是恨秦也違秦秦恨之聽之是恨天下也不如聽之以為元作卒也卒秦為猶善正曰卒成秦之事勿庸稱也庸用也以為天下秦稱之天下聽之王亦稱之先後之事帝名為無傷也雖稱有先后無害於帝秦稱之而天下不聽王因勿稱衍其字其於以收天下此大資也齊記三十六年有彪謂此䇿自為智則明為人謀則忠蘇張之巨擘也正曰受帝號以順秦而不稱以收天下無非詐謀耳補曰子以為之為如字蘇子元作秦秦補曰字誤史作代謂齊王曰齊秦立為兩帝王以天下為尊秦乎且尊齊乎王曰尊秦釋帝蘇子問則天下愛齊乎且愛秦乎王曰愛齊而憎秦兩帝立亦問辭約伐趙孰與伐宋之利也對曰伐宋利補此五字正曰姚云劉本有王曰不如伐宋六字對曰夫約然然其伐宋之約補曰史作夫約鈞然言齊秦俱相約如此一本無然字愚恐約鈎字訛無然字而以約與連下文讀為是與秦為帝而天下獨尊秦而輕齊齊釋帝則天下愛齊而憎秦伐趙不如伐宋之利故臣願王明釋帝以就天下倍約儐秦倍背同儐擯同集韻棄也補曰擯儐賓古通用䇿多有後放此勿使爭重而王以其間舉宋夫有宋則衛之陽城危汝南潁川皆有正曰非衛地史作陽地注濮陽之地有淮北淮水之北淮出平氏桐柏正曰淮出南陽平氏縣胎簪山禹自桐柏導之東㑹泗沂入海則楚之東國危有濟西莊十八注濟水之西則趙之河東危趙河之東非郡也有隂平陸隂屬南陽正曰隂即陶說見趙䇿則梁門不啓大梁之門故釋帝而二之以伐宋之事二不與秦合也秦約伐趙而此伐宋則國重而名尊燕楚以刑服刑猶威也言畏威而服補曰姚本刑作形天下不敢不聽此湯武之舉也敬秦以為名非實敬之而後使天下憎之此所謂以卑易尊者也願王之熟慮之也齊記與上為一章今詳上章猶欲聽秦此章決欲儐之非一日之談為二章可也蘇子元作秦秦補曰字誤說見後姚云一本無此二字說齊閔王曰臣聞用兵而喜先天下者憂為天下先約結而喜主怨者孤為約以結與國而伐人人必怨之又為之主衆所不與也故孤夫後起者藉也藉言有所資權是也而逺怨者時也得其時也人怨之則雖欲乘時不能也是以聖人從事必藉於權權者事之宜重之所在也上言後起者藉藉此而已而務興於時夫權藉者萬物之率也率帥同猶長也而時勢者百事之長也故無權藉倍時勢倍背同而能事成者寡矣今雖干將莫邪博物志干將陽龍文莫邪隂漫理此二劒吳王使干將作干將越人莫邪其妻亦善作劒非得人力則不能割劌矣劌利傷也堅箭利金不得弦機之利則不能逺殺矣矢非不銛集韻利也而劒非不利也何則權藉不在焉何以知其然也昔者趙氏襲衛車舍人主車者不休𫝊𫝊驛遞也言其警急衛國城割平言城守割地求成平成也衛八門土而二門墮矣補曰墮許規反此亡國之形也衛君跣行告遡於魏遡訴同魏王補曰魏武侯也時未稱王此辨士之詞猶下稱孝公為秦王身被甲底劒底砥同礪也挑趙索戰邯鄲之中騖騖亂馳也河山之間亂衛得是藉也亦收餘甲而北面殘剛平墮中牟之郭中牟屬河南趙獻侯自耿徙此趙記注詳正曰此據地里志贊及索隱以為非正義云中牟趙邑在相州蕩隂縣西有牟山邑在山側衛非强於趙也譬之衛矢而魏弦機也藉力魏而有河東之地趙敬侯四年築剛平以侵衛五年齊魏為衛敗趙剛平趙氏懼楚人救趙而伐魏戰於州西州屬河內出梁門軍舍林中魏記注宛有林鄉馬飲於大河趙得是藉也亦襲魏之河北屬河東燒棘蒲元作溝下同敬侯六年借兵楚取魏棘蒲不注宣二年注大棘在陳留襄邑南蒲南蒲蒲坂也謂此正曰正義云今趙州平棘縣古棘蒲邑溝補曰史趙世家作蒲隊黃城八年拔魏黃城陳留外黃是正曰正義云括地志故黃城在魏州冠氏縣南十里因黃溝為名按陳留外黃城非陌所别也大事記從上說當考故剛平之殘也中牟之墮也黃城之隊也棘蒲溝之燒也此皆非趙魏之欲也然二國勸行之者何也衛明於時權之藉也今世之為國者不然矣兵弱而好敵强國罷而好衆怨罷疲同音下同樂與衆為怨事敗而好鞠之鞠窮也言遂事兵弱而憎下人衍也字補曰姚云曽本無此字地狹而好敵大事敗而好長詐長益之行此六者而求霸則逺矣臣聞善為國者順民之意而料兵之能然後從於天下從謂後之故約不為人主怨伐不為人挫强不以兵為人挫强敵如此則兵不費權不輕地可廣欲可成也昔者齊之與韓魏伐衍秦字秦楚也正曰齊閔王十一年楚懷二十六年齊與韓魏為楚負其從親而合秦遂共伐楚閔王十六年合韓魏以伐秦秦昭王九年也戰非甚疾也分地又非多韓魏也言得地等耳然而天下獨歸咎於齊者何也以其為韓魏主怨也是楚懷二十六年此二十一年正曰此十一年且天下遍用兵矣齊燕戰而趙氏兼中山秦楚戰韓魏不休而宋越專用其兵未詳此十國者皆以相敵為意而獨舉心於齊者何也約而好主怨伐而好挫强也且夫强大之禍常以王人為意也欲為人王夫弱小之殃常以謀人為利也補曰恃謀人以為利而致殃是以大國危小國滅也大國之計莫若後起而重伐不義不義雖可伐亦不可輕正曰主於後起藉權不以伐不義為急也夫後起之藉與多而兵徑人與之多則是元作事補曰姚云劉本作是以衆强敵元作適適補曰敵適通罷寡也兵必立補曰疑有缺字也事不塞天下之心則利必附矣大國行此則名號不攘而至攘猶取霸王不為而立矣小國之情莫如謹元作僅下同僅補曰字訛疑槿下同靜而寡信諸侯信猶恃也莒蔡是矣謹僅靜則四鄰不反寡信諸侯則天下不賣外不賣內不反則稸積元作檳禍檳禍補曰改稸積亦當是積稸此書多稸字朽腐而不用幣帛矯蠧矯揉箭箝也故有變意此言變其初也正曰别本注矯一作燒去堯切火行也姚及别本此下皆有而不服矣一句文義明白今添而不服矣小國道此道猶行則不祠而福矣不貸而財足矣貸音代從人求物也故曰祖仁者王立義者霸用兵窮者亡何以知其然也昔吳王夫差以强大為天下先衍强字補曰姚云曽本無强字襲郢而棲越身從諸侯之君諸侯從之而卒身死國亡為天下戮者何也此夫差平居而謀王强大而喜先天下之禍也昔者萊莒好謀東萊故萊子國補曰春秋齊侯滅萊𫝊萊恃謀也陳蔡好詐莒恃越而滅莒蔡皆恃逺忽近而亡正曰䇿但言有恃蔡恃晉而亡此皆內長詐外信諸侯之殃也由此觀之則强弱大小之禍可見於前事矣語曰騏驥之衰也駑馬先之孟賁之倦也女子勝之夫駑馬女子筋力骨徑非賢於騏驥孟賁也何則後起之藉也今天下之相與也不並滅與猶恃也言與之相恃亦不皆亡在所處耳有能元作同而補曰字或悮衍案兵而後起寄怨而誅不直寄言假手於人不為主也微用兵而寄於義猶假也補曰寄怨而誅不直者使人誅之而已不主怨即所謂重伐不義也微用兵而寄於義者隱其用兵之真情而寄寓於義以為名也則霸天下可局足而須也局不伸也明於諸侯之故察於地形之理者不約親不相質而固質質子不趨而疾衆事而不反衆事猶共事交割而不相憎交言彼此割地俱强而加以親何則形同憂而兵趨利也補曰衆事宜多反覆交割地者宜相憎俱强者宜不相下今皆不然以其同憂趨利故也何以知其然也昔者燕齊戰於桓之曲家語所謂桓山蓋在齊魯之間燕不勝十萬之衆盡胡人襲燕樓煩數縣樓煩屬鴈門取其牛馬此蓋之噲敗時夫胡之與齊非素親也而用兵又非約質而謀燕也然而甚於相趨者何也衍何字何則形同憂而兵趨利也由此觀之約於同形則利長後起則諸侯可趨役也可使趨我而為我役故明主察相相之明察者誠欲以霸王衍也字也為志則戰攻非所先戰者國之殘也有害於國而都縣之費也隱元年注邑有宗廟之主曰都周制二千五百家為縣正曰周禮四甸為縣四縣為都又五鄙為縣又禮小曰邑大曰都殘費已先而能從諸侯者寡矣彼戰者之為殘也士聞戰則輸私財而富軍市士衆所聚有市井焉輸飲食而待死士令折轅而炊之轅輈也殺牛而觴士觶實曰觴蓋以飲之則是路窘之道也路疑作露言國中所有悉出於路又疑作路窘言財用窘於道路正曰正是道路之路中人禱祝國中之人為行者祈君翳釀翳華蓋也故有隱義言釀於中以待飲至通都小縣置社戮不用命者正曰亦言禱祀之事有市之邑莫不正事而奉王事謂財賦警備之事則此虛中之計也夫戰之明日尸死扶傷尸未殮也雖若有功也軍出費中哭泣則傷主心矣死者破家而葬夷傷者空財而共藥夷亦傷共供同完者內酺而華樂酺大飲也華猶奢也故其費與死傷者鈞與均同故民之所費也十年之田而不償也軍之所出矛㦸折矛首矛也兵車所建補曰詩二矛注酋矛長二丈夷矛長二丈四尺㦸注見前鐶鉉絶鐶刀鐶補曰鉉姚本作弦傷弩破車罷馬亡矢之大半甲兵之具宫之所私出也宫如父子異宫之宫古者寓兵於農故私家出之士大夫之所匿厮養士之所竊厮折薪養馬者十年之田而不償也天下有此再費者而能從諸侯者寡矣攻城之費百姓理襜蔽襜衣蔽前者襜蔽疊言也言士作苦衣易蔽故亟治之舉衝櫓衝陷陳車正作䡴補曰城上露屋為櫓戰陳髙巢車亦為櫓此與衝並言亦車也家雜總全家併作身窟穴中謂地道罷於刀金兵器也而士困於土功將不釋甲期數而能拔城者數數月為亟耳上倦於教士斷於兵斷音短截也故三下城而能勝敵者寡矣故曰彼戰攻者非所先也何以知其然也昔智伯瑤攻范中行氏殺其君滅其國又西圍晉陽吞併二國而憂一主趙襄子此用兵之盛也然而智伯卒身死國亡為天下笑者何謂也兵先戰攻而滅二子之補患也患在滅二子昔者中山悉起而迎燕趙南戰於長子敗趙氏北戰於中山克燕軍殺其將夫中山千乘之國也而攻萬乘之國二再戰比勝比相次此用兵之上節也節猶等然而國遂亡君臣於齊者此二十九年書佐趙滅中山補曰說見前及燕䇿何也不嗇於戰攻之患也嗇吝也由此觀之則戰攻之敗可見於前事矣補補曰事下或有缺字今世之所謂善用兵者終戰比勝終謂窮兵而守不可拔守城期於不拔天下稱為善一國得而保之得所稱為善者保持之則非國之利也臣聞戰大勝者其士多死而兵益弱守而不可拔者其百姓罷而城郭露外無居人故暴露夫士死於外民殘於內而城郭露於境則非王之樂也今夫鵠的的即鵠也所謂侯中補曰栖皮曰鵠非咎罪於人也補曰姚云咎一作樞劉作喜按吕春秋亦有柩罪於先王之語便弓引弩而射之便謂巧審弓得便巧乃發中者則善人善之補曰一云劉作喜不中則愧少長貴賤則同心於貫之者何也惡其示人以難也的以難中人爭欲貫之如惡之然人如的者人所惡也今窮戰比勝而守必不拔則是非徒示人以難也又且害人者也然則天下仇之必矣夫罷士露國而多與天下為仇則明君不居也素用强兵而弱之素猶常也言兵常用雖强必弱則察相不事不從事於此補曰事下當有也字彼明君察相者則五兵不動五兵注刀劒矛㦸矢正曰此據淮南子注今按諸說不一周禮司右月令注弓矢殳矛戈㦸司兵車注戈殳㦸夷矛酋矛榖梁注矛㦸鉞楯弓矢而諸侯從辭讓而重賂至矣故明君之攻戰也甲兵不出於軍而敵國勝衝櫓不施而邉城降士民不知而王業至矣彼明君之從事也用財少曠日逺而利長者曠濶也日雖濶逺其利不窮故曰兵後起則諸侯可趨役也臣之所聞攻戰之道非師者師旅也言不用師雖有百萬之軍比之堂上言謀之於堂彼自敗也補曰此當作北諸本皆作比不知何故此注亦作敗釋矣章本字同雖有闔閭吳起之將闔閭將孫武也此以君臣互言之正曰將若闔閭之善用兵禽之户內千丈之幟拔之尊俎之間俎肉在豆上百尺之衝折之袵席之上鄭𤣥記注袵卧席也故鐘鼓竽瑟之音不絶於前地可廣而欲可成和樂倡優侏儒之笑倡優倡樂也侏儒短小人不乏諸侯可同日而致也故名配天地不為尊利制海內不為厚言其功德之崇雖名利若此猶不足稱也故夫善為王業者在勞天下而自逸亂天下而自安諸侯無成謀圗我之謀不成則其國無宿憂也言無一夕之憂正曰宿留也猶宿諾何以知其然也補補曰上文例宜有也字佚治在我勞亂在天下則王之道也鋭兵來則拒之患至則趨之趨言往應之也使諸侯無成謀則其國無宿憂矣何以知其然也元作矣矣補曰上文例當作也昔者魏王惠擁土千里帶甲三十六萬恃補其强而拔邯鄲十八年西圍定陽屬上黨又從十二諸侯朝天子以西謀秦秦王恐之此孝公也此史秦人故尊稱之正曰說見前寢不安席食不甘味令於境內盡堞中堞城上女牆為戰具競元作竟竟補曰即上文境字也堞中為戰具境內為守備為守備為死士置將以待魏氏衛鞅謀於秦王曰夫魏氏其功大而令行於天下有十二諸侯而朝天子其與必衆故以一秦而敵大魏恐不如王何不使臣見魏王則臣請必北魏矣秦王許諾衛鞅見魏王曰大王之功大矣令行於天下矣今大王之所從十二諸侯非宋衛也則鄒魯陳蔡此固大王之所以鞭箠使也箠馬䇿不足以王天下大王不若北取燕東伐齊則趙必從矣西取秦南伐楚則韓必從矣大王有伐齊楚心而從天下之志使天下從則王業成矣大王不如先行王服王者服飾然後圖齊楚魏王說於商鞅之言也故身廣公宫制丹衣柱以丹帛為柱衣正曰丹柱猶衣之也建九斿旗旒從七星之旟鳥隼為旟又繪星馬正曰按考工記并注龍旗九斿諸侯所建鳥旟七斿鳥隼為旟州里所建弧旌柱矢畫柱矢此與曲禮合龍旗即青龍鳥隼即朱雀柱矢恐即招搖注所謂畫七星者又禮百官載旟此言七星之旟而又以天子言戰國不可以古制凖也此天子之位也而魏王處之於是齊楚怒諸侯奔齊齊人伐魏殺其太子覆其十萬之軍魏王大恐跣行跣足親地也按兵於國而東次於齊過信為次往服齊也然後天下乃舍之當是時秦王垂拱而受西河之外垂衣拱手言無所事西喪地於秦謂此歟而不以德魏王故衍故字補曰姚云一本無衛鞅之始與秦王計也謀約不下席言於尊俎之間謀成於堂上而魏將已擒於齊矣衝櫓未施而西河之外已補入於秦矣此臣之所謂比補曰見上之堂上擒將户內拔幟於尊俎之間折衝席上者也彪謂此䇿輾轉皆中事機而不詭於聖雖鍾竽倡樂非所以啓人主者亦孟子色貨之比閔王驕不能聽以及鼓里之禍百世之戒也正曰此䇿談兵主於後起藉權不為人主怨其云案兵而後起寄怨而誅不直微用兵而寄於義最其術之深者是豈仁義之師正大之論乎雖其後極言戰之害何救於失哉鐘鼓倡樂之云視孟子與民同樂之意不類鮑之不察甚矣補曰蘇秦佯為得罪燕而亡走齊說湣王厚葬以明孝髙宫室大苑囿以明得意欲敝齊而為燕蘇代繼之實祖秦之故智大事記云齊之伐宋也蘇代實啓之秦之救宋也蘇代復止之代為燕反間驕其君勞其民而速其亡也其說燕曰齊王長主也而自用也南攻楚五年蓄積散西困秦三年民憔悴士罷弊又以餘兵舉五千乘之徑宋而包十二諸侯此其君之欲得也其民力竭也云云此䇿之謀既中而勸燕伐齊也此䇿舊為蘇秦實誤前章代誤為秦或遂以此為代則亦不然代之謀如彼豈能勸齊王後戰哉一本每章首二字者是矣抑是言也當在滅中山後取淮北滅宋侵三晉之前此士之明蓋已逆知閔王之敗矣䇿文甚佳首以用兵後起約結遠怨二端為言而以權藉時勢明之今雖干將以下止求霸則逺矣言先天下之禍後藉之得也臣聞善為國以下止好挫强也言逺怨之得主怨之禍也且夫以下至强弱大小之禍可見於前事矣為一節語曰以下至戰攻之敗可見前事為一節今世所謂善用兵以下至篇終為一節三節皆推言用兵不為天下先之意而不主怨之意在其中錯綜起應變化不窮只何以知其然也一語六用而不覺其復劌姑衛反分扶問反鵠工毒反射食亦反為人為韓為死之為王天下之王去聲齊負郭之民負猶背有孤狐咺者補曰孤狐咺孤因狐字誤衍大事記去之吕春秋貴直論狐援云云即謂此正義也古今人表作狐爰正議閔王斫之檀衢斫斬也檀衢蓋齊市名百姓不附齊孫室子陳舉公孫家子猶宗室云直言殺之東閭宗室離心司馬穰苴田完之裔為景公將去此時逺甚蓋誤其名正曰大事記引蘇氏謂史稱齊景公時晉伐阿鄄燕侵河上晏子薦穰苴斬監軍莊賈因以成功春秋左氏無此事意穰苴嘗為閔王却燕晉而戰國雜記妄以為景公時為政者也殺之大臣不親以故燕舉兵使昌國君樂毅魏樂羊之後將而擊之齊使向子及下達子史不書補曰吕春秋作觸子將而應之後起為應齊軍破向子輿一乘亡達子收餘卒復振與燕戰求所以賞元作償償補曰吕春秋作賞者閔王不肯與軍破走王奔莒此四十年正曰三十年淖齒數之曰夫千乘青州郡博昌之間屬千乘方數百里雨血霑衣王知之乎王曰不知嬴博之間二縣屬太山補曰禮檀弓注今泰山縣地坼至泉王知之乎王曰不知人有當闕而哭者闕門觀求之則不得去之則聞其聲王知之乎王曰不知補曰三不知字春秋後語皆作知之通鑑從之淖齒曰天雨血霑衣者天以告也地坼至泉者地以告也人有當闕而哭者人以告也天地人皆以告矣而王不知戒焉何得無誅乎於是殺閔王於鼓里莒中里也太子名法章是為襄王乃解衣免服逃太史之家為溉園溉灌注君王后太史后氏女后姓也以其姓后不可曰后后故曰君王后也正曰姚本作太史氏女無后字後䇿正云太史氏知其貴人善事之田單以即墨之城破亡餘卒破燕兵紿騎劫紿欺也劫燕將代樂毅者毅傳言單設詐誑燕軍遂以復齊襄五年遽迎太子於莒立之以為王時立五年迎而立之齊耳襄王即位立補補曰位下有缺字君王后以為后生齊王建補曰雨音預為溉之為去聲王孫賈年十五事閔王王出走失王之處其母曰女朝出而晚來則吾倚門而望女暮出而不還則吾倚閭而望女今事王王出走女不知其處女尚何歸責其親王不如我之親女王孫賈乃入市中曰淖齒亂齊國殺衍閔字閔正曰追書之辭王欲與我誅者袒右右肩市人從者四百人與之誅淖齒刺而殺之補曰袒蕩旱反今循習作徒案反說文楊也露臂襄王閔王子元年二年戊寅慎靚王三十燕攻齊取七十餘城唯莒即墨未下齊田單以即墨破燕殺騎劫初燕將史亦不名攻聊城屬東郡髙紀注在平原正曰括地志云故聊城在博州聊城縣西人或讒之補曰姚氏曰三同集無初燕止讒之十一字則知此章首有誤脫燕將懼誅遂保守聊城不敢歸田單攻之嵗餘士卒多死而聊城不下魯連乃為補書約之矢纒束書於矢上以射城中遺燕將曰吾聞之智者不倍時而棄利倍背同勇士不怯補曰史記作却死而滅名忠臣不先身而後君今公行一朝之忿不顧燕王之無臣惠王非忠也殺身亡聊城而威不信於齊非勇也功廢名滅後世無稱非智也故智者不再計勇士不怯死補曰一本云朝本無此二句而云此三者世主不臣說士不載今死生榮辱尊卑貴賤此其一時也此釋上不再計故史云時不再至願公之詳計而無與俗同也且楚攻南陽史云齊之南陽然則此荆州郡時屬齊補曰索隱云南陽即齊淮北泗上之地也魏攻平陸補曰平陸見前齊無南面之心楚魏在齊之南齊有燕難不急此二縣故不南面與爭補曰正義云齊無南面攻楚魏之心以為南陽平陸之害小不如聊城之利大以為亡南陽之害不若得濟北之利故定計而堅守之今秦人下兵此時齊善秦故下兵救之魏不敢東面不攻齊也橫秦之勢合齊善秦為橫則楚國之形危且棄南陽斷右壤謂平陸斷亦棄也存濟北計必為之今楚魏交退言其皆退燕救不至不救聊城齊無天下之規規猶謀也秦救之而楚魏退無謀齊者與聊城共據期年之敝據相持也即臣見公之不能得也不能勝齊齊必決之於聊城公無再計彼燕國大亂君臣過計過猶失上下迷惑栗腹燕將以十萬之衆五折於外萬乘之國被圍於趙壤削主困為天下戮按燕王喜四年趙孝成十五年亷頗圍破燕殺栗腹在齊襄燕惠聊城事二十八年以為此時則自騎劫敗死外不書他將及趙國也正曰說見章末詳之公聞之乎今燕王方寒心獨立大臣不足恃國敝禍多民心無所歸今公又以聊城之民補曰一本以敝聊距全齊之兵距拒同捍也期年不解是墨翟之守也墨子曰公輸般為雲梯將以攻宋墨子聞之見般以帶為城以牒為械般九設機變墨九距之般之械盡墨之守固有餘食人炊骨士無反北之心是孫臏吳起之兵也能已見於天下矣故為公計不如罷兵休士全車甲歸報燕王燕王必喜士民見公如見父母交游攘臂而議於世攘言推臂前也正曰漢書鄒陽𫝊攘袂顔云猶今人言將臂按攘臂字見孟子即此義功業可明矣上輔孤主以制羣臣下養百姓以資說士辨說之士資以藉口正曰資給說士矯國革俗於天下矯革言變其國俗功名可立也意者亦捐燕棄世捐亦棄東游於齊乎請裂地定封富比陶衛陶穰侯邑衛自梁襄王後稱君正曰索隱引延篤云陶陶朱衛衛公子荆非也王劭云魏冉封陶商君姓衛謂此云爾姚氏亦引世世稱寡補曰一本稱孤寡與齊久存此亦一計也二者顯名厚實也願公熟計而審處一也補曰下無歷數之辭疑一字訛或衍且吾聞效小節者不能行大威惡小恥者不能立榮名昔管仲射桓公中鈎篡也遺公子糾遺忘也而不能死怯也東縛桎梏桎足械梏手械辱身也此三行者鄉里不通也世主不臣也使管仲終窮抑抑按也人所按故為困幽囚而不出慙恥而不見窮年沒夀不免為辱人賤行矣然管子并三行之過補曰一本云并朝作棄據齊國之政一匡天下九合諸侯為五霸首名髙天下光照鄰國曹沫為魯君將三戰三北而喪地千里使曹子之足不離陳計不顧後出必死而不生出計所出也則不免為敗軍禽將曹子以敗軍擒將非勇也功廢名滅後世無稱非智也故去三北之恥退而與魯君計也曹子以為遭正曰遭字句謂曹沫忍恥而與魯君計以為遭遇也史無此句則尤明齊桓公有天下朝諸侯此霸者之事欲興霸則可責以義故沫與魯君計言此正曰說見上補曰有天下有字恐誤史作朝天下㑹諸侯朝天下謂率天下朝王也曹子以一劒之任劫桓公於壇位之上顔色不變而辭氣不悖三戰之所喪一朝而反之天下震動驚駭威信吳楚𫝊名後世若此二公者非不能行小節死小恥也以為殺身絶世功名不立非智也故去忿恚之心恚恨也而成終身之名除感忿之恥而立纍世之功故業與三王爭流名與天壤相敝也言天壤敝此名乃敝公其圖之燕將曰敬聞命矣因罷兵倒䪅元作到讀到讀正曰未詳或誤字衍文而去垂弓衣倒示無弓故解齊國之圍救百姓之死仲連之說也仲連𫝊有彪按此書以齊閔為宣王蘇代為蘇秦事時不合如此者甚衆殆為後人傳録之誤至於此章引栗腹之事說聊城之將則非後人謬矣蓋好事者聞約矢之說惜其書不存擬為之以補亡而其人意氣橫溢肆筆而成不暇檢校細處太史公亦愛其千里而略其牝牡驪黃至於今二千嵗莫有知其非者也又按燕昭二十八年書齊之不下者惟聊莒即墨聊即聊城也徐廣注此栗腹事去長平十年而不論其在聊城事後蘇氏古史亦因之疏矣故備論之正曰魯仲連說燕將下聊城史不著年其書引栗腹之敗此事在其後故通鑑大事記載於秦孝文元年當燕王喜五年齊王建十五年自赧王三十一年燕率五國伐齊閔王死襄王立三十六年燕昭王卒明年惠王立越武成王孝王而至王喜凡三十四年此蓋二事誤亂為一自燕攻齊止殺騎劫二十五字或他䇿脫簡而初燕將止讒之十一字亦他本所無也且單由即墨起七十餘城即復為齊不聞聊城尚為燕守以齊之事勢豈有舍之三十餘年而不攻單之兵力三十餘年而不能下歟今曰攻之嵗餘不下可見為此時燕將守聊城事也史稱毅破齊不下者獨莒即墨單縱反間亦言二城而燕世家書聊莒即墨䇿亦有三城不下之言果一時事則聊城亦為齊守而非燕將為燕守者此誤因聊城不下而引與莒即墨亂也考之單傳自復齊之後無可書之事齊襄王十九年當趙孝成王元年趙割地求單為將次年遂相趙必不復返齊矣距聊城之役凡十六年單豈得復為齊將哉此因嵗餘不下之言聊莒即墨之混而誤指以為單也夫仲連之言正謂栗腹敗燕國亂聊城孤守齊方併攻勢將必拔其言初不涉湣襄昭惠之際所謂楚攻南陽魏攻平陸閔王時楚取淮北單復齊後蓋已復之不聞楚魏交攻之事二事必在後也燕將被讒懼誅連書亦無此意此因樂毅而訛也史又稱燕將得書自殺單遂屠聊城尤非事實齊前所殺燕將惟騎劫爾不聞其他此因騎劫而訛也連之大意在於罷兵息民而其料事之明勸以歸燕降齊亦度其計之必可者排難解紛又素所蓄積也迫之於窮而致之於死豈其心哉夫其勸之正將以全聊城之民而忍坐視屠之哉燕將死聊城屠連何功美之稱而齊欲爵之哉䇿所云解兵而去者當得其實而史不可信也故論此事者一考之仲連之書則史䇿之舛誤殽混者皆可得而明矣鮑不此之察見其不通遂謂好事者聞約矢之說惜其書不存擬之以補亡二千餘年莫有覺者何其謬哉史誤因䇿通鑑大事記稱田單誤因史真文忠公反据鮑氏為斷而謂魯連之說不可為訓皆失考也燕攻齊齊破閔王奔莒淖齒殺閔王田單守即墨之城破燕兵復齊墟襄王為太子徵徵猶信也太子初易姓名為庸人疑之至是始有狀可信也齊已破燕田單之立疑人疑單也齊國之衆皆以田單為自立也襄王立田單相之過菑水菑淄同有老人涉菑而寒出不能行坐於沙中田單見其寒欲使後車分衣無可以分者單解裘而衣之襄王惡之曰田單之施將欲以取我國乎不早圖之恐後之恐單先發左右顧無人巖下有貫珠者齊人補曰姚云别本巖字作聲句絶無下字元和姓纂引䇿作貫珠人姓名襄王呼而問之曰女聞吾言乎對曰聞之王曰女以為何若對曰王不如因以為已善王嘉單之善下令曰寡人憂民之饑也單收而食之寡人憂民之寒也單解裘而衣之寡人憂勞百姓而單亦憂之稱寡人之意稱猶副單有是善而王嘉之雖單之善亦王之善已王曰善乃賜單牛酒嘉其行後數日貫珠者復見王曰王至朝日宜召田單而揖之於庭口勞之乃布令察百姓之饑寒者收榖之榖猶養乃使人聽於閭里聞丈夫之相衍舉字舉補曰此因與字誤衍在此此本在曰字上與語曰田單之愛人嗟乃王之教澤也彪謂單之取疑所謂威震主者歟襄王亦不明甚矣使單有異志闔城陽而王孰敢不聽豈俟今日哉貫珠者可謂君子人矣為是言也上足以掩王之非下足以救單之死一言而齊國定君子哉補曰斯人者又能免其身不然王懼其以前言告單必殺之矣貂勃齊人常惡田單曰安平君小人也補曰徐廣云北海東安平正義云在青州臨淄縣東古紀國之邑索隱云單初起安平故以為號安平君聞之故為酒而召貂勃曰單何以得罪於先生故常見譽於朝不欲正言其毁貂勃曰跖之狗吠堯跖栁下季之弟盜跖正曰此莊生寓言惠跖時不相及蒯通之言出於此非貴跖而賤堯也狗固吠非其主也且今使公孫子賢而徐子不肖然而使公孫子與徐子鬭徐子之狗猶元作由由補曰由猶通一本作猶將攫公孫子之腓而噬之也攫持腓脛腨噬啖也正曰噬齧也若乃得去不肖者而為賢者狗豈特攫其腓而噬之耳哉安平君曰敬聞命明日任之於王白王使任用之王有所幸臣九人之屬欲傷安平君相與語於王曰燕之伐齊之時楚王頃襄使將軍淖齒也將萬人而佐齊今國已定而社稷已安矣何不使使者謝於楚王王曰左右孰可九人之屬曰貂勃可欲去單之助貂勃使楚楚王受而觴之數日不返九人之屬相與語於王曰夫一人身而牽留萬乘者豈不以據勢也哉言勃據單勢正曰言單據勢且安平君之與王也君臣無禮補曰通鑑君臣無異而上下無别且其志欲為不善謂反畔內收百姓循撫其心振窮補不足振舉救也布德於民外懷戎翟天下之賢士懷翟與士隂結諸侯之雄俊豪英諸侯之人其志欲有為也為不善願王之察之異日而王曰召相單來田單免冠徒跣肉袒而進肉袒露肢體示欲受刑正曰袒即裼也去上衣曰裼退而請死罪五日而王曰子無罪於寡人子為子之臣禮吾為吾之王禮而已矣貂勃從楚來王賜諸前補曰本王觴賜諸前愚恐賜乃觴之訛酒酣酣酒樂王曰召相田單而來貂勃避席稽首曰王惡得此亡國之言乎王上者孰與周文王王曰吾不若也貂勃曰然臣固知王不若也下者孰與齊桓公王曰吾不若也補曰此下姚本有貂勃曰然臣固知王不若也十一字今增貂勃曰然臣固知王不若也然則周文王得吕望以為太公桓公得管夷吾以為仲父今王得安平君而獨曰單且有天地之闢開也民人之治補曰姚云曾本作始為人臣之功者誰有厚於安平君者哉而王曰單單惡得此亡國之言乎且王不能守乎王之社稷燕人興師而襲齊墟王走而之城陽之山中城陽兖州國莒其縣也安平君以惴惴之即墨惴惴憂懼也三里之城五里之郭敝卒七千禽其司馬主兵之官謂騎劫而反千里之齊安平君之功也當是時也闔城陽而王不通王而自王補曰春秋後語闔作合城陽天下城陽與天下之人正曰城陽二字因上文衍莫之能止然而計之於道歸之於義以為不可故為棧道木閣木閣棧道皆以通險而迎王與后於城陽山中元作中山中山補曰當作山中王乃得反子臨百姓今國已定民已安矣王乃曰單單補正曰與前連舉不同且嬰兒之計不為此王不亟殺此九子者以謝安平君不然國危矣王乃殺九子而遂其家益封安平君以夜邑萬户夜一作劇屬淄州又東來有掖有不夜疑夜字為掖不全或不夜省不補曰括地志劇城在青州夀光縣南三十里顔師古云齊地記古有日夜出見於東萊故萊子立此邑以不夜為名使者使楚之使去聲田單將為大將攻狄狄北胡正曰史田儋狄人徐廣注今樂安臨淄縣正義云淄州髙苑縣西北狄故城往見魯仲子連也仲子曰將軍攻狄不能下也田單曰臣以五里之城七里之郭破亡餘卒破萬乘之燕復齊墟攻狄而不下何也上車弗謝而去遂攻狄三月而不克之也齊嬰兒謠曰大冠若箕箕簸器修劒柱頥攻狄不能下壘枯邱壘軍壁也言大不能降一壘小不能枯一邱言無人物補曰吳氏韻補能叶年題反邱叶一其反廬陵劉氏讀壘枯邱謂空守一邱為壘說苑攻狄不能下壘於梧邱齊景公田於梧地名也一本引北堂書鈔同說苑無能字一本壘枯骨成邱通鑑從之各有不同似梧邱義長田單乃懼問魯仲子曰先生謂單不能下狄請問其說魯仲子曰將軍之在即墨坐而織蕢蕢草器立則杖插插鍤同刺土器為士卒倡曰倡導也可往矣宗廟亡矣亡日尚矣尚猶久也言見亡之兆其日已久歸於何黨矣黨猶鄉也言無所歸補曰姚氏云别本無可往矣宗廟亡矣今日尚矣歸何黨矣皆叶平聲讀說苑宗廟亡矣魂魄喪矣歸何黨矣當此之時將軍有死之心而士卒無生之氣聞若言若如此也莫不揮泣奮臂而欲戰此所以破燕也當今將軍東有夜邑之奉西有菑上之虞黃金橫帶而馳乎淄澠之間昭十二年注澠水出臨淄入時水有生之樂無死之心所以不勝者也田單曰單有心先生志之矣明日乃厲氣循城厲激昻也立於矢石之所乃援枹鼓之枹擊鼓杖狄人乃下補曰馬謖對諸葛亮曰用兵之道攻心為上攻城為下其言出於此夜說苑作掖澠音黽枹音孚按史趙孝成王元年田單將攻燕拔中陽又攻韓注又拔之次年單為相孝成之元年齊襄之十九年也趙王新立秦攻趙求救於齊齊人使以長安君為質齊師乃出秦師退又䇿云趙王割濟東三城城邑市五十七與齊求安平君為將攻燕亦是年事蓋齊趙方睦也考之史單自復齊之後惟有伐狄之戰大事記併書於一年而襄王十年趙燕周取齊昌國髙唐十三年藺相如伐齊至平邑秦客卿竈暨楚仍嵗攻剛夀以單之在齊而喪地被兵不聞其却戰而克敵也而一為趙用遂以立功意者單以功髙被讒齊襄雖為之殺譛者所以任單者不能展盡歟不然則單之懼禍特怯而自悔也秦䇿云田單將齊之良橫行於中十四年終身馳於封內考之殺騎劫之嵗至襄王十八年凡十四年次年而單為趙將是年襄王死單不復返齊明年遂為相然單之在趙自二戰之後不聞他功蓋既試其端而亦終不忍背宗國以為趙用也單之心亦可見矣孟嘗君為從文以襄王初中立為諸侯楚頃襄二十三年天下合從此八年正曰文以襄王五年中立為諸侯其後遂卒襄王八年諸侯無合從事此閔王十六年文怨秦約韓魏伐秦事也當秦昭九年鮑見䇿有薛地百里之文遂以為文中立為諸侯時誤矣公孫𢎞齊人謂孟嘗君曰君不如元作以以補曰姚云劉本君何不使人先觀秦王昭意者設疑之辭秦王帝王之主也君恐不得為臣為秦臣奚暇從以難之意者秦王不肖之主也君從以難之未晚孟嘗君曰善願因請公往矣公孫𢎞敬諾以車十乘之秦昭王聞之而欲愧之以辭使𢎞愧公孫𢎞見昭王曰薛公之地大小幾何公孫𢎞對曰百里昭王笑而曰寡人地數千里猶元作由下同由補曰由猶通姚本猶下同未敢以有難也為人之難今孟嘗君之地方百里而因欲以難寡人猶由可乎公孫𢎞對曰孟嘗君好人人賢人大王不好人昭王曰孟嘗君之好人也奚如公孫𢎞曰義不臣乎天子不友乎諸侯得志不慙為人主不得志不肯為人臣如此者三人而治補曰而字疑衍治當屬下句或而字上有缺文可為管商之師管仲商鞅說義聽行所說有義或能聽而行之能致其主霸王如此者五人萬乘之嚴主也辱其使者退而自刎集韻刎斷也必以其血汙其衣如臣者十人昭王笑而謝之曰客胡為若此寡人直與客論耳寡人善孟嘗君欲客之必諭寡人之志也以己之志曉告孟嘗公孫𢎞曰敬諾公孫𢎞可謂不倰矣著書者美其不可侵辱昭王大國也孟嘗千乘也立千乘之義而不可陵可謂足使矣足猶能彪謂公孫所陳亦士之一槩爾自曹沫劫桓公辨說士莫不以藉口彼蓋未學禮也夾谷之㑹孔子詔之士付之有司耳矣豈崖柴若世之猘狗然哉帝曰曉人不當如是乎此說客之所當知也魯仲連謂孟嘗君曰君好士未補也補曰一本謂孟嘗好士也一本謂孟嘗君君曰好士也雍門子補子字此士以所居為稱正曰雍門下有缺文說苑有雍門子狄雍門子周今曰雍門子則亦無考雍門見前養椒亦養猶公養之養椒姓亦名雍門子之所養正曰未知果椒姓亦名不陽得子養此下脫所養人飲食衣裘與之同皆得其死並未詳今君之家富於二公雍門陽得而士未有為君盡遊者也遊猶友也言不盡於交遊之道君曰文不得是二人故也椒亦等使文得二人文豈獨不得盡對曰君之廏馬百乘無不被繡衣而食菽粟者豈有麒麟騄耳哉後宫十妃皆縞紵縞鮮色繒也紵麻屬細者正曰書注縞白也食粱肉粱米名本草注青粱粟類正曰粱米之善者有黃青白三種豈有毛牆西施哉色與馬取於今之世士何必待古哉補曰君之廏馬至此與王斗云云合正曰連上章有孟嘗君序次亦不當在此故曰君之好士未也補曰孟嘗君之門髙者如馮歡魏子能免難市譽而已昔人譏其未嘗得士特雞鳴狗盜之雄世以為名言今觀魯連曰君之好士未也則當時已有是論矣仲連之言亦引以自謂而非區區於孟嘗君雞鳴狗盜之出其門宜仲連之不止也王建襄王子元年年丁酉赧王五十一秦攻趙長平此五年齊楚救之秦計曰齊楚救趙親其交親則將退兵不親則且遂攻之趙無以食請粟於齊而齊不聽蘇子元作秦秦補曰字齊史作周最謂齊王曰不如聽之以却秦兵不聽則秦兵不却是秦之計中而齊楚元作燕燕補曰史作楚通鑑從之之計過矣且趙之於齊楚元作燕齊燕齊補曰史作齊楚隱蔽也趙居二國西北秦攻二國必先徑趙趙存則二國得以自隱而有蔽障猶齒之有唇也唇亡則齒寒今日亡趙則明日及齊楚矣且夫救趙之務務趣也事也宜若奉漏甕沃焦釡喻救之急夫救趙髙義也却秦兵顯名也義救亡趙威却强秦兵不務為此而務愛粟則為國計者過矣齊記有云周子謂最是也此最時三十餘年矣正曰索隱云周子蓋齊之謀臣史失其名不必强為之說或謂齊王曰周韓西有强秦東北有趙魏秦伐周韓之西趙魏不伐不從秦伐周韓周韓為割割地與趙魏正曰割地與秦韓却周害也言趙魏徒不伐而不救韓則韓兵必却周有秦害及韓却周害元作割割補曰害割字恐有誤混之後補趙魏亦不免與秦為患矣秦以其不應已又無周韓之捍秦伐必及今齊應補補曰今齊下恐有缺字秦伐趙魏則亦不果於趙魏之應秦而伐周韓趙魏近秦其應秦不得不果齊則逺矣應秦必不果也今齊入於秦而伐趙魏今就令也入言應之果補曰令恐亦今字趙魏亡之後秦東面而伐齊齊安得救補補曰一本有救字是下無於字非於天下乎此言趙魏近秦畏之不得不應齊不可以其應而伐之也正曰此士之䇿正謂秦伐周韓趙魏雖不應秦然周韓既割而趙魏亦不免况齊可以不應秦今應秦伐趙魏趙魏既亡而齊亦不免矣所以言此者欲齊之援趙魏也國子齊大夫曰秦破馬服君之師圍邯鄲齊魏亦佐秦伐邯鄲齊取淄鼠魏取伊氏皆趙地缺公子無忌魏信陵君為天下循便計循行順也正曰行便宜之計言竊符奪兵事補曰齊魏佐秦伐因取二地今云公子無忌云云魏實救趙者不應先佐之伐恐當時無忌雖急於平原之請而魏王實畏秦如止晉鄙壁鄴未欲真欲救趙或先取其地也殺晉鄙魏將率魏兵以救邯鄲之圍魏安釐二十年使鄙將以救趙畏秦不敢進趙急平原君使責無忌無忌盜晉鄙兵符殺之將進兵秦軍解去補曰按史年表魏世家公子無忌傳公子矯殺晉鄙破秦兵皆在安釐王二十年通鑑以矯殺晉鄙在前一年大事記以晉鄙留軍壁鄴在前一年謂以𫝊修今按傳亦止作一年事也當考使秦弗有而失天下是齊入於魏而救邯鄲之功也齊與魏親初雖佐秦今魏救趙亦同救也安邑者魏之柱國也言其於國如室有柱晉陽者趙之柱國也鄢郢者楚之柱國也故三國衍欲字欲補曰疑欲字即故字而上衍故字故者舊也與秦壤界境土界境也言其地相接秦伐魏取安邑伐趙取晉陽伐楚取鄢郢矣覆元作福福補曰姚云劉逼曾一作覆愚按福乃逼之訛逼義長三國之軍元作君君兼二周之地舉韓氏取其地且天下之半且猶幾今又劫趙魏疏中國疏言離其友封衛之東野封割也東野猶東地正曰封疆之地兼魏之河內絶趙之東陽則趙魏亦危矣趙魏危則非齊之利也韓魏趙楚之志恐秦兼天下而臣其君故專兵一志以逆秦逆謂拒之三國之與秦壤界而患急齊不與秦壤界而患緩是以天下之勢不得不事齊也故秦得齊則權重於中國趙魏楚得齊則足以敵秦故秦楚補補曰疊舉上文宜有楚趙魏得齊者重失齊者輕齊有此勢不能以重於天下者何也其用者過也補曰三䇿大槩略同謂三晉諸國為齊之屏蔽相依為唇齒秦攻諸國而齊不救諸國滅亡勢必及齊第三章謂三國與秦界而患急齊不與秦壤而患緩秦得齊則權重趙魏楚得齊則足以敵秦說尤明切初䇿攻長平時次䇿周韓未亡時三䇿則韓既亡後也始皇十八年滅韓自秦人行逺交近攻之術善齊而不加兵君王后謹事秦王建不修戰備不助五國其墮秦計中久矣長平之戰當王建五年滅韓當三十五年三十餘年間士之為齊謀者其智非不及此而卒不用宜其及於亡也齊王使使者問趙威后惠文后孝威太后書未發補曰未發其封威后問使者曰嵗亦無恙邪恙憂也民亦無恙邪王亦無恙邪使者不說曰臣奉使使威后今不問王而先問嵗與民豈先賤而後尊貴者乎威后曰不然茍無嵗何有民茍無民何有君故有問舍本而問末者耶乃進而問之曰齊有處士曰鍾離子鍾離屬九江正曰路史云沂之承音懲有鍾離城乃晉吳㑹處成十五年杜云淮南縣今屬濠州者非應劭云鍾離子國在九江蓋其後徙於此吳滅之無恙耶是其為人也有糧者亦食無糧者亦食有衣者亦衣無衣者亦衣是助王養其民者補也何以至今不業也言不得在位成其職業葉陽子諸書葉陽皆不地范睢傳注葉一作業補曰正義云葉陽今許州葉縣又見魏䇿無恙乎是其為人哀鰥寡恤孤獨振困窮補不足是助王息其民者也息生也何以至今不業也北宫之女嬰兒子無恙耶徹其環瑱集韻徹去也通作徹至老不嫁以養父母是皆率民而出於孝情者也情猶誠胡為至今不朝也命婦則朝此二士弗業一女不朝何以王齊國子萬民乎於陵子仲於陵屬濟南皆以所居為號此自一人若孟子所稱已是七八十年矣補曰路史於陵今淄之長山正曰此言於陵仲子之行與孟子所稱者合恐即此人也趙惠文王與齊閔王同時惠文后用事實孝成之世其在惠文時則仲子猶相及尚存乎是其為人也上不臣於王下不治其家中不索交諸侯此率民而出於無用者何為至今不殺乎彪謂威后賢矣其是非乃不詭於聖齊有此數士不能察至使鄰國老女子愧之王建不足道也時君王后故無恙胡為亦無察乎正曰問王而不及后必非君王后王建時鮑因䇿言謂后為賢智故曲說至此王使之使如字瑱它典它甸二反齊閔王之遇殺其子法章變姓名為莒太史家庸夫庸傭同均直也太史敫女敫音躍補曰徐廣云一音皎竒法章之狀貌以為非常人憐而常竊衣食之與私焉莒中及齊亡臣臣之出亡者相聚求閔王子欲立之法章乃自言於莒共立法章為襄王襄王立以太史氏女為王后生子建太史敫曰女無媒而嫁者非吾種也汙吾世矣終身不覩君王后賢不以不覩之故失人子之禮也襄王卒子建立為齊王君王后事秦謹與諸侯信以故建立衍一四字四十有餘年不受兵正曰此要其終而言之建立字可見建四十四年為秦滅補曰秦逺交齊而善之故齊事秦謹不悟其計也與諸侯信此恐未然史稱齊亦東邉海上秦日夜攻三晉燕楚五國各自救以故四十餘年不受兵此實録也齊與諸侯信則安得不助五國乎秦昭王元作始皇按后卒於莊襄之時不逮始皇也始皇補曰字誤嘗遣使者遺君王后玉連環兩環相貫曰齊多智而解此環不君王后以示羣臣羣臣不知解君王后引錐椎破之謝秦使曰謹以解矣及君王后病且卒誡建曰羣臣之可用者某建曰請書之君王后曰善取筆牘受言牘書版也君王后曰老婦已忘矣詳其指蓋怒建之不心受託以病昏耳君王后死後后勝疑即后之族相齊多受秦間金玉使賔客入秦皆為變辭變故之辭蓋使者還以恐動王也勸王朝秦不修攻戰之備彪謂君王后賢智婦人也惜其不能正始乃其父正烈男子也義不能疚利不能回其斯人乎正曰䇿云君王后賢不失人子之禮又秦王令解環以齊多智為言故鮑以賢贊之不能正始既不足言賢信秦之謀不助諸侯又何智之有齊王建入朝於秦雍門司馬前曰所為立王者為社稷耶為王立王耶王曰為社稷司馬曰為社稷立王王何以去社稷而入秦齊王還車而反即墨大夫聞元作與補曰姚云一本作聞雍門司馬諫而聽之則以為可衍可字可補曰姚云一作以為謀又疑可為謀本注字即入見齊王曰齊地方數千里帶甲數十元作百下同百萬夫三晉大夫皆不便秦而在阿鄄之間者百數王收而與之十百補曰通鑑作數下同萬之衆使收三晉之故地即臨晉之關可以入矣臨晉屬左馮翊鄢郢大夫不欲為秦不屬之也而在城南下者百數齊城王收而與之十百萬之師使收楚故地即武關可以入矣始皇紀注武關秦南關在陜西𢎞農東如此則齊威可立秦國可亡矣舍南面之稱制此亦秦人之辭時未有此正曰謂其棄王而為臣也乃西面而事秦為大王不取也齊王不聽秦使陳馳齊客之入秦者正曰上章謂齊賔客入秦皆為變亂又陳為齊姓故云然不可考誘齊王內之約與五百里之地蓋僞許之齊王不聽即墨大夫而聽陳馳遂入秦處之共松柏之間共屬河內補曰衛州共城縣餓而死先是齊為之歌曰松耶柏耶住建共者客邪客謂陳馳自秦稱之曰客彪謂建之聽雍門似矣而不卒於即墨惟不明故也不明以亡國有國家者可不以正心誠意為先乎正曰專指陳馳非自齊稱之曰客爾史謂建聽姦人賔客以亡秦䇿秦王資頓弱以逰齊王入朝知客非一也鮑出正心誠意一語論雖正而不切上言不明而此曰以為先烏睹大學之序凡五十九章戰國策校注卷四
