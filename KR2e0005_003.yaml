body:
  text: 戰國䇿校注卷三宋鮑彪原注元吳師道補正秦蘇張說外自𢎞農故關以西京兆扶風馮翊北地正郡西河安定天水隴西皆秦地南有巴蜀廣漢犍為武都西有金城武威張掖酒泉燉煌又西南有牂柯越為益州皆屬焉孝公獻公子顯王八年庚申立正曰注意專以此為重今考其舛謬不合者各見本章衛鞅衛之庶孽公子姓公孫氏亡魏入秦鞅事魏相公叔痤為庻子見魏䇿正曰此據史愚謂公孫衛之公孫也庶孽公子恐非葢因為中庶子而生此文孝公以為相封之於商屬𢎞農補曰盧藏用後語註今商州上洛之地又見後章注號曰商君商君治秦法令至行至猶極公平無私罰不諱强大諱猶避也强宗大族賞不私親近法及太子是為惠王黥劓其傅墨漬其顴曰黥截鼻曰劓太子犯法鞅曰法之不行自上犯之太子君嗣也不可刑刑其傅公子䖍黥其師公孫賈朞年之後道不拾遺民不妄取兵革大强革甲也以革為札諸侯畏懼然刻深寡恩刻猶深也刻金木者有深而已特以强服之耳孝公行之八年疾且不起欲傳商君傳位與之辭不受孝公已死惠王代後蒞政有頃蒞臨也集韻上臨下商君告歸懼誅歸商人說惠王曰大臣太重者國危左右太親者身危君之身今秦婦人嬰兒集韻女曰嬰男曰兒補曰釋名人始生曰嬰嬰胸前也投之胸前乳養故曰嬰皆言商君之法莫言大王之法是商君反為主大王更補曰更平聲為臣也且夫商君固大王之仇讎也願大王圖之商君歸還時自商欲歸魏不得故還秦惠王車裂之而秦人不憐無念之者惠文君孝公子元年顯王三十二年甲申也十三年始稱王前此稱王後人追書耳蘇秦始將連横文潁曰關東為從西為横孟康曰南北為從東西為横瓚曰以利合曰從以威勢相脅曰横正曰髙注連關中之謂横合關東之謂從大事記取說秦惠王曰大王之國西有巴蜀漢中之利三郡並屬益州北有胡貉胡樓煩林胡之𩔖集韻貉似狐代馬之用代幽州郡南有巫山在南郡巫補曰正義云䕫州巫山縣黔中之限黔故楚地秦地距此二郡耳故言限秦昭三十年始定為黔中郡後為武靈郡見後志補曰大事記今黔辰施元等州正曰髙注皆有塞險故謂之限東有殽函之固始皇紀注殽二殽函函關也在𢎞農補曰左傳殽有二陵杜注在澠池縣西函見周策田肥羙民殷富殷盛也戰車萬乗奮擊百萬士之能奮擊者沃野千里沃言其肥潤蓄積饒多地埶形便地勢與形便於攻守此所謂天府言蓄聚之富非人力也天下之雄國也物之雄者强以大王之賢士民之衆車騎之用騎士之便馬者兵法之教教猶習可以并諸侯吞天下稱帝而治願大王少留意臣請奏其効奏進効功也秦王曰寡人聞之毛羽不豐滿者不可以髙飛文章不成者文章法令也不可以誅罰道德不厚者不可以使民政教不順者逆人之心不可以煩大臣逆人心則行之難故大臣勞今先生儼然矜莊貎不逺千里而庭教之教之於廣庭願以異日異猶他也俟成順然後承教以此知為惠王初補曰史時方誅商鞅疾辨士弗用蘇秦曰臣固疑大王之不能用也昔者神農伐補遂國名未詳黄帝伐涿鹿屬上谷而禽蚩尤九黎氏之後事見史堯伐驩兠書止言放之豈嘗伐之而不服邪正曰書放驩兠又堯伐驩兠禹伐共工見荀子此游士之辭下言五帝三王不能坐而致地故以戰續之此不過欲售其攻戰之說耳凡戰國言帝王事類如此皆不足辨後放此舜伐三苖國名縉雲氏之後正曰事見書不必泛引禹伐共工伐乃流之湯伐有夏文王伐崇崇侯虎紂卿士道之為惡武王伐紂齊桓任戰任猶用也作内政寄軍令是也而霸天下由此觀之惡有不戰者乎古者使車轂擊馳轂輻所凑也相擊而馳言其衆補曰轂擊說見齊䇿言語相結約親也補曰後語注結音吉此古韻協也下文悉然横黄態替濁蹰玉反聊留服蒲北反信新兵濬反天下為一約從連横兵革不藏文士並飭文謂辨也飭飾同諸侯亂惑萬端俱起不可勝理科條既備科程也集韻條件也民多偽態書策稠濁䇿簡也大事書之稠多也言有司文書多閱者昏亂正曰稠多濁亂也百姓不足上下相愁民無所聊集韻聊頼也明言章理文章法理正曰章亦明也謂明著之言章顯之理下句文辭謂辭之文者三語文勢同兵甲愈起辯言偉服偉竒也補曰偉一作偽戰攻不息繁稱文辭游說也正曰明言者教令辯言者游說文辭者書䇿明言章理即科條既備辯言偉服即言語相結繁稱文辭即書䇿稠濁天下不治舌敝耳聾不見成功行義約信天下不親於是乃廢文任武厚養死士敢死之士綴甲厲兵集韻厲嚴也正曰厲即礪効勝於戰場効致其功也夫徒處而致利徒猶空也言無所為安坐而廣地雖古五帝三王五霸明主賢君常欲坐而致之其勢不能故以戰續之寛則兩軍相攻迫則杖㦸相撞迫近也杖如杖劍㦸謂持㦸㦸有支矛撞手擣也正曰杖持執也直亮反㦸有支兵然後可建大功是故兵勝於外義强於内論戰故獨言義威立於上民服於下今欲并天下凌萬乗集韻凌侵尚也當從人詘敵國詘服也制海内子元元元善也民之𩔖善故稱元臣諸侯言敵國又言諸侯則侯非其敵者非兵不可今之嗣主時君皆繼世者也忽於至道皆惛於教惛不明也亂於治迷於言惑於語沉於辯沉猶溺溺於辭溺謂為所冒没以此論之王固不能行也説秦王書十上而說不行黑貂之裘敝貂䑕屬大而黄黒出丁零國黄金百斤盡資用乏絶資貨也去秦而歸贏縢方言擔齊楚陳宋曰攍通作贏縢緘也正曰一本贏縢是纍夷纒纍字通用倫追反易贏其角贏其瓶孔㯋逹云揭纍纒繞也詩邪幅在下注如今行縢即位所謂復也注說下與履蹻不倫而擔槖又已言矣履蹻屐也正曰史虞卿躡蹻注草履也蹻與屩通負書擔囊髙注槖囊也然則此字元作槖從此說則上縢字當從巾囊也槖無底囊有底正曰一本作槖髙注槖囊通言形容枯槁面目黧犂補曰古字黧犂通借黑集韻黧黒黄色正曰黧黒色集韻誤見魏策狀有愧元作歸今從髙注歸補曰當作愧姚氏亦云色歸至家妻不下絍機縷也不下言自若嫂不為炊父母不與言蘇秦喟然歎曰喟太息也妻不以我為夫嫂不以我為叔父母不以我為子是皆秦之罪也乃夜發書陳篋數十篋藏也得太公隂符之謀漢志有隂符經正曰隂符經恐非此所指索隱云隂符是太公兵法伏而誦之簡練以為揣摩簡猶擇練涷帛也取其熟揣量摩研也游說之術或量其情或研切之讀書欲睡引錐自刺其股錐銳也鍼之𩔖血流至足曰安有說人主不能出其金玉錦繡取卿相之尊者乎朞年揣摩成曰此真可以說當世之君矣於是乃摩燕烏集闕摩言切近過之闕名未詳補曰髙注闕塞名也見說趙王肅侯於華屋之下見說見而說也華髙麗也抵掌而談集韻扺側擊也趙王大說封為武安君補曰武安趙邑正義云潞州武安縣受相印革車百乗兵車也錦繡千純集韻匹端曰純正曰髙注純束也徒温切白璧百雙補曰璧玉環也色白好曰璧黄金萬鎰一鎰二十四兩補曰鎰說見前以隨其後約從散横以抑强秦故蘇秦相於趙而關不通六國之關不通秦也正曰即所謂秦兵不敢窺函谷關者當此之時天下之大萬民之衆王侯之威謀臣之權皆欲决於蘇秦之策决言用之不疑䇿謀也不費斗粮未煩一兵未戰一士未絶一弦未折一矢諸侯相親賢於兄弟賢猶勝夫賢人在而天下服一人用而天下從故曰式於政不式於勇式猶用式於廊廟之内廊東西序廟以尊先祖人君之居謂之岩廊廟堂尊嚴之稱正曰文頴云廊殿下外屋顔師古云堂下周廂又岩廊髙屋也愚按此言宫與廟也廟堂字見徐樂梅福傳劉向九歎王逸注人君為政舉事告宗廟議於明堂今人稱宰相為廟堂盖誤不式於四境之外當秦之隆蘇秦隆盛之時黄金萬鎰元從水溢補曰此書溢鎰通為用轉轂連騎後車之盛正曰車騎之盛炫熿於道光耀也山東之國從風而服以草偃為喻也使趙大重為從主諸侯尊之且夫蘇秦特窮巷掘門鑿垣為門補曰掘即窟古字通齊策掘穴窮巷鄒陽書㐲死掘穴楚䇿亦有桑户棬樞之士耳樞門牝也楺木為之如棬棬屈木盂也伏軾車前横木撙銜集韻撙挫也盖猶頓銜勒也横歴天下歴過也猶横行庭說諸侯之主猶庭教云杜左右之口杜猶塞天下莫之伉集韻匹也正曰姚云錢劉作抗當也一本天下莫之能伉伉抗古字通將説楚王威路過洛陽漢為河南郡父母聞之清宫除道清洒埽也張樂設飲張施也郊迎三十里迎於郊妻側目而視不敢正視側耳而聽嫂蛇行匍伏蛇不直行伏音匐匍匐伏地也四拜自跪而謝集韻跪小拜也既拜復膝地蘇秦曰嫂何前倨而後卑也倨不避也嫂曰以季子位尊而多金譙周曰秦字季子正曰司馬貞曰此嫂呼小叔為季子未必字也蘇秦曰嗟乎貧窮則父母不子富貴則親戚畏懼人生世上勢位富厚葢可以忽乎哉忽輕也此策史畧同合從在趙肅侯十六年此四年彪謂秦之自刺可謂有志矣而志在於金玉卿相故其所成就適足誇嫂婦而此史極口稱頌之是亦利禄徒耳惡睹所謂大丈夫之事哉正曰按史秦出游數嵗困歸兄弟嫂妹妻妾竊笑之於是得周書隂符讀之以出揣摩乃求說周顯王弗信至秦說惠王弗用乃之趙奉陽君弗説之去就燕文侯資之至趙奉陽君死乃說肅侯合從説楚後還過洛陽顯王除道郊勞與䇿小異秦惠王謂寒泉子秦處士之號曰蘇秦欺寡人欺詐也言以虚聲恐之欲以一人之智反覆山東東山補曰當作山東之君從以欺秦趙固負其衆負猶恃故先使蘇秦以其幣帛約乎諸侯諸侯不可一猶連雞之不能俱止於棲亦明矣連謂繩擊之棲雞所宿也寡人忿然含怒日乆吾欲使武安子起往喻意焉喻諭同告也告諸侯以不可一之意寒泉子曰不可夫攻城墮邑敗城邑曰墮請使武安子善我國家稱國家之美正曰能美善我國家使諸侯請使客卿張儀魏人仕秦惠五年為客卿秦惠王曰敬受命按起以昭二十九年為武安君自合從至是五十七年矣所稱武安子起謬也正曰起號武安君此云武安子必别一人上既言武安子起而下止言武安子葢起字屬下文李牧亦封武安君如此名不一且張儀死於秦武王時與白起戰勝攻取時不相及補曰使諸侯之使去聲餘如字楚魏戰於陘山魏記蘇秦傳注在宻縣宻屬河南楚記威王卒魏因䘮取我陘山魏襄六年伐楚敗之陘山在此前九年正曰徐廣云召陵有陘亭宻縣有陘山正義云括地志云在鄭州新鄭縣西南大事記取鮑氏所引召陵韓策引正義又謂楚北有汾陘之塞即此皆一地也愚恐汾字有誤因韓陘城汾旁訛也説見彼條髙從通鑑在恵後六年注作惠魏許秦以上洛屬𢎞農以絶秦於楚使不助楚魏戰勝楚敗於南陽荆州郡非修武所謂秦責賂於魏責求也魏不與管淺秦人謂秦王曰王何不謂楚王懐曰魏許寡人以地今戰勝魏王襄正曰惠背寡人也王何不與寡人遇遇猶㑹魏畏秦楚之合必與秦地矣是魏勝楚而亡地於秦也是王以地德寡人秦因楚㑹得地楚之惠也補曰一本以魏地德寡人秦之楚者多資矣之往也言將以厚幣往結楚好魏弱若不出地補曰劉辰翁云多弱字即若愚謂以弱句義亦善則王攻其南寡人攻其西魏必危秦王曰善以是告楚楚王揚言揚顯言之與秦遇魏王聞之恐効上洛於秦楚使者景鯉在秦從秦王與魏王襄正曰惠遇於境此下脫簡有秦使周最解說與魏所以遇之意見髙注而楚䇿有其事補曰按鮑所謂楚䇿元在韓曰齊楚之交善秦與魏遇且以善齊而絶楚乎楚景鯉之秦與魏遇楚王怒恐秦以楚為有隂於秦魏也且罪鯉云云楚怒秦令周最謂楚王曰魏請無與楚遇而合於秦補曰别本以此足缺文在是以鯉與之遇也句上即髙注秦令周最解說者姚本楚怒秦令最謂楚王曰魏王遇於境楚使者是以云云其文缺誤不如别本明白是以鯉與之遇也敝邑之於與遇善之加好於魏正曰敝邑秦自稱謂鯉與秦魏遇此以為善盖二國之遇將以善齊而絶齊於楚而楚使在焉故齊疑之而不與合也故齊不合也楚王因不罪景鯉而德周秦齊魏讎也好魏故齊不合齊楚敵也齊不合故楚說正曰以齊楚交善章考之其失可見楚王懐使景鯉如秦客謂秦王曰景鯉楚王下衍使景二字使景補曰姚云一本無二字所甚愛王不如留之以市地市買賣所之也言使楚以地贖鯉如之楚王聽則不用兵而得地楚不聽則殺景鯉更下衍不字不補曰疑衍與不如景鯉者元作留補曰姚云留曾劉作者是是便計也便猶利也秦王乃留景鯉景鯉使人說秦王曰臣見王之權輕天下權事勢也天下所輕而地不可得也臣之來使也聞齊魏皆且割地以事秦所以然者以秦與楚為昆弟國今大王留臣是示天下無楚也齊魏有何重於孤國也有猶又補曰二字古通用後䇿陳軫云又何重孤國即此文楚知秦之孤不與地而外結交以圖圗秦則社稷必危不如出臣秦王乃出之補曰來使之使去聲更平聲楚攻魏張儀謂秦王曰不如與魏以勁之與猶助魏戰勝復聽於秦必入西河之外禹貢西河屬雍州此時屬魏子夏老於西河之上是也補曰盖主冀之西而言正義云同華等州不勝魏不能守王必取之自取河外王用儀言取皮氏卒萬人車百乗皮氏屬河東魏地也今秦於此取卒與車豈䘮地七百里時入秦邪補曰正義云皮氏在絳州龍門縣西以與魏犀首公孫衍也隂晋人司馬彪曰犀首魏官若今虎牙將軍補曰按年表隂晋人犀首為大良造則非官名而韓䇿摎留以犀首張儀並言何為一人獨以官稱乎恐犀首或姓名也魏亦有犀武說又見衛䇿戰勝威王楚魏兵罷敝罷疲同恐畏秦果獻西河之外魏襄五年入秦河西地此前八年也儀時為客卿魏七年納上郡此前十年也儀時為相正曰惠後五年補曰此章稱楚威王威王在位凡十一年攻魏事史無見年表十一年魏敗我陘山因䘮來伐是嵗秦取魏皮氏明年入上郡于秦而西河濵洛之地盡皆楚威死後也陘山前一年魏入少梁河西地于秦豈是時楚魏已搆兵乎田華之為陳軫二皆齊姓補曰一本田萃姚同說秦惠王曰臣恐王之如郭君郭虢同屬扶風正曰路史云北虢仲後也在大陽今陜州西南虢仲之封在岐東遷日此之上陽為南虢東虢叔之封制也今鄭之滎陽按此䇿所指者北虢也夫晋獻公欲伐郭而憚舟之僑存憚難之也僑郭大夫荀息晉大夫曰周書有言美女破舌破壊其事舌指諫臣乃遺之女樂以亂其政舟之僑諫而不聽遂去閔二年奔晉因而伐郭遂破之又欲伐虞屬河東大陽而憚宫之奇存荀息曰周書有言美男破老老成人補曰汲塜周書美男破老美女破舌武之毁也注云所以毁敵也修文御覽引周書作美男破産美女破車乃遺之美男教之惡宫之奇宫之奇以諌而不聽遂亡左氏不言其地因而伐虞遂取之今秦自以為王時亦未王謂其欲之能害王者之國者楚也因其有自王之志故稱之曰王者楚知横門君之善用兵下衍用兵二字補曰姚云錢劉本無與陳軫之智故驕張儀以五國驕寵之也言楚使韓魏趙燕齊以事屬之以重其權按儀初遊楚楚相笞之後相楚乃為秦間耳楚無驕之之事今云然因其自楚來間之耳來必惡是二人惡言其惡也願王勿聽也張儀果來辭因言軫也王怒而不聽張儀又惡陳軫於秦王曰軫馳陳楚之間今遂不加善秦而善軫言楚善之補曰一本今楚不如然則是軫自為而不為國也且軫欲去秦而之楚王何不聽乎聽猶許王謂陳軫曰吾聞子欲去秦而之楚信乎陳軫曰然王曰儀之言果信也曰非獨儀知之也行道之人皆知之也孝己愛其親世紀殷髙宗有賢子孝己母早死髙宗惑後妻之言放之而死補曰尸子云孝己事親一夜而五起視衣厚薄枕之髙下也天下欲以為子子胥忠乎其君伍子胥楚人平王殺其父奢胥奔吳吳王夫差敗越於夫椒越王勾踐求委國為臣妾夫差將許之胥諫不聽後吳伐齊胥諫請釋齊先越太宰嚭讒之賜劍以死天下欲以為臣賣僕妾售乎閭巷售賣去之也者良僕妾也良善也出婦嫁鄉曲者曲里之一曲如韋曲杜曲良婦也吾不忠於君楚亦何以軫為忠乎忠且見棄吾不之楚何適乎秦王曰善乃止之軫傳有陳軫去楚之秦言去楚者本其始仕秦之時自楚來也且為輸楚張本張儀謂秦王曰陳軫為王臣常以國情輸楚情謂國事之隱者補曰情實也輸冩也輸冩以告之儀不能與從事願王逐之即復之楚願王殺之王曰軫安敢之楚也王召陳軫告之曰吾能聽子子欲何之請為子約車約纒束之正曰髙注具也盖約束戒令之䇿多有對曰臣願之楚王曰儀以子為之楚吾又自知子之楚子非楚宜安之也補曰一本且安之也軫曰臣出必故之楚以順王與儀之䇿䇿謂其所籌度而明臣之楚與否也此之即所謂以國情輸楚正曰故之楚之之往也之楚與否之之語助也下同楚人有兩妻者人誂其長者誂相呼誘也補曰後語作挑徒了反長者詈之詈罵也誂其少者少者許之居無幾何時不乆也有兩妻者死客謂誂者曰汝取長者乎少者乎取長者誂者對也客曰長者詈汝少者和汝和猶應汝何為取長者曰居彼人之所則欲其許我也今為我妻則欲其為詈人也以國情輸楚猶許者也軫誠有此則今之楚楚必不欲也補曰許我詈之云云後漢馮衍傳有今楚王懐明主也而昭陽賢相也軫為人臣而常以國情補補曰國下當有情字輸楚楚元作王王必不留臣昭陽將不與臣從事矣以此明臣之楚與不之亦猶於軫出張儀入問王曰陳軫果安之王曰夫軫天下之辯士也熟元作孰孰補曰孰熟通說文生熟字本但作孰後人加火以别之視寡人曰軫必之楚寡人遂無奈何也寡人因問曰子必之楚也則儀之言果信也軫曰非獨儀之言行道之人皆知之昔者子胥忠其君天下皆欲以為臣孝己愛其親天下皆欲以為子故賣僕妾不出里巷而取者良僕妾也出婦嫁於鄉里者善婦也臣不忠於王楚何以軫為忠忠補補曰史復有忠字是且見棄軫不之楚而何之乎王以為然遂善待之此一事再出著書者以所聞駮異也彪謂軫之辯𩔖㨗給而其所稱譬皆當於人心不詭於正論周衰辯士未有若軫之絶倫離羣者也正曰秦為無道魯仲連不肻帝秦子順義不入彼誠豪傑之士已軫往來其間其居秦也又與張儀爭寵鄙哉雖其為楚謀也多而終不能以善楚也之楚之對辯給不詭於正猶為彼善於此耳補曰太事記顯王四十一年秦陳軫奔楚解題引䇿文自賣僕妾以下正歸乎云軫居秦期年惠王終相張儀而軫奔義渠君西戎也北地郡有義渠道之魏公孫衍謂義渠君曰道逺臣不得復過矣不復相過請謁事情謁白也情猶實義渠君曰願聞之對曰中國無事於秦則秦且燒􅌊獲君之國􅌊亦燒也言火其國以得其地補曰􅌊即爇中國為有事於秦事皆謂戰則秦且輕使重幣輕言其行疾而事君之國也此事君之事義渠君曰謹聞令令猶命居無幾何五國伐秦後七年韓趙魏燕齊共攻秦陳軫謂秦王曰義渠君蠻夷之賢君王不如賂之以撫其心撫安也秦王曰善因以文繡千匹好女百人遺義渠君遺贈也義渠君致羣臣而謀致之使至曰此乃公孫衍之所謂也因起兵襲秦大敗秦人於李帛之下史張儀傳未有此䇿帛作伯地缺平原傳注河内成臯有李城豈秦兵與諸國遇於此而見敗邪正曰正義云懐州温縣本李城也李同父所封按趙救邯鄲時同戰死封其弟為李侯意者因此號李城事在後且此云李帛必非秦既攻五國不勝而走秦兵不應至懐是時諸國連匈奴秦恐義渠因而有變故賂以和之義渠之襲必次於五國之後恐非與諸國遇時也補曰按史犀首相魏張儀去犀首聞儀復相秦害之乃謂義渠君云云且五國伐秦事在惠文後七年次年魏因儀請成於秦乃復相秦則此時儀未為秦相也儀自惠文後三年出相魏至今在魏衍不相則儀必不去也故大事記謂伐秦之役儀在魏隂為秦用而又謂衍與義渠語在相魏之後盖亦不能無疑豈儀去魏之秦犀首知其必相而害之歟楚又按秦紀書韓趙魏燕齊帥匈奴伐秦年表韓魏趙燕五國伐秦不勝楚世家書蘇秦約從六國共攻秦楚懐王為從長至函谷關秦擊之六國皆引歸齊獨後互有不同通鑑據年表大事記據楚世家按楚世家特詳者以從長故當以為正年表諸國皆書不勝齊獨後而不敗故畧不書歟紀不書楚者豈以世家文已明歟修魚之戰虜韓申差年表在次年而紀於此連書之則紀誠有誤也髙注五國作齊宋韓魏趙尤誤司馬錯秦人與張儀爭論於秦惠王前司馬錯欲伐蜀張儀曰不如伐韓王曰請聞其說對曰親魏善楚下兵三川塞轘補曰轘胡貫反轅緱氏之口髙紀注轘轅緱氏險道屬河南補曰瓚云轘轅險道在緱氏東南索隱云緱氏以山為名當屯留之道屬上黨補曰正義云屯當潞州縣道即太行羊腸阪道也魏絶南陽秦使之絶楚臨南鄭亦河南郡秦攻新城宜陽新城屬河南補曰左傳僖六年注新城鄭新宻今滎陽宻也大事記白起係韓新城引正義云在洛州伊闕縣又秦韓㑹新城云兩周間地名注引正義云許州襄城縣古新城縣也按芉戎華陽君又號新城君則華陽在宻者此䇿以宜陽並言地必連近當是伊闕爾以臨二周之郊誅周主之罪誅討也補曰周主謂二君侵楚魏之地周自知不救九鼎寶噐必出據九鼎按圖籍土地之圖人民金榖之籍挾天子以令天下號令指麾之天下莫敢不聽此王業也今夫蜀西僻之國而戎狄之長也敝名補曰一本名作兵勞衆不足以成名伯王之名得其地不足以為利臣聞争名者於朝争利者於市今三川周室天下之市朝也而王不爭焉顧爭於戎狄顧還視也故為反義去王業逺矣司馬錯曰不然臣聞之欲富國者務廣其地務趣也正曰務専力也欲强兵者務富其民欲王者務博其德三資者備三者於國如人之有資貨而王隨之矣今王之地小民貧故臣願從事於易夫蜀西僻之國也而戎狄之長也而有桀紂之亂以秦攻之譬如使豺狼逐羣羊也取其地足以廣國也得其財足以富民繕兵繕補也正曰左傳隱元年繕甲兵注治也訓切不傷衆而彼已服矣故拔一國而天下不以為暴利盡四海言四方之物蜀兼有之故蘇秦於巴蜀漢中獨曰利補曰一本西海新序同諸侯不以為貪是我一舉而名實兩附不貪暴名也得國實也而又有禁暴正亂之名今攻韓刼天子刼脅止也刼天子惡名也而未必利也又有不義之名韓無罪而伐之不義也而攻天下之所不欲危天下皆有尊周之志正曰史攻天下之所不欲危矣新序同按下文云此臣所謂危是也今無矣言雖以欲字句而危字自為句亦竒臣請謁其故周天下之宗室也宗尊也齊補曰齊字恐衍韓周之與國也周自知失九鼎韓自知亡三川則必將二國并力合謀并並也以因于齊趙而求解乎楚魏解免秦兵以鼎與楚以地與魏王不能禁此臣所謂危不如伐蜀之完也不虞傷敗惠王曰善寡人聽子卒起兵伐蜀十月取之遂定蜀蜀主更號為侯而使陳莊相蜀蜀既屬屬猶附秦益强富厚輕諸侯儀傳有在前十年前而表在後九年謂前年議伐後年取之而取之書十月知為一年事也今從表補曰秦紀與表合按甘茂傳云張儀西并巴蜀當儀與錯議不同故紀表並言錯定蜀而茂𫝊之言如此何也水經云秦自石牛道使張儀司馬錯尋路伐蜀滅之華陽國志云蜀王伐苴侯苴侯奔巴求救於秦惠文王使張儀司馬錯伐蜀滅之是二人同往也齊助楚攻秦取曲沃晉桓叔所封漢屬河東為聞喜此時屬秦與上取皮氏卒同義其後秦欲伐齊齊楚之交善惠王患之謂張儀曰吾欲伐齊齊楚方懽子為寡人慮之奈何張儀曰王其為臣約車并幣言并則幣非一物正曰并合也臣請試之不自必之辭張儀南見楚王懐曰敝邑之王所說甚者無大大王大猶過唯儀之所甚願為臣者唯辭也傳稱往相楚是也亦無大大王敝邑之王所甚憎者衍亦字亦補曰疑衍無大齊王閔唯儀之所補甚憎者亦無大齊王今齊王之罪其於敝邑之王甚厚言得罪於秦重也敝邑欲伐之而大國與之懽是以敝邑之王不得事令事猶聽從而儀不得為臣也大王茍能閉關絶齊臣請使秦王獻商於之地楚紀注在今順陽郡南鄊丹水二縣有商於在於中故名𢎞農商縣是也方六百里若此齊必弱失楚援故齊弱則必為王役元作没補曰姚本作役矣役言為楚役使則是北弱齊西德於秦秦楚因絶齊得報曲沃之役楚之惠也而私商於之地以為利也則此一計而三利俱至楚王大說宣言之於朝廷曰不榖得商於之地方六百里羣臣聞見者畢賀畢猶盡陳軫後見時去秦在楚獨不賀楚王曰不穀不煩一兵不傷一人而得商於之地六百里寡人自以為智矣諸士大夫皆賀子獨不賀何也陳軫對曰臣見商於之地不可得而患必至也故不敢妄賀王曰何也對曰夫秦所以重王者以王有齊也今地未可得而齊先絶是楚孤也無援故秦又何重孤國且先出地絶齊秦計必弗為也先絶齊後責地且必受欺於張儀言儀必背約受欺於張儀王必惋之惋猶恨是西生秦患北絶齊交則兩國兵必至矣楚王不聽曰吾事善矣子其弭口無言集韻彌止也通作弭以待吾事軫之䇿此可謂明矣而懐王不聽愚而好自用者也其死秦宜哉楚王使人絶齊使者未來來還也又重絶之張儀反絶句秦使人使齊齊秦之交隂合楚因使一將軍受地於秦張儀至前反而今至也稱病不朝楚王曰張子以寡人不絶齊乎乃使勇士往詈齊王張儀知楚絶齊也乃出見使者曰從某至某廣從六里横度為廣直為從使者曰臣聞六百里不聞六里儀曰儀固以小人小人貧寠之稱言不能多與安得六百里使者反報楚王楚王大怒欲興師伐秦陳軫曰臣可以言乎補曰髙注初王使弭口今可以言未也王曰可矣軫曰伐秦非計也王不如賂之一名都都邑有聞於時者與之伐齊是我亡於秦而取償於齊也償還也言勝齊則得地雖亡所賂足以相償楚國不尚全事不尚尚也言無所䘮補曰髙注事一云齊乎字是王今已絶齊而責欺於秦是吾合齊秦之交也國元作固補曰史作國姚注曾本固作國必大傷楚王不聽是亦明計也而不聽是以知楚王之悍也彼豈能用屈原哉遂舉兵伐秦補曰史云使屈匄將秦與齊合韓氏從之楚兵大敗於杜陵屬京兆正曰髙注楚邑故楚之土壤士民非削弱僅以救亡者集韻僅劣也計失於陳軫過聽於張儀過猶誤懐十六年有此十一年也補曰張儀商於之欺雖竪子猶能知之以陳軫之智固不為難也儀之肆意而無忌者知懐王之愚而軫之言必不入也不然他日楚之請儀將懼其甘心焉而儀請自往卒不能害豈非中其所料也哉洪邁云賂秦攻齊䇿尤乖謬不義齊本與國宜割地致幣卑詞謝罪復求其援而反欲攻之軫說謬矣子為為臣之為使者使齊之使並去聲楚絶齊齊舉兵伐楚陳軫謂楚王懐曰王不如以地東解於齊西講於秦補曰講當從媾讀說見前王使陳軫之秦秦王謂軫曰子秦人也寡人與子故也故言有舊補曰髙注軫元仕於秦寡人不佞佞髙才也不能親國事也躬親治國故子棄寡人事楚王今齊楚相伐軫傳言韓魏或謂救之便或謂救之不便子獨不可以忠為子主計主懐王以其餘為寡人乎陳軫曰王獨不聞吴人之遊楚者乎楚王甚愛之楚先王病吴人故使人問之楚王使問曰使者還王問之誠病乎意亦思乎思吴左右曰臣又知其思與不思注家說有為又則又亦有也此言有以知之正曰劉辰翁云又知猶安知愚謂終缺安字按姚本作不知是誠思則將吳吟作吴人呻吟今軫將為王吳吟言不忘秦王不聞夫管與之說乎軫傳作館竪子有兩虎爭元作諍下同諍補曰字與爭通下同人而鬬管莊子將刺之傳管作卞刺有傷也補曰索隠引䇿作館館謂逆旅舍其人字莊子管與止之曰虎者戾蟲戾猶暴人者甘餌以餅餌喻之今兩虎爭諍人而鬭小者必死大者必傷子待傷虎而刺之則是一舉而兼兩虎也無刺一虎之勞而有刺兩虎之名齊楚今戰戰必敗必有一敗敗王起兵救之有救齊之利而無伐楚之害今詳秦王言為子主計則以齊楚正相伐故也今軫言無伐楚亦所以忠為主也計聽知覆逆者能計善聽知二國之覆逆覆逆言不順於理正曰覆謂反覆逆謂逆料覆即下文一二逆即下文本末唯王可也計者事之本也聽者存亡之機機主發矢喻事之要也先也計失而聽過能有國者寡也故曰計有一二者難悖一二言反覆計之集韻悖亂也聽無失本末者難惑軫傳有無計聽下補曰蒯通說韓信曰聽者事之候也計者事之機也聽過計失而能乆安者鮮矣聽不失一二者不可亂以言計不失本末者不可紛以辭軫為楚媾於秦而勸秦收齊楚之敝豈所以忠為主哉或疑史作韓魏者是考秦惠時唯十三年韓舉趙護帥師與魏戰敗績去楚絶齊時逺甚他不見韓魏相攻事且䇿言甚明竊意楚已遣人解齊軫之媾秦欲其不助齊耳當識其意不可泥於辭也秦惠王死公孫衍欲窮張儀李讎秦人謂公孫衍曰不如召甘茂於魏召公孫顯秦人正曰李讎據髙注此無據於韓起樗里子於國起猶舉三人者皆張子之讎也公用之則諸侯必見張子之無秦矣武王惠文子元年赧王五年辛亥張儀欲假秦兵以救魏時將相魏左成謂甘茂曰不如予之魏不反秦兵謂敗而死傷多張子不反秦謂秦以䘮兵誅之魏若反秦兵張子得志於魏不敢反於秦矣懼秦疑其厚魏張子不去秦去猶捨也儀雖為魏猶有得秦之心張子必髙子髙貴重也髙之者欲茂以秦資之正曰劉辰翁云不去秦萬一不行救魏也亦必髙茂之誼髙茂之忠張儀之殘樗里疾也殘猶害重而使之楚重猶貴貴之者欲使楚亦貴重之因令楚王懐為之請相於秦請於秦使相之張子謂秦王曰重樗里疾而使之者將以為國交也結兩國之交今身在楚疾之身楚王因為請相於秦臣聞其言聞疾之言盖誣之也曰王楚王欲窮儀於秦乎臣請助王楚王以為然故為請相也今王誠聽之彼必以國事楚王秦王大怒樗里疾出走補曰為然之為如字餘去聲張儀欲以漢中與楚惠十三年取楚漢中請秦王曰補曰請當是謂字有漢中蠧蠧木中蟲也言為國害種樹不處者言非其所人必害之家有不宜之財則傷非所宜得得之必有禍今元作本本正曰自有漢至傷本有殽舛疑當云種樹不處則傷本家有不宜之財者人必害之漢中南邊為楚利此國累也甘茂謂王曰地大者固當憂乎言不然天下有變謂害於秦王割漢中以和楚補曰一本王割漢中以為和楚姚注一無為字此作以楚和殽次也楚必畔天下而與王畔猶背王今以漢中與楚即天下有變王何以市楚也為補魏補曰姚云曾錢本此下有文字謂魏冉曰楚人宣太后弟後封穰侯傳言其用事武王時此時冉欲如楚魏恐其合也公聞東方之語乎東山東曰弗聞也曰辛張陽母澤辛疑韓人張張儀母澤疑齊人正曰此章多難通此𩔖尤難知下文云觀張儀與澤又不云母澤當闕說魏王哀正曰襄薛公田嬰公叔也曰臣戰與楚戰載主契國主木主軍行載之禱且告焉契言以國為約以與王約王魏王必無患矣若有敗之者臣請挈領領項也言欲請誅持其項以受鈇鉞然而臣有患也患楚與秦合下衍十六字夫楚王之以其臣請挈領然而臣有患也補曰此十六字姚云一本無夫楚王懐之以其國依冉也而事臣之主事征伐也臣辛張陽主韓魏齊也此三人之辭非說冉者故名冉此臣之所甚患也此下乃說者之辭今公東而因言於楚公謂冉東東之楚也因與楚好言是令張儀之言為禹儀以武二年死故此章必次之此禹善謨今儀言楚依冉而冉果與楚合是儀之謀侔於禹也而務敗公之事也三國是儀之說必欲敗冉合楚之事公不如反公國謂秦德楚但施恩惠而不之楚而觀薛公之為公也觀其於冉如何觀三國之所求於秦而不能得者請以號三國以自信也為韓魏齊請其所欲於秦因宣言之所以信於三國觀張儀與澤之所不能得於薛公者衍也字也補曰恐衍而公請之以自重也薛公所不與儀者冉為之請而得則儀重冉儀時相魏為儀請亦所以為魏魏亦重冉也補曰為公之為去聲醫扁鵲盧人字越人正曰鮑本髙注史渤海郡鄭人姓秦氏名越人徐廣云鄭當為鄚正義云又家於盧號盧醫按周禮釋文引史記姓秦名少齊越人今史無少齊字恐釋文為是彼時所見本末缺也越人似非名字見秦武王武王示之病扁鵲請除欲去其病左右曰君之病在耳之前目之下除之未必已也將使耳不聦目不明君以告扁鵲扁鵲怒而投其石砭也所以砭彈臃腫正曰此亦本髙注石針曰砭所以刺病投棄擲也曰補補曰姚云劉本有曰字君與知之者謀之而與不知者敗之使此知秦國之政也此如此則君一舉而亡國矣按扁鵲與趙簡子同時至是百三十年矣正曰簡子在晉昭頃定公時周景王敬王之世也秦武王元年當赧王五年相去二百餘年名字必差秦武王謂甘茂曰寡人欲車通三川以闚周室闚窺同小視也周室洛邑盖欲取之不正言爾言三川知其志不止鎬京也正曰三川宜陽說見周䇿大事記盖控扼之地故秦武云云而寡人死不朽乎補曰乎史作矣甘茂對曰請之魏約伐韓王令向夀宣太后外族輔行輔猶副甘茂至魏謂向夀子歸告王曰魏聽臣矣然願王勿攻也事成盡以為子功補曰茂欲壽告王勿攻王必疑其故而茂得以薦其言故曰事成盡以為子功大事記云夀武王所親幸故茂以諉之向夀歸以告王王迎甘茂於息壤山海經鯀竊息壤以陻洪水時則訓於中央言息壤陻洪水之州而柳子厚言永州有之則息壤非一處此秦地也甘茂至王問其故勿攻之故對曰宜陽大縣也上黨南陽此屬修武積之乆矣二縣財賦歸之名為縣其實郡也此時韓都平陽春秋傳上大夫受郡下大夫受縣則郡縣之稱乆矣正曰大事記云春秋時郡屬於縣趙簡子所謂上大夫受縣下大夫受郡是也戰國時縣屬於郡所謂上郡十五縣者是也魏恵後十年方孝公商鞅時并小鄉為大縣縣一令尚未有郡及守稱故魏納上郡之後十餘年秦紀始書漢中郡或者山東諸侯先變古制而秦效之歟今王倍數險倍背同行數千里補曰一本行千里而攻之難矣臣聞張儀西并巴蜀之地并猶兼北取西河之外南取上庸屬漢中補曰大事記云本庸國今房州竹山縣漢中要地也天下不以衍為字為補曰姚氏云錢劉本無此字多張儀而賢先王惠文魏文侯令樂羊將攻中山冀州國後志云一名中山亭補曰見中山䇿三年而拔之樂羊反而語功文侯示之謗書一篋樂羊再拜稽首曰此非臣之功主君之力也今臣覉旅之臣也樗里疾公孫衍二人者補曰衍史並作奭新序作公孫子謂皆秦諸公子挾韓而議媒孽之也王必聽之是王欺魏而臣受公仲朋元作侈侈之怨也朋公仲名此書後或名朋或名侈朋侈字近故誤史並作侈然韓䇿言公仲侈又言韓侈為兩人今定公仲名朋别韓侈也正曰史田齊世家韓馮徐廣云即公仲侈大事記韓又有韓明韓侈馮朋音混而侈明朋字訛故也且當各存舊文辯見各條昔者曾子處費魯邑屬東海費人有與曾子同名族者族姓也而殺人人告曾子母曰曾參殺人曾子之母曰吾子不殺人織自若若如故也有頃焉人又曰曾參殺人其母尚織自若也頃之一人又告之曰曾參殺人其母懼投杼機之持緯者踰墻而走夫以曾參之賢與母之信也而三人疑之使其母疑則慈母不能信也今臣之賢不及曾子而王之信臣又未若曾子之母也疑臣者疑之於王不適三人適啻同臣恐王為臣之投杼也王曰寡人不聽也請與子盟於是與之盟於息壤果攻宜陽五月而不能拔也樗里疾公孫衍二人在言在中也爭之王王將聽之召甘茂而告之甘茂對曰息壤在彼王曰有之因悉起兵復使甘茂攻之遂拔宜陽在三年茂傳有宜陽之役役猶戍役正曰役事也馮章秦人謂秦王曰不拔宜陽韓楚乗吾敝國必危矣不如許楚漢中以懽之使楚說也楚懽而不進韓必孤無奈秦何矣王曰善果使馮章許楚漢中而拔宜陽楚王懐以其言責漢中於馮章馮章謂秦王曰王逐亡臣詐為逐之因謂楚王曰寡人固無他而許楚王彪謂此䇿可以無出地矣如後不可為約何正曰戰國變詐多此𩔖豈暇慮後邪懐王親受商於之欺而猶不悟昏於貪故也甘茂攻宜陽三鼔之鼔以進軍而卒不上卒士也上猶前秦之右將有尉軍尉對曰公不論兵言不以兵法治士必大困甘茂曰我覉旅而得相秦者我以宜陽餌王以釣喻也今攻宜陽而不拔公孫衍樗里疾挫我於内挫摧也補曰衍史作奭下章同而公仲元作中中以韓窮我於外是無伐之日已戰功曰伐言後不復立功正曰一本作無茂是盖字訛請明日鼓之而不可下因以宜陽之郭為墓示必死也於是出私金以益公賞明日鼓之而宜陽拔補曰一本鼓之宜陽拔宜陽未得秦死傷者衆甘茂欲息兵左成謂甘茂曰公内攻於樗里疾公孫衍二人毁之如攻國然而外與韓朋元作侈侈為怨今公用兵無功公必窮矣公不如進兵攻宜陽宜陽拔則公之功多矣是樗里疾公孫衍無事也不得事權秦衆盡謂死傷多怨之深矣使茂乆攻二人持之故也宜陽之役楚畔秦而合於韓秦王懼甘茂曰楚雖合韓不為韓氏先戰韓亦恐戰而楚有變其後變背約也楚時助韓兵在韓後正曰言其後有變也韓楚必相御也御猶制也二國雖合猶相疑故自相制楚言與韓而不餘怨於秦楚之與韓有言而已而其於秦不見多怨正曰聲言與韓而不遺怨於秦臣是以知其御也宜陽之役楊逹秦人正曰無據謂公孫顯曰請為公以五萬攻西周得之是以九鼎抑元作卬卬補曰大事記引作市者是甘茂也顯與茂爭國者見惠王䇿抑按也正曰按惠王䇿李讎云云顯乃張儀讎無與茂爭國事不然秦攻西周天下惡之其救韓必疾則茂事敗矣言攻而不勝亦足以敗茂元在韓䇿補曰鮑既改從秦䇿今韓䇿仍出此章楊逹作楊侹卬作市注亦異大事記所取鮑氏云顯得止用顯亦今韓䇿注文髙注此章無作侹字者豈别本有之而鮑又重見於此乎宜陽之役䇿公孫衍史並作公孫奭又有公孫顯公孫郝公孫赫其云挾韓而議云善韓皆仕秦而黨韓者大事記謂郝顯奭郝奭在秦為一人愚謂赫即郝也然其事亦多與衍𩔖又恐衍即顯之訛也今且當各從本文秦王謂甘茂曰楚客來使者多健言其强辨與寡人爭辭寡人數窮焉辭屈也為之奈何甘茂對曰王勿患也其健者來使者補曰者字疑衍則王勿聽其事其需弱者來使集韻需音儒韋柔滑貎補曰需即懦則王必聽之然則需弱者用而健者不用矣王因而制之弱者易制因可制甘茂相秦秦王愛公孫衍與之間有所立請間之間暇隙也因暇與語将置相也因自謂之曰寡人且相子甘茂之吏道而聞之聞之於道補曰姚注劉本無道而二字按韓非子道而作道穴云秦王欲將犀首樗里疾恐代之將也鑿穴於王之所常隠語者王果與犀首計之境内盡知之盖樗里疾道穴聽之矣以告甘茂甘茂因入見王曰王得賢相敢再拜賀王曰寡人託國於子焉更得賢相對曰王且相犀首王曰子焉聞之對曰犀首告臣王怒於犀首之泄也乃逐之補逐逐衍也曰告人足矣必不告已正曰姚本有之字補曰告人之云機更深險甘茂約秦魏而攻楚楚之相秦者屈盖凡屈皆楚人楚任之於秦使為秦相為楚和於秦秦啓關而聽楚使甘茂謂秦王曰訹元作怵怵補曰䇿訹怵字通於楚訹誘也若怵則驚耳而不使魏制和制謂主之楚必曰以鬻魏之言告魏秦鬻魏鬻賣也如賣友云言始約而終背之魏補補曰恐缺一魏字不說而合於楚楚魏為一國恐傷矣王不如使魏制和魏制和必說絶句王不惡於魏則寄地必多矣言魏楚割地與秦時地未入故言寄謂秦王曰臣竊惑王之輕齊易楚而卑畜韓也臣聞王兵勝而不驕霸主約而不忿主天下之要約正曰歛約也勝而不驕故能服世約而不忿故能從鄰使鄰國服從今王廣德魏趙大施恩惠而輕失齊驕也戰勝宜陽不恤楚交忿也言不以交楚為意驕忿非霸王之業也臣竊為大王慮之而不取也詩云靡不有初鮮克有終大雅蕩詩故先王之所重者唯終與始何以知其然也補曰一本唯始與終何以知其然昔智伯瑤殘范中行范吉射中行寅晉兩卿圍晉陽屬太原故許唐國補曰大事記晉陽漢太原郡所治龍山在西北晉水所出北齊分晉陽置龍山縣隋改龍山曰晉陽而以晉陽為太原縣卒為三家笑趙魏韓也事見韓䇿晉出公十七年正曰大事記晉出公十七年晉荀瑤與韓趙魏氏分范中行之地反攻出公奔齊道死晋哀公四年趙約韓魏攻荀瑶滅之吳王夫差棲越於會稽故越國揚州郡亦山名事見哀元年勝齊於艾陵杜注齊地哀十一年補曰正義云艾山在兖州傅縣南為黄池之遇陳留外黄溝縣有黄溝又魏内黄注吴會諸侯于黄池今黄溝是哀十三年正曰哀十三年杜注陳留封丘縣南有黄亭近濟水按外黄小黄封丘皆屬陳留外黄有黄溝故指為黄池而内黄𨽻相者亦有黄溝水經注所謂河水决通濮濟黄溝者也相與封丘殊逺當以杜注為正路史同杜注無禮於宋並哀十三年吴欲伐宋殺其大夫囚其婦人遂為元作與與補曰當作為一本死於垂遂勾踐禽死二十二年梁君惠王伐楚勝齊制韓趙之兵驅十二諸侯以朝天子於孟津在河内河陽縣南魏記惠王二年敗韓于馬陵敗趙于懐十五年魯衛宋鄭君來朝二十八年中山君為相不見齊楚及朝天子事正曰年表二十九年後子死太子申也三十年齊敗魏馬陵虜申身布冠以䘮禮自居也而拘於秦拘猶制正曰髙注太子見殺故布冠而拘執于秦三者非無功也能始而不能終也今王破宜陽殘三川而使天下之士不敢言雍天下之國雍擁同言據有之徙兩周之疆侵逼之而世主不敢窺陽侯之塞河東陽注陽侯國取黄棘秦紀楚紀懐王與昭王盟于黄棘皆不地正曰正義云盖在房襄二州而韓楚之兵不敢進王若能為此尾言善其後正曰尾終也即上文能終之說則三王不足四五霸不足六王若不能為此尾而有後患則臣恐諸侯之君河濟之士濟水在温西北此言中國爾正曰濟水出絳州垣曲縣王屋山伏流至孟州濟源縣出二源合流至温入河出河南溢而為滎自鄭以東貫滑曹鄆濟齊青入于海以王為吳智之事也詩云行百里者半於九十逸詩言行九十里適足為五十里耳此言末路之難今大王皆有驕色以臣之心觀之天下之事依世主之心依猶㨿非楚受兵必秦也皆驕强故何以知其然也秦人援魏以拒楚楚人援韓以拒秦衍王字王補曰姚本無此字四國之兵敵秦楚韓魏也韓魏雖弱以得援故與之敵而未能復戰也敵故不敢輕戰齊宋在繩墨之外以為權外言四國不以為意權言能輕重四國故曰先得齊宋者伐秦此言魏韓得之正曰下文楚先得齊可知秦先得齊宋則韓氏鑠以銷金喻韓氏鑠則楚孤而受兵也楚先得之則魏氏鑠魏氏鑠則秦孤而受兵矣若隨此計而行之則兩國者秦楚必為天下笑矣彪謂此䇿孟軻之徒也惜其不名正曰孟子曰仲尼之徒無道桓文之事者五伯者三王之罪人今䇿云伯王之業五伯不足六孟子而有是言歟驕者必敗亦論之常其言先得齊宋以下是乃量事勢計較强弱不過以力服人而已豈可與孟子同日語哉補曰曰江之當大之為去聲夫上處秦王與中期秦人爭論不勝秦王大怒中期徐行而去或與中期說秦王曰悍人也悍勇也勇者多忤人中期適遇明君故也向者遇桀紂必殺之矣秦王因不罪補曰當曰中期悍人也有錯文昭襄王武王母弟元年赧王九年乙卯甘茂亡秦茂傳昭元年擊魏皮氏未拔去且之齊出關遇蘇子代也代傳侍燕太子質於齊將適秦曰君聞夫江上之處女乎女在室者蘇子曰不聞曰夫江上之處女有家貧而無燭者處女相與語欲去之遣之使去家貧無燭者將去矣謂處女曰妾以無燭故常先至掃室布席何愛於餘明之照四壁者幸以賜妾何妨於處女妾自以為有益於處女何為去我處女相語以為然而留之今臣不肖棄逐於秦而出關願為足下掃室布席幸無我逐也蘇子曰善請重公於齊乃西說秦王曰甘茂賢人非恒士也恒常也其居秦累世重矣茂事惠武昭三王自殽谿谷地形險易盡知之彼若以齊約韓魏反以謀秦是非秦之利也秦王曰然則奈何蘇代曰不如重其贄集韻贄與摯通握持也言多持物往遺之厚其禄以迎之彼來則置之槐谷扶風有槐史云鬼谷注在陽城補曰按史谿鬼槐谷並作鬼谷故前則徐注在陽城後則劉伯莊云在關内雲陽皆不明按姚引後語注槐里之谷今京兆始平之地作鬼谷大非終身勿出代知茂必留齊故言此爾不為茂游說也正曰代以此言激秦王與之上卿以相迎之使齊亦重茂豈非游說也天下何從圖秦秦王曰善與之上卿以相迎之齊迎之於齊補曰姚注錢作以相印迎之甘茂辭不往蘇子元作秦秦補曰姚氏云一作代按史同偽為補曰偽為二字疑是為謂盖上卿之事誠有何得言偽為一本作謂齊補補曰姚氏云一作偽為齊閔王王閔曰甘茂賢人也今秦與之上卿以相迎之茂德王之賜故不往願為王臣今王何以禮之王若不留必不德王彼以甘茂之賢得擅用强秦之衆則難圖也齊王曰善賜之上卿命而處之命猶入命之命茂傳有補曰列女傳齊女徐吾與鄰婦合燭夜績辭亦相𩔖史通謂游士假設之辭遽以名字加之者獻則楚人為芊戎游說者謂公孫消秦人曰公大臣之尊者也數伐有功伐戰伐所以不為相者太后宣太后不善公也芊元作卒下同辛補曰當作芊下同戎者太后之所親也穰侯傳后同父弟芊戎為華陽君凡芊皆楚人今亡於楚在東周戎時未入秦知為昭王初也公何不以秦楚之重資而相之於周乎使為周相楚必便之矣戎雖以罪去楚楚既與秦共資之必為楚用故楚利之是辛芉戎有秦楚之重太后必說公公相必矣三國攻秦入函谷魏記哀二十一年與齊韓共攻秦此九年也正曰哀當作襄秦王謂樓緩趙人見穰侯傳此九年相秦而免曰三國之兵深矣寡人欲割河東而講大河之東非地名補曰講媾通說見前對曰割河東大費也免元作勉補曰䇿免勉通姚本正作免於國患大利也此父兄之任也謂公族王何不召公子他元作池下同此書多作他池正曰池即他且當從本文而問焉王召公子他池而問之對曰講亦悔不講亦悔王曰何也對曰王割河東而講三國雖去王必曰惜矣悔其失地三國且去吾特以三城從之此講之悔也王不講三國入函谷咸陽必危咸陽秦都扶風渭城也補曰大事記山南曰陽水北亦曰陽其地在渭水之北猶之諸山之南故曰咸陽王又曰惜矣吾愛三城而不講此又不講之悔也王曰鈞吾悔也鈞均同平也寧亡三城而悔無危咸陽而悔也寡人决講矣决斷也猶必卒使公子他池以三城講於三國三國補此二字補曰宜復有三國二字之兵乃退緩時相秦對以池之言豈為侵官哉而曰此父兄之任焉用彼相矣補曰緩之不自言池以兩悔言皆箝其主之術也周䇿韓慶為西周說薛公令臨函谷而無攻楚割東國以與齊而秦出楚王以為和薛公從之會公子池來媾遂罷兵大事記說見彼章當㕘觀按三城者武遂與韓封陵與魏齊城與齊武遂封陵在河東齊城無考事在年表秦昭九年下十一年書韓與齊魏擊秦與我武遂大事記謂即此年事誤分也通鑑綱目通以為樓緩公子池之對者誤薛公田文為魏謂魏冉曰文聞秦王欲以吕禮收齊收猶取也禮時相齊親禮所以取齊昭十三年禮奔魏其相齊見周䇿及孟嘗傳後至十九年歸秦明年齊伐宋伐宋後文乃相魏此事合在禮歸秦之前此時文未相魏其言為魏意親之矣正曰失考辯並見周䇿以濟天下君必輕矣齊秦相聚以臨三晉禮必并相之相齊及秦是君收齊以重吕禮也齊免於天下之兵其讎君必深齊讎冉也欲得陶故故下章曰攻齊不成陶為鄰恤然齊未免於兵亦不敢爾正曰齊無兵患則可以肆志於冉與秦得天下則伐齊深文意同但言其事理當爾君不如勸秦王令敝邑薛也文以此十三年奔薛卒攻齊之事齊破文請以所得封君齊破晉强晉謂魏秦王畏晉之强也必重君以取晉文親魏而重冉故欲取晉必重冉齊與晉敝邑薛雖文舊封而屬齊齊破畏魏且取薛予魏而不能支秦魏得薛秦必害之而魏實弱不能當秦晉必重君以事秦是君破齊以為功採晉以為重也補曰姚本操晉是採字訛義不通破齊定封而秦晉皆重君若齊不破吕禮復用禮雖亡秦之齊秦方以禮收齊則復親之今齊不破是秦收齊之功遂也禮為有功於秦秦必用之并相齊秦也子必大窮矣冷向髙注秦人今詳為齊人正曰髙注秦臣韓趙䇿亦有此人謂秦王曰向欲以齊事王使攻宋也宋破晉國危安邑王之有也晉國大梁也宋在其東宋破則梁危安邑屬河東近秦梁危則秦可取安邑燕趙惡齊秦之合必割地以交於王矣齊必重於王秦多得地齊畏其强故重之則向之攻宋也且以恐齊而重王燕趙交於秦故齊必恐王何惡向之攻宋乎惡皆去音向以王之明為先知之言秦自知攻宋之利故不言謂穰侯曰為君慮封謀所以定其封苦元作若若補曰此連下有缺誤於除宋罪重齊怒宋齊所惡也故除宋罪則齊怒齊怒則冉之封不定故以為苦除解免也須殘伐亂宋德强齊定身封此亦百世之一時已補曰須殘字有衍誤趙䇿作宋罪重齊怒深殘伐亂宋云云又作宋之罪重齊之怒深殘亂宋云云凡兩見彼言為奉陽君定封說見陂䇿也姚本之時已謂魏冉曰楚破秦秦補正曰秦下宜復有秦字不能與齊懸衡矣懸衡輕重等也此言秦輕於齊秦三世積節於韓魏節猶事也言累有戰伐之事正曰劉辰翁云積往來之節也而齊之德新加加於韓魏與衍齊字正曰此與亦作焉齊秦交爭韓魏韓補魏東聽謂聽齊正曰姚本齊秦交爭韓魏東聽自通則秦伐矣齊有東國之地方千里楚包九夷補曰索隐云屬楚之夷又方千里南有符離之塞屬沛北有甘魚之口未詳疑為濟隂髙魚正曰王應麟云鮑說非左氏昭十三年傳次于魚陂注竟陵縣城西北甘魚陂權懸宋衛言較其輕重宋衛乃當阿甄耳莊十三年注阿今濟北東阿齊之阿邑甄屬濟隂莊十四年會于鄄史作甄此言二國如齊邑爾補曰鄄本濮州鄄城利有千里者二謂齊楚正曰恐非此句正指楚富擅越𨽻越勾踐國𨽻猶禮之秋官肆𨽻征伐所獲之民也擅專有之事正曰越有三皆屬楚𨽻徒𨽻賤稱此言楚之强秦烏能與齊懸衡韓正曰此句與䇿首不同當與上權懸宋衛為比一本權懸韓魏者是支分字上或缺楚字如此義乃欠通支分方城膏腴之地支言細散取之腴腹肥也言肥沃如之以薄鄭薄猶迫也鄭屬長安在秦漢之間正曰西都咸林鄭舊封去方城逺新鄭滎陽是時已為韓䇿凡言鄭者韓也兵休復起足以傷秦不必待齊五國罷成臯屬河南詳見趙䇿惠文十二年此二十一年也史不書補曰臯姚本作睪前漢志成臯故虎牢亦名制左傳所謂巖邑也正義引括地志云成臯故縣在洛州汜水縣西南汜音似秦王欲為成陽君以趙魏䇿知為韓人此十七年入朝時在其國求相韓魏韓魏弗聽秦太后宣為魏冉冉后弟時主五國之成后恐成陽害其事故為之言謂秦王曰成陽君以王之故窮而居於齊今王見其逹而收之亦能翕其心乎翕猶收也言收之晚王曰未也太后曰窮而不收逹而報之恐不為王用且收成陽君失韓魏之道也其窮在齊亦必韓魏所惡秦取楚漢中再戰於藍田大敗楚軍韓魏聞楚之困乃南襲至鄧楚王引歸後三國齊韓魏謀攻楚恐秦之救也或說薛公可發使告楚曰今三國之兵且去楚楚能應而共攻秦雖補曰姚氏本章首有此六十六字藍田屬京兆豈難得哉此䇿上有脫簡葢三國攻楚楚求秦救薛公時在魏說者欲使薛公遣使之楚告以舍楚攻秦以疑秦使不救楚此言三國既舍楚攻秦藍田可得也况於楚之故地藍田秦近邑也尚可得而况楚地謂秦且以漢中予楚楚疑於秦之未必救己也而今三國之辭云元作去三國攻楚史不書辭云上所言者也去補曰當作云則楚之應之也必勸勸樂之也言樂從從三國攻秦此一說也是楚與三國謀出秦兵矣出兵敵三國也其謀自楚秦為知之必不救也三國疾攻楚楚必走秦以急趨秦告急補曰姚注一本以下有告字秦愈不敢出畏三國也此又一說則是我離秦而攻楚也我三國也離言絶其交兵必有功薛公曰善遂發重使之楚楚之應之果勸於是三國併力攻楚楚果告急於秦秦遂不敢出兵大衍臣字臣補曰姚氏云曾作勝髙注亦作大勝有功此章應屬齊若魏然附之齊則薛公時在魏附之魏則無薛公事以其事不完不明而齊魏無所適屬也故次之此正曰秦惠王後十三年取楚漢中非薛公在魏時事鮑不見脫簡文故其說妄謬而次之此薛公入魏而出齊女魏公子負芻之母薛公惡齊故逐之韓春謂秦王曰王何不取為妻以齊秦刦魏刦刼同則上黨秦之有也此上黨屬魏齊秦合而立負芻負芻立其母在秦則魏秦之縣也言負芻以母故必事秦已珉元作民下同字書無之而韓呡韓䇿作珉今並從之此魏人也正曰已字句今連作已珉非呡珉䇿字通恐即韓呡也呡欲以齊秦而困薛公爭魏權故補曰一本欲以齊秦刼魏而困薛公佐欲定其弟佐負芻庻兄也定定其立臣請為王因珉與佐也因二人可以刼魏困薛魏懼而復之反齊女負芻必以魏殁世事秦齊女入魏而怨薛公終以齊奉事王矣齊女德秦而齊其父母國也齊又與薛公隙故女能得之以事秦謂魏冉曰和不成與趙和秦也此二十七年白起擊趙因伐光狼正曰無考兵必出白起者復將戰勝必窮公不勝必事趙從公公又輕不能窮冉故從冉而和然先和則冉重今不勝而和故輕公不若毋多謂專志於和毋他務也則疾到趙歸我也此盖冉欲和而起欲戰也起冉所薦其言窮公起字不爾補曰語不可曉有缺誤姚云到恐封陘山之事穰侯傳魏背秦與齊從親秦使穰侯攻趙韓魏於華陽下且益趙以兵伐齊則此役也陘山在宻後志注云史記秦破魏華陽地亦在縣則此䇿書陘山史書華陽一役也事在三十四年正曰大事記華陽之役秦救韓而擊趙魏年表列傳或云得三晋將或云攻趙韓魏皆記者之誤按大事記赧王四十一年魏背秦與齊從親秦魏冉伐魏㧞四城明年趙魏伐韓秦魏冉救韓敗趙魏且與趙觀津益趙以兵伐齊𥙷曰陘山是前大事記華陽亭多在宻陽趙且與秦伐齊齊懼令田章以陽武屬河南此時屬齊正曰此指開封陽武非齊地當考合於趙而以順子為質齊公子趙王惠文喜乃按兵告於秦曰齊以陽武賜敝邑而納順子欲以解戈敢告下吏不斥王故言告吏秦王使公子他之趙謂趙王曰齊與大國救魏而倍約齊背二國不可信恃大國不義趙以齊倍之為不義以告敝邑告以伐齊而賜之二社之地邑皆有社二社二邑也正曰未詳戰國之制以奉祭祀今又按兵且欲合齊而受其地非使臣之所知也請益甲四萬大國裁之蘇代為齊獻書穰侯曰臣聞往來者之元作之者之者補曰宜作者之史無之字姚注錢劉一作往來之言者言曰秦且益趙甲四萬人以伐齊臣竊必之敝邑之王必者意其然王襄王曰秦王明而熟於計穰侯智而習於事必不益趙甲四萬人以伐齊是何也夫三晉相結秦之深讎也三晉百背秦百欺秦不為不信不為無行今破齊以肥趙趙秦之深讎此二十七年敗趙取代光狼不利於秦一也秦之謀者必曰破齊敝晉此晋趙也以趙破齊齊破趙亦敝而後制晉楚之勝二國破敝秦無後慮可以南制楚夫齊罷國也罷疲同以天下擊之譬猶以千鈞之弩潰癰也補曰史作决潰癰秦王安能制晉楚哉夫能制人必其威武足以屈人今攻罷國勝之非武也安能制人二也秦少出兵則晉楚不信不信其伐齊多出兵則晉楚為制於秦齊恐則不走於秦且走晉楚兵多則非獨齊見制懼晉楚亦見制齊畏秦故不趨秦而與晉楚同患故趨晉楚三也齊割地以實晉楚則晉楚安齊舉兵而為之頓劍二國惡秦而齊先伐故既合則齊為二國出兵頓下也此以小言之則秦反受兵四也是晉楚以秦伐齊晉亦趙也初與秦伐齊以齊破秦為之頓劍是也何晉楚之智而齊秦之愚五也秦得安邑此攻華陽時得之安邑魏地亦屬韓猶上黨兩屬也白起傳取韓安邑正曰按起傳取韓安邑以東到乾河在取魏滅六十邑前一年昭王之十七年也索隐云韓故地又魏以安邑入秦在昭王二十一年恐非此時得之善齊以安之亦必無患矣秦有安邑則韓魏必無上黨哉言可取夫取三晉之腸胃安邑上黨如之與出兵而懼其不反也孰利故臣竊必之敝邑之王曰秦王明而熟於計穰侯智而習於事必不益趙甲四萬人以伐齊矣穰侯傳有補曰於是穰侯不行引兵而歸字為齊為之之為使臣之使兩走並去聲秦客卿造造其名謂穰侯曰秦封君以陶冉别封也越記注陶今濟隂定陶補曰說見趙䇿藉君天下借以制天下之權數年矣攻齊之事成陶為萬乗國大也長小國以朝天子補曰姚本率以朝天下必聽五霸之事也攻齊不成陶為鄰恤言近於憂而莫之據也無援國可恃正曰言攻齊不成功則陶且有為鄰國得之之憂故攻齊之於陶也存亡之機也君欲成之何不使人謂燕相國曰聖人不能為時時天時非人所能為時至而失補曰姚本時至而弗失舜雖賢不遇堯也不得為天子湯武雖賢不當桀紂不王故以舜湯武之賢不遭時不得帝王今攻齊此君之大時也已得時之利無大於此因天下之力伐讎國之齊報惠王之耻田單破燕燕惠王之初成昭王之功燕昭二十八年樂毅伐齊入臨淄三十二年下齊七十餘城明年田單復之補曰惠王字疑有誤且不當在昭王前除萬世之害此燕之長利而君之大名也君謂燕相詩云樹德莫如滋滋益也除害莫如盡逸詩補曰泰誓樹徳務滋除惡務本姚本作書云吳不亡越越故亡吳齊不亡燕燕故亡齊齊閔八年蘇代為齊說燕噲讓子之燕幾亡矣而不卒攻故有樂毅臨淄之役正曰齊宣二十七年注讓子之下宣云於是燕亂齊伐之云云齊亡於燕吳亡於越此除疾不盡也非以元作以非以非正曰以非至之害句或以已字通屬上句上下文兩有此此時也成君之功除君之害秦卒有他事卒猝同而從齊齊秦元作趙趙合其讎君必深矣挾君之讎讎謂齊以誅於燕使燕誅相後雖悔之不可得也已君悉燕兵而疾攻元作僣僣正曰字誤當作從下文可證之天下之從君也若報父子之仇誠能亡齊封君於河南亦河之南非郡此盖寓封為萬乗達途於中國南與陶為鄰世世無患願君之專志於攻齊而無他慮也補曰後為萬乗之為去聲頃襄王二十年秦白起拔楚西陵或拔鄢郢夷陵燒先王之墓王徙東北保於陳城楚遂削弱為秦所輕於是白起又將兵來伐楚人有黄歇者遊學博聞襄王以為辯故使於秦說昭王曰天下莫强於秦楚今聞大王欲伐楚此猶兩虎相鬬而駑犬受其敝不如善楚臣請言其說臣聞之補曰姚氏云此叚首有缺文史記新序後語皆有之文亦小異今以後語補案此當下接物至云云而章首說秦王曰四字已在此段内當為衍文說秦王曰按史此春申君未封時書在擊芒卯後此三十四年也補曰說已見上物至而反至猶極冬夏是也致至而危致言取物置之物上累棊是也今大國之地半天下有二垂邊陲此從生民以來萬乗之地未嘗有也先帝尊稱之耳時未為帝文王惠文王非孝文武元作莊莊王按史秦輕楚頃襄王歇乃上書說秦昭王則史與此䇿書此為莊王謬也補曰莊當作武王之身三世而不接地於齊不與通也以絶從親之要要約也今王使成橋秦人補曰劉伯莊云橋音矯守事於韓守猶待成橋已元作以正曰以已通以北入燕使燕入朝於秦補曰史作盛橋以其地入秦為是新序同此言韓入地下言取魏地也是王不用甲不伸威而出百里之地出言割地燕入秦必割地予秦秦使之出也王可謂能矣王又舉甲兵而攻魏社補曰姚本作杜是大梁之門舉河内屬司𨽻正曰正義云即懐州也在河南之北西河之東東河之西拔燕酸棗虛桃人燕南燕屬東郡酸棗屬陳留徐注始皇五年取酸棗燕虛又蘇代曰决宿胥之口魏無頓丘按此則虚魏地也桃人史作桃注燕縣有桃城今按任城有桃聚補曰燕張儀傳注滑州胙城縣酸棗正義云故城在渭州酸棗縣此古酸棗縣南虚正義云謂殷虚今相州所理大事記解始皇紀引正義云姚虚在濮州雷澤縣東二地不同按髙注作虚文協楚燕之兵補曰史作魏之兵意此上皆魏地當作魏之兵不然燕楚以來援者言之雲翔而不敢校雲翔散也語注包曰校報也正曰爾雅其飛也翔注布翅翺翔按翔有髙起貌漢書言翔貴古人每言髙翔王之功亦多矣王休甲元作申無休字今從史申正曰史文雖順此作重義自通息衆二年然後復之又取蒲衍首垣河東蒲阪注故蒲蘇代曰北有河外卷衍注不地今按屬魏故魏地書拔我首垣蒲陽衍而張儀說魏王秦據卷衍又南陽有杜衍垣元作恒河東有首山首垣正曰徐廣及索隱皆云此蒲在衛之長垣蒲鄉索隠云衍在河南與卷近即長正義云屬鄭州恒姚本作垣索隠云首盖牛首垣垣非河東之垣也長垣開封縣以臨仁兵臨之仁地缺平丘元作兵兵補曰當從史文作丘小黄濟陽嬰城地並屬陳留嬰猶縈也葢二邑環兵自守補曰按燕䇿决白馬之口魏無黄濟陽史作外黄正義云故黄城在曹州考城縣東濟陽故城在曹州寃朐縣西南大事記云水經注河水舊在白馬縣南泆通黄溝趙世家拔魏黄城正義引括地志云故黄城在魏州冠氏縣南十里因黄溝為名舊注陳留外黄者非而魏氏服矣王又割濮周紀注在江河之南楚紀注建寧邵南有濮夷磨之北後志當陽縣注荆州記沮水西有磨城子胥所造正曰江漢南之濮乃書所謂彭濮之濮沮水磨城逺不相涉下文北屬之燕可見濮即衛之濮上水出東郡濮陽南入鉅野者也索隠云磨地近濮按史表有磨侯程黒索隠云表作歴歴縣在信都地邑並無磨愚按此字作磨與歴通猶樂毅書磨室之𩔖新序正作濮歴則其字甚明屬之燕斷齊秦之要絶楚魏之脊天下五合六聚而不敢救也王之威亦憚矣補曰憚史作殫是新序同殫盡也王若能持功守威省攻伐之心而肥仁義之誡髙注肥猶厚地猶道則此誡字元作地也補曰守威疑守成史誡作地新序同姚氏云一本作誠使無復後患三王不足四五霸不足六也王若負人徒之衆恃元作材史作仗材補曰姚云一本無甲兵之强一元作壹壹補曰史作乗新序同毁魏氏之威前勝魏有威矣今自挫毁不持守也正曰從乗字義明而欲以力臣天下之主臣恐有後患詩云靡不有初鮮克有終易曰狐濡其尾未濟注小狐不能涉大川雖濟而無餘力將濡其尾不能終也此言始之易終之難也何以知其然也智氏見伐趙之利而不知榆次之禍也榆次屬太原智伯葬處正曰索隱云敗于榆次正義云屬并州縣吳見伐齊之便而不知干隧之敗也干隧吴地蘇秦春申傳並不注道應注干隧在臨淮豈此耶盖或越王逐北至是正曰正義云出萬安山西南一里太湖即夫差自剄處在蘇州吳縣西北四十里此二國者非無大功也没元作設補曰姚云劉本作没利於前没猶溺而易補曰易音亦前之利易後之患也患於後也吳之信越也從而伐齊遂攻齊人於艾陵補曰艾陵在兖州博逺縣還為越王禽於三江之浦禮揚州其川三江浦水濱也髙注即干隧正曰書蔡傳婁江東江松江也智氏信韓魏從而伐趙攻晉陽之城勝有日矣其日可期韓魏反之殺智伯瑤於鑿臺之上史注在榆次今王妬楚之不毁也謂無傷而忘毁楚之强魏也楚毁不能侵之故强考下文宜有韓字補曰史作韓魏新序同臣為大王慮而不取補曰取下有也字文順詩云大武逺宅不涉逸詩武足迹宅猶居也言地之居逺者雖有大足不涉之也正曰威武之大者逺安定之不必涉其地也從此觀之楚國援也鄰國敵也詩云他人有心予忖度之躍躍毚兎遇犬獲之大雅巧言詩忖亦度也躍躍走也毚狡也言兎雖善走或時遇犬犬能得之人心難知或可忖度補曰躍天力反今王中道而信韓魏之善王也中道在前後間此正吴信越也臣聞敵不可易時不可失臣恐韓魏之卑辭慮患以慮患故卑辭而實欺大國也王既無重世之德於韓魏重猶累而有累世之怨焉夫補曰姚本之怨矣無焉夫字韓魏父子兄弟接踵而死於秦者百世矣補曰百世史作將十世新序同髙注百一作累本國殘社稷壊宗廟隳刳腹拆頥頷也首身分離暴骨草澤暴日乾也頭顱僵仆顱首骨僵僨仆倒也相望於境父子老弱係虜相隨於路係纍為虜虜獲也鬼神狐祥狐之為妖者正曰史狐傷是新序作潢洋三字楚辭後語注潢户廣反洋音養無所食無人為之依也百姓不聊生族𩔖離散流亡為臣妾男為人臣女為妾滿海内矣韓魏之不亡秦社稷之憂也今王之攻楚不亦失乎且王攻楚之日則惡出兵惡安也王將藉路於仇讎之韓魏乎兵出之日而王憂其不反也是王以兵資於仇讎之韓魏必攻隨陽右壤補曰一本隨陽右壤疊一句新序同陽作水索隠云楚都陳隨水之右壤盖在隨之西今鄧州之西多山林者是也此皆廣川大水山林谿谷不食之地王雖有之不為得地是王有毁楚之名無得地之實也且王攻楚之日四國必衍應字應補曰姚云一本無史同悉起應王齊趙韓魏也方言南攻故不及燕應言以兵從之盖躡秦也秦楚之兵補補曰史之下有兵字搆而不離魏氏將出兵而攻留屬楚國方與方與胡陵屬山陽銍胡陵碭蕭相碭屬梁國餘屬沛故宋必盡七國故皆宋地齊人南面泗北必舉濟隂乗氏注泗水入淮魯國卞縣注入沛補曰書蔡傳泗水出魯國卞縣桃墟西北陪尾山四源俱導因名西南過彭城又東南過下邳入淮卞今泗水縣此皆平原四逹膏腴之地也而王使之獨攻秦與楚戰不暇救七邑及泗北二國攻之兵勢無所分也王破楚於以肥韓魏於中國而勁齊補曰姚云劉本以上無於字楚史新序同韓魏之强足以校於秦矣校較同直也言與之敵而齊南以泗為境東負海負與抱反背也北倚河而無後患天下之國莫强於齊齊魏得地葆利葆保同而詳事不吏事猶治補曰不吏姚本下吏是詳其事以下於吏慎重之意應上葆利言一年之後為帝若未能於以禁王之為帝有餘禁也制夫以王壤土之博人徒之衆兵革之强而注地於楚注猶屬言地廣正曰注㵼之注補曰史作樹怨於楚新序同姚本一舉衆而注地詘令韓魏詘猶反正曰魏句屈命令於韓魏歸為帝之重於齊言齊韓魏皆强而齊尤甚也歸帝重於齊是王失計也臣為王慮莫若善楚秦楚合而為一以臨元作臨以補曰姚云劉本作以臨韓韓必受首言其服而請誅王襟以山東之險蔽障如襟帶以河曲之利圍繞如帶韓必為關中之候比之候吏若是王以十萬補補曰史十下有萬字是新序同戍元作成成補曰史作戍是新序作伐鄭梁氏寒心戰懼則然許鄢陵並屬潁川嬰城上蔡召陵並屬汝南不往來也韓魏不通補曰史上蔡上有而字新序同從此則上以嬰城句如此而魏亦關内候矣王一善楚而關内二萬乘之主注地於秦元作齊齊補曰當作秦齊之右壤可拱手而取也拱歛手是王之地一經元作任任補曰史作經是兩海東南正曰索隠云西海至東海要絶天下也要謂中是燕趙無齊楚齊楚補此二字補曰宜從史叠齊楚字是新序同無燕趙也然後危動燕趙以危亡之事恐動之持齊楚持刼之也補曰史直摇齊楚新序同通鑑綱目從之此四國者不待痛而服矣痛言攻伐之酷春申傳有補曰史昭王曰善於是止白起而謝韓魏發使賂楚約為與國惡音烏重世之重平聲藉音借方與音房預為王之為去聲段産秦人謂新城君韓襄十二年注芊戎也曰夫宵行者能無為奸而不能令狗無吠已今臣處郎中郎廊同漢官表注主廊内諸官正曰廊字通作郎不謂郎為廊郎中令秦官郎乃其屬此注在郎中令下非郎職也大事記謂是時郎中職已親近能無議君於王而不能使人毋議臣於君願君察之也元在韓䇿魏昭䇿白圭語同正曰見下段干越人凡段干皆魏人今在秦補曰史注段干魏邑路史段干李姓邑初邑段後邑干因邑而氏謂新城君曰王良之弟子駕良趙簡子御駕馬在車下負軌云取千里其言然馬遇造父之弟子造父周穆王之御不得與王良同時然學出於造父者得稱為其弟子非必與之同時也造父之弟子曰馬不千里不能然王良弟子曰馬千里之馬也服千里之服也駕車馬四兩服在中央夾轅兩驂在旁見太叔于田言馬言服馬豈驂邪而不能取千里何也曰子纆牽長纆索也以牽馬故纆牽於事萬分之一也而難千里之行今臣雖不肖於秦亦萬分之一也而相國見臣戎未嘗相以其傳國事稱之不釋塞者言障之於下不解是纆牽長也亦在韓䇿詳二臣之言則戎之寵少衰矣故范雎得而間之正曰上章為議己者言下章言相國之短於用已皆不見芊戎寵衰之意為秦亦無明徴當從舊次難去聲范子名睢字叔後封應侯凡范皆晉舊姓故史云魏人補曰睢音雖因王稽秦謁者令時使魏還入秦獻書昭王曰臣聞明主莅正史作政字通有功者不得不賞有能者不得不官勞大者其禄厚功多者其爵尊能治衆者其官大故不能者不敢當其職焉能者亦不得蔽隠使以臣之言為可則仃而益利其道利猶逹若將弗行則久留臣無謂元作為為也語曰人主補曰姚云後語作庸主史同賞所愛而罰所惡明主則不然賞必加於有功刑必斷於有罪今臣之胸不足以當椹質集韻椹斫木鑕鑕鐵椹質鑕同要不足以待斧鉞鉞亦斧也豈敢以疑事嘗試於王乎嘗亦試也雖以臣為賤而輕辱臣獨不重任臣者後無反覆於前者耶得任人必保其後後不如言則為反覆此任人者所重也王豈得輕之補曰姚本反覆於前王臣聞周有砥厄宋有結禄梁有懸黎楚有和璞卞和之璞皆美玉名此四寶者工之所失也失謂不能别之故卞和三刖也而為天下名噐然則聖王之所棄者獨不足厚國家乎厚言使之重臣聞善厚家者取之於國善厚國者取之於諸侯皆取其人天下有明主則諸侯不得擅厚矣是何也為其凋榮也凋傷也榮草華也此喻厚重彼有擅之則比無有良醫知病人之死生聖主明於成敗之事利則行之害則舍之疑則少嘗之雖堯舜禹湯復生弗能改已補曰睢云聖主明於成敗之事而曰疑則少嘗之語既反覆又引舜禹舜禹豈嘗疑事者哉所謂游士之言語之至者臣不敢載之於書其淺者又不足聽也意者臣愚而不闔於王心耶闔合同補曰闔史作概索隠引䇿作關亡元作已補曰姚云已錢作亡史同其言臣者亡其猶得亡補曰亡其猶亡乃將賤而不足聽耶非若是也則臣之志絶句正曰史自非然者臣願云云按自非然者即䇿非若是也臣願即䇿則臣之志願云云志字句絶雖竒非文義願少賜游觀之間間暇隙也望見足下不斥王故指其足下之人猶陛下也而入之書上秦王說之因謝王稽說且謝且說說其未用之故正曰謝其得人而說其欲見之意姚云一本無說字史同使人持車召之睢傳有補曰為其之為去聲說之之說音恱范睢至秦王庭迎范雎曰補曰一本謂范睢寡人宜以身受令乆矣今者義渠之事急盖修李帛之怨補曰大事記赧王四十四年秦滅義渠漢匈奴傳秦昭王時義渠戎王與宣太后亂有二子太后詐殺王於甘泉寡人日自請太后今義渠之事已寡人乃以身受命躬竊閔然不敏閔猶傷敏疾也自傷其見睢之晚敬執賔主之禮范睢辭讓是日見范睢見者下見賢遍反無不變色易容者秦王屏左右博雅屏除也此謂去之宫中虛無人秦王跪而進曰先生何以幸教寡人以教之為寵范睢曰唯唯有間間隙也正曰間猶頃也孟子為間如字秦王復請范睢曰唯唯若是者三秦王跽曰跽長跪也先生不幸教寡人乎范睢謝曰非敢然也臣聞始時吕尚之遇文王也身為漁父而釣於渭陽之濵耳渭水出隴西首陽此渭水之陽詩在咸陽之地補曰正義引吕氏春秋云太公釣於兹泉酈道元云磻溪中有兹泉水源出岐州岐山縣西南凡谷北流十二里注于渭若是者交䟽也絶句已一說而立為太師載與俱南補曰姚本無南字史同歸者其言深也故文王果收功于吕尚卒擅天下而身立為帝王即使文王䟽吕望而弗與深言是周無天子之德而文武無與成其王也今臣覉旅之臣也交䟽於王而所願陳者皆匡君臣之事處人骨肉之間處猶在也謂欲言太后及穰侯等願以陳臣之陋忠而未知王心也所以王三問而不對者是也臣非有所畏而不敢言也知今日言之於前而明日伏誅於後然臣弗敢畏也大王信行臣之言死不足以為臣患亡不足以為臣憂漆身而為厲言賴惡疾也補曰豫讓傳索隠云凡漆有毒近之者多患瘡腫若癩然故以漆塗身令若癩然厲賴音近古多借被髪而為狂不足以為臣耻五帝之聖而死三王之仁而死五霸之賢而死烏獲之力而死秦紀烏獲武王力士然自孟子時稱之則其以力聞乆矣奔育之勇而死史注孟奔夏育皆勇士育之力能舉千鈞補曰皆衛人死者人之所必不免處必然之勢可以少有補于秦此臣之所大願也臣何患乎伍子胥橐載而出昭關楚關名補曰後語注云韋橐夜行而晝伏至於菱夫地缺正曰姚本作菱求索隠云即溧水無以餌其口坐行蒲服匍匐同飢困故乞食於吳市胥傳在丹陽溧陽卒興吳國闔閭為霸使臣得進謀如伍子胥加之以幽囚不復見是臣說之行也臣何憂乎箕子接輿髙士傳楚人陸通字接輿漆身而為厲被髪而為狂無益於殷楚使臣得同行於箕子接輿漆身補曰姚本一本無此二字可以補所賢之主是臣之大榮也二子無補于時猶為之今為而有補故特以為榮正曰接輿固辟世之士箕子之心豈睢所能知鮑順文為說謬矣臣又何恥乎臣之所恐者獨恐臣死之後天下見臣盡忠而身蹷也蹷僵也是以杜口裹足莫肯即秦耳即就也補曰即一作鄉足下上畏太后之嚴下惑奸臣之態居深宫之中不離保傅之手女保女傅非大臣也終身闇惑無與照奸大者宗廟滅覆小者身以孤危此臣之所恐耳若夫窮辱之事死亡之患臣弗敢畏也臣死而秦治賢於生也秦王跪曰先生是何言也夫秦國僻逺寡人愚不肖先生乃幸至此此天以寡人慁先生慁溷同亂也濁貎而存先王之廟也寡人得受命于先生此天所以幸先王而不棄其孤也先生奈何而言若此事無大小上及太后下至大臣願先生悉以教寡人無疑寡人也范睢再拜秦王亦再拜范睢曰大王之國北有甘泉谷口文紀注在雲陽雲陽屬馮翊南帶涇渭涇水出安定涇陽右隴蜀隴西有隴坻即隴阪戰車千乗奮擊百萬以秦卒之勇車騎之多以當諸侯譬若施韓盧俊犬名博物志韓有黑犬名盧而逐駑兎也駑言其不俊補曰姚本施作馳駑作蹇史同霸王之業可致今反閉關補補曰史閉下有關字姚云李善引同而不敢窺兵於山東者是穰侯為國謀不忠而大王之計有所失也王曰願聞所失計雎曰大王越韓魏而攻强齊非計也少出師則不足以傷齊多之則害於秦臣意王之計以意測之欲少出師而悉韓魏之兵則失義義宜也已少出師而使人悉出非宜也今見與國之不可親與謂韓魏越人之國而攻可乎䟽於計矣昔者齊人伐楚閔二十三年敗楚重丘大有功正曰十二年戰勝破軍殺將再辟千里辟拓地也膚寸之地無得者集韻側手曰扶通作膚春秋傳膚寸而合豈齊不欲地哉形弗能有也諸侯見齊之罷露罷疲同在野曰露君臣之不親舉兵而伐之魏昭十二年與秦趙韓燕伐齊敗之主辱軍破為天下笑所以然者以其伐楚而肥韓魏也此所謂藉賊兵而齎盗食者也王不如逺交而近攻補曰逺交近攻秦卒用此術破諸侯并天下得寸則王之寸得尺亦王之尺也今舍此而逺攻不亦謬乎且昔者中山元作山中山中補曰當作中山之地方五百里趙獨擅之武靈二十七年亡中山功成名立利附焉元作則今從史則補曰恐當從史作焉天下莫能害此言近攻之利今韓魏中國之處而天下之樞也言出入來往所由王若欲霸必親中國而以為天下樞以威楚趙趙强則楚附楚强則趙附言雖不能兼制必有一附楚趙附則齊必懼懼必卑辭重幣以事秦齊附而韓魏可虛也可使為丘虛王曰寡人欲親魏魏多變之國也寡人不能親請問親魏奈何范雎曰卑辭重幣以事之不可削地而賂之不可舉兵而伐之彪謂逺交近攻雎之䇿當矣語未卒而復欲親之既親之又欲伐之立談之間矯亂如此使人主何適從乎若曰某䇿為上某次之其可也正曰大事記親魏者豈誠愛魏哉孤韓黨耳於是舉兵而攻邢丘在河南平臯補曰史廩丘郪丘即邢丘也正義云漢置平臯縣在懐州武德縣也邢丘拔四十一年夏取邢丘而魏請附曰雎復說也秦韓之地形相錯如繡秦之有韓若木之有蠧人之病心腹天下有變為秦害者莫大於韓補曰姚本此下有王不如收韓一句王曰寡人欲收韓韓補補曰姚云錢本有史同不聽為之奈何范雎曰舉兵而攻滎陽屬河南則成臯之路不通北斬太行之道河内山陽唐有此山晉隘也則上黨之兵不下一舉而攻宜陽則其國斷而為三衍魏字補曰宜一本作滎史同是時宜陽之拔乆矣魏補曰字疑衍韓見必亡焉得不聽韓聽而霸事可成也王曰善雎傳有按史拔邢丘在親魏說後二年此三十八年也拔宜陽說亦在拔邢丘前則此邢丘拔要終言之也正曰大事記秦昭王三十六年范雎為客卿三十九年拔懐四十一年拔邢丘史拔邢丘後雎復說攻韓則此自是兩節䇿附載為一章也昭王四十四年攻韓取南陽絶太行道皆行雎之謀也范雎曰臣居山東聞齊之内有田單齊之族屬後為相封安平君史云田文非也文去齊至是已一十餘年不得近舍單逺論文也補曰姚氏云後語亦作文愚謂舉齊事言不必一時不聞其有王聞秦之有太后穰侯涇陽昭王母弟華陽補曰正義云華陽亭名在洛州宻縣故華城在鄭州管城縣南杜注新城宻也故戎又號新城君涇陽雍州縣髙陵屬京兆諱四貴者穰侯涇陽華陽髙陵也史涇陽華陽擊斷無下有髙陵進退不請一句䇿下文出髙陵則此有缺文又走涇陽下姚云曾有華陽字史同不聞其有王夫擅國之謂王擅專也能專利害之謂王制殺生之威之謂王今太后擅行不顧不顧王也穰侯出使不報報猶白也言不白王而擅遣使於外涇陽華陽擊斷無諱擊斷謂刑人無諱言不避王四貴備而國不危者未之有也為此四者下乃所謂無王已然則權焉得不傾而令焉得從王出乎臣聞善為國者内固其威而外重其權穰侯使者操王之重決裂諸侯謂分剖其地剖符於天下剖猶分符信也謂軍符漢制竹長六寸分而相合正曰竹長六寸說文符也漢文紀云郡國守相為銅虎符竹使符索隠云漢書儀銅虎符發兵符使符出入徵發此剖符承上決裂而言謂擅封爵也征敵伐國莫敢不聽戰勝攻取則利歸於陶國敝御於諸侯國謂秦御言為諸侯所制補曰下章利盡歸於陶國之幣帛云云恐字有缺誤戰敗則怨結於百姓而禍歸社稷詩曰木實繁者實木子披其枝披謂裭之正曰披折也普靡反披其枝者傷其心逸詩大其都者危其國此因詩申之也正曰恐此四語皆詩非必逸詩古有此語爾尊其臣者卑其主淖齒楚將楚使救齊因相之管齊之權管猶管𣙜之管專之也縮閔王之筋懸之廟梁宿昔而死集韻宿夜也通作昔事在閔四十年正曰三十年李兊用趙減食主父减主父食百日而餓死趙惠文四年今秦太后穰侯用事髙陵亦昭王母弟涇陽佐之卒無秦王此亦淖齒李兊之𩔖也臣今見王獨立於廟朝矣且臣將恐後世之有秦國者非王之子孫也秦王懼於是乃廢太后逐穰侯出髙陵走涇陽於關外此四十一年補曰按雎傳雎相在昭王四十三年秦紀明年太后薨葬芷陽驪山九月穰侯出之陶是太后初未嘗廢穰侯雖免相而未就國太后葬後始出之陶此辨士増飾非實之辭故大事記從邵氏皇極經世書免魏冉相國奪宣太后權以客卿范雎為丞相封應侯其下書華陽君芊戎王弟涇陽君市出就封華陽盖髙陵别名此書為實綱目書秦君廢其母不治事逐魏冉芊戎公子市公子理云云亦失考昭王謂范雎曰昔者齊公得管仲時以為仲父今吾得子亦以為父雎傳有補曰雎欲言太后穰侯先已摩切秦王王曰上及太后下至大臣願先生悉以之教寡人宜可言矣而且陳逺交近攻之䇿至是始極所欲言此䇿士之深術也史所謂未敢言内先言外以觀秦王之俯仰是矣而乃謂左右多竊聽者雎恐故爾則未然也雎豈不能屏左右言乎應侯謂昭王曰補曰秦紀應亭索隠云在河東臨晋又應為太后養地徐云潁川父城縣應鄉又作大城按括地志之應鄉在汝州魯山縣東後䇿應侯夫韓之汝南說者謂與應鄰則在汝者為是昭王奪太后養地以封雎亦惡矣應於陵反亦聞恒思地缺有神叢與灌木中有神靈托之補曰墨子建國必擇木之脩茂者以為叢位史叢祠索隠云髙誘注云神祠叢樹也今髙注本缺恒思有悍少年請與叢博局戯也六著十二棊曰吾勝叢叢藉我神三日以神靈借我不勝叢叢困我乃左手為叢投班固奕指曰博懸於投不必慧巧駰曰投投瓊右手自為投右强而便欲自取勝正曰尚左尊神也勝叢叢藉其神三日叢往求之遂弗歸五日而叢枯七日而叢亡今國者王之叢勢者王之神藉人以此得無危乎臣未嘗聞指大於臂臂大於股若有此則病必甚矣百人輿瓢而趨負之如輿載物正曰輿載也不如一人持而走疾百人誠輿瓢瓢必裂以爭持者衆今秦國華陽用之穰侯用之太后用之王亦用之不稱瓢為器則已稱猶等也謂比國於瓢稱瓢為器國必裂矣臣聞之木實繁者枝必披枝之披者傷其心都大者危其國臣强者危其王且今邑中自斗食以上漢官表嵗俸不滿百斛計日而食一斗一升至尉内史秦有郡縣有内史郡國官也及王左右有非相國之人者乎相國穰侯國無事則已國有事臣必見王獨立於庭也臣竊為王恐恐萬世之後有國者非王子孫也臣聞古之善為政者其威内扶扶猶持也言不顛仆其輔外布輔謂股肱之臣而元作四四補曰字誤宜作而治政不亂不逆使者直道而行不敢為非今太后使者分裂諸侯而符布天下操大國之勢徵强兵伐諸侯戰勝攻取利盡歸於陶國之幣帛竭入太后之家境内之利分移華陽古之所謂危主滅國之道必從此起三貴竭國以自安據上文不及涇陽髙陵然則令何得從王出權何得母分是衍我字我補曰姚云劉本無此字王果處三分之一也彪謂人君生事之所嚴有母而已范雎說昭王乃以太后為稱首忍哉君子所以進其身豈舍此獨無說乎秦昭王謂左右曰今日韓魏孰與始强對曰弗如也王曰今之如耳魏人正曰髙注韓臣按如姓魏有如姬魏齊魏相孰與孟嘗先時相魏芒卯之賢不言魏人魏亡兵也對曰弗如也王曰以孟嘗芒卯之賢帥强韓魏之兵以伐秦猶無奈寡人何也今以無能之如耳魏齊帥弱韓魏以攻秦其無奈寡人何亦明矣補曰姚本此下有左右皆曰盡然六字中期武王時已出此人至是四十四五年矣堆琴補曰期史作旗說苑申旗史馮琴索隠引後語伏琴韓子堆瑟說苑伏瑟愚謂此記其堆琴而起對猶論語記舍瑟也莊子云孔子堆琴對曰王之料天下過矣料量也昔者六晉之時智范中行韓魏趙晉卿也實分晉國智氏最强滅破范中行又帥韓魏以圍趙襄子於晉陽決晉水出晉陽補曰正義引括地志云晉水出并州晉陽縣西東南流注汾水以灌晉陽城不沈者三版耳版髙二尺智㑑出行水行去音按視也韓康子御魏桓子驂乗徐無鬼䟽在左為驂在右為御智伯曰始吾不知水之可亡人之國也乃今知之汾水利以灌安邑汾水出汾陽屬河東補曰漢志汾水出太原汾陽縣北山至河東汾陽縣入河正義云安邑在絳州夏縣汾水東北歴安邑西河入河髙注安邑魏桓子邑絳水利以灌平陽絳水平陽並屬河東正曰晉遷新田今絳縣謂平陽為故絳正義引括地志云絳水一名白水今名弗泉源出絳山髙注平陽韓康子邑魏桓子肘韓康子不敢正語以肘築之康子履魏桓子躡其踵躡蹈踵跟也肘足接於車上而智氏分矣身死國亡為天下笑今秦之强不能過智伯韓魏雖弱尚賢其在晉陽之下也此乃方其用肘足時也願王之勿易也彪謂此賢人君子之言也人君閒暇宜數聞之魏釐十一年有此四十一年也以在取邢丘下故不可先范雎事正曰秦自孝公商鞅以來政俗彌惡當時動以遺禮義棄仁恩虎狼稱之是以魯連孔順義所不臣盖聖賢之徒之所絶也凡委質於其國者雖有忠言嘉謨皆不得在君子之科秦宣太后愛魏醜夫魏人仕秦太后病將死出令曰為我葬必以魏子為殉以人從葬曰殉魏子患之庸芮秦人正曰髙注臣為魏子說太后曰以死者為有知乎太后曰無知也曰若太后之神靈明知死者之無知矣何為空以生所愛𦵏於無知之死人哉若死者有知先王積怒之日乆矣太后救過不贍何暇乃補曰一無乃字私魏醜夫乎太后曰善乃止后死在四十二年補曰為魏之為去聲秦攻韓圍陘僖四年次于陘注楚地潁川召陵南有陘亭此時屬韓韓桓惠九年秦拔我陘此四十三年也正曰召陵陘亭者陘山也說見前非此陘史韓世家秦拔我陘城汾旁正義云陘故城在絳州曲沃縣西北汾水之旁白起傳作邢丘亦誤大事記據世家為文范雎謂秦昭王曰有攻人者有攻地者穰侯十攻魏而不得補曰姚云得一作能傷者非秦弱而魏强也其所攻者地也地者人主所甚愛也人主者人臣之所樂為死也攻人主之所愛與樂死者鬭故十攻而弗補曰姚本弗下有能字勝也今王將攻韓圍陘臣願王之母獨攻其地而攻其人也王攻韓圍陘以張儀為言儀死至雎之相四十四年矣儀亦未嘗在韓此必誤張儀之力多且割元作削削補曰疑即下文割字地而以自贖於王幾割地而韓不盡張儀之力少則王逐張儀而更與不如儀者市智不如耳非力也則王之所求於韓者盡可得也補曰更平聲此章有舛誤未詳應侯曰鄭人謂玉未理者璞周人謂䑕未腊者朴周人懐朴元作璞璞補曰當作朴過鄭賈曰欲買朴乎鄭賈曰欲之出其朴乃䑕也因謝不取謝辭去也補曰一本出其朴視之乃䑕也說亦見尹文子及漢應奉傳今平原君趙公子勝惠文王弟後相孝成見魏無忌傳自以賢顯名於天下然降其主父沙丘而臣之降貶損之也鉅鹿有沙丘亭趙記不書此未詳正曰趙紀書公子成李兊非平原也平原字必有誤天下之王尚猶尊之是天下之王不如鄭賈之智眩於名眩目無常主也故為惑不知其實也天下之士合從相聚於趙而欲攻秦秦相應侯曰王勿憂也請令廢之秦於天下之士非有怨也相聚而攻秦者以己有補曰一本有作欲富貴耳王見大王之狗卧者卧起者起行者行止者止母相與鬭者投之一骨輕起相牙者輕猶忽也牙言以牙相噬何則有爭意也於是使補唐雎載音樂予之五千金居武安屬魏郡趙奢傳注在邯鄲西正曰武安說見前髙會髙誘注大會也相與飲謂邯鄲人邯鄲趙國都誰來取者於是其謀者固未可得予也用金少故未能動謀者其可得予者與之昆弟矣謀人之昆弟正曰言與之和好若昆弟矣此下有缺文公與秦計功者應侯教唐雎云不問金之所之金盡者功多矣今令人復載五千金隨公唐雎行至武安散不能三千金天下之士大相與鬬矣士得金復為秦故其謀不協補曰六國猶連雞羣士如鬬狗所以虎狼秦張頥哆其口秦紀尉繚說秦王曰願大王母愛財物賂其豪臣以亂其謀不過亡三十萬金則諸侯可盡大事記云前此范雎之散合從後此陳平之間項羽同出一術盖亂世風俗貪鄙故此術每中有言禮義亷恥於多事之際必以為迂濶不知撥亂之䇿莫要於此愚謂郭開之間李牧晉鄙客之讒信陵後勝之勸王建秦卒亡此三國者皆應侯之術也髙祖購陳豨將亦陳平之故智歟謂應侯曰君禽馬服君乎趙括也襲其父稱補曰史白起傳昭王四十八年秦復定上黨分軍為二王齕攻虎牢拔之司馬梗定太原韓趙恐使蘇代說應侯大事記引服䖍曰馬服猶言服馬也崔浩曰馬服官名言服武事也曰然又即圍邯鄲乎四十八年十月曰然曰補趙亡秦王王矣武安君為三公武安君所以為秦戰勝攻取者七十餘城南亡鄢郢漢中南郡宣城注故鄢江陵注郢都又郢故郢正曰詳見後五都注禽馬服之軍不亡一甲雖周補曰姚云錢劉本此下有召字吕望之功亦不過此矣趙亡秦王王武安君為三公君能為之下乎雖欲無為之下固不得之矣秦嘗攻韓邢趙國襄國津故邢國此字當作䣆補曰上章秦攻韓圍陘史記惠王九年秦拔我陘汾旁十年秦擊我太行我上黨郡守以郡降趙事正相次也困於上黨上黨之民皆返為趙馮亭事天下之民不樂為秦民之日固乆矣今攻趙北地入燕東地入齊南地入楚魏則秦所得不能元作一一正曰字誤史作所得民亡幾何此盖亡字誤分幾何故不如因而割之許趙割地來和因以為武安功如是則起無大功雎不為之下補曰史無以為此因字非史又云於是應侯言於秦王王聽之割韓垣雍趙六邑以和武安君由是與應侯有隙下接復欲伐趙云云應侯失韓之汝南豫州郡近應國應侯嘗取得之秦昭王謂應侯曰君亡國其憂乎應侯曰臣不憂王曰何也曰梁人有東門吳者其子死而不憂其相室室家之相此女也男曰家老曰公子愛子衍也字也天下無有今子死而不憂何也東門吳曰吾嘗無子無子之時不憂今子死乃即與無子時同也臣奚憂焉臣亦嘗為子此臣應侯子餘子也此時無地為子時不憂今亡汝南乃即與元作與即與即補曰當作即與為梁餘子同也大司徒可任之餘為餘子正曰周禮小司徒致餘子注餘子謂羡也傳晉有公族餘子杜云嫡子之母弟也吕春秋張儀魏氏餘子索隠云支庶也人季子也莊子注不應丁夫為餘子趙䇿亦有餘子字按梁餘子恐是雖入秦而亡其餘子之在梁者臣亦嘗為子言已亦若東門吳乃即與為梁餘子同言亡地與亡子同臣何為憂秦王以為不然以告䝉傲秦人補曰傲恐即驁始皇七年死此時相及曰今也寡人一城圍食不甘味卧不便席今應侯亡地而言不憂此其情補曰姚云一本此下有何字也問其心誠然否䝉傲曰臣請得其情乃往見應侯曰傲欲死應侯曰何謂也曰秦王師君天下莫不聞而况於秦國乎今傲勢得為秦王為元作為王為王補曰當作正為姚云一本無為字是將將兵臣以韓之細也顯逆言其國小而逆節著正曰顯逆亂之誅又作顯違誅戮義亦通誅奪君地傲尚奚生不若死應侯拜蒙傲曰願委之卿䝉傲以報於昭王自是之後應侯每言韓事者秦王弗聽也以其為汝南虜也汝南民為韓虜獲者補曰以為為憂為將之為如字依姚本句則為秦之為亦如字昭王既息民繕兵復欲伐趙圍邯鄲也武安君曰不可王曰前年國虚民飢君不量百姓之力求益軍粮以滅趙今寡人息民以養士蓄積粮實三軍之俸集韻俸秩禄也有倍於前而曰不可其說何也武安君曰長平之事後志泫氏有長平亭在上黨郡南山中百二十里事在此四十七年補曰正義云長平在澤州髙平縣西秦軍大克元從寸下同徐鉉曰勝此物謂之克若尅則殺也正曰克尅字通尅趙軍大破秦人歡喜趙人畏懼秦民之死者厚𦵏傷者厚養勞者相饗鄉人飲酒也飲食餔餽餔申時食吴謂祭鬼曰餽正曰以食食人曰餔餽即餽餉從食鬼聲髙注非以靡其財集韻靡糜同壊也趙人之死者不得收傷者不得療治也涕泣相哀勠力同憂勠并力也耕田疾作以生其財今王發軍雖倍其前臣料趙國守備亦以十倍矣趙自長平以來君臣憂懼早朝晏罷卑辭重幣四面出嫁結親燕魏連好齊楚積慮并心備秦為務其國内實其交外成當今之時趙未可伐也王曰寡人既以興師矣乃使衍五字五校大夫王陵將而伐趙陵戰失利亡五校集韻校木為攔格也軍部及養馬用之故軍尉馬官以為號王欲使武安君稱疾不行王乃使應侯往見武安君責之曰楚地方五千里持㦸百萬君前率數萬之衆入楚拔鄢郢焚其廟東至竟陵後志屬江夏起此二十八年取鄢二十九年取郢補曰竟陵在郢州長夀縣南今復州亦其地焚其廟即所謂燒夷陵先王之墓也楚人震恐震霹靂震動也故為恐東徙而不敢西向徙陳韓魏相率興兵甚衆君所將之卒補補曰當有卒字大事記補不能半之而與戰之補曰當是之戰於伊闕十四年大破二國之軍流血漂鹵鹵櫓同大盾也正曰髙注鹵大漂也言殺人多而流血漂浮鹵也斬首二十四萬韓魏以故稱東藩此君之功天下莫不聞今趙卒之死於長平者已十七八其國虚弱是以寡人雎稱王命故云大發軍人數倍元作君補曰姚本作倍字於趙國之衆願使君將必欲滅之矣君常以寡擊衆取勝如神况以强擊弱以衆擊寡乎武安君曰是時楚王頃襄恃其國大不恤其政而羣臣相妬以功諛謟用事良臣斥踈集韻斥亦踈百姓心離城池不修既無良臣又無守備故起所以得引兵深入多倍城邑兵深入城邑在後故言倍倍背同正曰倍如字言深入所過城邑多也廢梁焚舟以專民梁橋也此皆示以不還使民專於戰也下衍以字以補曰大事記云此作心字掠於郊野掠奪取也以足軍食當此之時秦之士卒以軍中為家將帥為父母不約而親不謀而信一心同力死不旋踵不反走也楚人自戰其地咸顧其家各有散心莫有鬬志是以能有功也伊闕之戰韓孤顧魏時韓僖侯立三年耳故稱曰孤正曰韓勢孤也不欲先用其衆魏恃韓之銳時韓主兵故韓記言率周魏攻秦魏記言佐韓也欲推以為鋒鋒軍之先二軍爭便之力不同是以臣得設疑兵以持元作待待韓陣時未交戰也專軍并銳觸魏之不意魏軍既敗韓軍自潰乘勝逐北戰敗曰北以是之故能立功皆計利形勢謂人謀地利軍之形勢自然之理何神之有哉今秦破趙軍於長平不遂以時乗其振懼而滅之振震同以趙畏服遂釋攻畏而釋之使得耕稼以益蓄積養孤長㓜補曰長其㓜小者以益其衆繕治兵甲以益其强增城浚池以益其固王折節以下其臣屈折肢節臣推體以下死士推體猶委質正曰推體猶委身謂以身與之也至於平原之屬皆令妻妾補縫於行伍之間臣人一心上下同力猶勾踐困於會稽之時也以今伐之趙必固守挑其軍戰挑摧撓也撓敵求戰正曰漢書擿挑敵以求戰左傳謂之致師必不肯出圍其國都必不可克尅攻其列城必未可拔掠其郊野必無所得兵出無功諸侯生心外救必至臣見其害未睹其利又病未能行應侯慙而退以言於王王曰微白起吾不能滅趙乎復益發軍更使王齕代王陵伐趙圍邯鄲八九月死傷者衆而弗下趙王孝成出輕銳以冦其後秦數不利武安君曰不聽臣計今果如何王聞之怒因見武安君强起之曰君雖病强為寡人卧而將之有功寡人之願將加重於君如君不行寡人恨君武安君頓首曰臣知行雖無功得免於罪雖不行無罪不免於誅然唯願大王覽臣愚計釋趙養民以諸侯之變補曰以字下疑有缺撫其恐懼伐其憍慢誅滅無道以令諸侯天下可定何必以趙為先乎此所謂為一臣屈而勝天下也大王若不察臣愚計必欲快心於趙以致臣罪此亦所謂勝一臣而為天下屈者也夫勝一臣之嚴焉嚴猶威孰若勝天下之威大邪臣聞明主愛其國忠臣愛其名破國不可復完死卒不可復生臣寧伏受重誅而死不忍為辱軍之將軍敗則辱此所謂愛名願大王察之王不荅而去事在四十八年及五十年元在中山䇿之末彪謂起之䇿秦楚三晉可謂明切然人臣無以有已故孔子不俟駕行矣長平之敗屬耳趙何遽能益强以起之材智知己知彼而得算多不幸至於無功極矣何破國辱軍之有三請不行此自抽杜郵之劍也正曰應侯納蘇之說許韓趙割地以和由是起與之有隙不從伐趙者為此也大事記謂起之死皆雎之力鮑可謂不探其心者矣所引孔子不俟駕行盖當仕有官職而以其官召之此不𩔖也秦攻邯鄲十七月不下莊人名也謂王稽曰君何不賜軍吏乎王稽曰吾與王也不用人言莊曰不然父之於子也令有必行者必不行者曰去貴妻賣愛妾此令必行者也因曰母敢思也此令必不行者也守閭嫗曰嫗母也正曰廣韻老嫗也此引說文不切曰某夕某孺子孺子乳也婦之嘗乳者亦婦人之美稱齊䇿王有七孺子内某士内私之也言嫗之言亦有必行者貴妻已去愛妾已賣而心不有有猶欲也言父雖令之而非其所欲故令之勿思則必不行欲教之者人心固有教猶告也孺子内士人心固欲其告雖非至親令必行也今君雖幸於王不過父子之親言王之令亦能奪其所貴愛有不必行者軍吏雖賤不卑於守閭嫗言且告稽且君擅主輕下之日乆矣聞三人成虎即魏䇿龐葱所稱者十夫揉椎揉屈伸木也衆口所移無翼而飛故曰不如賜軍吏而禮之王稽不聽軍吏窮果惡王稽杜摰以反摰稽之副也雎傳言稽與諸侯通則此所惡亦其實也秦王大怒而欲兼誅范雎稽始薦雎雎後任稽守河東補曰史王稽為河東守三嵗不上計鄭安平降趙應侯請罪秦法任人而所任不善者以其罪罪之於是應侯當收三族昭王恐傷其意加賜益厚後二嵗稽與諸侯通坐誅應侯益以不懌昭王臨朝嘆息應侯懼不知所出此䇿雎曰云云當在此時所謂秦王大怒而欲兼誅雎者則非當從史然王益厚賜而善遇之者所以愧之也范雎曰臣東鄙之賤人也魏在秦東開罪於衍楚字楚補曰恐衍魏開言始得罪遁逃來奔臣無諸侯之援親習之故習猶狎故舊也言非王近習之舊王舉臣於覉旅之中使職事職猶主天下皆聞臣之身與王之舉也今愚元作遇遇補曰當作愚惑衍或字或補曰衍與罪人同心罪人為王稽而王明誅之是王過舉過猶誤也昔舉而今誅之是舉之誤顯於天下而為諸侯所議也臣願請藥賜死而恩以相𦵏臣既殺之而加恩以國相禮𦵏之王必不失臣之罪已殺之而無過舉之名王曰有之然其過舉之言遂弗殺而善遇之秦攻趙蘇子謂秦王曰臣聞明王之於其民也博論而技藝之試之以事是故官無乏事而力不困於其言也多聽而時用之是故事無敗業而惡不章臣願王察臣之所謁而効之於一時之用也臣聞懐重寶者不以夜行任大功者不以輕敵是以賢者任重而行恭智者功大而辭順皆不伐也故民不惡其尊而世不妬元從女從后姤補曰訛當作妬其業臣聞之百倍之國者謂地廣也民不樂後也爭先附之正曰地既廣矣民不樂其後之復有事也功業髙世者人主不再行也一舉成之不待後正曰大功不再力盡之民仁者不用也求得而反静復於無事聖王之制也功大而息民用兵之道也今用兵終身不休力盡不罷怒趙元作趙怒趙怒補曰當作怒趙必於其已邑必欲戰服使為已邑趙僅存哉言所存無幾然而四輪之國也輪猶通言其民於適四方無所不通故下言從而不止正曰姚本作四輸是言四面輸冩之國今雖得邯鄲非國之長利也時攻邯鄲不拔故曰今雖意者地廣而不耕民羸而不休又嚴之以刑罰新民未服故則雖從而不止矣言且去之語曰戰勝而國危者物不斷也物事也斷猶止言戰事不止功大而權輕者地不入也補曰戰勝國宜安而愈戰則國危功大權宜重而愈求功則權輕危故物不止輕故地不入不斷不入因上文用兵不休與雖從而不止言之故過任之事父不得於子雖父責之其子使必為不可得也無已之求君不得於臣故補曰此下當有缺字以下句推之可見識乎微之為著者强察乎息民之為用者霸明乎輕之為重者王不伐人之所輕也重莫大焉秦王曰寡人案兵息民則天下必為從將以逆秦蘇子曰臣有以知天下之不能為從以逆秦也臣以田單如耳為大過也補曰如耳見前此時必二人欲為從故云然豈獨田單如耳為大過哉天下之主亦盡過矣夫慮收亡齊言世主志慮欲爾補曰亡齊指其嘗亡于燕言之下作破齊罷楚並音疲敝魏與不可知之趙未亡而有亡形正曰言其存亡不可知欲以窮秦折韓臣以為至愚也夫齊威宣者世之賢王也德博而地廣國富而民用民為之用元作用民用民補曰當作民用將武而兵强宣王用之後破元作富富補曰字因下誤疑為逼韓威魏以南伐楚西攻秦秦補補曰宜復有秦字為齊兵困於殽函之上補曰按秦惠後七年五國擊秦齊師獨後不敗他戰無考一本殽塞之上十年攘地攘推也猶招秦人逺迹不服逺迹畏而避之也然終不服而齊為虛戾戰敗其地為虛其民為戾戾疾也按齊記及表不書秦敗齊唯秦記惠十三年攻齊昭二十二年伐齊河東取九縣三十六年攻齊取剛夀不至是也此樂毅入臨淄之役也秦與五國共敗之補曰趙䇿亦有社稷為虛戾之語莊子國為虚厲釋文虚如字又音墟李云居宅無人曰虛死而無後為厲恐此戾即厲也夫齊兵之所以破韓魏之所以僅存者何也破韓魏宜能强而適足自存者何正曰齊宜强而反遭破韓魏宜亡而乃僅存何也故下文言齊之受殃注讀句誤是則伐楚攻秦而後受其殃也今富非有齊威宣之餘也今謂世主精兵非有富韓勁魏之庫也而將非有田單司馬之慮也司馬穰苴以齊言之耳非威宣將正曰說見齊䇿收破齊罷楚敝魏不可知之趙欲以窮秦折韓臣以為至誤臣以為從一合從為一正曰當作一不可成下文從之一成可見不可成也客有難者今人有患於世難者如刑名家蘇子所患也夫刑名之家申韓之徒皆曰白馬非馬也已如白馬實馬乃使有白馬之為也如使白馬實馬必有白馬之為如天下之馬不皆為白馬故曰非馬此臣之所患也言難者皆無端若此故可患而今非若此也昔者秦人下兵攻懐屬河内服其人三國從之趙趙奢齊鮑佞并楚為三趙奢鮑佞將絶句楚有四人不名告之起而從之臨懐而不救之自去不從趙鮑楚四人本起救懐而不救又聽秦之自去不隨後擊也不識三國之憎秦而愛懐邪亡其憎懐而愛秦邪亡其猶云亦亡正曰亡其前有解不必注夫攻而不救去而不從是以知補補曰此下或有缺文三國之兵困而趙奢鮑佞之能也以不救不從為能知秦之不可當也故裂地以敗於齊此下申言上殽函之敗正曰裂地敗齊當是指五國伐齊之事三國之不救懐卒裂地以敗齊皆言從之不能合田單將齊之良以兵横行於中十四年終身不敢設兵以攻秦折韓也而馳於封内言不出戰所謂謂横行於中不識從之一成惡存也於是秦王解兵不出於境諸侯休天下安二十九年不相攻以此䇿為蘇秦合從時則所稱趙奢惠文孝成將也蘇秦不當稱之自昭訖始皇定天下無年不戰則天下不相攻之說不可曉也今定為孝成九年邯鄲圍後說是後秦獨攻取兩周猶息兵五六年前此後此皆無解兵之事補曰二十九年不相攻必有誤字辯士増飾之詞固多然不應如此之甚云在趙䇿為趙而說也當從張儀補曰誤當作韓非說秦王此上元有張儀字而所說皆儀死後事故删去說云者猶西周謂齊王之比正曰王應麟云姚氏謂韓非子第一篇吕成公麗澤集文取此鮑失考愚按集文所謂非上書請破天下從即此非以韓王安相奉使秦始皇十三年也次年見殺今以韓子考其言而䇿文義勝者不復也曰臣聞之弗知而言為不智知而不言為不忠為人臣不忠當死言不審亦當死審悉也正曰韓子審作當勝不當即上云不智也雖然言已未能如言臣願悉言所聞悉詳盡也大王裁其罪裁制也臣聞天下隂燕陽魏隂北陽南連荆楚也始皇諱其父名故稱曰荆知此書始皇時人作固齊時山東國齊楚為大故從人連結之恃以為固収餘韓韓時弱多䘮地今存者其餘也成從將西南按南韓作面是下文有以與秦為難赧五十九年與諸侯從此五十一年臣竊笑之世有三亡而天下得之其此之謂乎此謂從補曰韓子作二亡無以逆攻順者一句臣聞之曰以亂攻治者亡以邪攻正者亡以逆攻順者亡今天下之府庫不盈府文書藏庫兵車藏今詳凡有藏者皆得稱也正曰府庫藏貨財對下囷倉藏穀粟言囷倉空虛囷圓廪正曰髙注圓曰囷方曰倉悉其士民張軍數千百萬張去聲正曰平聲亦通補曰韓此下云其頓首戴羽為將軍斷死於前不至千人皆以言死白刄在前斧質在後誅不進戰者故在後而皆去之不能死不戰也正曰韓之軍却走不能死也非元作罪補曰韓正作非其百姓不能死也言亦死之補曰一本而皆去之不能死韓而却走不能死也謂本其上不殺也韓上不能故也皆當從韓勝言賞則不與言罰則不行賞罰不行故民不死也今秦出號令而行賞罰不攻耳補無相攻元作攻相攻相事也言秦有不攻耳無敢與相攻者正曰韓作有功無功相事也姚云曽本如此出其父母懐袵之中袵衣衿生未嘗見寇也聞戰頓足徒裼此頓下也集韻徒空手裼袒也正曰頓踴也徒謂空露袒裼露臂也犯白刄蹈煨炭煨盆中火補曰韓罏炭斷死於前者以死自斷比比元只一字是也比次也言如是者相次也正曰韓作皆是此盖皆之訛夫斷死與斷生也不同言死難補曰斷死生之斷都玩反斷長之斷覩緩反前後同而民為之者是貴奮也奮言勇不顧死補曰韓貴奮死也一可以合十與敵合鬬補曰四合字一本皆作勝韓作對當也義長十可以合百百可以合千千可以合萬萬可以勝天下矣今秦地形斷長續短方數千里名師數百萬名言有勇决之稱秦之號令賞罰地形利害天下莫如也秦有斷死之利諸侯有不死之害故不如秦正曰利害是總言以此與天下與言與之争天下不足兼而有也是知秦戰未嘗不勝攻未嘗不取所當未嘗不破也當相值也開地數千里此甚大功也然而甲兵頓此頓言其勞弊士民病蓄積索集韻索盡也田疇荒疇耕治之田囷倉虛四鄰諸侯不服霸王之名不成此無異故猶言無他事謀臣皆不盡其忠也臣敢言往昔昔者補曰韓臣敢言之往者盖兩昔字因者字訛衍當從韓勝齊南破荆東破宋閔二十八年補曰韓東破是西服秦荆秦事未詳正曰齊南破荆以下以地勢言之非以年之先後也齊宣王二十五年與五國攻秦湣王十六年與韓魏伐秦十一年與韓魏伐楚十三年與秦韓魏敗楚北破燕十五年正曰齊宣王二十九年伐燕取之中使韓魏之君兩國從其役地廣而兵强戰勝攻取詔令天下以詔令令天下時未稱詔此秦史之言耳正曰詔告命令也下文詔之及後䇿趙王之教詔之使者明詔之𩔖濟清河濁補曰韓作齊之清濟濁河與下文協語勝足以為限東郡夀張注泲上有句城又平原有鬲津般河皆近齊正曰書蔡傳濟水自鄭以東貫滑曹鄆濟齊青以入于海自鄆以下皆齊地正義云真河從洛魏二州界北流入海亦齊西北界左傳齊履西至于河長城鉅防足以為塞蘇秦傳注濟北盧有防門又有長城東至海後志注防門即鉅防補曰長城西頭在齊州平隂縣界太山記云太山西有長城緣河經太山一千里至琅琊臺入海齊五戰之國也上所謂南破東破之𩔖正曰謂四面及中受兵一戰不勝而無齊燕昭入臨淄事故由此觀之夫戰者萬乗之存亡也且臣聞之曰削株掘根無與禍鄰禍乃不存秦與荆人戰大破荆襲郢取洞庭五都江南揚州記太湖一名湖亭一名震澤一名洞庭按熊繹都丹陽文王徙江陵是為郢都昭王徙郢所謂故郢又自郢徙鄀與鄢為五史多言鄢郢齊䇿鄢郢者楚之柱國知鄢亦為都江南即漢志楚地所謂江南地逺者也補曰大破荆在昭王二十九年楚頃襄之二十一年正曰洞庭在巴陵見楚魏䇿即此文路史熊繹初封丹陽今秭歸武徙枝江亦曰丹陽楚都南郢即江陵又謂故郢昭王避吴遷鄀今宜城為北郢即郢州惠王遷鄢在宜城曾氏謂屈瑕亂鄢以濟者鄀鄢非乆都故惠王末墨翟重繭趨郢宣王時王宫遇盗郢軍見黜懐王入秦齊使郢中立王皆昭惠後愚按楚詞哀郢莊辛說襄王郢都必危白起拔郢始徙陳知懐襄之世亦仍都南郢也考烈王徙夀春命曰郢又年表考烈徙都鉅陽大事記謂春申君用朱英䇿自陳徙夀春不云自鉅陽也據此楚不止五都鮑因誤文又以其時在徙陳前故徙陳以下不論而其說亦不明故為正之正義云江南在豫章長沙南楚之地韓五都作五湖史蘇秦傳五渚注引䇿文洞庭五渚謂此渚乃湖之訛燕䇿亦有五渚字按䇿既言襲郢而五都郢在其中都字必誤當從韓五湖說不一索隠云具區洮滆彭蠡青草洞庭又說太湖射陽青草丹陽宫亭宫亭即彭蠡張勃吳録謂太湖别名或說太湖中自有五湖荆王頃襄亡走東伏於陳見白起傳當是之時隨荆以兵則荆可舉拔其國如舉物然言易也舉荆則其民足貪也地足利也東以强齊燕强於二國補曰韓强作弱是下有中陵三晉然則是一舉而霸王之名可成也舉猶行四鄰諸侯可朝也使之朝秦而謀臣不為引軍而退與荆人和令荆人收亡國聚散民立社主為木主社置宗廟令帥天下西面以與秦為難此固已無補曰韓無作失下並同霸王之道一矣天下有比志比宻也言其志親而軍華下即華陽之所大王以詐補曰詐韓作詔是下同破之兵至梁都元作郭郭正曰韓本文圍梁數旬則梁可拔梁拔則魏可舉梁以都言魏全國也舉魏則荆趙之志絶魏居二國之中而為與國故舉魏則二國不通荆趙之志絶則趙危趙尤近秦趙危而荆孤東以强補曰見上齊燕中陵三晉然則是一舉而霸王之名可成也四鄰諸侯可朝也而謀臣不為引軍而退與魏氏和令魏氏収亡國取散民立社主置宗廟此固已無霸王之道二矣前者穰侯之治秦也用一國之兵而欲以成兩國之功秦及穰侯所封也如封剛夀以廣陶之𩔖是故兵終身暴露於外士民潞補曰韓作疲病於内潞即露耳故髙注為羸霸王之名不成此固已無霸王之道三矣趙氏中央之國也雜民之所居也補曰韓子注趙都邯鄲燕之南齊之西魏之北韓之東故曰中央兼四國之人故曰雜其民輕而難用也輕則其志不堅號令不治賞罰不信地形不便無險隘故正曰非無險隘上云中央之國此云不便是以大勢言之上非能盡其民力彼固亡國之形也而不憂民氓在野曰氓悉其士民軍於長平之下以爭韓之上黨馮亭事大王以詐補曰詔字破之抜武安此殺趙括事在四十七年當是時趙氏上下不相親也貴賤不相信也然則是邯鄲不守拔邯鄲完河間冀州國完之者欲急取修武上黨諸郡置之去也正曰韓作筦山東河間引軍而去西攻修武屬河内踰羊腸降代上黨代三十六縣上黨十七縣補曰踰羊腸降代韓作踰華絳三十六韓作四十六十七韓作七十不用一領甲不苦一民皆秦之有也代上黨不戰而已為秦矣東陽屬清河河外滹沱河之外正曰蘇秦説趙云東有清河張儀說趙告齊使興師度清河軍邯鄲之東即此河也東陽既屬清河不得為他說矣不戰而已反為齊矣此本趙所得齊地今趙弱故齊復取之取之則益弱矣中呼沱元作池池正曰古沱通史弟子傳滹池補曰韓中山呼池以北中言中分之呼沱在代鹵城不戰而已為燕矣燕乗敗取之然則是舉趙則韓必亡韓亡則荆魏不能獨立則是一舉而壞韓蠹魏蠧者病其中也挾補曰韓作拔荆以東補曰韓作東以弱齊强燕弱齊燕决白馬之口張儀傳守白馬之津津在東郡以流補曰韓作沃魏氏流作灌一舉而三晉亡從者敗合從者大王拱手以須須胥同待也天下編隨而伏補曰韓作敗也編言衆隨而伏降矣以繩次物曰編霸王之名可成也而謀臣不為引軍而退與趙氏為和以大王之明秦兵之强霸王之業謂先世所創地尊不可得地與相王之尊正曰韓尊作曾劉辰翁謂地猶弟皆失考乃取欺於亡國亡國以長平之敗言趙是謀臣之拙也且夫趙當亡不亡秦當霸不霸天下固量秦之謀臣一矣乃復悉補曰韓此下有士卒字以攻邯鄲不能抜也棄甲兵怒戰慄而却且怒且懼而退補曰韓作棄甲兵拏戰竦而天下天下固量秦力二矣軍乃引退并於李下後志河内有李城趙封李同之父於此補曰韓作孚下大王又并軍而致與戰致言極力非能厚勝之也厚猶大又交罷却交言秦與趙俱罷兵而退天下固量秦力三矣内者量吾謀臣外者極吾兵力極言度其力之所至由是觀之臣以天下之從合從也豈其難矣内者吾甲兵頓士民病蓄積索田疇荒囷倉虛外者天下比志甚固願大王有以慮之也且臣聞之戰戰慄慄日慎一日茍慎其道天下可有也何以知其然也昔者紂為天子元作下補曰韓作子帥天下將補曰一本將甲百萬左飲於淇谷河内共淇水所出右飲於洹水蘇秦傳注出林慮項紀注在安陽縣北前後志在良鄉東南淇水竭而洹水不流亦竭也以與周武為難武王將素甲三千領絹素為之非金革也正曰素以色言戰一日破約之國以甲子日戰遂克之禽其身據其地而有其民天下莫不傷傷殷之亡耳正曰韓作莫傷智伯帥三國之衆以攻趙襄主於晉陽禮大夫稱主决水灌之三年補曰韓作三月趙䇿亦兩云三年城且拔矣襄主錯龜錯措同置也補曰錯韓作鑚數䇿以蓍筮也占兆灼龜拆處曰兆以視利害何國可降三國中孰為可降而使張孟談趙之謀臣於是濳行而出反智伯之約使韓魏背之得兩國之衆以攻智伯之國禽其身以成襄子之功今秦地斷長續短方數千里名師數百萬秦國號令賞罰地形利害天下莫如也以此與天下天下可兼而有也臣昧死自言不知死所望見大王言所以舉補曰韓無此字破天下之從舉謂一舉舉趙亡韓舉猶拔也補曰非言及於亡韓是豈可不為寒心甚矣其忍也斬臣以狥於國以主不忠於國者亡韓之言當如之臣荆魏親齊燕二國去秦逺未可加兵故親之以寛兵力其後秦滅諸國二國獨後亡以此故也以成覇王之名朝四鄰諸侯之道大王試聽其說一舉而天下之從不破趙不舉韓不亡荆魏不臣齊燕不親霸王之名不成四鄰諸侯不朝大王斬臣以狥於國狥行以示人也以主不忠於國者主言以為首惡彪謂此章論事深切著明荀卿不如秦所以取天下蓋行其說也而史失其人猥以張儀名之惜哉所稱謀臣范雎也補曰韓以為為王謀不忠者正曰韓非師荀卿者也其術不主於卿卿論兵以附民為要以仁義為本以禁暴除害為務非而有是言歟大意不過欲極威怒而務攻取耳鮑既考之不精且謂卿不如謬矣補曰蘇氏論荀卿歴詆天下之賢人以自是其愚李斯以其學亂天下其髙談異論有以激之也韓非此書歴詆秦之謀臣盖指魏冉范睢之徒他日謂申不害徒術無法公孫鞅徒法無術張儀以秦狥韓魏甘茂以秦徇周穰侯應侯攻他國以成其私封所詆者亦非一人其剛愎不遜自許太過則亦卿之風也終以忤李斯短姚賈而殺其身太史公謂非知說之難而不能自脫可以為騁說者之戒矣蔡澤燕人見逐於趙而入韓魏遇奪釡鬲於涂人奪之也爾雅鬲鼎也聞應侯任鄭安平魏齊困范雎安平匿之時安平擊魏以二萬人降趙王稽通諸侯也皆負重罪應侯内慙乃西入秦將見昭王使人宣言以感怒應侯曰燕客蔡澤天下駿雄𢎞辯之士也彼一見秦王秦王必相之而奪君位應侯聞之使人召蔡澤蔡澤入則揖應侯應侯固不快及見之又倨應侯因讓之曰子嘗宣言代我相秦豈有此乎對曰然應侯曰請聞其說蔡澤曰吁君何見之晚也夫四時之序成功者去矣人生手足堅强耳目聰明聖智豈非士之所願與應侯曰然蔡澤曰質仁秉義質猶體行道施德於天下天下懐樂敬愛願以為君王豈非辯智之期與期猶志也辯智者志期得此應侯曰然蔡澤復曰富貴顯榮成理萬物物治也萬物各得其所生命夀長終其年而不夭傷天下繼其統綂繼也守其業傳之無窮名實純粹言其兩全美澤流千世稱之而毋絶補曰一本此下有與天下終一句豈非道之符言行道之効而聖人所謂吉祥善事與應侯曰然澤曰若秦之商君楚之吳起衛人仕魏後相楚而死越之大夫種姓文越王句踐之相其卒亦可願與元作矣矣補曰矣史作歟應侯知蔡澤之欲困已以說復曰何為不可夫公孫鞅事孝公極身毋二極身猶竭已盡公不還私還反顧也信賞罰以致治竭智能示情素素其所蓄積正曰素愫通誠也䝉怨咎集韻䝉覆也䝉冒同鞅嘗刑太子之傅知必見怨咎猶冒為之欺舊交虜魏公子卬卬則鞅之舊也卒為秦禽將破敵軍攘地千里吳起事悼王使私不害公䜛不蔽忠言不取茍合行不取茍容行義不顧元作固補曰姚云曾作顧毁譽必欲元作有有霸王强國不辭禍凶大夫種事越王王離困辱離罹同集韻遭也悉忠而不解解懈同王雖亡絶盡能而不離離猶去多功而不矜富貴不驕怠若此三子者義之至忠之節也故君子殺身以成名義之所在身雖死無憾悔何為而不可哉蔡澤曰主聖臣賢天下之福也君明臣忠國之福也父慈子孝夫信婦貞家之福也故比干忠不能存殷子胥智不能存吴申生孝而晉惑亂僖五年是有忠臣孝子國家滅亂何也無明君賢父以聽之故天下以其君父為戮辱戮殺也賤之加刑戮為辱之人憐其臣子夫待死而後可以立忠成名是微子不足仁孔子不足聖管仲不足大也於是應侯稱善蔡澤得少間間言有隙可乗因曰商君吳起大夫種其為人臣盡忠致力則可願矣閎夭事文王周公輔成王也豈不亦忠乎以聖補曰姚本以君臣論之論之商君吳起大夫種其可願孰與閎夭周公哉應侯曰商君吳起大夫種不若也蔡澤曰然則君之主慈仁任忠任猶信不欺舊故孰與秦孝楚悼越王乎應侯曰未知何如也蔡澤曰主固親忠臣不過秦孝越王楚悼君之為主正亂批患折難批􅔊同西齊切擊也集韻􅔊或作批又蒲結切廣地殖榖殖種也富國足家强主威盖海内功彰萬里之外不過商君吳起大夫種而君之禄位貴盛私家之富過於三子而身不退竊為君危之語曰日中則移月滿則虧物盛則衰天之常數也進退盈縮變化聖人之常道也昔者齊桓公補曰一本有九合諸侯一句一匡天下至葵丘之會杜注陳留外黄東有葵丘有驕矜之色畔者九國僖九年吴王夫差無敵元作適適正曰史作敵適通與人鬬擊也於天下輕諸侯陵元作凌凌正曰陵通史凌雲漢書陵雲齊晉遂以殺身亡國夏育太史啓太史周官其人未詳史作太史激豈君王后之父邪叱呼駭三軍叱訶也而身死於庸夫此皆乗至盛不近道理也夫商君為孝公平權衡正度量調輕重决裂阡陌教民耕戰是以兵動而地廣兵休而國富故秦無敵於天下立威諸侯功已成矣補補曰史此下有矣字遂以車裂楚地持㦸百萬白起率數萬之師以與楚戰一戰舉鄢郢再戰燒夷陵屬南郡南并蜀漢又越韓魏攻强趙北坑馬服誅屠四十餘萬之衆屠言殺之酷流血成川沸聲若雷使秦業帝有帝之業自是之後趙楚懾服懾失氣也不敢攻秦者白起之勢也身所服者七十餘城功已成矣賜死於杜郵起傳注在咸陽西門十里吳起為楚悼罷無能廢無用損不急之官塞私門之請一楚國之俗南攻揚越越屬揚州北并陳蔡破横散從使馳說之士無所開其口功已成矣卒支解斷其四支按起傳宗戚大臣射刺起死大夫種為越王懇草剏邑懇耕剏造也辟地殖穀殖植同率四方之補士專補上下之力補曰史方下有之字士下有專字恐此有缺以禽勁吳成霸功勾踐終拮而殺之拮曵同搏也盖逼之楚記言賜劍死補曰拮姚本作掊此四子者功成而不去禍至於此此所謂信而不能屈往而不能反者也范蠡知之超然避世長為陶朱居陶易姓朱君獨不觀博者乎或欲衍欲字補曰姚云一本無此字大投大言全勝也或欲分功分勝者所獲此皆君之所明知也今君相秦計不下席謀不出廊廟坐制諸侯利補補曰姚本有此字史同施三川以實宜陽以補曰一本及史無此字决羊腸之險塞太行之口又斬范中行之途斬謂絶之此言斷三晉之路棧道千里棧棚也施於險絶以濟不通通補補曰史於上有通字於蜀漢使天下皆畏秦秦之欲得君之功極矣此亦秦之分功之時也秦秦人如時補曰史作是不退則商君白公吳起大夫種是也君何不以此時歸相印讓賢者授之必有伯夷之㢘長為應侯世世稱孤而有喬松之夀喬王子喬松赤松子皆不死孰與以禍終哉此則君何居焉應侯曰善乃延入坐為上客後數日入朝言於秦昭王曰客新有從山東來者蔡澤其人辯士臣之見人甚衆莫有及者臣不如也秦昭王召見與語大說之拜為客卿應侯因謝病以病辭去請歸相印昭王强起應侯應侯遂稱篤篤猶甚因免相昭王新說蔡澤計畫遂拜為秦相在五十二年東收周室蔡澤相秦王數月人或惡之懼誅乃謝病歸相印號為剛成君補曰水經云雁門子延水東逕罡成南澤燕人疑此即其所邑與居補補曰姚云一本有居字史同秦十餘年事補補曰史昭上有事字昭王孝文王莊襄王卒事始皇帝為秦使於燕三年居燕三年而燕使太子丹入質於秦澤傳有彪謂周衰辯士皆矜材角智趨於利而已唯澤為近道德明哲保身之䇿故其得位不數月引去優游於秦以封君令終美矣非茍知之亦允蹈之澤之謂乎正曰澤知范雎内慙故西入秦志在奪相揚雄所謂搤其咽抗其氣拊其背而奪其位乃矜材角智趣利之尤者相秦數月懼誅歸印亦智巧之尤無功而退既無當於道德之㫖明哲保身之義彼何足以知之哉補曰為主為君為孝為楚為越為秦之為去聲孝文王昭王子元年辛亥周亡至是六年矣濮陽人屬東郡吕不韋賈於邯鄲見秦質子異人子楚初名孝文王子歸而謂父曰耕田之利幾倍曰十倍珠玉之羸幾倍曰百倍立國家之主羸㡬倍曰無數曰今力田疾作不得煖衣餘食今建國立君澤可以遺世遺猶詒世後世願往事之事猶為補曰不韋鄙耕田珠玉之小利而圖建國立君之大利自以為計得矣徙蜀飲酖之時能無悔乎秦子異人質於趙處於幫城趙地缺補曰字書無字龍龕手鑑云音脚故往說之曰子傒異人異母兄有承國之業又有母在中今子無母於中異人母曰夏姬無寵如無母然外託於不可知之國史言趙不禮之故禍福未可知也一日倍約身為糞土棄死且賤也今子聽吾計事求歸以求歸為事正曰劉辰翁云計事猶謀事求歸别句可以有秦國吾為子使秦必來請子乃說秦王后孝文后華陽夫人弟陽泉君曰君之罪至死君知之乎君之門下無不居髙尊位太子門下無貴者太子子傒君之府藏珍珠寶玉君之駿馬盈外廐美女充後庭王之春秋髙春秋舉成嵗此言其年髙一日山陵崩山陵喻髙且固崩喻死太子用事君危於累卵而不夀於朝生木槿也朝榮夕死今又不如僕有可以一切權宜也而使君富貴千萬嵗衍其字其寧於太山四維四方之隅不可移也正曰以太山為四維必無危亡之患矣陽泉君避席離席前請請聞其說不韋曰王年髙矣王后無子子傒有承國之業士倉又輔之王一日山陵崩子傒立士倉用事王后之門必生蓬蒿子異人賢材也棄在於趙無母於内引領西望而願一得歸王后誠請而立之是子異人無國而有國王后無子而有子也陽泉君曰然入謂王后王后乃請趙而歸之趙未之遣不韋說趙曰子異人秦之寵子也無母於中王后欲取而子之使秦而欲屠趙不顧一子以留計留本决也是抱空質也此質本以交好今不能然故曰空若使子異人歸而得立趙厚送遣之是不敢倍德畔施是自為德講必以德施講好於趙正曰講即媾字秦王老矣一日晏駕天文志天子當早作而方崩隕臣子之心猶謂宫車晚出雖有子異人不足以結秦趙乃遣之不韋傳秦圍邯鄲趙欲殺子楚子楚脫亡歸與此駁異人至不韋使楚服而見以王后楚人故服楚製以說之王后說其狀髙其智曰吾楚人也而自子之乃變其名曰楚王使子誦誦所習書子曰少棄捐在外嘗無師傅所教學不習於誦王罷之補曰大事記不習於誦此焚書之兆也愚按昭王問荀卿儒無益於人之國其來乆矣乃留止止宫中間曰間政事之隙陛下嘗軔車於趙矣髙紀五年注陛者云云軔碾車木趙之豪傑得知名者不少以名見知於王今大王反國皆西面而望大王無一介之使以存之昭二十八年注一介單使也存問也問其存亡臣恐其皆有怨心使邊境早閉晚開有警則然王以為然竒其計王后勸立之王乃召相令之曰寡人子莫若楚立以為太子子楚立是為莊襄王以不韋為相號曰文信侯食藍田十二縣王后為華陽太后諸侯皆致秦邑致邑為太后飬地也按此是子楚以孝文王立後不韋說使歸之不韋𫝊則言孝文為安國君時歸與此駮彪謂不韋賈人也彼安能知義欲圖羸而奪嫡立庻秦國之不亂敗者幸也以是得羸而飲酖于蜀于是知有天道矣凡不韋所立於時皆䘮身滅國之事周衰士之隂險傾邪無輩於不韋者不足算也不足算也子楚之計平平耳孝文稱為奇而立之非老悖乎莊襄王文王子元年壬子始皇帝莊襄王子元年乙卯文信侯欲攻趙以廣河間使剛成君蔡澤事燕三年而燕太子質於秦文信侯因請張唐秦人相燕補曰姚本此下有欲與燕共伐趙以廣河間之地一句張唐辭曰燕者必徑於趙徑者道所出也趙人得唐者受百里之地文信侯去而不快少庶子甘羅禮庻子掌諸侯卿大夫之庻子羅茂之孫正曰髙注少庻子官名羅文信家臣也索隠引䇿甘羅事吕不韋為庻子即指此也注以周制言秦官誤庻子說又見後曰君侯何不快甚也文信侯曰吾令剛成君蔡澤事燕三年而燕太子已入質矣今吾自請張卿相燕而不肯行甘羅曰臣行之文信侯元作君君正曰以羅所事言故稱君叱去曰補曰姚云曾作曰去語勝我自行之而不肯汝安能行之也甘羅曰夫項橐列子有問日出者豈其人乎正曰無稽生七嵗而為孔子師今臣生十二嵗於兹矣君其試臣奚以遽言叱也甘羅見張唐曰卿之功孰與武安君唐曰武安君戰勝攻取不知其數攻城墮邑不知其數臣之功不如武安君也甘羅曰卿明知功之不如武安君與曰知之應侯之用秦也見用於秦孰與文信侯專曰應侯不如文信侯專曰卿明知為不如文信侯專與曰知之甘羅曰應侯欲伐趙武安君難之去咸陽七里絞而殺之起傳言賜劍今文信侯自請卿相燕而卿不肯行臣不知卿所死之處矣唐曰請因孺子而行因之請於文信離婁注孺子童子今庫具車廐具馬府具幣行有日矣甘羅謂文信侯曰借臣車五乗請為張唐先報趙見趙王悼襄趙王郊迎謂趙王曰聞燕太子丹之入秦與曰聞之聞張唐之相燕與曰聞之燕太子入秦者燕不欺秦也張唐相燕者秦不欺燕也秦燕不相欺則伐趙危矣燕秦所以不相欺者無異故欲攻趙而廣河間也今王齎臣五城以廣河間歸燕太子與補趙攻燕得上谷幽州郡三十六縣與秦什一以什之一與秦也羅傳有補曰史云得上谷三十城人秦有十一索隠云謂以十一城予秦也二說未知孰是秦王欲見頓弱秦人頓弱曰臣之義不参拜王能使臣無拜則可矣不即不見也秦王許之於是頓子曰天下有有補正曰一本有姚同其實而無其名者有無其實而有其名者有無其名又無其實者王知之乎王曰弗知頓子曰有其實而無其名者商人是也無把銚推耨之勞銚芸苗噐耨耨器補曰徐按詩傳鎮銚也七遙反字書鍬同耨亦芸田器莊子作耨而有積粟之實此有其實而無其名者也無其實而有其名者農夫是也解凍而耕暴背而耨無積粟之實此無其實而有其名者也無其名又無其實者王乃是也已立為萬乗無孝之名以千里養無孝之實秦王悖然而怒悖艴同語色艴如也補曰艴如說文文今論語作勃頓弱曰山東戰國有六威不掩於山東而掩於母始皇母帝太后也本吕不韋姬通不韋又通嫪母人告之王誅母而遷雍臣竊為大王不取也秦王曰山東之戰國可兼與頓子曰韓天下之咽喉魏天下之胸腹王資臣萬金而逰資齎同聽之韓魏時不通諸國故請王聽其往也入其社稷之臣於秦說之使歸秦即韓魏從補曰一本疊此三字而天下可圖也秦王曰寡人之國貧恐不能給也頓子曰天下未嘗無事也非從即横也横成則秦帝從成則楚王秦帝即以天下恭養且敬且養楚王即王雖有萬金弗得私也秦王曰善乃資萬金使東遊韓魏入其將相北逰衍於字於燕趙而殺李牧趙良將幽王七年殺之此十八年齊補曰一本此下有王字入朝四國畢元作必必補曰疑畢從齊魏燕趙也殺牧時已虜韓正曰髙注燕趙韓魏是上已言齊矣殺牧是要終言之頓子之說也說始皇在十年還太后前此要終言之彪謂頓子之義髙於范睢而其說過之逺矣惜其不知擇本焉有仁人君子而為始皇用哉魯連視之蔑矣正曰大事記茅焦說秦王曰秦方以天下為事而大王有遷母太后之名恐諸侯聞之由此倍秦頓子告始皇山東戰國有六威不掩於山東而掩於母始皇所重者獨兼并諸侯耳茅焦所以能復太后者特以諸侯背秦恐之非能以母子天性感悟之也愚按頓弱鎮有威掩於母之一言其下即說以兼并行詐未嘗正諫遷母之失又非茅焦比二人雖異於范雎於義皆不足取或為六國說秦王曰土廣不足以為安人衆不足以為强若土廣者安人衆者强則桀紂之後將存昔者趙氏亦嘗强矣曰趙强何若曰猶言如舉左案齊言舉兵於左則齊下案下也舉右案魏厭案萬乗之國厭言案之不一正曰厭益渉反培壓也又伏也二國千乗之宋也宋於七國時為千乗今使齊魏伐之築剛平趙地缺趙成侯四年築剛平以侵衛五年齊魏為衛取我剛平皆不注正曰正義云盖在河北衛無東野詳此則剛平趙取之衛也芻牧薪採芻草也以食馬牧養牛人也大者薪小者採正曰芻草也牧牧人也莫敢闚東門當是時衛危於累卵天下之士相從謀曰吾將還其委質還反言改事也僖二十三年注委質屈膝也正曰彼注不明此强節入質贄通即下文抱質孟子傳質是也委致也而朝於邯鄲之君乎於是天下有稱伐邯鄲者莫不夕補令朝行魏伐邯鄲魏惠三十年伐趙趙告急齊是以有馬陵之敗正曰在後因退為逢澤之遇開封東北有逢池或曰宋之逢澤乗夏車夏取其文禮有夏篆正曰乗夏車者言中夏之車下文可徵夏亥雅反禮注夏赤也孤東夏篆非天子之車稱夏王夏中國也一補正曰朝音潮即下十二諸侯朝天子者為字疑衍朝為天子天下皆從齊宣王元作太公太公之時無此事也太公補曰二字有誤聞之舉兵伐魏補曰一本此下有壤地兩分家國大危八字也梁王身抱質執璧質贄同羔雁之屬也請為陳侯臣齊陳敬仲之後故稱陳侯趙成侯二十二年魏拔邯鄲齊亦敗魏于桂陵不至如此所稱故定為宣王馬陵之役正曰按大事記周顯王十六年魏惠十八年齊威二十六年趙成侯二十二年魏拔趙邯鄲服十二諸侯遂稱王齊乗其敝敗之桂陵二十七年秦孝公會諸侯于逢澤以朝王䇿謂魏伐邯鄲遂為逢澤之遇按魏既克邯鄲即為齊楚所襲天下未嘗皆從當據史書秦顯王二十八年魏惠三十年齊宣二年魏伐韓齊伐魏以救韓敗魏于馬陵魏世家書魏伐趙乃往嵗事是時亦田忌孫臏將而桂陵馬陵易混故爾其後惠王用惠施之言朝齊以怒楚魏䇿有顯王三十六年魏惠後二年齊宣十年楚成六年楚伐齊大敗申縛於洞上今以此考之伐邯鄲乃魏惠十八年事逢澤之遇秦為之非魏也敗魏馬陵而魏朝之者齊宣王也舉兵伐魏一語在會逢澤後則亦指馬陵之役而上文伐邯鄲乃敗桂陵時事天下皆從指服泗上十二諸侯言之亦未免訛舛也大事記又謂魏為逢澤之遇天下皆從又梁君驅十二諸侯以朝天子語雖不可盡信但魏自拔邯鄲後稱王則無可疑者也天下乃釋梁郢威王聞之郢楚都也亦避始皇父諱楚威七年伐齊敗之徐州寢不寐食不飽帥天下百姓以與申縛遇於泗水之上縳齊将楊之子注申諸姜而大敗申縛趙人聞之至根桑地缺趙記注根桑一曰平桑疑即此處魏地也盖赴魏之難也燕人聞之至格道格道不通平際絶二地缺齊戰敗不勝謀則不得使陳毛釋劍掫掫夜戒有所擊引也釋二者不自衛示卑也補曰掫側侯反也委南聽罪委去南面之尊正曰聽罪於楚西說趙說使人解之北說燕内喻其百姓而天下乃釋齊言不攻東齊也於是天下補正曰一本於是夫天由夫之訛也積薄而為厚聚少而為多以同言郢威王於側紂之間髙注紂當為牖臣豈以郢威王為政衰謀亂以至於此哉郢為强絶句臨天下諸侯故天下樂伐之也補曰同言郢威王云云言天下又欲謀楚也此章先言趙强而魏伐之魏强而齊伐之齊强而楚伐之楚强而諸侯又謀之言强者之不足恃召天下之所惡而欲共攻之者也言此欲以止秦之攻故云為六國說也四國為一荆齊燕代見下文正曰見下也將以攻秦秦王召羣臣賓客六十人而問焉曰四國為一將以圖秦寡人屈於内財力困也而百姓靡於外為之奈何羣臣莫對姚賈魏人對曰賈願出使四國必絶其謀而案元作安也安正曰息其兵乃資車百乗金千斤衣以其衣以王衣衣之寵之也舞以其劍古者飲則以劍舞之以王劍賜之使為舞時用正曰姚本舞劉本作帶也姚賈辭行絶其謀止其兵與之為交以報秦秦王大說賈封千户以為上卿韓非韓之諸公子秦王見其書恨不及見之攻韓韓遣之使秦秦王說之賈與李斯毁之死也知之曰賈以􅎇珠重寶南使荆齊元作吳此章無吴事此四國後亡者也三晉滅乆矣正曰無考當從舊吴北使燕代之間三年四國之交未必合也而􅎇珠重寶盡於内是賈以王之權補曰一本此下有國之寶三字外自交於諸侯願王察之且梁監門子監門卒也賈父曾役嘗盜於梁臣於趙而逐取世監門子父死子繼曰世梁之大盜趙之逐臣與同知社稷之計非所以厲羣臣也厲礪同䃺也王召姚賈而問曰吾聞子以寡人財交於諸侯有諸對曰有王曰有何面目復見寡人對曰曽参孝其親天下願以為子子胥忠於君天下願以為臣貞女工巧有婦功也天下願以為妃妃匹也補曰妃當音配曾参止之身云云即陳軫之説今賈忠王而王不知也賈不歸四國尚焉之使賈不忠於君四國之王尚焉用賈之身桀聽䜛而誅其良將紂聽元作聞聞䜛而殺其忠臣至身死國亡今王聽䜛則無忠臣矣王曰子監門子梁之大盗趙之逐臣姚賈曰太公望齊之逐夫婦逐之也不經見朝歌之廢屠朝歌屬河内賈肉不售故曰廢補曰楚詞師望在津昌何識鼔刀揚聲后何喜集注云吕望鼓刀在列肆文王親往問之望曰下屠屠牛上屠屠國文王善載與俱歸此與獵渭濵而得之說不同盖當時好事者之言猶伊尹百里奚自鬻之比惜乎孟子時無間者不得并折辨之也子良之逐臣未聞棘津之讎不庸後志琅邪西海太公所出又釣於棘津今存讎售同盖嘗求售與人為庸不見用也文王用之而王管仲其鄙人之賈人也五鄼為鄙盖鄼鄙之人為賈者仲嘗與鮑叔賈補曰鄙下人字疑衍南陽之敝幽修武南陽也仲潁上人嘗以貧困隠此敝困幽隠也魯之免囚見莊二十九年桓公用之而霸百里奚虞之乞人傅賣以五羊之皮奚虞臣也不見用自鬻於秦養牲者以五羖羊皮鬻之補曰說見上說苑鄒子說梁王曰管仲故成隂之狗盜也天下之庸夫也太公望故老婦之出夫也朝歌之屠户也棘津迎客之舍人也云云亦此𩔖穆公相之而朝西戎文公用中山盜而勝於城濮僖二十八年晉文公用舅犯之謀破楚成王於城濮與此不同杜注城濮及史注止云衛地正曰文公用中山盗而勝於城濮與上句穆公相之而朝西戎文意同此但言用人不問其出於賤惡而卒有如是之功耳按文公有寺人披斬袪竪頭須竊藏二事鄒陽書文公親其讎而强伯諸侯注以為寺人勃鞮新序文公用其盜以為里鳧須即豎頭須也二事皆可通此四士者皆有詬醜大誹詬辱醜耻也天下補曰姚注曽作於天下明主用之知其可與立功也補使若卞隨務光並湯時人辭湯之聘申屠狄紂時人自沉于淵並見莊子人主豈得其用哉故明主不取其汙不聽其非察其為已用汙者非者雖不取不聽知其為用則或聽取察言聽取之故可以存社稷雖有外誹者不聽雖有髙世之名無咫尺之功者八尺曰咫不賞是以羣臣莫敢以虚願望於上無功而願賞虛願也補曰魏無知之論陳平曰今有尾生孝己之行而無益勝負之數王何暇用之乎即姚賈之說也燕䇿蘇秦蘇代之辭亦此𩔖秦王曰然乃衍可字補曰一本無復使姚賈而誅韓非髙誘妄人也注此書謬妄非一處如此䇿以姚賈為陳賈齊䇿以伐燕為齊宣王初不考其嵗月賈乃與李斯同時安得見於孟子之書宣閔皆嘗伐燕而子噲之役實閔王也誘之率意如此愚天下後世甚矣彪之校注盖為此發憤故其所稱皆必有依據懼獲罪於後人也正曰鮑注是書謂髙氏以姚賈於孟子書陳賈以伐燕為齊宣王為是發憤凢䇿之書宣者悉據史記改從閔大詆髙氏而以此為稱首夫學者考訂於千載之上義理事徵而已嵗月名字之差互者當博取徴驗而折以事理之是非信其可徴者或彼此有據則並存之可也擇焉不精憑私臆决妄詆前人輒改舊文何鮑氏之果哉考之趙䇿趙使姚賈約韓魏時雖不可考其云趙使則趙臣也魏䇿周最入齊秦王怒令姚賈讓魏王秦武魏襄時也其云秦令則秦臣也此䇿姚賈梁監門子則魏人仕秦並始皇李斯時者殆非一姚賈矣姚以舜姓得為陳髙不為無據使誠孟子書所稱當與秦武魏襄相及並始皇李斯者則非然未知的為一人而髙輒以此姚賈為孟子書譏周公不仁不智者固非矣唯子噲之役則有可言者史記年表齊宣王立十九年卒儋王立燕噲七年當湣王十年書噲子之皆死惟孟子以為宣王而策之文與之合此通鑑所據也通鑑宣王二十九年伐燕視史記下移十年宣王伐燕即薨次年湣王立宣閔之年或亂而失次通鑑必有所據而大事記亦從之伐燕之事莫詳於孟子莫著於國策史記年表無明文齊世家不書特燕世家掇取國䇿而易宣以湣耳安得據史記之畧而廢孟子國䇿之詳且明哉傳曰所見異辭所聞異辭所傳聞異辭宣王伐燕孟子所見也史記所傳聞者也安得據所傳聞而廢所見者哉或謂荀卿嘗事宣王為之諱也孟子之書幸有國䇿明徴不然則非孟之徒得以肆其說矣䇿文書宣非出髙氏豈為率意謬妄鮑之詆髙氏乃所以自謂也髙注吕氏春秋隂康氏據漢書改為陶唐氏昔人譏其不視古今人表妄改本文鮑之失正𩔖此學者之所以慎於傳疑也戰國䇿校注卷三
