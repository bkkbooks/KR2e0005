body:
  text: 戰國策校注卷七宋鮑彪原注元吳師道補正魏自高陵以陳盡河東河内南有陳留及汝南之名陵㶏彊新汲西華長平潁川之舞陽郾許鄢陵河南之開封中牟陽武酸棗卷桓子智伯索地於魏桓子魏桓子弗予任章魏人曰何故弗予桓子曰無故索地故弗予任章曰無故索地鄰國必恐重欲無厭重猶多天下必懼君與之地智伯必驕元作憍彼憍而輕敵鄰國懼而相親以相親之兵待輕敵之國智氏之命不長矣周書曰將欲敗之必姑歸之將欲取之必姑與之補曰王應麟曰周書云云此豈蘇秦所讀周書隂符者歟老氏之言出扵此朱子曰老子為柱下史故見此書君不如與之以驕智伯君何釋以天下圖智氏釋猶舍也何舍此而不為而獨以吾國為智氏資元作質質正曰當音致乎舍此不圖適足為智氏來伐之資正曰與之以地猶質也君曰善乃與之萬家之邑一智伯大說因索蔡臯狼元作梁梁補曰趙策作狼於趙趙弗與因圍晉陽韓魏反於外趙氏應之於内智氏遂亡文侯桓子之孫補曰名斯元年威烈王二年丁巳韓趙相難韓索兵於魏曰願得借師以伐趙魏文侯曰寡人與趙兄弟不敢從趙又索兵以攻韓文侯曰寡人與韓兄弟不敢從二國不得兵怒而反已乃知文侯已講補曰一本以講於已也二國不伐知魏和之皆朝魏樂羊為魏將而攻中山其子在中山中山之君烹其子而遺之羮樂羊坐扵幕下而啜之啜飲也盡一杯文侯謂覩斯贊魏人補曰姚云後語作堵師愚按左傳褚師叚宋共公子石食采於禇其後可師號禇師後因氏焉又有堵師比堵亦姓也鄭有堵汝父但此作堵師則恐字有訛曰樂羊以我之故食其子之肉贊對曰其子之肉尚食之其誰不食樂羊既㧞中山文侯賞其功而疑其心彪謂樂羊所謂隐忍以成就功名者也子則既烹矣敵人遺之羹将以亂其心也有如不忍而以慈愛沮其殺敵之心則大事去矣何救於亾子故羊忍為此以怒衆而成功乃其情則非恝然無以天性為者也覩斯賛之言其謗書之渠乎雖然羊之義視分羹為有餘比覆醢為不足使其投盃慷慨一鼔而攄家國之憤亦收功必矣介胄之士未可望之以聖人之地也正曰舜竊負而逃林回弃千金之璧輕重之分審矣豈肯以彼易此哉劉子政以此事與西巴放麑並載而曰巧詐不如拙誠真名言也鮑雖為之曲說萬端奚哉項羽坐太公俎上髙祖杯羮一語貽愧千古亦幸而不殺爾不然何以自立於天下乎西門豹為鄴令鄴属魏郡而辭乎魏文侯文侯曰子往矣補曰一本子往子往矣必就子之功而成子之名西門豹曰敢問就功成名亦有術乎文侯曰有之矣補曰一本有之夫夫属下句鄉邑老者而先受坐之士老者坐先於衆子入而問其賢良之士而師事之求其好掩人之羙而揚人之醜者而参騐之夫物多相𩔖而非也幽莠之幼也似禾莠禾下生草幽言其色茂正曰說文本云禾粟下傍生草莠今狗尾也黧元色驪驪牛之黄也似虎黧黒黄色也驪乃深黒馬耳正曰驪牛猶言犂牛狸牛不必拘以色論黧亦黒色也爾雅倉庚黧黄盖言倉庚色黧黒而黄増韻注黧黒而黄誤也白骨疑象武夫𩔖玉武夫石似玉補曰武夫即碔砆此皆似之而非者也補曰夫子曰不如鄉人之善者好之其不善者惡之文侯之言亦此𩔖而曰求其好掩人之美而揚人之醜者参騐之則其好賢也不誠而且將以來讒賊之徒意則異矣文侯與虞人期獵虞人掌山澤之官正曰孟子注守苑囿之吏鮑誤以書註官言之是日飲酒樂天雨文侯將出左右曰今日飲酒樂天又雨公將焉之文侯曰吾與虞人期獵雖樂豈可不一㑹期哉皆與之期今往㑹之乃往身自罷之魏於是乎始強魏文侯與田子方飲酒而稱樂音岳文侯曰鍾聲不比乎比猶協補曰比音毗不毗言不和也左髙言左方之聲高田子方笑文侯曰奚笑子方曰臣聞之君明則樂官音洛以治官為樂正曰通鑑無兩則字樂仍音岳下文二語甚明可推愚恐則乃明字訛衍不明則樂音今君審扵聲審言聽之察臣恐君之聾於官也文侯曰善敬聞命彪謂周衰世主無如魏文侯之賢者夫其師友淵源有子方子夏之徒誨誘規切之雖欲無賢可得乎然則用真儒無敵扵天下信矣補曰大事記史以田子方為文侯師說苑載翟璜謂子方曰公孫成進子夏而君師之進叚千木而君友之進先生而君敬之盖得其實故書曰晉魏斯好賢師卜商友叚千木敬田子方武侯文侯子補曰名撃元年安王十六年乙未魏武侯與諸大夫浮於西河補曰正義云西河即龍門河也稱曰河山之險不亦信固哉王鍾補曰姚云鍾一作錯侍坐元作王王曰此晉國之所以強也若善修之則覇王之業具矣呉起對曰吾君之言危國之道也而子又附之是重危也武侯忿然曰子之言有説乎呉起對曰河山之險信不足保也是覇王之業不從此也昔者三苖之居左有補正曰姚云下句一本無有字是按史及下文可見彭蠡之波彭蠡湖在豫章彭澤右有洞庭之水汶元作文文補曰文未詳史以岷作汶此或逺言之山在其北而衡山在其南衡南岳在長沙湘南恃此險也為政不善而禹放逐之夫衍夫字夏桀之國左天門之隂後志髙都有天井闗註云戰國策桀居天門即此闗也而右天谿之陽今按天門即史太華伊闕彼言右故此言左之隂天谿即河濟彼言左故此言右之陽正曰按史左河濟右泰即太華伊闕在其南羊腸在其北文不同盧睪在其北地缺補曰一本盧作廬未詳伊洛出其南孔曰伊水出陸渾洛水之上洛正曰伊水出今商州上洛縣南熊耳山至洛陽縣入洛洛水出今商州洛南縣冢領山至鞏縣入河有此險也然為政不善而湯伐之殷紂之國左孟門太公世家註晋山險補曰索隠云在朝歌東北而右漳滏元作釡釡補曰滏通借前帶河後被山有此險也然為政不善而武王伐之且君親從臣而勝降城城非不髙補曰姚云劉本此添也字人民非不衆也然而可得并者政惡故也從是觀之地形險阻奚足以覇王矣武侯曰善吾乃今日聞聖人之言也西河之政專委之子矣起𫝊有小異補曰起𫝊與說苑文同末云由此觀之在德不在險君若不修徳舟中之人盡為敵國也史遷曰吴起說武侯以形勢不如徳然行之於楚以刻暴少恩亾其軀揚雄曰美哉言乎使起之用兵每若斯則太公何以加諸二子論之當矣然其言不可以人廢也西河龍門之河地即同華等州魏之險阨也一𫝊惠王其地日削於秦至納上郡之時盡矣險豈足恃也哉起之言於是乎騐矣惠王武侯子補曰名罃元年烈王六年辛亥魏公叔痤為魏將而與韓趙戰澮北說文澮水出靃山西南入汾此二年敗韓馬陵敗趙于懐補曰痤祖戈反禽樂祚趙將魏王説郊迎以賞田百萬祿之閑田以待賞有功者公叔痤反走再拜辭曰夫使士卒不崩直而不倚直直前倚邪行棟橈而不避者撓折也喻敵之壓已此吳起餘教也臣不能為也前脉地形之險阻脉見其幽形見其顕决利害之備使三軍之士不迷惑者巴寜爨襄之力也二人乃所謂能士縣賞罰扵前使民昭然信之扵後者王之明法也見敵之可擊鼓之不敢怠倦者臣也王特為臣之右手不倦賞臣可也若以臣為有功臣何功之有乎王曰善於是索呉起之後賜之田二十萬巴寜㸑襄田各十萬王曰公叔豈非長者哉既為寡人勝強敵矣又不遺賢者之後不掩能士之迹公叔何可無益乎故又與田四十萬加之百萬之上使百四十萬故老子曰聖人無積盡以為人已愈有既以與人既亦盡也已愈多公叔當之矣彪謂公叔此言何其似魏絳也方之郤至驟稱其伐彼已隘矣補曰按史田文既死公叔為相而害呉起以計疑起於武侯起懼得罪而去之楚公叔即痤也澮北之戰痤乃歸功於起之餘教而使其嗣受賞何其前後之戾耶大事記顕王七年魏公孫痤敗韓師趙師于澮秦庶長國伐澮獲其將公孫痤謂史記秦本紀及魏世家云虜公孫痤惟趙世家秦魏年表云虜太子痤孟子梁惠王長子死焉盖太子申戰沒於齊者也凡史記是年言秦虜太子痤者非魏公叔痤病惠王往問之曰公叔病即不可諱死者人之所不能避故云將奈社稷何公叔痤對曰痤有御庶子此公族官别於國官及太子官正曰公叔曰痤有御庶子知為痤之家臣如甘羅為文信俟少庶子之比說又見秦韓等策公孫鞅願王以國事聽之也若弗能聽勿使出境王弗應出而謂左右曰豈不悲哉以公孫之賢而謂寡人必以國事聽鞅不亦悖乎補曰史載鞅之言曰彼不能用君之言任臣人安能用君之言殺臣乎由是觀之公叔知鞅而不能進將死之言上不能量其君之聽否下不能測鞅之去就非悖而何公叔痤死公孫鞅聞之已葬補曰大事記顕王八年公孫痤卒觧題痤去年為秦所獲尋歸之而終於相位也今年衛鞅自魏適秦則痤死必在今年西之秦孝公受而用之秦果日以強魏日以削此非公叔之悖也惠王之悖也惠王之愚固以不悖者為悖商君傳畧同秦衍韓字韓圍梁秦獻公二十三年戰少梁此九年正曰按鮑說以為魏敗韓趙于澮之年少梁即獲公叔痤之戰不聞燕趙之救也時方敗趙趙豈得救之此皆無據之言且策云圍梁不云少梁圍梁必惠王徙都大梁後不可考矣徙都大梁在惠王三十一年燕趙救之謂山陽君楚宣策言此人王同時也曰秦戰而勝三國秦必過周韓而有梁三國而勝秦三國之力雖不足以攻秦足以㧞鄭新鄭鄭近梁故云正曰韓哀侯二年已滅鄭此鄭即謂韓計者為梁計不如搆三國攻秦元仕趙策正曰證據不明且當從舊龎葱與太子質扵邯鄲魏太子謂魏王曰今一人言市有虎王信之乎王曰否二人言市有虎王信之乎王曰寡人疑之矣三人言市有虎王信之乎王曰寡人信之矣龐葱曰夫市之無危明矣然而三人言而成虎今邯鄲去大梁也逺扵市而議臣者過於三人矣願王察之也元作矣矣王曰寡人自為知言不信人於是辭行而讒言先至後太子罷質果不得見史不書太子質事以下章年時因舊次之於此正曰此策言邯鄲去大梁也逺則徙都大梁以後事恵王三十一年秦虜公子卬後徙梁而韓宋魯衛之朝乃惠王十五年也舊次恐不如此梁主魏嬰史作罃音相近觴諸侯扵范臺此十五年魯衞宋鄭君來朝補曰大事記書韓宋魯衛為序解題云是時魏恵王方強諸侯相率而朝之也索隐按紀年魯恭侯宋桓侯衛成侯鄭釐侯桓侯即公剔成釐侯即昭侯酒酣請魯君舉觴魯共公補曰李善注文選引北堂書鈔皆作舉觚大事記魯君舉觴古者於旅也語於是道古即晋所謂杜舉也魯君興避席擇言擇善而言曰昔者帝女盖堯舜女正曰無考令儀狄博物志言禹時人作酒而羙進之禹禹飲而甘之遂䟽儀狄絶㫖酒曰後世必有以酒亡其國者齊桓公夜半不嗛嗛口有所衘也言不善食補曰兼苦簞反髙注快也則當苦劫反易牙太公世家註雍巫字補曰知味者乃煎熬元作敖敖補曰熬古字通燔炙燔火爇物補曰有汁而乾曰煎乾煎曰熬肉爇之曰燔近火曰炙和調五味而進之桓公食之而飽至旦不覺飽而寢安補曰覺居效反曰後世必有以味亡其國者晉文公得南之威未詳三日不聽朝遂推南之威而逺之曰後世必有以色亡其國者楚王登強臺而望崩山左江而右湖以臨彷徨自上視下曰臨集韻彷徨仿佯仿佯徙倚也補曰姚云強䑓一作荆臺崩山一作崇山藝文𩔖聚引彷徨一作方湟亦藝文𩔖聚引也其樂㤀死補曰說苑云楚昭王欲之荆䑓司馬子綦進諫曰荆臺之遊左洞庭之波右彭蠡之水南望獵山下臨方淮其地使人遺老而㤀死王不可逰也後漢邉譲遊章華臺賦云楚王逰雲夢之澤息於荆臺之上前方淮之水左洞庭之波右顧彭蠡之隩南眺巫山之阿延目廣坐騁觀終日顧謂左史倚相曰盛哉斯樂可以遺老而㤀死也荆臺即章華也淮南子云令尹子佩請飲莊王莊王許諾云云莊王曰吾聞子樂於強䑓強臺者南望料山以臨方皇左江而右淮其樂㤀死若吾薄陋之人不可以當此樂也注料山名方皇水名右三說聊記以廣聞遂盟強臺而弗登曰後世必有以髙䑓陂池書註澤障曰陂停水曰池亡其國者盖荘王云今主君之尊儀狄之酒也主君之味易牙之調也左白台而右閭須皆羙人南威之美也補曰閭須見荀子前夾林而後蘭臺强臺之樂也臺林地缺名在其國有一於此足以亡其國今主君兼此四者可無戒與梁王稱善相屬彪謂魯司公之後也其教澤存焉故齊仲孫湫曰猶秉周禮韓起亦云周禮盡在魯矣仲尼氏作縉紳先生萃焉扵是特為中國禮義之邦觀魯君之所稱說則周孔之澤深矣舉觴一時而為天下萬世之明戒魯君豈非賢君哉補曰觀魯至深矣二語大事記取魏惠王起境内衆將太子申而攻齊客謂公子理申弟也正曰註以下說推之無明徴之傅曰何不令公子泣王太后止太子之行事成則樹德不成則為王矣太子年少不習於兵田盼宿將也而孫子臏也善用兵戰必不勝不勝必禽公子争之扵王王聽公子公子必封不聽公子太子必敗敗公子必立立必為王也彪謂止太子之行正誼也而志於樹徳為王則譎矣故夫譎正之間不容髪人議論豈不或出於正言未卒而譎随之惟其心之不正故也魏太子自將過宋外黄補曰髙註太子申也外黄今陳留外黄故宋城也後徙睢陽外黄徐子劉向别録徐子外黄人曰臣有百戰百勝之術太子能聽臣乎太子曰願聞之客曰固願效之今太子自將攻齊大勝并莒則富不過有魏而貴不益為王為王之外無加也若戰不勝則萬世無魏此臣之百戰百勝之術也太子曰諾請必從公之言而遂客曰太子雖欲還不得矣彼利太子之戰攻而欲滿其意者衆希賞也太子雖欲還恐不得矣太子上車請還其御曰將出而還與北同不如遂行遂行與齊人戰而死卒不得魏元在宋策魏記三十年有彪謂此申生伐臯落之例晉國之覆轍也里克之諫恵王非㤀之而忍為之故孟子以為不仁補曰以過宋而徐子言之從舊可齊魏戰扵馬陵齊大勝魏殺太子申覆十萬之軍魏王召惠施而告之曰夫齊寡人之讐也怨之至死不㤀國雖小吾常欲悉起兵而攻之何如對曰不可臣聞之王者得度法度而霸者知計今王所以告臣者疏扵度而逺於計王固先屬怨於趙記三十年伐趙趙告急於齊齊救趙伐魏正曰按魏伐趙趙告急於齊齊救趙伐魏乃恵王十八年敗於桂陵時事此三十年魏龎㳙伐韓齊田忌孫臏伐魏以救韓魏大發兵使太子申將與龎㳙合軍拒之戰于馬陵魏師大敗殺太子申龐㳙魏龐以下並大事記文從孫臏𫝊說又見秦齊策而後與齊戰今戰不勝國無守戰之備王又欲悉起而攻齊此非臣之所謂也謂謂得度知計王若欲報齊乎則不如因變服不為人君服折節而朝齊楚王必怒矣威王王㳺人而合其鬬㳺謂使人㳺二國之間也則楚必伐齊以休楚而伐罷齊罷音疲則必為楚禽矣是王以楚毁齊也魏王曰善乃使人報扵齊願臣畜而朝畜自比犬馬也田嬰許諾張丑曰不可戰不勝魏此設辭也而得朝禮與魏和而下楚此可以大勝也勝謂不敗耳非戰勝今戰勝魏覆十萬之軍而禽太子申臣萬乘之魏而甲秦楚居二國之上補曰姚本甲作半此其暴戾定矣言二國謂齊暴戾决矣正曰定止也謂齊之怒止且楚王之為人也好用兵而甚務名終為齊患者必楚也田嬰不聽遂内魏王而與之並朝齊侯再三趙氏醜之楚王怒自將而伐齊趙應之大敗齊扵徐州彪謂施之䇿齊楚如視白黒數一二可謂明矣而不能止太子之将何邪豈言之而不聽邪以施之智其於䇿馬陵之戰不勞慮矣張丑者亦施之倫歟惠施為齊元作韓韓魏交為猶合令太子鳴魏記唯申及赫名餘不名為質於齊王欲見之魏王朱倉魏人謂王曰何不稱病臣請說嬰子曰魏王之年長矣今有疾公不如歸太子以徳之不然公子高在楚楚將内而立之是齊抱空質而行不義也襄王恵王子補曰名赫元年顯王三十五年丁亥正曰大事記周顯王三十五年魏恵後元年解題云史記魏世家恵王卒子㐮王立㐮王十六年卒子哀王立按通鑑考異汲冡紀年恵王三十六年改元從一年始至十六年稱恵成王卒即恵王也疑史記誤兮恵成之世以為二王之年也哀王特不稱諡謂之今王世本恵王至㐮王而無哀王今王者㐮王也今從之愚按秦恵之十四年亦改後元年即恵王之比而㐮之為哀直以字近而訛爾魏惠王死𦵏有日矣天大雨雪至於牛目駕車用牛故以及其目為深候壊城郭且為棧道而𦵏羣臣多諫太子者曰雪甚如此而䘮行民必甚病之官費又恐不給請弛期弛解也昔約今解更日太子曰為人子而以民勞與官費用之故而不行先王之䘮不義也子勿復言羣臣皆不敢言而以告犀首犀首曰吾未有以言之也未得其說以說是其唯惠公乎施也請告惠公惠公曰諾駕而見太子曰𦵏有日矣太子曰然惠公曰昔王季厯𦵏扵楚山之尾灓水齧其墓灓謂流也補曰姚云後語作蠻水註引荆楚記宜都烏水按季厯卒塟鄠縣之南皇甫謐云楚山一云潏山鄠之南山雖有楚山之名不宜得蠻水所醤灓音鸞說文云漏流也一曰潰也墓為漏流所潰故云吕氏春秋作𦵏於渦水之尾後云天故使明水見之初學記引一作渦山論衡作滑山見棺之前和和棺兩頭木補曰玉篇胡戈户卧二反廣韻作􅺪皆云棺頭也此作和盖音通文王曰嘻先君必欲一見羣臣百姓也夫故使灓水見之於是出而為之張朝張幕帟如朝廷然正曰姚云張於朝註後語張張以朝按周禮掌次以待張事百姓皆見之三日而後更𦵏此文王之義也今𦵏有日矣而雪甚及牛目難以行太子為及日之故得毋嫌扵欲亟𦵏乎願太子更日先王必欲少留而扶社稷安黔首也秦稱民黔首非此時語也正曰禮祭義亦有黔首字非始扵秦故使雪甚因弛期而更為日為猶撰正曰下文有此文王之義也若此而弗為意者羞法文王乎太子曰甚善敬弛期更擇日惠子非徒行其說也又令太子未𦵏其先王而又因說文王之義說文王之義以示天下豈小功也哉補曰雨去聲為之為及之為去聲張之反徐州之役楚敗齊也齊宣十年此二年正曰惠王後二年補曰徐州見齊策犀首謂梁王曰何不陽與齊而隂結扵楚二國恃王衍齊字齊補曰一本於此下有楚字必戰齊戰勝楚而與乘之與齊乗楚必取方城之外楚戰勝齊衍敗字敗補曰姚云一本無此字正曰即楚敗齊將申縳泗上之役見秦策而與乘之是太子之讐報矣太子申蘇子為趙合從說魏王曰大王之地南有鴻溝項羽記註詳在滎陽補曰蘇子秦也下南有字恐衍陳汝汝水出𢎞農入淮補曰陳宛丘豫州界汝恐連下南字汝南郡也而下衍有字南有許鄢昆陽邵陵舞陽鄢下並属潁川正曰鄢史作郾索隐云潁川有許郾二縣又有鄢陵縣故所稱多惑昆水出南陽昆陽舞陽属潁川邵陵属汝南新郪属南陽正曰索隠云属汝南郡即郪丘七思反又音妻史有新都字新都属南陽鮑誤入東有淮潁水出潁川陽城補曰淮見前沂水出泰山盖縣黄即陳留外黄正曰黄說見秦䇿大事記如鮑說煮棗無踈補曰姚本煮棗下有海鹽字徐廣云煮棗在濟隂宛句正義云兾州信都縣東北有煮棗田宛句者在河南信都者在河北無疎姚註曽作無胥史司按蘇代曰决宿胥之口魏無虗頓丘徐廣云紀年魏救山塞集胥口正義云魏志武帝於清淇口東因宿胥故瀆開白溝道清淇二水入焉西有長城之界滎陽卷縣有長城經陽武到宻補曰大事記今開封陽武縣魏惠王十五年魏龍賈帥師築長城於西邉長城即上所指又十九年魏築長城塞固陽正義云自鄭濱洛北定銀州至勝州固陽縣為塞固陽有連山東西黄河西南至夏澮等州按蘇秦說合從在恵主後二年後七年納上郡地則此時固陽之長城猶魏地也北有河外卷衍燕酸棗補曰正義云河外謂河南地卷丘權反在鄭州原武縣北衍燕酸棗見秦策史無燕字按張儀說魏亦云秦下兵攻河外㧞卷衍燕酸棗正義謂河外即其地也地方千里名雖小然而廬田廡舍廬田間屋廡廊下周屋曾無所芻牧牛馬之地居人多故人民之衆車馬之多日夜行不休已無以異於三軍之衆行人多故如軍陣臣竊料之大王之國不下扵楚然横人訹元作謀史作怵謀正曰怵音黜恐也訹音恤誘也策字通見前然作謀自可謂横人為王謀王外交強虎狼之秦以侵天下卒有國患國謂魏不被其禍謂横人夫挾強秦之勢以内劫其主罪無過此者且魏天下之強國也大王天下之賢主也今乃有意西面而事秦稱東藩築帝宫為秦築宫偹其廵幸受冠帶受服於秦祠春秋肋秦祭祀臣竊為大王愧之臣聞越王勾踐以散卒三千散則非梟勇禽夫差於干遂補曰干遂見秦策武王卒三千人革車三百乘斬紂於牧之野豈其士卒衆哉誠能振其威也今竊聞大王之卒武力二十餘萬蒼頭二十萬盖以青帕首項紀註士卒皂巾補曰史記註魏氏武卒衣三属之甲操十二石之弩負矢五十置戈其上冠冑帶劍嬴三日之糧日中而趨百里大事記荀卿所謂魏之武卒也奮擊二十萬厮徒十萬補曰正義云厮徒謂烹炊供養雜役厮音斯車六百乘騎五千疋此其過越王勾踐武王逺矣今乃刼扵羣臣之說而欲臣事秦夫事秦必割地效質故兵未用而國己虧矣凡羣臣之言事秦者皆姦臣非忠臣也夫為人臣割其主之地以外交偷取一旦之功偷茍且也而不顧其後破公家而成私門外挾強秦之勢以内刼其主以求割地願大王之熟察之也周書曰綿綿不絶綿薄弱也正曰詩綿綿𤓰瓞𫝊不絶貌蔓蔓元作縵縵縵若何蔓延也若縵則無文之稱耳若何言不可奈何正曰蔓縵字通借毫毛不㧞喻樹之萌將成斧柯柯斧柄補白家語孔子觀周廟金人之銘曰熖熖不滅炎炎若何㳙涓不壅終為江河綿綿不絶或成網羅毫末不札將尋斧柯云云策謂周書其指此歟前慮不定後有大患將奈之何大王誠能聽臣六國從親專心并力則必無強秦之患故敝邑趙王肅侯使使臣獻愚計奉明約在大王詔之魏王曰寡人不肖未甞得聞明教今主君以趙王之詔詔之敬以國從秦傳有張儀欲并相秦魏儀相魏在此十三年正曰秦惠後三年魏惠後十三年故謂魏王曰儀請以秦攻三川王以其間約南陽約謂使韓以此與魏韓氏亡史厭韓氏之亾史名厭謂趙獻與厭俱在楚正曰無考曰公何不以楚佐儀求相之於魏韓恐亾必南走楚補曰走音奏儀兼相秦魏則公亦必并相楚韓也儀因獻得相必徳獻楚得韓儀必緩攻韓亦德獻也魏王將相張儀犀首弗利補曰大事記魏惠王後十三年張儀相魏魏不事秦以公孫衍代相故令人謂韓公叔曰張儀已合秦魏矣其言曰魏攻南陽秦攻三川韓氏必亡且魏王所以貴張子者欲得地也則韓之南陽舉矣子盍少委焉請以事委衍以為衍功有功魏乃任之正曰大事記令韓以與魏南陽為公孫衍之功則秦魏之交可廢矣魏任衍則聽其所為如此則魏必圖秦而棄儀收韓而相衍公叔以為然因而委之犀首以為功果相魏衍𫝊有補曰大事記魏王不聼儀者公孫衍間之也衍𫝊稱衍相魏張儀去則不然以儀𫝊考之儀慙無以歸報留魏四嵗而魏王卒復說其嗣君久之始去魏相秦爾愚謂儀說魏合秦襄王久而後聽恵王之崛強猶未入其言故公孫衍之間易為力也楚許魏六城與之伐齊而存燕張儀欲敗之謂魏王曰齊畏三國之合也楚魏燕必反燕地此齊宣因䘮伐燕所得正曰按史易王初立齊宣王因䘮伐燕取十城蘇秦說齊使復歸燕十城必非此時䇿云伐齊存燕盖齊人破燕後事也以下楚衍趙字趙正曰姚本下句亦云失謀扵楚趙必聽之而不與魏六城是王失謀扵楚而樹怨衍而字而補曰疑衍於齊秦也齊遂伐趙趙魏鄰也伐之以動魏取乗丘属泰山補曰正義云乗丘故城在兖州瑕丘縣西北收侵地虚頓丘危補曰虗謂殷虗今相州所理頓丘故城在魏州頓丘縣東北括地志二城時属魏餘見秦䇿楚破南陽九夷疑當為九嶷正曰此南陽堵赭同陽属荆州者以下文連九嶷許鄢言之故也大事記李斯書云惠王用張儀計南取漢中包九夷制鄢郢九夷即属楚之夷方孔子在陳蔡相去不逺所以有欲居九夷之言此與集註異愚謂此言破南陽之九夷也内沛豫州郡内言入其地正曰内市地名必非豫州者許鄢陵危之所得者新觀也属魏郡補曰正義引括地志觀津在兾州棗陽一云武邑縣東南本趙邑今属魏今詳名新觀者恐以此大事記云属清河又云魏恵王三年齊伐魏取觀津赧王四十二年魏再敗趙魏取趙觀津所属不常而道途宋衛為制言雖得新觀路所從出乂限二國事敗為趙驅敗者楚不與也楚不與則齊伐趙亾將及魏故奔走援之事成功縣宋衞成謂楚與之地受地必由二國縣言輕重係之魏王弗聽也張儀告公仲令以饑故賞韓王以近河外賞猶勸也韓時飢因勸之就粟於河外河外近魏故魏恐韓王宣恵也正曰此句不可解恐韓王字當在令下而衍一以字謂公仲令韓王以饑故賞賜近河外之民魏王懼問張子張子曰秦欲救齊韓欲攻南陽補曰此河内修武秦韓合而欲攻南陽無異也言無他且以遇于王兩君相遇則講信修睦故遇者相好也王不遇秦韓之卜也决矣决無他疑韓以魏不與秦遇知其惡我必和秦而攻魏魏王遂尚遇秦信韓尚言欲之甚廣魏救趙廣猶心廣體胖云樂之也此著書者述其遇秦之效魏昔懼而今心廣又豈能止齊伐趙邪正曰寬廣也寛魏之憂也斥元作尺尺補曰未詳楚人遽於革下地缺革豈鬲邪遽傳遽楚以𫝊來許地魏斥之也補曰姚本革下遽未詳恐有缺誤革疑華伐齊之事遂敗張儀惡陳軫於魏王曰軫善事楚為求壤地也甚力衍之字之左華未詳補曰楚䇿作左爽謂陳軫曰儀善於魏王魏王甚愛之公雖百說之猶不聽也公不如以補補曰如下宜有以字楚策有儀之言為資而反於楚王反言報之王懐王陳軫曰善因使人先言於楚軫自是如楚正曰楚䇿云楚王喜欲復之未知即以此時如楚否䇿云儀善於魏王王甚爱之當是惠王時事補曰軫之荅秦王曰子胥忠其君天下皆欲以為臣孝己愛其親天下皆欲以為子臣不忠於王楚何以臣為忠斯言宜若自信矣今也因張儀謂其善事楚為求壤地乃以為資而反楚則前日所云一時口給禦人耳豈其情哉張儀欲窮陳軫時在楚令魏王召而相之來將倍元作悟音背悟補曰字誤姚云曽作梏之將行其子陳應止其公之行公翁同項羽紀註謂父曰物之湛者不可不察也湛謂其謀之深鄭彊出秦強自秦出在楚補曰韓䇿鄭強載金入秦請伐韓此云出秦也曰應為智言能止其父補曰姚本註曽智作之夫魏欲絶楚齊必重迎公軫在楚必合齊而魏欲離之故迎軫郢中不善公者欲公之去也必勸王多公之車王楚懐補曰郢中止去也讀車字句公至宋道稱疾而母行使人謂齊王閔正曰大事記張儀相魏在恵王後十三年尋以公孫衍代㐮王二年因請成于秦為秦相後八年秦出之魏次年死其在位多惠王時與齊宣相涉曰魏之所以迎我者欲以絶齊楚也齊王曰子東使東來齊無之魏而見寡人也請封子因以魯侯之車迎之張儀欲以魏合於秦韓而攻齊楚惠施欲以魏合扵齊楚以案兵人多為張子於王所所猶處惠子謂王曰小事也謂可者謂不可者正半况大事乎以魏合於秦韓而攻齊楚大事也而王之羣臣皆以為可不知是其可也如是其明耶亡羣臣之智術也亡得無也正曰姚本亡作而下文有如是其同耶是其可也未如是其明也而羣臣之智術也又非皆同也是其有半塞也塞不明所謂刼王者失其半者也事不明而欲王必從是刼王也王而從之失其半矣正曰此策言小事人可否者且正半而此大事人皆同聲必非皆知其可而智術之皆同者則明與不明者居半也彼劫王必以從失其明者之半也此䇿云欲以魏合於秦韓亦當是惠王時張衍子字子補曰姚云劉去此字儀以秦相魏齊楚怒而欲攻魏雍沮魏人謂張子曰魏之所以相公者以公相則國家安而百姓無患今公相而魏受兵是魏計過也齊楚攻魏公必危矣張子曰然則奈何雍沮曰請令齊楚解攻雍沮謂齊楚之君閔懐曰王亦聞張儀之約秦王乎惠曰王若相儀於魏齊楚惡儀必攻魏魏戰而勝是齊楚之兵折而儀固得魏矣若不勝衍魏字魏魏必事秦以持其國必割地以賂王若欲復攻秦攻齊楚正曰言魏割地合扵秦齊楚復攻魏而秦救之則齊楚罷敝不足以應秦此䇿亦當在惠王時其弊不足以應秦二國嘗戰今必弊故不能當秦此儀之所以與秦王隂相結也今儀相魏而攻之是使儀之計當扵秦也非所以窮儀之道也齊楚之王曰善乃遂解攻於魏補曰齊䇿秦恵王死儀乞之梁以致齊伐儀使馮喜說齊王云云其言頗與雍沮𩔖哀王㐮王子元年慎靚王三年癸夘正曰哀當作㐮說見前鮑所次多惠王時事見各條謂補補曰章首有缺文張儀臣補謂齊王閔正曰見前曰王不如資韓朋與之逐張儀於魏魏因相犀首齊使相之因以齊魏廢韓朋而相公叔以伐秦公仲聞之必不入於齊據公於魏此士言其效也齊廢公仲而逐儀故公仲據儀不合齊是公無患此士計非先逐張儀不能得衍合魏非合魏不能廢朋朋怒則復善儀矣於此然後知公仲之名朋也元在韓䇿正曰事與公仲公叔相涉當従舊策有魏因相犀首之語當是恵王時說見下章陳軫為秦使於齊過魏求見犀首犀首謝陳軫辭不之見陳軫曰軫之所以來者事也公不見軫軫且行不得待異日矣犀首乃見之陳軫曰公惡事乎何為飲食而無事衍無事必來四字無事必來補曰四字恐因下文衍犀首曰衍不肖不能得事焉何敢惡事陳軫曰請移天下之事於公犀首曰奈何陳軫曰魏王使李從李從趙人以車百乘使於楚公可以居其中而疑之公謂魏王曰軫教衍臣與燕趙故矣言與之故數令人召臣也曰無事必來今臣無事請謁而往無久言不久扵彼旬五之期期以十日五日王必無辭以止公公得行因自言於庭曰臣急使燕趙言有急事出使急約車為行具行所當具犀首曰諾謁魏王魏王許之即明言使燕趙諸侯客聞之皆使人告其王曰李從以車百乗使楚犀首以車三十乗使燕趙齊王閔聞之恐後天下得魏恐得魏後於諸侯以事屬犀首犀首受齊事魏王止其使初以無事請行今有齊事魏亦且任之故止之燕趙聞之亦以事屬犀首楚王懐聞之曰李從約寡人今燕齊趙皆以事因犀首魏為主約故諸侯因衍以合魏犀首必欲寡人寡人欲之乃倍李從而以事因犀首從與衍皆為魏約耳而因衍者衆故楚亦因之背從者欲専於衍也魏王曰所以不使犀首者以為不可不可任今四國屬以事寡人亦以事因焉犀首遂主天下之事復相魏復言得四國又相魏也非己相罷而又復衍傳有在張儀初相之後彪謂軫之所言唯此有七國捭闔風氣不然醇乎醇矣補曰軫𫝊以李從為田需正曰陳軫過犀首而不見宜若有憾焉而必見之又教之以收天下之事任何也一人皆不善扵張儀者也激犀首以重任皆所以傾儀而已鮑氏於軫深所歸重此章知其失不可揜則曰不然醇乎醇矣鮑因軫荅秦王之楚之對而亟加矜奨曲為之說故愚亦屢擿其㣲非好為攻發也犀首相在惠王時說見下章齊王閔將見燕趙楚之相於衛約外魏不親之魏王懼恐其謀伐魏也告公孫衍公孫衍曰王與臣百金臣請敗之王為約車載百金犀首期齊王至之日度其至衛之日先以五十乘至衛間齊行人補以百金間私見之正曰間居諫反投間隙也行以百金猶云行㡬金於某以請先見齊王乃得見因久坐與從容談三國之相怨謂齊王曰王與三國約外魏魏使公孫衍來今久與之談是王謀三國也齊王曰魏王聞寡人來使公孫子勞寡人寡人無與之語也三國之相不元作不相不相補曰字殽次當作相不信齊王之遇遇事遂敗按上章張儀將相魏犀首以計去之乃得相而儀相魏四嵗則所謂以計去之在儀欲相之初衍得相宜在儀復相秦之時也正曰大事記書魏惠王後十三年秦張儀免相相魏魏不事秦以公孫衍代相解題云衍傳稱衍相魏儀去則不然儀慙無以歸報留魏四嵗而惠王卒後魏㐮王二年始去魏復相秦魏令公孫衍請和於秦綦母恢教之語曰無多割補曰一本此下有曰字乃教衍說秦之辭和成固有秦重和補曰一本標孫本無和字以與王遇和不成則後必莫能以魏合於秦者矣衍已相秦故正曰此策惠㐮之世不可定公孫衍為魏將與其相田需元作繻從下章及史繻補曰即需不善季子未詳為衍謂梁王曰獨不見夫服牛驂驥乎不可以行百步今王以衍為可使將故用之也而聽相之計是服牛驂驥也牛馬俱死而不能成其功王之國必傷矣願王察之彪謂此用賢而使不肖間之之說也而衍也非其人也補曰此策若作魏將則恐在㐮王時犀首田盼欲得齊魏之兵以伐趙梁君與田侯閔王正曰事在齊宣十一年魏惠後三年趙肅侯十八年公孫衍欲敗從田朌本非與謀故其聞衍之說猶能以用兵難之既而訹扵其言勸兩君以聽衍而身將齊魏之兵盖狃扵戰闘之習堕衍計中以成其欺以敗和好快讐秦之欲皆盼之為也觀馬陵之役魏客之言張丑說楚之辭知盼為鄰國所畏百姓所服今以此事觀之盼亦優扵勇而短于謀者也不欲犀首曰請國出五萬人不過五月而趙破田盼曰夫輕用其兵者其國易危易用其計者其身易窮公今言破趙太易恐有後咎犀首曰公之不慧也夫二君者固已不欲矣今公又言難以懼之是趙不伐而二士之謀困也二士衍盼且公直言易而事已去矣夫搆難而兵結田侯梁君見其危又安敢釋卒不我予乎田盼曰善遂勸兩君聽犀首犀首補二字補曰姚氏本有二字田盼遂得齊魏之兵兵未出境梁君田侯恐其至而戰敗也悉起兵從之大敗趙氏犀首見梁君曰臣盡力竭智欲以為王廣土取尊名田需從中敗君補曰一本標君一作臣又作之王又聽之是臣終無成功也需亡臣將侍需侍臣請亡王曰需寡人之股掌之臣也猶股肱為子之不便也殺之亡之補曰一本標云有外之字母謂天下何内之無若羣臣何也内謂親之稱羣臣則衍與焉正曰言殺之亾之天下之人與内之羣臣皆不以為然也今吾為子外之令母敢入子之事入猶與入子之事者吾為子殺之亡之胡如胡猶何犀首許諾於是東見田嬰與之約結召文子田文而相之魏身相於韓補曰田文為魏相盖犀首約結於嬰召其子而相之也下章與此同事宜在㐮王時非文奔魏相昭王事也身相韓衍欲相韓也下言置田需以稽二人則衍仍留魏矣一本此下别為一章姚本註云曽題劉連蘇代為田需說魏王曰臣請問文之為魏孰與其為齊也王曰不如其為齊也衍之為魏孰與其為韓也衍隂晋人時属韓故下蘇代說昭魚亦云正曰隂晉魏地衍實魏人其善韓非以此王曰不如其為韓也衍而字而蘇代曰衍將右韓而左魏右言助之力正曰時尚右說見趙策文將右齊而左魏二人者將用王之國舉事於世中道而不可中道猶中立也言不能兩全二國且王無所聞之矣不聞所以救之正曰彼有外心王不得而聞之王之國雖滲浸㣲浸弱漏器然樂而從之可也言如漏器尚足樂雖從二子可也然從二子必亟亡不得如是也補曰渗樂未詳王不如舍需於側舍猶措以稽二人者之所為二人者曰需非吾人也需非二人之黨吾舉事而不利於魏需必挫我扵王二人者必不敢有外心矣二人者之所為之利於魏與不利於魏王厝需於側厝措同以稽之臣以為身利身王身而國便於事補曰一本而便於亊乂姚註云劉去身利字一無而字似義長王曰善果厝需於側彪謂哀王扵是有人君之言不亡需是也惜其不旋踵需不入衍之事蘇代入之矣待衍如是可也如得賢而付之閫外若此者不亦殆乎正曰魏王始聽犀首而欲外田需復因蘇代而置需以稽二人賢否乃不知用舍之不能熒惑扵㳺士之言而拱手以聽之其孱昏甚矣史舉即甘茂所事非犀首於王犀首欲窮之謂張儀曰請令王讓先生以國衍以此說儀使之為己解舉故舉後見之王為堯舜矣而先生弗受亦許由也衍因令王致萬户邑於先生弗受國故致邑張儀說因令史舉數見犀首王聞之而弗任也任猶信也舉既非之而數見之故王疑之史舉不辭而去補曰據此譲國之說不特鹿毛夀之愚燕噲也此恐惠王時事楚王懐攻梁南韓氏因圍黄元作薔下同薔補曰未詳一本作成恢魏人為犀首謂韓王襄曰疾攻黄薔楚師必進矣魏不能支交臂而聽楚韓氏必危故王不如釋黄薔魏無韓患必與楚戰戰而不勝大梁不能守而又況存黄薔乎若戰勝兵罷敝罷音疲大王之攻黃薔易矣正曰此策時不可考張儀為秦連横說魏王曰魏地方不至千里卒不過三十萬人地四平諸侯四通條達輻湊如木枝分布而四方湊之如輻於轂無有名山大川之限從鄭至梁不過百里從陳至梁二百餘里馬馳人趨不待倦而至梁言陳鄭所至皆平地南與楚境西與韓境北與趙境東與齊境卒戍四方他國境或有山川闗塞惟梁無之皆以卒戊守守亭障者參列十里一亭障隔也築城壘為之補曰障闗塞邉候開封有古夷門闗粟糧漕庾漕水運庾水漕倉不下十萬魏之地勢固戰塲也魏南與楚而不與齊則齊攻其東東與齊而不與趙則趙攻其北不合於韓則韓攻其西不親扵楚則楚攻其南此所謂四分五裂之道也且夫諸侯之為從者以安社稷尊主強兵顯名也合從者一天下約為兄弟刑白馬以盟扵洹水之上以相堅也夫親昆弟同父母尚有争錢財而欲恃詐偽反覆蘓秦之餘謀其不可以成亦明矣大王不事秦秦下兵攻河外㧞卷衍破酸棗刼衛取晉陽補曰史作陽晉正義云陽晋故城在曹州乗氏縣西北則趙不南趙不南則魏不北魏不北則從道絶主從者趙故不言其地補曰一本復有從道絶三字史同則大王之國欲求無危不可得也秦挾韓而攻魏韓刼於秦不敢不聽秦韓為一國魏之亡可立而須也此臣之所謂大王患也為大王計莫如事秦事秦則楚韓必不敢動無楚韓之患則大王高枕而卧國必無憂矣且夫秦之所欲弱莫如楚而能弱楚者莫若魏楚雖有富大之名其實空虚其卒雖衆多然而輕走易北不敢堅戰患補正曰史作悉魏之兵南面而伐勝楚必矣夫虧楚而益魏攻楚而適秦適猶歸乃嫁禍安國此善事也大王不聽臣秦甲出而東伐雖欲事秦而不可得也且夫從人多奮辭猶大言而寡可信說一諸侯之王出而乗其車約一國而成反而取補補曰姚本作而反成而云云封侯之基是故天下之㳺士莫不日夜搤腕搤把腕手也瞋目瞋張目也切齒言之力也正曰荆軻傳索隠云齒相摩切奮怒意以言從之便以說人主人主覧其辭牽其說惡得無眩哉臣聞積羽沉舟羣輕折軸衆口鑠金補曰周語衆口鑠金註衆口所毁雖金石猶可銷史下又有積毁銷骨一句江淹書積毁銷金積讒磨骨故願大王之熟計之也魏王曰寡人憃愚前計失之請稱東藩築帝宫受冠帶祠春秋效河外儀𫝊在諸國之先彪謂魏邇秦而無阻固凡横人之辭若可聽唯魏也故儀先之魏一摇而諸國動矣敗從之約魏其過歟使魏而繹其說曰秦豈能有愛扵我哉兵來不除道何為以說客先之是知其不可而沭我也且我事秦安得髙枕而無憂哉如是展轉計之則儀之辭屈矣魏不摇諸侯將又曰彼魏四達之國又通扵秦彼猶堅約不動我何懼乎秦如是則諸侯一矣惜魏之不知出此也補曰史張儀留魏四嵗而㐮王卒實惠王哀王立實㐮王張儀復說王王不聽於是儀隂令秦伐魏魏與秦戰敗明年齊又敗魏觀津秦復欲攻魏先敗韓申差諸侯震恐張儀復說魏王云云王乃倍從約而因儀請成於秦事在襄王二年正曰顯王三十六年蘇秦約六國合從次年秦使犀首約齊魏以伐趙而從約解慎䚍王三年蘇秦約六國伐秦再申前約也兵至函谷闗秦擊之而走次年齊敗魏趙觀津則齊敗約矣既而韓與魏趙伐秦而敗張儀留魏六年說而不聽今因其兵敗從散而說之得其隙矣魏不得不聽也魏非不知從之利而秦之不可信也劫於秦之強而患於與國之不一後三年魏復背秦合從其情可見矣惜其自同連雞中兄弟争財之料而相與以趨於亡從之不可合合之不可久其勢則然矣鮑之責魏殆未深究夫事情也補曰搤音厄憃愚也書容抽江丑用陟降四反義並同齊魏約而伐楚以董慶為質於齊楚攻齊大敗之而魏弗救田嬰怒將殺董慶盱夷皆魏人補曰一本旴作吁姚註劉作于謂田嬰曰楚攻齊大敗之而不敢深入者以魏為將内之扵齊言縱楚使深入乃擊之也而擊其後今殺董慶是示楚無魏也魏怒合於楚齊必危矣不如貴補曰姚註一作舍董慶以善魏而疑之扵楚也正曰時不可考張儀走之魏傳言秦武元年羣臣惡之乞之梁此九年正曰按㐮王九年儀走魏魏納而相之此云不内恐非是時事魏將迎之張丑諫於王欲勿内不得於王王不聽也張丑退復諫於王曰王亦聞老妾事其主婦者乎子長色衰重嫁而已重猶再今臣之事王若老妾之事其主婦者魏王因不納張儀彪謂丑之自比若此豈可望扵士君子之行哉哀王聽其說是亦魏媪之耄者耳衍魏字魏文子田文正曰提魏事也田需周霄孟子時有此人至是三十年矣正曰田文前相魏當㐮王時孟子見梁㐮王相去不逺也相善欲罪犀首犀首患之謂魏王曰今所患者齊也嬰子言行於齊王閔王欲得齊則胡不召文子而相之彼必務以齊事王王曰善因召文子而相之犀首以倍田需周霄二人雖善文今衍薦文文必善衍善衍則復背其所善魏王令惠施施自孟子時至此亦三十餘年正曰施屢見䇿文盖惠㐮時人此䇿不可考之楚令犀首之齊鈞二子者言周禮之等乗數鈞車乗之數將測交也測猶卜也視何國厚君使因知其厚我下衍楚王聞之四字楚王聞之補曰四字恐因下文衍施因令人先之楚言曰魏王令犀首之齊惠施之楚鈞二子者將測交也施欲楚之厚已楚王聞之因郊迎惠施田需貴扵魏王惠子曰子必善左右今夫楊横樹之則生倒樹之則生補曰姚云倒劉作測愚謂倒字勝折而樹之又生然使十人樹楊一人㧞之則無生楊矣故以十人之衆樹易生之物然而不勝一人者何也樹之難而去之易也今子雖自樹扵王而欲去子者衆則子必危矣補曰此與孟子雖有天下易生之物云云語相𩔖而意在自樹又云子必善左右則君子小人之用心可見矣田需死昭魚謂蘇代曰田需死吾恐張儀薛公嬰正曰史索隠以為田文按嬰卒於閔王之世大事記附見扵閔元年此事在四年後犀首之有一人相魏者代曰然則相者以誰而君便之也昭魚曰吾欲太子之自相也代曰請為君北見梁王必相之矣昭魚曰奈何代曰若其為梁王若汝也補曰一本君其為考下文是代請說君昭魚曰奈何對曰代也從楚來昭魚甚憂代曰君何憂曰田需死吾恐張儀薛公犀首有一人相魏者代曰勿憂也梁王長主也必不相張儀張儀相魏必右秦而左魏薛公相魏必右齊而左魏犀首相魏必右韓而左魏梁王長主也必不使相也王曰然則寡人孰相以史補王曰下八字正曰史有此八字按此乃蘇代請昭魚為王而設為說王之辭無此固可也代曰莫如太子之自相是三人不以太子為非固相也固猶久補曰不以一本作皆以史同皆將務以其國事魏而欲丞相之璽印也補曰秦武王初置丞相用樗里子甘茂在張儀死後此云丞相璽則魏已有此名以魏之強而持三萬乗之國輔之魏必安矣故曰不如太子之自相也遂北見梁王以此語告之太子果自相魏記九年有補曰大事記赧王八年書秦逐公孫衍謂衍已去秦事不復見韓非子載犀首與張夀為怨陳需新入不善犀首因使人㣲殺張夀魏王以為犀首也乃誅之然則衍去秦後終為魏所殺也愚按陳需即策中田需而䇿以田需死後魏欲相犀首其說不同當考又赧王二十二年伊闕之敗策云公孫衍割地和秦大事記猶著其名豈别一人耶李兊約五國攻秦時亦有公孫衍去此又九年上距犀首為秦大良造時幾五十年嘗疑其甚逺說見趙䇿周最善齊翟強善楚二子者欲傷張儀扵魏張子聞之因使其人儀之人為見者嗇夫見者最與強見王也正曰見賢遍反見者謂引見傳命之臣儀使其臣為見者之嗇夫以間伺之補曰嗇夫書註主弊之官秦制郷有嗇夫職獄訟收賦稅漢有虎圈嗇夫所職不同皆小臣之名間見者間以侯伺之因無敢傷張子此九年儀再相魏時正曰無考周最入齊魏不善之正曰周䇿為最謂魏王曰王不去周最合與收齊又謂最曰魏貴合秦伐齊而公修虗信云云不如謂王曰請入齊此語在田文相魏昭王時是最先見逐扵齊今復自魏入齊詳周策所載必最後欲之齊而魏聽之非不善之故也秦王武正曰昭怒令姚賈讓魏王最盖秦所置以相魏者補曰此因下文為王通天下一語生說無據魏王為之為最盖秦亦怒最之去魏正曰是時齊秦交惡而秦欲合魏最自齊走魏人言其不忍背齊而今復之齊必復為齊所厚者魏雖欲合秦而猶牽於收齊之說其入齊盖魏聽之故為之言扵秦其辭亦婉謂秦王曰魏之所以為王通天下者以周最也今最遁寡人入齊齊無通於天下矣齊秦為敵魏既以最通天下於秦則外齊矣今最入齊天下不知以謂魏使之齊敗齊事因不通齊矣正曰齊秦為敵齊逐最而魏收之天下信魏之不與齊故曰為王通天下今最遁入齊則天下知魏絶最而齊收之齊何以通於天下乎敝邑之事王亦無齊累矣齊納魏所不善則可以絶之正曰最遁魏入齊而齊收之則齊魏之絶明矣秦可以不疑魏之與齊也大國欲急兵伐齊則趣趙而已促使應秦也魏不善最而言為最所以自為也按此姚賈與始皇所問之人相去八十餘年髙誘欲以為陳賈若此人者可也盖陳舜後得為姚姓而孟子與秦武魏哀時猶相及獨以毁韓非相毁之人為此人則年時相絶太逺矣可乎哉補曰趣趙說見周䇿正曰姚賈說見秦䇿秦召魏相信安君史不書信安君不欲往蘓代為說秦王武或昭正曰無攷曰臣聞之忠不必黨為信安說疑扵黨之黨不必忠今臣願為補補曰願下有缺字大王陳臣之愚意恐其不忠扵下吏自使有要領之罪要領斬刑也願大王察之今大王令人執事於魏謂别置相以代信安以完其交臣恐魏交之益疑也將以塞趙也信安必右趙者秦召而代之欲魏不通趙臣又恐趙之益勁也交魏益堅夫魏王之愛習魏信也甚矣魏信即信安省言之其智能而任用之也厚矣其畏惡嚴尊秦也明矣惡猶憚今王之使人入魏而不用則王之使人入魏無益也若用用秦所使魏必舍所愛習而用所畏惡此魏王之所不安也夫舍萬乗之事而退謂去相位此魏信之所難行也夫令人之君處所不愛令人之相行所不能以此為親則難久矣臣故恐魏交之益疑也且魏信舍事亦去信也則魏元作趙趙之謀者必曰舍扵秦此舍猶棄奪其愛習是秦棄魏也秦必令其所愛信者用趙是趙存而我亡也我魏也秦本欲塞趙而云然此魏自疑之辭非必秦意趙亾而我危也則上有野戰之氣將與秦戰下有堅守之心臣故恐趙之益勁也魏不能獨抗秦必結趙正曰趙之謀事者曰魏信見舍扵秦秦亦將易置趙之臣令其所愛信者用於趙我之權去勢奪是趙存而我已亡趙安而我獨危則必戰必守不聽秦命是趙益以強也大王欲完魏補補曰姚本有魏字之交而使趙小心乎不如用魏信而尊之以名魏信事王國安而名尊離王不事之國危而權輕然則魏信之事王也上所以為其主者忠矣下所以自為者厚矣彼其事王必完矣趙之用事者必曰魏氏之名族不高於我土地之實不厚扵我魏信以衍韓字也韓補曰疑衍魏事秦秦甚善之國得安焉身得尊焉今我搆元作講講補曰宜從搆讀難於秦兵為招質言於用兵為招為質招言召兵質猶本也為之張本正曰招質未詳國處削危之形非得計也結怨於外生患扵中身處死亡之地非完事也彼將傷其前事而悔過其行冀其利必多割地以深下王下亦亊也則是大王垂拱多割地以為利重得地則益重堯舜之所求而不能得也臣願大王察之彪謂堯舜譲天下而何愛於地此特辯士欲重其亊而言之過若此者不一也正曰此𩔖註不必辯樓牾魏人後又作梧補曰一本作姚同註引管子云事無常而法令申不則國失勢註古伍字謂偶合也愚按玉篇無字有牾字五故反觸也逆也策後作梧韻書牾作梧午荀子午箕軍蘁莊子梧國䇿韓子迕前漢志逜逆捂抵捂梧枝梧凡十一字典籍往往通借上去聲約秦魏魏太子為質此十二年朝秦正曰世家襄王十二年太子朝於秦秦來㧞我皮氏未㧞而解此䇿云太子為質既而留於酸棗昭衍說後不云復遣當缺紛彊魏人正曰髙註魏臣欲敗之謂太后曰國與還者也還猶反也兩國相與好惡循環不定補曰髙註還周旋於利也敗秦而利魏魏必負之負言魏得利而強將不事秦所謂還反負秦之日太子為糞矣即所謂糞之正曰糞棄除也太后坐王而泣使王坐而泣於前王因疑於太子不决遣令之留於酸棗樓子患之昭衍為周之梁樓子告之昭衍見梁王梁王曰何聞曰聞秦且伐魏王曰為期與我約矣言期以太子結約而不遣為此故伐耶正曰言與我結約矣何為而伐曰秦疑扵王之約以太子之留酸棗而不之秦秦王昭正曰無考之計曰魏不與我約必攻我我與其處而待之見攻不如先伐之以秦強折節而下與國與與國共伐魏臣恐其害扵東周不欲正言魏受伐魏與周鄰言周則魏可知元在秦策正曰交載秦魏事從舊可補曰為周之為去聲秦楚攻圍皮氏亦十三年補曰一本攻魏圍皮氏属河東為魏謂楚王懐曰秦楚勝魏魏王之恐衍也字也正曰下章有此句法見亡也元作矣矣必合扵秦王何不背秦而與魏王魏王喜必内太子豈秦歸太子而攻耶正曰說見前章秦恐失楚必効城地於王王雖復與之攻魏可也楚王曰善乃背秦而與魏魏内太子於楚秦恐許楚城地欲與之復攻魏樗里疾怒欲與魏攻楚恐魏之以太子在楚不肯也為疾謂楚王曰外臣疾使臣使割予秦此所謂由楚合親以孤齊秦楚魏合秦楚重公公必為相矣臣意秦王昭與樗里疾之欲之也臣請為公說之乃謂樗里子曰攻皮氏此王之首事也首言出兵正曰首事猶言第一事也而不能㧞天下且以此輕秦且有皮氏於以攻韓魏利也樗里子曰吾已合魏矣無所用之故史書未㧞而解對曰臣願以鄙心意公意猶度公無以為罪有皮氏國之所大利也而以與魏公終自以為不能守也故以與魏今公之力有餘守之餘守為有餘力何故而弗有也樗里子曰奈何曰魏王之所恃者齊楚也所用者樓翟強也補曰字書無此字韓䇿作鼻即也策又有管鼻之令翟強與秦事云云與此事合疑樓即管鼻也今齊王謂魏王曰欲講攻扵齊言欲講秦攻秦皆於我夫魏求救欲講而已而齊兼言攻故下言主兵正曰講當作搆講攻猶言搆兵主兵之辭也是弗救也楚王懐怒於魏之不用樓子而使翟強為和也和齊秦怨顔已絶之矣怨顔欲絶之見扵顔色魏王之懼也見亡以有亾形而懼翟強欲合齊秦外楚以輕樓此強之和樓欲合秦楚外齊以輕翟強補曰此二語當時事情也公不如按魏之和按謂主之正曰按止也使人謂樓子曰子能以汾北與我乎請合扵楚外齊以重公也此吾事也疾言此事吾所欲為樓子與楚王必疾矣言應之速又謂翟子子能以汾北與我乎強亦魏人必為合扵齊外衍於字於楚以重公也翟強與齊王必疾矣是公外得齊楚以為用内得樓翟強以為佐主魏言之故言内何故不能有地扵河東乎言且得皮氏按此盖在楚欲因楚和秦以息攻鄢陵不順也故此上說之又說樗里凡其辭兩言齊楚翟樓示無所偏也而於楚獨曰吾事則是為樓子也獻書秦王昭正曰無考曰臣竊聞大王之謀出事於梁謂攻之謀恐不出扵計矣非得計也願大王之熟計之也梁者山東之腰也腰人身之中有蛇於此兵法所謂率然補曰見孫武書及李靖問荅擊其尾其首救擊其首其尾救擊其中身首尾俱救今梁者天下之脊也補曰一本今梁王天下之中身也夫秦攻梁者是示天下要斷山東之脊也要猶欲正曰要同上義山東脊天下要與上互言之示者顯取之之意是山東首尾皆救中身之時也山東見亡必恐恐必大合山東尚強臣見秦之必大憂可立而待也臣竊為大王計不如南出事於南方謂楚其兵弱天下不補補曰作必不語順又下必字恐當作不必能救地可廣大言秦地國可富兵可強主可尊王不聞湯之伐桀乎試之弱宻須氏試謂先之以其弱可必克也周紀註宻須在安定隂宻補曰宻姞姓國在今寜州史周紀西伯伐宻湏詩所謂宻人不恭者也此誤以為湯又云試之扵弱戰國㳺士言聖賢事多妄謬此尤顯然者也以為武教得宻須氏而湯知服桀矣今秦欲與山東為讐不先以弱為武教兵必大挫國必大憂秦果南攻藍田鄢郢藍田秦地凝衍文彪謂征伐先後理正應爾故司馬為秦議以伐蜀為先而我藝祖欲平太原諸國亦先平蜀正曰秦之攻楚多道藍田武闗以出攻如敗趙藍田之云卒秦人善逺交近攻之策蠺食諸侯先三晉而後齊楚以成功其用兵之序可考矣此䇿魏畏秦攻移禍於楚故飾為之辭而鮑謂征伐先後理正應爾夫豈識當時大勢哉又以司馬錯先伐蜀宋欲平太原亦先平蜀為試於弱之徴謬矣魏秦伐楚秦昭六年與韓魏共攻楚此十八年魏王不欲樓緩謂魏王曰不如令秦攻楚楚且與秦攻王王不如令秦楚戰王交制之緩時為秦計耳故明年相秦昭王哀王子補曰世本名速元年赧王二十年丙寅秦敗東周與魏戰扵伊闕殺犀武此二年魏令公孫衍乗勝而留於境乗言因秦勝我留而與之講若秦既去則無及已補曰公孫衍說見前請卑辭割地以講扵秦為竇屢魏人謂魏王曰臣不知衍之所以聽於秦之少多然而臣能半衍之割而令秦講扵王王曰奈何對曰王不若與竇屢闗内侯侯扵闗内耳此時未為爵補曰闗内侯之稱不獨起於秦而令之趙王重其行而厚奉之因揚言曰聞周君令竇屢已割魏於奉陽君而聽秦矣因地講秦夫周君竇屢奉陽君之與穰侯貿首之仇也補曰奉陽君即李兊說見趙策此言與穣侯貿首之仇則二人欲隂取以定封之事也今行和者竇屢也制割者奉陽君也太后恐其不因穰侯也后穣侯之姊而欲敗之必以少割請合扵王而和於東周與魏也秦約趙而伐魏魏王患之芒夘曰補曰淮南子孟夘註齊人引策芒夘王勿憂也臣請發張倚魏人使謂趙王惠文曰夫鄴寡人固形元作刑刑補曰此書刑形字通弗有也形猶勢也髙註為刑法雖通而此書多作形今大王收秦而攻魏寡人請以鄴事大王趙王喜召相國而命之曰魏王請以鄴事寡人使寡人絶秦相國曰收秦攻魏利不過鄴今不用兵而得鄴請許魏張倚因謂趙王曰敝邑之吏効城者已在鄴矣大王且何以報魏趙王因令閉闗絶秦秦趙大惡芒夘應趙使曰敝邑所以事大王者為完鄴也今效元作郊補曰當從交文姚註云效一作効鄴者使者之罪也夘不知也趙王恐魏承秦之怒遽割五城以合扵魏而支秦此六年書夘以詐重者此也彪謂此馮亭上黨之事也惠文失之扵魏孝成失之扵韓雖所䘮敗有多寡之差其貪而不明真父子也芒夘謂秦王昭曰王之士未有為之中者也中謂用事與諸國之中猶内應云臣聞明王不背元作咠咠補曰一本作咠俱未詳首說見趙䇿中而行王之所欲於魏者長平元作羊下同属汝南羊補曰地未詳或字誤王屋在河東垣縣東北洛林即蘇代所謂林中河南宛陵林鄉也之地也王能使臣為魏之司徒本周官此所謂為之中則臣能使魏獻之秦王曰善因令以為魏之司徒謂魏王曰王所患者上地也上流之地近秦正曰未知所指秦之所欲於魏者長平羊王屋洛林之地也王獻之秦則上地無憂患因請以下兵東擊齊壤地必不逺矣魏王曰善因獻之秦地入數月而秦兵不下魏王謂芒夘曰地入數月而秦兵不下何也芒夘曰臣有死罪雖然臣死則契折於秦折毁也言不可有責於秦王無以責秦王因赦其罪臣為王責約扵秦乃之秦謂秦王曰魏之所以獻長平羊王屋洛林之地者欲以下大王之兵東擊齊也今地已入而秦兵不可下臣則死人也雖然後山東之士無以利事王者矣秦王懼補曰姚本作戄然曰國有事未贍元作澹澹補曰即贍前漢志澹同下兵也贍給也今以兵從後十日秦兵下芒夘并將秦魏之兵以東擊齊啟地二十二縣蘇代元作秦下同秦補曰燕䇿及史作代拘扵魏欲走而之齊元作韓韓魏氏閉闗而不通齊使蘇厲為之謂魏王曰齊請以宋地時未舉宋此侵伐所得耳正曰正義云涇陽君秦王弟悝也齊蘇子告秦兵伐宋以封涇陽君然齊假設此策以救伐封涇陽君而秦不受也夫秦非不利有齊而得宋地然其所以不受者不信齊王閔與蘇代秦補曰燕䇿及史作子下同也疑其善魏今秦見齊魏之不合衍也字也如此其甚也則齊必不欺秦而秦信齊矣齊秦合而涇陽君有宋地則非魏之利也故王不如復東蘇代秦使得之齊秦必疑齊而不聽也夫齊秦不合天下無憂補曰一本標云作變伐齊成則地廣矣齊無秦而魏伐之可以廣地蘇傳有在齊伐宋之前補曰燕䇿及史曰魏為燕執伐齊使人謂魏王曰云云於是出蘇代代之宋五國伐秦成臯之役此十年無功而還其後齊欲伐宋而秦禁之齊令宋郭之秦請合而以伐宋秦王昭許之魏王畏齊秦之合也欲講於齊謂齊王曰秦王謂宋郭曰分宋之城服宋之強者大國也乘宋之弊而與王争得者王齊閔楚魏也請為王無合楚之伐宋也而王獨舉宋王之伐宋也請剛柔而皆用之宋強宋弱皆必伐之如宋者欺之不為逆役之不為讐者也王無與之講以取地既已得地又以力攻之期扵㗖宋而已矣臣聞此言而竊為王喜元作悲悲秦必且用此於王矣用兵伐齊又必且劫元作曰曰王必求地既已得地又且以力攻王又必謂王衍曰字曰使王輕燕燕齊之交已醜惡也又且收燕以東索於王補曰一本更索秦嘗用此於楚矣又嘗用此扵韓矣願王之深計之也秦善齊不可知也已言不可信故為王計太上伐秦其次賔秦其次堅約而詳講與國無相讐也補曰詳佯通史多有媾字句佯媾於秦此即趙䇿所謂不得已而必媾則願五國復堅約者此賔即擯讎一本作離秦齊合國不可為也已王其聽臣也必無與講與秦講秦權重魏魏冉明熟元作孰孰補曰即熟是言慮此明且熟故有謂元作又為又為補曰又有通足下或人謂齊王當如下傷秦者傷不敢顯也恐秦覺之天下可令伐秦則隂勸而弗敢圗也見天下之傷秦也則先鬻與國而以自解也言與國為之非我也天下可令賔秦則為劫於與國而不得已者天下不可則先去背諸國也而以秦為上交以自重也如是人者鬻王以為資者也而焉能免國於患免國於患者必窮三節而行其上補曰三節即上文太上其次之說上不可則行其中中不可則行其下下不可則明不與秦而生以殘秦生猶進言伐之不已正曰不能伐不能擯又不能媾必為秦所伐則誓闘而必死不與秦俱生以殘秦姚本註云而一作兩使秦皆無百怨百利惟己之曽安已止曾則也言使秦見殘不擇利害惟務止魏之殘以自安也無補令天元作足足下鬻之以合於秦所謂鬻王以秦為上交者補曰今字上恐有缺誤是免國於患者之計也臣何足以當之雖然願足下之聽臣之計也燕齊讐國也兩國自宣閔易昭再世相讎秦兄弟之交也燕齊與秦合讎國以伐婚姻猶兄弟也此士欲為魏合燕齊以伐秦臣為之苦矣言伐秦之難而已為之黄帝戰於涿鹿之野而西戎之兵不至禹攻三苖而東夷之民不赴元作起起言帝王用兵猶有不從者不經見以燕齊補伐秦黄帝之所難也而臣已致燕甲而起齊兵矣臣又徧事三晉之吏奉陽君孟嘗君韓珉元從口呡周最周韓餘為徒與為徒友從而下之補曰韓餘疑即趙䇿韓徐周韓之間有脫字不然衍周字為徒從而下之句謂徒黨合從也又恐從徒字訛衍恐其伐秦之疑也又身自醜扵秦與秦惡扮之扮并也握也言合諸國補曰扮撫吻反請焚天下之秦符者臣也次傳焚符之約者臣也𫝊之諸國次元作欲欲使五國約閉秦闗者臣也不通秦補曰燕䇿蘓代謂焚天下之秦符上計破秦其次長賔之皆與此合奉陽君韓餘為既和矣蘇脩朱嬰此皆三晉之吏也皆隂在邯鄲臣又說齊王而往敗之敗宋郭合秦之約天下共講因使蘇脩㳺天下之語㳺榆揚之而以齊為上交盖詐兵請伐魏兵齊兵臣又争之以死而果西因蘇脩重報脩在邯鄲齊之西也報以齊不伐魏臣非不知秦權元作勸勸補曰恐作權上有之重也然而所以為之者為足下也彪謂此非蘇代不能也故史言代復約從親如蘇秦時獨所謂行其上不可則行其中下為不可用也夫伐秦不勝竄走求成之不給安能賓之諸侯見其敗輕之矣豈有聽其堅約之說哉盖代之計專以伐之為上而㳺辭見其多䇿耳計不出扵此也正曰按趙䇿五國伐秦章蘇代說奉陽君云云中有與此章出入者知此必代之辭也三策並陳上則伐之中則擯之下則媾之未及伐之敗也鮑說謬矣葉陽君趙人約魏魏王將封其子謂魏王曰王嘗身濟漳朝邯鄲抱葛孽元作薛薛補曰趙世家作孽者是一本作薛亦作非隂成以為趙養邑供養之邑而趙無為王有也王乃又封其子河元作問問補曰字訛趙䇿作河陽姑宻元作衣衣補曰字訛趙策作宻乎趙惠文十三年有與此語同云封李兊子則葉陽君兊之封乎補曰葉即奉之訛李兊也說見趙䇿臣為王不取也魏王乃止惠之十二年此十年秦使趙攻魏魏謂趙王曰惠文正曰無考攻魏者亡趙之始也昔者晉人欲亡虞而先伐虢伐虢者亡虞之始也故荀息以馬與璧假道扵虞宫之奇諫而不聽卒假晉道晉人伐虢反而收虞故春秋書之以罪虞公今國莫強於趙而并衍齊字齊正曰見下秦王昭正曰見下賢而有聲者相之并猶兼聲威聲相助也言趙強矣兼得秦助正曰今國莫強於趙而兼齊秦句王賢而有聲者相之句言趙強兼齊秦王既賢而又有聲望者相之所以為秦腹心之疾也如此乃恊此士引喻明切謂春秋罪虞亦不悖秦使趙攻魏之事無見或因其言而止歟所以為心腹之疾者趙也言秦以趙為疾魏者趙之虢也趙者魏之虞也聽秦而攻魏者虞之為也願王之熟計之也秦將伐魏魏王聞之夜見孟嘗君本傳齊閔驕故奔魏魏相之此十一年正曰見後告之曰秦且攻魏子為寡人謀奈何孟嘗君曰有諸侯之救則國可存也王曰寡人願子之行也重為之約車百乘孟嘗君之趙謂趙王惠文曰文願借兵以救魏趙王曰寡人不能孟嘗君曰夫敢借兵者以忠王也王曰可得聞乎孟嘗君曰夫趙之兵非能強於魏之兵魏之兵非能弱扵趙也然而趙之地不歲危而民不歲死而魏之地歲危而民歲死者何也以其西為趙蔽也魏在趙西為之蔽秦今趙不救魏魏㰱盟扵秦㰱之血也是趙與強秦為界也地亦且嵗危民亦且嵗死矣此文之所以忠於大王也趙王許諾為起兵十萬車三百乗又北見燕王昭曰先曰公子稱其父嬰嘗約兩主之交矣今秦且攻魏願大王之救之燕王曰吾嵗不熟二年矣今乂行數千里而以助魏且奈何田又曰夫行數千里而救人者此國之利也今魏王出國門而望見軍雖欲行數千里而耴人可得乎燕王尚未許也田文曰臣効便計於王王不用臣之忠計文請行矣恐天下之將有大變也王曰大變可得聞乎曰秦攻魏未能克之也而䑓已燔㳺已奪矣不暇㳺觀而燕不救魏魏王折節割地以國之半與秦秦必去矣秦已去魏魏王悉韓魏之兵又西借秦兵以因趙之衆以四國攻燕王且何利利行數千里而助人乎利出燕南門而望見軍乎則道里近而輸又易矣輸以餉軍王何利燕王曰子行矣寡人聽子乃為之起兵八萬車三百乗以從田文魏王大說曰君得燕趙之兵甚衆且亟矣秦王昭大恐割地請講於魏因歸燕趙之兵而封田文彪謂田文可謂善言者矣其說趙也邇而不偪其說燕也直而不倨與夫嚂口虗喝者異矣補曰孟嘗相魏在齊滅宋前大事記附見扵昭王十年詳見周策此事實昭王十三年秦紀秦昭二十四年取魏安城至大梁燕趙救之秦軍去穰侯攻大梁秦昭二十四年攻魏至大梁此十三年乘郢北元作北郢郢楚别邑其北近魏北郢正曰北郢乃楚之宜城即郡也史魏冉傳入北宅遂圍大梁此訛為乗北郢也又䇿入北地亦字訛魏王且從從順服也謂穰侯曰君攻楚得宛穣以廣陶攻齊得剛博並属太山補曰正義引括地志云故剛成在兖州襲丘縣界愚謂剛博當即是剛夀正義云夀鄆州縣以廣陶得許鄢陵以廣陶補曰得許上當有攻魏字缺脫秦王昭不問者何也以大梁之未亡也今日大梁亡許鄢陵必議議其不當得議則君必窮為君計者勿攻便補曰魏昭王十三年秦兵至大梁即取魏安城之役安釐王二年秦魏冉伐魏走芒夘入北宅遂圍大梁魏割温以和二役皆冉相時而敗芒夘則冉將以伐此策當在其時大事記載須賈說穣侯云云攻而不㧞秦兵必罷陶邑必亡前功必棄矣下註此章謂與須賈同一衛亦以為此年事矣然秦攻取剛夀在秦昭三十六七年後此數年而策已云得剛夀而又不可曉也當考其宛穰廣陶說見趙策許鄢陵魏地見前秦得地不知何時白珪魏人孟子稱之趙岐以為周人非也盖至是三四十年矣正曰秦昭王初年魏冉已用事則芉戎之責已久十二年而當魏昭元年則其初年猶與魏襄相及正孟子時也趙岐以為周人何以知其非也但戰國人姓名多偶同者鮑以在魏䇿中而即為魏人謬矣又按燕策白珪逃扵秦則嘗仕秦新序孟嘗君問白珪恐亦此時史白珪傳首云當魏文侯時李克務盡地力而白珪樂觀時變後復引珪之言曰吾治生産如孫呉用兵商鞅行法則其人在鞅後首句特與李克對論非言其世也以二十取一語孟子正欲以其貨殖之術施之國家者也又新序紀白珪戰亡六成為魏取中山白珪顯於中山中山人惡之於魏文侯投以夜光之璧則文侯時又一白珪歟或因史所書而訛舛歟謂新城君曰夜行者能無為奸不能禁狗使無吠已也故臣能無議君扵王戎貴扵秦王宜為秦王今珪說之豈非珪使魏我來魏不能禁人議補曰姚本云有臣字於君也秦䇿叚産語同正曰叚産策本在韓鮑以史註新城君為芊戎故曲為之說未知即是此人否秦攻韓之管後志河南管城註在京縣東北補曰鄭州管城縣魏王發兵救之昭忌曰夫秦強國也而韓魏壤言地與秦按秦元作梁補曰姚云劉作秦不出攻則已若出攻非於韓也必於魏也今幸而於韓此魏之福也王若救之夫解攻者必韓之管也致攻者必魏之梁也魏王不聽曰若不因救韓韓怨魏西合於秦秦韓為一則魏危遂救之秦果釋管而攻魏魏王大恐謂昭忌曰不用子之計而禍至為之奈何昭忌乃為之見秦王昭正曰時不可考曰臣聞明主之聽也不以挾私為政與正同是參行也以諸國参考而行言参彼己也願大王無攻魏聽臣也秦王曰何也昭忌曰山東之從時合時離何也秦王曰不識也曰天下之合補曰一本此下有也字以王之不必也猶言不可測也方攻韓又攻魏是也其離也以王之必也伐一不移伐則諸國知免不急扵從也今攻韓之管國危矣未卒而移兵於梁合天下之從無精扵此者矣精猶明以為秦之求索必不可支也故為王計者不如制元作齊齊補曰疑字誤或上有缺文趙秦已制趙則燕不敢不事秦荆濟不能獨從荆楚濟齊正曰一本荆齊是未有稱齊為濟者字多傍水天下争敵扵秦則弱矣言諸國合而競與秦敵則秦弱秦王乃止彪謂隣國有兵救之䘏鄰之義昭王言是也秦伐韓而魏救之挑秦之禍昭忌之言亦是也要之從約堅則宜救猶救同室之鬪也無從約而救之則是鄉鄰有鬪被髪纓冠而往是豈不可已乎芮宋魏人欲絶秦趙之交故令魏氏收秦太后之養地宣太后秦王昭怒芮宋謂秦王曰魏委國於王委與之而王不受故委國於趙也李郝趙人謂臣曰子言無秦而養秦太后以地是欺我也故敝邑收之秦王怒乃絶趙補曰姚本收秦太后之養地秦王扵秦芮宋云云與此文有誤當云收秦太后之養地於秦芮宋謂云云為魏謂楚王慎㐮正曰無考曰索攻魏扵秦楚以攻魏索於秦秦必不聽王矣是智困於秦而交疏扵魏也楚魏有怨則秦重矣故王不如順天下天下不欲秦伐魏遂伐齊與魏便地言以所得齊地與魏易兩便兵不傷交不變所欲必得矣管鼻之魏人正曰註作鼻之名謬下兩之字亦語助管鼻恐即樓鼻說見前令翟強與秦事鼻之不欲故推之於強謂魏王曰鼻之謂之鼻之與強猶晉人之與楚人也晉人見楚人之急帶劒而緩之楚人惡其緩而急之今鼻之入秦之傳舍酈食其傳註止息傳置之舍舍不足以舍之守衛之盛舍不能容強之入無蘇於秦者言秦輕之無與為樵蘇者正曰一本蘓作蔽是言無人從之強王貴臣也而秦若此其甚安可秦待己已厚可以不與秦亊秦輕強矣欲其重之必令與秦亊乃可正曰翟強欲合齊秦外楚以輕樓鼻樓鼻欲合秦楚外齊以輕翟強鼻強不合而謂鼻令強與秦亊者鼻容強為之秦入鼻言故輕強此士盖為強言以激魏王者也此當在㐮王時成陽君秦昭十七年入朝者扵此知為韓人不疑欲以韓魏聽秦魏王弗利白珪謂魏王曰王不如隂使人說成陽君曰君入秦秦必留君而以多割扵韓矣韓不聽秦必留君而伐韓矣故君不如安行安猶徐求質扵秦質事有不留之騐乃可入正曰質子之質成陽君必不入秦秦王不衍敢字敢合則王重矣安釐王昭王子元年赧王三十九年乙酉秦敗魏於華華山在𢎞農華隂秦紀作華陽註亭名在宻縣事在此二年正曰華隂之華去聲華下華陽史無音走芒夘而圍大梁須賈魏人為魏謂穰侯曰臣聞魏氏大臣父兄皆謂魏王曰初時惠王伐趙戰乎三梁春秋秦取梁漢夏陽也河内有梁周小邑也陳留浚儀大梁為三皆魏地正曰索隐云云梁即南梁又說見齊䇿十萬之軍㧞邯鄲秦十二年攻趙虜莊賈正曰魏惠王十八年㧞趙邯郸二十年歸趙邯鄲趙氏不割而邯鄲復歸齊人攻燕殺子之破故國補曰通鑑大亊記在宣王二十九年燕不割而燕國復歸燕趙之所以國全兵勁而地不并於諸侯者以其能忍難而重出地也宋中山數伐數割而隨以亡臣以為此臣魏大臣所稱燕趙可法而宋中山可無為也夫秦貪戾之國而無親蠶食魏盡晉國戰勝睪子地缺正曰舉土刀反睪羊益反又滜作澤古書三字皆通此未有據史睪作暴下同徐廣云暴鳶也大亊記作暴吏未詳割八縣地未畢入而兵復出矣夫秦何厭之有哉今又走芒夘入北地梁之北非郡正曰史記作宅䇿字訛下同正義引竹書云宅陽一名北宅括地志云故城在鄭州滎陽縣西此非但攻梁也且劫王以多割也王必勿聽也今王循楚趙而講循猶順也以下文考之秦時盖合楚趙共攻魏魏見二國為秦用遂欲講秦不反覆思之也正曰循即徇楚趙怒而與王争事秦秦必受之秦挾楚趙之兵以復攻則國救亡不可得衍也字也已願王之必無講也王若欲講必少割而有質亦事騐也正曰索隠云少割地而求秦質子不然必欺補曰索隠云必稱秦欺是臣之所聞扵魏也願君之以是慮事也周書曰維命不于常此言幸之不可數也夫戰勝睪子而割八縣此非兵力之精非計之功也天幸為多矣補曰漢史天幸語本此今又走芒夘入北地以攻大梁是以天幸自為常也智者不然臣聞魏氏悉其百縣勝兵以止戍大梁臣以為不下三十萬以三十萬之衆守十仞之城臣以為雖湯武復生弗易攻也夫輕信楚趙之兵陵十城之城戴補曰一本標孫作戰三十萬之衆而志必舉之臣以為自天下之始分以至于今未嘗有之也攻而不能㧞秦兵必罷音疲隂必亡隂穣侯别邑正曰隂即陶說見趙策則功必棄矣今魏方疑可以少割收也願君補補曰史願君逮楚趙之及楚趙之兵未任於大梁也未以攻梁自任亟以少割收魏魏方疑而得以少割為和必欲之則君得所欲矣楚趙怒於魏之先已講也已兵未至而與秦講必争事秦從是以散從横之從而君後擇焉擇其所與扵散從之後且君之嘗割晉國取地也何必以兵哉先割取時不用兵夫兵不用而魏效絳安邑又為隂啟言得亡國以拓隂之封地補曰又為止已合策文有脫誤見後兩機盡兩謂得縣啟封盡無遺也故宋衛効魏自比二國二國小國也尤憚元作憚尤憚尤秦兵出地而小故愈畏秦已合魏合秦而君制之補曰史云又為陶開兩道幾盡故宋衛必効單父秦兵可全云云按此文明順姚註亦宜引從之正義云故宋及單父是陶南道魏安邑及絳是陶北道索隐云穣侯封陶魏効絳安邑是得河東地言從秦通陶開河西河東之兩道此時宋已㓕是秦將盡得宋地也愚謂可全即上言不用之意何求而不得何為而不成臣願君之熟計而毋行危也穰侯曰善乃罷梁圍彪謂賈之說不足以已秦也為其為魏也過深而說秦者不切夫以秦為天幸而欲其無行危也秦豈信之哉秦行是何危之有且其為魏之過深也適足以疑秦豈沮扵是哉梁圍之解將别有故非賈力也正曰大亊記畧載此章及穣侯攻大梁章謂同一術愚謂魏利扵少割穣侯喜得此地而罷兵亦無不可大亊記周赧王四十年秦昭三十二魏安釐二韓釐二十一趙惠文二十四年秦以魏冉為相國伐韓暴鳶救魏魏冉破之斬首四萬焉走開封魏割八縣以和魏冉復伐魏走􅉭邜入北宅遂圍大梁魏割温以和四十一年魏背秦與齊從親秦魏冉伐魏㧞四城斬首四萬四十二年趙魏伐韓華陽秦魏冉白起客卿胡傷救韓敗魏將芒夘華陽斬首十三萬取卷蔡陽長社又敗趙將賈堰沉其卒二萬於河取觀津魏予秦南陽以和以其地為南陽郡遷免臣居之郡通鑑綱目書畧同不著暴鳶芒夘等及以地為南陽一節補曰按史魏安釐王二年三年四年連歲魏冉將兵來伐二年之戰自暴鳶救魏敗走年表秦紀魏世家魏冉𫝊皆云兵至大梁次年之戰不地最後華陽之戰趙魏伐韓秦救韓敗趙魏走􅉭夘但史所載有差互紀以擊􅉭夘華陽傳以走暴鳶並為次年亊華陽之戰或云得三晋將或云攻趙韓魏八縣三縣之殊十萬十五萬之舛故大事記参定書之今考此䇿湏賈之辭謂戰勝暴子割八縣地未畢而兵復出此大事記所以書此役繼扵走暴鳶之後但䇿首書秦敗魏於華恐於華二字因下章誤衍也郡又按秦紀昭王三十四年書秦與魏韓上庸地為一南陽免臣遷居之三十五年初置南陽郡大事記於魏予秦南陽後書以其地為南陽郡遷免臣居之即以此為是年事按南陽凡二其一河南之修武其一鄧州之堵陽免臣者以罪免遷守新邉秦不信敵國之民故徙其國人使錯居之前此二十七年攻楚赦罪人遷之南陽大事記必謂前已借地故今以新得之南陽而不知紀書乃謂秦與魏韓上庸地為一郡於南陽上庸属漢中今房州竹山縣則上郡之南陽也次年乃書置南陽郡秦南陽郡即鄧而修武更置河内郡不聞兩南陽也昭王四十四年秦白起攻韓取南陽絶太行道使秦已置郡不應復云爾大事記亦書之矣此條盖因魏入南陽以和偶與下文南陽免臣相次而致誤爾因上論大事記文附于此秦敗魏於華魏王且入朝於秦周訴謂王曰補曰一本訴作訢是下同宋人有學者三年反而名其母其母曰子學三年反而名我者何也其子曰吾所賢者無過堯舜堯舜名吾所大者無大天地天地名今母賢不過堯舜母大不過天地是以名母也其母曰子之扵學者於其所學將盡行之乎願子之有以易名母也子之扵學也將有所不行也補曰姚本也作乎願子之且以名母為後也今王之事秦尚有可以易入朝者乎願王之有以易之而以入朝為後魏王曰子患寡人入而不出邪許綰為我祝曰入而不出請殉寡人以頭周訴對曰如臣之賤也今人有謂臣曰入不測之淵而必出不出請以一鼠首為汝殉者臣必不為也今秦不可知之國也猶不測之淵也而許綰之首猶䑕首也内王於不可知之秦而殉王以鼠首臣竊為王不取也且無梁孰與無河内急王曰梁急無梁孰與無身急王曰身急曰以三者身上也河内其下也秦未索其下而王効其上可乎王尚未聽也支期曰王視楚王頃㐮楚王入秦絶句王以三乘先之光楚至秦楚王不入楚魏為一尚足以捍秦王乃止王謂支期曰吾始已諾扵應侯矣今不行者欺之矣支期曰王勿憂也臣使長信侯魏相之善應侯者請無内王王待臣也支期說於長信侯曰王命召相國長信侯曰王何以臣為支期曰臣不知也王急召君長信侯曰吾内王於秦者寜以為秦邪吾以為魏也支期曰君無為魏計君其自為計且安死乎問何所安安王乎安窮乎安貴乎君其先自為計後為魏計長信侯曰樓公將入矣緩也侯其入欲與之議正曰無考之緩樓鼻韓䇿並見樓梧皆此時人臣今從支期曰王急召君君不行血濺君襟矣長信侯行支期隨其後且見王支期先入謂王曰偽病者乎而見之令王見而辭疾臣已恐之矣長信侯入見王王曰病甚奈何吾始已諾扵應侯矣意雖道死行乎雖死扵路猶將行長信侯曰王毋行矣臣能得之扵應侯矣能使應侯止王之行願王無憂彪謂周訴之愛王也甚忠其諭王也甚切賢智人也釐王不能聽而聽支期期豈賢扵訴哉盖期之所効者事而訴之所諭者理庸人固可示以事而難以理諭也㣲二臣者釐其為楚懐歟補曰為我為王以為秦以為魏之為去聲華陽之戰魏不勝秦明年將使叚干崇割地而講孫臣並魏人謂魏王曰魏不以敗之上割上謂當其時可謂善用不勝矣而秦不以勝之上割可謂不善用勝矣今處期年乃欲割是羣臣之私計不及也而王不知也且夫欲璽者得秦封受其璽叚干子也王因使之割地欲地者秦也而王因使之授元作受受璽夫欲璽者制地而欲地者制璽其勢必無魏矣且夫奸人固皆欲以地事秦以地事秦譬猶抱薪而救火也薪不盡則火不止今王之地有盡而秦求之無窮是薪火之說也魏王曰善雖然吾以許秦矣不可以革也革更也對曰王獨不見夫博者之用梟耶猶上善用勝矣補曰正義云博頭有刻為梟鳥形者擲得梟者合食其子若不便則為餘行也欲食則食欲握則握握不食也食者行棊握不行也故史曰便則行不便則止今君劫扵羣臣而許秦因曰不可革何用智之不若梟也魏王曰善乃按其行按猶止記四年有補曰史安釐王四年華陽戰敗後叚千子請予南陽以和此䇿云按其行通鑑綱自云王不聽卒以南陽為和秦魏為與國齊楚約而欲攻魏魏使人求救於秦冠盖相望秦救不出魏人有唐雎元作且下同且補曰新序同史作睢者年九十餘謂魏王曰老臣請出西說秦令兵先臣出可乎魏王曰敬諾遂約車而遣之唐雎且見秦王昭秦王曰丈人芒然乃逺至此甚苦矣魏來求救數矣寡人知魏之急矣唐雎且對曰大王已知魏之急而救不至者是大王籌策之臣無任矣不堪其事且夫魏一萬乘之國稱東藩受冠帶祠春秋者以為秦之強足以為與也今齊楚之兵已在魏郊矣大王之救不至魏急則且割地而約齊楚王雖欲救之豈有及哉是亡一萬乗之魏而強二敵之齊楚也竊以為大王籌策之臣無任矣秦王喟然愁悟遽發兵日夜赴魏齊楚聞之乃引兵而去魏氏復全唐雎且之說也記十年有虞卿謂趙王惠文曰人之情寜朝人乎寜朝扵人也趙王曰人亦寜朝人耳何故寜朝於人虞卿曰夫魏為從主而違者范痤也魏相補曰一本作座史與此同今王能以百里之地若萬户之都請殺范痤扵魏范痤死則從事可移扵趙趙主從也趙王曰善乃使人以百里之地請殺范痤於魏魏王許諾使司徒本周卿此時主徒𨽻者耳執范痤而未殺也范痤獻書魏王曰臣聞趙王以百里之地請殺痤之身夫殺無罪范痤衍痤字痤補曰字衍薄故也猶細事而得百里之地大利也臣竊為大王美之雖然而有一焉百里之地不可得而死者不可復生也則王必為天下笑矣臣竊以為與其以死人市不若以生人市便元作使使補曰姚註云一本無史同也又遺其後相信陵君書曰夫趙魏敵戰之國也趙王以咫尺之書來而魏王輕為之殺無罪之痤痤雖不肖故魏之免相衍望字望補曰姚云劉作室史無也嘗以魏之故得罪扵趙夫國無用臣用言可任者補曰一本國内無用是外雖得地勢不能守然今能守魏者莫如君矣王聽趙殺痤之後強秦襲趙之欲襲言猶因趙之故態倍趙之割則君將何以止之此君之累也信陵君曰善遽言之王而出之十二年有與其以死市下元在趙策補曰從舊在趙可魏將與秦攻韓朱己史作無忌補曰史魏王以秦救之故欲親秦而伐韓以求故地無忌謂魏王曰云云大事記據之以其辭云秦太后母也以憂死故附載於宣太后之薨之後在赧王五十年按朱已即無忌字訛也謂魏王曰秦與戎翟同俗有虎狼之心貪戾好利而無信不識禮義徳行茍有利焉不顧親戚兄弟若禽獸耳此天下之所同知也非所施厚積徳也故太后母也而以憂死秦昭四十二年此十二年穣侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此其為親戚兄弟若此而又況於仇讐之敵國也補曰一本標也作乎今大王與秦伐韓而益近秦臣甚惑之而王弗識也則不明矣羣臣知之而莫以此諫則不忠矣今夫韓氏以一女子承一弱主此十二年桓惠立八年矣補曰大事記云韓世家不載其事必是時韓王少母后用事也愚按是時秦宣太后趙惠文后齊君王后皆専政韓亦然也内有大亂外安能攴強秦魏之兵王以為不破乎韓亡秦有鄭地時鄭亡属韓與大梁鄰王以為安乎欲得故地盖嘗䘮地於韓个欲取之而今負強秦之禍也補曰史負強秦之說據此則負當從恃訓從策文則負任在背以為喻也史義長王以為利乎秦非無事之國也韓亡之後必且便事便事必就易與利補曰便事史並作更字就易與利必不伐楚與趙矣是何也夫越山踰河絶韓之上黨而攻強趙補曰史作絶上黨正義云韓上黨從太行山西北澤潞等州是也則是復閼與之事也先時趙奢敗秦於此補曰復扶又反閼與音遏豫秦必不為也若道河内倍鄴朝歌倍音背絶漳滏之水而以與趙兵决勝扵邯鄲之郊是受智伯之禍也秦又不敢伐楚道涉山元作而谷行三十里而攻危隘之塞所行者甚逺而所攻者甚難秦又弗為也補曰三十史作三千者是危隘史作冥阨即黽阨也說見楚䇿大事記秦向楚有兩道涉山谷是西道河外是東道此是採索隐正義之文按二家本文似以涉谷為地名當考正義云從褒斜入渠州即東南至申州攻左域山險阨之塞也若道河外背大梁而右上蔡召陵以與楚兵决扵陳郊秦又不敢也補曰大事記引正義云從河外出函谷闗厯同州南至鄭州東向陳州則背大梁也大事記今本作東向鄭州者恐因上文訛在史右蔡左召陵正義云上蔡縣在豫州北邵陵故城豫州郾城縣東並在陳州西從汴州南行向陳州之西郊則上蔡召陵在南面向東皆身之右定無左字也故曰秦必不伐楚與趙矣又不攻衛與齊矣補曰衛齊皆在趙韓魏之東韓亡之後兵出之日非魏無攻矣秦故有懐地邢丘之城垝津地缺而以之臨河内河内之共汲莫不危矣補曰史作秦固有懐茅固故通正義云懐州武陟縣西故懐城括地志云懐州獲嘉縣東北有茅亭即蘇忿生邑攅茅邢丘見秦策字史城垝津索隐引策云邢丘安城今本無安字案之即安訛也史此叚後有安城字正義云在鄭州原武縣東南垝津索隐云在河北垝九威反正義引杜預以為汲郡城南延津愚按安釐王十一年秦㧞我廩丘或作邢丘郪丘餘無見盖地皆壌界也索隐云共汲皆縣名属河内共居庸反又見下劉辰翁以為共汲河者謬秦有鄭地得垣雍秦紀註河内卷有垣雍城補曰正義引括云垣雍故城在鄭州原武縣面北雍於用反决滎澤属滎陽書註在敖倉東南補曰史作熒一本同而水大梁大梁必亡矣補曰正義云言韓亡後秦有鄭地得垣雍城從滎澤决溝厯雍灌大梁也大事記云始皇滅魏果用此策王之使者大過矣乃惡安陵氏扵秦安陵魏之不欲攻韓者與羣臣異故惡之秦之欲許之久矣許言聽之久言秦之先自惡之正曰史作王之使者出過而惡安陵氏扵秦大事記䇿文則以䇿為明順許史作誄正義引括地志云安陵在鄢陵縣西北詳見前此大事記按策安陵君曰吾先君成侯受詔㐮王以守地盖安陵趙㐮子所封其後逺别為一國附庸於魏今魏反令使晋國之扵秦然而秦之葉陽昆陽與舞陽高陵鄰髙陵属琅邪此二縣安陵封地以與昆陽葉陽鄰故秦久惡安陵正曰高陵属京兆與下文地不相近史無高陵字策或誤也注尤非正義云葉陽今許州葉縣昆陽故城在葉縣北舞陽故城在葉縣東此時葉陽昆陽属秦舞陽属魏大事記葉陽今属汝州聽使者之惡也隨安陵氏而欲亡之秦繞舞陽之北以東臨許則南國必危矣周紀註南國江漢之間又曰南陽也今詳此時属韓正曰正義云南國今許州許昌縣西南許昌故城此時属韓在魏之南故言南國大事記安陵在鄢陵縣西北則去許汝不逺矣愚按韓公云繞舞陽葉㐮城其地皆壌界也故曰南國南國雖無危則魏國豈得安哉補曰魏國豈得安哉史作國無害大事記註引䇿文當從䇿且夫憎韓不受安陵氏可也夫不患秦之不愛南國非也補曰史不愛安陵氏下文可推非大事記秦得南國則諸侯之勢危矣魏不可以為己地而不恤也異日者異猶他秦乃在河西晉國之去梁也千里有餘言都絳安邑時有補補曰史無上文餘字即以有字属河山云云䇿文則當有有字河山以䦨元作蘭下同蘭䦨入之䦨正曰按字書䦨門遮也䦨門也牢也通作蘭王莽傳牛馬同蘭師古云蘭謂遮蘭則䦨亦可通䦨入之䦨本作䦨亦作蘭於此義不切之有周韓而間之從横元作林林軍横之軍正曰史作林郷軍林郷地名見芒夘謂秦王章大事記自秦伐林郷以來至于今也以至于今秦十攻魏五入國中邉城盡㧞文臺墮垂都焚句陽有垂都亭正曰此引徐廣說彼文元無都字補曰索隐云有廟曰都正義引括地志云文䑓在曹州寃句縣索隐云文䑓䑓名大事記不取者豈以他䇿有䑓已燔游已奪之云與此類特泛言之邪堕許窺反林木伐麋鹿盡而國繼以圍補曰大事記赧王四十年穣侯圍大梁又長驅梁北東至陶衛之郊衛在河淇之間與陶接故范蠡亦云北至平闞魏記注在東平須昌補曰史北至平監正義云平即兖州平陸監即故闞城在平陸縣西南所亡乎秦者山北山呉華之属補曰史山南山北䇿無山南字疑缺文正義云山華山也華山之東南七國時鄧州属韓汝州属魏華山之北同華銀綏並魏地也河外河内補曰河外謂華州以東至陜虢河内謂蒲州以東至懐衛大縣數百名都數十補曰史大縣數十名都數百秦乃在河西晉國之去大梁也尚千里而禍若是矣又況於使秦無韓而有鄭地無河山以䦨蘭之無周韓以間之去大梁百里禍必百此矣補曰史作由此大事記從䇿文改異日者從之不成也元作矣補曰姚云矣劉作也史同楚魏疑而韓不可得而約也今韓受兵三年矣受秦兵秦撓之以講以求地擿撓之韓知亡猶弗聽補曰史識亡宜從策投質於趙質約也見下而請為天下鴈行頓刃鴈行言以次進補曰為去聲以臣之愚𥙷觀之則楚趙必與之攻矣此何也則皆知秦欲補補曰史秦下有欲字大事記從之之無窮也非盡亡天下之兵而臣海内之民必不休矣是故臣願以從事乎王補曰史無乎字大事記從䇿補王速受楚趙之約而挾韓衍魏字魏補曰字衍史無大事記以䇿補而字之質以存韓為務因求故地扵韓韓必効之如此則士民不勞而故地得其功多扵與秦共伐韓然而無與強秦鄰之禍夫存韓安魏而利天下此亦王之大時已補曰史作天時大事記從䇿通韓之上黨扵共莫使使去音通其道不通他使將為闗也正曰莫句補曰史作共寗下云使道安城出入賦之云云大事記從之正義云共衞州共城縣甯懐州修武縣解題云是時秦欲取韓上黨故蠺食其地使與韓國中絶故勸魏假道使韓得與上黨往來豈專為韓而已哉韓不失上黨則三晋之勢猶完也道已通因而闗之出入者賦之賦征取是魏重質韓以其上黨也質有要也正曰質猶贄韓以上黨為質也共有其賦韓魏共之正曰史作今有當從䇿足以富國韓必徳魏愛魏重魏畏魏韓必不敢反魏韓是魏之縣也魏得韓以為縣則衞大梁河外必安矣衛時已附梁今不存韓則二周必危安陵必易秦輕之也正曰易改易也楚趙衍楚字楚補曰字衍史無大事記從大破魏齊甚畏皆為秦所勝制天下之西鄉而馳秦入朝為臣之日不久記有與上二章相次彪謂言秦之情者衆矣無白扵此者也補曰大事記云信陵君之諌世家不載其從違亦不書與秦同伐韓取故地必以其言而止也信陵之言深切綜練識天下之大勢使魏能用其計糾率楚趙竭力助韓則韓不至失上黨趙不至敗長平六國不至為秦所吞矣謀既不用乂以矯殺晉鄙流落扵外六國垂亾魏始再用之猶能收合諸侯折強秦之鋒若用之扵上黨長平未敗之前天下雌雄之勢未可量也註此章大亊記據史文具載又以䇿又易史之難通者釋甚詳而扵信陵惓惓曷重焉太史公謂說者皆以魏不用信陵君故國削弱至扵亡天方令秦平海内魏雖得阿衡之佐曷益乎知㡬譏其舍人亊而言天大事記之言殆為遷發也愚謂戰國四公子並稱特以好士之故黄歇亂人其事惡矣趙勝不能用趙奢亷頗而割地以召田單受馮亭之嫁禍幾至亾國田文怒小丈夫之譏而滅一縣不忍吕禮之嫉害而為宗國召兵尚奚足言哉其合從難秦歇既敗衂勝僅合楚趙之交以佐魏救獨孟嘗信陵兩戰敗秦文臨函谷無攻以求楚東國而名義索然信陵存趙却秦義烈甚髙河外之戰威震天下且退譲不伐聞過能悔其才與智皆非餘子比也因大事記稱惜之言輙附著之秦趙搆難而戰長平之役此十七年正曰秦趙之戰多矣此䇿時不可考謂魏王曰不如收元作齊齊正曰齊上有脫字下文言齊可推趙而搆之秦搆者令其戰也救趙而助之趙必與秦合戰王不搆趙趙不以毁搆矣毁折也言不收趙趙不能以毁折之兵獨與秦合戰而搆之秦趙復鬬鬬必重魏是并制秦趙之事也王欲焉而收齊趙攻荆欲意或欲也欲焉而收荆趙攻齊欲王之東長之也荆齊在魏東不樂属秦而欲魏為之長待之也待魏之東正曰荆齊趙皆在魏東長之為之長也待之待其事也欲王者此士願之之辭與上王欲焉不同也姚本長之下無也字長平之役平都君田單正曰注非說見趙策說魏王曰王胡不為從魏王曰秦許吾以垣雍韓所得魏地補曰垣雍見前平都君曰臣以垣雍為空割也魏王曰何謂也平都君曰秦趙久相持扵長平之下而無决天下合於秦則無趙合扵趙則無秦秦恐王之變也故以垣雍餌王也秦戰勝趙王敢責垣雍之割乎王曰不敢秦戰不勝趙王能令韓出垣雍之割乎韓不畏秦故王曰不能臣故曰垣雍空割也魏王曰善樓梧約秦魏補曰姚註一作郚前有樓牾約秦魏即此人此時事也將令秦王昭正曰無據遇於境謂魏王曰或謂非牾正曰未見非牾遇而無相無相魏者秦必置相不聽之則交惡於秦聽之則後王之臣將皆務事諸侯之能令扵王上者言處魏上而能使之從令若秦者補曰一本王之上者且遇於秦而相秦者相秦所置是無齊也獨言齊者時君王后賢與齊敵也正曰註謬甚秦必輕王之強矣無齊助故有齊者羣臣能得齊事者王不若相之齊必喜是以有齊者於秦遇秦必重王矣補曰此時必魏合扵齊平將令之令聲十補八年此八年春申未封正曰追稱之辭謂魏王曰昔曹恃齊曹今定陶而輕晉齊伐釐莒釐疑扶風漦正曰此不相涉齊䇿昔者萊莒好謀陳蔡好詐莒恃越而滅蔡恃晉而亡此釐字即萊左傳公會鄭伯扵郲杜註釐城劉向引來牟作釐牟古字通而晉人亡曹史曹伯陽十五年背晋宋滅之哀公八年正曰即僖二十八年晉侯伐曹分曹衞田事凡言亾非必國滅也繒恃齊而輕越繒禹後属東海補曰姚本恃齊以捍越春秋鄫榖梁作繒杜註今琅邪鄫縣齊和子亂太公田和正曰恐非而越人亡繒哀六年莒人滅鄫與此異補曰左氏莒人滅鄫鄫恃賂也註鄫有貢賦之賂在魯恃之而慢莒此或訛為齊鄭恃魏以輕韓魏補補曰此宜有魏字伐榆闗九域圖在平州界正曰大事記安王三年楚歸鄭榆闗十一年魏韓趙敗楚師于大梁榆闗正義云榆闗在鄭之南大梁西而韓氏亡鄭原恃秦翟以輕晉秦翟平穀大㐫而晉人亡原僖二十五年原降使趙衰處原中山恃齊魏以輕趙齊魏伐楚而趙亡中山補曰周䇿宫他謂周君曰云云畧同敗齊魏伐楚而趙亡中山此襄王十八年秦韓魏齊共楚將唐昧事大事記謂史稱趙與燕齊滅中山齊非中山與國者亦未然說見燕趙等策此五國所以亡者皆有元作其其所恃也非獨此五國為然而已也天下之亡國皆然矣夫國之所以不可恃者多其變不可勝數也或以政教不脩上下不輯而不可恃者或有諸侯鄰國之虞而不可恃者或以年榖不登畜積竭盡而不可恃者補曰一本畜作稸此書多作畜或化於利化猶移比於患比猶近臣以此知國之不可必恃也今王恃楚之強而信春申君之言以是賔元作質質補曰未詳秦而久不可知久猶後即春申君有變是王獨受秦患也即王有萬乗之國即猶是而以一人之心為命也臣以此為不完願王之熟計之也魏王問張旄曰吾欲與秦攻韓何如張旄對曰韓且坐而咠亡乎咠胥同侍也補曰一本咠作胥且割而從天下乎王曰韓且割而從天下張旄曰韓怨魏乎怨秦乎王曰怨魏張旄曰韓強秦乎強魏乎問以何國為強王曰強秦張旄曰韓且割而從其所強與所不怨乎且割而從其所不強與其所怨乎王曰韓將割而從其所強與其所不怨張旄曰攻韓之亊王自知矣補曰此恐與信陵所諫同一事客謂司馬食其魏人音異基補曰索隐云酈審趙三人並以六國時衞有司馬食其慕其名也曰慮久以天下為可一者慮久熟慮也是不知天下者也欲獨以魏支秦者是又不知魏者也謂兹公指合從之人補曰兹公未詳史夏侯嬰食兹氏注太原縣名春秋昭五年注莒邑者又地不相涉不知此兩者又不知兹公者也然而兹公為從其說何也從則兹公重不從則兹公輕兹公之處重也不實為期言期約不可必子何不疾及三國方堅也自賣扵秦謂隂倍從以收秦利秦必受子不然横者將圖子以合扵秦是取子之資從食其所資者從也而以資子之讐也謂横人皆以食其之從惡之扵秦讐秦也正曰時與人不可考秦㧞寜邑此二十年正曰秦昭王四十一年魏冉已免相此十一年餘說見趙策魏王令人謂秦王昭曰王歸寜邑吾請先天下講元從才從冓下同謂與秦講搆魏衍魏字魏補曰衍冉曰王無聽無聽其講魏王見天下之不足恃也故欲先講搆夫亡寜者宜割二寜以求講搆夫得寜者安能歸寜乎秦罷邯鄲攻魏取寜邑正曰邯鄲趙都凡攻趙皆言邯郸此策罷邯郸必非赧王五十八年解邯郸圍時事且秦紀書㧞寜新中次年赧王五十九年年表韓魏楚救趙新中而秦兵罷不聞卒㧞也是嵗赧王入秦而此云過二周攻王是二周無恙時也决為在前無疑寜新中非寕邑詳見趙䇿呉慶呉人正曰無考恐魏王之講元從才從冓搆於秦也謂魏王曰秦之攻王也王知其故乎天下皆曰王近也近親也天下以魏為親秦故外之秦因攻之王不近秦秦之所去去猶逺正曰王非親秦乃秦之所欲攻去者皆曰王弱也無秦之助王不弱二周言實不弱視二周猶強也秦人去邯鄲過二周而攻王者以王為易制也王亦知弱之召攻乎若講於秦復示弱也魏王欲攻邯戰季梁魏人非莊子所稱正曰不可考亦不知何時聞之中道而反衣焦不申衣扵行路犯風日故焦焦故不申濡潤乃申耳頭塵不去皆以欲見之速故不暇補曰焦卷申舒布也文選申作信去作浴往見王曰今者臣來見人於大行補曰行道也方北面而持其駕告臣曰我欲之楚臣曰君之楚將奚為北面曰吾馬良臣曰馬雖良此非楚之路也曰吾用多用所資也臣曰用雖多此非楚路也曰吾御者善此數者愈善而離楚愈逺耳今王動欲成霸王舉欲信扵天下恃王國之大兵之精銳而攻邯戰以廣地尊名王之動愈數而離王愈逺耳猶至楚而北行也周肖疑即霄正曰孟子記魏人若以為此人則非安釐之世矣謂宫他曰子為肖謂齊王王庭正曰無據事必在前曰肖願為外臣令齊資我於魏宫他曰不可是示齊輕也肖魏臣而假重扵外是示齊以無魏之重夫齊不以無魏者以害有魏者所不重為無肖是也正曰齊必不以無魏重者而害有魏重者不可示以無魏重也故公不如示有魏公曰令肖以此說齊王齊之所求扵魏者臣請以魏聽齊必資公矣是公有齊以齊有魏也因齊之資以得魏重肖當作霄信陵君殺晉鄙救邯鄲破秦人存趙國趙王孝成自郊迎唐睢元作且且謂信陵君曰臣聞之曰事有不可知者有不可不知者有不可忘者有不可不㤀者信陵君曰何謂也對曰人之憎我也不可不知也吾憎人也不可得而知也人不能知人之有徳於我也不可㤀也吾有徳於人也不可不㤀也補曰史云物有不可㤀或有不可不㤀大人有徳扵公子不可㤀也公子有徳扵人願公子㤀之也語尤簡潔今君殺晉鄙救邯鄲破秦人存趙國此大德也今趙王自郊迎卒然見趙王卒猝同臣願君之忘之也信陵君曰無忌謹受教彪謂唐睢當十一年求救年已九十餘至是又十年其陳誼益髙所謂耄期稱道不亂者歟賢矣正曰史不云唐且恐有訛㚈說又見後章魏攻管而不下補曰管見前策安陵人魏記註召陵有安陵縮高其子為管守補曰秦攻韓管而得之縮髙之子為秦守者也通鑑綱目縮髙之子仕扵秦信陵君使人謂安陵君曰君其遣縮髙吾將仕之以五大夫使為持節尉尉之持節者安陵君曰安陵小國也不能必使其民使者自往請使道使者使人道之至縮高之所復信陵君之命復猶重也信陵言之矣今申之縮高曰君之幸髙也將使髙攻管也夫以父攻子守人大笑也守人其子之人正曰守字句補曰一本摽一作人之所大笑見臣而下是背王也王魏王正曰秦王父教子背亦非君之所喜也敢再拜辭使者以報信陵君信陵君大怒遣大使之安陵曰安陵之地亦猶魏也正曰說見下今吾攻管而不下則秦兵及我管在秦東可以捍魏正曰不得秦地必受秦攻社稷必危矣願君之生束縮高而致之若君弗致補曰姚本此有也字無忌將發十萬之師以告補曰姚本作造安陵之城安陵君曰吾先君成侯趙王也安陵属召陵召陵属魏而此謂成侯為先君盖先時兩属趙魏故上曰猶魏受詔襄王趙襄子補曰大事記引作襄王見上以守此地也手受大府之憲大府謂魏受詔襄子而受魏之憲則此兩属明矣憲法令也正曰大府之憲即受詔扵襄子者上篇猶言第一篇也憲之上篇曰子弑父臣弑君有常刑補正曰有常即常刑也不赦國雖大赦降城亡子以城降人及亡人之子正曰亡人不得與焉今縮高謹雖辭大位補曰一本無謹字姚本謹觧則雖乃謹之訛以全父子之義而君曰必生致之是我負襄王之詔而廢大府之憲也雖死終不敢行縮高聞之曰信陵君為人悍而自用也此辭反必為國禍吾已全已無違元作為為人臣之義矣正曰無違人臣者不事二君之義豈可使吾君有魏患也乃之使者之舍刎頸而死信陵君聞縮髙死衍素字素補曰字衍服縞素避舍使使謝安陵君曰無忌小人也困於思慮困猶不通失言扵君敢再拜釋罪拜所以謝也以安陵赦其罪故謝彪謂縮髙之義直而善處死夫以信陵之愎而好遂髙不死必加兵安陵城破之日固不免死而以此死易一國之命可不謂仁乎正曰信陵君賢而服義使其再聞安陵之辭亦將翻然而悔矣師不以直逞欲殘民决不為也縮髙不忍須㬰之死而成其過惜哉補曰按上章無忌書謂王之使者譛安陵扵秦而此䇿云云未詳管守子守之守使者大使之使皆去聲魏王與龍陽君魏之幸臣正曰幸姬也策言羙人又云拂枕席此非楚安陵君鄢陵君夀陵君趙建信君之比長孫佐輔于武陵等詩用前魚字皆以宫人言之共舩而釣龍陽君得十餘魚而涕下王曰有所不安乎如是何不相告也對曰臣無敢不安也王曰然則何為涕出曰臣為臣元作王王補曰以己之得魚推言王之所得魚也王曰何謂也對曰臣之始得魚也臣甚喜後得又益大今臣直欲棄臣前之所得矣今以臣之㐫惡而得為王拂枕廣補曰一本今以臣凶惡按孟子惡人註謂醜貌人此疑衍凶字或之字訛今臣爵至人君走人於庭在庭則人為之趨走避人於途在途則行者避補曰避一本作辟冝音闢四海之内羙人亦甚多矣聞臣之得幸於王也必褰裳而趨大王褰掲也臣亦猶曩臣之前所得魚也臣亦將棄矣臣安能無涕出乎魏王曰誤以不告為誤正曰誤猶言誤矣當句然恐是譆字訛有是心也何不相告也扵是布令扵四境之内曰有敢言羙人者族死及其族由是觀之近習之人其摯諂也固矣勢猶進正曰摰說文相持也又字同摰質義亦可同其自羃元作纂纂繫元作繁繁補曰恐當作繫也完矣羃覆也言自自結於王正曰髙註帽覆似亦作羃義按纂組類固結之義今由千里之外欲進羙人所効者庸必得幸乎假之得幸庸必為我用乎我謂欲進之人正曰為我用猶言如我寵上句言未必得幸此句言假使得幸未必如我也而近習之人相與怨我見有禍未見有福見有怨未見有徳非用智之術也正曰此䇿不知何王未可以安釐襄哀之世遂附之也或謂魏王王警四疆之内將出兵先令以警之其從扵王者凡兵械當從者十日之内備不具者死王因取其㳺旄旗之旒之舟上繫之之猶扵也亦以楚攻秦臣為王之楚王咠補曰一本作胥臣之反而行行兵春申君聞之謂使者即此說者曰子為我反無見王矣欲其亟反不必見考烈十日之内數萬之衆令涉魏境秦使聞之以告秦王莊㐮秦王謂魏王曰大國有意必來以是而足矣秦恐楚魏合故言魏兵自足不待楚也今詳春申在時魏嵗受秦兵惟此三十年無忌卒五國攻秦可當此語此及下二章元作韓䇿正曰亊證未明魏鞅魏人為魏說正曰一本觀鞅史作觀津人朱英見楚策史楚考烈王二十二年諸侯合從西伐秦楚王為從長春申君用事至函谷闗秦出兵攻諸侯兵皆敗走考烈王以咎春申君以此益疎客有云云扵是去陳徙夀春謂春申曰人皆以楚為強而君用之弱也其扵鞅也不然先君者先春申用事之人二十餘年未嘗見攻今秦欲踰兵於鄳元作澠澠補曰澠即鄳隘之塞魏記所謂冥阨註楚險塞或以為江夏郢縣補曰詳見楚䇿註不使補曰史作便是不便句絶下與不可對文假道兩周倍韓以攻楚不可倍音背此昔者所以未嘗見攻今則不然魏且旦暮亡矣不能愛其許鄢陵與梧梧属楚國此時為魏正曰漢侯國梧属彭城與許鄢陵不相接左傳襄十年晉師城梧及制杜註皆鄭舊地制即虎牢梧必相近此時鄭為韓按史云不能愛許鄢陵其許魏割以予秦秦兵去陳百六十里以此参較則䇿有缺誤徐廣云陳在許東南盖此時楚徙都陳也割以予秦相補去百六十里言秦伐楚之近不須假道臣之所見者秦楚鬬之日近元作也也正曰史作秦楚之日鬪也此策鬬字殽次在之日上已正曰元在韓䇿今詳其文當属楚安邑之御史死其次恐不得也輸人輸安邑里名為之謂安邑補補曰宜有邑字大事記有令曰公孫綦為人請御史扵王王曰彼固有次吾難敗之因遽置之令聞王言故立其次補曰一本有次乎吾難敗其法因遽置之六大事記前漢百官表監御史秦官掌監郡此䇿云云國已遣御史監郡矣非獨秦也正曰魏都安邑在惠王未徙大梁前昭王十年獻安邑扵秦章次不當在此景閔王安釐王子補曰名増元年秦始皇五年己未秦攻魏急始皇五年攻魏取二十城此元年正曰說見後或謂魏王曰補曰乳叢子云秦急攻魏魏王恐或謂子順曰如之何荅曰吾私其計然豈能賢扵執政故無言焉魏王聞之駕如孔氏親問焉曰國亾矣如之何對曰云云下文並同棄之不如用之之易也棄謂戰而䘮地用謂割地賂之正曰見下死之不如棄之之易也死謂敗死能棄之弗能用之能死之弗能棄之此人之大過也補曰孔叢子註云棄其地不如用其地以攻守為易死其地不如棄其地以圖存為易盖當計其勢如何爾在棄之用之得其宜今王亡地數百里亾城數十而國患不解是王棄之非用之也今秦之強也天下無敵而魏之弱也甚而王以是賔元作質質正曰孔叢子註云景閔為太子時嘗質扵秦秦王又能死而弗能棄之此重過也今王能用臣之計虧地不足以傷國卑體不足以苦身解患而怨報怨謂不韋主攻者也秦自四境之内執法以下執政之臣至於長輓者長為輓車之人故畢曰畢猶盡與嫪氏乎嫪毐秦太后私人與吕氏乎不韋也此言與嫪氏耳雖至於門閭之下廊廟之上猶之如是也今王割地以賂秦以為嫪毐功因毐而割故功在毐卑體以尊秦以因嫪毐王以國賛嫪毐毐貴矣今又因之以割是以魏助之也以嫪毐勝矣以不敗為勝王以國賛嫪毐太后之德王也深於骨髓王之交最為天下上矣補曰孔叢子註言太后德王則秦不加兵是乃王以此交秦為天下之上矣秦魏百相交也百相欺也言昔之交皆卒歸於欺今由嫪氏善秦而交為天下上天下孰不棄吕氏而從嫪氏時二人已惡天下必舍元作合合補曰恐合字訛大事記作舍吕氏而從嫪氏則王之怨報矣補曰大事記以此章附見於始皇八年封嫪毐長信侯之下謂嫪吕争權略見扵此景閔元年秦㧞二十城策言亾地數百里亾城數十則此在後矣二年㧞朝歌三年㧞汲大事記所書則㧞汲之年所謂秦攻魏急者盖其時矣補曰大事記曰子順進退有聖賢之風寕忍出此乎秦王始皇使人謂安陵君曰寡人欲以五百里之地易安陵安陵君其許寡人安陵君曰大王加惠以大易小甚善雖然受地於先王願終守之弗敢易秦王不說安陵君因使唐雎元作且下同且使於秦秦王謂唐睢且曰寡人以五百里之地易安陵安陵君不聽寡人何也且秦滅韓十八年亡魏二十一年而君以五十里之地存者以君為長者故不錯意也補曰錯置也今吾以十倍之地請廣於君廣其地正曰設辭易地實欲得之當識其意而君逆寡人者輕寡人與唐雎且對曰否非若是也安陵君受地於先王而守之雖千里不敢易也豈直五百里哉秦王怫然怒謂唐雎且曰公亦嘗聞天子之怒乎唐雎且對曰臣未嘗聞也秦王曰天子之怒伏屍百萬流血千里唐雎且曰大王甞聞布衣之怒乎秦王曰布衣之怒亦免冠徒跣以頭搶地耳搶突也補曰太史公語本此說苑作顙地師古曰搶千羊反唐雎且曰此庸夫之怒也非士之怒也夫専諸之刺王僚也僚吴王昭二十七年彗星襲月聶政之刺韓傀也傀韓相見韓䇿及刺客傳白虹貫日要蘺之刺慶忌也呉越春秋要離呉人吴王闔閭欲殺王子慶忌要離詐以罪亾令呉王焚其妻子走見慶忌以劒刺之倉鷹擊於殿上補曰倉即蒼此三子皆布衣之士也懐怒未發休祲降於天休吉徴祲戾氣自三子言之為吉正曰說文祲精氣感祥也此休字猶言祥與臣而將四矣若士必怒伏屍二人流血五步天下縞素今日是也挺劒而起秦王色撓撓擾也正曰撓屈也奴効反長跪而謝之曰先生坐何至於此寡人諭矣諭曉也夫韓魏滅亾而安陵以五十里之地存者徒以有先生也雎自釐十一年請救至是五十餘年矣彪謂雎刺劫之士自曺沫以至荆軻皆不聞道惟若唐睢者可也為其激而發不専志扵此也正曰唐且之名見扵䇿者不一秦策應侯遣唐且載金之武安散天下士魏安釐王十一年唐且說秦是時應侯始相睢老於魏不應復為秦用又一唐且也且為魏說秦時九十餘至與信陵君語相去十年已百嵗為安陵君使秦有滅韓亡魏之言魏亡在始皇二十二年上去說秦凡四十二年决不存矣又一唐且也楚䇿唐且見春申君又一唐且也新序秦政魏司馬唐且諫曰叚干木云云當文侯時人一唐且也魏謂此策文其明而事多難信以始皇之興滅何憚扵安陵而易以五百里地是特為之辭而使之納地耳唐且之使愚矣雖抗言不屈豈終能沮之乎荆軻之見也匿匕首扵圖秦法侍者不得操兵此云挺劒而起何也其辭固多誇矣戰國策校注卷七
