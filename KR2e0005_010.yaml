body:
  text: 戰國策校注卷十宋鮑彪原注元吳師道補正宋沛梁楚山陽濟隂東平及東郡之須昌壽張補曰漢志壽張下有今之睢陽四字景公嗣元公元年恭王四年乙酉補曰史年表景公名頭曼漢書古今人表作兜樂汲塜師春作􅒋頭曼兜欒音讀固相混若􅒋則豈先二名而後一之者邪黃伯思考辨祕閣古器有宋公􅒋餗鼎與汲塜合因知異書有不可廢者謾記於此公輸般魯之巧人補曰高注公輸般魯般之號也他書或作班古字通漢書班師為楚設機天地疏機關也雲梯之屬補曰高注云機械雲梯之屬也索隱云械者雲梯撞車飛石車弩之具將以攻宋墨子宋人名翟聞之百舍重繭百里一舍補曰此句高注下有重繭纍胝也一句又莊子百舍注百日止宿也按繭即趼字吉典反增韻謂足胝起如繭胝音支往見公輸般謂之曰吾自宋聞子聞其善吾欲藉子殺王正曰一本三殺王並作殺􅙷云人􅙷並而鄰反集韻云唐武后字作􅙷如臣字作􅖔􅙷即人也公輸般曰吾義固不殺王墨子曰聞公為雲梯梯之高上入雲將以攻宋宋何罪之有義不殺王而攻國是不殺少而殺衆敢問攻宋何義也公輸般服焉請見之王見翟於王墨子見楚王非昭即惠正曰當缺曰今有人於此舍其文軒車有雕飾者正曰文作之車高注鄰有敝輿而欲竊之舍其錦繡鄰有裋褐豎使之衣補曰一本短褐姚本注短一作裋韓公考異云裋褐一作短方云貨殖傳用裋字董彥逺洪李善皆辨古無裋褐字按裋褐字賈誼貢禹貨殖傳班彪劉平張衡傳凡六見班彪論漢書作裋文選則用丁管切是唐儒兩用之故少陵以長纓短褐為對而史記孟嘗傳國策墨子語皆傳寫之訛今按國策短一作裋史士不得短褐司馬真亦音豎班彪王命論短字韋昭云當作裋襦也又淮南子巫馬期純衣短褐而高誘無説未必皆傳寫之訛栁子厚亦嘗用之安知韓公之必不然乎兩存以俟知者而欲竊之此為何若人也王曰必為有竊疾矣疾猶癖墨子曰荆之地方五千里宋方五百里此猶文軒之與敝輿也荆有雲夢犀兕麋鹿盈之江漢魚鱉黿鼉為天下饒宋所謂無雉兔鮒魚者也鮒魚之小者正曰爾雅翼鮒鰿也今作鯽此猶梁肉之與糟粳也荆有長松文梓楩楠豫章大小凡五正曰高注皆大木也補曰楩楠豫章書注楩梓一本楠作柟章作樟姚同楠即柟宋無長木此猶錦繡之與短褐也臣元作惡惡補曰疑字誤以王吏之攻宋為與此同類也王曰善哉請無攻宋彪謂翟之説美矣然此時諸侯固有竊疾強吞弱大并小直患其力不給爾豈為若説止攻哉意者墨守之嚴輸般服疾焉假此説以縮兵則有之彼楚國非止足而無有竊疾者也補曰墨子曰公輸般為雲梯之械成將以攻宋墨子聞之至于郢見公輸般之攻械蓋墨子之守固有餘般詘而言曰吾知所以距子矣吾不言墨子亦曰吾知子之所以距我者吾不言楚王問其故墨子曰公輸子之意不過欲殺臣殺臣宋莫能守雖然臣之弟子禽滑釐等三百人已持臣守圍之器在宋城上而待楚寇矣雖殺臣不能絶也楚王曰善哉吾請無攻宋城矣史云墨翟宋之大夫或云並孔子時或云在其後索隱云按别録墨翟書有文子文子子夏弟子問于墨子如此則墨子作七十子後愚按孔子以敬王四十一年卒景公以元王七年卒相去十一年擅弓季康子母死般請以機封則般亦與孔子相及大事記云楊墨之説肆行於天下必在春秋後蓋異端之説非王教盡廢不能興也梁王襄正曰惠伐邯鄲而徵師於宋宋君使使者請於趙王武靈正曰成侯曰夫梁兵徑而權重今徵師於敝邑敝邑不從則恐危社稷若扶梁伐趙扶謂助之以害趙國則寡人不忍也願王之有以命敝邑趙王曰然夫宋之不如梁也補曰一本不足如梁高注如當也寡人知之矣弱趙以強梁宋必不利也補曰高注梁必兼宋故宋不利之矣則吾何以告子而可乎雖知宋不助梁然無辭使宋不聽梁使者曰臣請受邊城請得攻一城以應梁補曰姚本注臣字曽本自此至卷尾皆作惠徐其攻而留其日以待下吏之有城而已攻之不力使趙無失城趙王曰善宋人因遂舉兵入趙境而圍一城焉梁王甚説曰宋人助我攻矣趙王亦曰補曰一本趙王亦説曰姚同宋人止於此矣故兵退難解德施於梁而無怨於趙故名有所加而實有所歸君偃宜無此善以在犀首伐黃下蘇秦論攻宋前故次之此正曰大事記周顯王十五年梁惠十七年宋公剔成十六年宋伐趙圍一城解題曰梁惠王伐邯鄲引策云云又按史世家景公六十四年卒左傳景公在位四十八年卒大事記定從左氏景公卒當元王七年鮑以此次之景公繆甚謂大尹宋卿正曰左傳哀二十六年宋景公無子取得與啓畜諸公宫於是云云六卿三族降聽政因大尹以達杜注近官有寵者鮑因大尹字遂傅會為景公時蓋無稽之言也曰君日長矣君宋君自知政言親國事則公無事公不如令楚賀君之孝則君不奪太后之事矣后時與政則公常用宋矣見用於宋尹蓋太后之人正曰皆無考宋與楚為兄弟齊攻宋楚王威言救宋宋因賣楚重以求講於齊賣謂衒鬻之齊不聽蘇秦為宋謂齊相曰不如與之聽其講以明宋之賣元作資補曰一本作賣姚同楚重於齊也楚怒怒其背已而與齊講必絶於宋而事齊齊楚合則攻宋易矣蘇秦與剔成齊宣同時知非閔時正曰此必非景公時剔成嗣辟公元年烈王七年壬子立正曰桓公大事記引蘇氏云按索隱汲冡紀年作桓公辟兵莊子曰桓公出前驅呼辟蒙人以為狂而史記作辟公辟公名辟諡辟事必不爾史記蓋誤齊攻宋宋使臧子索救於荆荆王威大説許救甚勸補曰勸力也臧子憂而反其御曰索救而得有憂色何也臧子曰宋小而齊大夫救於小宋而惡於大齊此王之所憂也而荆王説甚必以堅我我堅而齊敝荆之利也臧子乃歸齊王宣果拔宋五城而荆王不至此四章有蘇秦語得為君偃弒立怒鄰宜不能曲折如此故係之剔成然則孟子所稱者亦皆剔成也正曰此章時不可考缺之可也鮑妄為傅會至謂孟子所稱皆剔成孟子謂戴不勝子之王薛居州居王所王非偃而誰君偃辟公子剔成君弟弒立元年顯王四十一年癸巳正曰按世家剔成四十一年弟偃攻襲剔成敗奔齊自立為宋君故大事記書宋公剔成為弟偃所攻出奔齊偃自立宋衍康字下同康王之時按史君偃在年表世家傳並不書諡正曰索隱云戰國策吕氏春秋皆以偃諡康王有雀生􅞖集韻音欺今江東呼鷦鶹為鵋鶀正曰此與爾雅鵅鵋鶀注同文鵅音格鵋音忌鶀音欺按史記好射鶀鴈鶀小鴈也音欺愚按策文云小而生巨以雀生鴈言可也云見祥而不祥鵂鶹非祥也黃公紹韻會鶀鶀並為一字音期者非新序作鸇所載比策文為詳今通鑑作􅞖於城之陬陬隅也使史占之曰小而生巨必霸天下蓋言遜也補曰高注太史能辨吉凶之妖祥康王無道不敢正對故云危行言遜太史有焉康王大喜於是滅滕隱七年注在沛國公丘縣補曰大事記云杜氏世族譜滕為齊滅觀孟子所載滕定公文公則杜説誤策所記是也伐薛取淮北之地乃愈自信欲霸之速成故射天笞地斬社稷而焚滅之曰威服天下鬼神罵國老諫臣元作曰曰補日疑字誤為無顔之冠冠不覆額補曰史王偃盛血以革囊縣而射之命曰射天淫於酒婦人羣臣諫者輒射之諸侯皆曰桀宋以示勇剖傴之背鍥朝涉之脛鍥刻脛胻也而國人大駭齊聞而伐之民散城不守王乃逃倪侯之館侯其臣也正曰無稽遂得而死補曰世家云殺王偃年表云死於溫溫魏地新序得下有病字見祥而不為祥反為禍補曰元高注云禍謂齊湣王與楚魏共伐宋殺康王而滅國三分其地曰家語背者殷王帝辛之世有雀生大鳥於城隅占之凡以小生大則國家必王而名益昌於是帝辛侍雀之德不修國政亢暴無極朝臣莫救外冦乃至殷國以亡又説苑孔子曰昔者殷王帝辛云云下段亦同愚按宋殷後也疑即此一事而記者不同凡六章衛東郡及魏郡黎陽河北之野王朝歌後文公徙楚丘黎陽是也靈公襄公子元年景王三十年丁卯正曰説見趙策衛靈公近癰疽孟子有其人蓋醫之幸者補曰癰疽瘍醫彌子瑕補曰靈公幸臣其妻與子路之妻兄弟亦見孟子二人者專君之勢以蔽左右復塗偵衛人補曰韓非子亦有此文而稍異云侏儒善假夢以見主道恐此復塗偵字或侏儒之訛然彼以癰疽為雍鉏則誤也謂君曰昔日臣夢見君君曰子何夢曰夢見竈君君忿然作色曰吾聞夢見人君者夢見日今子曰夢見竈君而言君也有説則可無説則死對曰日并燭天下者也一物不能蔽也若竈則不然前之人煬煬炙燥也補曰煬餘亮反莊子煬者避竈釋文炊也蓋炊而向竈者則後之人無從見也今臣疑人之有煬於君者也是以夢見竈君君曰善於是因廢癰疽彌子瑕而立司空狗元在趙策正曰宜從舊説見趙策悼公出公弟元年定王十四年癸酉正曰杜注悼公蒯聵庶弟公子黚史作黔二字並其淹反大事記周貞定王元年衛悼公元年解題引古史云左傳出公復入八年悼公立事甚詳史記出公復入二十一年卒黚攻出公子自立悼公五年卒犀首魏官也非公孫衍正曰據左傳南文子相衛悼公悼公與智伯並時則犀首非公孫衍矣司馬彪謂犀首為魏官以此策考之悼公元年當貞定王元年至威烈王二十二年三晉始為諸侯時六十餘年是時已有犀首非魏官矣意者其為姓名或號説見秦策然則此犀首者亦三晉之臣歟伐黃補曰舊注黃國名按策言黃不一處此未詳過衛使人謂衛君此策以南文子與智伯同時知為悼公補曰左傳出公之入也奪南氏邑杜注子南之子公孫彌牟彌牟與褚師比等逐公越臯如等將納公文子致衆而問曰彌牟亡有益云云遂立悼公南氏相之事在哀公二十五年二十六年曰敝邑之師過大國之郊曽無一介之使以存之乎敢請其罪今黃城將下矣已將移兵造大國之城下已言已下黃衛君懼束組三百緄組斜文紛綬之屬十首為一緄補曰組屢見前緄古本反説文帶也詩緄縢傳繩也皆與此不協鮑因高注黃金三百鎰以遺使者南文子衛大夫止之曰是勝黃城必不敢來不勝亦不敢來是勝黃城則功大名美內臨其倫臨言以功處其上倫其輩類夫在中者國中之臣惡臨議其事議謂譖短之蒙大名蒙冒處之也挾成功坐御以待中之議坐御言不營為犀首雖愚必不為也是不勝黃城破心而走歸破心懼甚也恐不免於罪矣彼安敢攻衛以重其不勝之罪哉果勝黃城帥師而歸遂不敢過衛智伯欲伐衛遺衛君野馬騊駼也四百璧一補曰一本白璧姚同衛君大説羣臣皆賀南文子有憂色衛君曰一國大歡而子有憂色何文子曰無功之賞無力之禮不可不察也野馬四百璧一此小國之禮補曰一本有也字姚同而大國致之君其圖之衛君以其言告邊境智伯果起兵而襲衛至境而反曰衛有賢人先知吾謀也補曰説苑吳赤市使智氏及趙簡子以乘璧遺衛事相類智伯欲襲衛乃佯亡其太子使奔衛南文子曰太子顔為君子也顔太子名君謂智伯甚愛而有寵非有大罪而亡必有故使人迎之於境曰車過五乘慎勿納也智伯聞之乃止彪謂南文子衛之賢智人也慮無遺算補曰大事記貞定王十二年晉荀瑶襲衛解題曰失其年國語序藍臺之宴云還自衛姑載于此未必果此年也戰國策云云並載此二年嗣君平侯子元年顯王四十五年丁酉秦攻衛之蒲秦昭四年取蒲坂此二十三年正曰年表世家拔魏蒲坂蒲坂在河東非衛地世家衛嗣君時獨有濮陽按史秦昭王元年樗里子伐蒲索隱云樗里疾圍蒲不克而秦惠王薨事與此合正義云蒲故城在滑州匡城縣此即子路作宰地胡衍謂樗里疾曰公之伐蒲以為秦乎以為魏乎為魏則善為秦則不賴矣賴猶利衛所以為衛者以有蒲也今蒲入於魏衛恐秦取蒲必自入之魏衛必折於魏往求援也補曰一本蒲入于秦司馬貞引策云今蒲入於秦衛必折而入於魏樗里疾傳有亦作入於秦魏亡西河之外秦惠六年正曰秦惠八年魏納河西地後二年魏入上郡於秦而河西濵洛之地失而弗能補曰一本有復字姚同取者弱也今并衛於魏魏必強魏強之日西河之外必危且秦王昭亦將觀公之事害秦以善元作害補曰一本作善姚同魏秦王必怨公樗里疾曰奈何胡衍曰公釋蒲勿攻臣請為公入戒蒲守戒告之以釋攻以德衛君樗里疾曰善胡衍因入蒲謂其守曰樗里子知蒲之病也其言曰吾必取蒲今臣能使釋蒲勿攻蒲守再拜因效金二百鎰元並作溢溢補曰鎰通焉曰秦兵誠去請厚子於衛君胡衍取金於蒲以自重於衛樗里子亦得三百金而歸又以德衛君也補曰史樗里子傳有衛使客事魏三年不得見衛客患之乃見梧下先生蓋以所居為號補曰高注家有大梧樹因以為號若栁下惠藝文類聚作梧丘許之以百金梧下先生曰諾乃見魏王哀正曰無考曰臣聞秦出元作入入正曰一本作人兵下有出字兵未知其所之秦魏交而不修之日久矣願王敷元作博博補曰字當作專事秦無有他計魏王曰諾客趨出客謂梧下至郎門而反補曰姚注讀作郭門按韓非子使郎中自開道於郎門之內愚恐郎即廊見秦策曰佯若不為衛客偶思念得之臣恐王事秦之晚王曰何也先生曰夫人於事已者過急過猶多於事人者過緩今王緩於事已者安能急於事人奚以知之王問衛客曰梧下稱之事王三年不得見臣以是知王緩也魏王趨見衛客彪謂此一時氣俗無不沒於利者以先生稱於世其人不薄矣而以百金諾人為之行狡猾之計况小子乎彼哉彼哉正曰此策時不可考何得附之嗣君衛嗣君時胥靡有罪人蓋賢者也正曰此本高注竊以為不然有罪而逃何以知其賢此慕傳説之事而誤説者也衛君以金贖之者恥其失政廢刑爾觀其言可見補曰靡忙皮反晉灼曰胥相也靡隨也顔曰連繫相隨而服役之猶今之囚徒莊子注以鐵鎖相連繫逃之魏衛贖之百金不與乃請以左氏衛地缺請亦贖也羣臣諫曰一百金之地贖一胥靡無乃不可乎君曰治無小亂無大大小謂國教化喻於民三百之城足以為治補曰三百或言家民無亷恥雖有十左氏將何以用之彪謂衛君之言及此足以興起而不得霸豈輔之者無其人乎以羣臣之所諫知不及其君逺矣然享國四十餘年不受外兵則三百為治之言允蹈之者歟正曰罪人而逃可謂無政矣割地以求胥靡可謂無謀矣其言雖善事則疾矣補曰韓非子有略同衛嗣君病富術謂殷順且曰皆衛人正曰古人以且名者皆子余反如夏無且唐且龍且之類是也子聽吾言也以説君勿益損也使之一如其教君必善子人生之所行與死之心異始君之所行於世者食高麗也凡有養於口體皆得言食補曰食高麗疑人名所用者緤錯拿薄也二臣名羣臣盡以為君輕國而好高麗必無與君言國事者子謂君補曰子謂君以下今教之以説君也上言死則心異故言此可以動之君之所行天下者甚繆緤錯主斷於國而拿薄輔之自今以往者公孫氏衛國姓也故商君衛之庶孽公子也姓公孫氏正曰高注公孫氏謂嗣君也商君前見秦策不血食矣君曰善與之相印曰我死子制之嗣君死殷順且以君令相公子補期嗣君子緤錯拿薄之族皆逐之也彪謂嗣君賢君也富術稱之貶矣蓋諫者之言多務為深切詭激之辭使嗣君不賢安能受其言而委之以二臣乎正曰鮑誤釋胥靡之事遂以衛君為賢其實非也然能從順且之諫使制二子猶愈於迷復者也補曰緤先結反拿女居反衛人迎新婦婦上車問驂馬誰馬也御曰惜之新婦謂僕曰拊驂無笞服惜言愛也拊尤愛之正曰高拊擊也車兩傍曰驂轅中曰服擊其驂則兩服馬受勞笞也鮑以為借馬故曰愛者非是車至門扶人扶婦下教送母母送婦者將還故戒之曰滅竈將失火入室見臼曰徙之牖下妨往來者主人笑之此三言者皆至言也然而不免為笑者蚤晚之時失也初為婦而云然失之蚤也正曰此策時不可考補曰吕氏春秋白圭新與惠子相見惠子説之以強惠子出白圭告人曰云云與此相類凡九章中山漢屬國有盧奴北平北新城唐深澤若陘安國曲逆望都新市補曰索隱云中山故鮮虞國姬姓也路史杜佑云常山靈壽中山國有故城城中有山故號中山漢中山王靖始移居盧奴太事記威烈王十二年中山武公初立又按左傳昭公十二年晉荀吳假道於鮮虞滅肥是冬晉復伐鮮虞杜預云鮮虞北狄别種在中山新市縣中山名始見定公四年晉合諸侯召陵謀為蔡伐楚荀寅日諸俟方二中山不服無損於楚而失中山不如辭蔡侯則識時勢也樂羊為魏將攻中山其子時在中山中山君烹之作羮致於樂羊樂食之古今稱之曰補樂羊食其子以自信明害父以求法此害於父道而羊為之求為徇國之法也補曰説見趙策犀首立五王秦韓燕宋中山也楚春秋時王齊宣魏惠顯王三十五年王趙武靈獨不王其後秦惠十二年韓宣惠燕易王王明年秦惠始王秦惠改元之七年宋偃始王故武靈八年書五國相王即秦七年也正曰大事記周顯王四十六年韓燕中山皆稱王趙獨稱君其後亦稱王解題按戰國策犀首立五王高氏以為齊趙魏燕中山鮑氏以為秦韓燕宋中山二家之説皆非也齊魏王已久秦之王出於張儀宋中山俱小國使宋是時稱王齊何為獨怒中山况偃之稱王又在慎靚之三年乎然則犀首所立五王其可考者韓燕趙中山其一則不可考也趙武靈王初稱君世家十一年書王召公子職於韓則是時已稱王矣七國惟楚僣王逺在春秋之世其餘六國魏最先趙最後以又顯王三十五年齊宣王魏惠王與諸侯會于徐州相王解題云齊魏之王以國策考之蓋在魏拔邯鄲之嵗顯王十六年而秦紀今年又書齊魏為王未知孰是然策所載似得其實蓋魏以邯鄲之勝齊以桂陵之勝各僣稱王若今嵗魏方衰弱齊亦未有大功何為驟稱王乎今年書相王者齊魏僣王已久至是共會諸侯欲其皆王以同已之僣也秦紀所書或者齊魏前此稱王於其國至此名號始通於諸侯乎又顯王四十四年秦初稱王解題云張儀之請也秦紀書魏君稱王衍一魏字愚按趙世家武靈王十年五國相王趙獨否曰無其實敢處其名乎令國人謂已曰君十一年始云王召公子職也然則云五國相王者謂五國皆稱王非謂在此年也鮑誤而中山後持持猶疑也立之後而復疑正曰高注待中山小故後立齊謂趙魏曰寡人羞與中山並為王願與大國伐之以廢其王中山聞之大恐召張登而告之曰寡人且王齊謂趙魏曰羞與寡人並為王而欲伐寡人恐亡其國不在索王今所謀者救亡爾不求為王非子莫能吾救登對曰君為臣多車重幣臣請見田嬰中山君遣之齊見嬰子曰臣聞君欲廢中山之王將與趙魏伐之過矣以中山之小而三國伐之中山雖益廢王益猶甚也言事有甚於此者猶且聽也且中山恐必為趙魏廢其王而務附焉附趙魏也主廢者齊故不附之是君為趙魏驅羊也補日高注是君為趙魏驅羊而使得食之非齊之利也豈若中山廢其王而事齊哉田嬰曰奈何張登曰今君召中山與之遇而許之王中山必喜而絶趙魏趙魏怒而攻中山中山急而為君難其王難則所謂羞與為王則中山必恐為君廢王事齊不王中山齊志也今為廢之所以事齊彼患亡其國是君廢其王而立其國賢於為趙魏驅羊也田嬰曰諾張丑曰不可臣聞之同欲者相憎同憂者相親今五國相與王也負海不與焉負海齊也先已王補曰高注齊不欲與之同王則與如字此是欲皆在為王而憂在負海憂齊廢之今召中山與之遇而許之王是奪四元作五下同五正曰一本下三處作四姚同疑此或有誤國而益負海也中山與四國同欲今與齊遇是奪彼而益我也致中山而塞四國四國寒心必先與之王而故親之是君臨中山而失四國也且張登之為人也善以微計薦中山之君久矣薦進也難信以為利田嬰不聽果召中山君而許之王張登因謂趙魏曰齊欲伐河東河車魏地何以知之齊羞與中山並元作之之為王甚矣今召中山與之遇而許之王是欲用其兵也豈若令大國先與之王以止其遇哉趙魏許諾果與中山王而親之中山果絶齊而從趙魏中山與燕趙為王齊閉關不通中山之使其言曰我萬乘之國也中山百補曰一本作千姚同乘之國也何侔名於我欲割平邑屬代郡正日正義引括地志平邑故城在魏州昌樂縣東北見趙世家以賂燕趙出兵以攻中山藍諸君中山相也補曰索隱云戰國策望諸作藍諸愚按燕策望諸相中山恐即此人與樂毅同號者索隱指為毅則誤矣患之張登謂藍諸君曰公何患於齊藍諸君曰齊強萬乘之國恥與中山侔名不憚割地以賂燕趙出兵以攻中山燕趙好倍而貪地倍謂背約補曰一本好位姚同注曾作倍吾恐其不吾據也大者危國次者廢王奈何吾弗患也張登曰請令燕趙固輔中山固言輔之堅而成其王事遂定公欲之乎藍諸君曰此所欲也曰請以公為齊王閔而登試説公可乃行之藍諸君曰願聞其説登曰王之所以不憚割地以賂燕趙出兵以攻中山者其實欲廢中山之王也王曰然然則王之為費且危夫割地以賂燕趙是強敵也出兵以攻中山首難也首為攻伐之難王行二者所求中山未必得王如用臣之道地不虧而兵不用中山可廢也王必曰子之道奈何藍諸君曰然則子之道奈何張登曰王發重使使告中山君曰寡人所以閉關不通使者為中山之獨與燕趙為王而寡人不與聞焉此王此君皆中山正日王發重使之王指齊王是以隘之隘亦不通也補曰隘當讀作厄王茍舉玉補趾以見寡人請亦佐君中山恐燕趙之不已據也今齊之辭云即佐王必遁燕趙與王相見此並齊王正日王茍舉趾與即佐王之王指中山燕趙聞之必怒絶之王亦絶之是中山孤孤何得無廢以此説齊王齊王聽乎藍諸君曰是則必聽矣此所以廢之何在其所以存之乎張登曰此王所以存者也此王中山齊以是辭來因言告燕趙而無往以齊王言告之而不往齊以積厚於燕趙燕趙必曰齊之欲割平邑以賂我者非欲廢中山之王也徒欲以離我於中山而已親之也雖百平邑燕趙必不受也藍諸君曰善遣張登往果以是辭來中山因告燕趙而不往燕趙果俱輔中山而使其王事遂定彪謂張登臆則屢中言之必可行者也雖其用智有椑闔風氣而術無害亦狡獪可喜非君子之所排也正日椑闔狡獪豈非君子之所排者因其文之可喜而謂其術之無害悖矣司馬喜中山臣補曰姚本喜作喜後同使趙為已求相中山公孫𢎞隂知之中山君出司馬喜御公孫𢎞參乘公孫𢎞曰為人臣招大國之威以為已求相於君何如君曰吾食其肉不以分人司馬喜頓首於軾曰臣自知死至矣君曰何也曰補補曰恐缺曰字臣抵罪君曰行吾知之矣行使之行車二人雅不相善𢎞無故云然似欲中喜者故知居頃之趙使來為司馬喜求相中山君大疑公孫𢎞公孫𢎞走出補曰太史公自序司馬氏其在衛者相中山徐廣云名喜鄒陽書司馬喜臏於宋而相中山按戰國有兩公孫𢎞一在齊為孟嘗君見秦昭王者即此人與漢平津為三韓子云公孫𢎞斷髮而為越王騎又一人也司馬喜三相中山隂簡難之簡隂姬名也難謂忌之田簡謂司馬喜曰趙使者來屬耳霍光傳注屬近也正曰詩耳屬于垣史記注屬猶注也言趙使屬耳中山之事獨不可語隂簡之美乎趙使近至宜有報可因報使言之趙也趙必請之君與之即公無內難矣君弗與趙公因勸君立之以為正妻隂簡之德公無所窮矣果令趙請之補君弗與司馬喜曰君弗與趙趙王武靈必大怒大怒則君必危矣然則立以為妻固無請人之妻不得而怨人者也田簡自為取使取請為使也正曰自謂可以取趙使此書取字如此者多為與之善而得其心之義可以為司馬喜可以為隂簡可以令趙勿請也簡請使耳實喜自使見下正曰此章以為語趙使下章以為司馬喜使説趙王此正記所傳之異兩可以為之為去聲隂姬與江姬爭為后司馬喜謂隂姬公姬父也曰事成則有土得民言公得封補曰一本子民姚同不成則恐無身欲成之何不見臣乎怪其不來謀隂姬公稽首首至地也曰誠如君言事何可豫道者言將厚報之未可先言司馬喜即奏書中山王補曰臣聞弱趙強中山中山王説而見之曰願聞弱趙強中山之説司馬喜曰臣願之趙觀其地形險阻人民貧富君臣賢不肖商敵為資商較之未可豫陳也中山王遣之見趙王武靈曰臣聞趙天下善為音佳麗人之所出也今者臣來至境入都邑觀人民謡俗徒歌曰謡容貌顔色殊無佳麗好美者以臣所行多矣周流無所不至未嘗見人如中山隂姬者也不知者特以為神人元作力力正曰盡力言之言不能及也其容貌顔色固以過絶人矣若其眉目準頞權衡準鼻頞鼻莖權輔骨當作顴衡眉上正曰準鼻頭頞額也見孟子蹙額注蔡澤傳蹙齃索隱云鼻蹙眉犀角偃月犀角首骨偃月額骨彼乃帝王之后非諸侯之姬也趙王意移大説曰吾願請之何如司馬喜曰臣竊見其佳麗口不能無道爾即欲請之是非臣所敢議願王無泄也司馬喜辭去歸報中山王曰趙王非賢王也不好道德而好聲色不好仁義而好勇力臣聞其乃欲請所謂隂姬者中山王作色不説司馬喜曰趙強國也其請之必矣王如不與即社稷危矣與之即為諸侯笑中山王曰為將奈何司馬喜曰王立為后以絶趙王之意世無請后者雖欲得請之鄰國不與也中山王遂立以為后趙王亦無請言也此兩章一事爾而曲折小差著書者自以所聞駁異也然則此書之作亦至慎矣補曰司馬喜繩隂姬以語趙王而脅君以行詐取寵視張儀於鄭袖其惡尤甚記者好夸何慎之有主父欲伐中山使李疪觀之李疪曰可伐也君弗攻恐後天下主父曰何以對曰中山之君所傾蓋與車者傾者却不御也與之同車皆所尊禮者補曰一本車下無者字姚同而朝窮閭隘巷之士者君而朝士亦尊禮也七十家主父曰是賢君也安可伐李疪曰不然舉士則民務名不存本本謂農業朝賢則耕者惰而戰士懦皆不強力也以賢者不耕戰故若此不亡者未之有也彪謂李疪小人也乃欲使人君廢賢而置士夫賢者在位將使耕者愈力戰士愈奮而誰敢惰懦且不賢而耕且戰民之分也何敢與賢者並民惟不務名耳豈有務名而不趨於善者乎若疪者小人之無忌憚者也補曰韓非子有末云舉兵而伐中山遂滅也不嘗讀商君之言曰國之所以興者農戰也民求官爵以農戰而巧言虛道者其國必削詩書禮樂善修仁亷辨慧國有此者上無使守戰敵主必削下民必貧此商君所以遺禮義上首功而富國強兵之術也武靈胡服騎射一反先王之教其桀驁之志使卒不死而獲逞有以異於秦乎李疪者窺見其所大欲故以舍士急耕戰之説導之當時風聲氣習不約而合其悖繆固不足辨也抑其所稱中山之事也殆未必然大事記據吕氏春秋晉太史屠奈謂周威公曰天生民而令有别有别人之義也所以異於禽獸麋鹿也君臣上下之所以立也中山之俗以晝為夜以夜繼曰男女淫亂因無别焉其主弗之禁此亡國之風也居二年中山果亡其亡之故可考矣使賢俊盛多尊禮無失則當時風俗安得至此乎戰國策校注卷十
