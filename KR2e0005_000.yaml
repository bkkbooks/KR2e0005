body:
  text: 戰國䇿校注雜史類提要臣等謹案戰國䇿校注十卷元吳師道撰師道字正傳蘭溪人至治元年進士官至禮部郎中事迹具元史儒學傳戰國䇿舊有髙誘注宋紹興間縉雲鮑彪病其闕略重為之注而復為改定其次第師道又以鮑彪注為未善又取剡川姚宏之注與彪注參校而雜引諸書考證之其書一仍彪注之舊而每條之下凡增其所闕者謂之補凡糾其所失者謂之正各以補曰正曰别之復取劉向曾鞏所校三十三篇四百八十六章舊第為彪所變者别存于首前有師道自序撮舉彪注之大紕繆者凡十九條議論皆極精審古來注是書者當以師道為最善其後附載李文叔王覺孫朴諸跋及姚宏姚寬兩序于是書本末源流敘述尤詳宏字令聲一曰伯聲嘗為刪定官忤秦檜死大理獄寬即著西溪叢語者嘗注是書今皆不傳惟藉師道是書存其崖略爾乾隆四十五年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀戰國䇿劉序護左都水使者光祿大夫臣向言所校中戰國䇿書中書餘卷錯亂相糅舛又有國别者八篇少不足臣向因國别者略以時次之分别不以序者以相補除復重得三十三篇本字多誤脫為半字以趙為肖以齊為立如此字者多中書本號或曰國䇿或曰國事或曰短長或曰事語或曰長書或曰修書臣向以為戰國時遊士輔所用之國為之䇿謀宜為戰國䇿其事繼春秋以後訖楚漢之起二百四十五年間之事皆定以殺青書可繕寫敘曰周室自文武始興崇道德隆禮義設辟雍泮宫庠序之教陳禮樂弦歌移風之化敘人倫正夫婦天下莫不曉然論孝悌之義惇篤之行故仁義之道滿乎天下卒致之刑措四十餘年逺方慕義莫不賔服雅頌歌詠以思其德下及康昭之後以思其德一作恩德其上下及一無下字雖有衰德其綱紀尚眀及春秋時已四五百載矣然其餘業遺烈流而未滅五霸之起尊事周室五霸之後時君雖無德人臣輔其君者若鄭之子産晉之叔向齊之晏嬰挾君輔政以並立於中國猶以義相支持歌詠以相感聘覲以相交期會以相一盟誓以相救天子之命猶有所行會享之國猶有所耻小國得有所依百姓得有所息孔子曰能以禮讓為國乎何有周之流化豈不大哉及春秋之後衆賢輔國者既沒而禮義衰矣孔子雖論詩書定禮樂王道粲然分眀以匹夫無勢化之者七十二人而已皆天下之俊也時君莫尚之是以王道遂用不興故曰非威不立非勢不行仲尼既沒之後田氏取齊六卿分晉道德大廢上下失序至秦孝公捐禮讓而貴戰爭棄仁義而用詐譎茍以取強而已矣夫篡盜之人列為侯王詐譎之國興立為強是以轉相放效後嗣師之遂相吞滅并大兼小暴師經嵗流血滿野父子不相親兄弟不相安夫婦離散莫保其命湣然道德絶矣晚世益甚萬乘之國七千乘之國五敵侔爭權盡為戰國貪叨無耻競進無厭國異政教各自制斷上無天子下無方伯力攻爭強勝者為右兵革不休詐偽並起當此之時雖有道德不得施設有謀之強負阻而恃固連與交質重約結誓以守其國故孟子荀卿儒術之士棄捐於世而遊説權謀之徒見貴於俗是以蘇秦張儀公孫衍陳軫代厲之屬生從橫短長之説左右傾側蘇秦為從張儀為橫橫則秦帝從則楚王所在國重所去國輕然當此之時秦國最雄諸侯方弱蘇秦結之合六國為一以儐背秦秦人恐懼不敢窺兵於關中天下不交兵者二十有九年然秦國勢便形利權謀之士咸先馳之蘇秦初欲橫秦弗用故東合從及蘇秦死後張儀連橫諸侯聽之西向事秦是故始皇因四塞之國據崤函之阻跨隴蜀之饒聽衆人之䇿乘六世之烈以蠶食六國兼諸侯并有天下仗於詐謀之積終無信篤之誠無道德之教仁義之化以綴天下之心任刑罰以為治信小術以為道遂燔燒詩書坑殺儒士上小堯舜下邈三王二世愈甚惠不下施情不上達君臣相疑骨肉相疏化道淺薄綱紀壞敗民不見義而懸於不寧撫天下十四嵗天下大潰詐偽之弊也其比王德豈不逺哉孔子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格夫使天下有所恥故化可致也茍以詐偽偷活取容自上為之何以率下秦之敗也不亦宜乎戰國之時君德淺薄為之謀䇿者不得不因勢而為資據時而為闕故其謀扶急持傾為一切之權雖不可以臨國教化兵革救急之勢也皆髙才秀士度時君之所能行出竒䇿異智轉危為安運亡為存亦可喜皆可觀護左都水使者光祿大夫臣向所校戰國䇿書録戰國䇿曽序劉向所定著戰國䇿三十三篇崇文總目稱十一篇者闕臣訪之士大夫家始盡得其書正其誤謬而疑其不可考者然後戰國䇿三十三篇復完敘曰向敘此書言周之先眀教化修法度所以大治及其後詐謀用而仁義之路塞所以大亂其説既美矣卒以謂此書戰國之謀士度時君之所能行不得不然則可謂惑於流俗而不篤於自信者也夫孔孟之時去周之初已數百嵗其舊法已亡其舊俗已熄久矣二子乃獨眀先王之道以為不可改者豈將強天下之主以後世之所不可為哉亦將因其所遇之時所遭之變而為當世之法使不失乎先王之意而已二帝三王之治其變固殊其法固異而其為天下國家之意本末先後未嘗不同也二子之道如是而已蓋法者所以適變也不必盡同道者所以立本也不可不一此理之不易者也故二子者守此豈好為異論哉能勿茍而已矣可謂不惑於流俗而篤於自信者也戰國之遊士則不然不知道之可信而樂於説之易合其設心注意偷為一切之計而已故論詐之便而諱其敗言戰之善而蔽其患其相率而為之者莫不有利焉而不勝其害也有得焉而不勝其失也卒至蘇秦商鞅孫臏吳起李斯之徒以亡其身而諸侯及秦用之亦滅其國其為世之大禍眀矣而俗猶莫之悟也惟先王之道因時適變為法不同而考之無疵用之無敝故古之聖賢未有以此而易彼也或曰邪説之害正也宜放而絶之則此書之不泯其可乎對曰君子之禁邪説也固將明其説於天下使當世之人皆知其説之不可從然後以禁則齊使後世之人皆知其説之不可為然後以戒則眀豈必滅其籍哉放而絶之莫善於是故孟子之書有為神農之言者有為墨子之言者皆著而非之至於此書之作則上繼春秋下至秦漢之起二百四五十年之間載其行事固不得而廢也此書有髙誘注者二十一篇或曰三十二篇崇文總目存者八篇今存者十篇云編校史館書籍臣曽鞏序國䇿劉向校定本髙誘注曽鞏重校凡浙建括蒼本皆據曽所定剡川姚宏續校注最後出豫見姚注凡二本其一冠以目録劉序而置曽序于卷末其一冠以曽序而劉序次之蓋先劉氏者元本也先曽氏者重校本也今不敢失其舊故次曽氏焉吳師道識戰國䇿校注序國䇿史家者流也其文辨博有煥而眀有婉而微有約而深太史公之所考本也自漢稱為戰國䇿雜以短長之號而有蘇張縱橫之説學者諱之置不論非也夫史氏之法具記一時事辭善惡必書初無所決擇楚曰檮杌書惡也魯曰春秋善惡兼也司馬史記班固漢書有佞幸等列傳學者豈以是為不正一舉而棄之哉矧此書若張孟談魯仲連發䇿之慷慨諒毅觸讋納説之從容養叔之息射保功莫大焉越人之投石謀賢莫尚焉王斗之愛縠憂國莫重焉諸如此類不一皆有合先王正道孔孟之所不能違也若之何置之曽鞏之序美矣而謂禁邪説者固將眀其説於天下則亦求其故而為之説非此書指邪起秦迄今千四百嵗由學者不習或衍或脫或後先失次故肖立半字時次相糅劉向已病之矣舊有髙誘注既疏略無所稽據注又不全浸微浸滅殆於不存彪於是考史記諸書為之注定其章條正其衍説而存其舊慎之也地理本之漢志無則缺字訓本之説文無則稱猶雜出諸書亦别名之人姓名多不傳見欲顯其所説故繫之一國亦時有論説以翊宣教化可以正一史之謬備七略之缺於之論是非辨得失而考闕興亡亦有補於世紹興十七年丁邜仲冬二十有一日辛已冬至縉雲鮑彪序戰國䇿校注序先秦之書惟戰國䇿最古文最訛舛自劉向校定已病之南豐曽鞏再校亦疑其不可考者後漢髙誘為注宋尚書郎括蒼鮑彪詆其踈略謬妄乃序次章條補正脫誤時出已見論説其用意甚勤愚嘗並取而讀之髙氏之踈略信矣若謬妄則鮑氏自謂也東萊吕子大事記間取鮑説而序次之世亦或從之若其謬誤雖未嘗顯列而因此考彼居然自見遂益得其詳焉蓋鮑專以史記為據馬遷之作固采之是書不同者當互相正史安得全是哉事莫大於存古學莫善於闕疑夫子作春秋仍夏五殘文漢儒校經未嘗去本字但云某當作某某讀如某示謹重也古書字多假借音亦相通鮑直去本文徑加改字豈傳疑存舊之意哉比事次時當有眀徵其不可定知者闕焉可也豈必強為傅會乎又其所引書止於淮南子後漢志説文集韻多托彼書之見聞不問本字之當否史注自裴徐氏外索隱正義皆不之引而通鑑諸書亦莫考淺陋如是其致誤固宜顧乃極詆髙氏以陳賈為孟子書所稱以伐燕為齊宣用是發憤更注不思宣王伐燕乃孟子眀文宣閔之年通鑑謂史失其次也鮑以赧王為西周君而指為正統此開卷大誤不知河南為西周洛陽為東周韓非子説秦王以為何人魏惠王盟臼里以為他事以魯連約矢之書為後人所補以魏幾鄢陵為人名以公子牟非魏牟以中山司馬子期為楚昭王卿此類甚多尚安得詆髙氏哉其論説自謂翊宣教化則尤可議謂張儀之誑齊梁為將死之言善周人詐以免難為君子所恕張登狡獪非君子所排蘇代之訑為不可廢陳軫為絶類離羣蔡澤為明哲保身聶政為孝樂羊為隱忍君王后為賢智婦人韓幾瑟為義嗣衛嗣君為賢君皆悖義害正之甚者其視名物人地之差失又不足論也鮑之成書當紹興丁卯同時剡川姚宏亦注是書云得會稽孫朴所校以閣本標出錢藻劉敞校字又見晉孔衍春秋後語參校補注是正存疑具有典則大事記亦頗引之而世罕傳知有鮑氏而已近時浚儀王應麟嘗斥鮑失數端而廬陵劉辰翁盛有所稱許以王之博洽知其未暇􅊖數而劉特愛其文采他固弗之察也吕子有云觀戰國之事取其大旨不必字字為據蓋以遊士增飾之詞多矧重以訛舛乎輒因鮑注正以姚本參之諸書而質之大事記存其是而正其非庶幾明事迹之實求義理之當焉或曰戰國䇿者六經之棄也子深辨而詳究之何其戾鮑彪之區區又不足攻也夫人患理之不眀耳知至而識融則異端雜説皆吾進德之助而不足以為病也曽氏之論是書曰君子之禁邪説者固將明其説於天下使皆知其不可為然後以禁則齊以戒則眀愚有取焉爾是非之在人心天下之公也是雖芻蕘不遺非雖大儒必斥愚何擇於鮑氏哉特寡學謏聞謬誤復恐類之世之君子有正焉固所願也秦定二年嵗乙丑八月日金華吳師道序國䇿之書自劉向校録逮南豐曽氏皆有序論以著其大旨向謂戰國謀士度時君所能行不得不然曽氏譏之以為惑流俗而不篤於自信故因之推言先王之道聖賢之法而終謂禁邪説者固將眀其説於天下其論正矣而鮑氏以為是特求其故而為之説者䇿乃史家者流善惡兼書初無決擇其善者孔孟之所不能違若之何置之鮑之言殆後出者求備邪夫天下之道王伯二端而已伯者猶知假義以為名仗正以為功戰國名義蕩然攻鬬併吞相詐相傾機變之謀唯恐其不深捭闔之辭惟恐其不工風聲氣習舉一世而皆然間有持論立言不戾乎正殆千百而一二爾若魯仲連蓋絶出者然其排難解紛慷慨激烈每因事而發而亦未聞其反正眀本超乎事變之外也况其下者乎當是之時本仁祖義稱述唐虞三代卓然不為世俗之説者孟子一人而已求之是書無有也荀卿亦宗王者今唯載其絶春申之書而不及其他田子方接聞孔氏之徒其存者僅僅一言又何略於此而詳於彼邪史莫大於春秋春秋善惡兼書而聖人之心則欲寓褒貶以示大訓是書善惡無所是非而作者又時出所見不但記載之也談季子之金多位髙則沾沾動色語安陵嬖人之固寵則以江乙為善謀此其最陋者夸從親之利以為秦兵不出函谷十五年諸侯二十九年不相攻雖甚失實不顧也厠雅於鄭則音不純置薰於蕕則氣必奪善言之少不足以勝不善之多君子所以舉而謂之邪説者蓋通論當時習俗之敝舉其重而名之也近代朝子正書志列於縱橫家亦有見者且其所列固有忠臣義士之行不係於言者而其繼春秋抵秦漢載其行事不得而廢曽氏固已言之是豈不知其為史也哉竊謂天下之説有正有邪其正焉者主于一而其非正者君子小人各有得焉君子之於是書也考事變究情偽則守益以堅知益以眀小人之於是書也見其始利而終害小得而大喪則悔悟懲創之心生世之小人多矣固有未嘗知是書而其心術行事無不合者使其得是書而究之則將有不為者矣然則所謂眀其説於天下為放絶之善者詎可訾乎欽定四庫全書戰國䇿校注卷首宋鮑彪原注元吳師道補正卷一東周凡二十二章秦興師臨周章秦攻宜陽章東周與西周戰章東周欲為稻章昭獻在陽翟章秦假道於周章楚攻雍氏章周最謂吕禮章周相吕倉章溫人之周章或為周最章石行秦章蘇厲為周最章謂周最曰章為周最謂魏王章趙取周之祭地章杜赫欲重景翠章周共太子死章三國隘秦章昌他亡西周章昭翦與東周惡章嚴氏為賊章卷二西周凡十七章薛公以齊章秦攻魏將犀武章秦令樗里疢章雍氏之役章周君之秦章蘇厲謂周君章楚兵在山南章楚謂道於二周章司冦布章秦召周君章犀武敗於伊闕章韓魏易地章秦欲攻周章宫他謂周君章謂齊王曰章三國攻秦反章犀武敗周章卷三秦一凡十三章魏鞅亡魏入秦章蘇秦始將連橫章秦惠王謂寒泉子章冷向謂秦王章張儀説秦王章張儀欲假秦兵章司馬錯與張儀章張儀之殘樗里章張儀欲以漢中章楚攻魏張儀謂秦章田莘之為陳軫章張儀又惡陳軫章陳軫去楚之秦章卷四秦二凡十六章齊助楚攻秦章楚絶齊章秦惠王死章義渠君之魏章醫扁鵲章秦武王謂甘茂章宜陽之役馮章謂章甘茂攻宜陽章宜陽未得章宜陽之役楚畔秦章秦王謂甘茂章甘茂亡秦且之齊章甘茂相秦章甘茂約秦章徑山之事章秦宣太后章卷五秦三凡十七章薛公為魏謂魏冉章秦客卿造章魏君謂魏冉章謂魏冉曰和不成章謂穰侯曰章謂魏冉曰楚破秦章五國罷成睪章范子因王稽章范雎至章應侯謂昭王章秦攻韓圍陘章應侯曰鄭人章天下之士章謂應侯曰君禽馬服章應侯失韓之汝南章秦攻邯鄲十七月章蔡澤見逐章卷六秦四凡十章秦取楚漢中章薛公入魏而出齊女章三國攻秦入函谷章秦昭王謂左右章楚魏戰於陘山章楚使者景鯉在秦章楚王使景鯉如秦章秦王欲見頓弱章項襄王二十年章或為六國説秦王章卷七秦五凡八章謂秦曰臣竊惑章秦王與中期章獻則謂公孫消章樓許約秦魏章濮陽人吕不韋章文信侯欲攻趙章文信侯出走章四國為一章卷八齊一凡十七章楚威王戰勝於徐州章齊將封田嬰於薛章靖郭君將成薛章靖郭君謂齊王章靖郭君善齊豹辨章邯鄲之難趙求救章南梁之難韓氏請章成侯鄒忌為齊相章田忌為齊將章田忌亡齊而之楚章鄒忌事宣王章鄒忌修八尺章秦假道韓魏章楚將伐齊魯親之章秦伐魏陳軫合三晉章蘇秦為趙合從説齊章張儀為秦連橫説齊章卷九齊二凡八章韓齊為與國章張儀事秦惠王章犀首以梁為齊戰章昭陽為楚伐魏章秦攻趙趙令樓緩章權之難齊燕戰章秦攻趙長平齊楚救章或謂齊王曰周韓章卷十齊三凡十一章楚王死太子在齊章齊王夫人死章孟嘗君將入秦章孟嘗君在薛章孟嘗君奉夏侯章孟嘗君宴坐章孟嘗君舍人章孟嘗有舍人章孟嘗君出行國章淳于髠一日章齊欲伐魏淳于髠謂齊王章卷十一齊四凡十一章齊人有馮諼章孟嘗君為從章魯仲連謂孟嘗君章孟嘗君逐於齊章齊宣王見顔斶章先生王斗章齊王使使者問趙章齊人見田駢章管燕得罪章蘇秦自燕之齊章蘇秦謂齊王曰章卷十二齊五一章蘇秦説齊閔王章卷十三齊六凡九章齊負郭之民章王孫賈年十五章燕攻齊取七十餘成章燕攻齊齊破章貂勃常惡田單章田單將攻狄章濮上之事章齊王建入朝章齊以淖君之亂章卷十四楚一凡二十章齊楚搆難章五國約秦以伐齊章荆宣王問羣臣章昭奚恤與彭城君章邯鄲之難昭奚恤謂楚章江尹欲惡昭奚恤章江乙欲惡昭奚恤章江乙説於安陵君章江乙為魏使於楚章郢人有獄章城渾出周章韓公叔有齊魏章魏氏惡昭奚恤章江乙惡昭奚恤章楚杜赫説楚王章楚王問於范環章蘇秦為趙合從説楚章張儀為秦破從連橫章張儀相秦謂昭雎章威王問於莫敖章卷十五楚二凡九章魏相翟強死章齊秦約攻楚章術視伐楚章四國伐楚章楚懷王拘張儀章楚王將出張子章秦敗楚漢中章楚襄王為太子之時章女阿謂蘇子章卷十六楚二凡十章蘇子謂楚王曰章蘇秦之楚三日乃得見章楚王逐張儀於魏章張儀之楚貧章楚王令昭雎之楚章張儀逐惠施於魏章五國伐秦魏欲和章陳軫告楚之魏章秦伐宜陽楚王謂陳軫章唐且見春申君章卷十七楚四凡十三章或謂楚王曰章魏王遺楚王美人章楚王后死章莊辛請楚襄王章齊明説卓滑章或謂黃齊章長沙之難章有獻不死之藥章客説春申君章天下