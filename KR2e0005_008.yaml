body:
  text: 戰國策校注卷八宋鮑彪原注元吳師道補正韓分晉得南陽及潁川之父城定陵襄城潁陽潁隂長社陽翟東接汝南西接𢎞農得新安宜陽正曰鄭今河南之新鄭及成臯滎陽潁川之崇髙城陽鮑引漢地理志為南鄭亦韓地而獨遺不取誤矣康子補曰名虎三晉已破智氏將分其地假規謂韓王曰分地必取成臯補曰見秦策韓王曰成臯石溜之地也溜言甚無積潤補曰溜言多山石水所溜也寡人無所用之段規曰不然臣聞百里之厚而動千里之權者地利也千人之衆而破三軍者不意也言地薄鄭人不備正曰言地險寡足破衆王用臣言則韓必取鄭矣正曰取鄭在哀侯二年王曰善諸稱王皆非當時語果取成臯至韓之取鄭也果從成臯始大烈侯景侯元年安王三年壬午正曰當云景侯䖍子元年史列侯取列烈通韓傀相韓補曰史作韓相俠纍索隱引髙誘云韓傀俠纍也今注本無俠古俠反纍力追反韓非子傀作廆藝文類聚引作韓傫今按傀字呼乖徒回姑回矩鮪戶賄等反不一傀與俠纍字音有差互訛轉說又見後嚴遂重於君二人相害也嚴遂政議直指政正同舉韓傀之過韓傀以之猶以此叱之於朝嚴遂拔劒趍之以救解以救至得解於是嚴遂懼誅亡去游求人可以報韓傀者至齊齊人或言軹深井里軹之里名深井補曰軹即河內軹正義云深井里在懷州濟源縣南三十里政時客游此聶政勇敢士也避仇隱於屠者之間嚴遂隂交於聶政以意厚之聶政問之曰補曰一本問曰姚同子欲安用我乎嚴遂曰吾得為役之日淺事今薄薄猶近奚敢有請於是嚴遂乃具酒自觴聶政母前補曰一本其酒觴姚同仲子奉黃金百鎰仲子遂字補曰索隱引髙誘云嚴遂字仲子今本無前為聶政母夀聶政驚愈怪其厚固謝嚴仲子補曰一本固謝史姚同仲子固進而聶政謝曰臣有老母家貧客游以為狗屠可旦夕得甘脆肉之肥美者正曰說文甘美也脆小耎物易斷也以飬親親供飬備義不敢當仲子之賜嚴仲子辟人辟猶屏闢去之因為聶政語曰臣有仇而行游諸侯衆矣然至齊聞足下義甚髙故直進百金者特以為丈人粗糲之費丈人亦尊稱政也粟十六斗為一秉㫪米一斛曰糲補曰一本夫人史姚同韋昭云古者尊大嫗蒍夫人又或作大人糲落蓋反又力制即達二反以反足下之歡補曰一本交足下史姚同反字必誤豈敢以有求邪聶政曰臣所以降志辱身居市井屠者幸以飬老母以有飬為幸老母在前在未死前政身未敢以許人也補曰一本居市井者徒幸而飬老母老母在史姚同無前字嚴仲子固讓聶政竟不肯受然仲子卒備賔主之禮而去久之聶政母死既葬除服聶政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不逺千里枉車騎而交臣臣之所以待之者至淺矣補曰一本至淺鮮矣史姚同未有大功可以稱者而嚴仲子舉百金為親夀我義不受補曰一本我雖不受史姚同然是深知政也夫賢者以感忿睚眦之意感言動心睚眦怒視也補曰師古曰睚音崖舉眼也眦即皆反謂目匡也言舉眼相忤者即殺之也一說睚五懈反眦士懈反瞋目貌而親信窮僻之人而政獨安可默然而止乎且前日要政政徒以老母老母今以天年終政將為知己者用遂西至濮陽補曰漢濮陽縣屬東郡春秋時帝丘也見嚴仲子曰前日所以不許仲子者徒以親在今親不幸而死補曰一本無而死二字姚同仲子所欲報仇者補曰一本仇者為誰史姚同請得從事焉補曰一本無此五字姚同史有嚴仲子具告曰臣之仇韓相韓傀補曰一本韓相傀姚同傀又韓君之季父也宗族盛多居處兵衛甚設設陳也補曰一本無多居處甚四字史有臣使人刺之終莫能就今足下幸而不棄請益具車騎壯士以為羽翼政曰韓與衛相去中間不逺事泄易聞補曰一本韓與衛中間不逺無相去二字姚同史有郡司馬貞引髙誘云韓都潁川陽翟衛都東濮陽故云云今注本無今殺人之相相又國君之親此其勢不可以多人多人不能無生得失謂相可否生得失則語泄補曰索隱云策作無生愔言所將人多或生異情語泄今本無此文語泄則韓舉國而與仲子為讎也豈不殆哉遂謝車騎人徒辭獨行仗劒至韓仗兵器也蓋以劒為兵正曰仗執持也韓適有東孟之㑹東孟地缺補曰索隱引髙注東孟地名今本無韓王及相皆在焉持兵㦸而衛侍者甚衆補曰一本無侍字史姚同聶政直入階刺殺韓傀補曰姚本無殺字韓傀走而列元作哀下同哀侯按釐侯策及𫝊皆言哀侯史記及年表皆書列侯䇿𫝊可為誤年不可移也補曰說見後聶政刺之兼中列哀侯左右大亂聶政大呼所擊殺者數十人補曰一本無擊字姚同史有因自面皮去靣之皮補曰索隱云以刀刺其面皮欲令人不識列女傳作披蓋以刀𠢐靣而去其皮也抉服屠腸抉排也補曰史作决一本自屠出腸史姚同遂以死韓取聶政尸暴於市縣購之千金縣金募知者久之莫知誰補曰一本誰子史姚同政姊嫈補曰一本無嫈字姚注劉有嫈么莖反史作榮聞之曰吾弟至賢補曰姚本無吾字不可愛妾之軀滅吾弟之名非弟意也言往哭自吾意耳乃之韓視之曰勇哉氣矜之隆矜自持也是其軼賁育軼車相出也髙成荆矣說文成荆古之勇士今對賁豫復似兩人補曰姚本云髙吕氏春秋豫讓必死於襄子而趙氏皆恐成刑致死于韓王而周人皆畏按此對豫讓言則一人也今死而無名不顯其人父母既殁矣兄弟無有此為我故也不顯其名恐纍及姊夫愛身不揚弟之名吾不忍也乃抱尸而哭之曰此吾弟軹深井里聶政也亦自殺於尸下晉楚齊衛聞之曰非獨聶政之能乃其姊者列女也列義列可陳正曰列烈通補曰一本非獨政之能乃其姊者亦列女也姚同聶政之所以名施於後世者其姊不避葅酢之誅葅酢菜也言銼斫之如此補曰周禮注疏虀葅之類菜肉通稱全物若䐑為葅記文醢肉醬以揚其名也此三年書政殺韓相俠纍刺客𫝊有彪謂政之始終於其親孝矣其臨財也義矣嘗欲評其死感其義烈不忍下筆獨以謂人之居世不可不知人亦不可妄為人知也遂唯知政故得行其志惜乎遂褊褊狷細人耳政不幸謬為所知故死於是使其受知明主與賢相則其所成就豈不有萬萬於此者乎哀哉補曰大事記按史記韓世家烈侯三年聶政殺韓相俠纍十三年烈侯卒子文侯立十年卒子哀侯立六年韓嚴弒其君哀侯聶政之刺俠纍與哀侯之弒相去逺矣而聶政傳乃謂嚴仲子事哀侯與韓相俠纍有仇使政刺纍與世家不合蓋其氏偶同故刺客𫝊誤以為哀侯之時策曰東孟之㑹韓王及相皆在焉聶政刺韓傀兼中哀侯又曰聶政刺相兼中哀侯許異蹴哀侯而殪之是故哀侯為君而許異終身相焉考之世家哀侯既弒其子懿侯即立許異將誰相哉俠纍既死烈侯猶在位十年謂之終身相可也則此乃烈侯三年之事但戰國䇿誤以為哀侯耳又烈王五年韓嚴遂弒哀侯解題引正義云紀年晉桓公邑哀侯於鄭韓山堅賊其君哀侯而立韓若山山堅即韓嚴也若山即懿侯也愚按此事國䇿誤合二事為一司馬遷兩存而不决故溫公與劉道原書蘇氏古史皆疑之大事記考之未盡且史記年表世家兩書韓嚴是聶政之事乃嚴遂而弒哀侯者乃韓嚴大事記謂氏偶同又不知韓嚴遂韓嚴國氏名交混也通鑑書嚴遂弒哀侯大事記因之未改當從史書韓嚴綱目書廢遂下注哀侯以韓廆為相而憂韓遂二人相害遂刺廆于朝併中哀侯亦仍誤也正曰史遷作刺客傳失在奬盜而年表書盜殺韓相俠纍獨為得春秋書法綱目大事記不能易也父母遺體不敢毁傷以不義而滅其身得為孝乎非有夙昔之遇如智伯之於豫讓非有纍世之恩如韓之于子房以欲執仇之故厚已而使為不義得為知己乎鮑陳說區區陋矣補曰姊嫈之死蓋兄弟之義䇿述其言以為不愛身以揚弟之名而說者徒知論名而不及義此皆戰國之習也史記云使政知姊無惴忍之志不重暴骸之難必絶險千里以列其名姊弟俱僇於韓市者亦未必敢以身許仲子也列女傳云嫈仁而有勇不怯死以滅名詩云死喪之威兄弟孔懷云云此之謂也愚謂子長得政之情子政得嫈之志然一則曰列其名一則曰不滅名猶免世俗之失也昭侯莊侯子元年癸亥顯王十一年成午從趙來謂申不害於韓曰子以韓重我於趙請以趙重子於韓是子有兩韓而我有兩趙也補曰史申不害者荆人也故鄭之賤臣學術以干韓昭侯用為相魏之圍邯鄲也申不害始合於韓王然未知王之所欲也恐言而未必中於王也王問申子曰吾誰與而可與魏耶趙耶對曰此安危之要國家之大事也臣請深惟而苦思之惟亦思乃微謂趙卓韓鼂曰子皆國之辨士也夫為人臣者言可必用可豈可盡忠而已矣二人因各進議於王以事補曰一本各進申子微視王之所說以言於王王大說之補曰此術之最下者申子請仕其從兄官仕其從父兄以官正曰注贅昭侯不許也申子有怨色昭侯曰非所謂學於子者也從子之請而廢子之道乎又將専行子之術而廢子之請乎子嘗教寡人循功勞視次第今有所求此我將奚從乎此如此補曰此當屬下句讀申子乃避舍請罪曰君真聖人也蘇秦為趙元作楚下同楚補曰字誤恐當作趙合從說韓王曰韓北有鞏落竝屬河南成臯之固西有宜陽常阪之塞常史作商殷紀注商今上洛是也補曰正義云商阪即商山在商洛縣南亦曰楚山武關在焉東有宛穰洧水穰屬南陽洧水出潁川陽城南有陘山補曰見前地方千里帶甲數十萬天下之强弓徑弩皆自韓出溪子少府下皆弩名俶真訓注溪子國名夷名又溪子陽匠名徐注少府所造時力距來徐注作之得時力倍於常其徑足以距來敵正曰徐注距來者謂弩勢徑利足以云云皆射六百步之外韓卒超足而射舉跖踏弩百發不暇止逺者達胸近者掩心箭中心上如掩韓卒之劒㦸皆出於冥山棠溪墨陽合伯鄧師宛馮司馬彪注冥山在相州北汝南吳房有棠溪亭修務訓注墨陽美劒名合伯地缺鄧師豈南陽鄧耶猶云洛師滎陽有馮池正曰相州北非韓地餘見下龍淵大阿吳越春秋楚王召風胡子曰吳有干將越有歐冶寡人欲因子請因二人作劒風胡見二人作劒二其名云以上類言以地名正曰修務訓注云墨陽之莫邪則墨陽地名合伯史作合膞姚本合山膞注曽無伯字索隱云鄧國有工鑄劒因名鄧師宛人於馮池鑄劒故名宛馮晉大康地理記汝南西平有龍泉可淬刀劒今按上說冥山棠溪龍淵地名鄧師宛馮人名兼地大阿劒名合膞等未詳皆陸斷馬牛水擊鵠雁當敵即斬堅甲盾鞮鍪盾櫓鞮革履鍪兜鍪說文鍪鈎屬鍑大口釡蓋鍪如之補曰韻書鞮鍪首鎧也鐡幕革抉㕹音筏芮史並不注補曰索隱云鐡幕謂以鐡為臂脛之衣以革為射决决射鞴也按詩决拾𫝊决以象骨為之著右手大指以鈎弦闔體拾以皮為之著於左臂以遂弦恐此革即拾抉即决也索隱即以為一物蓋據說文鞴射臂决之文也亦通索隱云㕹與黻同謂楯也芮音如字謂繫楯之紛綬也愚按㕹音伐即詩所謂䝉伐者字皆通借史云當敵則斬堅甲鐡幕革抉㕹芮無不畢具故說者上文以甲字句謂其劒皆能斬之䇿文不可從此讀當以斬堅句而甲盾以下屬無不具之文無不畢具以韓卒之勇被堅甲跖徑弩帶利劒一人當百不足言也夫以韓之徑與大王之賢乃欲西面事秦稱東藩築帝宫受冠帶祠春秋交臂而服焉夫羞社稷而為天下笑無過此者矣是故願大王之熟計之也大王事秦秦必求宜陽成臯令兹效之明年又益求割地與之即無地以給之不與則棄前功而後更受其禍且夫大王之地有盡而秦之求無已夫以有盡之地而逆無己之求此所謂市怨而買禍者也不戰而地已削矣臣聞鄙語曰寧為雞口無為牛後補曰正義云雞口雖小乃進食牛後雖大乃出糞大事記取今大王西面交臂而臣事秦何以異於牛後乎夫以大王之賢挾强韓之兵而有牛後之名臣竊為大王羞之韓王忿然作色攘臂按劒仰天太息曰寡人雖死必不能事秦今主君以趙楚補曰字誤史正作趙王之教詔之敬奉社稷以從𫝊在燕趙後云宣惠王今按合從在燕文公二十八年趙肅侯十六年此二十五年又蘇秦𫝊說六國後去趙而從約解是嵗燕易王立徐注云自初說燕至此三年宣惠之元年也此時從已解則說從時非宣惠明矣沈括辨以為雞口牛從今按秦稱牛後蓋以惡語侵韓故韓侯怒而從之雞口牛從謬誤也正曰大事記顯王三十五年蘇秦說燕與趙合從燕文公納之趙三十六年蘇秦說趙肅侯以六國合從按史年表是嵗韓昭侯二十六年髙門成而昭侯卒子宣惠王立蘇秦說宣惠王蓋昭侯卒後爾鮑序次非從索隱引延篤云寧為雞口不為牛從口雞中主牛子也沈說亦有所本也宣惠王昭侯子元年年己丑顯王子十七宣王謂樛留韓人補曰樛居尤反漢有樛氏通鑑事記作繆監即闞魏策闞史作監田世家亦作監止曰吾欲兩用公仲公叔其可乎對曰不可晉用六卿而國分簡公用田成闞止而簡公弒齊事見哀十四年魏兩用犀首張儀而西河之外亡秦惠八年魏納河西儀時為秦客卿未相魏也後至魏襄十三年相儀儀留四年去而衍相未嘗兩用未嘗亡也此豈為秦良造儀為客卿時魏以事聽之邪正曰大事記魏惠後十三年張儀相魏魏不事秦秦以公孫衍代相儀留魏四歲後說襄王久之乃去二人更迭用衍相儀留猶兩用也魏亡河西地大概言之不必兩人為相時也大事記魏惠後五年以少梁與秦引此䇿云秦至是盡得河西地則犀首張儀之力是時二人皆信用於秦云云今王兩用之其多力者內樹其黨其寡力者藉外權羣臣或內樹其黨以擅正曰韓子作驕其主或外為交以裂其地則王之國必危矣彪謂此非天下之正議也顧所用如何耳使得人如周召兩用之庸何傷若公仲公叔也一之謂甚何必兩補曰胡氏管見謂樛留之論似是而非不可遂以為法使所用而賢則一人而足不虞其専擅左右參副不虞其比黨使其不賢則一人足以喪國又况二三其衆乎意者留於仲叔隂有所附欲國柄歸一而不分故危言以動其君耳大事記云韓雖兩用仲叔以戰國䇿考之仲實専政叔亦間用事終不若仲之權寵也愚按鮑說有與胡氏合者而不得留之情故引以著之按此䇿宣惠欲兩用非巳用也當時叔之事不著意其止於用仲而仲叔並用實襄王之世以其爭主幾瑟公子咎知之也公仲卒不勝公叔則公叔又重矣二人爭權樛留之言遂驗是以帝王之要知人而后官人九經之序尊賢而后敬大臣則無患乎此矣楚昭獻相韓秦且攻韓韓廢昭獻昭獻令人謂公叔曰不如貴昭獻以固楚秦必曰楚韓合矣正曰此策不知何時按䇿有云幾瑟公叔之讎而昭獻公叔之人也又甘茂與昭獻遇於境在未圍雍氏時其相韓見周策必在宣惠之後秦攻陘此時史不書後至桓惠九年秦拔我陘然陳軫張儀同時儀死至桓惠九年四十六年矣軫必不存故因舊韓使人馳南陽之地馳反走示服也秦已馳馳進也韓避之而秦進也又攻陘韓因割南陽之地秦受地又攻陘陳軫謂秦王惠曰國形不便故馳交不親故割今割矣而交不親馳矣而兵不止臣恐山東之無以馳割事王者矣且王求百金於三川而不可得求千金於韓一旦而具今王攻韓是絶上交而固私府也言利移於下正曰即所謂無以馳割事王者竊為王不取也秦韓戰于濁澤長社濁澤補曰大事記韓與趙魏伐秦秦使庶長樗里疾與戰修魚虜韓將申差解題云濁澤即修魚之地韓氏急公仲朋元作明明補曰當作朋大事記顯王三年魏公子景賈伐韓與韓將韓明戰于陽此人在公仲前謂韓王曰與國不可恃與謂山東今秦之心欲伐楚王不如因張儀為和於秦賂之以一名都與之伐楚此以一易二之計也韓王曰善乃警公仲之行警猶戒將西講於秦楚王懷聞之大恐召陳軫而告之陳軫曰秦之欲伐我久矣今又得韓之名都一而具甲以一都之賦為兵備秦韓并兵南鄉此秦所以廟祠而求也今已得之矣楚國必伐補曰一本伐矣王聽臣為之警四境之內選師言救韓令戰車滿道路發信臣多其車重其幣使信王之救已韓為不能聽我使其或不能從我以與秦戰補曰一本救己也縱韓韓之德王也恩救我補曰一本韓必德王此以上姚同文勝必不為鴈行以來是秦韓不和兵雖至楚國不大病矣為能聽我絶和於秦秦必大怒以厚怨於韓韓得楚救必輕秦輕秦其應秦必不敬是我因秦韓之兵而免楚國之患也楚王大說乃警四境之內選師言救韓發信臣多車幣補曰一本復作多其車重其幣謂韓王曰敝邑雖小已悉起之矣願大國遂肆意於秦敝邑將以楚殉韓殉言以死從之韓王大說乃止公仲公仲曰不可夫以實告我者秦也以虛名救我者楚也恃楚之虛名輕絶强秦之敵必為天下笑矣且楚韓非兄弟之國也又非素約而謀伐秦矣補曰一本矣作也姚注劉作也秦欲伐楚楚以起師言救韓此必陳軫之謀也且王已使人報於秦矣今弗行是欺秦也夫輕强秦之禍而信楚之謀臣王必悔之矣韓王勿聽遂絶和於秦秦果大怒興師與韓氏戰於岸門後志潁隂有岸亭事在十九年此要終言之也補曰徐廣云岸門即岸亭正義引括地志云在許州長社縣西北又韓世家太子倉入質于秦以和魏年表又書秦走犀首岸門蓋救韓而敗也楚救不至韓氏大敗韓氏之兵非削弱也民非蒙愚也兵為秦禽智為楚笑過聽於陳軫失計於韓朋明補曰明也記十六年有彪謂二子皆億中之材也宣惠訹於其言惑于重幣雖有公仲之謀固難以入至於非兄弟非素約而以虛名救我此言豈不明著矣乎如之何弗聽也正曰鮑嘗謂陳軫少捭闔風氣故此以億中稱之此䇿非捭闔而何顔率見公仲公仲不見顔率謂公仲之謁者曰公仲必以率為陽也陽佯同不實也補曰一本陽作場姚注劉作陽故不見率也公仲好內齊世家注內婦官也率曰好士公仲嗇於財率曰散施公仲無行率曰好義所謂不實自今以來率且正言之而已矣公仲之謁者以告公仲公仲遽起而見之彪謂顔率此言可行公仲而已誠有是也雖陽言何益於德茍無是也正言之吾何懼以是知公仲非躬行者也襄王宣王子補曰名倉元年赧王四年庚戌張儀為秦連橫說韓王曰補曰此元年韓地險惡山居五榖所生非麥而豆民之所食大抵豆飯藿羹藿菽之少者補曰姚云史記後語作飯菽而麥下文亦作菽古語只稱菽漢以後方呼豆按此非麥即豆也麥少又以豆飯一歲不收民不厭糟糠地方不滿九百里無二歲之所食料大王之卒悉之不過三十萬而厮徒負飬負荷飬牧之人正曰索𨼆云負飬者負擔以給飬公家厮徒見魏䇿在其中矣為除守徼亭障塞徼巡也亦關境上補曰漢書徼外顔云徼塞也取徼遮之義字音呌見卒不過二十萬而已秦帶甲百餘萬車千乘騎萬匹虎鷙元作摯摯正曰鷙摯通禮記蚤摯摯獸之士摯擊鳥正曰凡鳥之勇獸之猛皆曰摯跿音徒跔音俱說文天寒足跔與此不合史注跳躍也補曰跿猶下文徒程此謂徒跣也義與科頭協科頭不著兜鍪貫頥貫人之頥正曰此說似與上文不類索𨼆曰兩手捧頥而直入敵言其勇貫與捧亦不通劉辰翁云貫頥謂見射猶奮㦸不顧死也則此連下文奮㦸為義奮㦸者至不可勝計也秦馬之良戎兵之衆探前蹶元作趹趹後字書無趹字蹶跳也正曰說文趹馬行貌西都賦要趹追蹤音古冗反索𨼆云謂馬前足探向前後足趹於後趹謂抉地言馬走勢疾前後蹄間一擲而過二尋也八尺曰尋蹄間二尋補曰一本此有騰字姚注曾添騰者二字者不可勝數也山東之卒被甲冒胄以㑹戰胄兜鍪秦人捐甲徒䄇以趨敵䄇祼也左挈人頭右挾生虜夫秦卒之與山東之卒也猶孟賁之與怯夫也以重力相壓猶烏獲之與嬰兒也夫率孟賁烏獲之士以攻不服之弱國無以異於墮千鈞之重集於鳥卵之上必無幸矣幸其不破碎無是理也諸侯不料兵之弱食之寡而聽從人之甘言好辭比周以相飾也皆言曰聽吾計則可以强霸天下夫不顧社稷之長利而聽須臾之說詿誤人主者詿亦誤也補曰漢語詿誤本此無過於此者矣大王不事秦秦下甲據宜陽斷絶韓之上地東取成臯宜陽則鴻臺之宫桑林之苑桑林在亳修務訓言湯禱于桑山之林則似指言多桑之山非地名也正曰鴻臺桑林韓臺苑非湯所禱者也太平御覽作樂林非王之有已夫塞成臯絶上地則王之國分矣先事秦則安矣不事秦則危矣夫造禍而求福計淺而怨深逆秦而順趙元作楚楚雖欲無亡不可得也故為大王計莫如事秦秦之所欲莫如弱楚而能弱楚者莫如韓非以韓能强於楚也其地勢然也今王西面而事秦以攻楚衍為字為補曰一本無敝邑秦王必喜惠文夫攻楚而私其地轉禍而說秦計無便於此者也是故秦王使使臣獻書大王御史須以决事韓王曰客幸而教之請比郡縣築帝宫祠春秋稱東籓效宜陽彪謂橫人之辭真所謂虛喝者韓之兵信弱食信寡矣獨不曰從合則能以弱為强以寡為多乎惜乎世主不少察於此也補曰甘茂攻宜陽在後此云效者請效之也儀歸而約敗矣鄭彊鄭公族韓滅鄭故為韓人補曰此人嘗請秦伐韓魏䇿亦有其人蓋游說秦楚之間者此豈以為韓而走儀故次之韓歟之走張儀於秦譛之於秦使逐之曰儀之使者必之楚矣故謂太宰楚官疆謂之曰公留儀之使者留之者欲詐為儀使之致地强請西圖儀於秦故因西補曰姚本作而請秦王武曰張儀使人致上庸之地秦惠十三年取上庸今言儀致之楚欲以怒秦故使使臣再拜謁彊僞為楚使白此於秦下衍秦王字秦王秦王怒張儀走武元年此二年宜陽之役秦三年此四年楊侹棗人補曰侹即達字訛姚本正作達餘說並見秦䇿謂公孫顯曰請為公以五萬攻西周得之是以九鼎市甘茂也茂與顯爭國顯得九鼎其功大秦必棄茂用顯不然秦攻西周天下惡之其救韓必疾則茂事敗矣補曰宜依此舊次刋去秦策所增秦圍宜陽秦三年此四年游騰謂公仲曰公何不與趙藺離石祁趙地韓嘗取之今使歸之以質許地韓地趙嘗取之質易地也正曰藺離石祁見周趙䇿宜陽之役去秦前取藺六年藺離石祁不聞屬韓許亦與趙逺恐與趙下有缺文以質許地者以質音贄子而許之地也則樓緩必敗矣緩害韓者趙韓合故緩敗收韓趙之地以臨魏補曰一本地作兵樓元作鼻鼻補曰說見魏䇿必敗矣亦以魏害韓者韓趙補補曰姚云一本作韓趙為一魏必倍秦倍音背甘茂必敗矣茂攻宜陽韓得趙魏則不易拔故茂敗補曰一本茂作戊後章多同不復出以成陽資翟强於齊楚必敗矣元作之之齊楚敵也齊得地則益强可以敗楚時楚助秦故必敗正曰樓緩欲以趙合秦嘗勸趙割地事秦見趙䇿樓鼻為魏合秦楚外齊翟强為魏合齊秦外楚見魏䇿皆有事於秦者故䇿云然須秦必敗須言少待以趙魏救至而楚不助故敗秦失魏宜陽必不拔矣秦魏鄰也失魏之害重於趙故獨言魏為公仲謂向夀曰補曰一本章首韓公仲據史韓公仲使蘇代謂向夀此章首及仲字下或有缺文當云蘇代為或云使蘇代禽困覆車禽所獲獸也能覆獵者之車不可忽正曰逐獸困急猶能奔觸傾覆人車公破韓辱公仲公仲收國復事秦自以為必可以封補曰史注公仲曰以為必可得秦封今公與楚解解言復好補曰見下中封小令尹以桂陽中言使楚自封之國中桂陽荆州郡補曰史與楚辭楚地索𨼆云秦地名近韓桂史作杜索𨼆云又封楚之小令尹以杜陽杜陽秦地今以封楚令尹是相合也今按策文中字恐是又字訛秦楚合復攻韓韓必亡公仲躬率其私徒以鬬於秦謂且賊夀於秦願公之熟計之也向夀曰吾合秦楚非以當韓也子為我謁之公仲曰秦韓之交可合也對曰願有復於公復重言之諺曰貴其所以貴者貴所以貴人所同貴正曰所以得貴也今王之愛習公也不如公孫郝元作赫下同補曰一本作郝姚同史作奭又見秦策其智能公也不如甘茂今三人者皆不得親於事矣而公獨與王主斷於國者彼有以失之也公孫郝黨於韓而甘茂黨於魏故王不信也今秦楚爭强而公黨於楚是與公孫郝甘茂同道也公何以異之人皆言楚之多變也而公必之是自為貴也非貴所同貴公不如與王謀其變也善韓以備之若此則無禍矣韓氏先以國從公孫郝而後委國於甘茂是韓公之讎也言以韓為讎今公言善韓以待楚補曰一本今公善韓以備楚是外舉不避讎也向夀曰吾甚欲韓合對曰甘茂許公仲以武遂反宜陽之民補曰取其地而還其民也今公徒收之甚難徒言無地與之向子曰然則奈何武遂終不可得已與韓地宜以其所得於韓若武遂者可也茂已許之已無以易之也對曰公何不以秦為韓求頴川於楚此乃韓之寄地也此本韓地楚取之故云公求而得之是令行於楚而以其地德韓也公求而弗得是韓楚之怨不解而交走補曰走音奏秦也秦楚爭强而公過楚以攻韓過謂以攻韓為楚罪補曰姚本收韓史同此利於秦向子曰奈何對曰此善事也甘茂欲以魏取齊公孫郝欲以韓取齊今公取宜陽以為功宜陽蓋壽議攻而甘茂攻之收楚韓以安之使楚歸頴川則楚韓講故曰安而誅齊魏之罪誅猶求也求其過失以為郝茂之罪正曰誅責也正義云公孫奭甘茂皆欲以秦挾韓魏而取齊今向夀取晉陽以為功收楚韓以事秦而責齊魏之罪是衍以字以公孫郝甘茂衍之字之無事也言其失權正曰正義云二子不得合韓魏以伐齊也補曰按史甘茂𫝊秦拔宜陽韓與秦平向夀為䅈守宜陽將伐韓公仲使蘇代謂夀云云而甘茂竟言昭王以武遂歸韓由是夀奭怨讒茂客卿韓為韓謂秦王武曰韓珉之議知其君不知異君知其國不知異國被公仲者秦勢能詘之詘貶下也以補秦之强首之者首言以兵向之珉為疾矣珉者公仲所善公仲受兵則珉病正曰珉之議為其國之病也進齊宋之兵至首垣韓進之補曰首垣魏地見秦策逺薄梁郭所以不反魏者反不合也兵薄梁郭疑於不合而合補曰一本不及魏姚同似義長以為成成平也猶和而過南陽之道欲以四國西首也韓宋齊魏所以不者言欲攻秦而不果者正曰見下皆曰衍以字以燕亡於齊亡謂喪地補曰前此四年齊破燕魏亡於秦孟子曰西喪地陳蔡亡於楚此亡國也此皆絶地形言其大小相絶而四國輕以小敵大故亡正曰所以不者再申不及魏之說燕魏亡地於齊秦陳蔡亡國於楚則地形已絶不可復通韓齊宋之於魏則不然絶地形以下當有缺文引言秦事羣臣比周以蔽其上大臣為諸侯輕國也今王位正言武王能正貴賤之位張儀之貴不得議公孫郝元作赫下同補曰姚本作郝是從臣不事大臣也從臣謂儀大臣郝也事言不得干其事正曰見下公孫郝之貴不得議甘茂則大臣不得事近臣矣近臣謂茂正曰大事記此秦武王未逐張儀前時事也大臣從臣之名始見于此大臣者張儀甘茂也從臣者公孫郝也秦武不過防其交通使之互相伺察而已貴賤不相事各得其位輻輳以事其上則羣臣之賢不肖可得而知也王之明一也公孫郝嘗疾齊韓言急於得二國補曰疾字恐有誤而不加貴貴言不厚二國正曰言郝不加厚也則為大臣不敢為諸侯輕國矣齊韓嘗困公孫郝而不受則諸侯不敢因羣臣以為能矣外內不相為則諸侯之情僞可得而知也王之明二也補曰王之明一也申羣臣比周蔽上之說王之明二也申大臣為諸侯輕國之說公孫郝樗里疾請無攻韓陳四辟去陳軍陳以不攻故解散補曰四疑當作而王猶攻之也宜陽之役甘茂約楚趙欲攻魏而攻敬魏違其初約是且搆我初約攻而反敬之是欲與三國難我也茂且攻宜陽王猶校之也茂攻宜陽可以贖前若他人則置不檢校正曰按史茂攻宜陽請約于魏此言在未攻宜陽之時茂黨魏者楚趙當時蓋與魏不合茂約結襄君而反其敬魏且將搆難於我其欲攻宜陽王猶檢察之以此二事稱王之明智羣臣之智無幾於王之明者幾猶近臣故願公仲之以國元作國以國以補曰當作以國待於王待待其命而無自左右也自猶由也欲秦王聽己勿用左右之說正曰謂公仲一心聽王不由左右補曰大事記引此策在韓襄二年秦武元年解題云韓客謂向夀曰今王之愛習公也不如公孫郝當時所謂從臣指愛習而侍從者也秦用其愛習為人主私人其權至與大臣相抗古無是也愚謂公孫郝挾韓而議大臣必不得與而爭於中故此士欲王自聽公仲之待事而不由左右陳駕御之術以稔强明猜忌之見爾張儀出走毁者固非一人而茂攻宜陽亦以奭為憂大臣率為從臣所勝愛習真可畏哉或謂公仲曰聽者聽國謂聽於衆非必聽實也實謂見事故先王聽諺言於市願公之聽臣言也公求中立於秦立謂立於齊魏之間此章實為魏而弗能得也善公孫郝以難甘茂歡齊兵以勸止魏郝善齊故善郝則喜於齊之攻魏茂善魏故去茂則可以止魏之攻齊勸言茂欲為之補曰一本勸齊兵姚同楚趙皆公之讎也詳此則公仲與齊者也二國不善齊故讎公仲臣恐國之以此為患也願公之復求中立於秦也公仲曰奈何對曰秦王以公孫郝元作赫下同補曰姚本並作郝秦王當是昭下文言惠武為黨於公而弗之聽甘茂不善於公而弗為公言公何不因行願以與秦王語行願人姓名行願之為秦王臣也公無私秦信之故可因臣請為公謂秦王曰補曰請行願為公仲言於秦王齊魏合與離於秦孰利齊魏别與合離以交言别以兵言正曰合離别合反覆言之於秦孰强秦王必曰齊魏離則秦重合則秦輕齊魏别則秦强合則秦弱臣即曰今王聽公孫郝以韓秦之兵應齊而攻魏魏不敢戰歸地而合於齊是秦輕也臣以公孫郝為不忠今王聽甘茂以韓秦之兵據魏而攻齊齊不敢戰亦元作不不補曰疑衍或求本亦字求割地而合於魏是秦輕也臣以甘茂為不忠故不如令韓中立以攻齊衍齊字齊補曰疑衍王言救魏以徑之齊時先以伐魏故令秦王聲言救魏以徑韓之攻齊齊魏不能相聽必離秦救魏則魏不憚齊亦不合於齊兵交元作史史補曰字義未詳王欲則信公孫郝於齊欲言或欲此或欲彼為韓取南陽易榖川以歸榖水出澠池此惠王之願也王欲則信甘茂於魏以韓秦之兵據魏以拒齊此武王之願也臣以為令韓以中立以攻元作徑徑補曰恐當作攻從上文齊最秦之大急也公孫郝黨於齊而不肯言甘茂薄而不敢謁茂羈旅之臣故言薄此欲攻齊故其辭與茂正曰薄即上文不善於公薄下或有缺字此二人王之大患也願王之熟計之也公仲數不信於諸侯諸侯補兩字補曰一本復有此二字姚同錮之不行其說南悉國於楚以國事聽之楚王懷弗聽蘇代為謂楚王曰不若聽而備於其反也反亦謂不信仲之反也常杖元作仗下同仗補曰仗倚也字與杖通趙而畔楚杖仗齊而畔秦今四國錮之而無所入矣亦甚患之公仲甚患此方其為尾生之時也言公仲自患其反之不利故欲為信尾生再見燕策蘇代言名高蓋論語微生泛論訓亦云補曰莊子尾生與女子期於梁下水至不去抱梁柱而死與燕策所載同本微生釋文引髙誘注魯人今注本無或謂即論語微生古今人表作尾生高謂公叔曰公欲得武遂於秦而不患楚之能揚河外也揚猶動補曰年表襄王五年秦拔宜陽涉河城武遂六年秦復與我武遂九年秦復取之正義云武遂韓邑也近平陽非堯都楚昭睢曰秦破韓宜陽而韓猶復事秦者以先王墓在平陽而秦之武遂去之七十里以故尤畏秦楊疑傷字訛公不如令人恐楚王懷而令人為公求武遂於秦謂楚王曰發重使為韓求武遂於秦秦王昭聽是令得行於萬乘之王也韓得武遂以限元作恨恨補曰疑限秦無元作毋毋補曰無通秦患而德元作得得補曰當作德楚韓楚之縣而已言役屬於楚秦不聽是秦韓之怨深而交事補補曰恐交字下有缺字楚也謂公叔曰乘舟舟漏而弗塞則舟沉矣塞漏舟而輕陽侯之波說陽侯多矣今按四八目伏羲六佐一曰陽侯為江海蓋因此為波神歟補曰此出陶潜聖賢羣輔録侯一作使博物志習陽國侯溺水因為大海之神則舟覆矣今公自以為辨於薛公辨猶治也猶言治於髙溪薛公田嬰而輕秦是塞漏舟而輕陽侯之波也願公之察也齊令周最使鄭韓滅鄭有其地故多稱鄭補曰韓滅鄭徙都之故稱鄭猶魏都大梁稱梁立韓擾韓公子蓋立為相正曰無據而廢公叔周最患之曰公叔之與周君交也交言其相善已不可以廢之今我使鄭立韓擾而廢公叔補曰一本令我從上文語曰怒於室者色於市色作色今公叔怨齊無奈何也必絶周君而深怨我矣史舍曰公行矣請令公叔必重公周最行至鄭公叔大怒史舍舍齊所使與最同使正曰史或姓入見見公叔曰周最固不欲來使臣竊强之周最不欲來以為公也使臣之强之也亦為公也補曰最固不欲來使臣實强其來使也一本臣之强之也上無使字是姚同公叔曰請聞其說對曰齊大夫諸子有犬犬猛不可叱叱之必噬人客有請叱之者疾視而徐叱之犬不動復叱之犬遂無噬人之心今周最固得事足下而以不得已之故來使彼將禮陳其辭以禮陳說不急也而緩其言鄭王必以齊王閔為不急必不許也今周最不來他人必來來使者無交於公而欲德於韓擾其使之必疾言之必急則鄭王必許之矣公叔曰善遂重周最王果不許韓擾公仲使韓珉之秦求武遂而恐楚之怒也唐客楚人謂公仲曰韓之事秦也且以求武遂也非敝邑之所憎也韓已得武遂其形乃可以善楚臣願有言而不敢為楚計今韓之父兄得衆者每相韓不能獨立勢必衍不字不補曰疑衍善楚絶句王曰唐客以楚懷言告公仲吾欲以國輔韓珉而相之可乎父兄惡珉珉必以國保楚公仲說初恐楚怒已使珉今欲相珉則不怒也仕元作士補曰姚注錢作仕唐客於諸公蓋薦之於韓之大臣乃得仕而使之主韓楚之事公仲以宜陽之故仇甘茂其後秦歸武遂於韓此六年補曰史甘茂𫝊蘇代謂向夀曰韓氏委國於甘茂茂許公仲以武遂反宜陽之民既而甘茂竟言秦王以武遂復歸之韓向夀公孫奭爭之不得由此怨讒茂此九年秦復取武遂已而秦王昭固疑甘茂之以武遂解於公仲也杜聊韓人補曰姚本上聊字作赫疑聊字誤為公仲謂秦王曰朋元作明明補曰當作朋也願因茂以事王若公仲與茂善以實秦王之疑秦王大怒於甘茂故樗里疾大說杜聊鄭彊以金八百入秦以伐韓彊以韓滅故正曰無據補曰一本並作彊一本載八百金入秦請以伐韓冷向謂鄭彊曰補曰冷向即冷夀秦策髙以為秦臣詳此章為言公以八百金請伐人之與國韓秦之與秦必不聽公公不如令秦王昭疑公叔鄭彊曰何如曰公叔之攻楚也以幾瑟之存焉幾瑟太子嬰弟時質楚公叔所不善補曰幾瑟史作蟣虱後並同故言伐元作先先楚也正曰以攻楚今已令楚王懷奉幾瑟以車百乘居陽翟令昭獻轉而與之處獻本不善幾瑟令之回心相善旬有餘彼已角角言二人均禮補曰姚本角作覺是而幾瑟公叔之讎也而昭獻公叔之人也秦王聞之必疑公叔為楚幾瑟韓愛子而在楚秦固疑其合楚公叔與幾瑟讎故秦不疑今叔所善與之處而禮均然則秦安得不疑其為楚楚秦所惡也其伐韓不待請矣公仲為韓魏易地公叔爭之而不聽且亡史愓韓史正曰或姓謂公叔曰公亡則易必可成矣公無辭以復反且示天下輕公公不若順之夫韓地易於上上上流魏之上正曰上謂魏則害於趙趙魏鄰也魏地廣趙之害也魏易於下下謂韓補曰一本魏地易則害於楚公不如告楚趙楚趙惡之趙聞之起兵臨羊腸楚聞之發兵臨方城而易必敗矣錡宣韓人之教韓王取秦取言與之合曰為公叔具車百乘言之楚易三川因令公仲謂秦王昭曰三川之言曰秦王必取我我三川也韓王之心不可解矣言其聞三川之言恐空失地故來與楚易補曰三川見秦策王何不試以襄子王秦王襄子秦諸公子不善太子者正曰無考為質於韓令韓王知衍之字補曰一本無姚同王之不取三川也韓之易地畏秦取之也今秦入質則不取可知因以出襄子而德太子襄陵之役史不書補曰襄陵見齊䇿畢長謂公叔曰請毋用兵而楚魏皆德公之國矣夫楚欲置公子咎元作髙從史後並此書亦或作咎置不立也事見十二年髙補曰咎與臯通臯陶作咎繇此為髙音同也必以兵臨魏魏欲立咎故公何不令人說昭子陽也曰戰未必勝請為子起兵以之魏韓起兵子有辭以毋戰楚臨魏欲置咎也韓今順之故可以無戰於是衍以字以太子幾瑟也與元作扁扁補曰此與字訛昭陽元作楊楊補曰即陽音同而訛梁王皆德公矣陽得毋戰梁得免兵補曰大事記韓世家襄王十二年太子嬰死公子咎公子蟣虱爭為太子時蟣虱質於楚楚欲內之遂圍雍氏蟣虱竟不得歸韓韓立咎為太子戰國策與世家所載參錯重復不可詳考大略二公子各有所主公仲主蟣虱公叔主咎愚按楚策韓公叔有齊魏而太子有楚秦據此則公叔挾齊魏以主咎公仲挾秦楚以主蟣虱也公叔使馮君於秦恐留教陽向並韓人正曰陽向未必韓人說秦王昭曰留馮君以善韓臣韓之嫉馮者以留之為善非上智也主君不如善馮君而資之以秦馮君廣王恃秦以自大補曰廣字未詳而有誤而不聽公叔以與太子爭太子爭也時未定所立故蟣虱咎嬰更稱之補曰此太子指咎也秦主幾瑟善馮君為順秦之辭按大事記云國策中庶子强謂太子云云史蘇代謂韓咎曰幾瑟亡在楚楚王欲內之甚然則幾瑟嘗立為太子不勝公子咎之徒乃出奔也索𨼆曰伯嬰即太子嬰嬰前死故咎與幾瑟爭立愚謂此大事記所謂不可考者則王澤布而害於韓矣國不和故補曰害疑善字韓公叔幾瑟爭國爭立為相見後鄭彊為楚王懷使於韓矯以新城陽人命世子幾瑟也以與公叔爭國楚怒將罪之鄭彊曰臣之矯與之以為國也臣曰言其言然世子得新城陽人必與公叔爭國而得全魏必急韓氏魏欲立咎故急攻之韓氏急必懸命於楚又何新陽人敢索若戰而不勝幸元作走走而不死今且以至言歸楚又安敢言地楚王曰善乃弗罪楚策有大同鄭作申韓公叔與幾瑟爭國中庶子强庶子本周官秦置中庶子為太子官補曰新序楚莊王涖政云云中庶子聞之跪而泣曰臣尚衣冠御郎十三年矣燕策有秦王寵臣中庶子䝉嘉衛鞅為公叔痤庶子甘羅事吕不韋為庶子則中庶子者侍御左右之臣而當時家臣亦有此名非復周制矣秦官太子庶子中庶子此云中庶子强謂太子豈亦太子之官歟强或是鄭强謂太子曰不若及齊師未入齊助公叔急擊公叔太子曰不可戰之於國中國必分對曰事不成身必危尚何足以圖國之全為太子弗聽齊師果入太子出走彪謂幾瑟之及此言也義嗣也而卒不得立小人勝故也正曰幾瑟之不欲戰慮國之分耳非有息民全民之意退讓之美也何義嗣之足稱乎齊明謂公叔曰齊逐幾瑟楚善之今楚欲善齊甚公何不令齊王閔謂楚王懷王為我逐幾瑟以窮之楚聽是齊楚合而幾瑟走也楚王弗聽是有隂於韓也隂言私厚之然則公叔不可不備公叔將殺幾瑟或謂公叔曰太子之重公也太子咎畏幾瑟也今幾瑟死太子無患必輕公韓大夫見王老冀太子之用事也固欲事之太子外無幾瑟之患時在楚故言外而內收諸大夫以自輔也公必輕矣不如無殺幾瑟以恐太子太子必終身重公矣公叔且殺幾瑟也宋赫為謂公叔曰幾瑟之能為亂也內得父兄而外得秦楚也補曰大事記云內得父兄指公仲也今公殺之太子無患必輕公韓大夫知王之老而太子定必隂事之秦楚若無韓言小國不之有補曰未詳必隂事伯嬰秦楚有韓則事太子太子韓嗣故也無韓乃事嬰伯嬰亦幾瑟也公不如弗殺絶句伯嬰恐必隂保於公嬰與太子在韓皆幾瑟之仇幾瑟在故嬰恐韓大夫不能必其不入也幾瑟入必不敢輔伯嬰以為亂秦楚挾幾瑟以塞伯嬰塞障也不使與事伯嬰外無秦楚之權內無父兄之衆必不能為亂矣此便於公十二年書太子嬰死因言公仲伯嬰六事六事豈與太子同名歟正曰索𨼆說伯嬰云云見前謂新城君曰公叔伯嬰恐秦楚之內幾瑟也公何不為韓求質子於楚楚不主幾瑟則必入質以此卜之楚王懷聽而入質子於韓則公叔伯嬰必知秦楚之不以幾瑟為事也必以韓合於秦楚矣秦楚挾韓以窘魏魏氏不敢東不合齊是齊孤也公又令秦求質子於楚卜其與秦同否也楚不聽則怨結於韓此韓皆主公叔伯嬰為言韓挾齊魏以盻楚盻睥睨也正曰盻恨視也五禮反楚王必重公矣新城貴於秦楚欲秦援之故重新城公挾秦楚之重以積德於韓則公叔伯嬰必以國事公矣記十二年有在楚圍雍氏下補曰史以此為蘇代之言新城君芉戎也胡衍韓人之出幾瑟於楚也出而歸韓教公仲衍教字謂魏王哀正曰襄曰太子在楚韓不敢離楚也懼其為幾瑟伐韓王元作公公正曰謂魏王之言止上二句言韓所以不敢離楚之故以解於魏也公何不試奉公子咎而為之請太子此勸公仲之辭試字可見大事記引此亦云公子反不若存之之明也何不試奉公子咎此後並因舊字而為之請太子請韓立之因令人謂楚王懷幾瑟聞魏欲立咎故曰韓立公子咎而棄幾瑟是王抱虛質也王不如亟歸幾瑟幾瑟入必以韓權報讎於魏而德王矣補曰德王之王謂楚王大事記謂公仲始主幾瑟後持兩端幾瑟既不得入遂改主咎以此章為證愚謂勸仲試奉咎者將以行其謂楚之謀激楚王之早入幾瑟耳非果有奉咎之心也楚既敗雍氏幾瑟卒不得入公仲直以勢窮力竭而遂止耳幾瑟亡之楚楚將收秦而復之謂芉戎曰廢公叔而相幾瑟者楚也相謂昔日正曰相助也今幾瑟亡之楚楚又收秦而復之幾瑟入鄭之日韓楚之縣已元作邑邑補曰策文如此句者每作已然邑字自通公不如令秦王賀伯嬰之立也韓絶於楚楚主幾瑟而今立嬰故絶韓其事秦必疾秦挾韓親魏齊楚後至者先亡此王業也冷向謂韓咎曰史有公子咎有韓咎補曰史冷向作蘇代愚謂咎即太子咎豈有內幾瑟之理當是謂公仲之辭此大事記所謂不可考者幾瑟亡在楚楚王懷欲復之甚今楚兵十餘萬在方城之外臣請令楚築萬家之都於雍氏之旁韓必起兵以禁之公必將矣公因以楚韓之兵奉幾瑟而內之幾瑟得入而德公必以韓楚奉公矣記十三年有楚令景鯉入韓韓且內伯嬰於秦景鯉患之楚欲立幾瑟怨秦立嬰故冷向謂伯嬰曰太子謂伯嬰入秦秦必留太子而合楚以復幾瑟也是太子反棄之言已得立而棄之向蓋為鯉者彪謂太子國之本也而紛紛不定若此韓有相其皆何事耶正曰已若入秦而秦與楚復幾瑟反為自棄也大事記云置嗣不定大臣外連敵國相與為市國之不亡者幸也愚觀咎與幾瑟爭立實大臣輔之爭而鮑謂置相何事獨弗考乎楚圍雍氏此十二年補曰圍雍氏見周策五月韓令使者求救於秦冠蓋相望也秦師不下殽韓又令尚靳使秦謂王昭曰韓之於秦也居為隱蔽出為鴈行今韓已病矣秦師不下殽臣聞之唇揭者揭猶反其齒寒願大王之熟計之宣太后曰使者來者衆矣獨尚子之言是召尚子入宣太后謂尚子曰妾事先王日補曰一本日作也姚同先王以其髀股也加妾之身妾固不支也盡置其身妾之上而妾弗重也何也以其少有利焉補曰宣太后之言汙鄙甚矣以愛魏醜夫欲使為殉觀之則此言不以為恥可知秦母后之惡有自來矣今佐韓兵不衆糧不多則不足以救韓夫救韓之危日費千金獨不可使妾少有利焉尚靳歸書以書歸報韓王韓王遣張翠張翠稱病日行一縣張翠至甘茂曰韓急矣先生病而來張翠曰韓未急也且急矣甘茂曰秦重國智主也補曰一本智作知姚注云錢改作之韓之緩急莫不知今先生言不急可乎張翠曰韓急則折而入於楚臣安敢來甘茂曰先生毋復言也甘茂入言秦曰公仲柄得秦師柄猶持補曰史記枋有得秦按字書枋與柄同此恐字訛故敢捍楚今雍氏圍而秦師不下殽是無韓也公仲且抑首而不朝抑首不意貌公叔且以國南合於楚楚韓為一魏氏不敢不聽是楚以三國謀秦也如此則伐秦之形成矣不識坐而待伐孰與伐人之利秦王曰善果下師於殽以救韓甘茂傳有茂入言下補曰大事記赧王十五年楚圍雍氏引此章云此即周紀所載之事楚前圍雍氏在赧王三年秦惠王猶在位安得有宣太后楚後圍雍氏甘茂出奔已數年兩者皆不合楚圍雍氏韓令冷向借救於秦秦為發使公孫昧入韓補曰昧當音莫葛反公子昧唐昧皆然公仲曰子以秦為將救韓乎其不乎對曰秦王昭之言曰請道於南鄭屬漢中補曰正義云南鄭梁州縣藍田雍州縣秦言或出雍州西南至鄭或出雍東南歷藍田出嶢關俱繞楚北境以待韓使而東救雍氏如此遲緩殆不合於楚矣按史止作殆不合矣無軍於南鄭四字竊謂史為是蓋雍氏在陽翟而此言合軍南鄭殊不相涉且上文請道南鄭而此曰不合軍於南鄭豈非誤乎藍田以入攻楚出兵於三川以待公殆不合軍於南鄭矣不與楚戰公仲曰奈何對曰秦王必祖張儀之故謀昔者所謀補曰秦策有說見本條楚威王攻梁張儀謂秦王惠曰與楚攻梁魏折而入楚韓固其與也韓魏之與補曰一本固其與國也姚同是秦孤也故不如出兵以徑魏陽為助魏實欲其與楚戰於是攻皮氏楚攻之魏氏徑威王怒楚與魏大戰秦取西河之外以歸惠八年補曰說亦見秦策今也其將陽言救韓而隂善楚公恃秦而徑必輕與楚戰楚隂得秦之不用也不為韓用必易與公相支也公戰勝楚遂與公乘楚易三川而歸乘因取之也公戰不勝楚楚塞三川而守之公不能救也臣甚惡其事司馬康秦人補曰康史作庚三反之郢矣甘茂與昭獻遇於境其言收璽璽軍符收之者言欲止楚之攻韓正曰牧取也璽印也如楚置相璽之云索隱以為昭獻欲得秦官之印璽其實猶有約也疑秦楚約攻韓公仲恐曰然則奈何對曰公必先韓而後秦先身而後張儀先已所見後儀之故智言欲秦之救已而不欲其徑韓也徐注欲以為儀在之日而云非也正曰先韓者急圖其國后秦者不望其救先身者善已之謀後儀者不墮人之詐徐說見後臣補以補曰姚注云劉去以字公不如亟以國合於齊楚秦必委國於公以解伐是公之所以外者儀而已外猶后也此言不恃秦耳承上故言儀正曰不墮儀之故智為外於儀耳其實猶之不失秦也雖合齊楚圖國事耳秦無辭怨史記十二年有正曰即上文秦委國於公云云補曰徐廣云秦記惠王後十三年楚圍雍氏紀年於此亦說楚景翠圍雍氏韓宣惠五年秦助韓共敗楚屈丐又云齊末圍煮棗皆與史記年表及遷世家符同此是前圍雍氏事也後圍雍氏是赧王十五年事大事記書楚景翠圍韓雍氏秦樗里疾帥師救韓敗楚解題具載徐說謂世家合而為一者誤又按正義云徐見張儀尚存生此前後之見此是公孫時却述張儀時事愚謂此策雖曰視張儀故謀其下云先身后儀又云所外者儀似非儀死后之辭然楚圍之解實以秦救公孫衍之言為不可信耳此章宜在前鮑序次誤之又按大事記云韓年表書秦助我攻楚圍景痤楚將名與紀年不同蓋紀年云屈丐也愚按韓楚世家並云敗楚將屈丐丹陽夫丹陽之與雍氏相去逺矣景痤恐即景翠聲轉而訛景痤之敗雍氏之戰也屈丐之敗丹陽之戰也丹陽之后其雍氏之役歟大事記首書丹陽之役后書景翠圍韓且丹陽大敗之餘楚力未蘇何暇於圍韓哉或謂韓公仲曰夫攣子之相似者孿一乳兩子補曰孿嗇患力員二反惟其母知之而已夫利害之相似者補曰一本利害無夫字唯智者知之而已今公國其利害之相似正如攣子之相似也得其道為之則主尊而身安不得其道則主卑而身危今秦魏未和成時則言和而非公適兩束之束猶約則韓必謀矣謀謂和不堅而復議之若韓隨魏以善秦是為魏從也從人而已非自約之則韓輕主卑矣補曰一本韓輕矣秦已善韓必將置其所愛信者令用事於韓以完之全秦之事是公危矣今公與安成君韓人為秦魏之和成固為福不成亦為福秦魏之和成而公適兩束之是韓為秦魏之門戶也喻兩國由之是韓重而主尊矣安成君東重於魏而西重於秦操右契左契待合而已右契可以責取而為公責德於秦魏之王公仲制和為德於秦今責其報列地而為諸侯公之事也言當務此若果安韓魏而終身相公之下服服猶事以侯國為上則相猶為下也此主尊而身安矣秦魏不終相聽者也後必相違齊怒於不得魏必欲善韓以塞魏魏不聽秦必務善韓以備秦是公擇布而割也布喻齊魏割喻制之補曰齊怒詳文意當作秦怒姚注擇布錢作擇稀秦魏和則兩國德公不和則兩國爭事公所謂成為福不成亦為福者也願公之無疑也或謂公仲曰今有一舉而可以忠於主便於國利於身願公之行之也令天下散而事秦則韓最輕矣令補曰姚本無令字天下合而離秦則韓最弱矣合離之相續則韓最先危矣此君國長民之大患也今公以韓先合於秦天下隨之是韓以天下事秦秦之德韓也厚矣韓與天下朝秦而獨厚取德焉公行之計之猶此是其於主也至忠矣天下不合秦秦令而不聽秦必起兵以誅不服秦久與天下結怨搆難而兵不决韓息士民以待其舋舋鏬也公行之計是其於國也大便也昔者周佼以西周善於秦而封於楩陽太原榆次有楩陽鄉周啓以東周善於秦而封於平原今公以韓善秦韓之重於兩周也無先計而秦之爭機也在已之計無先於此在秦則為爭言欲之急機言不可失萬於周之時今公以韓為天下先合於秦秦必以公為諸侯以明示天下公行之計是其於身大利也願公之加務也釐王襄王子元年赧王二十年丙寅韓咎太子咎即釐王立為君而未定也幾瑟伯嬰難之補曰韓襄王十二年公子咎公子幾瑟爭立楚圍雍氏次年魏襄王與齊閔王㑹於韓立咎為太子此策必其爭立之時若既即位則何未定之有其弟在周周欲立車百乘而送之恐韓咎入韓之不立也綦毋恢曰不如以百金從之韓咎立因以為戒所謂兵創補曰姚注云劉改因作曰不立則曰來效賊也得立者以咎弟為賊正曰公叔公仲之用事仲先而叔後韓咎既立則公仲之權寵哀矣伯嬰幾瑟咎之爭立伯嬰必先死鮑序次錯亂非是五國約而攻秦趙惠文十三年此十年正曰說誤見下楚王頃襄正曰此懷王為從長合齊趙韓魏燕及胸奴伐秦時事在懷王十一年韓宣惠王十五年說見趙策此策文見孔叢子以為子順之言其注謂魏公子無忌率五國兵敗䝉恬為尤誤為從長不能傷秦兵罷而留於成臯魏順謂沛元作市下同市正曰孔叢子作市大事記作沛丘君太公世家君其長也曰五國罷必攻沛市丘注沛丘為貝曰貝丘屬清河正曰成臯與清河絶逺恐非以償兵費君元作若若資臣臣請為君止天下之攻沛市丘君曰善因遣之魏順南見楚王曰王約五國而西伐秦不能傷秦天下且以是輕王而重秦故王何不卜交乎楚王曰奈何魏順曰天下罷必攻沛市丘以償兵費王令之勿攻沛市丘五國重王五當作四正曰是役本六國言五國重王則楚在外史年表等書五國故因此稱五國此明是楚約從時事大事記改五作四遂以此策附注李兊約五國伐秦之年亦誤其曰合五國之衆一籌不畫逡巡而却乃欲攻一小邑以償費楚王為從長不知諸侯與已之深淺始欲卜交宜乎秦以折箠笞之此言移以論懷王尤為切中者也且聽王之言而不攻沛市丘不重王且反王之言而攻沛市丘然則王之輕重必明矣故楚王卜交而沛市丘存補曰留成臯而將攻市丘市丘必韓地不然則策當在楚不在韓韓人攻宋齊記閔三十八年書韓為齊攻今從史定為此十年秦王昭大怒曰吾愛宋與新城陽晉同也補曰正義引括地志云新城故城在宋州宋城縣界陽晉故城在曹州乘氏縣西北又見楚策韓珉與我交而攻我所甚愛何也蘇代元作秦今從史秦補曰當作代為韓說秦王曰韓珉之攻宋所以為王也以韓之强輔之以宋楚魏必恐恐必西面事秦王不折一兵不殺一人無事而割安邑此韓珉之所以禱於秦也禱言以此求事秦秦王曰吾固患韓之難知一從一橫此其說何也韓難知而代說如此何也對曰天下固令韓可知矣言非獨代知之韓固已攻宋矣其西事秦以萬乘自輔萬乘秦也不西事秦則宋地不安矣雖得宋地不能自安中國白頭游敖之士敖出游也皆積智欲離秦韓之交伏軾結靷靷駕牛具在胸者西馳者未有一人言善韓者也伏軾結靷東馳者未有一人言善秦者也皆不欲韓秦之合者何也則晉楚智而韓秦愚也晉楚合必伺韓秦伺亦圗也小言之正曰伺窺也韓秦合必圗晉楚請以决事秦王曰善齊記有韓字並作齊補曰趙策謂魏王曰韓珉處於趙去齊三千里王以此疑齊曰有秦隂五國伐秦無功蘇代謂齊王舉說奉陽君之辭曰天下爭秦秦內韓珉於齊又云與韓氏大吏東勉齊王必無召珉而韓策云韓珉相齊蓋韓珉為齊伐宋也首句不云韓攻宋而云韓人疑人即珉之訛蘇代為燕反間勸齊伐宋將以敝齊而為燕恐秦之敗其事故游說以止之爾史記恐有所據當考或謂韓王曰秦王昭欲出事於梁而欲攻降安邑韓計將安出矣謂有齒寒之憂秦之欲伐韓以東窺周室甚唯寐忘之今韓不察因欲與秦必為山東大禍矣秦之欲攻梁也欲得梁以臨韓恐梁之不聽也故欲痛之以固交也攻之深使之懲創不敢離秦補曰一本固欲病之姚同注云錢劉作痛王不察因欲中立不助秦亦不救魏梁必怒於韓之不與已必折為秦用韓必舉矣願王熟慮之也不如急發重使之趙梁約復為兄弟使山東皆以鋭師戍韓梁之西邉非為此也山東無以救亡此萬世之計也秦之欲并天下而王之也不與古同事之雖如子之事父猶將亡之也行雖如伯夷猶將亡之也行雖如桀紂猶將亡之也言志於亡之而已無擇也雖善事之無益也不可以為存適足以自令亟亡也然則山東非能從親合而相堅如一者必皆亡矣彪謂秦之大情此策陳之無餘藴矣非蘇氏兄弟不能也說之著明如此而聽之者藐藐豈天亡之邪蓋漢運將興而秦為之鸇獺也補曰大事記引此策自秦之止益也謂論秦最得其情附見于附赧王二十九年魏獻安邑之後愚以齊趙燕策考之宜赧王十六年說見齊策秦伐魏陳軫合三晉而東一章謂鄭王曰昭釐侯一世之明君也申不害一世之賢士也韓與魏敵侔之國也申不害與昭釐侯執圭而見梁君非好卑而惡尊也非慮過而議失也申不害之計事曰我執圭於魏魏君必得志於韓必外靡於天下矣靡蔑視之正曰靡散也忙皮反補曰昭釐侯朝魏見魏策是魏敝矣諸侯惡魏必事韓是我俯元作免免補曰此書免俯通於一人之下而信平於萬人之上也夫弱魏之兵而重韓之權莫如朝魏昭釐侯聽而行之明君也申不害慮事而言之忠臣也今之韓弱於始之韓今之秦强於始之秦補曰孔叢子韓與魏有隙子順謂韓王曰昭釐侯一世之明君也申不害一世之賢相也韓與魏敵侔之國而釐侯執圭見梁君者非好卑而惡尊慮過而計失也與嚴敵為鄰而動有滅亡之憂獨動不能支二難故降心以相從屈已以求存也申不害慮事而言忠臣也昭釐侯聽而行之明君也今韓弱於始之韓魏均於始之魏秦强於始之秦而背先人之舊好以區區之衆居二敵之間非良策也齊楚逺而難恃秦魏呼吸而至舍近而求逺是以虛名自纍而不免近敵之困者也為王計者莫如除小忿全大好也吳越之人同舟濟江中流遇風波其相救如左右手者所患同也今不恤所同之患是不如吳越之舟人也韓王曰善按此文與策上文略同其下則異子順之言主除忿全好策文主尊秦非子順意也今全録以俟考者今秦有梁君之心矣而王與諸臣不事為尊秦不以尊秦為事以定韓者臣竊以為王之明為不如昭釐侯而王之諸臣莫如申不害也昔者秦補穆公一勝於韓原晉記斃於原注晉韓原后志在馮翊夏陽補曰左氏僖十五年𫝊在同州韓城而霸西州猶言西方晉文公一勝於城濮而定天子僖二十八年補曰姚云曽改子作下此皆以一勝立尊尊謂霸令成功名於天下令猶使正曰立尊令句今秦數世强矣大勝以十數小勝以百數大之不王小之不霸名尊無所立制令無所行諸侯不從其令然而春秋用兵者非以求主尊成王於天下也言志於尊王而已昔先王之攻有為名者有為實者為名者攻其心使之心服而已為實者攻其形形在外者謂地與民昔者吳與越戰越人大敗保於㑹稽之上吳人入越而戶撫之遍至其家撫安之越王使大夫種行成於吳請男為臣女為妾身執禽禽鳥小贄也正曰執禽鳥服役而隨諸御吳之執事者吳人果聽其辭與成而不盟此攻其心者也其後越與吳戰吳人大敗亦請男為臣女為妾反以越事吳之禮事越越人不聽也遂殘吳國而禽夫差此攻其形者也今將攻其心乎宜使如吳攻其形乎宜使如越夫攻形不如越而攻心不如吳而君臣上下少長貴賤畢呼霸王臣竊以為猶之井中而謂曰我將為爾求火也東孟之㑹補曰姚及一本自為一章恐非聶政陽堅堅政之副猶秦武陽正曰說見前刺相兼君許異韓人蹙列元作哀下同哀侯而殪之蹙猶留侯躡漢王足蓋使之佯死補曰蹙一本作蹴字通說文蹴躡也躡蹈也立以為鄭君韓氏之衆無不聽令者則許異為之先也是故列哀侯為君而許異終身相焉而韓氏之尊許異也猶其尊列哀侯也補曰按哀侯既弒則無終身相之事以為列侯則又非楊堅為賊之事哀列二字訛舛不明且從本文讀之而已今日補曰一本日作曰鄭君不可得而為也為去音謂蹙之正曰下文天子不可得而為與此同則為當如字雖終身相之焉然而吾弗為云者豈不為過謀哉言無前日之難而可以久相而曰不為者過也昔齊桓公九合諸侯未嘗不以周襄王之命然則雖尊襄王桓公亦定霸矣九合諸侯之尊桓公也侯之與九合者猶其尊襄王也今日天子不可得而為也雖為桓公然而補此兩字吾弗為云者豈不為過謀而不知尊哉此欲其尊秦韓氏之士數十萬皆戴列哀侯以為君而許異獨取相焉者無他也諸侯之君無不任事於周室也而桓公獨取霸者亦無他也知所尊而已今强國將有帝王之舋謂秦而以國先者此桓公許異之類也豈可不謂善謀哉夫先與强國之利强國能王則我必為之霸强國不能王則可以避其兵使之無伐我補曰一本避作辟當音闢然則强國事成則我立帝而霸立言彼為帝由我尊之强國之事不成猶之厚德我也今與强國今謂韓强國之事成則有福不成則無患然則先與强國者聖人之計也正曰此策時不可考其說雖多務尊强國而已非善謀也為名為實為爾為之先之為去聲韓陽役於三川征伐之役而欲歸足强韓人為之說韓王曰三川服矣王亦知之乎役且共貴公子役役人公子謂陽等輩貴言立之為君王於是召諸公子役於三川者而歸之正曰時不可考秦大國也韓小國也韓甚疏秦而見親秦為秦所親補曰一本然而正曰然而上以也句計之恐當作之計謂見親於秦之計非金無以為親韓補計之非金無以也金以事秦故賣美人美人之賈貴諸侯不能買故秦買之三千金韓因以其金事秦秦反得其金與韓之美人韓之美人因言於秦曰韓甚疏秦美人怨韓賣之又知韓之情從是觀之韓之美人與金此兩者其疏秦乃始衍於字補曰一本無姚同益明故客有說韓者曰不如止淫用淫侈也以是為金而事秦是金必行而韓之疏秦不明美人知內行者也謂國中𨼆事故善為計者不見內行見顯示之補曰見賢遍反正曰時不可考張丑之㑹齊楚講於魏也謂韓公仲曰今公疾攻魏之鄆元作運下同後志琅邪東管有鄆亭正曰非魏地運未詳運魏急則必以地和於齊楚故公不如勿攻也魏緩則必戰與齊楚戰戰勝攻鄆運而取之易矣勝則兵敝又無齊楚之助韓可取運戰不勝則魏且內之內運於韓公仲曰諾張丑因謂齊楚曰韓已與魏矣與之講正曰公仲事當附襄王時以為不然則盍觀公仲之攻也公仲不攻從丑之言齊楚恐恐韓魏合因講於魏而不告韓謂韓相國公仲也正曰無考未必釐王時曰人之所以善扁鵲者為有臃腫也使善扁鵲而無臃腫也則人莫之為之也無為善之今君以所事謂王善平原君者為惡於秦也以見惡於秦故善之以支秦而善平原君乃所以惡於秦也秦以平原難之故惡之而韓與之善故亦惡韓願公之熟計之也韓相公仲衍珉字下同珉使韓侈之秦請攻魏秦王昭說之韓侈在唐晉陽注詩唐國正曰唐未詳公仲死韓侈謂秦王曰魏之使者謂後相韓辰曰公必為魏罪韓侈韓辰曰不可秦王仕之又與約事言約攻魏使者曰秦之仕韓侈也以重公仲也今公仲死韓侈之秦秦必弗入補曰一本復有入字姚云曽有又奚為挾之以恨魏王昭乎韓辰患之將聽之矣今王不召韓侈韓侈且伏於山中矣懼罪秦王曰何意寡人如是之權也權猶變也始說侈而今不入是變也補曰權未詳字疑有誤令安伏秦人正曰無考召韓侈而仕之補曰公仲珉策屢各見此兩言公仲珉不可曉公仲即公仲侈此云公仲死後韓侈云云則韓侈别是一人也父亦多難通疑缺韓珉相齊令吏逐公疇竪齊人正曰無考又元作大大怒於周之留成陽君君本在齊為秦善之珉欲使之之秦過周周人留之故怒正曰成陽君韓人鮑於魏策已言之今於此言韓珉相齊而怒之故又云君本在齊又因魏策成陽君欲以韓魏聽秦故生此說皆非謂韓珉曰公以二人者為賢人也所入之國因用之乎則不如其處小國謂周何也成陽君為秦去韓公疇竪楚王頃襄正曰無據善之今因公逐之二人者必入秦楚必為公患且明公之不善於天下明顯猶示二大國惡之天下不能善也天下之不善公者與欲有求於齊者且收之以臨齊而市公謂山陽君韓人曰秦封君以山陽兖州郡齊封君以莒齊秦非重韓則賢君之行也今楚攻齊取莒上不交齊次弗納於君弗使入莒是棘齊秦之威而輕韓也棘猶難也楚攻齊而不納秦之所封山陽又韓人故云正曰棘義未詳詩傳多訓急楚攻以下本文自明其時不可考山陽君因使之楚趙魏攻華陽韓請急於秦以急告也冠蓋相望秦不救補曰攻華陽事見魏策韓相國辰也正曰無考謂田苓曰事急願公雖疾為一宿之行田苓見穰侯穰侯曰韓急乎何故使公來田苓對曰未急也穰侯怒曰是何以為公之主使乎公猶國也言其不任冠蓋相望告敝邑甚急公言未急何也田苓曰使韓急則將變矣穰侯曰公無見王矣臣請令發兵救韓八日中大敗趙魏於華陽之下記二十三年有補曰與前章張翠說同韓氏逐向晉於周晉周人使周逐之正曰無據周使成恢為之謂魏王安釐正曰無據時不可考曰周必寬而反之反謂還王何不為之先言是王有向晉於周也有言得其用魏王曰諾成恢因為謂韓王曰逐向晉者韓也而還之者魏也豈如道韓反之哉道猶由是魏有向晉於周而韓王失之也不反之則然韓王曰善亦因請復之張登中山人見其策謂費緤韓人曰請令公子牟補曰一本牟作年姚同謂韓王曰費緤西周讎之東周寶之此其家萬金王何不召之以為三川之守是緤以三川與西周戒也三川近西西讎之故緤有戒心必盡其家以事王西周惡之必效先王之器以止王止韓勿使為守韓王必為之此下登言其效也西周聞之必解子之罪以止子之事守三川非緤之欲登云云解其罪耳正曰韓釐王元年趙滅中山大事記載韓燕中山稱主在周顯王四十六年當宣惠王十年中山策有張登去此時甚逺然此策本不可定為何王之世鮑强附之魏王安釐為九重之盟九重謂王城欲城之先盟其衆正曰一本九里大事記引之姚同說見後且復天子赧四十二年馬犯請梁城周有復之之語正此二十三年復復其尊正曰按周紀復之之文謂許梁以鼎事正義復一音扶又反非謂復王大事記按韓非子魏惠公為臼里之盟將復立天子彭喜謂鄭君曰君勿聽云云戰國䇿所載與此同但止言魏王而不言惠王以臼里為九里以彭喜為房喜以鄭君為韓王所謂將復立天子者是時七國既稱王不以周為天子也或者猶咎孟子勸諸侯行王道何哉盟不知何年附載於慎靚王三年魏惠王薨之前按此策當屬惠王房喜韓人謂韓王曰勿聽之也大國惡有天子而小國利之王與大國弗聽此言韓亦大國魏安能與小國立之桓惠王釐王子元年赧王十三年己丑建信君趙人輕韓熙趙敖為謂建信君元作侯侯曰國形有之而存無之而亡者魏也趙魏為鄰故其勢如此不可無而從者韓也欲為從必得韓今君之輕韓熙者交善楚魏也此為從者說也從宜善韓而善此二國者非也正曰初無此意但謂今君之輕韓熙因交善於楚魏故也秦見君之交反善於楚魏也其收韓必重矣秦之志常反諸國補曰一本之交之善從則韓輕從必得韓而反輕者國小不得主從橫則韓重最近秦故則無從輕矣韓以為輕正曰無從者輕指趙言也秦出兵於三川則南圍鄢蔡邵之道不通矣謂潁川鄢陵以南二蔡邵陵魏急上三邑皆近魏正曰鄢許屬魏者策於魏多言許鄢陵其救趙必緩矣秦舉兵破邯鄲趙必亡矣故君收韓可以無釁戰國䇿校注卷八
