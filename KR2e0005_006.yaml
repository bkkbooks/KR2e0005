body:
  text: 戰國策校注卷六宋鮑彪原注元吳師道補正趙初分晉得趙國北有信都真定常山中山又得涿郡之髙陽鄚州鄉東有廣平巨鹿清河河間渤海之東平舒中邑文安東州成平章武河以北南至浮水繁陽內黃斥丘西有太原定襄雲中五原上黨襄子簡子子補曰名無恤定王十六年戊子三晉滅智伯分其地智伯帥趙韓魏而伐范中行氏補曰范氏士㑹之後荀林父將中行後因以官為氏滅之休數年使人請地於韓韓康子欲勿與段規韓人晉舊姓故魏亦有補曰姓譜段鄭共叔段之後諫曰不可夫智伯之為人也好利而鷙鷙殺鳥也喻其殘忍復來請地不與必加兵於韓矣補曰姚云復劉作愎韓子作鷙愎君其與之彼狃狃犬性驕也補曰狃習也又將請地於他國他國不聽必鄉之以兵然則韓可以免於患難而待事之變康子曰善使使者致萬家之邑一於智伯智伯說又使人請地於魏魏桓元作宣下同宣補曰韓子說苑亦並作宣恐桓字訛下同子欲勿與趙葭魏人亦晉舊姓諫曰彼請地於韓韓與之請地於魏魏弗與則是魏內自强而外怒智伯也然則其錯兵於魏必矣不如與之桓宣子曰諾因使人致萬家之邑一於智伯智伯說又使人之趙請藺元作蔡蔡臯狼之地蔡非趙地臯狼屬西河補曰恐名偶同漢志西河郡有臯狼縣又有藺縣蔡或藺字訛趙襄子弗與智伯隂結韓魏將以伐趙趙襄子召張孟談而告之曰夫智伯之為人陽親而陰踈三使韓魏而寡人弗與焉他日陰疏今則顯矣其移兵寡人必矣今吾安居而可張孟談曰夫董閼安于簡子補曰一本作主之才臣也世治晉陽而君澤循之君澤趙臣繼安于者補曰大事記晉陽漢太原郡所治龍山在西北晉水所出一本尹澤大事記謂澤字誤韓子國語作尹鐸其餘政教猶存君其定居晉陽君曰諾君謂襄子乃使延陵君元作王此襄子臣不得稱王王當作生正曰韓子云趙襄子召延陵生今將云云浚儀王氏謂鮑失考將車騎先之晉陽君因從之至行城郭案府庫案按同行也視倉廩召張孟談曰吾城郭之完府庫足用倉廩實矣無矢奈何張孟談曰臣聞董子之治晉陽也公宫之垣垣牆也皆以荻蒿苦楚牆之荻萑葦屬爾雅蕭荻注即蒿又繁醜狄為蒿苦蓋也楚荆也以是為牆牆牆同其髙至丈餘君發而用之於是發而試之其堅則箘簬之徑不能過也補曰箘音窘簬即簵見禹貢君曰矢足矣吾銅少若何張孟談曰臣聞董子之治晉陽也公宫之室皆以鍊銅為柱質質礎也請發而用之則有餘銅矣君曰善號令已定備守已具三國之兵乘晉陽城遂戰三月不能拔因舒軍而圍之決晉水而灌之圍晉陽三年城中巢居而處懸釜而炊財食將盡士卒病羸襄子謂張孟談曰糧食匱財元作城城力盡士大夫病吾不能守矣欲以城下謂將降何如張孟談曰臣聞之亡不能存危不能安則無為貴知士也君釋此計勿復言也臣請見韓魏之君襄子曰諾張孟談於是隂見韓魏之君曰臣聞脣亡則齒寒今智伯帥二國之君伐趙趙將亡矣亡則二君為之次矣二君曰我知其然夫智伯之為人粗中而少親粗粗同疏也正曰粗厲少仁愛我謀未遂而知則其禍必至為之奈何張孟談曰謀出二君之口入臣之耳人莫之知也二君即與張孟談陰約三軍與之期日補曰姚本原有日字夜日既夜遣入晉陽張孟談以報襄子襄子再拜之張孟談因朝智伯而出兵交使在其間故得朝之遇智過過一作果智伯之族補曰晉語智宣子將以瑶為後智果曰不如宵也弗聽智果别族於太史為輔氏通鑑取此與策先後不同轅門之外以車為門而轅外向智過入見智伯曰二主殆將有變君曰何如君智伯對曰臣遇張孟談於轅門之外其志矜其行髙智伯曰不然吾與主約謹矣破趙三分其地寡人所親之言親與二國約必不欺也子釋之勿出於口智過出見二主入說智伯曰二主色動而意變必背君不如令殺之智伯曰兵著晉陽著言附其城三年矣旦暮當拔而饗其利乃有他心不可子慎勿復言智過曰不殺則遂親之智伯曰親之奈何智過曰魏桓宣子之謀臣曰趙葭韓補補曰恐缺韓字康子之謀臣曰段規二諡皆非當時語是皆能移其君之計君其與二君約破趙則封二子者各萬家之縣一如是則二主之心可不變而君得其所欲矣智伯曰破趙而三分其地又封二子者各萬家之縣一則吾所得者少不可智過見君之不用也言之不聽出更其姓為輔氏遂去不見張孟談聞之入見襄子曰臣遇智過於轅門之外其視有疑臣之心入見智伯出更其姓今暮不擊必後之矣恐智伯以過之去之決有感動矣襄子曰諾使張孟談見韓魏之君日夜期殺守堤之吏而決水灌智伯軍智伯軍補補曰姚本有軍字救水而亂韓魏翼而擊之左右夾擊襄子將卒犯其前大敗智伯軍而禽智伯智伯身死國亡地分為天下笑此貪欲無厭也夫不聽智過亦所以亡也智氏盡滅惟輔氏存焉彪謂段規之策智伯智過之察孟談皆如在其目中可謂明也已矣此一時三晉智氏皆有士三晉之應之如響智氏獨不用之而亡則士豈非天下之重寶乎雖然水灌晉陽城之不沈者三版於此時使智伯殺韓魏之君亦難聽矣其次欲其分封二子是豈不可為與智伯惟沒於利故昏於智故孟子之說曰何必曰利智伯從韓魏兵二國兵從之以攻趙圍晉陽而水之城之元作下下補曰設衍或是之字不沈者三板郤疵晉人補曰郤刺黎反孫本作郤說文作絺姚本注元和姓纂郤已姓青陽氏之後謂智伯曰韓魏之君必反矣智伯曰何以知之郤疵曰以其人事知之矣補曰一本作夫夫當屬下句從韓魏之君而攻趙趙亡難必及韓魏矣今約勝趙而三分其地今城不沒者三板沈竈生蛙人馬相食城降有日而韓魏之君無喜志而有憂色是非反如補曰猶而何也明日智伯以告韓魏之君曰郤疵言君之且反也韓魏之君曰夫勝趙而三分其地城今且將拔矣夫二元作三補曰姚云錢劉作二家雖愚不棄美利於前補曰愚下恐當有必字背信盟之約而為危難不可成之事其勢可見也是疵為趙計矣使君疑二主之心二主自稱曰主亦非當時語而解於攻趙也解懈同今君聽讒臣之言而離二主之交為君惜之趍而出郤疵謂智伯曰君又何以疵言告韓魏之君焉智伯曰子安知之對曰韓魏之君視疵端而趍疾視端畏之趍疾避之恐疵要之與見智伯而辭屈也郤疵知其言之不聽請使於齊智伯遣之韓魏之君果反矣彪謂智伯至是眩於得而不顧其禍殆天奪其魄者至以謀臣之言質人以反夫非狂昏癡瞢孰肯自承其反哉張孟談既固趙宗廟封疆補曰談史作同太史公避父諱也一本廟作廣是發五霸元作百下同伯業不振今復發之百補曰即伯古通乃稱簡之塗稱者舉其說也此士國地君之御以告襄子曰昔者前國地君之御國地猶武安之類御則之塗有之曰五霸百之所以致天下者約衍兩字兩補曰恐字有誤主勢能制臣約者自斷之辭無令臣能制主故貴為列侯者不令在相位自將軍以上不為近大夫今臣之名顯而身尊權重而衆服臣願損補曰一本作捐功名去權勢以離衆襄子恨然曰何哉吾聞輔主者名顯功大者身尊任國者權重信忠在已而衆服焉此先聖之所以集國家安社稷乎補曰姚云劉改乎作也子何為然張孟談對曰君之所言成功之美也臣之所謂持國之道也臣觀成事聞往古天下之美同有美而同必相疾臣主之權均之補曰外紀之作而能美未之有也前事之不忘後事之師君若弗圖則臣力不足愴然有決色雖欲決去而猶愴然明不得已也一說決猶别襄子去之卧三日使人謂之曰晉陽之政臣下不使者不為國用何如對曰死僇僇戮同張孟談曰左司馬失其名見使於國家安社稷不避其死以成其忠君其行之行猶用也疑當作任補曰左司馬恐孟談自謂之辭行之者許之僇之惟闕也君曰子從事乃許之使談自從其所欲之事以其薦賢自代故許其去張孟談此下著書者美之也便厚以便名便安厚重也去權所以安其重損名所以安其名納地釋事以去權尊而耕於負親之邱趙地缺故曰賢人之行明主之政也此美襄子耕三年韓魏齊楚元作燕燕補曰下文有楚無燕必有一誤負親以謀趙言五國昔約親今背之正曰上言負親之邱不應此義頓異恐負親字衍或上有缺文襄子往見張孟談而告之曰昔者智氏之地趙氏分則多十城復來言分地多自與韓魏嘗以為言矣今復來也而今諸侯衍孰字正曰復來字恐舛誤在上當云而今諸侯復來句似順孰謀我補曰孰為我謀為之奈何張孟談曰君其負劒而御臣以之國君自為御舍臣於廟授吏大夫授談之吏以為大夫示尊顯之也臣試計之君曰諾張孟談乃行其妻之楚使妻之楚長子之韓次子之魏少子之齊四國疑而謀敗談趙之謀臣而其妻子分適四國故四國吏相疑以為厚趙也彪謂孟談有道之士也國有危難不顧萬死出入行陳以就其謀功成事遂則委而去之已去而復出以銷國家之難非有道孰能出處語默若是之裕哉范蠡始終之際賢矣方之孟談猶一間也正曰孟談可謂謀智之士有道則未也晉畢陽畢萬之後正曰無明據晉魏伯宗索士疵州犂得畢陽及欒弗忌之難諸大夫害伯宗畢陽實送州犂于荆讓乃其孫義烈有自來矣之孫豫讓始事范中行氏而不說去而就智伯智伯寵之及三晉分智氏趙襄子最怨智伯而將其頭以為飲器補曰史漆其頭說苑異日智伯與襄子飲而灌襄子之首後敗智伯漆其首為飲器索隱云案大宛傳胸奴以月支王頭為飲器裴氏引韋昭云椑榼也晉灼曰虎子也皆非椑榼所以盛酒非用飲者晉以韓子吕氏春秋並云漆智伯頭以為飲器故也豫讓遁逃山中曰嗟乎士為知己者死女為說已者容修其容色補曰司馬子長用此語死作用吾其報智氏之讎矣乃變姓名為刑人入宫塗厠欲以刺襄子襄子如厠心動索問塗者則豫讓也刃其扞扞銲同集韻矛鐏謂之銲刃施刃其端曰欲為智伯報讎左右欲殺之趙襄子曰彼義士也吾謹避之耳且智伯已死無後而其臣至為報讎此天下之賢人也卒釋之豫讓又漆身為厲補曰索隱曰癩惡瘡凡漆有毒近之多患瘡腫若癩病然故讓以漆塗身令若癩厲癩聲近假借滅鬚去眉自刑以變其容為乞人而往補曰史作行乞其妻不識曰狀貌不似吾夫其音何類吾夫之甚也又吞炭為啞變其音其友謂之曰子之道甚難而無功謂子有志則然矣謂子智則否以子之才而善事襄子襄子必近幸子子之得近而行所欲此甚易而功必成豫讓乃笑而應之曰是為先知報後知為故君賊新君大亂君臣之義者無此矣補曰無字下恐有缺字吾所謂為此者以明君臣之義非從易也且夫委質而事人而求弒之是懷二心以事君也吾所為難亦將以愧天下後世人臣懷二心者居頃之襄子當出豫讓伏於過橋下補曰一本伏所當過襄子至橋而馬驚襄子曰此必豫讓也使人問之果豫讓於是趙襄子面數豫讓曰子不嘗事范中行氏乎智伯滅范中行氏而子不為報讎反委質事智伯智伯已死子獨何為報讎之深也豫讓曰臣事范中行氏范補補曰姚本有此字中行氏以衆人遇臣臣故衆人報之智伯以國士遇臣國士名蓋一國者臣故國士報之為國士所為以報之襄子乃喟然嘆泣曰嗟乎豫子衍子字子之為智伯名既成矣寡人舍子亦已足矣子自為計寡人不舍子使兵環之豫讓曰臣聞明主不掩人之義忠臣不愛死以成名君前已寬舍臣天下莫不稱君之賢今日之事臣故補曰故固通伏誅然願請君之衣而擊之雖死不恨非所望也言有此心望不及此敢布腹心於是襄子義之乃使使者持衣與豫讓豫讓拔劒三躍呼天擊之曰而可以報智伯矣而自呼也遂伏劒而死死之日趙國之士聞之皆為涕泣刺客傳有彪謂襄子豫子皆千載人也豫子能報舊君能厲天下後世之為臣使他人為之必一失於此矣或以其無成事為空自苦夫壯士能行其志而已成不成則有命焉吾何以必之哉智伯有如此臣以國士遇之而不免於亡殆與郭君善善為輩者歟補曰讓義士也史遷列之刺客而蘇秦氏古史亦謂之非賢失之矣朱子綱目附見於三晉始命之下則以其事在前不得特書以表之爾大事記解題略見而記不書未知吕子之旨按索隱引策云衣盡出血襄子回車車輪未周而亡今無此文或以其怪而删之歟烈侯名籍襄子孫元年威烈王十八年癸酉魏文侯借道於趙攻中山魏十七年此元年趙侯將不許趙利曰過矣魏攻中山而不能取則魏必罷音疲罷則趙重魏拔中山必不能越趙而有中山矣是用兵者魏也而得地者趙也君不如許之許之大勸彼將知趙利之也必輟君不如借之道而示之不得已補曰姚本彼將知矣利之也又注劉無矣字此本趙利又舉人姓名皆難解疑有舛誤肅侯成侯子元年補曰世本名言索隱云名語成侯名種顯王二十年壬申蘇秦從燕之趙此十六年始合從說趙王曰天下之卿相人臣乃至布衣之士莫不髙賢大王之行義皆願奉教陳忠於前之日久矣雖然奉陽君妬秦傳言肅侯令其弟成為相號奉陽君妬嫉賢也正曰奉陽君說見後大王不得任事是以外賓客外疏之也游談之士無敢盡忠於前者今奉陽君捐館舍禮婦人死曰捐館舍蓋亦通稱大王乃今然後得與士民相親臣故敢進其愚忠為大王計莫若安民無事請無庸有為也安民之本在於擇交與諸侯交擇交而得則民安擇交不得則民終身不得安終趙王身請言外患齊秦為兩敵為趙敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安故夫謀人之主伐人之國常苦出辭苦言其力斷絶人之交橫人蓋然願大王慎無出於口也請屏左右白言所以異補曰史作請别白黑所以異大事記謂闕白策按索隱引䇿作言尤明陰陽而已矣陰陽言事止有兩端指謂從橫大王誠能聽臣燕必致氊裘狗馬之地齊必致海隅魚鹽之地楚必致橘柚雲夢之地韓魏皆可使致封地封內之地正曰下文封侯之類湯沐之邑貴戚父兄皆可以受封侯夫割地效實實如氊裘之類五霸之所以覆軍禽將而求也封侯貴戚湯武之所以放殺而爭也補曰此非所以言湯武蓋游士之辭今大王垂拱而兩有之是臣之所以為大王願也大王與秦則秦必弱韓魏與齊則齊必弱楚魏魏弱則割河外補曰正義云河外同華等地此即西河之外也韓弱則效宜陽皆以地與秦宜陽效則上郡絶并州郡正曰正義云上郡在同州西北則闕廣記云今鄜延安定中部寧夏綏德保安之地河外割則道不通楚弱則無援此三策者不可不熟計也夫秦下軹道秦紀注亭名在霸陵正曰故軹城在懷州濟源縣東南以下言修武之南陽知之按大事記顯王十一年韓使計息以枳道易鹿於魏水經注年表赧王三十六年秦伐魏至軹取城大小六十一皆魏之軹也軹枳通策又作咫蘇秦傳云秦下軹道則南陽危又云我下軹道南陽封冀亦指此其言秦者在雍州萬年縣東北去霸水百步軹道亭秦王降處也蘇代云楚得枳而國亡則巴郡之枳也則南陽動修武者劫韓包周則趙自銷鑠據衛取淇則齊必入朝秦欲已得行於山東則必舉甲而向趙秦甲涉河踰漳據畨吾補曰正義云畨音婆又音蒲音盤徐廣云常山蒲吾縣淇常山河漳清河皆見前則兵必戰於邯鄲之下矣此臣之所以為大王患也當今之時山東之建國莫如趙强趙地方三千里帶甲數十萬車千乘騎萬匹粟支十年西有常山南有河漳東有清河北有燕國燕固弱國不足畏也且秦之所畏害於天下者莫如趙言秦於天下獨畏趙害已然而秦不敢舉兵甲而伐趙者何也畏韓魏之議其後也然則韓魏趙之南蔽也秦之攻韓魏也則不然無有名山大川之限稍蠶食之傅之國都而止矣傅附同止兵止於此韓魏不能支秦必入臣於秦秦無韓魏之隔禍必中於趙矣猶射中的此臣之所以為大王患也臣聞堯無三夫之分一夫有田百畝此未為唐侯時正曰此說士無據之辭且舜顓頊後有國於虞其側微特在下爾禹乃崇伯鯀子亦有國土者今曰云云豈足信哉枚乘書舜無立錐之地禹無十戶之聚李善注義引韓子云云皆此類舜無咫尺之地以有天下禹無百人之聚以王諸侯湯武之卒不過三千人車不過三百乘而為天子誠得其道也是故明主外料其敵國之强弱內度其士卒之衆寡賢與不肖不待兩軍相當而勝敗存亡之機節節節目固已見於胸中矣豈掩於衆人之言掩猶蔽而以冥冥決事哉臣竊以天下地圖案之諸侯之地五倍於秦料諸侯之卒十倍於秦大國并力為一西面而攻秦秦補補曰一本復有秦字姚同破必矣今補補曰一本今見破於秦西面云云姚云一無見破於秦四字西面而事之見臣於秦夫破人之與破於人也臣人之與臣於人也豈可同日而言之哉夫橫人者皆欲割諸侯之地以與秦成與秦成則髙臺榭補臺有木曰榭美宫室聽竽笙琴瑟之音補曰史有臺榭一本無笙琴字察五味之和前有軒轅天文志權軒轅象後宫此言美人之所處也後有長庭美人巧笑卒有秦患卒猝同而不與其憂是故橫人日夜務以秦權恐喝元作猲猲正曰喝猲通見齊策此章史作愒相恐脅也前三子汝表坐恐猲並許葛反諸侯以求割地願大王之熟計之也臣聞明王絶疑去讒屏流言之迹塞朋黨之門故尊主廣地强兵之計臣得陳忠於前矣故竊為大王計莫如一韓魏齊楚燕趙六國從親以儐畔秦令天下之將相相與㑹於洹水之上補曰洹水見秦策通質刑白馬以盟之約曰秦攻楚齊魏各出鋭師以佐之韓絶食道趙涉河漳燕守常山之北秦攻韓魏則楚絶其後齊出鋭師以佐之趙涉河漳燕守雲中并州郡秦攻齊則楚絶其後韓守成臯魏塞午道王莽傳注今京城直南山有谷通漢梁道者名子午谷又宜州西慶州東有山名子午嶺南北直相當此則北山是子南山是午共為子午道詳此則午道秦南道也塞之使不得通莽所通者因秦也正曰索隱云當在趙東齊西午道地名也鄭𤣥云一從一橫為道謂交道也按下張儀說趙王章亦有趙涉河漳博關補曰博關見齊策燕出鋭師以佐之秦攻燕則趙守常山楚軍武關齊涉渤海韓魏出鋭師以佐之秦攻趙則韓軍宜陽楚軍武關魏軍河外齊涉渤海燕出鋭師以佐之諸侯有先背約者五國共伐之六國從親以儐擯秦儐元作擯無異義今並從前作儐正曰說已見前秦必不敢出兵於函谷關以害山東矣如是則霸業成矣趙王曰寡人年少蒞國之日淺未嘗得聞社稷之長計今上客有意存天下安諸侯寡人敬以國從乃封蘇秦為武安君飾車百乘黃金千鎰白璧百雙錦繡千純以約諸侯秦傳有在說燕後彪謂從約者天下之心亦其勢也夫秦有吞天下之心不盡不止諸侯皆病之而欲儐之此其心也同舟遇風胡越之相救如手足於其頭目此其勢也以天下之心行天下之勢如水之就下孰能禦之故謂之從從者從也順也其所不可者諸侯之心不一夫其心不一者非明計智算也或見小利而相侵或修小怨而相伐或眩於名實而為橫人之所恐喝此張儀所以投隙而起使諸侯之智少靈於連雞則秦人自保之不給安能圖併吞之舉即儀謂秦地形勢便兵强士武足以橫天下然則天時人和道德之威仁義之澤舉無與於興亡之數乎雖然一從一橫皆一偏之論有王者作則從橫皆廢而天下定而非所以論於此時也補曰璧純並見秦策蘇秦為趙王使於秦本傳不書反三日不得見謂趙王曰秦乃者過柱山蓋砥柱正曰無考有兩木焉一蓋呼侣招其徒一蓋哭問其故對曰吾已大矣年已長矣吾苦夫匠人且以繩墨案規矩刻鏤我一蓋曰此非吾所苦也是故吾事也事猶分補曰故固通吾所苦夫鐡銛元作鉆下同鉆然自入銛言鐵之利若鉆則鐵銸也義不合此正曰鉆玉篇其沾敕淹二反銸音鑷後漢章帝詔有鉆鎖字蒼頡篇鉆持也蓋字與鉗同以鐵有所劫束也而出夫人者人謂木屑自鐡言之為人正曰難通其義未詳今臣使於秦而三日不見無有為元作謂補曰錢劉作為臣為鐡銛鉆者乎無有言得無有也武靈王肅侯子元年顯王四十四年丙申齊破燕子噲之亂燕七年此十二年趙欲存之樂毅謂趙王曰今無約而攻齊齊必讎趙不約與國而獨攻齊故齊怨若有與同攻則怨有所分矣不如請以河東易燕地於齊齊破燕所謂地近趙趙以河東易之趙有河北齊有河東此二非郡燕趙必不爭矣是二國親也以河東之地强齊言齊得河東則益强以燕以趙輔之與之易地是輔之也天下憎之害其强必皆事王以伐齊是因天下以破齊也王曰善乃以河東易齊楚魏憎之令淖滑惠施之趙請伐齊而存燕補曰大事記按樂毅傳毅賢好兵趙人舉之及武靈王有沙丘之亂乃去趙適魏毅嘗事趙也又云趙納公子職於燕世家不書其立蓋燕人不受也張儀為秦連橫說趙王曰敝邑秦王惠使臣敢獻書於大王御史周宗伯屬官秦因之而趙亦有言此者不斥王也補曰御史周官以中士下士為之特小臣之傳命者戰國其職益親故此云云秦趙之㑹御史書事而淳于髠亦云御史在前掌記事綜察之任也秦益重矣大王收率天下以儐秦秦兵不敢出元作去去補曰疑出字函谷關十五年矣大王之威行於天下山東補曰一本無山東字敝邑恐懼懾伏繕甲厲兵飾車騎習馳射力田積粟守四封之內愁居懾處不敢動搖唯大王有意督過之也髙紀注督視責也今秦以大王之力因畏趙而飾兵故西舉巴蜀并漢中東收兩周而西遷九鼎史不書正曰遷鼎之說大言之也守白馬之津秦雖僻逺然而心忿悁悁亦忿含怒之日久矣今寡元作宣宣補曰字訛當作寡君有敝元作微微補曰史作敝甲鈍兵軍於澠池願渡河踰漳據畨吾迎戰邯鄲之下願以甲子之日合戰以正殷紂之事敬使臣先以聞於左右凡大王之所信以為從者恃蘇秦之計秦補補曰史有蘇秦字熒惑諸侯熒火光也猶眩以是為非以非為是欲反覆齊國而不能自令車裂於齊之市補曰說見楚䇿夫天下之不可一亦明矣今楚與秦為昆弟之國而韓魏稱於東藩補曰一本東藩之臣史同齊獻魚鹽之地此斷趙之右臂也夫斷右臂而求與人鬭失其黨而孤居求欲無危豈可得哉今秦發三將軍一軍塞午道補曰說見前章告齊使興師渡清河軍於邯鄲之東一軍軍於成臯驅韓魏驅驅同而軍於河外補曰正義云河外謂鄭滑州北臨河一軍軍於澠池約曰四國為一以攻趙破趙而四分其地是故不敢匿意隱情先以聞於左右臣竊元作切切為大王計莫如與秦遇於澠池面相見而身相結也臣請案兵無攻願大王之定計趙王曰先王之時奉陽君相補曰奉陽君說見後專權擅勢蔽晦先王獨制官事寡人宫居屬於師傅不得與國謀先王棄群臣寡人年少奉祠祭之日淺私心固竊疑焉以為一從不事秦非國之長利也乃且願變心易慮剖地謝前過以事秦方將約車趨行趨趣同而適聞使者之明詔於是乃以車二百乘入朝澠池割河間以事秦傳在楚韓齊後蓋此十五六年彪謂約從以難秦者趙也使秦得諸侯力足以制趙不告趙也告之者是力不足也此時諸侯惑於橫人之說皆辭屈貌從心不與也使季子可作則三國橫約可立解而坐破也武靈此時血氣未定而蘇氏兄弟適不在趙故儀得以售其恐喝之說加之數年如議服之時其必有以折儀也燕昭末年蘇代重燕而從約復舉豈非天下之心之勢矣哉甘茂為秦約魏以攻韓宜陽秦武王三年此十八年又北之趙冷向謂强國趙人曰不如令趙拘甘茂勿出以與齊韓秦市齊王閔欲求救宜陽必效縣狐氏地缺韓欲存宜陽必以路涉地缺端氏屬河東賂趙秦王武欲得宜陽不愛名寶寶之名世者齊韓之賂欲拘茂敗其約也秦賂則欲出之且拘茂也且以置公孫赫樗里疾茂不還秦則二人用武靈王平晝無事之日猶平日間居肥義趙相也餘並公族正曰鮑指公子成王孫緤趙文趙造言文造無他據元和姓纂引策云肥義趙賢人侍坐曰王慮世事之變權甲兵之用權猶度念簡襄之迹計胡狄之利補曰姚云曽本利下有乎字王曰嗣立不忘先德君之道也錯質務明主之長錯猶委臣之論也是以賢君靜而有道民便事之教動而補補曰姚云一本靜下無而字有明古先世之功先猶髙為人臣者窮有弟長辭讓之名弟順也通有補民益主之業此兩者君臣之分也今吾欲繼襄王之業啓胡翟之鄉而卒世不見也卒世猶舉世言舉世無能察此正曰正義云卒盡也愚謂猶言沒世敵弱者與弱為敵謂胡翟用力少而功多可以無盡百姓之勞而享往古之勳夫有髙世之功者必負遺俗之纍不與俗同俗所遺也有獨智之慮者必被庶人之恐所謂黎元懼焉補曰一本標恐劉作怨今吾將胡服騎射以教百姓而世必議寡人矣補曰正義云胡服今時服廢除裘裳也姚云曾本改矣字作奈何肥義曰臣聞之疑事無功疑行無名今王即定負遺俗之慮定言自定於心不為俗移殆母顧天下之議矣夫論至德者不和於俗成大功者不謀於衆昔舜舞有苗不用兵而舞干羽欲以服人亦異於俗正曰舞羽非為服苗苗格非因舞羽舜修德教苗至適當其時而禹袒入裸國非中國之禮非以養欲而樂志也欲以論德而要功也愚者暗於成事智者見於未萌王其遂行之王曰寡人非疑胡服也吾恐天下笑之狂夫之樂智者哀焉愚者之笑賢者戚焉以此異趣知俗必見遺世有順我者則胡服之功未可知也雖驅世以笑我胡地元作服補曰姚本作地史同依服字則句中山我必有之王遂胡服使王孫緤告公子成曰寡人胡服且將以朝亦欲叔之服之也家聽於親國聽於君古今之公行也子不反親臣不逆主先王之通誼也今寡人作教易服而叔不服吾恐天下議之也夫制國有常而利民為本從政有經而令行為上故明德在於論賤行政在於信貴信伸同所謂行法自近始正曰信如字言必行於貴者今胡服之意非以養欲而樂志也事有所出功有所止止猶至補曰姚云曾本改互出止字愚按此據史文事成功立然後德可見也今寡人恐叔逆從政之經補曰叔字疑衍以輔公叔之議且寡人聞之事利國者行無邪因貴戚者名不纍故寡人願慕公叔之義以成胡服之功使緤謁之叔補曰索隱句請服焉公子成再拜曰臣固聞王之胡服也不佞寢疾不能趨走是以不先進王今命之臣固敢竭其愚忠臣聞之中國者聰明睿智之所居也萬物財貨之所聚也聖賢之所教也仁義之所施也詩書禮樂之所用也異敏技藝之所試也異出類敏疾於事也逺方之所觀赴也蠻夷之所義行也以中國為有義有行補曰自中國者至此似周官大司徒文今王釋此而襲逺方之服變古之教易古之道逆人之心畔學者離中國臣願大王圖之使者報王王曰吾固聞叔之病也即之公叔成家自請之曰夫服者所以便用也禮者所以便事也是以聖人觀其鄉而順宜因其事而制禮所以利其民而厚其國也被髮文身錯臂左衽以兩臂交錯而立言無禮容補曰索隱云錯臂亦文身謂其丹青錯畫其臂孔衍作右臂謂右袒其臂也愚謂既言文身則畫臂為復恐後說是錯或袒字訛姚云劉無錯臂字一作杵面吳世家斷髮文身應劭注常在水中故以象龍子不見傷害劭語本說苑被字姚云三本作祝史作翦甌越之民也即漢東甌閩粵補曰漢東甌閩中也輿地志交趾周為駱越秦為西甌索隱云今珠崖儋耳謂之甌人是有甌越文選三越注吳越南越閩越東甌即閩越駱越甌人即南越也姚云後語作臨越注云臨亦百越之一名黑齒雕題史注以草染齒為黑雕題者刻其肌以丹青湟之鯷冠秫縫鯷大鮎以其皮為冠秫綦針也言女工之拙補曰秫即鉥字通借時補反鯷大計反犬戎之國也禮服不同其便一也是以鄉異而用變事異而禮易是故聖人茍可以利其民不一其用果可以便其事不同其禮儒者一師而禮異中國同俗而教離又况山谷之便乎故去就之變智者不能一逺近之服賢聖不能同窮鄉多異異異俗曲學多辨不知而不疑言各不知其異而不疑之異於已而不非者公於求善也今卿之所言者俗也吾之所言者所以制俗也今吾國東有河薄洛之水史記安平涇水西有漳水津名薄洛津後志安定烏枝谷名補曰淮南子嶢山崩而薄洛之水涸注謂薄洛在馮翊臨晉今按本文謂在趙東與齊中山同之恐皆非此所指未詳與齊中山同之而無舟楫之用自常山以至代上黨東有燕東胡之境西有樓煩秦韓之邊補曰正義云東胡烏丸之先也後為鮮卑在胸奴東故曰東胡括地志云東胡漢初冒頓滅之餘保烏丸山因號烏丸又曰林胡樓煩即嵐勝之北也嵐勝以南石州離石藺等趙邊邑也秦隔河也晉洛潞澤等州皆七國時韓地趙西境也而無騎射之備故寡人且聚舟楫之用求水居之民以守河薄洛之水變服騎射以備燕元作其其補曰史作燕姚引參胡樓煩秦韓之邊言參錯居其邊地正曰參史作三因音而訛也據上文則參當作東字訛且昔者簡主不塞晉陽以及上黨不塞者志在逺略而襄主兼戎取代以攘諸胡此愚智之所明也先時中山負齊之强兵侵掠吾地係纍吾民纍纍同引水圍鄗屬常山補曰光武即位於此改高邑非社稷之神靈即鄗幾不守先王忿之其怨未能報也今騎射之服近可以備上黨之形逺可以報中山之怨而叔也順中國之俗以逆簡襄之意惡變服之名而忘國事之恥非寡人所望於卿公子成再拜稽首曰臣愚不達於王之議敢道世俗之聞補曰一本聞作問與下文同今欲繼簡襄之意以順先王之志臣敢不聽令再拜乃賜胡服趙文進諫曰農夫勞力補正曰勞下恐有缺字而君子養焉政之經也愚者陳意而智者論焉教之道也臣無隱忠君無蔽言蔽猶伏國之祿也祿猶福臣雖愚願竭其忠王曰慮無變擾言能定慮則不亂於物忠無過罪過者罪之小者子其言乎趙文曰當世輔俗當猶順古之道也衣服有裳禮之制也循元作修補曰姚云一作循禮商君傳正作循朱子韓文考異著方氏說云唐人書修近循楚辭亦有誤者則此字古已混矣此下文兩有循法字為循無疑法無愆民之職也三者先聖之所以教今君釋此而襲逺方之俗變古之教易古之道故臣願王之圖之王曰卿言世俗之間言其所言不能出俗常民溺於習俗學者沈於所聞此兩者所以成官而順政也非所以觀逺而論始也若今胡服自我始也且夫三代不同服而王五霸不同教而政政言治行於下智者作教而愚者制焉賢者議俗不肖者拘焉夫制於服之民不足與論心拘於俗之衆不足與致意故勢與俗化而禮與變俱聖人之道也承教而動循法無私不敢用私意民之職也知學之人能與聞遷有所聞則改前之為達於禮之變能與時化故為已者不待人制今者不法古子其釋之趙造諫曰隱忠不竭姦之屬也以私誣國賤之類也賤謂輕國犯姦者身死賤國者族宗族滅其宗有元作反反補曰姚云劉本無反字此兩者先王之明刑臣下之大罪也臣雖愚願盡其忠無遁其死王曰竭意不讓補曰一本讓作諱忠也上無蔽言明也忠不辟危明不距人子其言乎趙造曰臣聞之聖人不易民而教智者不變俗而動因民而教者不勞而成功據俗而動者據猶依慮徑而易見也徑以步道喻其省便今王易初不循俗胡服不顧世非所以教民而成禮也且服竒者志淫俗僻者亂民是以涖國者不襲竒辟之服中國不近蠻夷之行非所以教民而成禮者也且循法無過修禮無邪臣願王之圖之王曰古今不同俗何古之法帝王不相襲何禮之循伏羲神農教而不誅黃帝堯舜誅而不怒及至三王觀時而制法因事而制禮法度制令各順其宜衣服器械各便其用故禮世不一其道禮施於世補曰宜從商君傳作治世便國不必法古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可非而循禮未足多也且服竒而志淫是鄒魯無竒行也鄒屬魯國言二國雖無竒服不無竒行正曰趙造言服竒者志淫俗辟者亂民涖國者不襲竒辟之服中國不近蠻夷之行故此舉其言而詰之按索隱云鄒魯好長纓是竒服也服非其志皆淫辟也而有孔門顔冉之屬豈無竒行哉方俗僻處山谷而人皆改易不通大化則是吳越無秀士何得有季札大夫種之屬哉今欲略改云方俗僻陋刋處山谷三字俗辟而民易是吳越無俊民也是以聖人利身之謂服便事之謂教進退之謂節衣服之謂制所以齊常民非所以論賢者也此謂進退以下補曰史進退之節衣服之制無兩謂字接下文為是故聖與俗流言其順俗賢與變俱諺曰以書為御者不盡馬之情以古制今者不達事之變故循法之功不足以髙世法古之學不足以制今子其勿反也趙記十九年有無二趙諫詞彪謂拓地開邊非有國之所先也不得已而有攘却之事嚴兵而已兵嚴而士用命雖不胡服其無成功如其不然雖易服變古何益於敗哉孟子曰行一不義而得天下不為也武靈之志欲得中山胡地而已遂舉國而夷甚矣其不權於輕重小大之差也且其所稱反古之說皆鉤金一輿羽之類古所謂以辨言亂舊政者也何足取哉而史無譏故備論之補曰史衛鞅傳與此章多同今考列於后衛鞅曰疑事無功疑行無名肥義曰同有高人之行者固見非於世有獨知之慮者必見教於民王曰有髙世之功者必負遺俗之纍有獨智之慮者必被庶人之恐愚者暗於成事智者見於未萌成大功者不謀於衆論至德者不和於俗聖肥義曰同强國不法其故茍可以則民不循其禮人茍可以王曰聖人茍可以利其民不一其用果可以便其事不同其禮甘龍曰聖人不易民而教智者不變法而動因民而教者不勞而成功緣法而治者吏習而民安之趙造曰聖人不易民而教智者不變法而動因民而教者不勞而成功據俗而動者慮徑而易見衛鞅曰龍之所言世俗之言也常人安於故俗學者溺於所聞以此兩言居官守法可也非所以論於法之外也三代不同禮而王五伯不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉王曰卿言世俗之間常民溺於習俗學者沈於所聞此兩者所以成官而順政也非所以觀逺而論始也且夫三代不同服而王五伯不同教而政智者作教而愚者制焉賢者議俗不肖者拘焉杜摯曰法古無過循理無邪邪趙造曰循法無過修禮無衛鞅曰治世不一道便國不法古故湯武不循古而王夏殷不易禮而亡反古者不可非而循禮者不足多王曰禮世不一其道便國不必法古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可衛非而循禮未足多也可慮始治不必相襲者初不全鞅趙武靈所稱民不非但所以行是言者悖耳商君傳語策具有之唯民不可與慮始而可與樂成語不襲用而用其意也史遷於趙世家所不載者二趙諫詞耳二事皆變古者也當時紀載與遷所録固不能無混歟然商君傳文法而簡策文錯以他語竒而肆可以參觀漢韓安國王恢議伐胸奴辨難之辭亦類此亦間采其數語史云趙文趙造周袑趙俊皆諫按周袑即後章周紹傅王子何者袑辭傅而未嘗諫易服也趙俊即趙燕後服者王讓之即受服史誤云諫也牛贊嘗有諫而史不言王立周紹為傅曰寡人始行補曰去聲縣過番吾當子為子之時踐石以上者踐石謂能騎乘者禮洗王石注乘馬石皆道子之孝故寡人問子以璧問以禮遺之遺子以酒食而求見子子謁病而辭人有言子者曰父之孝子君之忠臣也故寡人以子之智慮為辨足以道人危足以持難危言有危苦之時正曰危髙峻也忠可以寫意寫猶宣信可以逺期久而不渝諺元作詩詩云服難以勇治亂以智事之計也立傅以行去音教少以學義之經也循計之事先計而當行之佚元作失失而不補補曰以下句例之此恐缺不字纍訪議之行窮而不憂窮言盡事之情正曰上言勇智為事之計指胡服言行學為義之經指傅言循計謀之事雖有過失而無纍訪謀議之行雖有窮急而不憂訪議文疑放義謂放於義也故寡人欲子之胡服以傅王子元作乎補曰乎當作子大事記改周紹曰王失論矣非賤臣所敢任也王曰選子莫若父論臣莫若君君寡人也周紹曰立傅之道六王曰六者何也周紹曰智慮不躁達於變身行寬惠達於禮威嚴不足以易於位素位而行不為威嚴所移重利不足以變其心恭於教而不快快謂縱逸和於下而不危六者傅之才而臣無一焉隱中不謁隱自匿也中謂情實此疑與趙造諫本一說補曰不謁一作不竭中一作忠即趙造語臣之罪也傅命僕官傅附同比也僕猶辱以煩有司吏之恥也王請更論王曰知此六者所以使子周紹曰乃國未通於王之補胡服雖然臣王之臣也而王重命之臣敢不聽令乎再拜賜胡服王曰寡人以王子為子任欲子之厚愛之無所見醜御道之以行義勿令溺苦於學溺苦皆勞也勞於學以無導之者故也正曰醜言惡事也學言誦習也謂厚愛教之毋使見醜事以行義道之毋沈溺困苦於誦習之末也武靈安知行義蓋習聞古語猶袑之論立傅爾方務胡服騎射宜以誦習為溺苦也秦異人不習於誦而王罷之當時氣習類是焚書之禍兆矣事君者順其意不逆其志事先者先先君明其高不倍其孤故有臣可命其國之祿也子能行是所補以事寡人者畢矣書云去邪勿疑任賢勿二禹謨寡人與子不用人矣遂賜周紹胡服衣冠具帶帶飾之備也猶帶劒正曰史記胸奴傳黃金具帶音義云侍中大帶補曰淮南子云趙武靈王貝帶鵕而朝此以貝作具漢書佞幸傳孝惠時郎侍中皆冠鵕䴊貝帶注以貝飾帶黃金師比未詳蓋依章主術訓武靈王貝帶鵕而朝注鵕䴊讀曰私鉏頭三字與此小異正曰漢書黃金犀毗師古云胡帶之鉤也延篤說同大事記引又謂師比史記胥紕師犀胥一也以傅王子補曰大事記書趙惠后卒使周袑胡服傅王子解題云惠后吳娃也娃方死憐其子而將立之廢長立少之意已見於此而其論傅時有古之遺言愚謂命胡服而誦古之遺言豈其然乎趙燕後胡服服後於衆王令讓之曰事主之行竭意盡力微諫而不譁歡也應對而不怨不逆上以自伐不立私以為名子道順而不拂臣行讓而不爭子用私道者家必亂臣用私義者國必危反親以為行慈父不子逆主以自成惠主不臣也惠猶慈寡人胡服子獨弗服逆主罪莫大焉以從政為纍政胡服之政以逆主為髙行私莫大焉故寡人恐親犯刑戮之罪燕公族也故稱親正曰親身犯之也以明有司之法趙燕再拜稽首曰前吏命胡服前前日施及賤臣臣以失令過期更不用侵辱教更猶反侵辱刑也言已宜服刑王反不刑而教之正曰更改也侵辱教刑也王之惠也臣敬循衣服以待令甲令善也補曰施以豉反更居行反王破原陽屬雲中以為騎邑居騎士於此正曰破者破卒散兵以為騎牛贊趙人進諫曰國有固籍固言不變籍猶令甲正曰固故通兵有常經變籍則亂失經則弱今王破原陽以為騎邑是變籍而棄經也且習其兵者輕其敵習於敵人之兵則玩而易之便其用者此言本國械用易其難補曰易以䜴反今民便其用而王變之是損君而弱國也故利不百者不變俗功不什者不易器補曰此亦商君傳杜摯語俗作法今王破卒散兵以奉騎射臣恐其攻獲之利不如所失之費也王曰古今異利逺近易用易入音陰陽不同道四時不一宜故賢人觀時而不觀於時時猶俗也視俗而變不為俗所視制兵而不制於兵子知官府之籍不知器械之利知甲兵之用不知陰陽之宜趙居胡之南陽也欲攻胡而用趙兵非其宜也正曰陰陽之宜言天地氣化之運人事剛柔之節其詳則若范蠡之所以答越王者語見國語大事記解題周元王元年載之故兵不當於用何兵之不可易教不便於事何俗之不可變昔者先君襄王與代交地交猶接城境封之築城境上為之封城名曰無窮之門所以詔元作昭昭後而期逺也今重甲循兵趙甲重不若新甲之輕循言其因舊正曰循行也言被重甲執兵而行不可以踰險不若胡服騎射之便利不可以踰險仁義道德不可以來朝此言胡者吾聞信不棄功智不遺時今子以官府之籍亂寡人之事非子所知牛贊再拜稽首曰臣敢不聽令乎王遂胡服率騎入胡出於遺遺之門此門義取胡者古今所遺正曰無據而繆踰九限之固絶五徑之險至胡中辟地千里補曰胡中一本榆中世家二十年王西略胡地至榆中正義云勝州所治榆林也大事記謂賜周袑胡服衣冠具帶黃金師比此胡服又引水經注竹書紀年邯鄲命將軍大吏適子代吏皆貂服即胡服之事按胡廣曰趙武靈王改胡服以金璫飾前前搖貂尾為貴職或以北土多寒胡人以貂皮溫額後代效之亦曰惠文漢曰武辨曰衣冠武官冠之侍中中常侍加黃金璫附蟬為文貂尾為飾漢官儀又名鵕䴊冠愚謂貂服者此類也今之靴亦武靈所製云一本標春秋後語云武靈王十九年春正月大朝信武宫乃召肥義與議天下事五日而畢遂北略中山登黃華之上注云黃華山名也戰國策云武靈王游於大陵夢見處女鼓瑟而歌登黃華之上今按史十六年游大陵夢處女十九年大朝信武宫召肥義議事略中山至房子之代地至無窮西至河登黃華之上先後不同所載戰國策云云者今缺姑記以俟廣聞魏敗楚於陘山禽唐明楚威十一年魏敗我陘山時武靈未立懷二十八年秦齊韓魏攻楚殺唐昧此二十五年明豈昧之字邪楚王懼令昭應奉太子以委和於薛公懷二十九年使太子質於齊主父欲敗之乃結秦連楚宋之交令仇赫元作郝下章同郝補曰即赫相宋樓緩相秦楚王合元作禽禽補曰字恐訛趙宋楚與二國合正曰無據齊元作魏魏之和卒敗楚得二國之援故不與齊和正曰楚王禽以下有缺誤趙使仇元作杌下同史作仇液杌補曰仇訛赫郝之秦請相魏冉宋突齊人郝客正曰無據史作宋公索隱引策云宋交謂仇赫杌郝曰秦不聽樓緩必怨公秦時已相緩公不若陰辭樓子辭告之也請無急秦王昭王言為緩故請之不力秦王見趙之相魏冉之不急且不聽公言也公謂郝是事而不成以德樓子事成以史補此六字補曰史此下有以德樓子事成六字恐策有脫文魏冉固德公矣穰侯傳有云秦昭七年此二十六年補曰史趙人樓緩來相秦數不利乃使仇液云云於是仇液從之而秦果免樓緩而魏冉相謂趙王曰三晉合而秦弱三晉離而秦强此天下之所明也補曰明下疑有缺字秦之有燕而伐趙有趙而伐燕有梁而伐趙有趙而伐梁有楚而伐韓有韓而伐楚補曰有者善之也此天下之所明見也然山東不能易其路言易橫秦之路以合三晉正曰山東六國不能易其合秦之道以合兵弱也弱而不能相一是何秦元作楚楚補曰當作秦之智山東之愚也是臣所為山東之憂也虎將即禽走獸總名禽不知虎之即已也而相鬭兩罷補曰音疲而歸其死於虎故使禽知虎之即已決不相鬭矣今山東之主不知秦之即已也而尚相鬭兩敝而歸其國於秦智不如禽逺矣願王熟慮之也今事有可急者秦之欲伐韓梁東窺於周室甚惟寐忘元作亡補曰姚云劉本作忘之今南攻楚者惡三晉之相合也合合楚也楚强晉弱先攻其强則弱者沮不敢合矣今攻楚休而復之休罷兵復復攻補曰復扶又反已五年矣先是秦取漢中取召陵又敗之重丘攘地千餘里今謂楚王懷茍來舉玉趾而見寡人必與楚為兄弟之國楚懷三十年秦昭去然此二十七年必為楚攻韓梁反楚之故地楚王美秦之語怒韓梁之不救已必入於秦秦補有謀故發元作殺補曰姚云殺劉作發使之趙以燕餌趙言欲與趙攻燕而離三晉韓魏時不合秦而趙合之必不善趙今王美秦之言而欲攻燕攻燕食未飽而禍已及矣楚王入秦秦楚為一東面而攻韓韓南無楚北無趙美秦反地餌燕之說故不救韓亦離三晉之策也韓不待伐割挈馬兔補曰一本作免下同而西走割地挈而走秦疾於馬兔秦與韓為上交秦禍安移於梁矣禍兵禍安言其不勞正曰姚云改安作案以秦之强有楚韓之用梁不待伐衍矣字矣補曰姚云一無矣字割挈馬兔而西走秦與梁為上交秦禍案環中趙矣案安同故荀卿書多用案字此言秦視趙在其度內如物在環中環中一作移於字可也正曰姚本案攘於趙愚以攘即移字訛當作移於鮑本說是補曰姚注引荀子上不能好其人下不能隆禮安將將學雜識志順詩書而已耳云云注安語助猶言抑也或作案荀子多用此字禮記三年問作焉吕氏春秋吳起謂商文曰今置質為臣其主安重釋璽辭官其主安輕蓋當時人通以為語助或方言耳以强秦之有韓梁楚與燕之怒秦有三國趙之患也燕又怒之割必深矣秦割趙地國之舉此國謂趙舉猶行臣之所為來臣故曰事有可急為者及楚王之未入也三晉相親相堅堅其約出鋭師以戍韓梁西邊楚王聞之必不入秦秦必怒而循攻楚循前而攻是秦禍不離楚也便於三晉若楚王入秦秦補見三晉之相合而堅也必不出楚王恐其合晉即多割楚求出故是秦禍不離楚也有利於三晉願王之熟計之也急重言急以促之補曰一夲無急字是此下蓋叙述者之辭趙王因起兵南伐山戎戎近秦伐之以逼秦戍元作翟補曰一本作戍韓梁之西元作惡補曰一本作西邊補曰姚本有戍無伐山戎三字是秦見三晉之堅也果不出楚王衍卬字卬補曰字誤衍姚云劉改作卬亦難通而多求地彪謂從橫之說未有善於此者也趙少嘗之其效已見是以知張儀之可折也然其效不大見於後則是諸侯之不一也非其計之不明不智也吁惜哉補曰此策自割必深矣以上其論從橫之利害當矣自事有可急者以下勸三晉之相堅而移禍於楚亦未得為盡善蓋陳軫不得已之計也愚考齊策秦攻魏陳軫合三晉而東章及韓燕策與此章多合此章言楚王入秦正秦誘懷王武關之歲在赧王十六年詳見齊策所為為楚為來之為去聲富丁趙人欲以趙合齊魏樓緩欲以趙合秦楚富丁恐主父之聽樓緩而合秦楚也司馬淺趙人為富丁謂主父曰不如以順齊齊本欲伐秦今順之今我不順齊伐秦秦楚必合而攻韓魏無齊之難因得取其鄰也韓魏告急於齊齊不欲伐秦上言順齊伐秦此又言齊不欲伐者前時秦楚未合今合故也必以趙為辭以趙不順齊伐秦告二國則不補補曰則下宜有不字伐秦者趙也韓魏必恐趙齊之兵不西不伐秦韓必聽秦違齊畏秦故違齊而親秦親韓兵必歸於趙矣今我順而齊不西韓魏必絶齊絶齊則皆事我且我順齊齊無不元作而而補曰字訛或上文有誤西日者言昔日樓緩坐魏時欲離齊魏坐言有所待三月不能散齊魏之交言二國本親宜與之伐秦今我順而齊魏果西是罷齊敝秦也罷疲同趙必為天下重國主父曰我與三國攻秦韓魏齊為三是俱敝也曰不然我約三國而告之衍秦字秦補曰恐衍以未講元作構構中山也此言可以少出兵也此二十七年趙破中山未滅也趙宜自備三國欲伐秦之果也必聽我欲和我使趙與中山講中山聽之是我以三國元竹王因王因補曰當作三國字訛饒中山而取地也饒猶益也以三國欲和我故益得取地於中山中山不聽三國必絶之是中山孤也三國不能和我雖少出兵可也我分兵而孤衍樂字樂補曰字誤或衍中山必之我之猶去補曰一本之作亡是已亡中山而以餘兵與三國攻秦是我一舉而兩取地於秦中山也補曰中山說見齊策此策當在上章之前多誤字為富之為去聲魏因富丁且合於秦丁本欲以趙合齊魏今魏欲因以合秦趙不聽故趙恐請效地於魏而聽薛公文時合齊魏教子咳或者教之咳趙人正曰無考謂李兊曰趙畏橫之合也合秦故言橫故欲效地於魏而聽薛公公不如令主父以地資周最而請相之於魏周最以天下厚秦者也今相魏魏秦必虛矣厚秦而舍之相魏秦必惡之故二國不合虛言其不合也齊魏雖徑無秦不能傷趙魏王哀正曰襄聽是輕齊也齊亦惡最故正曰最於齊厚語見周策魏用齊所厚以為相是輕齊也秦魏雖徑無秦不能得趙此利於趙而便於周最也惠文王武靈王子元年補曰名子何赧王十七年癸亥三國攻秦魏哀二十一年與齊韓共攻秦此元年正曰襄趙攻中山取扶栁屬信都補曰漢志其地有扶澤澤中多栁故名五年以擅呼沱擅言固有之齊人戎郭宋突雖齊人而倍齊謂仇赫元作郝郝曰不如盡歸中山之新地元作坔武后時字耳今並從古此謂扶栁正曰姚云竇蘋唐史釋音云坔地字見戰國策今策中間作埊安知非自武后時傳寫相承如臣作惡之類然古文乃作坔又鶡冠子亢倉子皆有埊字恐有自來愚按鄭氏書略籀文地作坔武后蓋有所本意本書坔而後轉從埊歟後多此字以義通不復出埊中山案此言於齊案猶據曰四國趙與上三將假道於衛以過章子之路地缺蓋章子以齊軍守此正曰無考齊聞此必效鼓莒鼓里是也濟南又有二鼓腹擊他國人仕趙為室而巨荆敢楚人仕趙正曰無據荆軻衛人荆豈專為楚姓言之主謂腹子曰何故為室之巨也腹擊曰臣羇旅也爵髙而祿輕宫室小而帑不衆帑金幣所藏正曰帑孥通詩注子孫也金幣與衆義不協主雖信臣百姓皆曰國有大事擊必不為用今擊之巨宫將以取信於百姓也主君曰善此曰主曰主君主父故在也然則上章五當作三正曰齊侯使髙張言公稱主君子家子曰齊卑君矣主君大夫之稱也秦策甘茂引樂羊曰主君之功魏策魯侯擇言稱主君之尊云云蓋三晉以大夫為諸侯故猶仍之趙稱襄主簡主是也策後亦多稱主武靈自稱主父與稱主者不同此策時不可考鮑妄置於惠文時故為之說又齊韓魏攻秦在惠文元年滅中山在三年大事記從世家以年表為誤愚考中山亡實在前見齊策主父死在四年上章五年自有所指初不與此相涉安得以此改彼文也補曰巨宫以信百姓誑主甚矣蘇子元作秦下同秦補曰字誤下同說李兊曰雒陽乘軒車蘇子元作秦秦補曰一本乘軒里既曰乘軒車而下又云無罷車駑馬則此作里字為是河南志洛陽城東御道北孝義里西北隅有蘇秦冢家貧親老無罷車駑馬罷疲同猶敝也車勞則敝桑輪蓬篋羸元作嬴嬴正曰說見秦策蘇秦章幐負書擔囊補曰姚本負擔槖觸塵埃䝉霜露越河漳元作漳河漳河補曰濁漳合清漳東北至阜城入北河漢初漳猶入河其後河徙入東而漳自入海䇿中凡言漳河河漳者以漳入河相連也此下又有漳河字足重繭繭足胝也日百而舍日行百里乃就舍造外闕願見於前口道天下之事李兊曰先生以鬼之言見我則可若以人事兊盡知之矣蘇子秦對曰臣固以鬼之言見君非以人之言也李兊見之蘇子秦曰今日臣之來也暮後郭門郭門後至不及其開時藉席無所得藉謂借寄宿人田中旁有大叢補曰叢見秦策夜半土梗與木梗土亦言梗因木為類也補曰說見齊策鬭曰汝不如我我者乃土也補曰姚云曾去者字愚謂有者字語勝使我逢疾風淋雨淋言其大能沃物壞阻乃復歸土今汝非木之根則木之枝耳汝逢疾風淋雨漂入漳河東流至海泛濫無所止臣竊以為土梗勝也此喻不切於兊之事蓋以鬼事發其言耳今君殺主父而族之殺在四年言族則其宗多死者君之立於天下危於纍卵君聽臣計則生不聽臣計則死李兊曰先生就舍明日復來見兊也蘇子秦出李兊舍人謂李兊曰臣竊觀君與蘇公談也其辨過君其博過君君能聽蘇公之計乎李兊曰不能舍人曰君即不能願君堅塞兩耳無聽其談也明日復見終日談而去舍人出送蘇君蘇子秦謂舍人曰昨日我談粗而君動今日精而君不動何也舍人曰先生之計大而規髙吾君不能用也乃我請君堅塞兩耳無聽談者雖然先生明日復來吾請資先生厚用言使兊厚而用之正曰用財費也明日來抵掌而談李兊送蘇子秦明月之珠覽冥訓注隋侯珠云和氏之璧卞和所獻楚文王者補曰趙得楚和氏璧秦昭王欲以十五城易之李兊所送必非黑貂之裘黃金百鎰元作溢溢蘇子秦得以為用西入於秦補曰蘇秦之死在慎靚王四年去主父見殺時逺甚此策言殺主父事非秦明矣其代厲歟首尾亦與秦策蘇秦章類抑本言秦事而𠞰入後事歟土梗木梗之喻與齊策上田文說同彼亦秦死後事而指為秦皆不合太史公所謂異時事有類之者皆謂之蘇秦其此類耶趙王封孟嘗君以武城屬清河即下東武城北當田文奔薛後正曰無考孟嘗君擇舍人以為武城吏而遣之曰鄙語豈不曰借車者馳之借車與衣固將馳且被也今云然蓋常常馳被而弗愛也借衣者被之哉補曰被姚叶音披皆對曰有之孟嘗君曰文甚不取也夫所借衣車者非親友則兄弟也夫馳親友之車被兄弟之衣文以為不可今趙王不知文不肖而封之以武城願大夫之往也毋伐樹木毋發屋室訾然使王悟而知文誓不思稱意也言其不期得知而見知知其善任人也補曰一本知文也謹使遣吏之辭可全而歸之正曰謹使屬下句使如字補曰一本標御覽發作廢謹作僅齊欲攻宋閔三十八年此十三年正曰閔二十八年秦令起賈人姓名禁之齊乃援元作救救補曰姚云救一作收大事記取趙以伐宋以趙自助補曰齊欲攻宋乃收趙以助已實未伐也故趙李兊合五國以伐秦大事記梁王二十九年先書趙李兊約五國伐秦後書齊滅宋解題云此大事記見於策者前後非一章史乃略不載策亦不載伐秦之年然兵端起於秦怨趙助齊伐宋故附齊滅宋年秦王昭怒屬怨於趙李兊約五國以伐秦韓趙魏燕齊也史不書獨趙策見之補曰大事記書楚齊趙韓魏按魏策五國約而攻秦楚王為從長不能敗秦兵罷而留成臯與此李兊約五國攻秦無功留天下兵於成臯相合文謂兊雖主謀楚猶以大國為從長據此故也按楚王為從長乃懷王十一年蘇秦約楚齊趙韓魏燕伐秦也秦紀無楚年表無齊故以五國稱楚世家書特詳諸侯至函谷關擊秦不勝而歸其事又相類兵罷留成臯一語記者遂誤附之非李兊合從時也按兊伐秦時當楚頃襄王十二年七年楚迎婦於秦十四年與秦昭王好㑹於宛中間未嘗搆兵大事記據下章書楚齊趙韓魏又據魏策國遂長楚考之下章雖有楚而不明言在五國之數後亦屢言燕是時固有燕矣又此章勸齊劫天下未及秦而后楚下章云齊將攻宋秦楚禁之可見秦楚方睦必無楚伐秦之事矣鮑以五國為韓趙魏燕齊者得之然趙當首書無功留天下之兵於成臯而隂講元從手從冓補曰姚云曾作講大事記同以下有已講字故也於秦又欲與秦攻魏以解其怨解秦怨而取封焉自封之封非封地正曰下文言取隂定封魏王昭不說之齊人補正曰大事記魏王不說齊人謂王云云愚謂之齊上有缺文當是人姓名謂齊王曰臣為足下謂魏王曰三晉皆有秦患今之攻秦也為趙也本以秦屬怨於趙故五國伐趙此設辭也言趙初約伐秦今乃與秦講若同伐趙趙可亡也趙必亡矣齊逐李兊講秦背齊不伐宋者兊也正曰姚本作秦逐大事記取李兊必死今之伐秦也以救李子之死也今趙留天下之甲於成臯而隂鬻之於秦已講則令秦攻魏以成其私封王之事趙也何得矣且王嘗濟於漳而身朝於邯鄲抱陰成成屬涿郡又孔子世家注太山巨平有武城正曰隂成未詳鮑注皆非魏地負蒿地缺葛孽元作薛趙記注在馬丘又葛城在髙陰屬涿郡薛補曰當作蘖正曰抱負言其勢按魏魏策葉陽君約魏魏王將封其子謂魏王曰王嘗身濟漳朝邯鄲抱葛薛陰成以為趙養邑據此文則蒿字因葛而誤衍四邑皆魏地趙世家遇於葛孽則知此文薛字誤也徐廣云薦三闕則丘正義引括地志云二闕魏縣西南為趙蔽而趙無為王行也今又以河陽屬河內姑密闕地未詳封其子兊子正曰說見後而乃令秦攻王以便取陰正曰平下二章俱有三其文則時闕文木而取此乃宋地也傳昭十九年公尹赤遷陰於下陰乃襄之闕非此闕指也齊策三子說齊王伐宋之三曰有太平陸則梁闕不啓闕南陽則亦指在六成者誤矣史記作闕平陸蓋平陸兖州縣定陶今闕州皆大梁之東時皆闕宋闕之定闕也濟陰之名後出抑闕曰陰歟按史闕陶邑必陶徐廣曰陶一作闕闕必亡史作亡魏策陰啓史作陶字陶陰字易盛定陶見有魏冉冢作陰者謀是有以闕誤此說是也劉歆七略云古文闕以陶為陰然則陰之為陶信矣人比然而後知賢不言人必以類相比乃可知如王言如今王者正曰下有若字如王若用不成文當以王字句言人以類相比知賢不如王若用所以事趙之半收齊天下有敢謀王者乎王之事齊也無入朝之辱無割地之費齊為王之故虛國於燕趙之前虛國謂悉出兵用兵於二千里之外故攻城野戰未嘗不為王先被矢石也得二都割河東盡效之於王自是之後秦攻魏齊未嘗不歲至於王之境也補曰一本齊甲請問王之所以報齊者可乎韓珉元作吻從韓策後並同吻正曰珉吻未知孰訛且當各依本文處於趙吻下皆齊人之去齊者正曰韓吻必韓人韓策云吻相齊趙策有韓珉趙世家惠文十三年虞髙無見除薛公為齊人餘無考去齊三千里王以此疑齊吻處趙意别有謂以其在趙疑齊相趙曰有秦隂疑齊親趙因私於秦以趙嘗講秦也今王又挾故薛公以為相史稱文去齊如魏在閔王三十八年後按此則其如魏以齊王驕也伐宋前已去齊矣正曰大事記孟嘗君去齊相魏附赧王二十九年齊伐宋前說見東周策善韓徐以為上交尊虞商以為大客皆齊人之去齊者王顧元作固固可以反疑於齊乎用齊之所不善失在魏也安可疑齊補曰此語大事記取於補曰此下恐當有是字魏王聽此言也甚詘此下此士自陳其說魏之效詘猶順正曰韻書詘辭塞也其欲事王齊王也甚循其怨於趙言其事齊比於怨趙則又順也正曰循姚云曾作修則當屬上文愚謂以甚循句文勢順於趙下有缺文或其怨於趙句因下文衍臣願王之補曰臣願王之王謂齊王下並同亟元作日日補曰一本作重是聞魏與魏相聞而無庸見惡也臣請為王推其怨於趙推猶移怨魏怨願王之陰重元作日日補曰上列字當是重趙而無使秦之見王之重趙也秦見之且亦重趙天下得趙則强使秦知齊重趙恐齊强亦必重之齊秦交重趙臣必見燕與韓魏亦且重趙也皆且無敢與趙治治猶校三國事趙補曰姚作五國趙從親以合於秦必為王高矣言趙居齊上臣故欲王之遍劫天下而皆私甘之也私則所謂無使見也甘言說之補曰遍劫者衆脅之以威私甘者獨說之以言王使臣以韓魏與燕劫趙使丹也甘之丹順皆人名以趙劫韓魏此下皆且甘且劫使臣也甘之以三晉劫秦使順也甘之以天下劫楚使珉吻也甘之則天下皆逼秦以事王自以見逼於秦也秦於天下有逼而已不如齊之有劫有甘也正曰相與逼秦也逼者侵迫也而不敢相私也交定而後王擇焉此章亦可為齊姑因舊齊將攻宋而秦楚禁之補曰姚本楚作隂齊因欲與趙趙不聽齊乃令公孫衍說李兊以攻宋而定封焉李兊乃謂齊王閔曰正曰下李兊二字必誤下云使公孫衍說奉陽君即述上文令公孫衍說李兌也其下豈得為兌言乎又後有循燕觀趙語以為兌言則不通臣之所以堅三晉以攻秦者非以為齊得利秦之毁也不以毁秦為齊之利欲以使攻宋也而宋置太子以為王下親其上而守堅臣是以欲足下之速歸休士民也今太子走諸善太子者皆有死心太子為王及走史不書太子為王矣而走必王之黨逐之故太子之人以死報之若復攻之其國必有亂而太子在外此亦舉宋之時也已臣為足下使公孫衍說奉陽君蘇秦從時已言奉陽死豈或襲稱如馬服者乎補曰按史蘇秦傳趙肅侯令其弟成為相號奉陽君弗說秦秦去之燕秦陽君死秦復說肅侯稱奉陽君捐館舍而張儀之說武靈王亦謂先王時奉陽君相專權擅勢蔽晦先王然武靈胡服請於公叔成而成與李兌弒主父則是肅侯之世成未亡何其前後相戾邪故大事記從古史定以奉陽君為公子成而削去捐館之語考之策屢言奉陽君而趙策尤著見於李兌約五國伐秦後謀取宋之時蘇秦說趙當肅侯十六年而五國伐秦在惠文十三年相去五十年公子成執國柄何久也史策明言捐館舍豈得皆誤武靈易服之請猶惓惓敬事其答張儀豈得公言其罪而無所諱哉荀子以奉陽君為闕臣而楊偉注亦疑非公子成蘇秦所值者必别一奉陽君非公子成明矣然則奉陽君果公子成乎曰謂奉陽君為公子成亦史遷之言而䇿無明文也五國攻秦時成兌方並用以成為奉陽君其時則可矣愚嘗反覆策文而有疑焉趙策言李兌約伐秦無功隂講於秦欲與秦攻魏以解怨取陰以定封又云齊令公孫衍說李兌以攻宋定封又云公孫衍說奉陽君封地莫善於宋莫如於陰又蘇代謂齊王臣為足下說奉陽君天下散而爭秦陰必不可得既言李兌取陰又言奉陽君取陰不應為二人事竊以為李兌即奉陽君也何以明之趙策說魏之辭曰李兌留天下之甲於成臯令秦攻魏以成其私王嘗身朝邯鄲抱陰成負葛孽為趙蔽今又以河陽姑密封其子魏䇿則曰葉陽君約魏魏王將封其子謂魏王曰云云正與前同則知葉陽者奉陽之訛奉陽君之為李兌其徵一也趙策蘇代說奉陽之辭曰五國願得趙與韓氏大吏東勉齊王必無召元作名有說見本條民燕策代舉奉陽君之辭曰齊王使公王曰命說曰必不反韓氏今召之矣其事亦同奉陽自稱說說者兌之訛奉陽君之為李兌其徵二也燕策又有奉陽君李兌甚不取蘇秦之言奉陽君李兌者並舉其封邑姓名言之也其下誤以蘇代為蘇秦則亦因蘇秦所云而然說見本傳奉陽君之為李兌其徵三也按趙世家公子成李兌既殺公子成田不禮而定王室公子成為相號安平君則安平乃成之封史表安平屬上郡吾志深州有安平縣元屬定州皆趙地也奉陽則未有考而非奉陽矣史遷不明奉陽君為二人又誤以為公子成是以紛紜殽舛論者莫知所從今以策文考之而得其說如此餘見各章可參觀也曰君之身老矣封不可不早定也為君慮封莫若於宋他國莫可夫秦人貪韓魏危近秦故燕楚僻元作辟辟中山之地薄補曰時中山已滅此言其故地爾莫如於陰失今之時不可復得已宋之罪重齊之怒深殘亂宋德元作得得補曰得字訛夫早定身封此百代一時也已奉陽君甚貪元作食食正曰恐貪字訛之唯得大封齊無大異言奉陽欲得陰以大其封而齊待之未有異數不可臣願足下之大發攻宋之舉而無庸致兵以觀奉陽君之應足下也縣陰以甘之許之而未與故曰縣循有燕以臨之循言與燕順臨猶制也不徒甘之必或制之而臣待忠之封待猶將忠猶實也王許之封而已實之正曰勸之定封故曰臣且將忠之以封事必大成臣又願足下有地效於襄安君蓋趙人正曰無考以資臣也足下果殘宋此兩地之時也言有齊又得宋正曰兩地言齊與趙可並得宋地此謂齊王言豈得言有齊乎足下何愛焉若足下不得志於宋與國何敢望也與國趙也言奉陽襄安不敢望封正曰上言兩得地此言齊不得志則趙不敢望足下以此資臣也臣循燕觀趙觀言其無所事則足下擊潰而決天下矣潰潰癰也蓋喻其制天下之易也決猶制正曰潰壞也此喻宋擊潰壞之宋而決制天下矣補曰公孫衍為秦相而逐在秦武王四年武靈王之十九年也後為魏所殺雖不知何年然去李兊合從時已逺此公孫衍恐非犀首也考之秦䇿亦有宋罪重止百世之一時已數語彼以為穰侯之言亦此時事也說見後為足為君之為去聲齊攻宋奉陽君不欲客謂奉陽君曰君之春秋高矣而封地不定不可不熟圖也秦之貪韓魏危燕元作衛衛補曰上章作燕楚僻元作正蓋僻匹聲近匹又訛作正字補曰宜注元文下正中山之地薄宋罪重齊怒深殘伐亂宋定身封德强齊此百代之一時也補曰趙策說奉陽君取陰之辭自宋罪重以下至百世之一時已凡兩見而秦策亦有之以為謂穰侯趙策又曰魏冉必妬君之有陰按陰即陶宋地冉所封也秦紀昭王十二年樓緩免穰侯魏冉為相十六年冉免封公子市宛公子悝鄧魏冉陶為諸侯冉傳云免樓緩而魏冉相冉謝病免以燭壽為相燭免復相冉乃封於穰後益封陶號曰穰侯大事記先書穰侯魏冉為相封陶後書復以魏冉為丞相封於穰與陶謂之穰侯又封公子市為宛侯公子悝為鄧侯穰又謂三子之封皆取於他國秦去年取宛今年取鄧陶雖不載何年得之蓋亦近歲按赧王十四年秦伐韓取穰大事記已書之矣獨以陶為近歲所取則眩於史文未考其實且據秦紀則冉始相已封穰後相封陶於傳則復相時封穰後益以陶已有不合大事記從之亦偶未察獨見於策者可考李兌約五國伐秦後欲取陰定封說穰侯者亦勸之策文容有復混而其事實並一時是時齊欲攻宋秦禁之齊欲與趙故說者勸李兌上距冉復相秦五歲爾使冉已封陶兌安得欲之而言者亦安得云冉妬君之有陰因此言而知冉之未封陶而欲得之也其後齊滅宋兩年而為五國所破趙既不取陶而齊亦卒不能有穰侯之取陶在此時歟或謂魏策謂穰侯云君攻楚取宛穰以廣陶封似封陶在前竊謂秦之取穰冉之封穰固無疑矣獨取陶定封歲月不載而史所謂後益封陶號曰穰侯者辭亦不明意者陶之封大而入厚冉國於陶如取剛壽之類皆云廣陶封故魏策之言如此而宛亦非冉封不足據信使冉封陶當曰陶侯而稱穰侯知始封穰必并誤也五國伐秦無功罷於成臯趙欲講元從才從冓下同搆正曰本又惟堅約而講君必無講二處作講字今當悉從舊於秦楚與韓魏將應之齊弗欲蘇代謂齊王閔曰臣已為足下見奉陽君矣臣謂奉陽君曰天下散而爭秦爭一作事爭先事之秦必據宋魏冉必妬君之有陰也秦王貪魏冉妬則陰不可得已矣君無講搆齊必攻宋齊攻宋則楚必攻宋魏必攻宋燕趙助之五國據宋不至一二月陰必得矣得陰而講搆秦雖有變君無患矣趙非不可以與秦講而不可獨講獨講則示秦弱秦必輕之今助四國攻宋而得陰是五國為一也不懼秦矣若不得已而必講搆據此時趙可以無講故云正曰不得已而必講非可以無講也疑此句已字誤上句得陰而講此句當云不得陰而必講乃順則願五國復堅約同伐秦也先伐後講則不示弱五國補兩字願得趙時趙强故足下雄飛雄者衆雌所從與韓氏大吏東勉元作免免補曰免即勉通齊王必無名禁補正曰姚本必無召吻也此名字訛當作召珉吻也元作民下同前齊嘗使韓珉處趙有秦私也今王國約講秦勉齊同之諸國必無辭止珉使無私秦正曰燕策蘇代說燕之辭曰奉陽君告朱歡與趙足曰齊王云云必不反韓珉今召之矣此名字當作召無疑前策言韓珉處趙魏疑齊有秦私韓策秦王曰韓珉與我交又云韓珉相齊此下文云天下爭秦秦內韓珉於齊珉蓋韓人之善於齊秦者今代勸奉陽君合諸侯與韓氏大吏勉齊王共合從則齊必不召珉也使臣守約若與國秦本非與今講必使之如與也正曰與國言五國也故云有倍約者則四國攻之無倍約者而秦侵敗約則五國復堅擯之有倍約者倍並音背以四國攻之無倍約者而秦侵約五國復堅而儐元作賓賓補曰擯通莊子賓於鄉里之今韓魏與齊相疑也若復不堅約而講此因舊臣恐與國之大亂也齊秦非復合也必有觭元作踦下同踦重者矣角一俯一仰曰觭言有偏重正曰公羊傳踦閭何休說開一扇閣一扇一人在內一人在外曰踦說苑切踦即倚字義皆訓偏後合與觭踦重者皆非趙之利也補曰後合即上復合且天下散而事秦是秦制天下也秦制天下將何以天下為天下自為秦用趙無所用之也臣願君之蚤計也天下爭秦有六舉補曰爭秦一本此下皆作事秦皆不利趙矣天下爭秦秦王昭受負海衍內字內之國山東皆負海正曰三晉非負海也恐負字因下文衍合負親之交天下嘗橫而親秦矣已而負之今復合之以據中國而求利於三晉是秦之一舉也秦行是計不利於趙而君終不得陰一矣天下爭秦秦王內韓珉吻於齊內成陽君於韓相魏懷於魏此皆其國人之與秦事者故秦納之正曰韓吻非齊人復合衍公孫衍時相魏雅不善秦今相懷因使合之正曰公孫衍非犀首說見前交兩王秦魏正曰上言齊韓魏此兩王謂燕趙也王賁韓他之楚元作曹此皆秦人曹正曰曹輩也下有皆字文勢宜然五國必無楚韓他恐韓人餘無考皆起而行事是秦之一舉也秦行是計也不利於趙而君不得陰二矣天下爭秦秦王受齊受趙三强三親此三皆强國自相親以據魏據猶臨之而求安邑秦求之是秦之一舉也秦行是計齊趙應之魏不待伐抱安邑而倍秦此倍益也補曰姚本倍作信秦得安邑之饒魏為上交韓必入朝秦過趙已安邑矣過猶勝也言秦行此䇿不論其他止得安邑已勝於趙矣補曰已以通言秦之勝趙以得魏之安邑按魏獻安邑在赧王二十九年大事記書於五國伐秦之前據此策則伐秦後事也舉此下姚本復有是秦之一也六字秦行是計不利於趙而君必不得陰三矣天下爭秦秦堅燕趙之交以伐齊收楚與韓珉吻而攻魏伐齊得之則吻為用正曰前言內韓吻於齊者謀如此也吻自善於秦者前時魏疑其有秦私必不合於魏故使之攻魏是秦之一舉也秦行是計而燕趙應之燕趙伐齊兵始用交鋒之初秦因收楚而攻魏三國交鋒勢不得解故得以此時收攻二國不至一二月魏必破矣秦舉安邑而塞女㦸地缺正曰女㦸地名在太行西韓之太原絶補曰太原正義以為太行當是說見燕策下軹元作咫咫補曰說見前道南陽而元作髙髙補曰疑字有誤伐魏絶韓包二周即趙自消爍矣國燥於秦燥猶爍補曰姚本注燥一作爍兵分於齊非趙之利也而君終身不得陰四矣天下爭秦秦堅三晉之交攻齊國破財元作曹補曰一本作財屈三晉破屈也而兵東分於齊兵分謂魏正曰謂三晉秦按兵攻魏取安邑此與上始用兵而攻收同正曰不同是秦之一舉也秦行是計也君按救魏按謂安然正曰即上文按兵之按是以攻齊之已敝救之而補兩字正曰一本無救字救即敝字訛衍與秦爭戰也君不救也韓魏焉免西合合合秦補曰焉於䖍切國在謀之中在秦謀中而君有終身不得陰五矣有猶又補曰姚云劉作又天下爭秦秦案為義存亡繼絶固危扶弱定無罪之君必起中山與勝焉勝中山之後正曰無據秦起中山與勝而趙宋同命此時宋小弱言趙失中山聽命於秦與宋同也何暇言陰六矣故曰君必無講則陰必得矣奉陽君曰善乃絶和於秦而收齊魏以成取陰補曰蘇代為燕反間勸齊伐宋將以敝齊其勸趙之共攻者恐趙之合秦而齊秦方惡爾然趙卒不合齊伐宋者害齊之驕而止歟抑别有故也按燕策蘇代說燕於趙以伐齊奉陽君不聽乃入齊惡趙令齊絶於趙又代謂燕昭王曰臣離齊趙齊趙已孤矣趙之不合齊其後竟合燕以破齊殆以此歟留大事記齊湣王與魏楚滅宋三分其地魏得其梁陳齊得其濟隂東平楚得其沛考之史年表齊魏世家皆止言齊滅宋獨宋世家稱與楚魏伐宋三分其地此大事記所據也按蘇代說燕之辭曰齊王南攻楚西困秦又以其餘兵舉五千乘之徑宋謂秦之辭曰攻宋所以為王也齊强輔之以宋楚魏必恐恐西事秦使當時齊與楚魏合其言豈若是乎史稱齊既滅宋南割楚之淮北西侵三晉是其乘滅宋之强併奪楚魏地而謂與之分宋地豈其實哉樂毅勸燕昭王約趙楚魏伐齊其言曰王若欲攻齊莫若結於趙且又淮北宋地楚魏之所欲也年表燕破齊之年書楚趙取齊淮北大事記因之按此言則楚魏分地當是樂毅破齊後事宋世家所記者豈非得邪趙收天下且以伐齊蘇厲元作秦秦補曰史作厲為補曰去聲齊上書說趙王曰臣聞古之賢君德行非施於海內也教順慈愛非布於萬民也祭祀時享非當於鬼神也甘露降風雨時農夫登穀熟曰登年穀豐盈衆人善之而賢主惡之惡心不安也以其無以致之故補曰一本喜之今足下功力謂戰伐非數痛加於秦國而怨毒積惡非曾深陵於韓也補曰曾恐即增姚云曾本作非素深於韓臣竊外聞大臣及下吏之議皆言主前專據言行之不疑以秦為愛趙而憎韓臣竊以事觀之秦豈得愛趙而憎韓哉欲亡韓吞兩周之地故以韓為餌趙時惡韓故秦以亡韓悅趙趙遂以為愛己也補曰秦兩憎韓及以韓為餌之韓史並作齊說見後且亡韓吞兩周文義明作齊則不順先出聲於天下欲鄰國聞而觀之也觀其愛趙恐其事不成故出兵以佯示趙魏虛以伐韓示之恐天下之驚覺故微伐補補曰微下有缺文史作微兵於韓以威之韓以二之二猶疑恐天下疑已故出質以為信聲德於與國而實伐空韓如上文則伐韓非秦所急也此言實伐者韓之在秦掌握中物耳故不急於伐恐趙不以為德故終伐之其伐之亦欲以吞周而非愛趙也正曰實欲伐空虛之韓臣竊觀其圖之也議秦以謀計議猶意正曰一本議以為秦計謀必出於是且夫說士之計皆曰韓亡三川魏滅晉國晉國謂安邑是元作恃恃補曰恃非所恃也韓未窮而禍及於趙三晉唇齒之國故韓亡則魏滅魏滅而禍及於趙不待言也且物固有勢異而患同者又有勢同而患異者昔者楚人久伐而中山亡此言楚受秦伐趙無秦患故破中山滅之故秦昭八年再敗楚遂言趙破中山正曰大事記中山恃魏楚魏久連兵中山失助而亡今詳此言亦失考年表武靈王二十五年攻中山而秦韓魏齊擊楚敗唐昧亦此時也說見燕魏等策今燕盡韓之河南盡言得其地補曰盡韓之河史作燕盡齊之北地距沙丘而至巨鹿之界巨鹿冀州郡三百里自此皆言近趙距於扞關至於榆中屬金城下衍千字千五百里補曰距於云云史作秦之上郡近扞關至於榆中千五百里榆中上郡見前自上郡至榆中則千五百里為是楚有扞關說見前策大事記云扞者扞敵之扞非關名也此趙扞敵之關非獨楚有之趙之扞關陸地之關楚之扞關水道之關也秦盡韓魏之上黨則地與國都國謂趙邦屬而壤挈者言為秦所取挈言取之易七百里秦以三軍强弩坐羊腸元作唐唐之上即地去邯鄲二十里且秦以三軍攻王之上黨而危其北則勾注之西屬鴈門補曰括地志云勾注山在雁門縣西北非王之有也今踰元作魯魯補曰字義未詳勾注禁常山而守守猶閉三百里通於唐曲遇元作吾吾正曰當作逆曲遇者不順史注中牟曲遇聚鄭州縣非此所指按齊策權之難章云燕戰勝兵罷趙可以取唐曲逆唐即唐縣曲逆蒲陰縣並屬中山此曲下必逆字也一本止作唐曲亦缺誤此代馬胡駒不畜補曰胡駒史作胡犬郭璞云胡地野犬似狐而小而崑山之玉後志金城臨羌有崑山正曰禹貢雍州貢球琳琅玕爾雅崑崙虛之璆琳琅玕李斯傳崑山之玉正義云崑岡在于闐國東北出玉按武帝以于闐山出玉故號玉所出曰崑崙不出也此三寶者又非王之有也今從於强秦與元作國國之伐齊臣恐其禍出於是矣五國之王齊楚魏韓燕補曰姚本五國上有昔者字嘗合橫而謀伐趙三分趙國壤地著之盤盂取太公為武王作盤盂之銘補曰言其目見而不忘屬之讎柞讎柞酬酢同言其相屬伐趙於酬酢之間五國之兵有日矣齊元作韓下並同韓乃西師以禁秦國禁閉拒之使秦發令素服而聽言令其國素服者兵敗以喪禮自居也吏不書反溫軹元作枳並屬河內枳髙平於魏髙平屬臨淮安定亦有正曰括地志云髙平故城在懷州河陽縣西言臨淮者繆安定秦地亦非溫枳皆河內故當以懷州者為正反三公什清於趙公字疑誤安定有三水朔方有三封渤海有三戶皆近趙張儀塞什谷之口當屯留之道則什近屯留後志中牟注有清口皆趙地也正曰三公二字有誤史云反髙平根柔於魏反巠分先俞於趙根柔未闕反文已明括地志云勾注山一名西陘山爾雅云北陵西隃鴈門疑此巠分乃巠山先俞即西俞也此王之明知也夫齊韓事趙宜為上交以其有志為趙閉秦今乃以邸罪取伐邸抵同坐也正曰姚本作抵當也臣恐其後事王不敢自必也補曰一本事王者之云云今王收齊補天下必以王為得齊韓齊補危社稷以事王補曰姚云危曾作抱天下必重王然則齊韓義王以天下就之趙得天下之交而屈就齊故齊以為義下至齊韓慕王以天下收之就之上也故收言下正曰就者屈就之收者收結之是一世之命制於王已臣願大王深與左右羣臣卒計而重謀先事成慮而熟圖之也趙惠文十六年有正曰史趙世家惠文十五年燕昭王與趙韓魏秦共擊齊齊敗走燕獨深入取臨淄十六年秦復與趙數擊濟齊人患之蘇厲為齊遺趙王書云云於是趙乃輟謝秦不擊齊大事記是時齊地皆入燕獨莒即墨僅存蘇厲之書皆不及之恐非此時事按策多為韓言乃趙藉擊韓而厲為韓止之者其間事實皆明指韓而首云伐齊為齊殊不合決有誤而史一切以韓為齊抑馬遷之所改歟然趙伐韓事亦不知在何時其文及地名亦多舛異不可强為之說鮑專據史文輒改大不然也秦攻趙藺離石祁拔趙以公子郚補曰音吾為質於秦而請內焦𢎞農郡有焦城正曰大事記據此愚疑非此地姚云一作應下同黎東郡有黎即黎陽牛狐之城地缺以易藺離石祁於秦元作趙趙趙背秦不豫焦黎牛狐秦王昭怒令公子繒請地趙王乃令鄭朱對曰夫藺離石祁之地曠逺於趙而近於大國有先王之明與先臣之力故能有之今寡人不逮不及先王其社稷之不能恤安能收恤藺離石祁乎寡人有不令之臣實為此事也非寡人之所敢知補曰鄭朱之對辭氣類左氏卒背秦秦王大怒令衛胡易史無易字補曰秦紀中更胡傷說見後伐趙攻閼與後志上黨涅有閼與補曰大事記潞州銅闕縣西北閼與震閼阿葛切與音預趙奢將救之此二十九年破趙閼與下魏令公子咎以鋭師居安邑以挾秦挾牽制之正曰夾持之秦敗於閼與反攻魏幾魏將正曰幾邑名正義云或屬齊或屬魏當在相潞之間幾音機一音祁亷頗救幾大敗秦師補曰按西周策蘇厲謂周君曰敗韓魏殺犀武攻趙取藺離石祁者皆白起則此舉乃起將也按顯王四十一年秦敗趙殺趙藺取離石赧王三年秦拔趙藺虜趙莊藺弓而此言取二城在伊闕戰後史載於赧王三十二年豈戰國地里不常後復屬趙而今為秦所拔乎赧之三十四年當惠文十八年前一年秦拔我兩城是年秦拔我石城豈即此三邑而石城即離石邪末言戰閼與攻幾事皆因此按史趙奢敗秦閼與在惠文二十九年廉頗攻幾在惠文二十三年今策戰閼與而後攻幾前後不同大事記謂幾本屬魏廉頗取之自是遂屬趙秦師既為趙奢所敗師還因擊幾故下文稱救幾也又按秦紀中更胡傷攻趙閼與在趙奢破秦次年年表秦擊我閼與城不拔是再攻閼與也與策亦異大事記從史書之而不辨當詳之鄭同北見趙王趙王曰子南方之博士也同鄭人鄭在趙之南博士辨博之士補曰秦官有博士或戰國儒士有此稱姚本作博士何以教之鄭同曰臣南方草鄙之人也鄙猶野何足問雖然王致之於前安敢不對乎臣少之時親嘗教以兵趙王曰寡人不好兵補曰故為反辭也鄭同因撫手仰天而笑之曰撫摩也兵固天下之狙喜也狙玃屬而狡黠言兵家如之而可喜正曰狙猶揚雄所謂狙詐也言此固詐者之所喜臣故意大王不好也補曰故固通臣亦嘗以兵說魏昭王昔日昭王亦曰寡人不喜臣曰王之行能如許由乎許由無天下之纍故不愛元作受受也今王既受先王之傳欲宗廟之安壤地不削社稷之血食乎王曰然此下同對今有人操隋侯之珠持下脫一字丘之環未詳萬金之財時補曰一本標作特宿於野內無孟賁之威荆慶之斷荆成荆范雎傳注古勇士又慶卿古字通應訓荆有佽非斬蛟孔子聞之博物志以為荆軻非也又或是成荆慶忌二人說林訓曰王子慶忌足躡麋鹿手搏兕虎補曰吳越春秋慶忌吳王僚子外無弓弩之禦不出宿夕一宿二夕夕初夜人必危之矣今有强貪之國臨王之境索王之地告以理則不可說以義則不聽王非戰鬭守禦之具禦亦守其何以當之王若無兵鄰國得志矣趙王曰寡人請奉教彪謂鄭同陳喻甚髙然自春秋至是天下未嘗無兵故孔孟皆以兵為諱今舍俎豆之事仁義之說而專談兵此益多之論也樓緩將使伏事辭行伏猶隱也將出使恐王疑之於辭日以隱伏之事要王使信己也正曰伏事乃隱柲之事也謂趙王曰臣雖盡力竭智死不復見於王矣王曰是何言也固且為書而厚寄卿樓子曰王不聞公子牟夷宋公子之於宋乎非肉不食言其貴莊十年注肉食在位者文張他國人正曰無考善宋宋王善之正曰此引前事惡公子牟夷宋元作寅寅然之補之字言牟夷之親而文張以遊客能使宋聽其說况已乎正曰寅然上下有缺誤今臣之於王非宋之於公子牟夷也而惡臣者過文張故臣死不復見於王矣王曰子勉行矣寡人與子有誓言矣樓子遂行後以中牟反入梁史不書補曰中牟趙邑也見前策趙敗長平後欲割地搆秦樓緩自秦來趙王與之計云云此章皆不可考以中牟反入梁或者祕謀之事歟侯者來言而王弗聽曰吾已與樓子有言矣此言姦人不可盡信燕封宋人榮蚠補曰蚠符分反髙陽君使將而攻趙趙王因割濟東三城合元作令下同令盧屬泰山髙唐屬平原平原陵地城市邑五十七平原青州命以與齊而以求安平君而將之馬服君謂平原君曰國奚無人甚哉君致安平君而將之乃割濟東三城補合令補曰姚云一本無大事記去令城市邑五十七以與齊此夫夫辭也謂三城豫補曰字誤姚本作子子補曰大事記并删夫豫二字與敵國戰覆軍殺將之所取割地於敵國者也此取之彼割之也今君以此與齊而求安平君而將之國奚無人甚哉補曰一本此作甚也應上甚哉蓋反覆嘆惜之辭也且君奚不將奢也奢嘗抵罪居燕燕以奢為上谷守燕之通谷要塞奢習知之百日之內天下之兵未聚奢已舉燕矣然則君奚求安平君而為將乎平原君曰將軍釋之矣僕已言之僕主矣僕主幸已聽僕也將軍無言已馬服君曰君過矣君之所以求安平君者以齊之於燕也茹肝涉血之仇邪謂即墨之役也其於奢也不然奢於燕之仇正曰今以為不然使安平君愚固不能當榮蚠使安平君智必不肯與燕人戰此兩言者安平君必處一焉雖然兩者有一也使安平君智則奚以趙之强為趙强則齊不復霸矣今得强趙之兵以杜燕將杜猶拒曠日持久兵相持曰久數嵗令士大夫餘子之力盡於溝壘車甲羽毛敝羽毛謂箭即裂字正曰羽毛即羽旄府庫倉廩虛兩國交以習之習言玩其兵乃引其兵而歸夫盡兩國之兵無明此者矣是元作夏夏軍也懸釡而炊補曰未詳恐上下文有缺誤懸釡而炊前章圉晉陽云此時或有水害大事記無夏止炊七字云已而得三城得三城衍也字也城大無能過百雉者隱元年注方丈曰堵三堵為雉果如馬服之言也彪謂馬服之請將自知明也其策安平知彼明也夫安平齊宗也其不强趙以奪齊之霸人之情也此言若易聽而不見聽孰謂平原君智乎趙惠文王三十年相平都都平君田單元作都平按史單無都平之稱魏策三言平都今從之又按孝成元年單將趙師攻燕二年為相蓋相平都而將之實自惠文至孝成乃攻燕復相也正曰史趙世家惠文王三十三年卒孝成王元年田單將趙師攻燕及韓二年田單為相此稱都平君是仍齊相之稱都平即安平也故大事記俱作安平君魏策長平之役平都君云云不言是田單也惠文三十年正趙奢破秦軍閼與後一嵗單未至趙也疑三十年下有缺文問趙奢曰吾非不說將軍之兵法也所以不服者獨將軍之用衆用衆者使民不得耕作糧食挽賃賃所稅於民者不可給也此坐而自破之道也非單之所為也單聞之帝王之兵所用不過三萬而天下服矣今將軍必負十萬二十萬之衆乃用之此單之所不服也馬服君曰補曰馬服注見秦策張華曰趙奢冢在邯鄲西山上謂之馬服山君非徒不達於兵也又不明其時勢兵則吳干之喻時勢則萬國七國之異夫吳干之劒吳王使干將鑄之故云肉試則斷牛馬金試則截盤匜匜盥器補曰荀子作盤盂注銅器引策文薄之柱上而擊之薄猶迫補曰薄音搏則折為三質之石上而擊之質以石為鑕則碎為百今以三萬之衆而應强國之兵是薄柱擊石之謂也補曰言劒雖利然薄之於柱質之於石而擊之則不敵於柱石之堅必折且碎一本之謂作之類荀子注引吳干將且夫吳干之劒材難材謂脊脾之類不易得也夫無元作毋毋補曰無通脊之厚而鋒不入無脾之薄脾近刃處而刃不斷兼有是二者無鈎竿元作罕下同罕正曰一本作罕是下同罕即咢字鍔同刃鋒也鐔蒙須之便鈎劒頭鐶竿與同集韻柄也鐔珥鼻也蒙須疑為劒繩猶蒯緱也爾雅草有夫須蓋以草為繩正曰鈎亦劒屬姚云曾本須作項亦未詳補曰鐔徐心反操其刃而刺則未入而手斷君無十餘補曰恐即上文萬字二十萬之衆而為此鈎竿罕鐔䝉須之便而徒以三萬行於天下君焉能乎且古者四海之內分為萬國城雖大無過三百丈者人雖衆無過三千家者而以集兵三萬集言平時團集非烏合也距此奚難哉今取古之為萬國者分以為戰國七不補能具數十萬之兵曠日持久數歲即君之齊已言以三萬拒數十萬必敗亡也齊嘗為燕昭所破故云正曰能具云云即下云齊以二十萬衆攻荆五年之事齊以二十萬之衆攻荆五年乃罷趙以二十萬之衆攻中山五年乃歸此言雖衆猶不亟得志况三萬乎今者齊韓相方方猶比方敵也兩國圍攻焉兩國或圍或攻豈有敢曰我其以三萬救是者乎哉今千丈之城萬家之邑相望也而索以三萬之衆索猶求也圍千丈之城不存其一角言城大兵少曾不處城之一角豈能合圍而野戰不足用也既不能圍亦不可戰君將以此何之平都都平君喟然太息曰單不至也至猶及也言慮不及此彪謂兵不期少多商敵為數耳單也以少擊衆竒兵也奢也以衆敵衆正兵也論兵者當以正為常而用之則務出竒竒不可論也單也狃於即墨之勝欲以竒為常而廢正此其論所以屈也補曰兵不期多少商敵為數此論是矣而有所未盡以其論兵而不論將也單之破燕蓋乘衆之憤懈而設竒駭之奢之侵閼與曰道逺險狹猶兩鼠鬭穴中將勇者勝其後卒以計敗秦而長平之役括以四十五萬之衆而不免於白起將善則能以少而勝不善則雖多而亦敗爾雖然人知少之害而未知多之纍曹操以八十萬而敗於赤壁將非不善也故韓信之論髙帝曰不過能將十萬而多多益辦獨信能之論兵者可以不知將哉孝成王惠文王子元年補曰名丹赧王五十年丙申趙太后惠文王威后新用事秦急攻之趙氏求救於齊齊曰必以長安君為質長安孝成母弟補曰索隱云趙亦有長安今地缺按趙世家封長安君以饒正義云即饒陽也明長安是號兵乃出太后不肯大臣强諫太后明謂左右有復言令長安君為質者老婦必唾其面左師官名觸讋願見太后盛氣而揖之入而徐趨至而自謝曰補曰觸讋姚云一本無言字史亦作龍按說苑魯哀公問孔子夏桀之臣有左師觸龍者諂諛不正人名或有同者此當從讋以别之入願見太后姚本復有太后字史同史云胥之徐趨而坐胥字當是老臣病足曾不能疾走不得見久矣竊自恕久不見宜得罪今自寬而求見恐太后玉體之有所郤也郤郤同以己病足因恐后不能前亦自恕以及人也故願望見太后曰老婦恃輦而行補曰望見太后姚本復有太后字史同曰日食飲得無衰乎曰恃鬻耳補曰鬻粥同姚云一本去鬲字曰老臣今者殊不欲食乃自强步曰三四里少益嗜食和於身曰老婦不能太后之色少解左師公曰老臣賤息舒祺息其子舒祺名也最少不肖而臣衰竊愛憐之願令補黑衣之數尸祝之服所謂袨服又蕭望之傳注朝時皆著皂衣正曰袨服韻書好衣也按晉輿服志秦人以袀𤣥為祭服鮑其誤以袀為袨乎增韻黑衣戎服左氏均服振振均即袀以下文衛王宫推之戎服是也補曰數史作缺願令一本願得以衛王宫沒死以聞沒者沈溺之辭補曰沒史作昧太后曰敬諾年幾何矣對曰十五嵗矣雖少願及未填溝壑而託之死則填壑太后曰丈夫亦愛憐其少子乎對曰甚於婦人太后曰婦人異甚異於丈夫而有甚焉對曰老臣竊以為媪之愛燕后媪女老稱后太后女補曰一本標媪一本作太后太后稱媪非也春秋後語並作太后媪烏老反賢於長安君曰君過矣不若長安君之甚左師公曰父母之愛子則為之計深逺媪之送燕后也持其踵為之泣念悲其逺也念且悲亦哀之矣已行非弗思也祭祀必祝之祝曰必勿使反失意於燕乃反爾豈非計久長有子孫相繼為王也哉太后曰然左師公曰今三世以前至於趙之為趙趙王之子孫侯者其繼有在者乎曰無有曰微獨趙微猶非諸侯有在者乎曰老婦不聞也此下左師對補曰史此下有曰字此其近者禍及身逺者及其子孫豈人主之子侯補曰一本作孫則必不善哉位尊而無功奉厚而無勞而挾重器多也重器謂名位金玉正曰位字上下文可考今媪尊長安之位而封以膏腴之地多豫之重器而不及今令有功於國一旦山陵崩長安君何以自託於趙老臣以媪為長安君計短也故以為其愛不若燕后太后曰諾恣君之所使之於是為長安君約車百乘質於齊齊兵乃出子義趙之賢士聞之曰人主之子也骨肉之親也猶不能恃無功之尊無勞之奉以守金玉之重也而况人臣乎趙記元年有彪謂觸讋諒毅皆以從容納說而取成功與夫强諫於廷怒罵於坐髮上衝冠自待必死者力少而功倍矣元帝謂張猛曰曉人不當如是邪二士有焉補曰程子釋易納約自牖曰左師觸讋因其明而導之故其聽也如響謂張良招四皓輔太子亦然愚謂二事同傳可也燕策陳翠說太后章與觸讋類亦可並觀諒毅事不同後亦失對辨說見後秦王昭謂公子他曰昔歲殽下之事即秦惠七年五國攻函谷事函殽地近故云補曰按趙世家孝成二年受韓上黨長平之敗在七年秦惠七年五國攻秦至孝成二年凡五十四年秦惠十三年敗楚藍田距此四十九年又韓襄五十四年與齊魏共擊秦於函谷河渭絶一日距孝成二年為三十五年稍近然逺引前事者祗欲言韓之不可不伐耳年表破長平在孝成六年與世家異韓為中軍以與諸侯攻秦韓與秦接境壤界其地不能千里展轉不可約展轉猶反覆日者秦楚戰於藍田秦惠文後十三年韓出鋭師以佐秦秦戰不利因轉與楚不固信盟唯便是從韓之在我心腹之疾吾將伐之何如公子他曰王出兵韓軍於其地韓必懼懼則可以不戰而深取割王曰善乃起兵一萬臨滎陽一軍臨太行韓補補曰姚本有此字恐使陽城君疑當作成陽秦昭十七年入朝者也入謝於秦請效上黨之地以為和令韓陽告上黨之守靳黈元作字書無此字下同曰秦起二軍以臨韓韓不能支今王桓惠令韓興兵恐守不效地故以上黨入和於秦使陽言之太守太守其效之補曰索隱云漢景時始稱太守大者衍字愚按史文止一稱太守故索隱云然此策凡五言之決非衍當時已有此稱矣靳黈曰人有言挈瓶之智挈瓶之人之智不失守器所守之器謂瓶王則有令而臣太守雖王與子其亦元作亦其亦其猜焉嫌其不能守臣請悉發發兵守以應秦正曰悉發守兵若不能卒言戰敗不終事則死之韓陽趨以報王王曰吾始已諾於應侯矣今不與是欺之也乃使馮亭代靳黈馮亭守三十日陰使人請趙王曰韓不能守上黨且以與秦其民皆不欲為秦而願為趙今有城市之邑七十補曰史作十七下同願拜納之於王惟王才之才財裁同趙王喜召平陽原君元作平原史作平陽君趙豹是也若果平原下文不應復云召趙勝補曰原當作陽而告之曰韓不能守上黨且以與秦其吏民不欲為秦而皆願為趙今馮亭令使者以與寡人何如趙豹對曰聖人甚禍無故之利無故得利聖人以為禍王曰人懷吾義何謂無故乎對曰秦蠶食韓氏之地中絶不令相通故自以為坐受上黨也且夫韓所以內趙者欲嫁其禍也秦被其勞而趙受其利雖强大不能得之於小弱而小弱顧能得之强大乎今王取之可謂有故乎且秦以牛田水通糧牛田秦地缺因其水為漕正曰牛耕積榖水漕通糧秦於渭水漕運入河洛或以為漢武始用牛耕竊以為古用木耜未有金耜用人耕未用牛耕耦耕者二人並耕或一人一牛亦可漢始専用牛耕也尚書犂從牛冉耕字伯牛司馬牛名犂不可謂牛耕非古也其死士皆列之於上地韓之上流正曰地之上者令嚴政行不可與戰王自圖之王大怒曰夫用百萬之衆攻戰踰年歷歲未見一城也今不用兵而得城七十何故不為趙豹出王召趙勝趙禹而告之曰韓不能守上黨今其守以與寡人有城市之邑七十二人對曰用兵踰年未見一城今坐而得城七十補此二字補曰史此有七十二字此大利也乃使趙勝往受地勝至曰敝邑之王使使者臣勝告補太守有詔補曰詔告也謂太守有告使臣勝有詔秦人語耳謂曰請以三萬户之都封太守千戶封縣令補曰縣令說見楚策諸吏皆益爵三級民能相集者賜家六金馮亭垂涕而免元作勉免辭也勉補曰此書勉免通曰是吾處三不義也為主守地不能死而以與人不義一也主內之秦不順主命不義二也賣主之地而食之食食封戶也不義三也辭封而入韓補曰漢書趙封馮亭為華陽君與趙將兵拒秦戰死長平與此異謂韓王曰趙聞韓不能守上黨今發兵已取之矣韓告秦曰趙起兵取上黨秦王怒令公孫起王齮以兵遇趙於長平趙記四年有馮亭下彪謂平陽嫁禍之言豈不易曉而孝成怒之昏於利也勝禹入而順㫖以濟其欲不幾於一言而喪邦歟故為邦者以逺佞人為急正曰勝禹淺謀非佞也補曰公孫起即白起史王齕非齮秦將有桓齮此恐訛舛秦趙戰於長平趙補曰姚本此有不勝二字亡一都尉軍尉也趙王召樓昌與虞卿曰軍戰不勝尉係死係尉名正曰姚本係作復史同寡人使卷甲而趨之襲之也何如樓昌曰無益也不如發重使而為講元從女從冓求和也與講無異義而此書兩字互用今以搆並作講媾補曰說見前虞卿曰夫言講媾者以為不講媾者軍必破而制講媾者在秦制言聽否由之且王之論秦也欲破王之軍乎其不邪王曰秦不遺餘力矣必且破趙軍虞卿曰王聊聽臣發使出重寶以附楚魏楚魏欲得王之重寶必入吾使趙使入楚魏秦必疑天下合從也且必恐如此則講媾乃可為也趙王不聽與平陽君為講媾與從之也發鄭朱入秦秦內之趙王召虞卿曰寡人使平陽君講媾秦秦已內鄭朱矣子以為奚如虞卿曰王必不得講媾軍必破矣天下之賀戰勝者皆在秦矣鄭朱趙之貴人也而入於秦秦王昭與應侯必顯重以示天下楚魏以趙為講媾必不救王秦知天下不救王則講媾不可得成也趙卒不得講媾軍果大敗王入秦秦留趙王而後許之講媾虞卿傳有秦攻趙於長平大破之引兵而歸因使人索六城於趙而講元作搆史書此事在邯鄲圍解後按邯鄲之圍講非秦德趙而解也趙賴魏之力爾何事朝秦而以六城此策以長平破懼而賂之是也媾趙計未定樓緩新從秦來趙王與樓緩計之曰與秦城何如不與何如樓緩辭讓曰此非衍人字人臣之所能知也王曰雖然試言公之私樓緩曰王亦聞夫公甫文伯母乎公甫文伯官於魯病死婦人為之自殺於房中者二人其母聞之不肯哭也相室曰焉有子死而不哭者乎其母曰孔子賢人也逐於魯是人不隨稱是人不子之也今死而婦人為死者十六人補曰正義云相室傅姆之類愚按檀弓文伯之喪敬姜據其床而不哭曰云云與樓緩之言相出入辨士之言或過史及新序並作二八是上文人字乃八字之訛若是者其於長者薄而於婦人厚故從母言之為賢母也從婦言之必不免為妬婦也故其言一也言者異則人心變矣今臣新從秦來而言勿與則非計也言與之則恐王以臣之為秦也故不敢對使臣得為王計之不如豫之王曰諾虞卿聞之入見王王以樓緩言告之虞卿曰此飾說也猶飾辨此下衍秦既解邯鄲至六縣而講二十四字秦既解邯鄲之圍而趙王入朝使趙郝約事於秦割六縣而媾補曰此二十四字脫簡誤在此史以為章首者此策實非邯鄲圍解後事也王曰何謂也虞卿曰秦之攻趙也倦而歸乎王以其力尚能進愛王而不攻乎王曰秦之攻我也不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又以其力之所不能攻而資之是助秦自攻也來年秦復攻王王無以救矣王以虞卿之言告樓緩史云樓緩事正曰史云趙郝新序同止其勢必無趙矣樓緩曰虞卿能盡知秦力之所至乎至猶及也虞卿言秦力倦而歸謂秦力所及止是耳秦力豈止是而已乎誠不補知秦力之所元作不不至此彈丸之地猶不豫也令秦來年復攻王得無割其內而講媾乎王曰誠聽子割矣子能必來年秦之不復攻我乎樓緩對曰此非臣之所敢任也昔者三晉之交於秦相善也今秦釋韓魏而獨攻王王之所以事秦必不如韓魏也今臣為足下解負親之攻趙嘗親秦而復負之故秦攻之今為講所以解也啓關通幣元作敝敝補曰當作幣齊交韓魏使其交秦與韓魏等至來年而王獨不取於秦不為秦所取王之所以事秦者必在韓魏之後也此非臣之所敢任也王以樓緩之言告虞卿虞卿補兩字補曰史此下復有虞卿字曰樓緩言不講媾來年秦復攻王得無更割其內而講媾今講媾樓緩又不能必秦之不復攻也雖割何益來年復攻又割其力之所不能取而講媾也此自盡之術也不如無講媾秦雖善攻不能取六城趙雖不能守亦元作而而不至失六城秦倦而歸兵必罷並音疲我以六元作五下同正曰此五城與後五城賂齊得王五城之五且當從本文五城收天下以攻罷秦是我失之於天下而取償於秦也吾國尚利孰與坐而割地自弱以强秦今樓緩曰秦善韓魏而攻趙者必王之事秦不如韓魏也是使王嵗以六城事秦也即坐而地盡矣來年秦復求割地王將豫之乎不豫則是棄前資元作貴貴補曰恐作資史作功而挑秦禍也史記挑戰為致師則此言禍自我致也與之則無地而給之語曰强者善攻而弱者不能自守今坐而聽秦秦兵不敝而多得地是强秦而弱趙也以益衍愈字愈補曰新序同史作益强然有愈字亦通益謂增益之也强之秦而割愈弱之趙其計固不止矣言割不止且秦虎狼之國也無禮義之心其求無已而王之地有盡以有盡之地給無已之求其勢必無趙矣故曰此飾說也王必勿與補曰按此飾說二字與前相應則文有亂脫無疑王曰諾樓緩聞之入見於王王又以虞卿之言告之樓緩曰不然虞卿得其一未知其二也夫秦趙搆難而天下皆說何也曰我將因强而乘弱乘猶陵今趙兵困於秦天下之賀戰勝補補曰史有勝字者則必在於秦矣故不若亟割地求和以疑天下慰秦心不然天下將因秦之怒乘趙之敝而瓜分之分其地如破瓜然趙且亡何秦之圖王以此斷之勿復計也虞卿聞之又入見王曰危矣樓子之為秦也為秦計深而趙危也夫趙兵困於秦又割地為和是愈疑天下而何慰秦心哉不亦大示天下弱乎且臣曰勿豫者非固勿豫而已也秦索六城於王王以六五城賂齊齊秦之深讎也嘗爭為帝正曰不特此得王六五城并力而西擊秦也齊之聽王不待辭之畢也是王失於齊而取償於秦一舉結三國之親韓魏本趙與國與齊為三而與秦易道也趙王曰善因發虞卿東見齊王王建與之謀秦虞卿未反秦之使者已在趙矣樓緩聞之逃去虞卿傳有次第不同先云秦既解邯鄲與今所衍二十四字同次虞卿謂趙王曰秦之攻王也倦而歸乎止勢必無趙矣次趙王計未定樓緩從秦來止此飾說也次王必勿與樓緩聞之止緩聞之逃去彪謂虞卿可謂見善明者矣當趙以四十萬覆於長平之下凡在趙庭之臣孰不魄奪氣喪願講秦以偷須臾之寧卿獨為之延慮却顧折樓緩之口挫强秦之心反使秦人先趙而講於此亦足以見從者天下之勢七國辨士策必中計必得而不失其正唯卿與陳軫有焉賢矣哉正曰大事記引蘇氏云虞卿終始事趙專持從說非說客也鮑以卿與陳軫並稱軫料事明切不下於卿其勵懷王賂秦而取償於齊意亦類此他雖辨給可善而言稍浮至其往來秦楚爭寵張儀激貴犀首未離說客之習也豈卿比哉秦圍趙之邯鄲此九年魏安釐王使將軍晉鄙救趙畏秦止於蕩隂屬河內補曰姚云錢劉改蕩作湯正義云蕩天郎反相州縣不進魏王使客將軍辛垣衍稱客則衍他國人仕魏也補曰元和姓纂衍畢公髙之後間入邯鄲間謂微行因平原君謂趙王曰秦所以急圍趙者前與齊閔王爭强為帝已而復歸帝以齊故由齊不稱秦亦去之今齊衍閔王字今乃襄王爾史亦誤閔王益弱正曰謂今之齊視閔王已益弱姚本作已益弱方今唯秦雄天下此非必貪邯鄲其意欲求為帝趙誠發使尊秦昭王為帝稱諡非當時語補曰追書之辭秦必喜罷兵去平原君猶豫未有所決此時魯仲連適游趙㑹秦圍趙聞魏將欲令趙尊秦為帝乃見平原君曰事將奈何矣平原君曰勝也何敢言事百萬之衆折於外今又內圍邯鄲而不去魏王使客將軍辛垣衍令趙帝秦今其人在是勝也何敢言事魯連曰始吾以君為天下之賢公子也吾乃今然後知君非天下之賢公子也梁客辛垣衍安在吾請為君責而歸之平原君曰勝請為召而見之於先生平原君遂見辛垣衍曰東國有魯連先生東國謂齊補曰一本先生者其人在此勝請為紹介郭璞曰紹介相佐助也補曰索隱曰禮賓至必因介以傳辭紹者繼也故禮云介紹而傳命而見之於將軍辛垣衍曰吾聞魯連先生齊國之髙士也衍人臣也使事有職吾不願見魯連先生也平原君曰勝已泄之矣泄言已白之辛垣衍許諾魯連見辛垣衍而無言辛垣衍曰吾視居此圍城之中者皆有求於平原者也今吾視先生之玉貌非有求於平原君者曷為久居此元作若若補曰若疑居字訛衍史作此無亦可圍城之中而不去也魯連曰世以鮑進周之介士見莊子補曰韓詩外傳云周時隱者無子𦙍不臣天子不友諸侯無從容而死者皆非也其人介故人謂之然今衆人不知則為一身不知者以其抱才死為無以自養不知其非世也明已今亦然彼秦棄禮義上首功之國也秦制爵二十戰獲首級者計功受爵時所尊上也權使其士虜使其民視民如所虜獲彼則肆然而為帝過而遂正於天下過猶不幸補曰正義云舊讀帝過句謂偏行天子之禮過失也愚按此句亦難通過即過甚之義史作過而為政則連有赴東海而死耳元作矣矣補曰史作耳吾不忍為之民也所為見將軍者欲以助趙也辛垣衍曰先生助之奈何魯連曰吾將使梁及燕助之齊楚固助之矣辛垣衍曰燕則吾請以從矣若乃梁則吾乃梁人也先生惡能使梁助之邪魯連曰梁未睹秦稱帝之害故也使梁睹秦稱帝之害則必助趙矣辛垣衍曰秦稱帝之害將奈何魯仲連曰昔齊威王嘗為仁義矣率天下諸侯而朝周周貧且微諸侯莫朝而齊獨朝之居嵗餘周烈王崩諸侯皆弔齊後往周怒赴於齊曰天崩地拆天子下席東藩之臣田嬰齊後至則斫之威王勃然怒曰叱嗟嗟咨也而母婢也補曰正義云赴告也今文作訃索隱云下席言其寢苫居廬謂烈王太子安王驕也正義云而母婢罵烈王后也卒為天下笑故生則朝周死則叱之誠不忍其求也彼天子固然固猶必其無足怪辛垣衍曰先生獨未見夫僕乎十人而從一人者寧力不勝智不若邪畏之也魯仲連曰然梁之比於秦若僕邪辛垣衍曰然魯仲連曰然則補吾將使秦王烹醢梁王醢肉醬也辛垣衍怏然不說曰嘻亦太甚矣先生之言也補曰嘻歎言也句先生又惡能使秦王烹醢梁王魯仲連曰固也待吾言之昔者鬼侯徐曰鄴縣有九侯城九一作鬼鄂侯鄂屬江夏正曰左傳隱六年納諸鄂注晉别邑路史云在大夏世本云叔虞居鄂未知即此否文王紂之三公也鬼侯有子而好故入之於紂紂以為惡醢鬼侯鄂侯爭之急辨之疾故脯鄂侯文王聞之喟然而歎故拘之於牖里之庫牖里在蕩隂百日而欲令之死補曰姚本牖里之拘欲令之死曷為與人俱稱帝王卒就脯醢之地也齊閔王將之魯夷維子執策而從策馬箠也補曰索隱云維東萊之邑其居夷也號夷維子故晏子為萊之夷維人愚按維即維地志維水出密州莒縣東北維山北至今維州昌邑海萊夷即今萊州也謂魯人曰子將何以待吾君魯人曰吾將以十太牢待子之君夷維子曰子安取禮而來待吾君彼吾君者天子也天子巡狩諸侯避舍納衍于字于補曰疑衍史無管鍵管鑰也鍵其牡避納者示不敢有其國攝衽抱几几所据也視膳於堂下天子已食而聽退朝也補曰一本天子已食退而聽朝也史同退上有乃字魯人投其籥籥鑰同關下牡也投者下其牡不果納不得入於魯將之薛假涂於鄒當是時鄒君死閔王欲入弔夷維子謂鄒之孤曰天子弔主人必將倍殯柩倍言背之去正曰索隱云主人不在殯東將背其殯棺立西階上北面哭是倍也天子乃於阼階上南面弔之也設北面於南方然後天子南面弔也鄒之羣臣曰必若此吾將伏劒而死故不敢入於鄒鄒魯之臣生則不得事養齊時强二國不納必見伐國人不得養老事幼正曰索隱云謂時君弱臣强鄒魯君生時臣不得盡事養死不得行賻襚之禮然齊欲行天子禮於鄒魯其臣皆不果納之是猶秉禮而存大體也死則不得飯含以珠玉實死者口曰含此謂鄒補曰飯扶晚反含胡紺反然且欲行天子之禮於鄒魯之臣不果納今秦萬乘之國梁亦萬乘之國交有稱王之名睹其一戰而勝欲從而帝之是使三晉之大臣不如鄒魯之僕妾也且秦無已而帝無已言無止之者正曰無已必欲為之而不止也則且變易諸侯之大臣彼將奪其所謂不肖而豫其所謂賢補曰史無兩謂字奪其所憎而與其所愛彼又將使其子女讒妾為諸侯妃姬處梁之宫梁王安得晏然而已乎而將軍又何以得故寵乎於是辛垣衍起再拜謝曰始以先生為庸人吾乃今日而知先生為天下之士也吾請去不敢復言帝秦秦將聞之為却軍五十里適魏公子無忌奪晉鄙軍以救趙擊秦秦軍引而去補曰秦將聞仲連之言為却軍五十里說者以為辨士夸辭愚竊以為信蓋仲連毅然不肯帝秦則魏救必至聲天下之大義以作三軍之氣不戰而自倍矣是時公子無忌且至連之智足以知其事之克濟不然則且有俶儻非常之畫以佐趙之急彼秦將者必聞其言而憚其謀故爾不然豈為虛言却哉於是平原君欲封魯仲連魯仲連辭讓者三終不肯受平原君乃置酒酒酣起前以千金為魯連壽魯連笑曰所元作此此補曰史作所貴於天下之士者為人排患釋難解紛亂而無所取也即有所取者是商賈之人也仲連不忍為也遂辭平原君而去終身不復見仲連傳有彪謂仲連孔子之所謂逸民非周衰辨者之口也太史公贊之貶矣夫說人者不可一槩或委而順之若觸讋或折而服之若仲連然後濟天下之務不然諛且佞矣正曰史遷論仲連謂指意不合大義固未當鮑以為孔子所謂逸民連雖貧賤肆志然時出而救時亦非逸也大事記引蘇氏曰辨過儀秦氣凌髠衍從橫之利不入於口因事效言切中機㑹排難解紛不終日而成功逃避爵賞脫屣而去戰國一人而已斯言蔑以加矣愚謂仲連事皆可稱而不肯帝秦一節尤偉戰國之士皆以勢為强弱而連獨以義為重輕此其所以異爾補曰請為所為為却之為去聲秦攻趙平原君使人請救於魏信陵君發兵至邯鄲城下秦兵罷虞卿為平原君請益地謂趙王曰夫不鬭一卒不頓一㦸頓劒之頓正曰頓二見秦策而解二國患者平原君之力補曰一本有也字用人之力而忘人之功不可趙王曰善將益之地公孫龍趙人著堅白論莊子稱之距是逺甚豈同姓名如公孫𢎞者乎正曰莊子稱公孫龍之學合同異離堅白而史平原傳稱公孫龍善為堅白同異之辨荀卿傳未以為趙人又見列子等書同此人也史稱莊子與梁惠齊宣同時楚威王欲以為相威王元年當顯王三十年故大事記以楚相之事附見下至赧王十七年趙勝封平原君則周距平原未逺也莊子書稱之子噲之事當宣王末年赧王元年也下至魏破秦軍邯鄲時以為赧王五十八年則周之稱公孫龍龍之在平原君門皆相及也惟以為仲尼弟子公孫龍者則誤蓋相去逺爾聞補補曰姚云劉添聞字史有之見平原君曰君無覆軍殺將之功言初封時以公子耳而封以東武城趙國豪傑之士多在君之右右者人道所尊補曰秦漢以前用右為上如云位在廉頗右而君為相國者以親也補正曰故句史作親戚故也故夫君封以東武城不讓無功不以無功辭之佩趙國相印不辭無能一解國患欲求益地是親戚受封而國人計功也國人受封必計其功與平原異補曰勝本無功向之受封也已不當得今又欲益地是在親戚則無功受封國人則計功乃受賞輕重不倫也漢光武封隂天識引此語為君計者不如勿受便平原君曰謹受令乃不受封彪謂平原失計於馮亭以挑秦禍幾喪趙國之半馴致邯鄲之圍何功之足論哉然因人成事亦又桑榆之收不可忘也虞卿之請帝王懋賞之舉公孫龍之辭明哲讓功之誼皆君子之善言也正曰趙勝功不贖罪虞卿此為失言秦攻魏取寧邑秦昭王十年拔寧魏地邑徐以為趙非也後志朝歌有寧鄉蓋秦圍邯鄲魏信陵救之秦怒故解邯鄲而取寧此九年正曰按秦紀王齕取邯鄲不拔還奔汾軍取汾城即從唐拔寧新中寧新中更名安陽正義云今相州外城年表止書新中大事記因之又齊韓魏楚救趙新中此策秦攻魏取寧邑非寧新中也寧鄉在朝歌屬魏或如鮑所云然以策文稱趙豹平原君為母弟推之知為惠文之世而與孝成邯鄲圍後取寧新中事不相涉也秦昭王少而魏冉為政葉陽涇陽貴四十一年冉免而二貴衰趙惠文王元年平原始封二十七年豹封平陽君此策不稱豹封則在其未封之前按魏策秦拔寧邑魏冉曰云云此策正冉用事時也鮑誤次於孝成之世而不察母弟之云何也諸侯皆賀趙王使賀三反不得通趙王憂之謂左右曰以秦之强得寧邑以制弱趙諸侯皆賀吾往賀而獨不得通此必加兵我為之奈何左右曰使者三往不得通者必所使者非其人也曰諒毅者曰猶有辨士也大王可試使之諒毅親受命而往至秦獻書秦王昭曰大王廣地寧邑諸侯皆賀敝邑寡君亦竊嘉之不敢寧居使下臣奉其幣物三至王廷而使不得通使若無罪願大王無絶其歡若使者有罪願得請之秦王使使者報曰吾所使趙國者小大皆聽吾言則受書幣若不從吾言則使者歸矣諒毅對曰下臣之來固願承大國之意也豈敢有難大王若有以令之請奉而衍西字西補曰疑西字訛或衍行之無所敢疑於是秦王乃見使者曰趙豹平原君數欺弄寡人趙能殺此二人則可若不能殺請令率諸侯受命邯鄲城下欲戰而言受命謙辭也諒毅曰趙豹平原君親寡君之母弟也猶大王之有葉陽涇陽君也史注葉陽一作華陽華陽芊戎也此言葉陽為王之母弟則非戎矣葉不可作華補曰葉陽公子悝涇陽公子市大事記謂范睢論四貴王弟二人曰髙陵曰涇陽獨無所謂葉陽者髙陵或其别名又按趙惠文王元年封公子勝平原君二十七年封趙豹為平陽君魏公子傳稱勝為惠文王弟而豹無紀其為王弟以策知之也武靈王元年陽文君趙豹相彼又一趙豹歟不然則有舛誤也大事記解題引此而止云平原君親寡君之母弟豈有所疑而别之歟大王以孝治聞於天下衣服衍使字使正曰姚本膳啖下大有使字注云劉本並無之便於體膳啖之嗛於口啖食也味之可食者集韻慊愜也補曰嗛口簟反口有所銜也鳥獸頰貯食通作慊未嘗不分於葉陽涇陽君葉陽君涇陽君之車馬衣服無非大王之服御者臣聞之有覆巢毁卵而鳳凰不翔刳胎焚夭夭么同小貌正曰王制不夭夭注夭斷殺少長曰夭夭烏老反少詩照反又毋殺胎夭疏胎腹中未出者夭胎已出者正曰麟鳳兩語史孔子世家將西見趙簡子聞竇鳴犢舜華之死亦云梅福書䳒鵲遭害則仁鳥增逝類此而麒麟不至今使臣受大王之令以還報敝邑之君畏懼不敢不行無乃傷葉陽君涇陽君之心乎秦王曰諾勿使從政諒毅曰敝邑之君有母弟不能教誨以惡大國請黜之勿使與政事以稱大國秦王乃喜受幣而厚遇之彪謂諒毅可謂有專對之材矣觀其辭令如見晉叔向鄭子産相與周旋於一堂之上而折論豹勝之事何甚似蕭同叔子也毅其深於春秋者乎是舉也不辱君命不失秦之心與觸讋同傳可也正曰惠文王之世趙勢尚强秦雖屢奪趙地而趙亦屢伐秦閼與之敗秦終不能逞志於趙當時之臣外則亷頗趙奢為之禦侮內則藺相如之徒一璧之微一鼓瑟之恥為之死爭今而告其使曰必殺而二母弟以聽命則雖垂亡之國猶有所不受而秦豈能必趙之從哉特大言以虛喝之耳諒毅之對婉而不迫稱譬當於人心秦知其不可奪故轉而言曰勿使從政其情亦窮矣毅因而順其意則未免失辭使毅應之曰敝邑之君之有母弟而授之以政也亦惟先王之故以共衛社稷大國馮恃其威日尋於兵是以二子大懼殄滅之及以與寡君周旋其獲戾於大國則職此之由忠而不二臣之職也討二勸忠大國之義也今將討二子之忠而使之釋敝邑之政其何以為勸雖大國亦將有不利焉臣不知所命以是告之庶幾不失其對矣蕭同叔子云云此傳語所使試使王使所使今使勿使之使如字趙使姚賈約韓魏正曰姚賈說見秦策此章時不可考韓魏衍以字以友之補曰兩友字姚云劉作反茅舉元作舉茅趙人舉茅為姚賈謂趙王曰賈也王之忠臣也韓魏欲得之故友之將使王逐之而已因受之今王逐之是韓魏之欲得而王之忠臣有罪也故王不如勿逐以明王之賢而折韓魏之招元作招之補曰姚云劉㸃此二字皆作之招謂皮相國趙相曰以趙之弱而據之建信君據猶任建信趙幸臣涉孟蓋為橫者與建信異趣故趙讐之補曰涉孟之讐四字未詳或言建信涉孟二人以其反有害於趙故以讐稱之讎然者何也補曰然者下章亦有此文法當至也字句以從為有功也齊不從正曰句建信君此從如字知從之無功建信者補曰姚云一作君安能以無功惡秦哉惡猶害也從有功乃能害秦爾不能以無功惡秦則且出兵助秦攻魏以楚趙分齊為從無功則反助秦不則分齊齊雖不為從然與秦爭衡故助秦則分齊之地分分其地則是强畢矣言建信圖强之計盡於此補曰謂不能害秦則可助秦攻魏怒齊之不從則合楚以分齊二策必居一焉則圗强之計畢於此矣建信春申從春申悼襄四年主從約發議於此時也則無功而惡秦言楚趙合則雖未見功有害秦之形秦合元作分分齊秦見二國合亦與齊合齊亡魏則有功而善秦齊本不從建信今秦來合故助之攻魏以善之故兩君者奚擇有功之與補無功為知哉兩齊趙也趙知據建信而不知其不合楚不能成功齊不從建信而不知其合楚足以成功不知所擇也補曰之字疑當在無功下正曰秦分齊齊亡魏語不可解疑有舛誤當是分齊亡魏而衍秦齊二字蓋曰建信春申從則雖無功而其勢可以惡秦此合楚趙之策也分齊亡魏則有功而可以善秦此助秦之策也兩君指皮相國建信君誠指建信君涉孟將何所擇於有功無功二者而為智哉謂皮相國曰補曰章首姚本有或字魏殺吕遼魏臣秦所重者正曰魏臣無考後章作吕遺未知孰是又言收河間何異殺吕遺則吕為秦重者而衛兵正曰衛兵句亡其比陽屬南陽衛附秦者也故魏殺秦重衛為之亡魏之鄙以危之正曰衛附魏者也衛兵衛被兵也兵秦兵也一本比作北而梁危河間封不定而趙元作齊齊正曰河間近齊後言攻齊必此時併欲攻齊危時魏趙欲以封文信而不果正曰秦策所謂不果攻趙趙賂以河間十二縣在前事也戰國封地往往取之他國是時秦以河間地封不韋秦策稱不韋欲攻趙以廣河間是也時趙方與諸侯合從欲收河間故言封不定文信不得志文信吕不韋也莊襄元年封此十七年也未得河間故不得志正曰按史封文信侯食河南洛陽十萬戶河間後封三晉倍之憂也文信欲得河間必伐趙韓魏趙之與國故其憂倍正曰倍猶背也三晉之憂也倍字疑信字訛衍今魏恥未滅言嘗分魏之憂正曰見上文趙患又起患文信也文信之憂大矣文信為三晉之憂補曰文信之憂未詳恐字有誤齊不從不與山東約從三晉之言疑矣疑從之不可合憂大者不計而講元作御名下同搆言趙必求和於秦不待計也正曰下文言秦魏無趙心疑者事秦急秦魏之講搆不待割而成凡講必割地今急於成不待已割蓋先講也秦從楚魏攻齊獨吞趙趙近秦秦攻之不待楚魏齊趙必俱亡矣此說欲趙以河間廣文信封也下有一章合此魏使人因平原君請從於趙三言之趙王不聽出遇虞卿曰為入必語從為為我虞卿入王曰今者平原君為魏請從寡人不聽其於子何如虞卿曰魏過矣王曰然故寡人不聽虞卿曰王亦過矣王曰何也曰凡强弱之舉事强受其利弱受其害今魏求從而王不聽是魏求害而王辭利也臣故曰魏過王亦過虞卿傳有彪謂虞卿之言為皆不倍道非反覆揣摩為人緩頰說也從之利害正爾雖微平原之託卿亦必云爾終之趙利魏亦利矣惟不能必趙聽已從而先有輕發則是有受害之形也平原君謂馮忌後稱外臣知非趙人曰吾欲北伐上黨出兵攻燕何如馮忌對曰不可夫以秦將武安君公孫起補曰即白起前有乘七勝之威勝趙而與馬服之子戰於長平之下大敗趙師因以其餘兵圍邯鄲之城趙以亡敗之餘衆收破軍之敝守敝守守邯鄲而秦罷於邯鄲之下趙守而不可拔然者言所以然攻難而守者易也補曰姚本無然字者下有以字今趙非有七克之威也而燕非有長平之禍也今七敗之禍未復而欲以罷罷音疲趙攻强燕是使弱趙為强秦之所以攻而使强燕為弱趙之所以守而强秦以休兵休息之兵承趙之敝此乃强吳之所以亡而弱越之所以霸故臣未見燕之可攻也平原君曰善哉平原君謂平陽君曰公子牟魏公子即下魏牟若莊子所稱中山者不與應侯同時正曰按莊子中山公子牟謂瞻子下云魏牟萬乘之公子也是中山公子牟即魏牟非二人也又云公孫龍問於魏牟公孫龍闕平原君之門正應侯同時也史赧王四十九年范雎為相封應侯赧王之元年之喻死莊子書及稱之噲則魏牟之上及莊子下及應侯無疑說范載此以為公子牟謂穰侯游於秦且東而辭應侯東歸魏應侯曰公子將行矣獨無以教之乎曰且微君之命命之也臣故且有效於君夫貴不與富期而富至富不與粱肉期而粱肉至粱肉不與驕奢期而驕奢至驕奢不與死亡期而死亡至纍世以前坐此者多矣應侯曰公子之所以教之者厚矣僕得聞此僕平原自稱不忘於心願君之亦勿忘也平陽君曰敬諾彪謂此言真富貴之金石也有能書諸紳銘之几杖勒之盤盂則何亡國敗家之有補曰魏牟自言身居江海心在魏闕莊子告以重生則利輕則曰雖知而未能自勝於是又得大重傷之說焉故莊子許其雖未至道可謂有其意其人可知矣所以告范雎者亦以富貴驕奢警之是時雎方擅秦權廣身封快意恩仇沈於富貴公子特自其所急者言之其微旨固非雎所得聞也正曰此二章平原君皆當與平原君不受封諸章相次舊策所載是矣說張相國蓋梁人相趙嘗懷梁而鄙趙者正曰無考曰君安能少趙人而令趙人多君少多猶薄厚君安能憎趙人而令趙人愛君乎夫膠漆至黏也補曰黏一本作䵑女乙反問禮注䵑黏也而不能合逺鴻毛至輕也而不能自舉夫飄於清風舉鴻毛以見膠漆則橫行四海故事有簡而功成者因也今趙萬乘之强國也前漳滏後志滏水在鄴右常山左河間北有代帶甲百萬嘗抑强秦元作齊此言蘇秦從時也齊四十餘年而秦不得所欲正曰此不可知為何時考之史自慎靚王四年齊敗魏趙觀津軍二十六武靈九年是後趙伐齊則有之惠文之世而不聞齊伐趙也所謂强齊當是指閔王蘇秦約從擯秦不久而解趙雖强非秦敵不得所欲亦大言耳然與抑强齊之言不能無輕重矣由是觀之趙之於天下也不輕今君易萬乘之强趙而慕思不可得之小梁不可復得歸也意者相國以罪亡梁歟正曰無考臣竊為君不取也君曰善君字誤正曰相國稱君自是之後衆人廣坐之中未嘗不言趙人之長者也未嘗不言趙俗之善者也建信君貴於趙公子魏牟過趙趙王迎之顧反至坐迎客面之有顧則反前有尺帛且令工人以為冠工見客來也因避補曰句趙王曰公子乃驅後車幸以臨寡人願聞所以為天下魏牟曰王能重王之國若此尺帛則王之國大治矣趙王不說形於顔色曰先王元作生補曰姚云生一作王不知寡人不肖使奉社稷豈敢輕國若此魏牟曰王無怒請為王說之曰王有此尺帛何不令前郎中以為冠王曰郎中不知為冠補曰郎中官不獨秦魏牟曰為冠而敗之奚虧於王之國虧猶損而王必待工而後乃使之今為天下之工所與治國之人或非也社稷為虛戾補曰虛戾見秦策先王不血食而王不以豫工乃與幼艾趙岐曰艾美好且王之先帝帝王者人君之尊稱此與稱秦孝公為先王者同也駕犀首駕驂以御馬喻也陳軫傳言衍與燕趙之王有故蓋衍雖相魏實趙任之為外相也而驂馬服以與秦角逐角有鬭爭意秦當時避元作適適補曰適恐當作避其鋒今王憧憧往來不絶貌乃輦建信以與强秦角逐臣恐秦折王之輢元作椅椅也輢車旁也以輦喻故云補曰詩猗重較兮猗隱綺反注依也此椅雖不同然義亦當與輢通餘見齊策王斗章正曰舊本衛靈公近雍疽彌子瑕章在此章之後下章之前今按二臣皆衛幸臣亦建信之類宜屬上下章不應自為章也闕延以其章置之衛非是或謂建信君君補正曰當有缺字或曰君下有曰字之所以事王者色也之所以事王者智也趙人名補曰字書解葺字蓋葺儀禮注壻俗作晉唐人書咠多作前章盛氣胥之一本揖之魏策中一本咠亡一本晉云韓策咠夫一本臣蓋月耳字易混也色老而衰智老而多以日多之智而逐衰惡之色君必困矣建信君曰奈何曰並驥而走者五里而罷音疲乘驥而御之不倦而取道多君令乘獨斷之車不與之分治御獨斷之勢以居邯鄲令之內治國事外刺諸侯刺言探候其事則之事有不言者矣所治者多不暇悉言於上君因言王而重責之之軸今折矣不勝多事之任建信君再拜命入言於王厚任以事而元作能能正曰能字句猶言為重責之未期年而亡走矣彪謂奸人之不可知甚矣智知所無奈何彼厚任以事以為不世之遇矣殫力竭慮恐不給焉而不知建信之困之也故國有姦人賢智之得全者寡矣苦成帝未詳謂建信君曰天下公從公猶同補曰一本公作合而獨以趙惡秦言從者皆惡秦也而世獨言趙何也魏殺吕遼元作遺從上文遺正曰上章作遼未知孰是而天下交之天下惡秦秦重遼魏殺遼而諸國交之然則秦惡魏深矣補曰交下當有缺字即上章衛兵之事今收河間不封文信正曰不韋欲攻趙以廣河間趙欲收河間於是與殺吕遼遺何以異文信亦秦所重今不與也秦必惡趙君唯飾元作釋釋虛懼秦覺也僞文信侯虛與之河間猶且知之也如是秦猶知其不善已况收河間乎正曰一本侯作疾亦難通疑侯字當在文信下殽亂上文從僞字句意明從而有功乎何患不得收河間從而無功收河間何益也正曰君唯釋虛僞謂合從之國虛僞難信君獨釋而不合則文信侯猶且知之也上言天下合從獨以趙惡秦故此言文信侯知趙之不合猶可以免攻也補曰從皆之恭反希寫趙人見建信君建信君曰文信侯之於僕也甚無禮秦使人來仕僕官之丞相使為丞相官屬爵五大夫補曰秦武王二年初置丞相秦爵五大夫第九劉昭曰軍吏也據此策則不特秦官趙亦有之戰國改制遞相效也文信侯之於僕也甚矣其無禮也言已待之厚彼不免無禮希寫曰臣以為今世用事者不如商賈建信君勃然曰足下卑用事者而髙商賈乎曰不然夫良商不與人爭買賣之賈而謹司時司伺時時賤而買雖貴已賤矣時貴而賣雖賤已貴矣昔者文王衍之字之拘於牖里而武王羈於王門項羽紀成臯北門注王門此事不經見卒斬紂之頭而懸於太白者旗名是武王之功也今君不能與文信侯相抗以權而責文信侯少禮臣竊為君不取也魏􅴃音介元作魀字書無之魀補曰一本標或作魀楚辭九魀北斗星名記文􅴃􅾎􅴃行不正貌公介公轄二反字亦不從犯謂建信君曰人有置係蹄者用繩以係獸蹄而得虎虎怒決蹯而去蹯獸足補曰蹯音煩虎之情非不愛其蹯也然而不以環寸之蹯害七尺之軀者權也今有國非直七尺軀也而君之身於王非環寸之蹯也言王且以愛國故去之願公之熟圖之也秦攻趙鼓鐸之音聞於北堂希卑趙人曰夫秦之攻趙不宜急如此此召兵也兵趙兵內應者蓋以鼓鐸為信必有大臣欲衡者耳衡即橫王欲知其人旦日贊羣臣而訪之贊者美其事以開說者先言橫者則其人也建信君果先言橫補曰魏牟謂趙王曰王之先帝駕犀首驂馬服今王乃輦建信君則在孝成之時明矣建信始欲合從今先言橫為國召兵罪不容誅然以嬖幸小人委國聽之罪在王爾大事記謂孝成雖有上黨將趙括之失猶能用頗牧以持國李伯之事猶能駕御豪傑愚觀其時秦兵日至疆宇日蹙客所謂賊在內者切中其病未有內治而國不强者也齊人李伯見孝成王成王說之以為代郡守而居無幾何人告之反孝成王方饋不墮食饋餽同方食而祭不墮失匕筯異矣正曰大事記不驚故食不墮也愚謂墮祭食猶放下也見儀禮墮許規反無幾何告者復至孝成王不應已乃使使者伯之使言齊舉兵擊燕恐其以擊燕為名而以兵襲趙故發兵自備今燕齊已合臣請要其敝兩國戰必有一疲因以兵邀擊之而地可多割自是之後為孝成王從事於外者無自疑於中者為齊獻書趙補曰姚本此下有使臣與復丑五字注云曾本無愚按其文未詳恐他簡脫誤曰臣一見而能令王坐而天下致名實元作寶即下致地寶而臣竊怪王之不試見臣而窮臣也窮猶困也困於不得見羣臣必多以臣為不能者故王重見臣也重猶難以臣為不能者非他欲用王之兵者也非若非也則交有所偏者也言賣趙與諸國為私非然則智不足者也非然則欲以天下之重恐王而取行者也王畏懼之必行其說補曰姚本云欲用王之兵成其私者也非然則交有所偏者也非然則知不足者也非然則欲以天下之重恐王而取行於王者也愚按此文為是臣以齊循事王王能亡燕能亡韓魏能攻秦能孤秦臣以衍為字為齊致尊名於王天下孰敢不致尊名於王臣以齊致地於王天下孰敢不致地於王臣以齊為王求名於燕及韓魏孰敢辭之臣之能也其前可見已言可見於未效之前齊先重王故天下盡重王衍重字重補曰姚本并無下王字王無齊天下必盡輕王也秦之强以無齊衍之字之故重王燕韓補魏自以無齊故重王趙得齊故四國無齊今王無齊獨安能無重天下猶四國重趙故勸王無齊者非智不足則不忠者也非然則欲用王之兵成其私者也非然則欲輕王以天下之重取行於王者也非然則位尊而能卑者也願王之孰慮無齊之利害也補曰能卑者才能卑下也此策時不可考趙使趙莊合從欲伐齊齊請效地趙因賤趙莊齊明為謂趙王曰齊畏從人之合也故效地今聞趙莊賤張勤貴勤蓋敗從者齊必不效地矣趙王曰善乃召趙莊而貴之正曰按史年表武靈王十三年秦拔我藺虜將趙莊此策必未虜之前豈得為孝成王將哉翟章從梁來甚善趙王趙王三延之以相翟章辭不受田駟謂柱國韓向柱國楚官蓋趙亦有曰臣請為卿刺之客若死客謂章則王必怒而誅建信君疑其殺章欲以專事建信君死則卿必為相矣建信君不死以為交終身不敝以殺章故建信交之卿因以德建信君矣馮忌補曰姚本忌作為廬陵君孝成母弟見趙記補曰趙記未見謂趙王曰王之逐廬陵君為燕也王曰吾所以重者無燕秦也無如二國正曰言不畏之也對曰秦三昭以虞卿為言而王不逐也前事爾非今正曰一本秦三以以下文一以字推之當是王字誤今燕一以廬陵君為言而王逐之是王輕强秦而重弱燕也王曰吾非為燕也吾固將逐之然則王逐廬陵君又不為燕也行逐愛弟行所行又兼無燕秦臣竊為大王不取也馮忌請見趙王行人見之馮忌接手交兩手俯元作免免補曰此書俯免通首欲言而不敢王問其故對曰客有見人於服子者未詳已而請其罪服子曰公之客獨有三罪望我而笑是狎也談語而不稱師是倍也倍言背其師交淺而言深是亂也客曰不然夫望人而笑是和也言而不稱師是庸說也言之常者人所同稱非必師交淺而言深是忠也昔者堯見舜於草茅之中席隴畝席設席而廕庇桑桑之能庇人者於下取蔭陰移而受天下傳伊尹負鼎俎而干湯姓名未著而受三公補曰伊尹負鼎俎干湯孟子集注所謂戰國時有為此說者指此說苑堯舜相見不違桑陰亦此類姚氏云天下傳劉去傳字使夫交淺者不可以深談則天下不傳而三公不得也衍趙王曰三字趙王曰補曰一本此下有甚善馮忌曰五字姚本同今外臣交淺而欲深談可乎王曰請奉教於是馮忌乃談此忌初見之談也應在平原謂馮忌之上然亦得為此史本其初言之故因舊客見趙王曰臣聞王之使人買馬也有之乎王曰有之何故至今不遣王曰未得買馬之工也補曰一本相馬對曰王何不遣建信君乎王曰建信君有國事又不知相馬曰王何不遣紀姬乎王曰紀姬婦人也不知相馬對曰買馬而善何補於國王曰無補於國買馬而惡何危於國王曰無危於國對曰然則買馬善而若惡皆無危補於國然而王之買馬也必將待工今將補曰姚本作治天下舉錯非也錯置也有舉有置國家為虛戾而社稷不血食然而王不待工而與建信君何也趙王未之應也客曰燕郭之法有所謂桑雍雍癰同桑中有蠧則外碨磈如人之癰正曰桑中有蠧以膏液流於外如癰潰然姚云曾劉並作柔雍下同補曰一本標劉本作郭偃之法晉掌卜太夫郭偃乃卜偃也王知之乎王曰未之聞也所謂桑雍者便辟左右之人及夫人優愛孺子也優饒也言愛之甚一曰倡補曰一本便辟左右之近者孺子見秦齊策此皆能乘王之醉昏而求所欲於王者也是能得之於內則大臣為之枉法於外矣故日月暉於外其賊在於內說林訓月照天下食於蟾蜍補曰朱子云晦朔而日月之合東西同度南北同道則月掩日而日食望而日月之對同度同道則月亢日而月食又謂蟾兔桂樹之說其惑久矣然策正以此為喻姚注云東坡本日月雕暉於內謹備其所憎而禍在於所愛彪謂王斗魏牟及此三士其言若出一口所謂理義人心之所同然者與至於此章肆直而慈惠尤可喜可愛有國有家者宜置之座右悼襄王孝成子元年補曰名偃始皇三年丁巳秦召春平侯及平都皆趙人正曰徐廣引年表云太子從質秦歸正義云太子即春平君也因留之泄元作世世補曰史作泄鈞秦人為之謂文信侯曰春平侯者趙王之所甚愛也而郎中甚妬之故相與謀曰春平侯入秦秦必留之故謀而入之秦今君留之是空絶趙而郎中之計中也故君不如遣春平侯而留平都侯春平侯者言行於趙王必厚割趙以事君而贖平都侯文信侯曰善因與接意而遣之趙記二年有幽王悼襄子元年補曰名遷史作幽繆王始皇十二年丙寅文信侯出走始皇十年免相就國十二年徙蜀飲鴆死與司空馬不韋吏也之趙補曰與字疑衍趙以為守相守假官也馬為之秦下甲而攻趙司空馬說趙王曰文信侯相秦臣事之為尚書秦官屬少府習秦事今大王使守小官習趙事請為大王設秦趙之戰設者無其事施陳為之而親觀其孰勝趙孰與秦大曰不如民孰與之衆曰不如金錢粟孰與之富曰弗如國孰與之治曰不如相孰與之賢曰不如將孰與之武曰不如律令孰與之明曰不如司空馬曰然則大王之國百舉而無及秦者大王之國亡趙王曰卿不逺趙而惠教以國事願於因計因非正為之猶秦王謂陳軫以其餘為寡人計也正曰髙注因猶受也司空馬曰大王裂趙之半以賂秦秦不接刃而得趙之半秦必說內惡趙之守秦雖說於得地趙猶有守之者秦所患也外恐諸侯之救秦必受之患於有守有救則其受之不得不急秦受地而卻元作郗郗補曰此書郤通姚本作㕁同兵趙守半國以自存秦銜賂以自强山東必恐亡趙自危趙亡則五國有脣亡之憂諸侯必懼懼而相救則從事有成臣請為大王約從從事成則是大王名亡趙之半實得山東以敵秦秦不足亡趙王曰前日秦下甲攻趙趙賂之以河間十二縣地削兵弱卒不免秦患今又割趙之半以强秦力不能自存因以亡矣願卿更計更猶易補曰王之言是馬之計非更如字可司空馬曰臣少為秦刀筆謂為尚書也筆以書札刀削其不當者以官長而守小吏其官之長任之為吏補曰姚本作小官未嘗為兵為猶治也馬謙言臣元作百百補曰姚本作首當屬上文請為大王悉趙兵以遇與秦接戰趙王不能將不用馬為將司空馬曰臣效愚計大王不用是臣無以事大王願自請猶乞骸骨司空馬去趙渡平原平原津令列女傳有趙津吏蓋此官也郭遺勞而問秦兵下趙上客從趙來趙事何如司空馬言其為趙王計而不元作勿勿補曰一本作弗勝用趙必亡平原令曰以上客料之趙何時亡司空馬曰趙將武安君李牧期年而亡若殺武安君不過半年趙王之臣有韓倉者以曲合於趙王曲不正也其交甚親其為人疾賢妬功臣今國危亡王必用其言武安君必死韓倉果惡之惡牧王令人代使趙葱顔聚代收武安君至使韓倉數之數列其罪曰將軍戰勝王觴將軍將軍為壽於前上趙王壽而捍匕首刃名蓋其首如匕漢鹽鐡論荆軻懷數年之謀而事不就者尺八匕首不足恃也捍衛也誣其以匕首自衛如欲刺王然補曰姚本注捍劉一作捭按李善注文選引此說文捭兩手擊也希買反匕短劒也補履反捍捍衛匕首也當死武安君曰繓牧名補曰此因髙注繓子沽反說文結也病鉤短傴如鉤正曰病鉤即所謂臂短也身大臂短不能及地起居不敬起居問王起居也不及地為不敬恐懼死罪於前不敬者其罪死故以死懼故使工人為木材以接手上若不信繓請以出示出之袖中以示韓倉狀如振栶栶就也蓋為木接手可以就地因以舉身也集韻梱門橛也又㮯拊也與楎同音衮犂轅也疑此木類此故名正曰一本作栶集韻以因為㧢今鮑本作梱而說乃作栶恐刋本誤栶乃木名鮑先据栶字以就地因舉身為說迂曲又以為梱苦本反門橛也此字頗近而通既又引相揮為言則汨矣揮呼歸反梱自為胡本反也蓋牧右臂短故為木材接之如振動梱橛也匕首挾以刺人牧為壽王前不敢出其振動有若捍匕首故以挾匕首罪姚云梱曾本作棡纒之以布願公入明之韓倉曰受命於王賜將軍死不赦臣不敢言武安君北面再拜賜死拜賜死之命縮劒將自誅縮當作摍集韻引也抽也乃曰人臣不得自殺宫中過元作遇補曰姚氏云劉作過司衍空字空補曰字衍馬門宫門趨甚疾此言牧之知禮也而史言牧不受命捕得斬之不知遷舍此何所聞而云乎補曰大事記牧之恭如此傳乃謂牧不受命趙使人微捕得斬之非也使不受命韓倉安得不數之豈非因廉頗不受代事而誤載乎愚按下章始明出誃元作䛂䛂補曰未詳姚本作誃門也誃别也右舉劒將自誅臂短不能及銜劒徵之於柱以自刺徵猶驗也口銜劒不自知其可死即柱以為驗也正曰銜劒於口因柱以自刺驗其手之不能及也武安君死五月趙亡此七年誅牧八年邯鄲為秦補曰終上文之日平原令見諸公必為之言補曰一本言之曰嗟咨乎咨亦嗟也司空馬又以謂元作為為司空馬逐於秦非不智也去趙非不肖也趙去司空馬而亡國國亡者補曰一本而國亡非無賢人不能用也元在秦策彪謂從橫之說皆有所偏而從人欲合六弱以攻一强其勢若可為也患諸侯之不一耳使諸侯而明於事變不惑小利不修小怨併力合慮而西雖不可以大有為其於蹙秦有餘惜乎當時不知此也自蘇秦死從終不堅秦兵四出諸侯挫於走北其氣奪矣司空馬欲以此時割趙之半說秦而反其兵因以復合天下之從豈不謬哉夫以全趙猶惴惴不自保安能守半趙以自存乎秦有并吞天下之心雖得半趙不盡不止而何以說之諸侯勢去自春申不能從以難秦司空馬獨能之乎故趙幽之亡罪在用韓倉而殺李牧無與司空馬平原令非篤論也補曰秦策秦王資頓弱以金北遊燕趙而殺李牧史稱秦多與趙王寵臣郭開金為反間而殺牧而廉頗傳稱頗之仇郭開與使者金使毁頗以張釋之傳云趙用李敗幾霸㑹趙王遷立其母倡也遷用郭開讒卒誅李牧列女傳云趙悼后者邯鄲倡女前嫁亂一宗族既寡悼襄王以其美而娶之李牧諫云云不聽後生子遷立為幽閔王后通於春平君多受秦賂而使王誅其良將李牧趙亡後大夫怨倡后之譖太子喜殺李牧乃殺倡后滅其家諸說皆可互考但史因廉頗不受代事而誤以為牧恐郭開韓倉亦有差互耳三請為其為必為之為去聲秦使王翦攻趙趙使李牧司馬尚禦元作御御補曰禦通詩亦以御冬之李牧數破走秦軍殺秦將桓齮王翦患之乃多與趙王寵臣郭開等金使為反間曰李牧司馬尚欲與秦反趙以多取封於秦趙王疑之使趙葱及顔最史作聚補曰一本葱作思注一作匆代將斬李牧廢司馬尚後五元作三三補曰據司空馬云云則當作五月王翦因急擊大破趙殺趙軍補曰史作趙葱虜趙王遷及其將顔最遂滅趙牧傳有補曰齮音蟻戰國策校注卷六
