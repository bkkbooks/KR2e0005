body:
  text: 戰國策校注卷一宋鮑彪原注元吳師道補正西周漢志河南洛陽穀城平隂偃師鞏緱氏皆周地也正曰按大事記周貞定王二十八年考王初立封其弟揭於河南是為河南桓公河南即郟鄏武王遷九鼎周公營以為都是為王城洛陽周公所營下都以遷頑民是為成周平王東遷定都王城王子朝之亂敬王徙都成周至是考王以王城故地封桓公焉平王東遷之後所謂西周者河豐鎬也東周者東都也威烈王以後所謂西周者南也東周者洛陽也何以稱河南為西周自洛陽下都視王城則在西也何以稱洛陽為東周自河南王城視下都則在東也河南桓公卒子威公立威公卒子惠公立考王十五年河南惠公復自封其少子班於鞏以奉王號東周沒亦諡惠是時東西周雖未分治河南惠公既號奉王者為東周亦必自號西周矣顯王二年趙與韓分周為二於是東西各為列國顯王雖在東周特建空名是後史𫝊所載致伯賜胙之類周王也征伐謀䇿稱東西周君者皆謂二周也周本紀云赧王時東西周分治非也赧王特徙都西周耳當以趙世家為正按髙誘注西周王城今河南東周成周今洛陽世本云西周桓公名揭居河南東周惠公名班居洛陽及索隱正義所載甚詳獨邵子經世書紀赧王為西周君與東周惠公並而不紀西周公仍舊誤也鮑考之不精即以西周為王謂之正統謂東不得先於西亂易舊次此開卷第一繆近時陳振孫書録特舉其首西周為美亦失考所當改正從舊又考春秋書王城成周公羊傳曰王城者何西周也成周者何東周也說亦甚明昭二十六年天王入于成周左傳以十二月入王城三十二年城成周蓋敬王定遷在既城之後而孫莘老胡康侯皆以成周即京師亦未考王城成周之實而誤合為一也要之此文古今說者多以迷瞀致誤故大事記辨之甚詳且實因鮑氏而發近有著東西周辨者其說亦然而不引吕子豈未之見耶西徐廣云周比亡凡七縣河南止緱氏此是合東周地言之今總注蓋因正統之說而誤者安王威烈王子此類並以事見紀表世家新出正曰東西周雖分王實在上策以東西周稱決不當係之王鮑以西周即王故此係以安王赧王而東周係以惠公彼西周桓威惠武等公著在史冊獨不見乎安王烈王實都東周而可係之西周乎按策中周君皆指東西二君故多稱主君其稱王者則附以見章鮑止以嚴氏為賊一條遂出王時事又誤也鮑用意雖勤傅㑹舛謬者多並見各章嚴氏為賊嚴仲殺韓相傀列侯三年書殺俠纍是也殺人不以道曰賊於此為五年正曰韓策陽堅此作豎字有訛索隱曰紀年韓山堅賊其君哀侯韓山堅即韓嚴非嚴遂使聶政殺俠纍事也說見上及韓策而陽豎與焉鴻烈人間訓注豎小使也韓策名堅道周出亡過周周君留之十四日載以乘車駟馬而遣之乘四馬也一車駕四馬所謂駟馬車韓使人讓周讓譙責也然則此時周之令已不行於諸侯矣正曰此東周君也策文明曰小國周君患之客謂周君正語之曰使以留之之情告之補曰一本客謂周君曰正語之正猶直也寡人孤寡不穀王侯之稱知嚴氏之為賊而陽豎與之故留之十四日以待命也待韓之命小國不足衍亦字亦補曰疑在不字上一本無以容賊君之使又不至是以遣之也元在東周策時周未分也彪謂客之辨雖足以文周而周君實為天下逋逃主所謂欲蓋而彰者何以示天下乎正曰考其時則烈王五年王都東周若以王都為尊則舊卷首東周是矣赧王周紀愼靚王子歲丁未立徙都西周西京鎬京也宋忠曰卒諡西周武公正曰西周不當係之王前已論之西周桓威惠武等公東周惠公昭文君雖見史𫝊然年世不明事實難附鮑所附赧王諸章據史亦有可考者然無考者悉強附焉係王既非不復深論鎬京大謬云按周紀西周君奔秦周君王赧卒宋忠曰云正義曰非也西周公即西周武公王赧即周王也周君與王赧此年俱卒通鑑書赧王入秦大事記謂當從之史衍周君二字又楚世家楚欲圖周周王赧使武公則武公為臣明矣豈可合為一人乎周共太子死周紹云西周武公之共太子死正曰策元在東周鮑據周紀改此恐有誤而下注周紀之文以存疑有五庶子皆愛之而無適立也適猶定也故與莫反正曰適專主也司馬翦司馬楚卿疑即昭翦謂楚王懷曰何不封公子咎周君别子而為之請太子請於周使立為太子左成楚人正曰此類當因舊注凡有明徴者可定其生地不可考而仕國可見者則當曰某國臣正義注此正作楚臣髙注亦多作臣後放此謂司馬翦曰周君不聽是公之智困困不通也而交絶於周也不如謂周君曰孰欲立也微告翦翦令楚王資之以地封地以為之資公若欲為太子此左成告翦之辭為皆去音猶助也因令人謂相國御展子楚相之御姓展牆夫空牆嗇字同小臣也空其名曰王類欲令若為之王楚王類猶似若汝也言楚王之意告此健士也此亦左成喻翦之言健猶悍也正曰此亦成作翦語語長子者居中國中不便於相國二士居中與國事以其悍故相國不之便若出而使周則不居中用事相國之所欲也故以此說之相國必從相國令之為太子此策周紀有元在東周正曰見上補曰共恭同適丁歷反咎音臯謂齊王凡言謂言為而不人失之也猶言或為或謂王閔王正曰周最屢見東西周䇿謂周最曰仇赫之相宋云云事在赧王十七年周最於齊王厚也而逐之聽祝弗相吕禮云云禮之相在赧王二十九年此則王當齊閔之世周紀赧王四十五年周君之秦客謂周最以應為太后飬地五十八年有周聚以收齊則正當頃襄王之世相距凡四十年不可定為閔王時也按策西周兩章皆云最為太子而東周又出最名無曰太子云者疑或自是二人然無所考曰王何不以地齎周最齎持遺也最周之庶子凡周皆周之族正曰鮑意此即上章事而上有五庶子之文爾無明據以為太子也齊王令司馬悍齊人以賂進周最於周進猶薦左尚齊人謂司馬悍曰周不聽是公之智困而交絶於周也公不如謂周君曰何欲置置猶立令人微告悍悍補曰一本悍請令令王進之以地左尚以此得事以教悍得齊王意故委任之疑此即上章楚王楚人補曰最史作聚索隱云最古聚字說文同趙䇿顔最史亦作顔聚司冦布司冦周官布其名為周最謂周君曰君使人告齊王以周最不肯為太子也閔王善最欲其為太子以賂進之最時讓立周以最不肯立告齊正曰閔王說見前章此並無據臣為君不取也函冶氏冶銷鐵也函蓋其姓補曰剡川姚氏云函姓冶官名因以為號為齊太公田和也始代吕氏為齊侯買良劔公不知善歸其劔而責之金歸還之也責取也金買劒之金越人請買之千金折而不賣折折劒正曰髙注云雖千金猶未盡其本價則故折其錢而不賣則折作折闕義若作斷折於下文不通將死函冶氏將死而屬其子屬囑同集韵託辭曰必無無以告人獨知自知其良正曰二語因髙注愚意必無獨知當作一句言凡有售必使衆知其良不可獨知也今君之使最為太子周雖以最不肯立告齊猶欲立之特未定耳獨知之契也契約也當兩知之今則獨補曰禮記右契注一書兩札同而别之天下未有信之者也臣恐齊王之謂元作為為補曰策為謂通借此當作謂君實立果亦周子而讓之於最讓飾說也以嫁之於齊嫁猶賣也言欺齊君為多巧巧猶詐最為多詐心欲之而言不肯君何不買信貨哉可信之貨非獨知也奉飬無有愛於最也愛猶吝使天下見之然則立最信矣從周紀皆當為楚王正曰使衆見之而信最之當立從周紀改楚非補曰為周為君為齊之為去聲秦令樗里疾秦惠王弟其居在渭南隂鄉樗里故號樗里子後相武王以車百乘入周周君迎之以卒百人為卒甚敬楚王怒懷王讓周以其重秦客謂疾游騰周人正曰髙注作臣謂楚王曰昔智伯晋卿智襄子之孫瑶欲伐厹由夷國屬臨淮漢志由作猶又九域圖并州有仇猶城引此正曰髙注狄國括地志云并州盂縣外城俗名原仇山史樗里傳作仇猶韓子仇繇吕氏春秋劉外紀夙繇髙注或作仇首漢志臨淮乃泗之漣水羅氏路史謂非智伯所伐者厹音求字又作厹㕤遺之大鐘載以廣車欲開道也因隨入以兵厹由卒亡無備故也受其鐘不防以兵桓公伐蔡也僖二年蔡姬沉舟蕩公公怒歸之未絶也蔡嫁之故伐之蔡蔡叔度所封屬汝南後徙沛下蔡號言伐楚號聲言也以伐楚號衆其實襲蔡無鐘鼓曰襲正曰此據左氏說陸氏纂例掩其不備曰襲今秦虎狼之國也喻其貪殘兼有吞周之意使樗里疾以車百乘入周周君懼焉以蔡厹由惑之以二國為惑補曰一本戒之注以二國為戒也故使長兵在前戈矛之屬強弩在後名曰衛疾衛行列為護也而實囚之補曰一本下有也字周君豈能無愛國哉恐一日之亡國恐秦亡之而憂大王為楚王憂楚王乃悅樗里𫝊有雍氏之役周紀注陽翟有雍氏城韓記注赧王三年十五年楚再圍雍氏此十五年也韓徴甲與粟於周徴猶索周君患之告蘇代秦之弟洛陽人蘇代曰何患焉代能為君令韓不徴甲與粟於周又能為君得髙都屬上黨正曰水經云伊水徑邥郵亭又北徑髙都杜預云河南新城有邥郵亭括地志云髙都舊城在洛州伊闕縣北京相璠云非在上黨者周君大悅曰子茍能寡人請以國聽以國事從之蘇代遂往見韓相國公仲元作中下同韓公族中正曰古仲字省補曰索隱云公仲侈裴駰云相國秦官韓亦有諸國倣秦也曰公不聞楚計乎昭應楚將也昭屈景皆楚之族姓後有不重注謂楚王懷王曰韓氏罷於兵罷疲同勞也倉廪空並榖所入無以守城吾攻之以飢因其飢攻之補曰一本收之不過一月必拔之得城曰拔如拔物然今圍雍氏五月不能拔是楚病也病猶困楚王始不信昭應之計矣今公乃徴甲與元作及及正曰史作與及義自通毋煩改字粟於周此告楚病也猶以飢疲告之昭應聞此必勸楚王益兵守雍氏雍氏必拔公仲中曰善然吾使者已行矣代曰公何不以髙都與周公仲中怒曰吾無徴甲與粟於周亦已多矣何為與髙都代曰與之髙都則周必折而入於韓折猶屈入猶歸秦聞之必大怒而焚周之節節符信也行者所執焚之者不通周也周官通逹於天下必有節無節則不逹不通其使是公以敝髙都得完周也何不與也公仲中曰善不徴甲與粟於周而與髙都楚卒不拔雍氏而去紀有而略周君為東周補曰正義雍於恭反薛公靖郭君田嬰之子孟嘗君田文也襲其父封薛薛屬魯國以齊為韓魏攻楚楚懷二十六年齊韓魏攻楚此十二年也又與韓魏攻秦齊閔二十六年為韓魏攻秦此十七年也正曰此據史按通鑑大事記赧王二年當閔王元年此當作十六年而藉兵乞食於西周藉猶借韓慶凡韓皆韓人其在周去韓仕周也凡非本國人皆自其國來仕者也為西周謂薛公曰君以齊為韓魏攻楚九年取宛葉以北二縣屬南陽九字誤當云六或五補曰宛於袁反鄧州縣葉舒涉反汝州縣為強韓魏為猶代補曰一本而取宛葉以北以強韓魏今又攻秦以益之益其強韓魏南無楚憂西無秦患則地廣而益重齊必輕矣夫本末更盛更猶迭虛實有時言不可常竊為君危之並言齊薛今雖善韓魏後或為患君不如令敝邑周也隂合為秦隂猶私而君無攻但出兵臨秦不用攻也又無藉兵乞食勿示秦以弱君臨函谷臨言以兵至其地函谷關名在𢎞農補曰正義云陜州桃林縣西南有洪溜澗古函谷也今屬靈寶縣而無攻令敝邑以君之情心所欲也謂秦王昭襄曰薛公必不補不字補曰史此下有不字是破秦以張韓魏張去音大之也所以進兵者欲王令楚割東國以與齊楚之東地即楚策下東國云而元作也也補曰史作而秦王出楚王懷以為和楚懷王十年張儀誘楚王會秦秦留之此十六年也君令敝邑以此惠秦秦得無攻周之力也秦得無攻元作破破而以楚之東國自免也必欲之楚王出必德齊齊出之齊之恩也齊得東國而益強而薛世世無患秦不大弱無三國之兵故而處之三晉之西趙魏韓本晉三卿分晉而君之故曰三晉三晉必重齊秦居晉西不弱而善齊三晉畏秦故齊重薛公曰善因令韓慶入秦而使三國無攻秦而使不藉兵乞食於周孟嘗傳有今按楚記三國攻楚秦救之引去與此言取宛葉小駮補曰大事記潁濵蘇氏云秦昭王欺楚懷王要之割地諸侯熟視無敢一言問秦者惟田文怨秦借楚為名與韓魏伐秦自山東難秦未有若此其壯者也惜其聽韓慶之計臨函谷而無攻以求楚東國而名義索然以盡由此觀之秦惟不遇桓文之君故橫行而莫之制世豈有以大義而屈於不義者哉去為強為和之為如字餘聲三國攻秦反反猶還西周恐魏之藉道也藉亦借為西周謂魏王哀正曰此據史按通鑑大事記顯王三十五年乃魏惠王後元年慎靚王三年當魏襄元年說見魏䇿此當作襄事在二十一年曰楚宋不利秦之聽元作德德三國也聽猶順從三國近楚宋秦聽之則強而害楚宋故不利也正曰三國不攻秦而解故秦德之秦德之則和而不利於楚宋彼且攻王之聚楚宋攻魏之廩庫正曰邑落曰聚如􅓆狐聚陽人聚之類以利元作到補曰一本作利秦若為秦報魏王魏王懼令軍設舍速東舍軍次也魏東還必道周周必賔之故恐今速東則無賔之之費矣韓魏易地韓策書此在楚圍雍氏後西周弗利樊餘周人正曰髙注作臣補曰姚云餘下曽有為周字謂楚王懷曰周必亡矣韓魏之易地韓得二縣魏亡二縣易地則魏亦有得而獨言亡者亡多於得也所以為之者魏雖多亡然且為之盡包二周東西多於二縣九鼎存焉漢志武王遷九鼎于郟鄏郟鄏屬河南為東周正曰說見前且魏有南陽鄭地三川河內修武注晉始啓南陽是也京兆山陽皆有鄭河南有新鄭此在楚魏之間新鄭也河南郡注秦三川郡也周紀三川震注涇渭洛補曰杜注在晉山南河北故曰南陽鄭本在西都畿內咸林武公得虢檜之地乃徙其封是為新鄭咸林今華州鄭縣新鄭今鄭州正曰三川河洛伊張儀所謂天下朝市秦武王所謂車通以窺周室者也秦拔成臯滎陽初置三川郡而包二周則楚方城之外危南陽郡注葉公邑號方城補曰正義云方城山在葉縣西韓兼兩上黨漢并州郡甘茂傳注逺韓近趙故言兩此韓所得也今按東策周最再說金投秦策藍田徑山三章所言則上黨亦屬魏以臨趙即趙羊腸以上危上黨壺關有羊腸坂髙注趙險塞山形屈折如羊腸此皆以所近之國強故危故易成之日楚趙皆輕楚王恐因趙兵以止易補曰一本因趙以止易也秦攻魏將犀武軍於伊闕唐志為縣屬河南注北有伊闕故闕此役秦昭十四年此二十二年補曰正義云水經注禹疏龍門以通水兩山相對若闕故謂之伊闕今洛南猶謂之龍門也諸本犀作􅙈當正進兵而攻周為周最謂李兊趙司冦曰君不如禁秦之攻周禁猶止趙之上計莫如令秦魏復戰趙魏鄰也魏有秦兵則趙無事今秦攻周而得之得猶勝正曰得其土地人民也則衆必多傷矣秦欲持元作待待補曰字有訛周之得得猶保必不攻魏恐重傷秦若攻周而不得前有勝魏之勞後有攻周之敗又必不攻魏今君禁之而秦未與魏講也講和解也補曰史甘茂傳索隱云鄒氏講讀曰媾又曰漢史媾講兩字常雜愚按搆構購者字亦然今凡為和解之義者定讀從媾為交結之義當從才後放此而全趙令其止必不敢不聽是君却秦而定周也却猶退秦去周必復攻魏魏不能支支猶拒必因君而講與秦和也則君重矣凡言重皆制人而不制於人者也若魏不講而疾支之是君存周而戰秦魏也重亦盡在趙犀武敗於伊闕周君之魏求救白起既敗魏遂進攻周周以魏怨之故往求救補曰大事記秦怒東周助韓魏故攻之按策文當作西周魏王昭以上黨之急辭之意者有趙或韓兵也正曰趙兵無考周韓魏共伐秦此時韓魏必和周君反見梁囿陳留浚儀注魏惠王自安邑徙大梁有林池曰囿正曰囿者蕃育鳥獸之所而樂之也綦母恢周人正曰髙注作臣謂周君曰溫囿不下此溫屬河內言其樂不在梁下而又近近周臣能為君取之反見魏王王曰周君怨寡人乎對曰不怨且誰怨乎臣為王有患焉周君謀主也猶為天子故正曰韓世家使公孫喜率周魏伐秦敗伊闕緣是故稱謀主此周君也而設以國為王扞秦設施陳扞衛也而王無之扞也無為周扞者臣見其必以國事秦也秦悉塞外之兵與周之衆以攻南陽而兩上黨絶矣言趙韓援魏之路絶正曰是時魏上黨被兵若周秦攻南陽則魏又當禦其攻而上黨必絶後云上黨無患言得併力於此也魏王曰然則奈何綦母恢曰周君形不好小利形猶勢也小利謂溫囿國小多憂其勢宜不得游觀事秦而好小利有秦助則無國患乃得游觀今王許戍三萬人戍守邊也許為周扞秦與溫囿周君得以為辭於父兄百姓云得戍卒之援而私元作利利補曰姚云錢本作私按作利字則與上協溫囿以為樂得戍公也得囿私也必不合於秦臣嘗聞溫囿之利計歲八十金魏人貢其上之數周君得溫囿其以事王者歲百二十金周許魏之數是上黨無患周善事魏則趙韓必不加兵而贏四十金贏有餘賈利也魏王因使孟卯鴻烈泛論注齊人即芒卯致溫囿於周君致送也而許之戍彪謂周君非賢君也秦兵在境而樂於囿其志荒矣恢雖能得囿非君子所以事其君者也補曰為辭為樂之為如字餘去聲犀武敗周使周足周相之秦或謂周足曰何不謂周君曰臣之秦秦周之交必惡皆美惡之惡正曰左傳周鄭交惡杜注兩相疾惡據此則皆當烏故反主君之臣主君稱周君又秦重秦之所重而欲相者欲得相周且惡臣於秦此人欲代足相周故敗其使事此二國所以必惡而臣不能為使矣臣願免而行免已之相以順欲者君因相之彼得相不惡周於秦矣君重秦此下或人復說足也故使相往行而免是元作且且輕秦也公必不免雖以免自請勢不可免也公言是而行交善於秦是公之事成元作成事成事補曰恐當作事成也交惡於秦不善於公者補者字且誅矣意其惡足於秦也蘇厲亦秦之弟謂周君曰敗韓魏殺犀武攻趙取藺離石祁者藺及離石屬西河祁屬太原補曰此注大事記取皆白起秦將武安君是攻用兵攻功字言善巧也正曰攻工字通借又有天命也得天之助今攻梁魏都梁必破破則周危君不若止之謂白起曰楚有飬由基者楚共王將善射去桞葉者百步而射之百發百中發發矢左右皆曰善有一人過曰善射可教射也矣意欲其息飬由基曰人皆善善善我子乃曰可教射子何不代我射之也客曰我不能教子支左屈右支如竹之支也蓋取其直左右臂正曰列女傳云左手如拒右手如附枝右手發之左手不知此射之道也夫射栁葉者百發百中而不以善息百中善也此時宜息少焉氣力倦弓撥矢鉤元作拘今從史撥弓反也鉤矢鋒屈也補曰姚本作鉤拘有鉤音古或通一發不中前功盡矣盡猶滅今公破韓魏殺犀武而北攻趙取藺離石祁者公也公之功甚多今公又以秦兵出塞過兩周踐韓而以攻梁踐履也猶過一攻而不得前功盡滅公不若稱病不出也周紀三十四年有補曰射之射桞之射食亦反楚兵在山南山吳嶽屬扶風禮所謂嶽山也正曰嶽山秦地非此所指髙注在周之山南伍元作吾下同吾補曰吾字訛當作伍得楚將也髙注吾作五將為楚王頃襄屬怨於周屬連也猶結或謂周君曰不如令太子將軍正周太子也將去音軍正猶卒正軍之率也正曰此謂將軍而正迎也史穰苴傳軍正無注迎伍吾得於境而君自郊迎令天下皆知君之重伍吾得也因泄之楚曰微漏其言使楚知之周君所以事伍吾得者器必多且歸楚此以間得於楚言與得之器其必載以歸王必求之楚王而伍吾得無效也效猶致也得實未嘗得器故無以效王必罪之以其欺也彪謂此謀雖不出於正而免國於難可也正曰鮑以此為尊周繆矣楚請道於兩周之間以假道請以臨韓魏周君患之蘇子元作秦秦字季子洛陽人其死時東西周未分此當為代若秦諸如七處不一正曰東西周說見前史不曰蘇秦東周洛陽人乎謂周君曰除道屬之於河除去穢也夏紀注河出金城積石蓋道行兩周之間使楚所假連及之正曰河東過洛汭在鞏縣東洛邑北望有河韓魏必惡之惡楚齊秦恐楚之取九鼎也道廣可以出鼎必救韓魏而攻楚楚不能守方城之外安能道二周之間若四國弗惡齊秦韓魏君雖不欲與也與之道正曰謂鼎也楚必將自取之矣秦召周君周君難往意不欲往或為周君謂魏王安釐正曰無考周紀作韓王曰秦召周君將以使攻魏之南陽王何不出兵於河南河南洛陽也時未為郡言河之南耳正曰河南即西周郟鄏考王封弟河南其名久矣周君聞之將以為辭於秦而不往以魏兵在境為言周君不入秦秦必不敢越河越度也而攻南陽周君之秦謂周最曰最時從王不如譽秦王之孝也秦昭因以原為太后飬地齊記注河內沁水有原城后昭王母宣太后也供養之地湯沐邑也補曰原姚本作應史同徐注潁川父城縣應鄉秦王太后必喜是公有秦也有言得其意交善周秦之交周君必以為公功交惡勸周君入秦者必有罪矣紀四十五年有秦欲攻周周最謂秦王昭曰為國之計者不攻周攻周實不足以利國而聲畏天下聲猶名也周天子也今見攻故天下畏秦正曰畏猶惡也周地狹不足以利國而有攻天子之惡名見畏惡於天下與司馬錯說同意天下以聲畏秦必東合於齊兵敝於周攻雖勝不無傷失而合天下於齊則秦孤而不王矣是天下欲罷秦罷疲同下同故勸王攻周秦與天下俱罷天下合齊而與秦戰戰則必疲則令不橫行於周矣橫行無畏忌也紀有宫他周人正曰髙注作臣謂周君曰宛恃秦而輕晉宛屬南陽故申伯國南陽三晉時屬韓韓釐五年秦拔我宛蓋宛亡在春秋之晉三晉分晉乃屬韓也秦飢而宛亡此下皆恃逺輕近而亡秦飢不能援宛故晉滅之其亡不經見鄭恃魏而輕韓魏攻秦而鄭亡鄭河南新鄭鄭君乙二十一年韓哀侯滅之邾莒亡於齊魯鄒衍故邾也邾曹姓國二十九世楚滅之莒屬越陽國故盈姓國三十世楚滅之蓋恃齊也陳蔡亡於楚陳舜後漢淮陽國楚惠王十年滅陳四十二年滅蔡皆不見所恃蓋即恃楚不備之也此皆恃援國而輕近敵也援引也故有助意今君恃韓魏而輕秦國恐傷矣君不如使周最元作早補曰姚本正作最隂合於趙以備秦則不毁戰國策校注卷一
