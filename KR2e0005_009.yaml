body:
  text: 戰國策校注卷九宋鮑彪原注元吳師道補正燕東有漁陽右北平遼西遼東西有上谷代郡鴈門南有涿郡之易容城范陽北有新城故安涿縣良鄉新昌及渤海之西而樂浪𤣥莬亦屬焉文公桓公子元年顯王八年庚申奉陽君衍李兊二字李兊甚不取於蘇秦傳亦云正曰奉陽君李兊者通封邑姓名言之也蘇秦當作蘇代因蘇秦稱奉陽君不說之語而訛也此䇿有蘇代為奉陽君說燕於趙以伐齊奉陽君不聽乃入齊即奉陽君不取蘇秦之事也李兊因為蘇秦云云此李兊二字誤羡也大事記以此章備載於蘇秦說燕與趙合從之下又據古史謂肅侯時奉陽君公子成實未亡削去捐館之語愚嘗辨蘇秦所稱奉陽君必别為一人奉陽君實李兊非公子成也且此章知决為蘇代者其言曰燕弱國也東不如齊西不如趙又曰燕亡國之餘此言正子噲之後昭王未破齊之時也文公據全燕之盛何得若此言哉史遷謂世言蘇秦事多異代厲事有類者皆附之秦則此類也蘇秦在燕李兊因為蘇秦謂奉陽君曰齊燕離則趙重齊燕合則趙輕今君之齊謂以燕合齊非趙之利也臣竊為君不取也奉陽君曰何吾合燕於齊問何以言然對曰夫制於燕者蘇子也言其制燕而燕弱國也東不如齊西不如趙豈能東無齊西無趙哉而君甚不善蘇秦蘇秦能抱弱燕而孤於天下哉是驅燕而使合於齊也且燕亡國之餘也惠公六年大夫誅其姬而惠公奔齊齊晉入之至而卒正曰史年表燕惠公欲殺公卿立幸臣公卿誅幸臣公恐出奔齊此事在周景王六年至燕文公二十八年蘇秦說燕之嵗為二百有五年不應逺舉此事此必齊破燕昭王既立之時也以此言知非蘇秦約從時事說亦見趙䇿其以權立權謂外與貴也以重外以事貴並謂齊趙正曰以權立者謂燕破亡之餘太子平以權宜立其勢微弱必重外必事貴外與貴謂他國齊趙之屬也故為君計善蘇秦則取之取言與之交不善亦取之以疑燕齊齊不善蘇子蘇子在燕而趙人取之則齊疑燕合趙而外已齊疑燕燕亦不能信齊矣燕齊疑則趙重矣齊王宣正曰湣疑蘇秦則君多資疑其合燕於趙奉陽君曰善乃使使與蘇秦結交正曰此䇿非文公時蘇秦將為從此二十八年北說燕文侯曰燕東有朝鮮屬樂浪補曰朝鮮箕子所封今髙麗國索隱云音潮仙遼東并州郡北有林胡樓煩補曰見趙䇿西有雲中九原屬五原補曰正義云雲中郡城在林榆縣東北九原郡城在林榆縣西界二郡皆在勝州南有呼沱易水出涿故安補曰呼沱見前正義云易水源出易縣西谷中之東東南流與滹沱河合水經易水出涿郡故安縣良鄉西山大事記引此二條地方二千里帶甲數十萬車七百乘騎六千匹粟支二年南有碣石雁門之饒并州郡補曰正義云碣石山在平州燕東南雁門山在代燕西南北有棗栗之利民雖不田作棗栗之實足食於民矣此所謂天府也夫安樂無事不見覆軍殺將之憂無過燕矣大王知其所以然乎夫燕之所以不犯冦被兵者以趙之為蔽於其南也秦趙五戰補曰設辭也秦再勝而趙三勝秦趙相蔽而王以全燕制其後此燕之所以不犯難也且夫秦之攻燕也踰雲中九原過代上谷彌地踵道彌猶亘踵猶繫正曰踵足後也徐曰猶言繼踵也數千里雖得燕城秦計固不能守也秦之不能害燕亦明矣今趙之攻燕也發號出令不至十日而數十萬之衆軍於東垣矣垣謂城正曰正義云東垣趙之東邑在恆州真定縣南故常山城度呼沱涉易水不至四五日而距國都矣故曰秦之攻燕也戰於千里之外趙之攻燕也戰於百里之內夫不憂百里之患而重千里之外計無過於此者是故願大王與趙從親天下為一則國必無患矣燕王曰寡人國小西迫强秦促近齊趙補曰一本南近齊魏齊趙强國補曰一本有也字今主君幸教詔之合從以安燕敬以國從於是齎蘇秦車馬金帛以至趙傳在說諸國之初權之難與齊戰也燕再戰不勝趙弗救噲子文公孫子噲謂文公曰不如以地請合於齊趙必救我若不吾救不得不事燕齊合則趙輕雖不救我後必事我文公曰善令郭任以地請講於齊趙聞之遂出兵救燕齊䇿此役言及魏冉知為文公末年補曰大事記從鮑說易王文公子元年顯王三十七年己丑燕文公時秦惠王以其女為燕太子婦文公二十年正曰史二十八年文公卒易王立齊宣王因燕喪攻之取十城武安君蘇秦為燕說齊王再拜而賀因仰而弔補曰索隱曰當時慶弔應有其辭史不録耳齊王按戈而却曰却秦使退此士何慶弔相隨之速也對曰人之饑所以不食烏喙者本草烏頭一名天雄以為雖偷充腹而與死同患也今燕雖弱小强秦之少壻也王利其十城而深與强秦為仇今使弱燕為雁行而强秦制其後以招天下之精兵此言秦兵為天下精此食烏喙之類也齊王曰然則奈何乎對曰聖人之制事也轉禍而為福因敗而為功故桓公負婦人而名益尊齊桓公也好內而霸正曰齊伐宋章蘇代曰智者之舉事也轉禍而為福因敗而成功齊人紫敗素也而賈十倍正義引韓子云齊桓公好服紫一國盡服紫當時十素不得一紫取惡素帛染為紫其賈十倍按二章所稱文意正同蓋紫者婦人之服紫敗素得厚利所謂名益尊也韓獻開罪而交愈固宣十二年楚伐鄭許之平晉救之荀桓子欲還彘子不可韓獻子謂桓子彘子以偏師陷子罪大矣不如進也戰于邲晉敗績成十三年獻子將下軍孟獻子曰晉師乘和必有大功十六年戰于鄢陵楚敗績此皆轉禍而為福因敗而為功者也王能聽臣莫如歸燕之十城卑辭以謝秦秦知王以已之故歸燕城也秦必德王燕無故而得十城燕亦德王是棄强仇而立厚交也且夫燕秦之俱事齊則大王號令天下皆從是王以虛辭附秦而以十城取天下也此霸王之業衍矣字矣所謂轉禍為福因敗成功者也齊王大說乃歸燕城以金千斤謝其後頓首塗中塗泥也自卑之甚願為兄弟而請罪於秦傳有人有惡蘇秦於燕王者曰武安君天下不信人也王以萬乘下之尊之於廷示天下與小人羣也武安君從齊來而燕王不館也謂燕王曰臣東周之鄙人也見足下初見身無咫尺之功而足下迎臣於郊顯臣於廷今臣為足下使利得十城功存危燕足下不聽臣者人必有言臣不信傷臣於王者且臣之不信是足下之福也使臣信如尾生亷如伯夷孝如曽參三者天下之髙行也而以事足下可乎補曰姚本作不可乎燕王曰可曰有此臣亦不事足下矣衍蘇秦曰三字蘇秦曰且夫孝如曽參義不離親一夕宿於外足下安得使之之齊亷如伯夷不取素飱詩注素空也汙武王之義而不臣辭孤竹之君爾雅孤竹四荒中北國漢屬遼西令支餓而死於首陽之山伯夷傳注在蒲坂華山之北河曲之中亷如此者何肯步行數千里而事弱燕之危主乎信如尾生期而不來傳言與女子期抱梁柱而死信至如此何肯揚燕秦之威於齊而取大功乎哉補曰燕秦燕字疑衍且夫信行者所以自為也非所以為人也皆自覆之術覆猶庇護也自護其名非進取之道也且夫三王代興五霸迭盛皆不自覆也君以自覆為可乎則齊不益於營丘即北海營陵太公所封足下不踰衍楚字楚補曰此正以燕楚相逺言之境不窺於邊城之外且臣有老母於周離老母而事足下去自覆之術而謀進取之道臣之趣固不與足下合者足下皆自覆之君也僕者進取之臣也所謂以忠信得罪於君者也燕王曰夫忠信又何罪之有也對曰足下不知也臣鄰家有逺為吏者其妻私人其夫且歸其私之者憂之其妻曰公勿憂也吾已為藥酒以待之矣後二日夫至妻使妾奉巵酒進之妾知其為藥酒也進之則殺主父言之則逐主母乃陽僵棄酒主父大怒而笞之笞擊也妾之棄酒上以活主父下以存主母也補曰陽僵覆酒事亦見列女傳云周室大夫妻一本故妾一僵而棄酒上以云云忠至如此然不免於笞此以忠信得罪者也臣之事適不幸而有類妾之棄酒也且臣之事足下亢義益國亢髙極也言髙其義今乃得罪臣恐天下後事足下者莫敢自必也且臣之說齊曽不欺之也使衍之字之說齊者莫如臣之言也雖堯舜之智不敢取也言無成功者雖聖智不足取也按秦傳有而略補曰此與後章蘇代謂燕昭王章同惟中一假彼言燕欲伐齊事為異記者或有差互不可考也人言秦不信故秦言已之不信乃足下之福如尾生亦無益謂守行義不成功名者之不足貴也又曰僕所謂以忠信得罪則又以信自待公為反覆以誑時君而莫有詰之者也王噲易王子元年慎靚王元年辛丑蘇秦死其弟蘇代欲繼之乃北見燕王噲曰臣東周之鄙人也竊聞王義甚髙甚順鄙人不敏竊釋鋤耨而干大王至於邯鄲所聞於邯鄲者又髙於所聞東周臣竊負其志乃至燕廷觀王之羣臣下吏大王天下之明主也觀其臣知其主王曰子之所謂天下之明主者何如者也對曰臣聞之明主者務聞其過不欲聞其善臣請謁王之過夫齊趙者王之仇讎也楚魏者王之援國也今王奉仇讎以伐援國非所以利燕也王自慮此則計過無以諫者非忠臣也王曰寡人之於齊趙也非所敢欲伐也言雖知其讎以其强故奉之不敢伐曰夫無謀人之心而令人疑之殆有謀人之心而令人知之拙謀未發而聞於外則危今臣聞王居處不安食飲不甘思齊報齊因喪見伐之怨正曰說誤見後身自削甲札札牒也甲之革緣如之正曰札本簡牒之簿者甲用革為之左成十六年養由基蹲甲而射之穿七札焉注言能陷堅札側滑反妻自組甲絣絣綿也治之為組以穿札正曰景帝詔纂組注組今綬絲絛也韻書以繩直物曰絣此謂編組穿甲之繩也絣悲萌反鮑因莊子洴澼絖之文生義不知彼字與此不同曰有大數矣補曰一本身自削甲札曰有大數矣與下文同大事記引此姚本同有之乎王曰子聞之寡人不敢隱也我有深怨積怒於齊而欲報之二年矣自即位至是正曰二年字必誤齊者我讎國也故寡人之所欲報也直患國敝力不足矣子能以燕報齊寡人奉國而委之於子矣對曰凡天下之戰國七而燕處弱焉獨戰則不能有所附則無不重南附楚則楚重西附秦則秦重中附韓魏則韓魏重且茍所附之國重此必使王重矣今夫齊王閔長主也補曰司馬貞云年長也或謂齊强故稱長主而自用也不如燕之附人正曰自恃其强也南攻楚五年稸積散稸亦積西困秦三年為秦所困正曰秦為齊困民憔悴士罷敝罷音疲北與燕戰覆三軍獲二將史並不書而又以其餘兵南面西舉補曰姚本而舉五千乘之徑宋舉宋在齊閔二十八年燕昭王二十六年比時未舉也而下十二章亦言齊以宋地封涇陽蓋宋䇿齊宣也所拔五城正曰此言舉五千乘之宋非僅得其城邑而已蓋在滅宋之後明矣下章包十二諸侯即史所謂泗上諸侯鄒魯之君皆稱臣者而包十二諸侯此其君之欲得也得其欲其民力竭也安猶取哉言齊不可復攻取且臣聞之數戰則民勞久師則兵敝師兼不戰言之王曰吾聞齊有清濟濁河可以為固有長城巨防足以為塞補曰清濟以下說見秦䇿誠有之乎對曰天時不與雖有清濟濁河何足以為固民力窮敝雖有長城巨防何足以為塞且異日也濟西不役不役者養兵以備敵所以備趙也河北不師所以備燕也補曰濟西齊州以西也河北謂滄景等州在漯河之北者正義云今濟西河北盡以役矣封內敝矣夫驕主必不好計而亡國之臣貪於財王誠能毋愛寵子母弟以為質寶珠玉帛以事其左右彼且德燕而輕亡宋輕者易為之然則前言舉未亡也則齊可亡已王曰吾終以子補補曰一本有子字姚同受命於天矣曰內冦不與冦猶亂與猶和外敵不可拒言不能制內則不可以拒外王自治其外謂謀敵齊臣自投其內謂治於內補曰為燕間齊投其內也此乃亡之之勢也彪謂燕昭之舉實自代發之正曰大事記云戰國䇿載蘇代說燕之辭誤以為噲使噲能有志如是豈至覆國乎論其世考其事皆說昭王之辭也按史記誤同蘇代為燕說齊未見齊王閔先說淳于髠曰人有賣駿馬者比三旦比猶連立市人莫之知往見伯樂曰臣有駿馬欲賣之比三旦立於市人莫與言子還而視之去而顧之顧反視補曰還當音旋義同臣請獻一朝之費元作賈賈補曰疑費字伯樂乃還而視之去而顧之一旦而馬價十倍今臣衍之字補曰一本無姚同之欲以駿馬見於王馬自喻也莫為臣先後者為之助也足下有意為臣伯樂乎臣請獻白璧一雙黃金千鎰以為馬食自喻為馬則此所獻馬之食也正曰獻此以為馬之食淳于髠曰謹聞命矣乃入言之王而見之齊王大說蘇子陳翠合齊燕將令燕王之弟為質於齊代傳說王噲已乃使一子質齊正曰鮑因此指為王噲事然史云一子質齊而此云燕王之弟則不合矣其時未可定燕王許諾太后聞之大怒曰陳公不能為人之國則亦已矣焉有離人子母者老婦欲得志焉以殺辱之為快陳翠欲見太后王曰太后方怒子子其待之陳翠曰無害也遂入見太后曰何臞也臞少肉也太后曰賴得先王鴈鶩之餘食不宜臞者補曰姚本無者字臞者憂公子之且為質於齊也陳翠曰人主之愛子也不如布衣之甚也非徒不愛子也又不愛丈夫子獨甚太后曰何也對曰太后嫁女諸侯奉以千金齎地百里以為人之終也嫁則女之事畢矣封亦公子之終也今王願封公子百官持職持猶守也封無功者爭之職也羣臣效忠曰公子無功不當封今王之以公子為質也且以為公子功也補曰一本且以為公子功而封之也姚同而太后弗聽臣是以知人主之不愛丈夫子獨甚也且太后與王幸而在故公子貴太后千秋之後王棄國家而太子即位公子賤於布衣故非及太后與王封公子則公子終身不封矣太后曰老婦不知長者之計乃命公子乘車制衣為行具補曰此與觸讋諫趙威后同戰國所載事多如此然觸讋言尤婉切所以人多稱之或獻書燕王燕補曰一本無此燕字姚同王而不能自恃弱國必得援不惡卑名以事强事强可以令國安長久萬世之善計也補以事强而不可以為萬世則不如合弱將奈何合弱而不能如一以不一為無如之何此臣之所以為山東苦也比目之魚爾雅東方有比目魚不比不行謂之鰈不相得則不能行故古人稱之以其合兩而如一也今山東合弱而不能如一是山東之智不如魚也又譬如車士之引車也三人不能行索二人五人而車因行矣今山東三國弱蓋韓魏趙也而不能敵秦索二國因能勝秦矣然而山東不知相索者智故不如車士矣胡與越人言語不相知志意不相通同舟而凌波至其相救助如一也今山東之相與也如同舟而濟秦之兵至不能相救助如一智又不如胡越之人矣三物者物猶事人之所能為也山東主補曰一本主上有之字遂不悟此臣之所為山東苦也願大王之熟慮之也山東相合之主者不惡補卑名之國者可長存言山東欲存惟不羞名卑者可也之卒者之猶其也卒猝同補曰疑當以三者字句不然卒者下有缺文出士以戌韓梁之西邊此燕之上計也不急為此國必危矣王必大憂今韓梁趙三國已合矣秦見三晉之堅也必南伐楚趙見秦之伐楚也必攻燕補曰一本必北攻姚同物固有勢異而患同者秦之伐韓故中山亡秦不暇救故趙亡之正曰秦非助中山者補曰一本之伐作久伐下句同姚並同齊按趙䇿蘇厲曰楚人久伐而中山亡魏䇿曰中山恃魏以輕趙齊魏伐楚而趙亡中山大事記謂楚與魏連兵中山失助而亡史稱主父與齊燕共滅中山則齊非中山與國也愚謂中山近魏二國相善信矣趙與齊燕滅中山乃年表惠文四年所書已與世家差一年且趙之有事中山久矣自武靈十九年胡服以來攻城略地無嵗無之何至此而始合齊燕滅之邪而秦韓齊魏伐楚敗唐昧重丘當武靈二十五年是年趙年表書攻中山通鑑綱目書中山君奔齊齊䇿稱中山君臣於齊蓋四國伐楚而趙不與趙得以攻中山而亡之其君遂出奔也史所載與䇿合者莫明於此中山君自奔齊則與齊共滅之言未可據秦韓齊魏共伐楚則所謂楚魏連兵非此年齊䇿曰齊燕戰而趙氏兼中山則史記之言有誤大事記或未察也今燕䇿又謂秦伐韓故中山亡則韓亦助中山者是年秦伐韓取穰豈其事歟愚嘗因此䇿與齊䇿陳軫合三晉事同而辨中山非至惠文三年始亡特遷其主爾以此數䇿觀之尤信今秦之伐楚燕必亡趙亡之臣竊為王計不如以兵南合三晉約戍韓梁之西邊山東不能堅為此此必皆亡燕果以兵南合三晉也此三年與楚三晉攻秦彪謂此三物喻從之精者也故雖子噲庸主亦能感動惜乎言猶在耳而諸侯之心已變矣此豈非夭亡之哉正曰此章當是昭王時說見齊䇿秦伐魏章下燕王噲既立蘇秦死於齊蘇秦之在燕也與其相子之為婚而蘇代與子之交及蘇秦死而齊閔元作宣下並同宣正曰通鑑大事記赧王二年齊湣王元年齊伐燕子之子噲死在赧王元年正宣王時事䇿與孟子合甚明辨見秦䇿王復用蘇代燕噲三年與楚三晉攻秦不勝而還子之相燕貴重主斷蘇代為齊使於燕燕王問之曰齊衍宣字宣王何如對曰必不霸燕王曰何也對曰不信其臣蘇代欲以激燕王以厚任子之也於是燕王大信子之子之因遺蘇代百金聽其所使鹿毛壽鹿蓋巨鹿壽之所居補曰徐廣云一作厝毛甘陵縣本名厝索隱云春秋後語亦作厝韓子作潘壽謂燕王曰不如以國讓子之人謂堯賢者以其讓天下於許由由必不受有讓天下之名實不失天下今王以國讓相子之子之必不敢受是王與堯同行也燕王因舉國屬子之屬猶付與子之大重或曰禹授益而以啓人為吏以啓臣為益吏及老而以啓為不足任天下傳之益也啓與友黨補曰姚本支黨攻益而奪之天下是禹名傳天下於益也補曰一本無也字其實令啓自取之今王言屬國子之而吏無非太子人者是名屬子之而太子用事王因收印自三百里石吏而效之子之補曰大事記以石計祿始見于此子之南面行王事而噲老以老自休不聽政顧為臣國事皆決子之子之三年燕國大亂百姓恫怨將軍市被太子平謀將攻子之儲子見離婁下正曰何以知即此人謂齊閔宣王因而伐之破燕必矣王因令人謂太子平曰寡人聞太子之義將廢私而立公飭君臣之義飭成也猶正正父子之位寡人之國小不足先後補曰正義云先後並去聲雖然則唯太子所以令之太子因數黨聚衆將軍市被圍公宫攻子之不克將軍市被及百姓乃反攻太子平將軍市被死以殉國搆難數月死者數萬衆燕人恫怨元作恐補曰姚本作怨百姓離意孟軻謂齊閔宣王曰今伐燕此文武之時不可失也補曰此當時所謂孟子勸齊伐燕者也使無孟子之書則人將此言之信乎要之聖賢決無是事也推此則凡後世之誣罔聖賢而無徵者可知王因令章子將五都之兵都大邑補曰索隱云五都即齊也臨淄是五都之一以因北地之衆齊之北近燕以伐燕士卒不戰城門不閉燕王噲死齊大勝燕子之亡二年而燕人立太元作公公補曰當作太史有子平是為燕昭王記三年有彪謂王噲七國之愚主也惑蘇代之淺說貪堯之名惡禹之實自令身死國破蓋無足算齊閔所以請太子者近於興滅繼絶矣而天下不以其言信其心蓋名實者天下之公器也豈可以虛稱矯舉而得哉故齊閔之勝適足以動天下之兵而速臨淄之敗也正曰大事記云子噲安知所謂堯舜者哉彼子之之徒借是名以篡國子噲特為說客所愚耳方子之未得國也則說以堯讓許由由不受有讓天下之名實不失天下噲於是乎以燕讓及子之既得國也則又說以禹不如堯薦益而以啓人為吏已而攻益奪其國噲於是乎抆三百石吏以上而效之其愚至此尚足論乎後世因此遂有不可慕虛名受實禍之論是論肆行則利祿之外無非虛名妨吾利祿者無非實禍人紀滅矣此君子之所懼也欲不惑者其唯知實理乎初蘇秦弟厲因燕質子而求見齊王閔齊王怨蘇秦秦為燕謀齊故欲囚厲燕質子為謝乃已遂委質為臣燕相子之與蘇代婚而欲得燕權乃使蘇代侍元作持持補曰史作侍質子於齊齊使代報燕燕王噲問曰齊王其霸乎曰不能曰何也曰不信其臣於是燕王專任子之已而讓位燕大亂齊伐燕殺王噲子之燕立昭王而蘇代厲遂不敢入燕皆終歸齊齊善待之蘇代過魏魏為燕執代齊使人謂魏王哀正曰襄曰齊請以宋封涇陽君秦不受秦非不利有齊而得宋地也不信齊王與蘇子也今齊魏不和如此其甚則齊不欺秦秦所以不信齊疑其合魏也秦信齊齊秦合涇陽有宋地非魏之利也故王不如東蘇子使歸齊秦必疑而不信蘇子矣疑其合齊魏齊秦不合天下無變五國無秦之兵伐齊之形成矣時齊魏相惡故云於是出蘇代代補補曰史復有代字之宋宋善待之補曰此䇿自蘇代過魏以下又見魏䇿疑自為一章而復出姚本别提行昭王噲子補曰名平元年赧王四年庚戌張儀為秦破從連橫謂燕王曰補曰儀說在昭元年大王之所親莫如趙昔趙王元作王襄子也王正曰魏䇿稱襄子謂襄王即此類以其姊為代王妻欲并代約與代王遇於勾注之塞補曰勾注見趙䇿乃令工人作為金斗長其尾補曰索隱云凡方者為斗若安長柄則名科尾即斗之柄其形若刀者是也按韻書科斗音同索隱皆云斗令之可以擊人與代王飲而隂告厨人曰即酒酣樂進熱啜飲也即因反斗擊之於是酒酣樂進取熱啜厨人進斟羮斟注也補曰即酒酣樂中請進熱啜句於是酒酣樂進取熱啜句正曰索隱云熱而啜之是羮也斟謂羮汁故名汁曰斟因反斗而擊代王殺之王腦塗地塗猶汚補曰一本反斗而擊之代王腦塗地正義云反斗倒柄擊也其姊聞之摩笄以自刺也笄簪也故至今有摩笄之山天下莫不聞補曰正義云摩笄山在蔚州飛狐縣東北百五十里事亦見趙世家大事記元王元年晉趙無恤滅代解題代北狄之别種其國在今蔚州史記誤以簡子卒在貞定王十一年十二年滅代今從外紀古文又云襄子夏屋之役見史記行如虎狼蓋生於兼并無親之國而承簡子貪暴之規遂以為臨大利決大計非用仁義之所也夫趙王武靈之狼戾無親暴戾如狼大王之所明見知也且以趙王為可親邪趙興兵而攻燕再圍燕都而劫大王趙燕記皆不書大王割十城乃却以謝趙王已入朝澠池補曰一本今趙王姚同效河間以事秦今大王不事秦補曰一本此句無今字姚同秦下甲雲中九原驅趙而攻燕則易水長城非王之有也濟北盧注云東至海蓋亦距燕云正曰易水見前章正義云長城在易州界且今時趙之於秦猶郡縣也不敢妄興師以征伐今大王事秦秦王昭必喜而趙不敢妄動矣是西有强秦之援而南無齊趙之患是故願大王之熟計之也燕王曰寡人蠻夷僻處雖大男子裁如嬰兒補曰裁史注音在僅也言不足以求正謀不足以決事今上客幸而教之請奉社稷西面而事秦獻常山之尾補曰尾猶末也恆山之東五城傳有在楚韓齊趙後彪謂燕昭賢智主也非儀此說能震動且人之性禀有父子不相肖者自襄至武靈七入傳矣而欲以其狼戾無親例之人豈信之哉然而燕昭之聽之也卑甚蓋拊摩新附之民勢未可以有為又諸國從之者衆故為卑辭以紓其國是儀之橫有天幸也加之數年收集繕治有其緒則若云者固昭王之所唾而棄者史言蘇代復重燕燕使約從如初此昭王之素所蓄積也宫他為燕使魏魏不聽留之數月客謂魏王哀正曰無考曰不聽燕使何也曰以其亂也對曰湯之伐桀欲其亂也故大亂者可得其地小亂者可得其寶今燕客之言曰客即他事茍可聽雖盡寶地猶為之也王何為不見補曰西周等䇿有宫他未知即此人否使事茍可聽云云語燕客之言以利誘王見之也魏王說因見燕客而遣之彪謂是客也以鄰國為壑者也彼惡知所謂天下為度者乎燕昭王收破燕後即位卑身厚幣以招賢者欲將補曰一本此有以字姚同報讎故往見郭隗補曰五罪反先生曰齊因孤國之亂而襲破燕孤極知燕小力補曰一本此有少字姚同不足以報然得賢士與共國以雪先王之恥孤之願也記有此文敢問以國報讎者奈何郭隗先生對曰帝者與師處王者與友處霸者與臣處亡國與役處役僕役屈已而事之屈枉也正曰屈也猶言折節北面而受學則百已者至先趨而後息先彼而趨後彼而息先問而後默則什已者至人趨則若已者至補曰一本人趨已趨是姚同馮几據杖馮據也眄視指使則厮補曰音斯役之人至若恣雎奮擊雎仰目正曰恣雎暴戾也後荀彧傳注暴怒貌雎香萃反唐史音錐跳藉叱咄詬呵藉踐也當從足集韻咄呵也正曰詬呼俱呼具二反咄都活反下言叱咄上有詬字為復跳藉義亦不類當是詬藉見韓䇿釋為跳躍此謂跳躍跳藉也則徒𨽻之人至矣此古服道致士之法也服猶事事有道者王誠博選國中之賢者而朝其門下天下聞王朝其賢臣天下之士必趨於燕矣昭王曰寡人將誰朝而可郭隗先生曰臣聞古之君人有以千金求千里馬者三年不能得涓人謁者也正曰楚世家涓人見國語韋昭云今之中涓漢書顔注中涓官名居中而涓潔也如淳云主通書謂出入命也言於君曰請求之君遣之三月得千里馬馬已死買其骨五百金反以報君君大怒曰所求者生馬安事死馬而捐五百金涓人對曰死馬且買之五百金况生馬乎天下必以王為能市馬馬今至矣於是不能期年千里馬之至者三記無之今王誠欲致士先從隗始隗且見事况賢於隗者乎豈逺千里哉於是昭王為隗築宫而師之樂毅自魏往鄒衍自齊往劇辛自趙往士爭趣燕燕王弔死問生與百姓同其甘苦二十八年國殷富士卒樂佚輕戰於是遂以樂毅為上將軍與秦楚三晉合謀以伐齊齊兵敗閔王出走於外燕兵獨追北入至臨淄盡取齊寶燒其宫室宗廟齊城之不下者唯獨莒即墨記同彪謂燕昭郭隗皆三代人也欲為國雪恥君臣問對無他言專欲得賢士而事之此無競惟人之誼也欲無興得乎哉臣役之對天下之格言市馬之喻萬世之美談太史公獨何為削之亦異於孔氏刪修之法矣正曰立國用賢固三代之道未可即以為三代之人大史公固為疏略然孔氏刪修之法則不係此補曰大事記解題引國䇿說苑云云今按說苑文小異梟冠子博選篇亦用隗言此則栁宗元所謂僞書取以充入者也客謂燕王曰齊南破楚西屈秦用韓魏之兵燕趙之衆猶鞭策也御諸國如馬使齊北面伐燕即雖五燕弗能當王何不隂出使密遣使者散游士頓齊兵頓勞敝之也敝其衆使世世無患燕王曰假寡人五年寡人得其志矣蘇子曰請假王十年燕王說奉蘇子車十五乘補曰姚本五十乘是南使於齊謂齊王閔曰齊南破楚西屈秦用韓魏之兵燕趙之衆猶鞭策也臣聞當世之舉王興起之王補曰舉字恐因下誤衍必誅暴正亂舉無道五旬舉之之舉攻不義今宋王君偃射天笞地鑄諸侯之象使侍屏匽屏厠也當作井匽路厠補曰周禮宫人為井匽注井漏井所以受水潦鄭司農云匽路厠也鑄諸侯之象即後章秦王所謂宋王無道為木人以象寡人射其面者展其臂彈其鼻此天下之無道不義而王不伐王名終不成補曰大事記云齊之伐宋也蘇代實啓之引䇿曰今宋王無道云云且夫宋中國膏腴之地鄰民之所處也齊民鄰宋者處之與其得百里於燕不如得十里於宋伐之名則義實則利王何為弗為齊王曰善遂興兵伐宋三覆宋宋遂舉燕王聞之絶交於齊率天下之兵以伐齊大戰一小戰再頓齊國成其名故曰因其强而强之乃可折也因其廣而廣之乃可缺也彪謂聽言亦難矣蘇子所以告齊王天下之正誼也齊用之不旋踵而招天下之兵故有事於天下者不可以人之言求諸已而己巳無罪而後可以誅人之罪已無釁而後可以乘人之釁正曰宋固可伐矣齊之伐宋猶孟子所謂以燕伐燕不行仁政動天下之兵者也蘇代曰王不伐王名終不成伐之名則義實則利此豈天下之正誼哉齊伐宋此二十七年宋急蘇代乃遺燕昭王書曰夫列在萬乘而寄質於齊寄猶委也一說如質子寄寓名卑而權輕奉元作秦秦補曰史作奉萬乘助齊齊助之伐宋民勞而實費破宋殘楚淮北楚之淮北宋鄰也宋破則此地殘補曰此已申淮北明矣下文又曰必反宋地而歸楚之淮北肥大齊肥亦大也讎强而國弱也此三者皆國之大敗也而足下行之將欲以除害取信於齊也宋者齊之害而齊未加信於足下而忌燕也愈甚矣然則足下之事齊也失所為矣夫民勞而實費又無尺寸之功破宋肥讎而世負其禍矣負猶荷足下以宋加淮北强萬乘之國也宋五千乘國也又加之淮北則萬乘而强而齊并之是益一齊也北夷齊之北國正曰索隱云北夷謂山北狄附齊者正義云齊桓公伐山戎方數百里加之以魯衛言齊因舉宋且并此數國此所謂强萬乘之國也而齊并之是益二齊也夫一齊之强而燕猶不能支也今乃以三齊臨燕其禍必大矣雖然臣聞智者之舉事也轉禍而為福因敗而成功者也齊人紫敗素也敗猶惡也素白繒染為紫而賈十倍越王勾踐棲於㑹稽而後殘吳霸天下此皆轉禍而為福因敗而為功者也今王若欲轉禍而為福因敗而為功乎則莫如遙霸齊而厚尊之使之盟於周室背秦而從使齊主盟補曰一本使使明於盡焚天下之秦符約曰夫上計破秦其次長賔客秦秦挾賔客以待破挾如挾長之挾秦挾賔客本欲并天下而反見破故必患正曰姚本長賔之秦史長賔之秦挾賔以待破史文為是按魏䇿有此文法賔即擯二客字因賔字誤衍秦王昭必患之秦五世以結諸侯今為齊下秦王之志茍得窮齊不憚以一國都為功將割以賂與國然而王何不使布衣之人以窮齊之說說秦謂秦王曰燕趙破宋肥齊尊齊而為之下者燕趙非利之也弗利而勢為之者何也以不信秦王也今王何不使可以信者接收燕趙令涇陽君若髙陵君二君秦所重天下信之先於燕趙秦有變謂背二國因以為質則燕趙信秦矣秦為西帝趙為中帝燕為北帝立為三帝而令諸侯韓魏不聽則秦伐之齊不聽則燕趙伐之天下孰敢不聽天下服聽因驅韓魏以攻齊曰必反宋地而歸楚之淮北夫反宋地而歸楚之淮北燕趙之所同利也並立三帝燕趙之所同願也夫實得所利名得所願則燕趙之棄齊也猶釋敝屣革履也當作屣正曰屣所綺反說文舞履也徐云謂足根不正納履也引漢志邯鄲女跕屣字與屣屣通今王之不收燕趙則齊霸必成矣諸侯戴齊而王獨弗從也是國危也秦受齊伐諸侯戴齊而王從之是名卑也王不收燕趙名卑而國危王收燕趙名尊而國寧夫去尊寧而就卑危智者不為也秦王聞若說也必如刺心言其切已正曰心痛如刺然補曰然字句可則王何不務使智士以若此言說秦伐齊必矣夫取秦上交也伐齊正利也尊上交務正利聖王之事也燕昭王善其書曰先人嘗有德蘇氏資秦合從子之之亂而蘇氏去燕燕欲報讎仇於齊非蘇氏莫可乃召蘇氏王噲䇿言魏出之之宋宋善待之今在宋也正曰按此䇿文蓋齊已滅宋取楚淮北之後勸之尊齊擯秦而說秦以伐齊非將伐宋時事也䇿云蘇代過魏魏為燕執之齊使人說魏出代代之宋宋善待之史遂以此䇿首語接其下且史紀代事前後固多誤如舉五千乘云云以為說子噲之類代為燕間齊勸之伐宋見於䇿者可考矣是宋未滅時代已至燕豈至此時尚留宋而為之說燕哉此䇿不能無舛而史尤失之也復善待之與謀伐齊竟破齊閔王出走代傳有蘇代謂燕昭王曰今有人於此孝如曽參孝已信如尾生髙亷如鮑焦史鰌衛卿子魚兼此三行以事王奚如王曰如是足矣對曰足下以為足則臣不事足下矣臣且處無為之事歸耕乎周之上地耕而食之織而衣之王曰何故也對曰孝如曽參孝已則不過養其親耳信如尾生髙則不過不欺人耳亷如鮑焦史鰌則不過不竊人之財耳今臣為進取者也臣以為亷不與身俱逹不茍取故多窮義不與生俱立仁義者自完之道也非進取之術也王曰自憂不足乎憂亦完也不完則憂故曰完又曰憂對曰以自憂為足則秦不出殽函齊不出營丘楚不出疏章地缺三王代位五伯改政皆以不自憂故也若自憂而足則臣亦周之負籠耳籠竹器何為煩大王之廷邪煩凂也昔者楚取章武屬渤海諸侯北面而朝秦取西山諸侯西面而朝曩者使燕毋去周室之上去猶失也上上地燕蓋嘗攻得而不取也正曰此句未詳恐注非則諸侯不為别駕而朝矣言同軌而朝燕與朝秦楚同臣聞之善為事者先量其國之大小而揆其兵之强弱揆度也故功可成而名可立也不能為事者不先量其國之大小不揆其兵之强弱故功不可成而名不可立也今王有東嚮伐齊之心而愚臣知之王曰子何以知之對曰矜㦸砥劍矜矛柄㦸蓋為矜施㦸砥柔石所以礪也登丘東嚮而歎是以愚臣知之今夫烏獲舉千鈞之重行年八十而求扶持故齊雖强國也西勞於宋南罷於楚則齊軍可敗而河間可取燕王曰善吾請拜子為上卿奉子車百乘子以此為寡人東游於齊為燕說齊何如對曰足下以愛之故與補曰與平聲姚本下復有則字何不與愛子與諸舅叔父負床之孫負言背倚床立未能行也不得此屬皆不得不處與車而乃以與無能之臣何也王之論臣何如人哉今臣之所以事足下者忠信也恐以忠信之故見罪於左右王曰安有為人臣盡其力竭其能而得罪者乎對曰臣請為王譬昔周之上地嘗有之其丈夫宦三年不歸其妻愛人其所愛者曰子之丈夫來則且奈何乎其妻曰勿憂也吾已為藥酒而待其來矣已而其丈夫果來於是因令其妾酌藥酒而進之其妾知之半道而立慮曰吾以此飲吾主父則殺吾主父以此事告吾主父則逐吾主母與殺吾主補補曰此宜有主事父逐吾主母者寧佯躓而覆之躓跲也於是且佯僵而仆之其妻曰為子之逺行來之故為美酒今妾奉而仆之其丈夫不知縳其妾而笞之故妾所以笞者忠信也今臣為足下使於齊恐忠信不諭於左右也臣聞之曰萬乘之主不制於人臣十乘之家不制於衆人匹夫徒步之士不制於妻妾而又况於當時之賢主乎臣請行矣願足下之無制於羣臣也補曰此䇿說見前蘇秦章燕王謂蘇代曰寡人甚不喜訑者言也沇州謂欺曰訑補曰訑徒案反或作誕蘇代對曰周地賤媒為其兩譽也之男家曰女美之女家曰男美然而周之俗不自為取妻且夫處女無媒老且不嫁舍媒而自衒敝而不售敝猶敗無成事也順而無敗售而不敝者唯媒而已矣且事非權不立非勢不成夫使人坐受成事者唯訑者耳王曰善矣彪謂訑亦吾所惡而實不可廢古者使功使過使智使愚蓋用人可也處已則否正曰利誕謾之人以為用此不正之論也使過之說不類使愚使貪使勇亦謂御得其道耳非此之謂也蘇代謂元作為為奉陽君此亦其後襲稱正曰說見趙䇿說燕於趙以伐齊奉陽君不聽乃入齊代入惡趙令齊絶於趙齊已絶於趙因之燕謂昭王曰韓為謂臣曰人告奉陽君曰使齊不信趙者蘇子也令齊王閔召蜀子齊將正曰無考使不伐宋者𥙷蘇子也令齊王謀遁取秦以謀趙者遁逃去也言避秦兵取言與之合正曰按此䇿下文所云臣以為不若逃而去之以韓魏循自齊而為之取秦深結趙以勸之蘇子也令齊守趙之質子以甲者又蘇子也請告子以請齊告子名不害代請之使為已請齊正曰無據史引韓為謂代舉或人告奉陽君之言請者或人之請為趙言於齊也果以守趙之質子以甲果者必欲告子如是吾必守子以甲言告子不聽則然正曰謂告子齊果守趙質子以甲則吾將守子以甲其言惡矣雖然王勿患也人所告奉陽之言於代為惡燕王善代必患之故代告王以無患為其亂齊趙所以利燕臣故知入齊之有趙纍也言趙惡代出為之以成所欲出者奮不顧也言知其有纍而奮為之欲謂利燕臣死而齊大惡於趙臣猶生也今齊趙絶可大紛已紛亂也持臣非張孟談也持猶使補曰持字疑特使臣也如張孟談也齊趙必有為智伯者矣奉陽君告朱歡與趙足曰代稱奉陽之言然二皆趙人齊王使公玉曰齊人姓名正曰一本公玉按字書三畫中近上者于方反三畫勻者虞欲反𨽻始加㸃以别字新序有公玉丹史公玉帶則公玉姓也此疑有缺誤命說奉陽名正曰說即兊之訛說見趙䇿曰必不反韓珉今召之矣言故反前下類此必不任蘇子以事今封而相之必元作令令不合燕今以燕為上交吾所恃者順也公玉父名正曰無考鮑因下言有甚於其父遂云爾按趙䇿齊欲攻宋章以三晉劫秦使順也甘之恐即此人今其言變有甚於其父順始與蘇子為讎見之如元作知知無厲補曰無害也今賢之兩之兩謂封與相正曰賢之謂以代為賢兩之謂與之並處已矣吾無齊矣並述奉陽之言奉陽君之怒甚矣此代自言如齊王衍王字王補曰衍字之不信趙而小人奉陽君也待之為小人因是而倍之音背言燕宜然正曰言齊因是倍趙不以今時大紛之解而復合則後不可奈何也故齊趙之合茍可循也循言順燕死不足以為臣患代本以二國之合必不順燕今乃合而順之故有死逃之罪正曰言二國之合必害於燕茍順而無害國之利也故已之死逃榮辱皆不足論逃不足以為臣恥為諸侯不足以為臣榮被髮自漆為厲不足以為臣辱補曰厲史音賴見秦䇿死不足以為臣患及堯舜之賢而死兩節與秦䇿范雎說同然而臣有患也臣死而齊趙不循惡交分於臣也燕以二國可因而代不欲則三國皆惡代矣然二國卒不可因則代之惡皆有所分交猶皆而後相效交後人見其不可因而效已是臣之患也患其後時若臣死而必相攻也齊趙相攻臣必勉之而求死焉堯舜之賢而死禹湯之智而死孟賁之勇而死烏獲之力而死生之物固有不死者乎在必然之理死者人之必然以成所欲王何疑焉臣以補曰一本此有為字不若逃而去之許以罪逃去臣以韓魏循自齊言逃燕則自韓魏順行至齊而為之取秦言徑齊以怒趙深結趙以勤之此徑趙以怒齊也結亦以韓魏趙自燕結之勤猶厚如是則近於相攻也臣雖為之不𥙷纍燕正曰臣雖為之纍燕下文引奉陽君之言而釋之曰臣雖為之不纍燕奉陽君告朱歡曰亦代稱之蘇子怒於燕王之不以吾故以用也吾指奉陽弗子相子謂歡正曰子謂代又不豫卿也補曰一本不豫相又不豫卿也豫亦為蘇子自豫也殆無燕矣其疑至於此燕王善代而奉陽謂其怒燕者疑也故臣雖為之不纍燕疑代怒燕故代雖為燕紛二國二國不怨燕也又不欲王欲猶須也言其自相攻不須燕伊尹再逃桀而之湯補曰一本此句上有再逃湯而之桀六字姚本同果與鳴條之戰而以湯為天子伍子胥逃楚而之吳果與柏元作伯伯正曰古字通古今人如柏虎柏益伯樂之類舉之戰而報其父之讎今臣逃而紛齊趙始可著於春秋且舉大事孰不逃桓公之難管仲逃於魯陽虎之難孔子逃於衛定八年陽虎作難十四年孔子乃適衛不如此所云張儀逃於楚傳不書正曰即儀至楚之事白圭逃於秦未詳望諸相中山也此與樂毅同號使趙趙劫之求地望諸攻關而出外孫之難未詳薛公釋載不乘車也逃出於關齊湣二十五年田文入秦秦囚欲殺之因秦幸姬得出馳去變姓名出關三晉稱以為好補補曰士上恐有缺字士太史公曰好客自喜故舉大事逃不足以為辱矣卒絶齊於趙趙合於燕以攻齊敗之補曰此䇿文多未詳注多未安燕昭王且與天下伐齊而有齊人仕於燕者昭王召而謂之曰寡人且與天下伐齊旦暮出令矣子必爭之爭之而不聽子因去而之齊寡人有時復合預言不勝與齊合補曰一本復合和也且以因子而事齊當此之時也燕齊不兩立然而常獨欲有復收之之志若此也收猶合不兩立則不可復合而不能無合之之志彪謂此少年狡獪之行小人患失之類而燕聊為之此其所以不王也補曰當此以下紀述者之辭齊魏爭燕齊謂燕王曰吾得趙矣魏亦謂燕王曰吾得趙矣燕無以決之而未有適補曰音的豫也蘇代謂燕相曰臣聞辭卑而幣重者失天下者也辭倨而幣薄者得天下者也今魏之辭倨而幣薄燕因合於魏魏補補曰姚本有此字得燕元作趙趙正曰魏曰得趙燕因合於魏而得趙也齊遂北矣魏昭十二年與秦趙韓燕伐齊敗之燕獨入臨淄此二十八年蘇代自齊使人謂燕昭王曰臣間元作聞間猶頃也聞補曰當作間正曰間去聲致隙曰間間隔也離齊趙齊趙已孤矣王何不出兵以攻齊臣請為王弱之燕乃伐齊攻晉疑兵也實合魏而陽攻以疑齊正曰晉地名下文云晉下可見令人代令之謂閔王曰燕之攻齊也欲以復振故地也振舉也蓋欲復王噲所失燕兵在晉而不進則是兵弱而計疑也王何不令蘇子將而應燕乎夫以蘇子之賢將而應弱燕燕破必矣燕破則趙不敢不聽是王破燕而服趙也閔王曰善乃謂蘇子曰燕兵在晉今寡人發兵應之願子為寡人為之將對曰臣之於兵何足以當之王其改舉别用他將王使臣也是敗王之兵而以臣遺燕也戰不勝不可振也振救也王曰行寡人知子矣蘇子遂將而與燕人戰於晉下晉之下地齊軍敗燕得甲首二萬人蘇子以其餘兵以守陽城而報於閔王曰王過舉令臣應燕今軍敗亡二萬人臣有斧質之罪請自歸於吏以戮閔王曰此寡人之過也子無以為罪明日又使燕攻陽城及狸燕地也趙悼襄元年攻燕取狸陽城正曰據此䇿則燕取之於齊者也大事記引正義云燕無狸陽疑字誤當作漁陽按此文兩云陽城及狸則正義說亦未可據又使人謂閔王曰日者齊不勝於晉下此非兵之過齊不幸而燕有天幸也今燕又攻陽城及狸是以天幸自為功也王復使蘇子應之蘇子先敗王之兵其後必務以勝報王矣王曰善乃復使蘇子蘇子固辭王不聽遂將與燕戰於陽城燕人大勝斬首三萬齊君臣不親百姓離心燕因使樂毅大起兵伐齊破之彪謂蘇代之於燕齊皆嘗隙而復善之情禮均也而獨為燕圖齊之深何哉昭王賢也雖然糜爛人之民人以行其說而奉其所賢仁者不為也獨不念嘗委質於齊乎補曰蘇代傾詐不義一至於此其罪浮於張儀矣蘇代自齊獻書於燕王曰臣之行也固知將有口事言人譖之故獻御書而行獻侍御者以書曰臣貴於齊燕大夫將不信臣臣賤將輕臣臣用將多望於臣望猶責齊有不善謂惡燕將歸罪於臣天下不攻齊將曰善為齊謀天下攻齊將與齊兼貿元作鄮鄮補曰鄮當作貿互易也字增邑訛臣貿猶賣臣之所重處重留元作卯鄮正曰一本卵作卯姚同據此則重當平聲重卵猶言纍卯謂已處危也上文恐多重字也重猶難也留謂處於齊為難王謂臣曰吾必不聽衆口與讒言吾信汝也猶列眉也言無可疑補曰列眉未詳一本猶者也姚同龍龕手鑑古字愚謂即字也者斬斷果決之意上可以得用於齊次可以得信於下茍無死女無不為也以女自信可也以猶由與之言曰王與之去燕之齊可也期元作其其補曰當作期字通借於成事而已臣受令以任齊得任於齊正曰以齊為任及五年齊數出兵未嘗謀燕齊趙之交一合一離燕衍王字王正曰一本不與齊謀趙則與趙謀齊疑王即不字之訛與齊謀趙則與趙謀齊燕與齊謀趙實欲離齊於趙代因與趙謀齊以成燕之謀正曰見上齊之信燕也至於虛北地虛言不設備齊北近燕行其兵以北兵伐他國今王信田伐與參去疾之言二人讒代者且攻齊使齊犬馬而不言燕且辭也犬馬言已賤齊如之又不泄燕之謀補曰一本犬馬姚同字書無字恐即賤今王又使慶燕臣名令臣曰吾欲用所善王茍欲用所善王欲用之補曰姚本王茍欲用之無中間五字文義為勝則臣請為王事之王欲醳臣醳釋同見鄒忌說琴補曰魏世家如耳云以秦醳衛張儀傳醳之索隱云古釋字專元作剸剸補曰專字訛任所善則臣請歸醳事臣茍得見則盈願彪謂為人間者均有此六患非燕昭之明代其危哉功成矣猶不能無此患况他人乎代之謀齊亦異乎豫讓之於趙矣彼哉彼哉補曰此䇿蓋代在齊而或有疑之於王者故代以書自白文多未詳燕昭即位志復齊讎非一日矣樂毅以趙亂適衛至燕在十七年之後又十年始合五國以破齊方其患齊之强志未逞也蘇代之徒為之間齊離趙之交激秦之怒勸之以伐宋驕其兵而罷其師齊卒以亡代有力焉而世不數何也蓋毅之為燕約結信義服人卒用此以勝何假乎代之為哉代之傾詐反覆效用於燕亦昭王之賢明有以御之非倚以成功也秦召燕王燕王欲往蘇代約燕王約猶止曰楚得枳屬巴郡而國亡皆謂失地秦昭此七八九年連拔楚郡齊得宋而國亡即此二十八年入臨淄三十二年下七十城齊楚不得以有枳宋事秦者何也是則有功者秦之深讎也言此以見克齊者秦之所惡也秦取天下非行義也暴也秦之行暴正告天下告楚曰補曰姚本秦之行暴於天下正告楚曰蜀地之甲輕舟浮於汶汶江水出岷山補曰汶眉貧反即岷乘夏水江夏注沔水自江别至南郡華容為夏水正曰索隱云夏音暇謂夏潦之水盛漲時也下文乘夏水兩出可見矣西下江五日而至郢漢中之甲輕舟出於巴乘夏水下漢補曰一本而下姚同四日而至五渚史注在洞庭正曰今詳本文下漢而至五渚則五渚乃漢水下流洞庭在江之南非其地也寡人積甲宛東下隨屬南陽智者不及謀勇者不及怒寡人如射隼矣隼祝鳩喻易也正曰射隼見易解卦正義云隼今之鶻也王乃待天下之攻函谷不亦逺乎楚王為是之故十七年事秦秦正告韓曰我起乎少曲韓地范雎傳伐韓少曲補曰本文少曲髙平正義云相近髙平在懷州河陽縣西北一日而斷太行補曰正義云太行山羊腸坂道北過韓上黨也我起乎宜陽而觸平陽補曰宜陽見前平陽即近武遂韓墳墓所在者二日而莫不盡繇我繇由同正曰索隱云繇音搖搖動也我屬下句離兩周而觸鄭五日而國舉韓氏以為然故事秦秦正告魏曰我舉安邑塞女㦸韓氏太原卷不通此四處正曰安邑女㦸見前太原在河東時屬趙卷見魏䇿正義云卷猶斷絶軌免反太原當為太行蓋曰秦舉魏之安邑塞魏之女㦸則韓氏太行斷絶也按趙䇿秦舉安邑而塞女㦸韓氏太原絶正義以卷為絶據此下軹元作枳枳補曰姚本我下按枳道即河內地軹枳字通道道南陽封冀道道所由也後志河東皮氏有冀亭注引此正曰南陽即修武封封陵杜預云在蒲州兼包兩周乘夏水浮輕舟强弩在前銛㦸在後決滎口滎澤之口補曰索隱云滎澤口與今汴河口通其水深可以灌大梁公子無忌亦云然大事記灌大梁之䇿戰國以來人皆知之秦卒用此䇿魏無大梁決白馬之口魏無濟陽決宿胥之口徐注紀年曰敖山塞集胥口魏無虛頓丘補曰大事記云水經注河水舊在白馬縣南決通齊陽黃溝白馬本衛之曹邑今滑州縣史作外黃濟陽大事記作黃齊陽說又見秦䇿宿胥虛頓丘並見秦魏䇿陸攻則擊河內水攻則滅大梁魏以為然故事秦秦欲攻安邑恐齊據之則以宋委於齊曰宋王無道為木人以象補曰一本作寫蓋古象字作鳥詘也寡人射其面寡人地絶兵逺不能攻也王茍能破宋有之寡人如自得之已得安邑塞女㦸因以破宋為齊罪秦欲攻韓元作齊齊恐天下救之則以齊委於天下曰齊人補曰一本人作王姚同四與寡人約四欺寡人必率天下以攻寡人者也必言攻之決有齊無秦無齊有秦必伐之必亡之已得宜陽少曲致藺離補石補曰藺離石見前據文恐有離字姚注石字三本同作君詳此當缺因以破齊為天下罪秦欲攻魏重楚恐楚擊其後則以南陽委於楚補曰鄧之南陽曰寡人固與韓且絶矣殘均陵地缺正曰正義云均州故城在隨州西南蓋均陵也塞黽隘補曰見楚䇿茍利於楚寡人如自有之魏棄與國而合於秦因以塞黽隘為楚罪兵困於林中補曰見魏䇿重燕趙以膠東委於燕膠東國故齊國項紀注即墨也以濟西委於趙已得講於魏質元作至至補曰索隱云當作質公子延秦子正曰魏子因犀首攻趙補曰一本首下有屬行而三字史姚同索隱曰謂連兵相屬也行胡郎反兵傷於離石遇敗於馬陵而重魏則以葉蔡委於魏補曰馬陵葉蔡並見前史離石作譙石馬陵作陽馬索隱云並趙地名已得講於趙則劫魏魏不為割困則使太后穰侯為和贏則兼欺舅與母贏謂勝舅謂穰侯適燕者曰以膠東適謫同補曰適即上所謂因以為罪者適趙者曰以濟西適魏者曰以葉蔡適楚者曰以塞鄳厄適齊者曰以宋必令其言如循環補曰言其無窮不可致詰也用兵如刺蜚集韻蟲名喻易也補曰蜚匪微反又上去二音一本刺繡姚注云錢本添入蜚字母不能知補曰一本知作制姚同舅不能約龍賈之戰魏襄五年秦拔我龍賈軍補曰此據世家年表在二年大事記從年表云魏惠王後二年崖門之戰封陵之戰魏哀十六年秦敗我封陵恐岸亭在穎韓注記岸門封陵亭名然則封陵亦屬穎川正曰哀當作襄封陵見封冀注補曰岸門之戰赧王元年當韓宣惠王十九年髙商之戰史不書趙莊之戰趙肅侯十三年趙莊與秦戰死河西秦之所殺三晉之民數百萬今其生者皆死秦之孤也補曰死於秦者之孤西河之外上雒之地三川晉國之禍三晉之半言上三地被禍居晉國之半正曰西河上雒魏地三川韓地言秦已得三晉之半也秦禍如此其大而燕趙之秦者補曰之下恐有缺字皆以爭事秦說其主此臣之所大患燕昭王不行蘇代復重於燕燕反約從親如蘇秦時或從或否而天下由此宗蘇氏之從約代厲皆以壽死名顯諸侯代傳有在伐齊事後彪謂秦之所以正告諸侯及其用詐皆愚弄之也而諸侯莫省獨一燕昭知之然亦不久死矣彪故曰秦橫之成天幸也補曰文甚明快燕饑趙將伐之楚使將軍之燕過魏見趙恢趙恢曰使除患無至除之使不至易於救患伍子胥宫之竒不用此除患者燭之武僖三十年晉秦圍鄭佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退之武見秦伯曰鄭知亡矣而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以倍鄰鄰之厚君之狐也秦伯說乃還張孟談皆救患者受大賞是故謀者皆從事於除患之遺者謂救患者補曰一本遺作道下無者字姚同義是而無元作先先補曰上疑有缺文使除患無至者今與補曰一本作豫姚同以百金送公也公謂楚使不如以言公聽吾言而說趙王惠文曰昔者吳伐齊為其饑也伐齊未必勝也而弱越乘其敝以霸今王之伐燕也亦為其饑也伐之未必勝而强秦將以兵乘元作承承正曰此書乘承通後昌國君章有王之西是使弱趙居强吳之處而使强秦處弱越之所以霸也願王之熟計之也使者乃以說趙王趙王大說乃止燕昭王聞之乃封之以地封恢也恢蓋趙之仕魏而為燕者為燕亦所以為魏也正曰無據趙且伐燕蘇代為燕謂惠王趙惠文曰昨者臣來過易水蚌方出曝蚌也蠯而鷸啄其肉鷸知天將雨鳥蚌命而箝其喙箝籋也鷸曰今日不雨明日不雨即有死蚌蚌亦謂鷸曰今日不出明日不出即有死鷸兩者不肯相舍漁者得而并擒之補曰姚注諺語諺詩皆叶後語必見死蚌脯即多一字㙯文類聚引云蚌將為脯即見蚌脯此則叶韻然不聞蚌鷸得雨則解也陸農師讀兩作兩兩謂闢口恐别有據愚按韻補蚌叶彼五反鷸知將兩兩即解去爾聿一本箝作相字通鷸音亦有衍音今趙且伐燕燕趙久相攻以敝大衆臣恐强秦之為漁父也願王熟計之也惠王曰善乃止正曰燕惠武城皆與趙惠王相及此䇿時不可考惠王昭王子元年赧王三十七年癸未昌國君樂毅為燕昭王合五國之兵傳云并合趙楚韓魏燕之兵補曰正義云故昌城在淄州淄川縣東北而攻齊下七十餘城盡郡縣之以屬燕三城未下聊莒即墨補曰毅傳唯莒即墨未下燕世家云聊莒即墨未下蓋因燕將守聊城不下之事而誤說見齊䇿而燕昭王死惠王即位用齊人反間疑樂毅而使騎劫代之將樂毅奔趙趙封以為望諸君補曰史趙封毅為觀津號望諸君索隱云望諸澤名在齊蓋趙有之故號馬齊田單詐騎劫卒敗燕軍復收七十餘城以復齊燕王悔懼趙用樂毅乘元作承承正曰說見上燕之敝以伐燕燕王乃使人讓樂毅且謝之曰先王舉國而委將軍將軍為燕破齊報先王之讎天下莫不振動寡人豈敢一日而亡將軍之功哉㑹先王棄羣臣寡人新即位左右誤寡人寡人之使騎劫代將軍為將軍久暴露於外暴曝同故召將軍且休計事將軍過聽以與寡人有隙元即郤隙不合也郤遂捐燕而歸趙將軍自為計則可矣而亦何以報先王之所以遇將軍之意乎補曰自先王舉國止此一節恐當在後章燕王書寡人不佞云云之上餘說見彼章望諸君乃使人獻書報燕王曰臣不佞不能奉承先王之教以順左右之心恐扺斧質之罪以傷先王之明而又害於足下之義無罪而殺毅非義也故遁逃奔趙自負以不肖之罪負言荷罪在身故不敢為辭說今王使使者數之罪臣恐侍御者之不察先王之所以畜幸臣之理畜養也幸親愛之而又不白於臣之所以事先王之心白猶明故敢以書對臣聞賢聖之君不以祿私其親功多者授之不以官隨其愛能當者處之故察能而授官者成功之君也論行而結交者立名之士也臣以所學者觀之先王之舉錯有髙世之心故假節於魏王時諸侯不通出關則以節假之故上言毅自魏往見王正曰毅傳毅為魏昭王使燕燕王以客禮待之毅辭讓遂委質為臣正義云假魏節使燕而以身得察於燕補曰毅傳趙人因沙丘之亂適魏至燕故大事記附見於燕昭王十七年先王過舉擢之于賔客之中而立之于羣臣之上不謀於父兄而使臣為亞卿亞次也臣自以為奉令承教可以幸無罪矣故受命而不辭先王命之曰我有積怨深怒於齊不量輕弱而欲以齊為事臣對曰夫齊霸國之餘教而驟勝之遺事也間於兵甲習於戰攻王若欲攻之則必舉天下而圗之莫徑元作徑補曰一本作徑於結趙矣且又淮北宋地楚魏之所同願也楚欲得淮北魏欲得宋時皆屬齊趙若許許燕約楚趙宋盡力宋雖已舉其遺民怨之補曰一本約楚魏宋盡力姚同史云趙若許而約四國攻之其文為明四國攻之齊可大破也先王曰善臣乃口受令具符節南使臣於趙顧反命回顧而反言其速起兵隨而攻齊以天之道先王之靈河北之地隨先王舉而有之於濟上濟上之軍奉令擊齊大勝之輕卒鋭兵長驅至國齊王閔逃遁走莒僅以身免珠玉財寶車甲珍器盡收入燕補曰此數語毅罪狀也大吕陳於元英大吕律均元英燕樂名正曰索隱云大吕齊鍾名元英燕宫殿名故鼎反乎厯室故鼎齊所得燕鼎凡鼎以占休咎故歸之律厯之室正曰厯史作磨周禮遂師抱磨音厯又史表磨侯漢表作厯古字通用說見秦䇿正義引括地志云元英厯室燕二宫名在幽州薊縣西四里寧臺之下髙誘云燕噲亂齊伐燕殺噲得鼎今反歸古鼎今注本無齊器設於寧臺燕臺薊丘之植薊幽州國植旗幟之屬植於汶篁汶水出泰山萊蕪原竹田曰篁言燕以齊為塞正曰索隱云薊丘燕所都言燕薊丘之所植植齊王汶上之竹徐注謂燕之疆界移於齊之汶水非此之謂此言燕薊丘之所植移植於汶上之竹田索隱云亦然按昉集古今文以毅書為首有䇿問云夷門之植植為燕其說用毅語也愚謂左氏以太宫之椽歸為盧門之椽句法正同補曰一本汶皇自五伯以來功未有及先王者也先王以為順于其志補曰一本以為恢于志以臣為不頓命頓猶墜故裂地而封之補曰謂封昌國君也使之得比乎小國諸侯臣不佞自以為奉令承教可以幸無罪矣故受命而弗辭臣聞賢明之君功立而不廢故著於春秋蚤知之士蚤知先見也名成而不毁故稱於後世若先王之報怨雪恥夷萬乘之强國收八百嵗之蓄積通太公數之及至棄羣臣之日遺令詔後嗣之餘義執政任事之臣所以能循法令順庶孽者新立之君皆患庶孽之亂昭王能預順之施及萌𨽻萌氓同皆可以教於後世臣聞善作者不必善成善始者不必善終昔者伍子胥說聽乎闔閭故吳王逺迹至於郢夫差弗是也不然子胥之說賜之鴟夷而浮之江鴟夷榼名馬革為其形以斂骸骨正曰史乃取子胥尸盛以鴟夷革應劭云取馬革為鴟夷榼形故吳王夫差不悟先論之可以立功故沉子胥而弗悔子胥不蚤見主之不同量故入江而不改補曰史不化索隱云言子胥怨恨故雖投江而神不化猶為波濤之神也夫免身全功以明先王之迹者臣之上計也離毁辱之非離麗也猶遭正曰離罹通遭也墮先王之名者臣之所大恐也臨不測之罪以幸為利者義之所不敢出也臣聞古之君子交絶不出惡聲補曰正義曰不說己長而談彼短忠臣之去國不潔其名毁其君而自潔臣雖不佞乎補曰一本無乎字蓋衍數奉教於君子矣恐侍御者之親左右之說而不察疏逺之行也故敢以書報惟君之留意焉傳有補曰大事記延平陳氏曰樂毅之下齊也止侵略寬賦斂除暴令修舊政求逸民顯而禮之祀桓公管仲於郊表賢者之閭封王蠋之墓凡可以悅其民者無不為之此孟子所以教齊者齊王不能用之於燕而樂毅能用之於齊吕子讀書記曰樂毅伐齊云云曰若不遂乘之待彼悔前之非改過恤下而撫其民則難慮也推此言則世之論毅者豈其然乎朱子曰樂毅亦戰國之士何嘗是王者之師又曰毅初合秦魏之師又因人怨湣王之暴故一舉下齊七十餘城湣王死人心之怒已解恐三國分功故急遺之以燕之力亦止於此况田單忠義死節堅守二城自不可攻非不欲取蓋力不能爾毅在當時亦恣意虜掠正孟子所謂毁其宗廟遷其重器者爾愚謂樂毅之伐齊取寶器燒宫室見於田齊燕世家毅傳國䇿皆然徵以毅之自言蓋誣矣陳氏首以止侵掠為美似未察其實也齊以燕伐燕燕以齊伐齊孟子所以教齊王者毅實違之是尚為能用之乎雖有寬賦除暴反政禮賢數端不足以掩其罪也故愚著朱子說併記吕子他日之論以見其不滿於毅如此而取陳氏者特一時之見未為定論也張丑為質於燕正曰丑見齊韓魏中山等䇿與楚威王田嬰公仲張儀相涉恐非惠王之世燕王欲殺之走且出境境吏得丑丑曰燕王所為將殺我者人有言我有寶珠也王欲得之今我已亡之矣而燕王不我信今子且致我我且言子之奪我珠而吞之燕王必當殺子刳子腹刳判也及補曰姚本作反子之腸矣夫欲得之君不可說以利吾要且死子腸亦且寸絶境吏恐而放之補曰韓非子記子胥語楚邊候同此王喜惠王曾孫元年赧王五十三年丁未燕王喜使栗腹以百金為趙孝成王壽酒三日反報曰趙民其壯者皆死於長平其孤未壯可伐也王乃召昌國君樂閒毅子補曰史毅奔趙後燕王復以其子樂間為昌國君索隱云閒紀閒反而問曰何如對曰趙四逹之國也其民皆習於兵不可與戰王曰吾以倍攻之可乎曰不可曰以三可乎曰不可王大怒左右皆以為趙可伐遽起六十萬以攻趙令栗腹以四十萬攻鄗使慶秦補曰史作卿秦一本標後語作慶奉以二十萬攻代趙使亷頗以八萬遇栗腹於鄗使樂乘毅之族以五萬遇慶秦於代燕人大敗樂閒入趙燕記元年有正曰史在王喜四年餘說見下燕王以書且謝焉曰寡人不佞不能奉順君意故君捐國而去則寡人之不肖明矣敢端其願端猶專也願欲復用之而君不肯聽故使使者陳愚意君試論之語曰仁不輕絶智不輕怨君之於先王也世之所明知也寡人望有非則君掩蓋之有非而掩蓋之王喜所自謙不虞君之明罪之也虞猶圖望有過則君教誨之不虞君之明棄之也且寡人之罪國人莫不知天下莫不聞君微出明怨言間雖無出之趙以明有怨於我人亦知之以棄寡人寡人必有罪矣雖然恐君之未盡厚也諺曰厚者不毁人以自益也仁者不危人以要名補曰此當有也字姚本作以訛故掩人之邪者厚人之行也救人之過者仁者之道也世有掩寡人之邪救寡人之過非君孰元作恐恐補曰字有誤一本心所姚同望之今君厚受任於先王以成尊輕棄寡人以快心則掩邪救過難得於君矣且世有薄而故厚施世雖薄我我反厚施之行有失而故惠用行與我不合反惠愛任用之正曰有過失當棄反順用之今使寡人任不肖之罪任猶負而君有失厚之纍請為君擇之也擇其所處無所取之國之有封疆補曰一本此有猶字姚同家之有垣牆所以合好掩惡也補曰惡如字室不能相和出語鄰家未為通計也怨惡未見而明棄之未為盡厚也寡人雖不肖乎未如殷紂之亂也君雖不得意乎未如商容箕子之纍也然則不內蓋寡人蓋一作盡而明怨於外恐其適足以傷於髙而薄於行也非然也茍可以明君之義成君之髙雖任惡名所謂任不肖之罪不難受也本欲以為明寡人之薄而君不得厚揚寡人之辱而君不得榮此一舉而兩失也義者不虧人以自益况傷人以自損乎君無以寡人不肖纍往事之美昔者栁下惠吏於魯三黜而不去或謂之曰可以去栁下惠曰茍與人之異惡往而不黜乎猶且黜乎寧於故國爾補曰此論語所記便不及栁下惠不以三黜自纍故前業不忘不以去為心故逺近無議今寡人之罪國人未知而議寡人者遍天下語曰論不修心凡有修者先必有失而善論者不然補曰修字必有誤議不纍物仁不輕絶智不簡功簡與附反猶棄也簡棄大功者輟也輟止也輕絶厚利者怨也輟而棄之怨而纍之宜在逺者疏逺之臣可爾不望之于君也今以寡人無罪君豈怨之乎願君捐怨追惟先王復以教寡人意君曰意度其然余且慝心待之以不善之心以成而過不顧先王以明而惡使寡人進不得修功退不得改過君之所揣也言間量我也唯君圖之此寡人之愚意也敬以書謁之樂間乘怨不用其計二人卒留趙不報彪謂過而不改然後為過燕王喜過在於愎諌伐趙其於間未見其有可絶之處而能悔如此禮不云乎其嗟也可去其謝也可食何間絶之深也抑其書辭條逹明麗婉乎屈曲天下之偉文也正曰責其出奔以明怨薄已而揚過悔艾懲創之意少未見其果可以釋憾而反國也補曰新序以此為燕惠王遺樂毅書考之毅答惠王書云今足下使人數之以罪而史所載惠王讓毅無數罪之語前章燕王使人讓毅且謝之曰云云當是此章之首蓋錯簡也且䇿以此為樂間答書而末云間乘怨不用其計於乘何與史趙世家孝成王十五年亷頗破殺栗腹虜慶秦樂間則是間為將而被虜燕世家則云奔趙又趙孝成王十六年亷頗圍燕以樂乘為武襄君二十一年孝成王卒亷頗將攻繁陽取之使樂乘代之頗攻乘乘走據䇿史所記多舛故知此書非樂間事而新序之說為是云秦并趙北向迎燕并合也迎以兵迎之燕王聞之使人賀秦王始皇使者過趙趙王悼襄繫之使者曰秦趙為一而天下服矣燕元作兹兹補曰恐燕字訛之所以受命於趙者為秦也言燕先時服趙者以秦與趙合今臣使秦而趙繫之是秦趙有隙秦趙有隙補曰一本並作郤姚同天下必不服而燕不受命矣且臣之使秦無防於趙之伐燕也趙王以為然而遣之使者見秦王曰燕王竊聞秦并趙燕王使使者賀千金秦王曰夫燕無道吾使趙有之子何賀使者曰臣聞全趙之時南鄰為秦北下曲陽為燕下曲陽屬巨鹿趙廣三百里而與秦相距五十餘年矣所以不能反勝秦者反猶報也言數為秦敗不能報而勝之國小而地無所取今王使趙北并燕此并謂兼有之燕趙同力必不復受命𥙷於秦矣臣竊為王患之秦王以為然起兵而救燕趙悼襄九年攻燕取狸陽城兵未罷秦攻鄴拔之此十九年燕太子丹質於秦亡歸見秦且滅六國兵已臨易水恐其禍至太子丹患之謂其太傅鞠武曰補曰一本鞠作鞫下同索隱云音麴又如字燕秦不兩立願太傅幸而圖之武對曰秦地遍天下威脅韓魏趙氏則易水以北未有所定也奈何以見陵之怨傳言丹質秦秦遇之不善欲批其逆鱗哉批白結切擊也說難龍可擾而騎也然喉下有逆鱗徑尺人有嬰之則必殺人人主亦有補曰一本批作排姚云曽錢作此字太子曰然則何由太傅曰請入圖之請太子入息已乃圖之居之有間樊將軍亡秦之燕太子客之補曰姚本容之太傅鞠武諫曰不可夫秦王始皇之暴而積怨於燕怨其亡歸足為寒心補曰凡人寒甚則心戰恐懼亦戰又况聞樊將軍之在乎是謂元作以以補曰史作謂然以義亦通委肉當餓虎之蹊蹊徑也禍必不振矣振救也雖有管晏不能為之謀也願太子急遣樊將軍入胸奴以滅口請西約三晉南連齊楚北講於單于然後乃可圖也太子丹曰太傅之計曠日彌久心惛然恐不能須臾言已憂思昏瞀且死須臾不可待且非獨於此也夫樊將軍困窮於天下歸身於丹丹終不迫於强秦而棄所哀憐之交置之胸奴是丹命固卒之時也知禍且至而猶為乏自疑命止於此願太傅更慮之鞠武曰燕有田光先生者其智深而慮沉沉猶深補曰一本其智深其勇沉史姚同可與之謀也太子曰願因太傅交於田先生可乎鞠武曰敬諾出見田光道太子衍曰字曰願圖國事於先生田光曰敬奉教乃造焉太子跪而逢迎却行為道不敢背之跪而拂席田先生坐定左右無人太子避席而請曰燕秦不兩立願先生留意也田光曰臣聞騏驥盛壯之時一日而馳千里至其衰也駑馬先之今太子聞光壯盛之時不知吾精已消亡矣雖然光不敢以乏國事也不令太子所圗有闕所善荆軻可使也太子曰願因先生得衍願字願交荆軻可乎田光曰敬諾則起趨出補曰一本即趨出姚本即起太子送之至門戒曰丹所報先生所言者國大事也願先生勿泄也田光俯而笑曰諾補曰正義曰俯音俯按俯即俯字漢書朝錯傳俯仰韓信俯出東方朔俯啄顔注即俯僂行見荆軻僂致敬貌禮一命而僂曰光與子相善燕國莫不知今太子聞光壯盛之時不知吾形已不逮也幸而教之曰燕秦不兩立願先生留意也光竊不自外言不自踈於軻言足下於太子願足下過太子於宫荆軻曰謹奉教田光曰光聞長者為行補曰一本長者之行不使人疑之今太子約光曰所言者國大事也願先生勿泄也是太子疑光也夫為行而使人疑之非節俠士也荀悅曰立氣勢作威福結私交以立强於世者謂之俠欲自殺以激荆軻言其死非為泄欲厲勉軻使死之耳曰願足下急過太子言光已死明不言也遂自剄而死軻見太子言田光已死致光之言補曰一本此四字作明不言也姚同史同今本太子再拜而跪膝下行以膝行不立行故言下流涕有頃而後言曰丹所請田先生不言者欲以成大事之謀今田先生以死明不泄言豈丹之心哉荆軻坐定太子避席頓首曰田先生不知丹不肖使得至前願有所道此天之所以哀燕而不棄其孤也補曰索隱云無父曰孤時燕王尚在或記者失辭或諸侯驕子亦僭稱孤也又劉向曰燕王真之太子今秦有貪利之心而欲不可足也非盡天下之地臣海內之王者補曰荀子注引䇿作牢天下之王其意不饜今秦已虜韓王秦十七年虜王安盡納其地又舉兵南伐楚北臨趙王翦數十萬之衆距漳鄴而李信出太原雲中趙不補曰一本下有能字支秦必入臣入臣則禍至燕燕小弱數困於兵今計舉國不足以當秦諸侯服秦莫敢合從丹之私計愚以為誠得天下之勇士使於秦窺以重利窺言示之以利使之見而欲也秦王貪其贄必得所願矣誠得劫秦王使悉反諸侯之侵地若曹沫之與齊桓公則大善矣脫不可因而刺殺之彼大將擅兵於外而內有大亂則君臣相疑以其間諸侯得合從其償補曰一本此有破字姚同秦必矣此丹之上願不知所以委命委棄性命猶言不知死所惟荆卿留意焉久之荆軻曰此國之大事也臣駑下恐不足任使太子前頓首固請無讓然後許諾於是尊荆軻為上卿舍上舍太子日造門下供太牢具異物間進車騎美女恣荆軻所欲以順適其意久之荆卿未有行意秦將王翦破趙虜趙王遷十九年盡收其地進兵北略地至燕南界略經略之太子丹恐懼乃請荆卿曰秦兵旦暮渡易水則雖欲長侍足下豈可得哉荆卿曰微太子言臣願得謁之今行而無信則秦未可親也夫術今字今樊將軍秦王購之金千斤邑萬家誠得樊將軍首與燕督亢之地圖後志涿郡方城縣有督亭注引此補曰正義云督亢坡在幽州范陽縣東南今固安縣南有督亢陌幽州南界劉向别録云督亢膏腴之地蓋欲獻之故畫圖獻秦王秦王必說見臣臣乃得有以報太子太子曰樊將軍以窮困來歸丹丹不忍以已之私而傷長者之意願足下更慮之荆軻知太子不忍乃遂私見樊於期將軍名曰秦之遇將軍可謂深矣父母宗族皆為戮沒今聞購將軍之首金千斤邑萬家將奈何樊將軍仰天太息流涕曰吾每念常痛於骨髓顧計不知所出耳軻曰今有一言可以解燕國之患而報將軍之仇者何如樊於期乃前曰奈何補曰一本為之奈何姚同軻曰願得將軍之首以獻秦王秦王必喜而召見臣臣左手把其䄂右手揕其胸其胸揕刺也知鴆反補曰揕一作抗故他本連有二字下文同索隱云抗拒也義非然則將軍之仇報而燕國見陵之恥除矣將軍豈有意乎樊於期偏袒扼腕而進曰此臣之日夜切齒腐心腐者痛之極補曰勇者奮厲必以左手扼右腕也切齒見前一本拊心乃今得聞教遂自刎刎斷也太子聞之馳往伏尸而哭極哀既已無可奈何乃遂盛樊於期之首函封之於是太子預求天下之利匕首得趙人徐夫人匕首補曰索隱云徐姓夫人名男子也取之百金使工以藥淬之淬當從火堅刀刃也若淬則滅火器爾正曰淬焠通取內反說文徐云淬劍燒而入水也此謂以毒藥染鍔而淬之也後語注云以藥水鑒匕首為淬鑒古電反以試人血濡縷沾濡衣之一縷人無不立死者乃為裝行具也遣荆軻燕國有勇士秦武陽年十三殺人人不敢牿元作悟悟正曰悟忤通姚作忤說見魏䇿視悟逆也乃令秦武陽為副荆軻有所待欲與俱其人居逺未來而為留待頃之未發太子遲之疑其改悔乃復請之曰日已盡矣荆卿豈無意哉丹請先遣秦武陽荆軻怒叱太子曰今日往而不反者竪子也今提一匕首入不測之强秦僕所以留者待吾客與俱今太子遲之請辭決矣遂發太子賔客知其事者皆白衣冠以送之至易水上既祖祖行祭補曰詩毛傳祖而舍軷飲酒於其側曰餞疏軷謂祭道路之神封土為山象伏牲其上既祭送者餞之飲畢乘車轢之而去取道髙漸離擊筑荆軻和而歌為變徵之聲地形訓云變徵為商蓋悲音補曰應劭云筑似琴而大頭安絃以竹擊之故名按劉子云荆軻如秦宋意擊筑文選髙漸離擊筑荆軻歌宋如意和之士皆垂淚涕泣又前而為歌曰風蕭蕭兮易水寒壯士一去兮不復還復為羽聲其音怒慷慷壯士不得志也補曰一本慷慨羽聲朱子楚辭後語作羽聲慷慨士皆瞋目髮盡上衝冠於是荆軻遂就車而去終已不顧既至秦持千金之資幣物厚遺秦王寵臣中庶子䝉嘉補曰中庶子說見前新序鄒陽書作䝉恬蓋誤後語䝉類注云䝉恬弟也嘉為先言於秦王曰燕王誠振怖大王之威振震同下同不敢興兵以逆軍吏補曰一本以拒大王願舉國為內臣比諸侯之列給貢職如郡縣而得奉守先王之宗廟恐懼不敢自陳謹斬樊於期頭及獻燕督亢之地圖函封燕王拜送于庭使使以聞大王唯大王命之秦王聞之大喜乃朝服設九賔禮大小行人以九儀掌賔客之禮正曰大事記相如奉璧入秦秦王齊五日後乃設九賔禮於庭注引正義韋昭云九賔則周禮九儀也劉伯莊云九賔者周王之備禮天子臨軒九服同會秦趙安得九賔但亦陳設車輅文物爾不得以周禮九賔儀為釋愚按前漢書大行設九賔恐即秦儀也見燕使者咸陽宫補曰關中記云孝公都咸陽今渭城是也水北曰陽其地在渭水之北九嵕諸山之南故曰咸陽自始皇及胡亥皆都此荆軻奉樊於期之頭函而秦武陽奉地圖匣以次進至陛升髙陛也秦武陽色變振恐羣臣怪之荆軻顧笑武陽顧武陽而笑前為謝曰北蠻夷之鄙人未嘗見天子故振懾懾懼也願大王少假借之使得畢使於前秦王謂軻起取武陽所持圖軻既取圖奉之秦王發圖圖窮而匕首見因左手把秦王之䄂而右手持匕首揕之未至身秦王驚自引而起䄂絶拔劍劍長撡其室撡把持也與操同晉人多用扣室劍鞘補曰索隱云古者帶劍上長拔之不出室欲王推之於背今前短易拔故云王負劍時惶急惶恐也堅在室牢也劍堅故不可立拔荆軻逐秦王秦王環柱而走羣臣驚愕愕相逐驚也卒起不意卒猝同下同盡失其度而秦法羣臣侍殿上者不得持尺寸之兵諸郎中執兵皆陳於殿下非有詔不得上方急時不及召下兵以故荆軻逐秦王而卒惶急無以擊軻而乃以手共摶之搏擊也是時侍醫夏無且以其所奉藥囊提荆軻提擲也補曰且即于反提姪帝反史提文帝提吳太子語同此秦王方環柱走卒惶急不知所為左右乃曰王負劍王負劍遂拔以擊荆軻斷其左股荆軻廢乃引其匕首以提衍擲字本注字也擲補曰姚本無提字二字即上揕抗並存之類索隱云擲與擲古字同持益反亦提義秦王不中中柱秦王復擊軻軻被八創軻自知事不就倚柱而笑箕踞以罵踞坐展兩足曰箕補曰既斷左股何云展兩足曰事所以不成者乃欲以生劫之必得約契復地之契以報太子也左右既前斬荆軻秦王目眩良久已而論功賞羣臣及當坐者罪所當坐各有差而賜夏無且黃金二百鎰曰無且愛我乃以藥囊提荆軻也於是秦大怒燕益發兵詣趙詔王翦軍以伐燕十月而拔燕薊城並此二十九年燕王喜太子丹等皆率其精兵東保於遼東秦將李信追擊燕王王急用代王嘉計殺太子丹欲獻之秦秦復進兵攻之五嵗而卒滅燕國秦二十五三年此三十年而虜燕王喜秦兼天下其後荆軻客髙漸離以擊筑見秦皇帝而以筑擊秦皇帝為燕報仇不中而死刺客傳有彪謂太子丹不忍一朝之憤輕亡其國其謀悖矣夫以一夫行劫刺於大國出於倉卒不意或幸以中而欲從容質責使悉反侵地取契以歸此豈持匕首之所可恃鞠武初謀似矣太子不用不能力爭妾婦之明也數士之死燕國之亡皆武實為之荆軻之事甚似曹劌其所不可者劌發憤於一朝而軻畜謀於積嵗且白衣祖送者滿路其不漏露而先敗抑已幸矣軻不足道也厥後留侯亦䄂椎竊發此其人豈愚哉蓋積志仇秦不知所不可使其不逢漢帝則亦死以為期不能一日而亡秦也豫子髙漸離張留侯三人者皆孝子忠臣至一之行也惟軻於此則無處焉補曰胡氏謂秦皇狙詐之智虎狼之威千騎萬乘之衆揮椎奮擊既無覺者大索天下又不能得良非獨免併免力士其智略之妙固已視吕政如罝中兔何敗獲之有鮑以三人並論愚謂三人報仇之志則同以智略言之則異胡說當矣政朱子曰軻匹夫之勇其事無足言然於此可以見秦之無道燕丹之淺謀而天下之勢已至於此雖聖賢復生亦未知其何以安之也戰國䇿校注卷九
