body:
  text: 李文叔書戰國策後序戰國策所載大抵皆從横捭闔譎誑相軋傾奪之説也其事淺陋不足道然而人讀之則必尚其説之工而忘其事之陋者文辭之勝移之而已且壽考安樂富貴尊榮顯名愛好便利得意者天下之所欲也然繳而射之或將以致人之憂死亡憂患貧賤苦辱棄損亡利失意者天下之所惡也然動而竭之或將以導人之樂至于以下求小以高求大縱之以陽閉之以隂無非微妙難知之情雖辨士抵掌而論之猶恐不白今寓之文字不過一二言語未必及而意已隠然見乎其中矣由是言之則為是説者非難而載是説為不易得也嗚呼使秦漢而後復有為是説者必無能載之者矣雖然此豈獨人力哉蓋自夏商積制作以至于周而文物大備當其盛時朝廷宗廟之上蠻貊窮服之外其禮樂制度條施目説而威儀文章可著之簡冊者至三千此數聖人文章之實也及周道衰寖淫陵遲幽厲承之于是大壞然其文章所從來既逺故根本雖伐而氣燄未易遽熄也于是浮而散之鍾于談舌而著於言語此莊周屈原孫武韓非商鞅與夫儀秦之徒所以雖不深祖吾聖人之道而所著書文辭駸駸乎上薄六經而下絶來世者豈數人之力也哉今戰國策宜有善本傳於世而舛錯不可疾讀意天下之于至寳常不欲使人易得故余不復竄定而其完篇皆以丹圜其上云王覺題戰國策戰國策三十三篇劉向為之序世乆不傳治平初始得錢唐顔氏印本讀之愛其文辭之辯博而字句脱誤尤失其真丁未嵗予在京師因借館閣諸公家藏數本參校之蓋十正其六七凡諸本之不載者雜見於史記他書然不敢輙為改易仍從其舊蓋慎之也當戰國之時强者務并吞弱者患不能守天下方争於戰勝攻取馳説之士因得以其説取合時君其要皆主於利言之合從連衡變詐百出然自春秋之後以迄于秦二百餘年興亡成敗之迹粗見於是矣雖非義理之所存而辯麗横肆亦文辭之最學者所不宜廢也㑹有求予本以開板者因以授之使廣其傳庶㡬證前本之失云清源王覺題孫元忠書閣本戰國策後臣自元祐元年十二月入館即取曽鞏三次所校定本及蘇頌錢藻等不足本又借劉敞手校書肆印賣本參攷比鞏所校補去是正凡三百五十四字八年再用諸本及集賢院新本校又得一百九十六字共五百五十籖遂為定本可以修冩黄本入秘閣其後字多脱漏然亦間得一兩字癸酉嵗臣朴校定右十一月十六日書閣本戰國䇿孫元忠孫元忠劉元父語此書舛誤特多率一嵗再三讀略以意屬之而已比劉原父云吾老當得定本正之否耶以上皆依姚本右戰國策隋經籍志三十四卷劉向錄高誘註止二十一卷漢京兆尹延篤論一卷唐藝文志劉向所錄已闕二卷高誘註乃増十一卷延叔堅之論尚存今世所傳三十三卷崇文緫目高誘註八篇今十篇第一第五闕前八卷後三十二三十三通有十篇武安君事在中山卷末不知所謂叔堅之論今他書時見一二舊本有未經曽南豐校定者舛誤尤不可讀南豐所校乃今所行都下建陽刻本皆祖南豐互有失得余頃於㑹稽得孫元忠所校於其族子慤殊為疎略後再扣之復出一本有元忠跋并標出錢劉諸公手校字比前本雖加詳然不能無疑焉如用埊􅖔字皆武后字恐唐人傳冩相承如此諸公校書改用此字殊所不解竇苹作唐史釋音釋武后字内埊字云古字見戰國策不知何所據云然然埊乃古地字又埊字見亢倉子鶡冠子或有自來至於􅖔字亦豈出於古歟幽州僧行均作切韻訓詁以此二字皆古文豈别有所見耶孫舊云五百五十籖數字雖過之然間有謬誤似非元書也括蒼所刋因舊無甚増損余萃諸本校定離次之總四百八十餘條太史公所採九十餘條其事異者止五六條太史公用字每篇間有異者或見於他書可以是正悉註於旁辯灓水之為漬水集字之為語助與夫必題校人并題續註者皆余所益也正文遺逸如司馬貞引馬犯謂周君徐廣引韓兵入西周李善引吕不韋言周三十七王歐陽詢引蘇秦謂元戎以鐵為矢史記正義碣石九門本有宫室以居春秋後語武靈王游大陵夢處女鼓瑟之類略可見者如此今本所無也至如張儀説惠王乃韓非初見秦厲人憐王引詩乃韓嬰外傳後人不可得而質矣秦古書見於世者無㡬而予居窮鄉無書可檢閲訪春秋後語數年方得之然不為無補尚覬博採老得定本無劉公之遺恨紹興丙寅中秋剡川姚宏伯聲父題頃嵗予辯正鮑彪戰國策註讀吕子大事記引剡川姚宏知其亦註是書考近時諸家書錄皆不載則世罕有蓄者後得於一舊士人家卷末載李文叔王覺孫朴劉敞語其自序云嘗得本於孫朴之子慤朴元祐初在館中取南豐曽鞏本參以蘇頌錢藻劉敞所傳併集賢院新本上標錢劉校字而姚又㑹稡諸本定之每篇有異及他書可正者悉註于下因高誘註間有増續簡質謹重深得古人論撰之意大與鮑氏率意竄改者不同又云訪得春秋後語不為無補蓋晉孔衍所著者今尤不可得尚賴此而見其一二詎可廢邪攷其書成當紹興丙寅而鮑註出丁邜實同時鮑能分次章條詳述註説讀者眩於浮文往往喜稱道之而姚氏殆絶無足怪也宏字令聲今題伯聲甫待制舜明廷輝之子為刪定官忤秦檜死大理獄弟寛令威憲令則皆顯于時其人尤當傳也余所得本背紙有寳慶字已百餘年物時有碎爛處既據以校鮑誤因序其説于此異時當廣傳冩使學者猶及見前輩典則可仰可慕云至順四年癸酉七月吳師道識右戰國策隋經籍志三十四卷劉向錄高誘註止二十卷漢京兆尹延篤論一卷唐蓺文志劉向錄已闕二卷高誘註乃増十一卷延篤論時尚存今所傳三十三卷崇文總目高誘註八篇印本存者有十篇武安君事在中山卷末不詳所謂延篤論今亡矣其未曽經曽南豐校定者舛誤尤不可讀其浙建原小本刋行者皆南豐所校本也括蒼耿氏所刋鹵莽尤甚宣和間得館中孫固孫覺錢藻曽鞏劉敞蘇頌集賢院共七本晩得晁以道本並校之所得十二焉如用埊􅖔字皆武后字恐唐人相承如此諸公校書改用此字殊不可解竇苹作唐書釋武后用埊字云古地字見戰國策不知何所據而云然坔乃古地字又埊字見亢倉子鶡冠子或有自來至於􅖔字幽州僧行均作切韻訓詁以此二字云古文豈别有所見邪太史公所採九十三事内不同者五韓非子十五事説苑六事新序九事吕氏春秋一事韓詩外傳一事皇甫謐高士傳三事越絶書記李園一事甚異而正文遺逸引戰國策者司馬貞索隠五事豫讓擊襄子之衣衣盡血吕不韋言周凡三十七王白圭為中山将亡六城還拔中山馬犯謂周君馬犯謂梁王云王病愈作癒字廣韻七事晉有大夫芬質音撫文切芉干者著書顯名安陵丑雍門周中大夫藍諸晉有亥唐趙有大夫㡽賈音肇訓門也齊威王時有左執法公旗蕃玉篇一事驥仰而噴鼓鼻也太平御覽二事涸若耶以取銅破􅖔山而出錫廊廟之椽非一木之枝先王之法非一士之志元和姓纂一事引風俗通云晉大夫芸賢春秋後語二事趙武靈王遊大陵夢處女鼓瑟平原君躄者注云躄攣跛之名後漢地理志一事東城九門注云碣石山在縣界後漢第八贊一事亷頗為人勇鷙而好士藝文類聚一事蘇秦為楚合從元戎以鐵為矢長八寸一弩十矢俱發北堂書鈔一事楚人以弱弓微繳如歸鴈之上者徐廣注史記一事韓兵入西周令成君辯説秦求救張守節正義一事碣石九門本有宫室以居舊戰國策一事羅尚見秦王曰秦四塞之險利於守不利於戰李善注文選一事蘇秦説孟嘗君曰秦四塞之國髙誘注云四面有山闗之固故曰四塞之國也皆今本所無也至如張儀説惠王乃韓非子初見秦書厲憐王引詩乃韓詩外傳既無古書可以考證第歎息而已某以所聞見以為集注補髙誘之亡云上章執徐仲冬朔日㑹稽姚寛書右此序題姚寛撰有手冩附于姚註本者文皆與宏序同特疏列逸文加詳考其嵗月則在後乃知姚氏兄弟皆嘗用意此書寛所註者今未之見不知視宏又何如也因全錄著之左方以俟博考者吳師道識劉勰文心雕龍云從横之世史職猶存秦并七王而戰國有策蓋錄而不叙故即簡為名也劉知㡬史通云從横互起力戰争雄秦兼天下而著戰國策其篇有東西二周秦楚燕齊三晉宋衛中山合十二國分為三十三卷夫謂之策者蓋錄而不序故即簡以為名或云漢代劉向以戰國游士為之策謀因謂之戰國策至孔衍又以策所書未為盡善乃引太史公所記參其要刪彼二家聚為一錄號春秋後語除二周及宋衛中山其所留者七國而已始自秦孝公終於楚漢之際比於春秋亦盡二百餘年始衍撰春秋時國語復撰春秋後語勒成二書各為十卷今行于時惟後語存焉又云左傳後經傳不作于是文籍唯有戰國策及太史公書而已至晉著作郎魯國樂資乃追述二史撰為春秋後傳其書始以周貞王續前傳魯哀公後至王赧入秦文王之繼周終至二世之滅合三十卷括蒼刋本序余至括蒼之明年嵗豐訟簡頗有文字之暇於是用諸郡例鏤書以惠學者念戰國策未有板本乃取家舊所藏刋焉是書訛舛為多自曽南豐已云疑其不可考者今據所藏且用先輩數家本參定以俟後之君子而已昔袁悦之還都止齎戰國策曰天下要惟此書而李權從秦宓借戰國策宓曰戰國從横用之何為蓋學者好惡之不侔如此夫是非取舍要當考合乎聖人之道以自擇要之此先秦古書其叙事之備太史公取以著史記而文辭髙古子長實取法焉學者不可不家有而日誦之故余刋書以是為首云紹興四年十月魯人耿延禧百順書右修職郎司理參軍馬陞校勘左迪功郎兖州學敎授趙渙校勘左朝散郎通判軍州事崔耀卿龍圖閣直學士左朝奉大夫知軍州事耿延禧戰國䇿校注
