body:
  text: 戰國策校注卷五宋鮑彪原注元吴師道補正楚今之南郡江夏零陵桂陽武陵長沙漢中汝南皆其分也江陵故郢都西通巫巴東有雲夢之饒宣王肅王子元年子烈王七年王齊楚構難宋請中立齊急宋告急於宋補曰請字宜任急下殽脱於此中立豈待請邪宋許之子象楚人為楚謂宋補補曰姚本有此字王公剔成正曰剔成未嘗稱王此偃也與懐㐮相接曰楚以緩失宋將法齊之急也齊以急得宋後將常急矣是從齊而攻楚之未必利也齊戰勝楚勢必危宋不勝是以弱宋干強楚也言以助齊犯楚之怒補曰將法齊之急言楚今結於宋齊後將常急言楚之攻齊未已齊戰勝楚勢必危宋言齊強必併宋而令兩萬乘之國常以急求所欲國必危矣邯鄲之難趙成侯二十一年魏㧞邯鄲此十六年補曰大事記昭奚恤為相附宣王十五年謂此章争論乃明年亊按史年表圍邯鄲在此年㧞邯鄲齊敗魏在次年昭奚恤謂楚王曰王元作里補曰姚本作王不如無救趙而以強魏使魏為強魏強其割趙必深矣趙不能聽則必堅守是两敝也兩國相持必俱敝景舍曰不然昭奚恤不知也夫魏之攻趙也恐楚之攻其後也今不救趙趙有亡形而魏無楚憂是楚魏共趙也如與魏共攻之害必深矣趙之害何以兩敝也且魏令兵以割趙補曰一本以深割趙趙見亡形而有楚之不救己也言雖有楚而不見救正曰姚云有劉作知愚按見有二字恐殽舛上下文可證必與魏合而以謀楚故王不如少出兵以為趙援趙恃楚勁必與魏戰魏怒於趙之勁而見楚救之不足畏也必不釋趙趙魏相敝而齊秦應楚應言乘此起兵耳非與楚合也則魏可破也楚因使景舍起兵救趙邯鄲抜楚兵少故楚取睢濊之間後志梁國睢陽注征北記南進有睢陵梁國有濊陽南臨濊水補曰大事記取濊陽作睢陽濊呼外烏外反江乙為魏使於楚乙魏人時居魏後乃仕楚故其譛昭奚恤曰臣居魏知之正曰據居魏語以為魏人未知果不謂楚王曰臣入境聞楚之俗不蔽人之善不言人之惡誠有之乎王曰誠有之江乙曰然則白公之亂得無遂乎遂猶成白公太子建子勝哀十六年建以讒奔鄭鄭殺之勝請伐鄭子西不從勝怒殺子西刼惠王誠如是臣等之罪免矣楚王曰何也江乙曰州侯相楚貴甚矣而主斷謂其專决左右俱曰無有言世無如之如出一口矣荆宣王問羣臣曰吾聞北方之畏昭奚恤也果誠何如羣臣莫對江乙對曰虎求百獸而食之得狐狐曰子無敢食我也天帝使我長百獸今子食我是逆天帝命也子以我為不信吾為子先行子随我後觀百獸之見我而敢不走乎虎以為然故遂與之行獸見之皆走虎不知獸畏己而走也以為畏狐也今王之地方五千里帶甲百萬而專屬之昭奚恤故北方之畏奚恤也其實畏王之甲兵也猶百獸之畏虎也補曰大事記江乙之言如此則昭奚恤為敵國所畏可知見一本標十二國史春秋後語食我作噉我又云人臣畏者君威也君不用而威亡矣注尹文子有昭奚恤與彭城君彭城屬楚知為楚人議於王前王召江乙而問焉江乙曰二人之言皆善也臣不敢言其後補曰姚云一本更有言其後三字此謂慮賢也慮猶疑也賢者言善已復言之將使王疑彼思慮之也正曰謂使我疑慮賢者為疑詞以兩傾之也江尹乙也欲惡昭奚恤於楚王而力不能故為梁山陽君山陽屬魏知為魏人正曰策文明曰梁山陽君注贅請封於楚知其無功奚恤必諌而山陽怨可以為黨楚王曰諾昭奚恤曰山陽君無功於楚國不當封江尹因得山陽君與之共惡昭奚恤魏氏惡昭奚恤於楚王以山陽君故補曰疑即山陽君楚王告昭子昭子曰臣朝夕以事聽命言其親近而魏入吾君臣之間以惡奚恤之言入臣大懼臣非畏魏也夫泄吾君臣之交而天下信之是其為人也近苦矣苦猶惡也此指江乙夫茍不難為之外為其泄外謂魏也豈忘為之内乎臣之得罪無日矣無幾日也王曰寡人知之大夫何患江乙惡昭奚恤謂楚王曰人有以其狗為有執而愛之執言善守其狗嘗溺井溺去音正曰奴弔反其鄰人見狗之溺井也欲入言之狗惡之當門而噬之鄰人憚之遂不得入言邯鄲之難楚進兵大梁取矣昭奚恤取魏之寳器臣居魏知之故昭奚常惡臣之見王此言邯鄲事在乙居魏時故升邯鄲之難於前江乙欲惡昭奚恤於楚謂楚王曰下比周則上危下分爭則上安分則不比爭則不周為揚惡張本王亦知之乎願王勿忘也且人有好揚人之善者於王何如王曰此君子也近之江乙曰有人好揚人之惡者於王何如王曰此小人也逺之江乙曰然則且有子殺其父臣弑其主者而王終已補曰姚云曽劉作己不知者何也以王好聞人之美惡聞人之惡也王曰善寡人願兩聞之彪謂兩聞之是也然必以明夫茍不明則適為江乙讒口之資耳補曰大事記曰乙之言術數家之論也下比周上固危矣茍下皆分爭如齊之田闞唐之牛李上亦豈能安乎愚按此與前章言州侯云云意同江乙説於安陵君名壇失其姓楚之幸臣按魏記注召陵有安陵應屬楚而魏䇿亦有同號者别一人也正曰按説苑作安陵纒藝文𩔖聚同壇纒字有訛彼以為得幸於楚共王今次之宣王非也正義云鄢陵故城在許州鄢陵縣西北李竒謂六國時為安陵按鄢陵召陵皆屬魏又按元和姓纂安陵小國後氏之安陵纒楚王妃則以為女子曰君無咫尺之功元作地地骨肉之親處尊位受厚禄一國之衆見君莫不斂袵而拜撫委而服撫物委物必下其手皆卑下意正曰撫猶傴也委曲也補曰袵衣衿也何以也曰王過舉以元作而而正曰一本而已姚云已一作色按己以通色已字𩔖恐當作而以色為文色言謬以色見舉不然無以至此江乙曰以財交者財盡而交絶以色交者華落而愛渝華英華渝變也是以嬖色不敝席嬖賤而幸者席不及敝而愛弛寵臣不避軒避猶退軒曲輈藩車也車敝則退去今不及然補曰姚本作嬖女又云不敝言不久之意避是敝字無疑真誥曰女寵不敝席男愛不盡輪或出于此今君擅楚國之勢而無以自結於王竊為君危之安陵君曰然則柰何願君必請從死以身為殉此乙辭補曰姚云奈何下曽有江乙曰字如是必長得重於楚國曰謹受令三年而弗言江乙復見曰臣所為君道至今未効君不用臣之計臣請不敢復見矣安陵君曰不敢忘先生之言未得間也於是楚王遊於雲夢澤名在南郡華容補曰楚辭集注雲夢澤名方八九百里跨江兩岸雲在江北今潜江監利景陵等縣是也夢在江南今公安石首建寜等縣是也夣音䝉亦作去聲結駟千乘補曰結連也四馬曰駟旌旗蔽天野火之起也若雲蜺蜺虹也兕虎噑之聲若雷霆兕若牛而青補曰一角重千斤有狂兕􅟸元作䍧䍧車集韻􅟸音詳趨行也若䍧則羊耳補曰字書有牂字兹郎反又戕與牂通􅍻也依輪而至王親引弓而射一發而殪補曰宋玉招魂青驪結駟兮齊千乘懸大延起兮𤣥顔烝云云與王趨夣兮課後先君王親發兮殪青兕文頗與此合王抽旃旄旃曲柄旗旄幢也補曰爾雅旄牛尾著竿頭而抑兕首仰天而笑曰樂矣今日之㳺也寡人萬歳千秋之後誰與樂此矣問安陵與誰安陵君泣數行下而進曰臣入則編席編次簡也言與王相次如之出則陪乘陪重乘也此言二人同車大王萬歳千秋之後願得以身試黄泉蓐螻蟻願為蓐以辟二物蓐陳草也補曰姚云試錢劉曽又作式李善引同延叔堅論云為王先用填黄泉為王作蓐以御螻蟻藝文𩔖聚引拭黄泉驅螻蟻又何如得此樂而樂之王大説乃封壇為安陵君君子聞之曰江乙可謂善謀安陵君可謂知時矣彪謂此非君子之言也安陵妾婦也江乙為之謀又其卑者安有君子而羙此流哉郢人有獄三年不决者故令人請其宅以卜其罪有罪則宅入官故可請卜測知之也客因請元作謂下同謂補曰姚本作為之謂又云錢作客因謂劉作客因請之之補曰依姚本則此上訛一字此下缺一字昭奚恤曰郢人某氏之宅臣願之昭奚恤曰郢人某氏不當服罪故其宅不得客辭而去昭奚恤己而悔之因謂客曰奚恤得事公公何為以故與奚恤故謂設事以探己意客曰非用故也曰請補曰姚云劉曽作請而不得有説色非故如何也補曰如猶而威王宣王子元年壬午顯王三十年蘇秦之楚三日補曰一本標後語十二國史皆作三年乃得見乎王談卒辭而行王曰寡人聞先生若聞古人今先生乃不逺千里而臨寡人曽不肯留願聞其説對曰楚國之食貴於玉薪貴於桂謁者難得見如鬼王難得見如天帝今令臣食玊炊桂因鬼見帝王曰先生就舍寡人聞命矣正曰一本標𩔖要引王百乗書鈔作宣蘇秦為趙合從此在連激儀入秦後當為七或八年正曰大事在威七年説楚威王曰楚天下之強國也大王天下之賢王也楚地西有黔中巫郡属南郡補曰徐廣云黔中今武陵巫郡南郡之西界東有夏州車𦙍云夏口城上有州曰夏州補曰左傳楚莊伐陳鄉取一人焉以歸謂之夏州即此正義云夏水口在荆州江陵縣一本標盧藏用注後語云屈原離騷過夏口而西浮葢是山也海陽海之南耳非遼西郡也正曰盧藏用云在廣陵東今揚州海陵縣劉氏云楚之東境南有洞庭補曰洞庭在今巴陵蒼梧交州郡正曰正義云蒼梧山在道州南按此乃楚粤窮邉處交州蒼梧則粤地也北有汾陘之塞陘召陵陘亭補曰陘見秦䇿汾陘乃韓地此句有誤四字連郇陽讀亦不順史作陘塞是大事記亦謂即陘山也郇陽徐注今順陽屬汝南正曰正義云順陽故城在鄧州攘縣西索隱云郇音荀郇陽當汝南潁川之界當是新陽聲近字變爾汝南有新陽縣在新水之陽徐説葢踈地方五千里帶甲百萬車千乘騎萬疋粟支十年此覇王之資也夫以楚之強大王之賢補曰一本與大王天下莫能當也今乃欲西面而事秦則諸侯莫不西元作南南面而朝於章臺之下矣秦臺在咸陽見楚記秦之所害於天下莫如楚楚強則秦弱楚弱則秦強此其勢不兩立故為大王計莫如從親以孤秦大王不從親秦必􅁸兩軍一軍出武関一軍下黔中若此則鄢郢動矣補曰鄢郢見前臣聞之治之其未亂為之其未有也患至而後憂之則無及矣故願大王之早計之大王誠能聽臣臣請令山東之國奉四時之獻以承大王之明制委社稷宗廟言諸侯輕去其國以從楚正曰委置其宗廟社稷以託於楚練士厲兵在大王之所用之大王誠能聽臣之愚計則韓魏齊燕趙之妙音美人必􅂶後宫矣趙代良馬橐駝匈奴竒畜必實於外廐故從合則楚王横成則秦帝今釋覇王之業而有事人之名竊為大王不取也夫秦虎狼之國也有吞天下之心秦天下之仇讐也横人皆欲割諸侯之地以事秦此所謂飬仇而奉讐者也夫為人臣而割其主之地以外交強虎狼之秦以侵天下卒有秦患不顧其禍夫外挾強秦之威以内刼其主以求割地大逆不忠無過此者故從親則諸侯割地以事楚横合則楚割地以事秦此兩策者相去逺矣有億兆之數兩者大王何居焉故敝邑趙王肅侯使臣效愚計奉明約在大王命之楚王曰寡人之國西與秦接境秦有舉巴蜀并漢中之心秦虎狼之國不可親也而韓魏迫於秦患不可與深謀與深謀恐反人以入於秦故謀未發而國已危矣寡人自料以楚當秦未見勝焉内與羣臣謀不足恃也寡人臥不安席食不甘味心摇摇如懸旌旌析羽注竿首以精進士卒而無所終薄薄泊同今君欲一天下安諸侯存危國寡人謹奉社稷以從傳有在説五國後彪謂五國之聽蘇子也革面而已非能深究横從之利害也唯威王雅有難秦之心念之熟矣異夫患諸國之不可合徒稱從命者也補曰大事記取威王問於莫敖楚官子華曰自從先君文王以至不榖之身亦有不為爵勸不為禄勉以憂社稷者乎莫敖子華對曰如華不足以知之矣王曰不於大夫無所聞之莫敖子華對曰君王將何問者也彼有廉其爵貧其身以憂社稷者有崇其爵豐其禄以憂社稷者有斷脰决腹脰項也一瞑而萬世不視瞑不視也謂死不知所益志於死耳不求利也以憂社稷者亦有補補曰姚本有此字不為爵勸不為禄勉以憂社稷者王曰大夫此言將何謂也言謂誰莫敖子華對曰昔令尹子文鬭榖於莵緇帛之衣以朝鹿裘以處未明而立於朝日晦而歸食朝不謀夕無一日元作月月之積故彼亷其爵貧其身以憂社稷者令尹子文是也昔者葉公子髙名諸梁身獲於表薄表野外薄林也言其初賤而財於柱國財材同柱國以子髙為材定白公之禍見哀公十六年寜楚國之事恢先君以揜方城之外恢大也集韻揜覆取也言取地以大先君之封四封不亷封封城亷猶禮不亷言無事故不察治正曰亷隅之亷謂四境完固不見亷隅也補曰一本四封不侵名不挫於諸侯當此之時也天下莫敢以兵南鄉葉公子髙食田六百畛畛井田間陌補曰周禮十夫有溝溝上有畛朱子曰溝間千畝畛為阡故彼崇其爵豐其禄以憂社稷者葉公子髙是也昔者吳與楚戰於柏舉定四年注楚地兩軍補補曰姚本有御字之間夫卒交千夫百夫之夫莫敖大心撫其御之手顧而太息曰嗟乎子乎一本子作予楚國亡之日元作月補曰姚云月一作日至矣吾將深入吳軍若扑一人若猶扑擊也正曰若發語辭扑普卜反若捽一人捽持髪也以與大心者也社稷其庶幾乎以是為可以厲衆也故㫁脰决腹一瞑而萬世不視不知所益以憂社稷者莫敖大心是也傳不書正曰左傳柏舉之戰楚大夫史皇以其乘廣死司馬沈尹戍傷而死句卑剄而褁之司馬戍即大心也葉公諸梁之父也王氏應麟謂鮑失考昔吳與楚戰於柏舉三戰入郢寡君身出昭王大夫悉屬屬連俱亡百姓離散棼冒勃蘇定四年以為申包胥補曰棼冒即蚡冒勃蘇包胥聲近豈蚡冒之裔歟棼符分反冒亡北反索隱云蚡古本作粉音憤亦符分反曰吾被堅執鋭堅甲鋭兵也赴強敵而死此猶一卒也不若奔諸侯於是羸糧潜行上崢山崢嵘之山踰深溪蹠穿膝暴蹠足下暴傷也七日而薄秦王襄公之朝雀立不轉雀立踊也晝吟宵哭七日不得告水漿無入口瘨而殫悶瘨狂殫氣絶也正曰詩瘨我注病也非癲狂之癲旄不知人旄眊同無目也正曰旄眊耄字通並昬也秦王聞而走之走去音疾趨也冠帶不相及左奉其首右濡其口勃蘇乃蘇蘇死更生也秦王身問之子孰誰也棼冒勃蘇對曰臣非異言非它人楚使去音新造􅉦楚官正曰鮑見秦官有上造大良造遂為此謬説按字書􅉦張留反引擊也山曲曰􅉦此無義盭音戾􅉦通又音列罪也當是此字新造􅉦似言始搆難今降戾之云文當有訛舛或在吳字下棼冒勃蘇吳與楚人戰於柏舉三戰入郢寡君身出大夫悉屬百姓離散使下臣來告亡且求救秦王顧令之元作不不補曰字誤或衍起寡人聞之萬乘之君得罪一士社稷其危今此之謂也遂出革車千乘卒萬人屬之子滿與子虎下塞以東與吳人戰於濁水出齊郡廣之媯山東葢齊楚壤界而大敗之亦聞於遂浦楚地缺或吴夫遂也葢間一説在彼一在此補曰子滿左傳子蒲云在稷與沂注楚地當考夫遂見前秦䇿故勞其身愁其思以憂社稷者棼冒勃蘇是也吳與楚戰於柏舉三戰入郢君王身出大夫悉屬百姓離散䝉榖楚將結鬭於宫唐之上結猶交宫唐豈髙唐邪舍鬭奔郢曰若有孤時未知昭王存亡故意其子楚國社稷其庻幾乎遂入大宫負雞次之典楚國法也雞一作離是所以治離局者正曰姚本雞一作離是時典守者皆離其局故負其典以逃以浮於江逃於雲夢之中昭王反郢五官失法百姓昬亂補曰五官見齊策䝉穀獻典五官得法而百姓大治此䝉榖之功多與存國相若封之執圭田六百畛䝉榖怒曰榖非人臣社稷之臣茍社稷血食血謂牲牢餘豈患無君乎補曰餘當作余遂自棄於磨山之中後志磨城子胥所造盖以此山名城也正曰髙云漢注引歴山姚氏引李通傳論曰昔䝉榖負書不狥楚難注引策吳楚戰于栢舉䝉榖奔入宫負離次之典浮江云云茍利社稷余豈患無君乎遂棄於歴山也磨字説見秦策至今無冒冒謂犯法正曰一本無位故不為爵勸不為禄勉以憂社稷者䝉榖是也王乃太息曰此古之人也今之人焉能有之邪莫敖子華對曰昔者先君靈王好小腰楚士約食約猶節馮而能立馮依也式而能􅁸式小低貌補曰軾車前横木有所敬則俯馮之據而後能立馮而後能起言以約食故無力也或疑士不當言細腰荀子云楚莊王好細腰故朝有餓人一本摽墨子云楚靈王好士細腰故其臣皆三飯為節脇息而復帶淵墻而後起尹文子韓非子皆言一國有飢色餓人今按墨子三卷中無此文三卷者别本也古墨子篇數不止此食之可欲忍而不入死之可惡然而不避補曰姚云一作就而華元作章章補曰當作華聞之其君好發者發發矢其臣决拾車攻注决鉤弦拾遂也遂發也補曰詩注無此三字决以象骨為之著於右手大指所以鈎弦開體拾以皮為之著於厷臂以遂弦亦名遂君王直不好若君王誠好賢此五臣者皆可得而致之蘇子謂楚王曰仁人之於民也愛之以心事之以善言孝子之於親也愛之以心事之以財忠臣之於君也必進賢人以輔之今大王之大臣父兄好傷賢以為資為已資藉厚賦歛諸臣百姓使王見疾於民非忠臣也大臣播王之過於百姓多賂諸侯以王之地是故退王之所愛王所愛者必不播割與大臣異趣故大臣退之亦非忠臣也是以國危臣願無聽羣臣之相惡也慎大臣父兄言不輕用之用民之所善節身之嗜慾以與補補曰此下有缺文百姓人臣莫難於無妬而進賢為主死易垂沙之事未詳兵畧訓楚兵殆於垂沙亦不注死者以千數補曰為主死易止千數下句同如此則意明為主辱易自令尹以下事王者以千數至於無妬而進賢未見一人也故明主之察其臣也必知其無妬而進賢也賢臣之事其主也亦必無妬而進賢夫進賢之難者賢者用且使已廢貴且使已賤故人難之此策本次蘇秦之楚之上知蘇子秦也然不可先扵之楚故次之此彪謂此策人主所當先務人臣之上節也蘇氏弟兄言之若此者二三策而已正曰蘇子未知果秦否序次無據進賢之説而出於蘇氏不過欲時君用已而發言是而意則非也懷王威王子元年年癸巳顕王四十一韓公仲相衍韓公仲相四字章内初不涉韓也補曰此四字必錯簡齊楚之交善秦與魏遇且以善齊而絶齊乎楚楚補王使景鯉之秦鯉與於秦魏之遇於其遇時與焉秦策有其事在惠九年後懐王初也楚王怒景鯉恐齊以楚遇楚謂鯉為有隂於秦魏也恐齊以此謂楚有私於二國且罪景鯉為謂楚王曰臣賀鯉之與於遇也秦魏之遇也將以合齊秦而絶齊於楚也今鯉與於遇齊無以信魏之合己於秦而攻於楚也將絶齊於楚而楚使與焉故齊疑之齊又畏楚之有隂於秦魏也必重楚故鯉之與於遇王之大資也今鯉不與於遇魏之絶齊於楚信明矣齊衍楚字楚補曰疑衍信之必輕王故王不如無罪景鯉以視齊於有秦魏視示同示齊以楚有二國齊必重楚而且疑秦魏於齊疑楚使之疑王曰諾因不罪而益其列列位次也下衍王曰向也止孰便也凡九十字元在韓策王曰鄉也子曰天下無道今也子曰乃且攻燕者何也對曰今謂馬多力則有矣若曰勝千鈞則不然者何也夫千鈞非馬之任也今謂楚強大則有矣若越趙魏而鬭兵於燕則豈楚之任也哉且非楚之任而楚為之是敝楚也強楚敝楚其於王孰便也正曰姚本凡九十七字在韓䇿自為一章乃楚策虞卿謂春申之文脱簡誤衍畧有不同鮑於韓策既刪去全不見其文而於此復不明言在楚策后章補曰與魏之與為有之為如字楚王逐張儀於魏使魏逐之儀初相魏時此七年陳軫曰王何逐張子曰為臣不忠不信曰不忠王無以為臣不信王勿與為約且魏臣不忠不信於王何傷忠且信於王何益逐而聽則可若不聽是王令困也且使萬乗之國免其相是城下之事也此言魏恥之相十三年主城下之盟諸侯所恥正曰十二年五國約以伐衍齊字齊補曰字疑誤秦秦惠後七年趙韓魏燕齊共攻秦此十一年正曰五國伐秦可考策併言齊不可考懐王為從長率五國伐秦之明年齊敗魏趙于觀津即策所謂齊反趙魏者歟昭陽謂楚王曰五國已破秦必南圗圖楚楚正曰楚句王曰然則奈何對曰韓氏輔國也言可為楚之助好利而惡難好利可營也營猶求可使求我惡難可懼也我厚賂之以利其心必營我悉兵以臨之其心必懼彼懼吾兵而營我利五國之事必可敗也約絶之後雖勿與地可楚王曰善乃命大公事楚人正曰無考一本大作太之韓見公仲曰夫牛闌之事未詳馬陵之難魏三十年齊破魏馬陵正曰注缺惠王字親主之所見也主謂公仲此言齊強不可使益強補曰親字疑當在見字上一本主作王王茍無以五國用兵請効列城五請悉楚國之衆衍也字也以圗元作嗇嗇補曰字訛當作圗上有圗楚於齊此下著書者云齊人反趙魏之後而楚果弗與地則五國之事困也五國伐秦魏欲和補曰大事記此六國既敗求和於秦之事也使惠施魏相之楚楚將入之秦納施於秦而使行和杜赫謂昭陽曰凡為伐秦者楚也據此則楚時與伐罪燕也正曰凡為伐秦者楚也指為從長而言餘説見秦策義渠君章今施以魏來而公入之秦是明楚之伐而信魏之和也公不如無聽惠施而隂使人以請聽秦以和請於秦而聴其命補曰姚云劉作徳秦昭子曰善因謂惠施曰凡為攻秦者魏也今子從楚為和楚得元作將將補曰當作得大事記改其利魏受其怨子歸吾將使人因魏而和惠子反魏王哀正曰襄不説杜赫謂昭陽曰魏為子先戰折兵之半補曰折閲之折减損也食列反謁病不聽請和不得魏折而入齊秦此折猶屈子何以救之救其折東有越累元作纍此言越有傷楚之心越近楚故纍正曰此書纍累通北無晉而交未定於齊秦是楚孤也不如速和赫此言葢兩忠楚魏正曰赫陳楚隂請秦之謀以誑魏今恐魏之折入秦而復為是説非有忠魏之心也昭子曰善因令人請和於魏補曰為子之為去聲秦招楚而伐齊冷向補曰冷平聲冷倫氏之後謂陳軫曰秦王惠必外向言合他國不一於楚楚之齊者與齊善者知西不合於秦必且務以楚合於齊齊楚合燕趙不敢不聽齊以四國敵秦是齊不窮也兵力不屈向曰秦王誠必欲伐齊乎不如先収於楚之齊者楚之齊者先務以楚合於齊則楚必即秦矣秦能収楚之善齊者則其初雖欲合齊楚今必背齊合秦以强秦而有衍晉字晉楚則燕趙不敢不聽是齊孤矣向請為公説秦王元在韓策張儀之楚貧初至王未之重舍人怒而欲歸張儀曰子必以衣冠之敝故欲歸待我為子見楚王當是之時南后懷王后鄭褏羙人補曰袖褏同周紫芝楚辭説云鄭國之女多羙而善舞楚懐王幸姬鄭袖當是善舞故名䄂者所以舞也貴於楚張子見楚王楚王不説前嘗欲逐之於魏正曰彼此前後不可考疑此為初見楚王時事當在前張子曰王無所用臣臣請北見晉君楚王曰諾張子曰王無求於晉國乎王曰黄金珠璣犀象璣珠不圎者出於楚寡人無求於晉國張子曰王徒不好色耳王曰何也張子曰彼鄭周之女粉白墨黒黒言其髪正曰墨别本作黛畫眉墨也立於衢閭非知而見之者以為神楚王曰楚僻陋之國也未嘗見中國之女如此其美也寡人見補補曰此當有見字之獨何為不好色也乃資之以珠玉南后鄭褏間之大恐令人謂張子曰妾聞將軍之晉國偶有金千斤進之左右以供芻秣秣飼馬鄭褏亦以金五百斤張子辭楚王曰天下閉關不通未知見日也願王賜之觴王曰諾乃觴之中飲補曰上林賦酒中樂酣注飲酒半醉半醒也中直衆反再拜而請曰非有他人於此也願王召所便習而觴之便所安者習所昵者補曰便習猶便嬖便毗連反王曰諾乃召南后鄭褏而觴之張子再拜而請曰儀有死罪於大王王曰何也曰儀行天下徧矣未嘗見人如此其美而儀言得美人是欺王也王曰子釋之釋猶置吾固以為天下莫若兩人也儀自辱於楚相未嘗至楚其至楚在復相秦之四嵗此十六年正曰不可考補曰大事記引蘇氏云儀之所以求用者其術至此此所以言必信而功多也可不悲乎愚謂此正孟子所謂妾婦之道莊生所謂所治愈下則所得愈多者也䇿南后鄭褏為二人蘇氏止為鄭袖一人為子之為去聲楚懐王拘張儀以其欺楚以商於故將欲殺之靳尚楚人為儀謂楚王曰拘張儀秦王必怒天下見楚之無秦也楚必輕矣又謂王之幸夫人鄭褏曰子亦自知且賤於王乎鄭褏曰何也尚曰張儀者秦王惠之忠信有功臣也今楚拘之秦王欲出之秦王有愛女而美又簡擇宫中佳衍翫字正曰一本無麗好翫人之可好可翫者書曰翫人喪徳習音者以懽從之習音所謂懽也以從愛女正曰習於音聲者資之金玉寳器奉以上庸六縣為湯沐邑以邑為女湯沐之貝欲因張儀内之楚王楚王必愛絶句秦女資强秦以為重挾寳地以為資勢必補補曰此下疑有缺字為王妻以臨于楚王惑於虞樂必厚尊敬親愛之而忘子子益賤而日䟽矣鄭褏曰願委之於公為之奈何曰子何不急言王出張子張子得出徳子無已時秦女必不來而秦必重子子内擅楚之貴外結秦之交畜張子以為用子之子孫必為楚太子矣此非布衣之利也利在為王鄭褏遽説楚王出張子此十八年補曰史楚願得張儀而獻黔中秦王欲遣之口弗忍言儀請行曰臣善靳尚尚得事鄭褏褏所言皆從遂使楚儀固已料是謀之必中矣楚王將出張子正曰姚本自為一章今從之恐其敗已也補曰姚云敗一作欺靳尚謂楚王曰臣請隨之儀事王不善臣請殺之楚小臣靳尚之仇也謂張旄魏之用事者曰以張儀之智而有秦楚之用君必窮矣君不如使人㣲要靳尚而殺之㣲不顕也使若儀殺之楚王必大怒儀也彼儀窮則子重矣楚秦相難則魏無患矣張旄果令人要靳尚刺之楚王大怒秦楚補正曰怒秦句攝兵而戰秦楚爭事魏張旄果大重彪謂張旄欲窮儀則如殺儀斯已矣今不殺儀顧從説者殺尚以儀之智為足以免於死也補曰大事記靳尚之出張儀欲以求福也反以殺身事變之來亦安可逆料哉此可為小人之戒屈原曰前大王見欺於張儀儀至臣以為大王烹之吁豈惟屈原雖庸人孰不謂然懐王聽靳尚鄭袖之言而出之既出之又恐其欺已而使尚隨之不悟其誑尚之見殺則雖怒而終不能誅儀也杜忠言惑邪説玩弄於儀掌握之上召冦衂師喪國亡身死有餘責特以為秦人詐誘天下反從而憐之計其愚闇強愎六國之主無與輩也張儀為秦破從連横説楚王在鄭䄂出儀後曰秦地半天下兵敵四國四方之國被山帶河補曰姚及别本有四塞字史同此脱以為固被寢衣也喻其亘延虎賁之士百餘萬漢官儀虎賁戴鶡冠屬中郎將正曰牧誓注若虎賁獸言其猛也周禮有虎賁氏非始漢車千乗騎萬匹粟如丘山法令既明士卒安難樂死死難兵革之事主嚴以明將智以武雖無出兵甲席卷常山之險収取之如卷席之易無遺也恒山屬趙之元氏此作常劉向避文帝諱也補曰正義云常山在鎮州西正曰史記已作常漢時傳寫所改折天下之脊天下後服者先亡且夫為從者無以異於驅羣羊而攻猛虎也夫虎之與羊不格明矣格猶敵今大王不與猛虎而與羣羊竊以為大王之計過矣凡天下強國非秦而楚非楚而秦兩國敵侔交爭侔齊等也其勢不兩利大王不與秦秦下甲兵據宜陽韓之上地不通上流之地補曰後語作上黨地下河東取成臯韓必入臣於秦韓入臣魏則從風而動秦攻楚之西韓魏攻其北社稷豈得無危哉且夫約從者聚羣弱而攻至強也夫以弱攻強不料敵而輕戰國貧而驟舉兵此危亡之術也臣聞之兵不如者勿與挑戰粟不如者勿與持久持相持夫從人者飾辯虛辭飾縁飾非實也髙主之節行言其利而不言其害卒有楚禍秦伐楚之禍史作秦禍意同無及為已是故願大王之熟計之也秦西有巴蜀方船積粟起於汶山居貧切屬蜀都湔氏道即岷山故唐志茂州汶山注有岷山循江而下至郢三千餘里舫船載卒舫平音併舟也正曰舫甫望切一舫載五十人與三月之糧下水而浮一日行三百餘里里數雖多不費汗馬之勞不至十日而距扞關距本雞足故訓至楚記晉伐楚楚為扞關以距之儀傳注巴郡魚復有扞水關正曰徐廣云魚復有捍水捍關史楚肅王四年蜀伐楚取兹方於是楚作扞關拒之扞關驚則從竟陵以東盡城守矣黔中巫郡非王之有已秦舉甲出之武關南面而攻則北地絶北境之地非幽州郡秦兵之攻楚也危難在三月之内而楚恃諸侯之救在半嵗之外此其勢不相及也夫恃弱國之救而忘強秦之禍此臣所以為大王之患也且大王嘗與吳人五戰史不書三勝而亡之陳卒盡矣陳猶故正曰陳古陣字姚云曽作陣有偏守新城一偏之戍繕築之城而居民苦矣臣聞之攻大者易危而民敝者怨於上夫守易危之功而逆強秦之心臣竊為大王危之且夫秦之所以不出甲於函谷關十五年以攻諸侯者隂謀有吞天下之心也補曰攻大即下功字攻諸侯自當作攻不出甲函谷關十五年此辯士夸詞非實史作攻齊趙按此前二年五年六年皆有攻趙之事而攻齊則無之若云不攻齊則猶可通也隂謀一本無謀字楚嘗與秦搆難戰於漢中楚人不勝通侯執珪徹侯漢諱武帝作通此亦劉向所易也正曰説見前死者七十餘人遂亡漢中楚王大怒興師襲秦補曰諸本有此四字鮑本無今依諸本增與秦戰於藍田又却秦惠十三年取漢中又敗之藍田此十七年此處與上章所稱楚王皆後人追書耳此所謂兩虎相搏者也夫秦楚相敝而韓魏以全制其後計無過一作危於此者矣是故願大王熟計之也秦下兵攻衞陽晉必關元作開補曰姚云一本作關史同按諸本多作開或作大開不若關義長扃天下之匈上二邑天下之中也故喻之匈秦下兵二邑必拒之則閉不通故楚可以此時舉宋正曰索隠云以常山為天下脊則衞及陽晉當天下匈其地是秦晉齊楚之交道也據之是關天下匃他國不得動也大王悉起兵以攻宋不至數月而宋可舉舉宋而東指則泗上十二諸侯盡王之有已凡天下所信約從親堅者蘇秦封為武安君而相燕即隂與燕王謀破齊共分其地乃佯有罪出奔入齊齊王閔因受而相之居二年而覺齊王大怒車裂蘇秦於市按史秦事覺在其死後儀以此明其以詐死耳補曰蘇秦為客所刺設計以取賊故車裂而得賊今儀言如此葢借事為説破從親也夫以一詐偽反覆之蘇秦而欲經營天下混一諸侯其不可成也亦明矣今秦之與楚也接境壌界固形親之國也其勢當親大王誠能聽臣臣請秦太子入質於楚楚太子入質於秦請以秦女為大王箕帚之妾帚糞也以洒掃之役自居補曰大亊記其説諸侯皆曰亊秦獨楚曰云云以楚取強故爾効萬家之都以為湯沐之邑長為昆弟之國終身無相攻擊臣以謂計無便於此者故敝邑秦王惠使使臣獻書之從車下風書國書非此書將迎之際必有風焉不敢當立故言下風須以决事楚王曰楚國僻陋託東海之上寡人年㓜言其為從時不習國家之長計今上客幸教以明制秦王之制誥寡人聞之敬以國從乃遣使車百乗獻雞駭之犀抱朴子通天犀中有一白理如線置米其上以飼雞見之驚故名駭雞犀夜光之璧鄒陽言魏文侯歸白圭夜光之璧於秦王傳在諸國之先補曰大事記六國連衡魏先聽儀説亊秦故楚赦儀之後所説止五國儀説楚王與秦和親楚王既得張儀而重出黔中地欲許之屈平諫不聽卒許儀遂説韓齊趙燕皆聽儀歸報未至惠王薨而約亦觧為秦兩為大之為去聲挑上聲張儀相秦復相時謂昭睢曰楚無鄢郢漢中有所更得乎此皆楚之要地無此則危亡安能有他曰無有曰無昭過陳軫有所更得乎曰無所更得二臣楚之良臣無此二臣不能復得良臣此儀為秦謀去楚謀臣也張儀曰為儀謂楚王逐昭過陳軫請復鄢郢漢中秦惠十三年取漢中故至是許復之鄢郢此時不書此策儀知楚王重地輕人故使睢言之二人逐則楚無良臣睢必得其處也昭㫿歸報楚王睢葢畔楚善儀者楚王説之有人謂昭過曰甚矣楚王不察於人者也韓求相工陳籍周策陳作師求周使相之而周不聽魏求相綦毋恢而周不聽何以也周曰補補曰姚云一本有曰字是列縣畜我也待我如縣吏今楚萬乗之強國也大王天下之賢王也今儀日逐君與陳軫而王聽之是楚自待元作行行補曰當是待字不如周而儀重於韓魏之王也且儀之所行有功名者秦也欲立功名於秦所欲貴富者魏也取富貴於魏欲為攻於魏為魏伐人必南伐楚故攻有道外絶其交交謂與國内逐其謀臣陳軫夏人也夏中國也習於三晉之事故逐之則楚無謀臣矣今君能用楚之衆故亦逐之則楚衆不用矣此所謂内攻之者也而王不知察今君何不見臣於王請為王使齊交不絶補曰姚本疊齊交不絶四字儀聞之其効鄢郢漢中必緩矣齊楚大國也儀惡其合今合而與之地則楚益勁儀必不為也是昭睢之言不信也王必薄之楚王令昭睢之秦重張儀説秦使重之未至惠王死武王逐張儀王因収昭睢以取齊収捕繫之也睢善儀而齊惡儀秦既逐儀楚故捕擊㫿以外儀而合於齊補曰以収為捕繫則與収韓魏字義頓異恐有差誤桓臧楚人為睢謂楚王曰從元作横横親之不合也儀貴惠王為王所貴而善睢也今惠王死武王立儀走公孫郝甘茂貴甘茂善魏公孫郝善韓二人固不善睢也必以秦合韓魏韓魏之重儀言昔重之儀有秦而睢以楚重之今儀困秦而睢収楚困謂見逐於秦韓魏欲得秦必善二人者郝與茂二人者補三字補曰姚云一本復有二人字將収韓魏輕儀而伐楚以楚嘗重儀故方城必危王不如復睢復其位而重儀於韓魏儀據楚勢挾魏重以與秦爭魏不合秦絶句王亦不從不從秦補曰姚云王三本同作韓愚謂此義長則方城無患張儀逐惠施於魏儀時隙秦相魏此十九年惠子之楚楚王受之馮郝楚人謂楚王曰逐惠子者張儀也而王親與約與施相結是欺儀也臣為王弗取也惠子為儀來者元作者來者來而惡王之交於張儀惠子必弗行也此設辭也施以儀逐之而來必有惡儀之言使施善儀為儀而來豈行此惡儀之言哉正曰謂逐惠施者張儀而王與施結約則是欺儀臣所以為王不取惠施為儀逐來歸而使王與儀交惡施亦不必行此且宋王君偃之賢惠子也天下莫不聞也今之不善張儀也今謂施天下莫不知也今為事之故今為楚國事棄所貴於讎人貴謂儀讎謂施不善儀也楚王嘗貴儀而今受施是為儀之讎而棄儀也臣以為大王輕矣且為事邪誠有意為國事者王不如舉惠子而納之於宋而謂張儀曰請為子勿納也今必徳王今謂儀補曰一本儀必徳王而惠子窮人而王奉之又必徳王此不失為儀之實而可以徳惠子王曰善乃奉惠子而納之宋補曰以為之為如字陳軫云元作告告補曰恐當作去楚之魏張儀惡之於魏王哀正曰當是惠王曰軫猶善楚為求地甚力左爽未詳謂陳軫曰儀善於魏王魏王甚信之公雖百説之猶不聽也公不如以儀之言為資儀言已為楚因以其言聞之楚而得復楚楚聞其為楚故復之陳軫曰善因使人以儀之言聞於楚楚王喜欲復之補曰魏策有同魏王哀正曰無考遺楚王美人楚王説之夫人鄭褏知王之説新人也甚愛新人衣服玩好擇其所喜而為之宫室臥具擇其所善而為之愛之甚於王王曰婦人所以事夫者色也而妬者其情也今鄭褏知寡人之説新人也其愛之甚於寡人此孝子之所以事親忠臣之所以事君也鄭褏知王以已為不妬也因謂新人曰王愛子美矣雖然惡子之鼻子為見王為此惡鼻故正曰為如字則必揜子鼻新人見王因揜其鼻王謂鄭褏曰夫新人見寡人則揜其鼻何也鄭褏曰妾知也王曰雖惡必言之鄭褏曰其似惡聞王之臭也王葢有臭疾王曰悍哉令劓之無使逆命不通新人之言補曰雖惡之惡如字楚王后死自張儀拘時獨言鄭褏則后死乆矣正曰無據使真為懐王鄭褏必不待視珥所在矣未立后也謂昭魚曰公何以不請立后也昭魚曰王不聽是智困而交絶立后也新所立后補曰一本立作於然則説者辭不買五雙珥令其一善而獻之王明日視善珥所在因請立之補曰不買上宜有何字説見齊策此等何足紀載齊明説卓滑疑即淖滑以伐秦滑不聽也齊明謂卓滑曰明之來也葢自秦來為樗里疾卜交也明説楚大夫以伐秦皆受明之説也唯公弗受也臣有辭以報樗里子矣卓滑因重之此明因敗為成之説也樗里滑之所欲交也滑不聽明明懼見輕為善於疾而言以此報疾故滑重之或謂黄齊曰人皆以謂公不善於富摯皆楚人公不聞老萊子楚有道之士之教孔子事君乎示之其齒之堅也補曰姚云一本齒下有曰齒二字六十而盡相靡也靡摩同研也今富摯能有材能而公重不相善也重猶甚是兩盡也補曰謂兩強俱斃若齒之相厚以就盡也諺曰傳言曰諺見君之乘下之乘馬也在車則下見杖起之在坐則起補曰下音戸􅁸音去上聲今也王愛富摯而公不善也是不臣也彪謂王之所愛誠善人也正人也尊之敬之禮也如不善不正方當為王力排而亟去之今曰王愛之亦愛何義也此正益以富摯能為足愛也夫能之不善不正亦多矣不可不察也補曰説苑常摐告老子曰舌之存也豈非以其治之柔邪齒之亡也豈非以其剛邪孔叢子云老萊子謂子思曰子不見夫齒乎雖堅剛卒盡相摩舌柔順終以不敝按史記及漢志並云孔子與老子老萊子同時孔叢子所記舛也秦伐宜陽此二十一年楚王謂陳軫曰寡人聞韓朋元作侈下同侈巧士也習諸侯事殆能自免也免於危亡也公仲時守宜陽為其必免吾欲先據之以加徳焉陳軫對曰舍之王勿據也以韓朋侈之智於此困矣今山澤之獸無黠於麋鹿屬補曰黠慧也慧者儇敏也麋知獵者張網前而驅已也因還走而冐人䝉犯即人不趨網至數獵者知其詐補曰數音朔偽舉網而進之偽舉網使其進而即人乃以網網之麋因得矣今諸侯明知此多詐偽舉網而進者必衆矣舍之王勿據也韓朋侈之智於此困矣楚王聽之宜陽果㧞陳軫先知之也此策亦可作韓侈以公仲實守宜陽故作朋正曰説見秦韓等策四國伐楚楚記二十八年秦齊韓魏共攻楚楚令昭睢將以距拒同秦楚王欲擊秦昭睢不欲桓臧為昭睢謂楚王曰睢戰勝三國惡楚之強也恐秦之變而聽楚也必深攻楚以勁秦堅其伐楚之心秦王昭怒於戰不勝必悉起而擊楚是王與秦相罷音疲而以利三國也戰不勝秦秦進兵而攻不如益昭睢之兵令之示秦必戰秦王惡與楚相敝而令天下利補正曰令天下謂以相敝令於天下使知秦可以少割而収害也秦見楚將必戰必割地與楚和戰伐之害可息也収猶息正曰秦惡與楚相敝而不戰則楚可以少割地而収秦一本無害字是秦楚之合而燕趙魏不敢不聽三國可定也城渾周人出周自周出正曰出周下連三人之文疑為人名有誤字故大事記止云城渾南遊於楚二元作三補曰二字恐有誤三人偶行偶耦同二人曰耦兩也此葢一人先二人後南游於楚至於新城莊六年注新城鄭新宻今滎陽宻也漢北海河南皆有此屬楚盖河南宻也正曰僖作莊誤新城説見秦策下章言新城陽人陽人在汝州當是與此近者城渾説其令曰補曰周顯王十九年秦置令丞趙策受馮亭上黨亦云千戸封縣令今楚亦有此稱變古者非特秦矣鄭魏者楚之耎國集韵耎弱也補曰而兖反而秦楚之強敵也鄭魏之弱而楚以上梁應之此山陽濟陽故梁近楚故也正曰故梁在汝州西南説見齊䇿此云上梁非是宜陽之大也時秦已得之楚以弱新城圗元作圍圍之蒲坂平陽相去百里秦人一夜而襲之安邑不知此言百里之地不相知况于五伯里邪新城上梁相去五百里秦人一夜而襲之上梁亦不知也今邊邑之所恃者非江南泗上也漢志楚分野言江南地廣云此皆逺哉故非所恃漢志言楚分野云江南平地故知其稽正曰策語難曉注強觧尤甚故衍楚字楚王何不以新城為主郡也主猶守也為郡則士馬盛可以備秦正曰大亊記郡者縣之主故謂之主郡又郡縣説見秦策邊邑甚利之此渾言其欲説楚王大意新城公楚縣尹稱公大説乃為衍王字補曰姚本無王字具駟馬乗車五百金之楚衍盡字盡補曰贐也字通借姚本無城渾得之遂南交於楚楚王果以新城為主郡城書作成補曰當作成從改文韓公叔有齊魏得二國之援而太子有楚秦太子幾瑟也韓㐮十二年蘇代曰公叔伯嬰恐秦楚之納幾瑟是也此二十九年以爭國補曰公叔主咎公仲主幾瑟也伯嬰説見韓策鄭申為楚使於韓矯以新城陽人秦記注南陽縣有陽人聚補曰正義引括地志云陽人在汝州葉縣西予太子楚王怒將罪之對曰臣矯予之以為國也臣為太子得新城陽人以與公叔争國而得之得其國亊齊魏必伐韓韓氏急必懸命於楚又何新城陽人之敢求太子不勝不勝公叔幸元作然然而不死今將倒冠而至言其歸楚之疾又安敢言地楚王曰善乃不罪也韓㐮䇿語同楚杜赫説楚王以取趙王曰與補曰一本作且與之五大夫楚官而令私行陳軫謂楚王曰赫不能得趙五大夫不可収也是元作得補曰姚云得一作是賞無功也得趙而王無加焉是無善也不賞其善如不有之王不如以十乘行之杜赫怒而不行陳軫謂王曰是不能得趙也楚王問於范環曰寡人欲置相於秦孰可對曰臣不足以知之補曰史楚懐王新與秦婚而懽素聞甘茂在楚使人謂楚王曰願送甘茂於秦云云環史作埍王曰吾相甘茂可乎范環對曰不可王曰何也曰夫史舉上蔡之監門也大不知元作如下同補曰姚云一作知下同事君小不知處室以苛亷聞於世苛小節甘茂事之順焉言大不失其意故惠王之明武王之察張儀之好譛甘茂事之取十官而無罪茂誠賢者也然而不可相秦秦之有賢相也非楚國之利也且王嘗用召補滑補曰史作召滑於越召滑見甘茂傳而納句章屬㑹稽昧之難昧唐昧楚將此二十八年秦齊韓魏共攻楚殺昧越亂故楚南察瀬湖察猶治也言楚有而治之南陽有厲音頼正曰察瀬湖史作塞厲門地皆未詳恐有誤字察作塞勝而野江東以江之東為野此言楚雖有唐昧之難而能得越地以召滑亂之也計王之功所以能如此者越亂而楚治也今王已用之於越矣而忘之於秦臣以為王鉅速忘矣鉅大也正曰鉅詎通王若欲置相於秦乎若公孫郝者可夫公孫郝之於秦王昭親也補曰史作向壽少與之同衣長與之同車被王衣以聽事言其素重真大王之相已秦相而曰王之相葢秦相之必右楚也王相之楚國之大利也甘茂傳有人地小異補曰上蔡史俱作下蔡末云楚使使請秦相向壽茂竞不得入卒於魏魏相翟強死為甘茂謂楚王曰魏之幾相者言危欲相之公子勁也秦人勁也相魏魏秦之交必善勁秦人而魏相之故正曰俱無考秦魏之交完則楚輕矣故王不如與齊約相甘茂於魏齊王閔好髙人以名今為其行人楚為齊請如其使者禮行人使適四方請魏之相齊王必喜魏氏不聽交惡於齊齊魏之交惡必争事楚魏氏聽甘茂與樗里疾貿首之讎也貿言欲易取其首而魏秦之交必惡疾相秦茂相魏故又交重楚也齊秦約攻楚楚令景翠以六城賂齊太子為質此二十九年太子横昭睢謂景翠曰秦恐且因景鯉蘇厲而效地於楚公出地以取齊取猶収猶悦鯉與厲且以収地取秦収前所効者葢二人之辭曰楚出地取齊楚既弱矣何足與地秦収所効必説二人也正曰景鯉乃楚臣秦可因之以責地見楚弱而勸秦収所効之地恐非公事必敗楚不得秦地景翠賂齊楚必怨翠公不如令王重賂景鯉蘇厲使入秦二人得楚賂不復為秦収地矣秦恐以齊楚合故必不求地不収所効而合於楚若齊不求是公與約也两國各不取地而止攻是約者復和也與如與國之與和好也言翠能和两國之約正曰戰國之時秦之割地希矣惟赧王十七年割三城和齊韓魏一事爾懐王末年楚益以弱雖合齊秦未必遽懼而割也効地於楚者令楚効地恐者恐或如此之辭也景翠必與景鯉蘇厲不合者故睢言翠既以地賂齊則秦恐或且因蘇厲景鯉而令楚効地是翠出地取齊而二人収所出之地以取秦翠事豈不敗乎今不如重賂二人使入秦為觧則秦恐或必不求地而與楚合齊見秦楚之合若不求地則是公能和好結約也秦恐必不求地秦字疑當作齊謂重賂二人入秦則齊知秦楚之和恐不敢求所賂之地若果不求是公能和好結約也説亦通術視秦人伐楚楚令昭鼠以十萬軍漢中昭睢勝秦於重丘屬平原正曰恐非蘇厲謂宛公昭鼠鼠為宛尹曰王欲昭睢之乘秦王楚王乘猶淩必分公之兵以益之秦知公兵之分也必出漢中出兵伐此請為公令芋元作辛辛元作辛辛補曰當作􅇗戎謂王戎楚人貴於秦如以私告楚王者曰秦兵且出漢中則公之兵全矣欲其備秦故不分其兵秦敗楚漢中此三十年秦伐楚取八城宜得漢中楚王入秦秦王昭留之游騰為楚謂秦王曰王挾楚王而與天下攻楚則傷行矣不與天下共攻之則失利矣王不如與之盟而歸之楚王畏畏畏秦必不敢背盟背盟補二字補曰宜復有背盟二字王因與三國攻之義也彪謂此言亦可聽也而秦志在亂楚不為之動所以卒併天下後人守此頃襄王懐王子元年癸亥赧王十七年楚襄王為太子之時質於齊懐王薨太子辭於齊王閔而歸齊王隘之隘猶阻未即許求地也補曰隘從阨音下同予我東地五百里乃歸子子不予我不得歸太子曰臣有傅請退元作追追補曰退字訛而問傅傅慎子曰獻之地所以為身也愛地不送死父不義臣故曰獻之便太子入致命齊王曰致命歸誠之言正曰送致命令如項羽使人致命懐王敬獻地五百里齊王歸楚太子太子歸即位為王齊使車五十乘來取東地於楚楚王告慎子曰齊使來求東地為之奈何慎子曰王明日朝羣臣皆令獻其計上柱國子良入見王曰寡人之得求反求反國而得主墳墓復羣臣復見之歸社稷也以東地五百里許齊令使來求地為之奈何子良曰王不可不與也王身出玉聲許強萬乘之齊而不與則不信後不可以約結諸侯請與而復攻之與之信攻之武臣故曰與之子良出昭常入見王曰齊使來求東地五百里為之奈何昭常曰不可與也萬乘者以地大為萬乘今去東地五百里是去我國之半也有萬乘之號而無千乘之用也不可臣故曰勿與常請守之昭常出景鯉入見王曰齊使來求東地五百里為之奈何景鯉曰不可與也雖然楚不能獨守王身出玉聲許萬乘之強齊也而不與負不義於天下楚亦不能獨守補曰姚云魯本圈去王身止獨守二十七字臣請西索救於秦景鯉出慎子入王以三大夫計告慎子曰子良見寡人曰不可不與也與而復攻之常見寡人曰不可與也常請守之鯉見寡人曰不可與也雖然楚不能獨守也臣請索救於秦寡人誰用於三子之計慎子對曰王皆用之王怫然作色曰怫鬱也正曰怫音拂常與孟子艴然之艴同義怒變色也何謂也慎子曰臣請効其説而王且見其誠然也王發上柱國子良車五十乘而北獻地五百里於齊發子良之明日遣昭常為大司馬令徃守東地遣昭常之明日遣景鯉車五十乗西索救於秦王曰善乃遣子良北獻地於齊遣子良之明日立昭常為大司馬使守東地又遣景鯉西索救於秦子良至齊齊使人以甲受東地昭常應齊使曰我典主東地典猶職主猶守且與死生地有則生失地則死之率吾之士卒三十餘萬敝甲鈍兵願承下塵凡人相趨則有塵戰亦有塵不敢與齊抗故言下也齊王謂子良曰大夫來獻地今常守之何如子良曰臣身受命敝邑之王是常矯也王攻之齊王大興兵攻東地伐昭常未涉疆秦以五十萬臨齊右壤曰夫隘楚太子弗出不仁又欲奪之東地五百里不義其縮甲則可縮蹙也葢束之不然則願待戰齊王恐焉乃請子良南道楚西使秦觧齊患士卒不用東地復全彪謂此四臣皆國士也襄王無若人豈能反國慎子能兼用之其最優乎方之晉五臣其舅犯歟此書三書懐王薨而太子歸史記獨謂太子歸而王乃薨又謂王逃歸不逹薨夫秦能刼留之豈不能衞之孟嘗之逃先以計免猶危不脱楚王何以能逃可疑也楚王亡死太子在外郢中必立王以絶秦望太子以齊之重歸義嗣也其誰敢干之於是王乃定齊䇿乃云忠王而走太子則是太子卒不得位亦非也盖郢中立王時蘇子以此策干田文而語人以九可文不之用世猶載其語也正曰頃襄之辭於齊齊隘之以割地雖不與非不信也齊使之來當直拒之昭常之不與是矣然不知出地而較計於大小之間抑未矣子良之與而復攻繆矣景鯉為之索救於秦夫不共戴天之讎王所當絶尚忍乞哀而求援哉鯉罪特甚也慎子不知擇其是非决以大義請皆用之則兼其失矣且秦之責齊曰隘楚太子不仁奪東地不義斯言也出於讎國之口而四人皆無一語及之尚何足稱乎多餘説並見齊策邪春秋戰國之時在他國而逃歸者矣豈無衛之者以此疑懐王之逃不可也補曰使車使人之使如字為身之為去聲女阿未詳謂蘇子曰秦栖楚王懐王見刼客秦如栖危太子者公也今楚王歸以此書及史考之王皆不歸今此葢其䘮歸正曰此謀度之言太子南自齊歸楚為南公必危公不如令人謂太子曰蘇子知太子之怨已也必且務不利太子太子不如善蘇子蘇子必且為太子入矣入言其歸之之深正曰使太子得入也蘇子乃令人謂太子太子復請於蘇子詳此亦無走太子之亊補曰疑此乃齊策蘇子説薛公章脱簡首女阿二字又他章錯脱文説薛公策未欠蘇子自觧於薛公一節此為蘇子自觧於太子也疑亦有差舛長沙之難長沙荆州國懐二十九年秦大破楚楚王恐使太子質齊楚葢破於此楚太子横為質於齊楚王死薛公歸太子横因與韓魏之兵隨而攻東國太子懼本其初言之亦明此非新立王也昭蓋曰不若令屈署以新東國為和於齊新字疑衍以動秦秦恐齊之敗東國上言齊興兵攻故地此恐其敗而令行於天下也必將救我太子曰善遽令屈署以東國為和於齊此即子良之策葢與署也秦王昭聞之懼令芊元作辛辛補曰當作􅇗戎告楚曰毋與齊東國吾與子出兵矣有獻不死之藥於荆王者謁者操以入中射之士射人之在中者正曰韓非子注中射士官有上中下問曰可食乎曰可因奪而食之王怒使人殺中射之士中射之士使人説王曰臣問謁者曰可食臣故食之是臣無罪而罪在謁者也且客獻不死之藥臣食之而王殺臣是死藥也王殺無罪之臣而明人之欺王王乃不殺彪謂此射士乃不可不殺荆王赦之以不能答之也於答是也何有謁者曰可食非謂汝可食也藥之能不死者乎人耳非能使刑者不死且人以獻王何與汝而問之是安得無罪也正曰人獻藥於王奪而食之固不得為無罪而罪不至於死者世豈有不死之藥哉明臣之欺王此士之欲以悟王也其志則忠矣鮑謂不可不殺悖哉補曰自齊威宣燕昭使人入海求三神山而方士盛楚臣有獻不死之藥者知當時此術蔓延浸滛不獨燕齊然也屈平逺游之篇曰一氣孔神兮於中夜存虚以待之兮無為之先長生久視之方無以易此惜乎楚王之不知也此策時亦無考齊以淖齒之亂事補補曰姚云一本添讎字秦其後秦欲取齊與齊合故使蘇㳙之楚㳙固皆秦人令任固之齊秦明謂楚王曰秦王昭欲楚不若其欲齊之甚也其使㳙來以示齊之有楚以有楚之親示齊以資固於齊為任固資齊見楚見其納㳙必受固是楚補補曰一本此有王字之聽㳙也適為固驅以合齊秦也所謂資固齊秦合非楚之利也且夫㳙來補曰一本此下有之辭二字之辭必非固之所以之齊之辭也㳙之辭必厚楚而薄齊固之辭必厚齊而薄楚王不如令人以㳙之辭謾固於齊慢欺也以㳙薄齊之辭告齊則固言厚齊者非實齊必以固為欺已齊秦必不合齊秦不合則王重矣王欲収齊以攻秦漢中可得也王即欲以秦攻補補曰一本有攻字齊淮泗之間亦可得也元在齊策正曰從舊可莊辛楚人補曰元和姓纂莊辛楚莊王之後以諡為號謂楚襄王曰君王左州侯右夏侯輦從鄢陵君與壽陵君皆楚之寵幸臣也輦從謂輦出則二人從之專滛逸侈靡不顧國政郢都必危矣襄王曰先生老悖乎悖皆道也正曰悖亂也言老而耄亂也將以為楚國妖祥乎莊辛曰臣誠見其必然者也非敢以為國妖祥也君王卒幸四子者不衰楚國必亡矣臣請避於趙淹留以觀之淹亦留莊辛去之趙留五月秦果舉鄢郢巫上蔡陳之地此二十一年白起拔郢置南郡襄王流揜於成元作城城陽流謂走揜覆也謂自匿城陽屬汝南若城陽乃齊也補曰史東北保於陳城當是指此城爾於是使人發騶騶車御也徴莊辛於趙徴謂召也莊辛曰諾莊辛至襄王曰寡人不能用先生之言今事至於此為之奈何莊辛對曰臣聞鄙語曰見兎而顧犬未為晩也亡羊而補牢牢閉飬之圈未為遲也臣聞昔湯武以百里昌桀紂以天下亡今楚國雖小斷長續短猶以數千里豈特百里哉王獨不見夫蜻蛉乎蟲一名桑根也六足四翼飛翔乎天地之間俛啄蚉䖟而食之仰承甘露而飲之自以為無患與人無爭也不知夫五尺童子方將調飴元作鈆鈆補曰鈆當作飴膠絲飴米蘖所煎調以餌之又施膠於絲以擊之正曰顔師古急就章注以蘖消米取汁而煎之渜弱者為飴形怡怡然此謂調以膠絲也淮南子栁下惠見飴曰可以飬老盗跖見飴曰可以黏牡吕氏春秋仁人得飴以飬疾侍老跖蹻得飴以開閉取楗皆以黏也補曰一本標膠或作繆言糾繆纒統也加已乎四仞之上八尺曰仞而下為螻蟻食也補曰姚本此有夫蜻蛉其小者也七字黄雀因是以俯噣白粒噣啄也葢以喙啄補曰一本噣作囑仰栖茂樹鼓趐奮翼趐強羽自以為無患與人無争也不知夫公子王孫左挾彈右攝丸攝引持也將加已乎十仞之上以其𩔖為招補曰一本標後語云以其頸為的的或為招晝㳺乎茂樹夕調乎酸醎以為饌也倐忽之間墜於公子之手夫雀其小者也黄鵠因是鵠鴻也正曰水鳥也以游乎江海淹乎大沼俯噣鱔元作䱧䱧鯉字書無䱧字仰囓陵衡衡香草正曰周禮蓤芰蔆䔖菱字通凡將篇蔆從遴今俗書作菱武陵記云四角三角曰芰兩角曰菱衡與菱並言即荇接余水草也奮其六翮翮羽本而凌清風飄摇乎髙翔自以為無患與人無争也不知夫射者方將脩其碆元作盧字書無字碆與聲近集韻碆可為鏃盧旅同黒弓也正曰下文磻即碆此不當復有弣號把中恐是此字形聲訛耳治其矰元作繒繒正曰矰通見三輔黄圖繳矰戈射矢繳生也縷補曰繳音灼將加已乎百仞之上被㔋元作礛礛磻無礛字集韻監利也磻以石着惟繳也正曰廣韻礛力甘反治玉之石引㣲繳折清風而抎矣以繫矢從髙集韻抎下也如折然補曰磻補左補何二反抎羽粉反徐按吕春秋與隕同故晝游乎江河夕調乎鼎鼐鼐鼎絶大者也夫黄鵠其小者也蔡靈元作聖下同聖侯之事春秋及史無聖侯補曰聖當作靈或者古通稱下同因是以南游乎髙陂陂阪也正曰池也此引説文上一句北陵乎巫山飲茹溪流茹飲馬也故與吐反正曰姚云駁語飯茹溪之䟽注云茹溪巫山之溪食湘波之魚湘水出零陵屬長沙左抱㓜妾右擁嬖女與之馳騁乎髙蔡之中即上蔡而不以國家為事不知夫子發方受命乎靈元作宣宣補曰宣當作靈王繫已以朱絲而見之也昭十一年楚子誘蔡侯般殺之于申經傳不書子發盖使子發召之楚子靈王若宣王蔡滅八十年矣道應訓子發伐蔡宣王郊迎人間訓又言獲罪威王者皆失考也蔡靈聖侯之事其小者也君王之事因是以左州侯右夏侯輦從鄢陵君與壽陵君飯封禄之粟所封之禄而載方府之金方四方金其所貢也與之馳騁乎雲夢之中而不以天下國家為事而不知夫穰侯方受命乎秦王昭填黽塞之内填兵滿也江夏有鄳即魏策鄳隘之塞補曰策本韓鮑改作魏故云然燕策亦有按左氏定四年左司馬成謂子常直轅㝠軛注漠東隘道史春申傳秦踰鄳隘之塞而攻楚蘇秦𫝊塞鄳阨正義云申州羅山縣本漠鄳縣州有清平関葢古鄳縣之阨塞又云石城山楚母家涉鄳雲亦指此而正義誤以為河東太陽鄢城初不與楚相涉何遽忘前説也大事記作鍾山縣按唐志申州有鍾山羅山兩縣申州今信陽軍也黾鄳字冋謨萌反隘當從阨音而投已乎黽塞之外襄王聞之顔色變作身體戰慄於是乃以執珪而授之為陽陵君與淮北之地彪謂此策天下之善規也㐮王雖失之東隅而収之桑榆故其季年保境善鄰差為無事此策為有力焉補曰與淮北云云句上有缺文新序曰身體悼栗曰謹受令乃封莊辛為成陵君而用計焉與舉淮北之地十二諸侯後語云而與謀秦復取淮北之地鄢陵新序作新安體大事記頃㐮既失郢都復召莊辛聞其言至於色變慄此其所以能稍復故地也復取江南十五邑在頃㐮二十三年新序又載楚㐮用莊辛計舉淮北之地十二諸侯葢䘮亂之後補敗扶傾之計皆出於辛特不能大有所為耳劉辰翁極詆辛小人謂何策之有皆失之齊韓魏共攻燕燕惠七年書韓魏楚共伐燕他不書則楚當是齊此二十七年正曰策有宋書宋未㓕時豈得改楚為齊燕使太子請救於楚楚王使景陽將而救之景陽後至考烈六年猶為將史同補曰世家景陽救燕楚齊烕宋當頃㐮十三年至考烈王六年凡三十年猶相及唐裴行儉討突厥徙营事類此暮舍使左右司馬各營壁地壁軍壘已植表如華表以别所舍景陽怒曰女所營者水皆至㓕表㓕猶没也此欲用其教因已示神此焉可以舍乃令徙明日大雨山水大出所營者水皆㓕其表軍吏乃服於是遂不救燕而攻魏雝立雝雍同屬陳留取之以與宋宋時已為齊未曉三國懼乃罷兵魏軍其西齊軍其東楚軍欲還不可得也景陽乃開西和門晝以車騎暮以燭通使於魏補曰姚本車作軍通作見齊師恠之以為燕楚與魏謀之乃引兵而去齊兵已去魏失其與國無與共擊楚乃夜遁楚師乃還元在燕策正曰以救燕故在燕補曰雝及通使之使去聲考烈王㐮王子元年年己亥赧王五十三唐睢元作且從秦策旦見春申君黄歇楚相曰齊人飾身脩行得為益益謂有禄位然臣羞而不學也不避絶江河言雖險不避行千餘里來竊慕大君之義大言其髙義而善君之業臣聞之賁諸懐錐刃孟賁專諸諸吴人刺王子慶忌者言二人不待盛兵而後稱勇而天下為勇補曰為當作謂西施衣褐褐粗衣補曰説文編枲韤一曰粗衣詩國風孟子註褐寛博注並云毛布而天下稱美今君相萬乘之楚禦中國之難所欲者不成所求者不得臣等少也夫梟棊之所以為能元作能為能為者補曰正義云摶頭有刻梟鳥形者以散棊佐之也散謂衆棊夫一梟之不如不勝五散獨善不如衆智補曰當云一梟之不勝不如五散亦明矣今君何不為天下梟而令臣等為散乎客説春申君曰湯以亳皇覽今梁榖熟補曰史正義引括地志云宋州榖熟縣西南南亳故城即湯都宋州北大䝉城為景亳湯所盟地所謂北亳河東偃師為西亳帝嚳及湯所都盤庚亦徙都云湯即位後都南亳後徙西亳武王以鎬元作鄗屬京兆鄗正曰鎬通史復都豊鄗國語杜伯魁王放鄗鄗一音囂堯反考魯桓十三年公會齊侯于鄗常山有邑志闕上林即今長安縣昆明池北高邑縣皆不過百里以有天下今孫子荀卿天下賢人也補曰荀作孫避宣帝諱也君藉之以百里之𥙷勢時為蘭陵令臣竊以為不便於君何如春申君曰善於是使人謝孫子孫子去之趙史言孫子春申君死而貧困家蘭陵不言之趙趙以為上卿客又説春申君曰昔伊尹補補曰缺尹字去夏入殷殷王而夏亡管仲去魯入齊魯弱而齊強夫賢者之所在其君未嘗不尊國未嘗不榮也今孫子天下賢人也君何辭之春申君又曰善於是使人請孫子於趙孫子為書謝曰癘人憐王癘雖惡疾猶愈於刼弑故反憐王補曰癘癩也劉辰翁曰此韓非語孫不應用不知非正用孫語也此不恭之語也雖然補曰一本此下有古無虚諺四字不可不審察也此為刼弑死亡之主言也夫人主年少而矜材無法術以知奸則大臣主斷國專斷其國私以禁誅於已也察其私則恐人誅巳故主斷以禁之故弑賢長而立㓜弱廢正適而立不義春秋戒之曰楚王子圍聘於鄭未出竟聞王病反問疾遂以冠纓絞王殺之因自立也昭元年齊崔杼之妻羙莊公通之崔杼帥其君黨而攻莊公莊公請與分國崔杼不許欲自刃於廟崔杼不許莊公走出踰於外牆射中其股遂殺之而立其弟景公襄二十五年近代所見李兊用趙餓主父於沙丘百日而殺之淖齒用齊擢閔王之筋擢引也懸於其廟梁宿夕而死夫癘雖㿈腫胞疾補曰㿈委勇切胞當披交切上比前世未至絞纓射股下比近代未至擢筋而餓死也夫刼弑死亡之主也心之憂勞形之困苦必甚於癘矣由此觀之癘雖憐王可也因為賦曰補曰賦曰以下即佹詩文小異寳珍隋珠隋侯見大蛇傷療而愈之蛇􅋦明珠報之世之所寶所珍不知佩兮禕衣與絲禮后服禕衣謂􅀞袍不知異兮閭姝子奢姝好也奢即子都美人也補曰荀子作閭娵韋昭云梁王魏罃之美女楚辭注云奢或作都故以為鄭之美人莫知媒兮嫫母求之嫫母醜婦也正曰醜婦人楚辭注云黄帝妻又甚喜之兮以瞽為明以聾為聰以是為非以吉為凶嗚呼上天曷惟其同言舉世皆然正曰朱子謂此言衰亂之極人懐私意乖異反易至於如此故呼天而問之曰何為而可使之同乎同則合乎天理之公是非善惡皆當於理而天下治矣明天意悔禍則轉禍為福撥亂反正不難矣詩曰上天甚神無自瘵也瘵病也言天理甚明如是者必有患禍彪謂春申君之愚昏甚矣人惟不知賢故不能用豈有知之以一人言去之又以一人言召之其持操安在也荀卿絶之宜哉卿書有與趙孝成王論兵而史不言之趙失之卿禮義人也使卿而在楚春申必無李園之禍此書葢知之矣補曰按詩曰以下荀子無之二句乃菀桞之辭神詩作蹈傳謂當從策也詩作焉本言人誰不欲朝事王而王甚神朝之無不自取病今借以言天之威神甚可畏不可不畏天而自取禍也矣朱子謂黄歇亂人卿乃以為託身行道之所則已誤愚謂卿雖非孟子比然以詩書禮義言治禁暴除害言兵要為異於戰國之士者此篇不載於其書賦即佹詩未章其言弑賢良而立㓜弱廢正適而立不義逺引楚圍崔抒近述李兊淖齒劘切春申甚然首以法術知奸為言則亦出申商可謂惑流俗而不篤於自信者也策獨載此而不及其他其人又可知矣史荀卿年五十始遊學於齊襄王時最為老師齊尚脩列大夫之􅆙而卿三為祭酒劉向曰方齊宣王威王之時聚天下賢士於稷下尊寵之若鄒衍田駢淳于髠之屬號曰列大夫是時荀卿年十五始遊學至襄王時最為老師齊尚修列大夫之􅆙而卿三為祭酒焉據二書之文則㐮王時三為祭酒也大事記取史又書卿為列大夫祭酒在㐮王五年是也朱子采劉向而文稍異曰卿少逰學於齊歴威宣至襄王三為稷下祭酒按史春申君死而卿家蘭陵春申之死在考烈王二十五年齊王建之二十七年也上歴襄王二十九年湣王宣王通五十九年乃及威王之世自王建二十九年至宣王元年已為一百有五年卿之不逮事威王明矣葢向之言但為歴叙威宣之多士其言猶先宣而後威不主為卿言也祭酒者古人飲食必祭席中之尊者一人當祭後因以為官號髠衍為列大夫之時卿年尚少其徒既死齊修其􅆙而卿與焉故卿在㐮王時最為老師而三處衆士之上也向之言視史猶明朱子偶未之察耳史云五十始游學向云十五史字倒置無疑朱子改之當矣虞卿史不書何所人謂春申君曰臣聞之春秋補曰此二字恐因下文衍於安思危危則慮安今楚王春秋髙矣而君之封地不可不早定也為主君慮封者莫如逺楚秦孝公封商君孝公死而後王補不免殺之秦惠王封冉子穰侯也宣太后弟子男子惠王死而後王奪之公孫鞅功臣也冉子親姻也然而不免奪死者封近故也太公望封於齊邵公􅝥封於燕為其逺王室矣今燕之罪大而趙怨深趙自燕王喜以栗腹之謀伐趙起燕四年至十二年無嵗不戰十二年此二十一年正曰不可考補曰一本趙怒深故君不如北兵以徳趙踐亂燕踐奄之踐以定身封此百代之一時也補曰此數語與秦策謂穣侯章趙策齊將攻宋章齊攻宋章皆相𩔖君曰所道攻燕非齊則魏魏齊新怨楚昭陽救燕之役正燕楚使景陽救之齊韓魏共攻昭攻魏雍丘以與宋云云時猶有宋去此時逺甚鮑指以為懐王二十七年此為考烈王二十一年就使果然則相去亦皆逺策固云魏齊新怨楚豈得為彼時亊哉楚軍元作君君雖欲攻燕將道何哉對曰請令魏王可景閔王可言聽其道魏君曰何如對曰臣請到魏而使所以信之為所可信者廼謂魏王曰夫楚亦強大矣天下無敵乃且攻燕魏王曰補曰王曰以下脱簡誤衍在前章鄉也子云天下無敵今也子云乃且攻燕者何也對曰今謂馬多力則有矣若曰勝千鈞則不然者鈞三十斤何也夫千鈞非馬之任也今謂楚強大則有矣若越趙魏而鬪兵於燕則豈楚之任也哉元作我補曰姚云我一作哉非楚之任而楚為之是敝楚也敝楚是強魏也其於王孰便也補曰按史考烈王元年封歇春申君賜淮北地後十五年以地邉齊言於王以為郡請封江東因城吴故墟大亊記謂利吴之安富也此策言楚王春秋髙君之封地不可不早定則在未封之前頃襄之時乎頃㐮之三十四年趙嘗伐燕豈或此時勸以踐燕定封亦欲其取地於它國如魏冉乎淮北邉齊猶難之况燕地乎亦非計之便也然逺楚徙封卒用於城吴之時皆斯言有以啓之也或謂楚王曰臣聞從者欲合天下以朝大王臣願大王聽之也燕昭末年用蘇代説復約從此二十二年春申遂為從長正曰此策時不可考以為春申合從無明縁與下章不同夫因詘為信詘謂懐王刼死正曰不專指此奮患有成奮於患難以能有成勇者義之攝禍為福補曰攝収也裁少為多智者官之官尊荣之稱正曰義之謂制其宜也官之為主其事也夫報報之反報猶反也言屈伸禍福相反也墨墨之化墨黙同化猶治也言治之其未著正曰報報之反言反復相尋墨墨之化言變化無形惟大君能之者言其轉旋變化之妙又非勇智者所可及也新序晉平公謂師曠甚矣子之墨墨也曠曰天下有五墨墨史商君𫝊殷紂墨墨以亡漢書竇嬰傳墨墨不得意皆同此字義或有異唯大君能之禍與福相貫貫猶通生與亡為鄰不偏於死偏猶專也死謂患難不偏於生專於衛生如兩臂重於天下者不足以載大名正曰載承也不專一於致死不專一於求生者不足以承載大名無所冦艾冦外兵艾已所懲創正曰冦猶賊害艾即刈不遭賊害而懲創則不足以横行於世不足以横世横言莫之敵夫秦捐徳絶命之日久矣而天下不知今夫横人嚂口集韻嚂聲也言聲説所利之事利機正曰嚂力暫反食貌利機者利其發動之機上干主心下牟百姓牟取也公舉而私取利舉謂舉揩是以國權輕於鴻毛而積禍重於丘山補曰此主從而黜横者之説然意多未詳天下合從趙使魏加趙人全晉舊姓正曰鮑見策云趙使故云爾無據見楚春申君曰君有將乎曰有矣僕欲將臨武君未詳補曰荀子議兵篇臨武君與卿議兵於趙孝成王前注楚將劉向稱卿至趙與孫臏議兵於孝成王前臏為齊宣王軍師世逺非是魏加曰臣少之時好射臣願以射譬之可乎春申君曰可加曰異日者更羸人姓名與魏王處京臺之下京髙也正曰或臺名仰見飛鳥更羸謂魏王曰臣為君引弓虚發而下鳥魏王曰然則射可至此乎更羸曰可有間鴈從東方來更羸以虛發而下之魏王曰然則射可至此乎更羸曰此孽也有隱痛於身猶孽正曰徐錯曰妾𨽻之子曰孽孽之言蘖也女没廢而有所生若木既伐而生枿故於文子薛為孽孽者罪也按此則取廢而復生之義以譬傷弓之鳥乎王曰先生何以知之對曰其飛徐而鳴悲飛徐者故瘡痛也鳴悲者久失羣也故瘡未息而驚心未去也補曰一本未忘聞弦者音烈而髙飛烈猛也髙飛欲避箭補曰姚及一本無者字烈作引其義為是者音之訛而衍也烈引之訛也故瘡隕也以瘡痛而墜今臨武君嘗為秦孽嘗敗於秦未詳不可為拒秦之將也汗明未詳見春申君候問補曰姚云問一作間三月而後得見談卒春申君大説之汗明欲復談春申君曰僕已知先生先生大息矣異於小休汗明蹙元作憱憱補曰即憱焉字書無憱字蹙踖驚貌正曰憱不安貌踧踖之踧非蹙曰明願有問君而恐固固陋也不審君之聖孰與堯也春申君曰先生過矣臣何足以當堯汗明曰然則君料臣孰與舜春申君曰先生即舜也汗明曰不然臣請為君終言之君之賢實不如堯臣之能不及舜夫以賢舜事聖堯三年而後乃相知也今君一旦而知臣是君聖於堯而臣賢於舜也春申君曰善召門吏為汗先生著客籍五日一見著者書此語也正曰著其名字於賔客之籍汗明曰君亦聞驥乎夫驥之齒至矣至言可服乘之時服鹽元作檻檻補曰字訛當作鹽車服在車前而上太行蹄申膝折申猶展皆用力故然尾湛胕潰湛沉同汗多故然胕當作肤與膚同亦汗出於膚如潰漉汗元作汁汁灑地參漉之汗正曰下有汗字汁與汗對汁言其重者白汗交流白汗不縁暑而汗也正曰白言其色外阪遷延阪坡也遷延不進貌正曰姚本中阪負棘而不能上負所載也棘言步蹇正曰負在背姚本作負轅是伯樂遭之補曰伯樂姓孫名陽秦穆公時人下車攀而哭之觧紵衣以羃之羃覆也驥於是俛而噴仰而鳴聲逹於天若出金石聲補曰此聲字宜衍者何也問其聲何以然彼見伯樂之知己也今僕之不肖阨於州部集韻部統也界也堀穴窮巷堀窟也以窮巷為窟穴沉洿鄙俗之日久矣洿濁溽也君獨無意湔祓僕湔手浣也祓去􅁖也使得為君髙鳴屈於梁乎聲已之屈梁南梁彪謂世之懐材抱徳之士陸沉於時若此驥者不少而伯樂之不世有長鳴之無其時可不為之大哀邪故招延不可不􅀶試用不可不詳也補曰髙鳴屈於梁疑明嘗困於梁者拂一本標云𩔖要髙鳴作長鳴李善注廣絶交論曰翦使其長鳴引䇿云楚考烈王無子補曰此時無子也右史云楚幽王悍卒同母弟猶立猶庻兄負芻之徒襲殺猶而立負芻司馬貞云猶有庻兄負芻及昌平君劉向列女傳猶乃考烈王遺腹子春申君患之求婦人宜子者進之甚衆卒無子趙人李園持其女弟欲進之楚王聞其不宜子恐又無寵李園求事春申君為舍人已而謁歸故失期後於所期日還謁自趙還入謁春申君問狀狀事狀對曰齊王遣使詭言王建求臣女弟與其使者飲故失期春申君曰聘入乎對曰未也春申君曰可得見乎曰可於是園乃進其女弟即幸於春申君知其有身園乃與其女弟謀園女弟承間説春申君曰楚王之貴幸君雖兄弟不如今君相楚王二十餘年而王無子即百嵗後將更立兄弟即楚王更立王後王彼亦各貴其所親君又安得長有寵乎非徒然也君用事久多失禮於王兄弟兄弟誠立補曰兄上恐亦當有王字疊上文禍且及身奈何以保相印江東之封乎補曰後語云江東十二縣之封湖州圗經有春申君封邑今妾自知有身矣而人莫知妾之幸君未久誠以君之重而進妾於楚王王必幸妾妾賴天而有男則是君之子為王也楚國封盡可得四封之内孰與其臨不測之罪乎春申君大然之乃出園女弟謹舍而言之楚王楚王召入幸之遂生子男立為太子以李園女弟立為王后楚王貴李園李園用事李園既入其女弟為王后子為太子恐春申君語泄而益驕隂飬死士欲殺春申君以㓕口而國人頗有知之者春申君相楚二十五年考烈王病朱英楚人正曰後語云觀人朱英注觀地在河北平原史觀津人朱英班志信都國觀津縣觀古玩反正義以為魏州觀城縣觀音館者非是又見韓策觀鞅章鮑移在魏作魏鞅謂春申君曰世有無妄之福無妄言可必正曰朱子觧易無妄云史作無望謂無所期望而有得焉者義亦通又有無妄之禍今君處無妄之世以事無妄之主安不有無妄之人乎春申君曰何謂無妄之福曰君相楚二十餘年矣雖名為相國實楚王也五子皆相諸侯今王疾甚旦暮且崩太子衰弱疾而不起而君相少主因而代立謂攝也當國如伊尹周公王長而反政不即遂南面稱孤不不反政因而有楚國此所謂無妄之福也春申君曰何謂無妄之禍曰李園不治國言非將相王之舅也不為兵將而隂飬死士之日久矣楚王崩李園必先入㨿主議㨿言不移議欲殺春申也制斷君命制斷矯也君楚王也秉權而殺君以㓕口此所謂無妄之禍也春申君曰何謂無妄之人曰君先仕臣為郎中君王崩此章唯楚王更立楚王可曰楚王餘皆後人稱之正曰策中有當曰王當曰楚王亦有両稱皆通者李園先入臣請為君􅩶其胸殺之補曰􅩶玊篇作􅩶尺庸反刺也為君之為去聲此所謂無妄之人也春申君曰先生置之勿復言也李園軟弱人也僕又善之又何至此朱英恐乃亡去後十七日衍楚字楚考烈王崩李園果先入置死士止於棘門之内宫門以棘衛之春申君後入止棘門園死士夾刺春申君斬其頭投之棘門外於是使吏盡㓕春申君之家而李園女弟初幸春申君有身而入之王所生子者遂立為楚幽王也是嵗秦始皇立九年矣嫪毐吕不韋所進以説始皇母帝太后者也亦為亂於秦不韋𫝊毐與太后私亂生子二人與后謀曰王即薨以子為後補曰策於章末並叙嫪毐之事豈無意哉二國宗姓已㓕絶吕政雖一天下世僅再𫝊奚異楚幽也趙與秦同姓王遷母倡族𩔖不正亦以㓕亡葢倫紀瀆亂其不永也固宜抑諸國運盡祚窮垂戾併於一時也歟覺夷三族而吕不韋廢彪謂春申君所以至於此錮寵而暗於事也使萬有一如李氏女所陳者歸相印而老江東之封不已優乎春申於楚非若商君之於惠文又如不可則杖策而去扁舟五湖為世陶朱抑可矣春申不為此而計出於滅宗葢小人患失之禍勢必有此不可不戒也朱英之言深矣然未聞道也春申之納女前日事耳英不以此時匡之以大臣之義而以一卒自任雖多言亦何救於亂哉正曰凡鮑氏責春申以歸老江東杖策扁舟之事在未納女之前可也既納之後又入其乗間之言禍根已牢異時縱欲歸印􅁠策禍亦隨之豈有脱理邪其論朱英以未聞道尤謬納女事袐人豈知之英之事歇又淺觀其説而不聽可見責以匡正大臣之義豈其然乎補曰越絶書記李園女弟環謂圉王老無嗣可見我於春申君圉難之又令求謁於春申才人言之遂得幸云云烈王死幽王立環使園相春申後告園以吴封之三年徴春申為令尹自使其子親為假君治十一年幽王徴假君與春申併殺之二君治吳凡十四年姚氏全注其文謂隋經籍志稱越絶為子夏作今雜記秦漢事出後人不敢盡信史記國策列女傳不載女環名乃見於此畫策始終謂皆出環尤為異也其言烈王死後春申事亦皆不合姑記以廣異聞云史疾為韓使楚楚王問曰客何方所循方術也曰治列子圉冦之言圉禦同曰何貴曰貴正王曰正亦可為國乎曰可王曰楚國多盗正可以圉盗乎曰可曰以正圉盗柰何頃間有鵲止於屋上者曰請問楚人謂之何王曰謂之鵲謂之烏可乎曰不可曰今王之國有柱國令尹司馬典令皆楚官其任官置吏必曰亷潔勝任今盗賊公行而弗能禁也此烏不為烏鵲不為鵲也元在韓策正曰為韓使楚故在韓從舊可按此言循名任法有申韓之意而以為列圉冦所治何歟抑申韓原於道徳本不異歟補曰為韓之為去聲凡五十六章正曰楚王將出張子章元與楚懐王拘張儀章相連為一章今别為戰國策校注卷五
