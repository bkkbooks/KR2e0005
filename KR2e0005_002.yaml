body:
  text: 戰國策校注卷二宋鮑彪原注元吴師道補正東周漢志河南鞏東周君所居正曰東周當從舊居卷首説見前大事記云東周惠公班秉政洛陽采邑在鞏漢志説非餘見前惠公周紀考王封其弟河南是為桓公桓公子威公威公子惠公惠公封其子於鞏號東周惠公然則河南鞏父子同諡又紀西周武公赧王則諡也葢以避秦不敢稱尊楚記頃㐮十八年王赧使武公此武公赧王臣也而徐注以為惠公之子疎矣惠公之子自為東周君豈為西周用邪兩周西先亡至秦莊襄元年俱㓕正曰東周止有惠公名著策有文君他無見徐廣云紀年顕王九年東周惠公傑薨皇極經世東周惠公卒子傑嗣二書不同則其世系亦難明矣凡策所書君得皆為惠公時事邪隱赧王非諡武公鮑引宋忠説誤為二人前索謂諡法無赧赧然慚愧故以為號戰國相王周之王號自若不聞其為秦貶損也王赧使武公徐廣謂即西周武公大事記從之西周惠公封子於鞏為東周惠公實同謚者繼西周之惠公則武公也既曰武公則周君也謂别為一人可乎東西周雖分治王猶在上為東周君敬奉王命而王使之又何不可乎秦興師臨周而求九鼎周君患之以告顔率周人顔率曰大王勿憂臣請東借救於齊顔率至齊謂齊王閔正曰大事記云姚氏考春秋後語周顕王齊宣王也今附載於顕王三十三年宋太丘社亡之前曰夫秦之為無道也欲興兵臨周而求九鼎周之君臣内自盡盡其心思補曰姚云盡字劉曽集作畫計與秦計猶謀不若歸之大國謂齊夫存危國周有秦兵危也美名也得九鼎厚寳也厚猶重願大王圗之齊王大補曰一本大説發師五萬人使陳臣思即後田臣思凡陳田皆齊公族將以救周而秦兵罷齊將求九鼎周君又患之顔率曰大王勿憂臣請東解之東之齊解免之顔率至齊謂齊王曰周頼大國之義得君臣父子相保也願獻九鼎不識大國何涂之從問其路所從出禮遂上有徑洫上有涂而致之齊齊王曰寡人將寄徑於梁徑步道也猶言假涂顔率曰不可夫梁之君臣欲得九鼎謀之暉臺之下臺名曰暉故孟子稱梁有臺池之樂沙元作少少補曰少當作沙海之上九域圗開封有沙海引此其日乆矣鼎入梁必不出齊王曰寡人將寄徑於楚楚非適齊之途既不可入梁亦無從至楚其云然不可曉也對曰不可楚之君臣欲得九鼎謀之於葉庭之中即南陽葉也補曰姚云後語作章華之庭其日久矣若入楚鼎必不出王曰寡人終何涂之從而致之齊顔率曰敝邑固竊為王患之夫鼎者非效壺醯醬瓿耳壺昆吾圜器瓿甂也補曰一本醯壺此文殽次可懐挾提挈以至齊者非效鳥集烏飛兎興馬逝並喻其輕疾灕然止於齊者集韻灕滲流貌昔周之代殷得九鼎凡一鼎而九萬人輓之輓引也九九八十一萬人士卒師徒士一人也二千五百人為師徒步行者正曰左傳注步卒七十二人甲士三人又百人為卒徒衆也此士卒師徒亦大㮣言之耳械器被具械器之總名被具士卒所服用之具所已備者稱此備人之所應用使稱足此八十一萬人補曰姚本已作以正曰稱此者彼此均等猶史言他物稱是謂士衆賫械具備輓鼎之役者又且八十一萬也今大王縱有其人何涂之從而出臣切為大王私憂之齊王曰子之數來猶無與耳言許之而實不與也顔率曰不敢欺大國疾定所從出敝邑遷鼎以待命齊王乃止補曰洪氏邁云策首載此以為竒謀此特兒童之見爾疑必無是事而好事者餙之愚按左氏嘗載楚子問鼎亊當時争欲得鼎以見其強不可以為無秦攻宜陽韓邑屬𢎞農秦武三年攻冝陽赧王七年也補曰大亊記云今河南府福昌縣城東南北三面峭絶天險黽池二殽皆在境内葢控扼之地而此據甘茂傳文年表㧞宜陽在次年宜陽之役五月不㧞凡涉兩嵗也通鑑大事記皆於赧七年書伐八年書㧞景翠救韓在八年周君謂周累曰補曰一本趙累大事記引子以為如何對曰宜陽必㧞也君曰宜陽城方八里材士十萬士之有材武者粟支數年公仲之軍二十萬景翠楚將以楚之衆臨山而救之楚與韓隣而與秦相圖故救之秦必無功對曰甘茂下蔡人仕秦補曰茂一作戊後多有説文史作戊古字通羇旅也集韻羇旅寓也攻冝陽而有功則周公旦也言且相秦無功則削迹於秦言不得留秦王不聽羣臣父兄之議而攻宜陽宜陽不㧞秦王耻之臣故曰㧞君曰子為寡人謀且奈何對曰君謂景翠曰公爵為執珪官為柱國楚卿戰而勝則無加焉矣不勝則死不如背秦援宜陽翠時葢援宜陽而有秦之私故云補曰秦策馮章許楚漢中楚懽而不進所説有秦私者竊謂此策上既言秦之必抜翠之不勝則死而又曰不如背秦援宜陽意殊不𩔖恐此勝有缺誤背下或有之字或秦下復有秦字援字或作㧞勸之避秦兵待秦既㧞然後進兵乘其敝當秦懼之韓徳之而交得賂以為利下文秦抜宜陽景翠果進兵果字可見又秦策楚畔秦而合於韓句意似與此同然彼指翠未救時言之爾其後韓楚雖合楚不為韓氏與秦戰固巳懼之矣公進兵秦恐公之乘其敝也乘謂因而攻之必以寳事公公仲慕公之為巳乘秦也亦必盡其寳秦㧞宜陽景翠果進兵秦懼遽効煮棗屬濟隂寃句韓氏果亦効重寳景翠得城於秦受寳於韓而徳東周徳恩之也補曰為寡為已之為去聲餘如字東周與西周戰韓救西周為東周謂韓王㐮曰西周者故天子之國也多名器重寳按兵而勿出按下與舉反可以徳東周西周之寳可盡矣欲韓出兵故賂之紀八年有東周與西周争西周欲和於楚韓和二國以為己援齊明疑楚人兩見楚策正曰無明徴注例以國姓者皆其國人齊明豈不可為齊人邪故大事記止云當時之辯士也謂東周君曰臣恐西周之與楚韓寳令之為己求地於東周也不如謂楚韓曰西周之欲入寳持二端言東兵急則入不急則已今東周之兵不急西周西周之寳不入楚韓楚韓欲得寳即且趣我攻西周趣疾也督使疾戰我謂東周西周寳出是我為楚韓取寳以徳之也言有恩於楚韓西周弱矣東周欲為稻為謂種之西周不下水稲宜濕西周居河之上流正曰不下專指河水東周患之蘇子非代則厲謂東周君曰臣請使西周下水可乎乃徃見西周之君曰君之謀過矣今不下水所以富東周也今其民皆種麥麥宜燥也無他種矣君若欲害之不若一為下水以病其所種下水東周必復種稻種稻而復奪之若是則東周之民可令一仰西周有望於上則仰補曰為去聲仰疑向反而受命於君矣西周君曰善蘇子亦得兩國之金也彪謂此策不可行東西周壌地相接豈不能候其所種蘇子東人也為東游説而豈得不疑且今下水安能保其不奪雖一為下何補哉正曰據此策則西人可以制周必不疑於其説蘇子公為反覆以得金豈顧其復奪哉大事記云其㣲如此其所争又如此可不哀哉然則又何足深辨也昭獻在陽翟屬潁川補曰韓策楚昭獻相韓周君將令相國徃徃與獻會相國將不欲蘇厲為之謂周君曰楚王與魏王遇也主君令陳封之楚此言疇昔之事陳向葉皆仕周而位在相下令向公之魏楚韓之遇也亦其王遇主君令葉公之楚令向公之韓今昭獻非人主也而主君令相國徃若其王在陽翟主君將令誰徃言必君自徃周君曰善乃止其行秦假道於周以伐韓周恐假之而惡於韓不假而惡於秦史黶韓史疑即厭補曰黶正義云烏减於㸃二反謂周君曰君何不令人謂韓公叔韓公族曰秦敢絶塞絶横渡塞障也為垣壘以遮止鄰國徃來而伐韓者信東周也公何不與周地發重使使周發使使之楚秦必疑秦楚相圖之國也周使使楚故秦疑其圖已不信周是韓不伐也不受秦伐又謂秦王武曰韓強補曰強巨兩反與周地將以疑周於秦寡人不敢弗受秦必無辭而令周弗受是得地於韓而聽於秦也紀八年彪謂戰國之士設心措辭無不出於意詐若此者君子之所怒也下章次之正曰鮑尊周故謂行詐免難所可惡與前注為伍得章失同楚攻雍氏此亦赧之十五年也周粻秦韓粻食米也時秦救韓周以米餉之正曰詩傳糧也音張楚王懐怒周周君患之或為周謂楚王曰以王之強而怒周周恐必以國合於所與粟之國則是勁王之敵也勁強也故王不如速觧周恐周以楚怒之故恐彼前得罪而後得解必厚事王矣蘇厲為周最謂蘇子元作秦秦曰君不如令王君謂蘇子王周君也此時與赧俱王其稱公後避秦也正曰尤繆聽最以地合於魏趙地周地故必怒稱故者特為之怒蘇子怒最合於齊怒最而反其所合是君以合齊與強楚吏産子時齊與楚善合齊則得與楚為與國可至再世産子言易世也與黨與也補曰劉辰翁云吏字當作更平聲君若欲因最之事與最同合魏趙此厲本謀也前與游辭耳故為為周最則合齊者君也割地者最也補曰最欲合趙魏而蘇秦欲合齊厲為最故言若不廢最之事則君合齊而最合趙魏也謂周最曰仇赫之相宋補曰赫一本作赧將以觀秦之應趙宋絶句敗三國韓魏齊也魏紀哀二十一年與韓齊敗秦函谷葢此時秦欲敗之反為所敗也赧十八年正曰哀當作㐮下同十八當作十七年表文大事記從之三國不敗將與趙宋合於東方即三國以孤秦亦將觀韓魏之於齊也不固則將與宋敗三國此應秦也則賣宋於三國此應三國也以國情輸之曰賣言赫不忠於宋不應秦則應三國以此知赫本非宋人補曰一本則賣趙宋公何不令人謂韓魏之王韓襄魏哀曰欲秦趙之相賣乎此賣猶欺何不合周最兼相使韓魏皆相之視之不可離視示同二國同相最可見其交之固補曰離去聲則秦趙必相賣以合於王也為周最謂魏王哀正曰㐮曰秦知趙之難與齊戰也難言其不利正曰難畏阻意將恐齊趙之合也必隂勁之勁趙以兵使之強趙不敢戰難先戰恐秦不已収也違其勁之之意先合於齊秦趙争齊齊固秦所欲合故其勁趙謂之隂勁正曰秦欲伐齊趙欲合齊故云争齊而王無人焉無主其事於齊者不可王不去周最最時在魏欲之齊故此士為之言使得去合與収齊與即謂齊齊魏之與國而以兵急之元作之急急之以兵則非合矣之急則伐齊無因事矣言秦見齊有魏兵必伐之有此有彼曰因猶言無他事矣齊敗魏馬陵宜為魏仇因此言合與葢其國形宜相依也正曰而以兵伐齊今不合與収齊而以秦兵之急則伐齊言是無可依之亊矣謂周最曰魏王哀正曰昭以國與先生以徳齒尊稱之也與謂相之正曰孟子注學士年長者謂之先生貴合於秦以伐齊貴猶欲薛公田文故主齊閔王也最嘗仕齊故稱之然輕忘其薛不顧其先君之丘墓謂齊王田文欲去國以避秦兵正曰此田文相魏時也下文謂魏王薛公可見文激於祝弗吕禮之故勸秦伐齊故生上恐缺一字葢言文猶背齊以起下文最不與伐齊之意大事記赧王二十九年魏以田文為相謂其去齊相魏在齊滅宋之前史在滅宋之後而公獨修虛信最本善齊固不背齊然今相魏魏有以秦伐齊之形猶為虛信信謂親之為茂行茂盛美也明羣臣明猶示也臣魏臣據故主據仗持也猶言為之此言最在魏示羣臣以為齊王不欺之此所謂茂行正曰修虛信為茂行句明羣臣據故主句不與伐齊與去音正曰與如字許也産以忿強秦産猶生也魏欲伐齊已獨不與猶生此節目也違秦不伐齊故秦忿不可公不如謂魏王薛公曰請為王入齊天下不能傷齊最之智略足以全齊而有變萬一有傷齊者臣請為救之此則非虛信矣無變王遂伐之伐秦且臣為齊奴也為去音言其為之如奴亊主如累王之交於天下累者事相連及猶誤也交謂齊魏不可此言非人之情王為臣賜厚矣臣入齊則王亦無齊之累也此累猶患正曰按魏䇿周最入齊秦王怒令姚賈譲魏王魏王為之謂秦王曰魏之所以為王通天下者以周最也今最遁寡人入齊齊無通於天下矣敝邑之事王亦無齊累矣最入齊則正與此章相首尾所謂敝邑之事王亦無齊累語又與此合曰請為王入齊天下不能傷齊者最自許其足以全齊有變為秦伐齊齊急則請魏之救無變謂秦不能伐則王遂伐之此厚齊之説也且臣為齊奴以下以為魏言之為齊奴為齊奴𨽻也交指秦也累逹及也不可以最故使魏惡於秦王使最得入齊為賜厚矣最入齊則秦無疑於魏是魏不為齊所累也補曰為王為救之為去聲餘如字趙取周之祭地周君患之告於鄭朝凡鄭皆鄭人鄭朝曰君勿患也臣請以三十金一斤為一金正曰正義云秦以一鎰為一金孟康云二十四兩云注復取之周君予之鄭朝獻之趙太卜因告以祭地事及王病使卜之太卜譴之曰譴謫問也周之祭地為祟神禍也趙乃還之杜赫周人正曰楚策云楚杜赫欲重景翠於周謂周君曰君之國小盡君之重寳珠玉以事諸侯不可不察也國小必賂以求援不可勝賂故宜察譬之如張羅者張之於無鳥之所則終日無所得矣張於多鳥處則又駭鳥矣多鳥處有觸羅者傍鳥必覺覺則羣驚而去矣必張於有鳥無鳥之際然後能多得鳥矣今君將施於大人大人輕君施於小人小人無可以求又費財焉均之費財而小人多則多費也君必施於今之窮士不必且為大人者不必猶不可知也言不終窮或且為大人者此指翠也故能得欲矣齊策楚策皆有杜赫在齊則威王時於周顯王時也自顯威至是八十年矣疑赫字誤景翠實此時人正曰按齊策田忌亡齊之楚鄒忌代相恐其以楚權復齊杜赫曰臣請為留楚忌王二年忌有馬陵之戰其奔必後此宣楚䇿五國伐秦魏欲和杜赫云云在楚懐王十一年當慎靚王三年大事記據韓世家注赧王三年書楚景翠圍韓雍氏自宣王二年至赧王三年為三十年自慎靚王三年至此為七年則翠之與赫何不相及之有三國隘秦赧十八年注具前隘謂隔絶之正曰八當作七補曰策隘阨字通此當乙革反周令其相之秦以秦之輕也見其隘於三國留其行不進有人謂相國曰秦之輕重未可知也秦欲知三國之情公不如遂見秦王昭曰請為一作謂王聽東方之處聽偵候之東三國也處其所為秦必重公是公重周下衍重周二字重周以取秦也秦重相則周重矣齊重故有周齊重天下重之也故猶舊也有言善之而已取齊此時秦齊為天下重已善秦不可忽齊故又勸之取齊正曰有謂収已也取謂得於彼也齊為重國故能収有周而周已取之矣今復取秦是周常不失重國之交是周常不失重國之交也補曰凡輕重字自然重者上聲重之者去聲此章輕重齊重重國之重上聲餘去聲宫元作昌下同此書作宫不一昌正曰昌當依本文他亡西周以罪去國曰亡之東周盡輸西周之情於東周輸言委以告之東周大喜西周大怒馮睢元作且睢之省也猶趙作肖齊作立故後唐且史作睢裴駰亦曰唐睢以華頴悟秦也此西人下同正曰且當依本文曰臣能殺之君予金三十斤馮睢且使人操金與書間遺宫昌他為反間書以遺之曰告宫昌他事可成勉成之不可成亟亡來亟急也事久且泄自令身死事泄露則死而不亟來自取之也正曰本文明白注少久字似不必因使人告東周之候偵候之吏揚雄曰西北一候曰今夕有姦人當入者矣候得而獻東周得其人與書東周立殺宫昌他昭翦與東周惡或謂昭翦曰為公畫隂計為人謀者畫之以籌昭翦曰何也曰補此字正曰古書多如此不必補西周甚憎東周常元作嘗嘗補曰當作常古通欲東周與楚惡西周必令賊賊公因宣言東周也集韻宣揚也以惡元作西周二字西周補曰字有訛未詳之於王也王楚懐王昭翦曰善吾又恐東周之賊已此翦自計而以輕西周惡之於楚翦惡東必善西西善翦則楚亦因重西矣東欲壊其交故賊翦翦死則西無内主於楚東因得使楚惡之遽和東周彪謂周衰君臣唯貪利而畏禍故一切趨避變亂於游談之口而無有特操翦之慮死如此其能復固其所守乎周最謂吕禮凡吕皆齊人禮以秦昭十三年奔魏十九年復歸秦其相齊在薛公歸薛後見孟嘗傳葢赧二十一年後也正曰吕皆齊人此𩔖無據當缺晉有吕錡吕相本魏氏不必吕尚後也注奔魏據秦紀按穣侯傳冉相秦欲誅吕禮禮出奔齊大事記從之歸秦據秦紀及穣侯傳按秦紀下接齊破宋之文年表破宋在秦昭二十一年則紀誤矣按吕禮相齊孟嘗君遺穣侯書勸秦伐齊而禮亡事當在齊滅宋前大事記書於赧王二十九年之首齊首尾九年然觧題亦據則禮自奔齊至去後六年來歸則未改也曰子何不以秦攻齊臣請令齊相子秦攻齊禮使之也齊欲免攻故可使之相禮子以齊事秦必無慮元作處處正曰前後章有此字義當同矣子因令下衍周字周最居魏以共之與齊俱事秦是天下制於子也子東重於齊西貴於秦秦齊合則子常重矣謂薛公田文曰周最於齊王厚也閔王而逐之補曰史秦王將吕禮相齊欲困蘇代代乃謂云云史史周最於齊至厚也而齊王逐之策文省而勝祝弗作親弗索隐謂策得之一本况弗聽祝弗齊人相吕禮者欲取秦也秦補此二字齊合上章所謂以齊事秦正曰注據補二字然言齊合則秦自見省文爾下章齊合亦然一本欲取秦秦齊合弗與禮重矣與猶如也言二國合則齊所重無如禮者正曰史親弗與吕禮重矣言二國合則二人重策齊合弗與禮重矣言齊與秦合則二人重於齊視史語簡而勝上文秦字省尤可見有下衍周字周補曰史作用齊秦有之正曰有用齊者言二子用齊秦必輕君君弗如急北兵趨趙亦與趙攻秦以秦魏能左右之曰以以猶使正曰從史以下有和字是急北兵讀秦魏句是時秦怒齊齊趙交惡秦欲合魏前章魏貴合秦以攻齊趙難與齊戰下章齊合則趙恐伐可見皆一時事也秦趙魏合為攻齊也故云急北兵趨趙以和秦魏也趨即趣促也謂不如急北方之兵從隨之應秦魏而相與以攻齊也魏策周最入齊秦譲魏魏謂秦曰大國欲急兵則趨趙而已趨即趨也此語正同雖時有後先而事理不異爾吕禮嫉史載此策在文謝病歸薛後文從其計而乃害文乃勸秦伐齊吕禮亡其後齊㓕宋文奔魏且文在齊豈敢召穣侯之兵哉召秦伐齊必文已去齊而史失之也此策云収周最反齊王則亦文奔魏之後召秦兵之前乎収周最以為後行齊初逐最欲取秦合也今攻秦収最用之可圖後舉行猶舉正曰當從史無為字後作厚行下孟反最本厚於齊今齊逐之故収最以厚其行上文厚字同義且反齊王之信齊前與秦合今與趙攻之信反也正曰齊用禮以合秦取信今反之使不合也又禁天下之率率猶從也謂從齊補曰率史作變索隐云齊秦合則弗禮用用則輕孟嘗二説皆通齊無秦天下果弗必走果猶决也走去音趨之也言不趨齊正曰史齊無秦則天下集齊親弗必走此果字當從史作集謂齊無秦合而秦趙魏合則天下之兵集於齊祝弗必走言弗而不及禮者齊聽弗而相禮弗走禮不待言矣齊王誰與為其國言必重文孟嘗傳有正曰此章參之史可以互正如弗乃祝弗名尤易知而注乃釋以他説其誤甚矣齊聽祝弗外周最謂齊王閔曰逐周最聽祝弗相吕禮者欲深取秦也補曰深取之深恐因下文衍秦得天下則伐齊深矣秦得齊則益强故能得天下得天下則亦不能存齊夫秦補正曰説見上此下云急兵以示秦則無秦字尤明矣齊合則趙恐伐秦伐之故急兵以示秦趙兵攻齊秦以趙攻攻齊與之齊伐趙之猶趨其實同理以趙攻齊則得齊趨齊伐趙亦得趙故其理同必不處矣處猶據也秦不據齊理同而獨不據齊齊無兵而趙已出兵故也正曰注難通處義未詳故用祝弗即天下之理也理在受兵於趙正曰言天下必將歸秦周相吕倉見客於周君言之於君使得見補曰見賢遍反前相工師籍恐客之傷已也傷猶毁此即枝工師籍因令人謂周君曰客者辨士也然而所以不可者不可聽用好毁人彪謂工師籍非端人也徳義不愆何恤人之言周文君史書東周略甚豈惠公後有此君邪不然則惠公别稱也鴻烈道應訓亦稱周昭文君此後書訓皆鴻烈也免下衍士字士補曰疑衍姚云曽集本去工師籍相吕倉國人不説也君有閔閔之心亦不説也謂周文君曰國必有誹譽誹謗也忠臣令誹在已譽在上宋君奪民時以為臺而民非之見㐮十一年無忠臣以掩葢之也子罕釋相為司空司空主土工傳言子罕親執扑以行築者是也民非子罕而善其君齊桓公宫中女元作七七市女閭七百閭里中門也為門為市於宫中使女子居之正曰宫中為女市女閭凡七百也國人非之管仲故為三歸之家婦人謂嫁曰歸夫家曰家仲葢三取女也以掩桓公非自傷於民也管仲為此人皆毁之仲非樂於毁也其意欲掩葢桓公耳一説仲欲掩公之非寜自毁也春秋記臣弑君者以百數皆大臣見譽者也故大臣得譽非國家之美也彪謂此言掩君之非可耳而齒見譽者於弑君之列則後世名卿賢相何道而可以安於朝廷之上不仁哉此言也補曰漢髙帝繫治蕭何曰吾聞李斯相秦有善歸主有惡自與云云王衞尉曰秦以不聞其過亡天下李斯之分過又何足法哉故衆庻成強言師籍之得衆増積如山周君遂不免卒相倉也温人之周温時為西邑綦母恢請之也正曰西周得温囿耳周不納並東周客即對曰主人也矯稱東人補曰姚云一本周不内問曰客邪對曰云云韓非子文同問其巷補曰韓非子作巷人而不知也吏因囚之君使人問之曰子非周人而自謂非客何也對曰臣少而誦詩詩曰普天之下莫非王土率土之濵莫非王臣小推北山詩普徧率循也今周君天下則我天子之臣而又為客哉故曰主人君乃使吏出之或為周最謂金投葢趙人之不善齊者曰秦以周最之齊疑天下周使最之齊秦以此疑周齊與天下合而謀己正曰無考而又知趙之難子不敢違投齊人戰恐秦既疑齊投又不善齊故齊懼伐齊下衍韓字韓補曰疑衍之合必先合於秦秦齊合則公之國虚矣言趙必破而為墟墟虛字同大丘也公不如救齊因佐秦而伐韓魏上黨長子屬上黨並韓地趙之有己二國有秦兵故趙得取其邉地公東収寳於秦佐秦故南取地於韓魏因以困韓魏唇齒之國故也徐為之東為猶謀也東謂齊則有合矣齊合趙也始時趙與齊隙無合理今得秦韓故齊懼而合其實最時相齊慮有趙患故為最謀者移之韓魏也周最謂金投曰公負令秦與強齊戰負猶失也其失在此正曰負恃也令字疑合戰勝勝齊秦且収齊而封之封謂疆理之使無多割割謂出地而聽天下之戰諸國求地於齊齊不多割則必戰此秦弱齊之計正曰此秦制齊之命不勝國大傷趙傷也時趙令秦與齊戰戰不勝則秦必咎趙能無傷乎正曰趙恃合於秦以與齊戰不勝則國大傷而聽命於秦矣不得不聽秦趙聽也秦盡韓魏之上黨太原魏地後為秦郡西土元作止止正曰上西字姚本引錢一作而秦之有已秦之所難者齊也已収齊則韓魏不守秦地天下之半也制齊楚三晉之命趙以大傷故亦見制覆元作復復補曰覆通國且身危覆如覆器然國趙也身謂投是何計之道也言非計此策最為齊使趙拒秦也石行秦周人正曰無考一本石作右右行秦官也謂大梁造秦爵梁作良秦孝十年衞鞅惠文五年公孫衍昭㐮十五年白起皆為之此葢起也正曰無考曰欲决覇主之名不如備兩周辯智之士備謹待之謂周君曰行秦謂之君不如令辯智之士為君爭於秦秦欲卑周争者争此也既謹待之則争必得矣補曰王應麟云周赧王卒于乙巳明年丙午秦遷西周君而東周君猶存壬子秦遷東周君而周遂不祀作史者當自丙午至壬子係周統於七國之上乃得春秋存陳之義大事記周赧後即係秦朱子以為未當綱目以七國如楚漢並書之今按解題云自赧王降周統已絶東周雖未亡特邾莒附庸之𩔖耳所以存而未論也朱子雖以七國並書而赧王之後亦不以東周係統者其意亦不異綱目之成在乾道壬辰而淳熈辛丒吕子卒大事記始出非矯之也凡二十六章戰國䇿校注卷二
